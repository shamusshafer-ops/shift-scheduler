        const alreadyOnPrimary = (ns[primaryKey] || []).some(a => a.employeeId === emp.id);
        if (!alreadyOnPrimary) continue;
        if ((emp.unavailableDays || []).includes(day)) continue;
        if (empTimeOffDays && empTimeOffDays.has(emp.id + "__" + day)) continue;
        for (const adjShift of adjShifts) {
          if ((hourTracker[emp.id] || 0) >= FT_MIN_HOURS) break;
          if ((emp.blockedShifts || []).includes(adjShift)) continue;
          const adjKey = cellKey(day, adjShift);
          const adjAsgn = ns[adjKey] || [];
          const cap = slotCap(day, adjShift);
          if (adjAsgn.length >= cap) continue;
          if (adjAsgn.some(a => a.employeeId === emp.id)) continue;
          const gap = rg(emp.id, ns, day, adjShift);
          if (isRestViolation(emp, gap, minRest)) continue;
          if (calcConsecutiveHours(emp.id, ns, day, adjShift, extShiftsArg) > MAX_CONSECUTIVE_HOURS) continue;
          const pos = pickPosition(emp, adjAsgn, day, adjShift);
          if (!pos) continue;
          hourTracker[emp.id]  = (hourTracker[emp.id]  || 0) + SHIFT_HOURS;
          shiftsWorked[emp.id] = (shiftsWorked[emp.id] || 0) + 1;
          dayWorked[emp.id].add(day);
          adjAsgn.push({ employeeId: emp.id, position: pos });
          ns[adjKey] = adjAsgn;
        }
      }
    }
  }

  // Step 5: PT fill — preferred shift only
  fillPass("part-time", { shiftLocked: false });
  // Step 5b: On-call fill — last resort
  fillPass("on-call", { shiftLocked: false, isOnCall: true });

  // ── Step 4c: OC→FT substitution pass ────────────────────────────────────────
  // Find slots where on-call employees fill Guard positions while FT Guard employees
  // are still under 40h. Swap the on-call out for the FT employee.
  for (const day of DAYS) {
    for (const shift of SHIFTS) {
      const key  = cellKey(day, shift.id);
      const asgn = ns[key] || [];
      for (let ai = 0; ai < asgn.length; ai++) {
        const slot = asgn[ai];
        const ocEmp = sourceEmps.find(e => e.id === slot.employeeId);
        if (!ocEmp || ocEmp.employmentType !== "on-call") continue;
        if (slot.position !== "Guard") continue;
        const replacement = sourceEmps.find(e => {
          if (e.employmentType !== "full-time") return false;
          if ((hourTracker[e.id] || 0) >= FT_MIN_HOURS) return false;
          if (asgn.some(a => a.employeeId === e.id)) return false;
          if ((e.unavailableDays || []).includes(day)) return false;
          if (empTimeOffDays && empTimeOffDays.has(e.id + "__" + day)) return false;
          if ((e.blockedShifts || []).includes(shift.id)) return false;
          if (e.requiredShift && e.requiredShift !== shift.id) return false;
          if (!e.qualifications.includes("Guard")) return false;
          if (isRestViolation(e, rg(e.id, ns, day, shift.id), minRest)) return false;
          if (calcConsecutiveHours(e.id, ns, day, shift.id, extShiftsArg) > empMaxConsec(e)) return false;
          if (shift.id === "third" && calcConsecutiveNights(e.id, ns, day, shift.id) >= maxNights) return false;
          return true;
        });
        if (!replacement) continue;
        asgn[ai] = { employeeId: replacement.id, position: "Guard" };
        hourTracker[ocEmp.id]        = Math.max(0, (hourTracker[ocEmp.id] || 0) - SHIFT_HOURS);
        shiftsWorked[ocEmp.id]       = Math.max(0, (shiftsWorked[ocEmp.id] || 0) - 1);
        hourTracker[replacement.id]  = (hourTracker[replacement.id] || 0) + SHIFT_HOURS;
        shiftsWorked[replacement.id] = (shiftsWorked[replacement.id] || 0) + 1;
        dayWorked[replacement.id].add(day);
        ns[key] = asgn;
      }
    }
  }

  // ── Step 5e: Ripple Effect Cascade ───────────────────────────────────────────
  // When FT employees are still under 40h after all fill passes, cascade-displace
  // PT/OC employees from filled slots to make room, then relocate the displaced
  // body to a vacant slot elsewhere — so the FT guarantee is met without leaving
  // the displaced employee stranded (their hours stay the same, just different day).
  //
  // 1-hop ripple per iteration; up to MAX_RIPPLE_PASSES sweeps.
  // Runs before role-enforcement (5c) and DLS (5d) so they can repair any
  // role-coverage side-effects the ripple creates.
  {
    const MAX_RIPPLE_PASSES = 3;

    for (let pass = 0; pass < MAX_RIPPLE_PASSES; pass++) {
      const underFT = sourceEmps
        .filter(e => e.employmentType === "full-time" &&
                     !(e.qualifications||[]).includes("Supervisor") &&
                     (hourTracker[e.id]||0) < FT_MIN_HOURS)
        .sort((a, b) => (hourTracker[a.id]||0) - (hourTracker[b.id]||0)); // most under-hours first

      if (!underFT.length) break;
      let rippleThisPass = false;

      for (const ftEmp of underFT) {
        if ((hourTracker[ftEmp.id]||0) >= FT_MIN_HOURS) continue;
        const empPlan = plan[ftEmp.id];
        let ripped = false;

        for (const day of DAYS) {
          if (ripped) break;
          if (dayWorked[ftEmp.id].has(day)) continue; // already working this day

          for (const shift of SHIFTS) {
            if (ripped) break;
            // FT employees stay on their planned shift
            if (empPlan && shift.id !== empPlan.shiftId) continue;

            const key  = cellKey(day, shift.id);
            const asgn = ns[key] || [];
            if (!asgn.length) continue; // nothing to displace

            // FT employee must be eligible for this slot
            if ((ftEmp.unavailableDays||[]).includes(day)) continue;
            if (empTimeOffDays && empTimeOffDays.has(ftEmp.id + "__" + day)) continue;
            if (isRestViolation(ftEmp, rg(ftEmp.id, ns, day, shift.id), minRest)) continue;
            if (calcConsecutiveHours(ftEmp.id, ns, day, shift.id, extShiftsArg) > empMaxConsec(ftEmp)) continue;
            if (shift.id === "third" && calcConsecutiveNights(ftEmp.id, ns, day, shift.id) >= maxNights) continue;
            const ftAp = getAvailPos(day, shift.id).filter(p => canFillPos(ftEmp, p, day));
            if (!ftAp.length) continue;

            // Find a PT or on-call employee in this slot to displace
            const displaceIdx = asgn.findIndex(a => {
              const e = sourceEmps.find(x => x.id === a.employeeId);
              return e && (e.employmentType === "part-time" || e.employmentType === "on-call");
            });
            if (displaceIdx === -1) continue;

            const displaced    = asgn[displaceIdx];
            const displacedEmp = sourceEmps.find(x => x.id === displaced.employeeId);
            if (!displacedEmp) continue;

            // Find a valid vacant (or under-capacity) slot to relocate the displaced employee
            let relocateKey = null, relocateDay = null, relocateShift = null, relocatePos = null;

            for (const rDay of DAYS) {
              if (relocateKey) break;
              if (rDay === day) continue; // skip same day (employee just worked it)
              if (dayWorked[displacedEmp.id].has(rDay)) continue; // already working this day
              for (const rShift of SHIFTS) {
                if (relocateKey) break;
                const rKey   = cellKey(rDay, rShift.id);
                const rAsgn  = ns[rKey] || [];
                const rCount = rAsgn.filter(a => a.position !== "Supervisor").length;
                if (rCount >= slotCap(rDay, rShift.id)) continue; // slot full
                if ((displacedEmp.unavailableDays||[]).includes(rDay)) continue;
                if (empTimeOffDays && empTimeOffDays.has(displacedEmp.id + "__" + rDay)) continue;
                if ((displacedEmp.blockedShifts||[]).includes(rShift.id)) continue;
                if (displacedEmp.requiredShift && displacedEmp.requiredShift !== rShift.id) continue;
                if (isRestViolation(displacedEmp, rg(displacedEmp.id, ns, rDay, rShift.id), minRest)) continue;
                if (calcConsecutiveHours(displacedEmp.id, ns, rDay, rShift.id, extShiftsArg) > empMaxConsec(displacedEmp)) continue;
                const rAp = getAvailPos(rDay, rShift.id).filter(p => canFillPos(displacedEmp, p, rDay));
                if (!rAp.length) continue;
                relocateKey   = rKey;
                relocateDay   = rDay;
                relocateShift = rShift;
                relocatePos   = rAp.includes("Guard") ? "Guard" : rAp[0];
              }
            }

            if (!relocateKey) continue; // nowhere to put the displaced employee — skip

            // Determine position for FT employee taking the vacated slot
            const remainingAsgn = asgn.filter((_, i) => i !== displaceIdx);
            const nowHasScale   = slotHasRole(remainingAsgn, sourceEmps, "Scale");
            const nowHasMedical = slotHasRole(remainingAsgn, sourceEmps, "Medical");
            let ftPos;
            if      (!nowHasScale   && ftAp.includes("Scale"))   ftPos = "Scale";
            else if (!nowHasMedical && ftAp.includes("Medical")) ftPos = "Medical";
            else if (ftAp.includes("Guard"))                     ftPos = "Guard";
            else ftPos = ftAp[0];

            // ── Perform the ripple ──
            // Remove displaced PT/OC from original slot, insert FT employee
            ns[key] = [...remainingAsgn, { employeeId: ftEmp.id, position: ftPos }];
            hourTracker[displacedEmp.id]  = Math.max(0, (hourTracker[displacedEmp.id]||0) - SHIFT_HOURS);
            shiftsWorked[displacedEmp.id] = Math.max(0, (shiftsWorked[displacedEmp.id]||0) - 1);
            dayWorked[displacedEmp.id]?.delete(day);

            // Place displaced PT/OC in their new slot
            ns[relocateKey] = [...(ns[relocateKey]||[]), { employeeId: displacedEmp.id, position: relocatePos }];
            hourTracker[displacedEmp.id]  = (hourTracker[displacedEmp.id]||0) + SHIFT_HOURS;
            shiftsWorked[displacedEmp.id] = (shiftsWorked[displacedEmp.id]||0) + 1;
            (dayWorked[displacedEmp.id] = dayWorked[displacedEmp.id] || new Set()).add(relocateDay);

            // Update FT employee tracking
            hourTracker[ftEmp.id]  = (hourTracker[ftEmp.id]||0) + SHIFT_HOURS;
            shiftsWorked[ftEmp.id] = (shiftsWorked[ftEmp.id]||0) + 1;
            dayWorked[ftEmp.id].add(day);

            console.log(`[Ripple] ${ftEmp.name} (FT, ${hourTracker[ftEmp.id]}h) takes ${day}/${shift.id} from ${displacedEmp.name} → ${displacedEmp.name} relocated to ${relocateDay}/${relocateShift.id}`);
            ripped = rippleThisPass = true;
          }
        }
      }
      if (!rippleThisPass) break;
    }
  }

  // ── Step 5c: Role-enforcement swap pass ───────────────────────────────────
  // Business rule: every shift MUST have Scale AND Medical coverage.
  // If a slot is full but missing a required role, swap out a Guard-only body
  // for the cheapest available qualified replacement.
  for (const day of DAYS) {
    for (const shift of SHIFTS) {
      const key  = cellKey(day, shift.id);
      const asgn = ns[key] || [];
      if (!asgn.length) continue;

      const activeExts = (extShiftsArg||[]).filter(e => extCovers(e, day, shift.id));
      const hasScale   = slotHasRole(asgn, sourceEmps, "Scale")   || activeExts.some(e=>(e.roles||[]).includes("Scale"));
      const hasMedical = slotHasRole(asgn, sourceEmps, "Medical") || activeExts.some(e=>(e.roles||[]).includes("Medical"));

      for (const missingRole of [
        ...(!hasScale   ? ["Scale"]   : []),
        ...(!hasMedical ? ["Medical"] : []),
      ]) {
        const cap = slotCap(day, shift.id);
        const currentAsgn = ns[key] || [];

        // Find a Guard-only body in this slot we can swap out
        const swapOutIdx = currentAsgn.findIndex(a => {
          const e = sourceEmps.find(x => x.id === a.employeeId);
          return e && isGuardOnly(e);
        });

        // Find a replacement who covers the missing role
        const assigned = new Set(currentAsgn.map(a => a.employeeId));
        const replacement = sourceEmps.find(e => {
          if (assigned.has(e.id)) return false;
          if (!(e.qualifications||[]).includes(missingRole)) return false;
          if ((e.unavailableDays||[]).includes(day)) return false;
          if (empTimeOffDays && empTimeOffDays.has(e.id + "__" + day)) return false;
          if ((e.blockedShifts||[]).includes(shift.id)) return false;
          if (e.requiredShift && e.requiredShift !== shift.id) return false;
          if (isRestViolation(e, rg(e.id, ns, day, shift.id), minRest)) return false;
          if (calcConsecutiveHours(e.id, ns, day, shift.id, extShiftsArg) > empMaxConsec(e)) return false;
          return true;
        });

        if (!replacement) continue; // no one available — gap remains, surfaces as violation

        if (swapOutIdx !== -1) {
          // Swap: remove Guard-only body, insert replacement
          const removed = currentAsgn[swapOutIdx];
          const removedEmp = sourceEmps.find(x => x.id === removed.employeeId);
          ns[key] = [
            ...currentAsgn.slice(0, swapOutIdx),
            { employeeId: replacement.id, position: missingRole },
            ...currentAsgn.slice(swapOutIdx + 1),
          ];
          if (removedEmp) {
            hourTracker[removedEmp.id] = Math.max(0, (hourTracker[removedEmp.id]||0) - SHIFT_HOURS);
            shiftsWorked[removedEmp.id] = Math.max(0, (shiftsWorked[removedEmp.id]||0) - 1);
          }
        } else if (currentAsgn.length < cap) {
          // Slot not full — just add the replacement
          ns[key] = [...currentAsgn, { employeeId: replacement.id, position: missingRole }];
        } else {
          continue; // slot full, no Guard-only to swap — gap remains
        }
        hourTracker[replacement.id]  = (hourTracker[replacement.id]  || 0) + SHIFT_HOURS;
        shiftsWorked[replacement.id] = (shiftsWorked[replacement.id] || 0) + 1;
        dayWorked[replacement.id].add(day);
      }
    }
  }

  // ── Step 5d: Directed Local Search (Smart Swapping) ─────────────────────────
  // When a slot is still missing Scale or Medical after 5c, and no fresh employee
  // is available (all qualified staff are already at cap or scheduled elsewhere),
  // attempt a targeted 2-hop chain swap:
  //   1. Find a qualified employee already scheduled in a DIFFERENT slot that week.
  //   2. Check whether a substitute (Guard or other eligible body) can take their
  //      current slot — keeping that slot's headcount and roles intact.
  //   3. If yes: move the qualified employee to the gap, put the sub in their old slot.
  // Hours/shifts/dayWorked are updated to reflect the swap so all downstream
  // tracking remains consistent.
  {
    const MAX_DLS_PASSES = 3; // re-scan after each swap in case one swap unlocks another

    const slotMissingRoles = () => {
      const gaps = [];
      for (const day of DAYS) {
        for (const shift of SHIFTS) {
          const key  = cellKey(day, shift.id);
          const asgn = ns[key] || [];
          if (!asgn.length) continue;
          const activeExts = (extShiftsArg||[]).filter(e => extCovers(e, day, shift.id));
          const hasScale   = slotHasRole(asgn, sourceEmps, "Scale")   || activeExts.some(e=>(e.roles||[]).includes("Scale"));
          const hasMedical = slotHasRole(asgn, sourceEmps, "Medical") || activeExts.some(e=>(e.roles||[]).includes("Medical"));
          if (!hasScale)   gaps.push({ day, shift, key, role: "Scale"   });
          if (!hasMedical) gaps.push({ day, shift, key, role: "Medical" });
        }
      }
      return gaps;
    };

    for (let pass = 0; pass < MAX_DLS_PASSES; pass++) {
      const gaps = slotMissingRoles();
      if (!gaps.length) break;
      let swappedThisPass = false;

      for (const { day: gapDay, shift: gapShift, key: gapKey, role: neededRole } of gaps) {
        const gapAsgn = ns[gapKey] || [];
        const cap     = slotCap(gapDay, gapShift.id);

        // ── Find a donor: qualified employee already assigned somewhere else ──
        let swapDone = false;
        for (const donor of sourceEmps) {
          if (swapDone) break;
          if (!(donor.qualifications||[]).includes(neededRole)) continue;
          if ((donor.unavailableDays||[]).includes(gapDay)) continue;
          if (empTimeOffDays && empTimeOffDays.has(donor.id + "__" + gapDay)) continue;
          if ((donor.blockedShifts||[]).includes(gapShift.id)) continue;
          if (donor.requiredShift && donor.requiredShift !== gapShift.id) continue;
          if (isRestViolation(donor, rg(donor.id, ns, gapDay, gapShift.id), minRest)) continue;
          if (calcConsecutiveHours(donor.id, ns, gapDay, gapShift.id, extShiftsArg) > empMaxConsec(donor)) continue;

          // Already filling the gap slot? Skip.
          if (gapAsgn.some(a => a.employeeId === donor.id)) continue;

          // Find the donor's current scheduled slot this week (any day/shift)
          let donorSourceKey = null, donorSourceDay = null, donorSourceShift = null;
          for (const d of DAYS) {
            if (donorSourceKey) break;
            for (const s of SHIFTS) {
              const k = cellKey(d, s.id);
              if ((ns[k]||[]).some(a => a.employeeId === donor.id)) {
                donorSourceKey   = k;
                donorSourceDay   = d;
                donorSourceShift = s;
                break;
              }
            }
          }
          if (!donorSourceKey) continue; // donor not scheduled at all — should be caught by earlier passes

          // Same slot as the gap? Would be a no-op.
          if (donorSourceKey === gapKey) continue;

          // ── Find a substitute who can cover the donor's vacated slot ──
          const donorSourceAsgn = ns[donorSourceKey] || [];
          const donorEntry      = donorSourceAsgn.find(a => a.employeeId === donor.id);
          const vacatedPosition = donorEntry?.position || "Guard";

          // The sub must be able to fill the vacated position (or Guard as fallback)
          // and must not already be in that slot or exceed their constraints.
          const sub = sourceEmps.find(sub => {
            if (sub.id === donor.id) return false;
            if (donorSourceAsgn.some(a => a.employeeId === sub.id)) return false;
            if ((sub.unavailableDays||[]).includes(donorSourceDay)) return false;
            if (empTimeOffDays && empTimeOffDays.has(sub.id + "__" + donorSourceDay)) return false;
            if ((sub.blockedShifts||[]).includes(donorSourceShift.id)) return false;
            if (sub.requiredShift && sub.requiredShift !== donorSourceShift.id) return false;
            // Check the sub can fill the vacated role (or at least Guard)
            const subAp = getAvailPos(donorSourceDay, donorSourceShift.id).filter(p => canFillPos(sub, p, donorSourceDay));
            if (!subAp.includes(vacatedPosition) && !subAp.includes("Guard")) return false;
            if (isRestViolation(sub, rg(sub.id, ns, donorSourceDay, donorSourceShift.id), minRest)) return false;
            if (calcConsecutiveHours(sub.id, ns, donorSourceDay, donorSourceShift.id, extShiftsArg) > empMaxConsec(sub)) return false;
            // Respect weekly shift cap
            const subCap = sub.maxShiftsPerWeek;
            if (subCap !== null && subCap !== undefined && (shiftsWorked[sub.id]||0) >= subCap) return false;
            return true;
          });

          if (!sub) continue; // can't free this donor without leaving their slot uncovered

          // ── Perform the swap ──
          const subAp = getAvailPos(donorSourceDay, donorSourceShift.id).filter(p => canFillPos(sub, p, donorSourceDay));
          const subPos = subAp.includes(vacatedPosition) ? vacatedPosition : (subAp.includes("Guard") ? "Guard" : subAp[0]);

          // Remove donor from source slot, insert sub
          ns[donorSourceKey] = donorSourceAsgn
            .filter(a => a.employeeId !== donor.id)
            .concat({ employeeId: sub.id, position: subPos });

          // Add donor to gap slot (or replace a Guard-only body if slot is full)
          if (gapAsgn.length < cap) {
            ns[gapKey] = [...gapAsgn, { employeeId: donor.id, position: neededRole }];
          } else {
            // Slot is full — swap out a Guard-only body to make room
            const evictIdx = gapAsgn.findIndex(a => {
              const e = sourceEmps.find(x => x.id === a.employeeId);
              return e && isGuardOnly(e);
            });
            if (evictIdx === -1) {
              // Can't evict anyone — undo source-slot change and move on
              ns[donorSourceKey] = donorSourceAsgn;
              continue;
            }
            const evicted = gapAsgn[evictIdx];
            const evictedEmp = sourceEmps.find(x => x.id === evicted.employeeId);
            ns[gapKey] = [
              ...gapAsgn.slice(0, evictIdx),
              { employeeId: donor.id, position: neededRole },
              ...gapAsgn.slice(evictIdx + 1),
            ];
            // Update hour/shift tracking for evicted employee
            if (evictedEmp) {
              hourTracker[evictedEmp.id]   = Math.max(0, (hourTracker[evictedEmp.id]||0)   - SHIFT_HOURS);
              shiftsWorked[evictedEmp.id]  = Math.max(0, (shiftsWorked[evictedEmp.id]||0)  - 1);
              dayWorked[evictedEmp.id]?.delete(gapDay);
            }
          }

          // Update hour/shift tracking for donor (source → gap, same total hours)
          hourTracker[donor.id]  = (hourTracker[donor.id]||0); // net change = 0
          shiftsWorked[donor.id] = (shiftsWorked[donor.id]||0); // net = 0 (removed from one, added to another)
          dayWorked[donor.id]?.delete(donorSourceDay);
          dayWorked[donor.id]?.add(gapDay);

          // Update hour/shift tracking for sub (new assignment)
          hourTracker[sub.id]   = (hourTracker[sub.id]||0)  + SHIFT_HOURS;
          shiftsWorked[sub.id]  = (shiftsWorked[sub.id]||0) + 1;
          (dayWorked[sub.id] = dayWorked[sub.id] || new Set()).add(donorSourceDay);

          console.log(`[DLS] Swap: ${donor.name} freed from ${donorSourceDay}/${donorSourceShift.id} → fills ${neededRole} on ${gapDay}/${gapShift.id} | Sub: ${sub.name} covers vacated slot`);
          swapDone        = true;
          swappedThisPass = true;
        }
      }
      if (!swappedThisPass) break; // no progress — stop scanning
    }
  }

  // Capture each FT employee's blockStart + shiftId for week-to-week continuity.
  // Only FT employees get rotation-tracked; PT and on-call are fill-as-available.
  const usedPatterns = {};
  Object.keys(plan).forEach(empId => {
    const p    = plan[empId];
    const emp  = sourceEmps.find(e => e.id === empId);
    if (!emp || emp.employmentType !== "full-time") return;
    // Count trailing consecutive days worked at end of this week for next week's cross-boundary check
    let trailingDays = 0;
    for (let i = DAYS.length - 1; i >= 0; i--) {
      const worked = SHIFTS.some(s => (ns[cellKey(DAYS[i], s.id)]||[]).some(a => a.employeeId === empId));
      if (worked) trailingDays++; else break;
    }
    usedPatterns[empId] = { blockStart: p.blockStart ?? 0, shiftId: p.shiftId, trailingDays };
  });
  // ── Step 6: Violation minimizer pass ────────────────────────────────────
  const { fixCount } = violationMinimizerPass(
    ns, sourceEmps, cfg, empTimeOffDays, extShiftsArg, plan, hourTracker, shiftsWorked
  );
  if (fixCount > 0) console.log("[AutoFill] Violation minimizer fixed " + fixCount + " slot(s)");

  return { schedule: ns, hourTracker, shiftsWorked, usedPatterns };
}

// ── Excel Export ──────────────────────────────────────────────────────────────
// ── Excel Export — styled HTML workbook (no external CDN needed) ─────────────
// Excel/LibreOffice opens .xls HTML files and respects inline styles fully.
// ── Excel Preview Modal ───────────────────────────────────────────────────────
// Renders an HTML table that mirrors the Excel layout: same colors, same rows,
// same shift labels. Download button triggers the actual exportToExcel call.
// ── Violation Minimizer (Step 6) ─────────────────────────────────────────────
// After main autofill, sweep for hard violations and attempt targeted swaps.
// Violations by severity: unavailable day (100), time-off day (95),
// blocked shift (90), required-shift mismatch (80), FT shift-lock (70).
// Runs up to 3 sweeps or until no more swappable violations remain.
function violationMinimizerPass(ns, sourceEmps, cfg, empTimeOffDays, extShiftsArg, plan, hourTracker, shiftsWorked) {
  const maxNights = cfg?.maxConsecutiveNights ?? MAX_CONSECUTIVE_NIGHTS;
  const minRest   = cfg?.minRestHours ?? MIN_REST_HOURS;
  const MAX_SWEEPS = 3;
  const isFT  = (e) => e.employmentType === "full-time";
  const isSup = (e) => (e.qualifications||[]).includes("Supervisor");

  // Index: O(1) employee lookup replaces O(N) sourceEmps.find() inside triple loop
  const empMap = new Map(sourceEmps.map(e => [e.id, e]));

  // Index: ext-shift bodies per slot for O(1) conflict check
  const extBodiesBySlot = new Map(); // "day__shiftId" → Set of empIds
  for (const ext of (extShiftsArg || [])) {
    const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
    if (!pair) continue;
    for (const shiftId of pair.covers) {
      const k = ext.day + "__" + shiftId;
      if (!extBodiesBySlot.has(k)) extBodiesBySlot.set(k, new Set());
      if (ext.empAId) extBodiesBySlot.get(k).add(ext.empAId);
      if (ext.empBId) extBodiesBySlot.get(k).add(ext.empBId);
    }
    // Split cross-day: empB also covers next day's first shift
    if (pair.crossDayB && ext.empBId) {
      const nextDay = DAYS[(DAYS.indexOf(ext.day) + 1) % 7];
      const k = nextDay + "__" + pair.crossDayB;
      if (!extBodiesBySlot.has(k)) extBodiesBySlot.set(k, new Set());
      extBodiesBySlot.get(k).add(ext.empBId);
    }
  }

  const isClean = (emp, day, shiftId, sched) => {
    if ((emp.unavailableDays||[]).includes(day)) return false;
    if (empTimeOffDays && empTimeOffDays.has(emp.id + "__" + day)) return false;
    const allowedDOW = emp.availableDaysOfWeek && emp.availableDaysOfWeek.length > 0 ? emp.availableDaysOfWeek : null;
    if (allowedDOW && !allowedDOW.includes(day)) return false;
    if ((emp.blockedShifts||[]).includes(shiftId)) return false;
    if (emp.requiredShift && emp.requiredShift !== shiftId && !emp.crossShiftOT) return false;
    if (isFT(emp) && !isSup(emp)) {
      const p = plan[emp.id];
      if (p && p.shiftId !== shiftId) return false;
    }
    if (isRestViolation(emp, calcRestGap(emp.id, sched, day, shiftId, extShiftsArg), minRest)) return false;
    if (calcConsecutiveHours(emp.id, sched, day, shiftId, extShiftsArg) > empMaxConsec(emp)) return false;
    if (shiftId === "third" && calcConsecutiveNights(emp.id, sched, day, shiftId) >= maxNights) return false;
    return true;
  };

  const severity = (emp, day, shiftId) => {
    if ((emp.unavailableDays||[]).includes(day)) return 100;
    if (empTimeOffDays && empTimeOffDays.has(emp.id + "__" + day)) return 95;
    const allowedDOW2 = emp.availableDaysOfWeek && emp.availableDaysOfWeek.length > 0 ? emp.availableDaysOfWeek : null;
    if (allowedDOW2 && !allowedDOW2.includes(day)) return 93;
    if ((emp.blockedShifts||[]).includes(shiftId)) return 90;
    if (emp.requiredShift && emp.requiredShift !== shiftId && !emp.crossShiftOT) return 80;
    if (isFT(emp) && !isSup(emp)) {
      const p = plan[emp.id];
      if (p && p.shiftId !== shiftId) return 70;
    }
    return 0;
  };

  let fixCount = 0;
  for (let sweep = 0; sweep < MAX_SWEEPS; sweep++) {
    let swapsThisSweep = 0;
    for (const day of DAYS) {
      for (const shift of SHIFTS) {
        const key  = cellKey(day, shift.id);
        const asgn = ns[key] || [];
        for (let ai = 0; ai < asgn.length; ai++) {
          const a   = asgn[ai];
          const emp = empMap.get(a.employeeId);
          if (!emp || severity(emp, day, shift.id) === 0) continue;
          // Test snapshot with this employee removed from the slot
          const testSched = { ...ns, [key]: ns[key].filter(x => x.employeeId !== emp.id) };
          const asgnSet = new Set(asgn.map(x => x.employeeId));
          const candidates = sourceEmps.filter(cand => {
            if (cand.id === emp.id) return false;
            if (!canFillPos(cand, a.position, day)) return false;
            if (asgnSet.has(cand.id)) return false;
            if ((extBodiesBySlot.get(key) || new Set()).has(cand.id)) return false;
            if (!isClean(cand, day, shift.id, testSched)) return false;
            if (isFT(cand) && (hourTracker[cand.id]||0) >= OT_RELIEF_THRESHOLD) return false;
            if (cand.employmentType === "on-call") return false; // never swap IN on-call during violation fix
            return true;
          });
          if (!candidates.length) continue;
          candidates.sort((ca, cb) => {
            const ha = hourTracker[ca.id]||0, hb = hourTracker[cb.id]||0;
            const au = isFT(ca) && ha < FT_MIN_HOURS, bu = isFT(cb) && hb < FT_MIN_HOURS;
            if (au && !bu) return -1; if (!au && bu) return 1;
            return ha - hb;
          });
          const winner = candidates[0];
          ns[key] = [...asgn.slice(0,ai), { employeeId: winner.id, position: a.position }, ...asgn.slice(ai+1)];
          hourTracker[emp.id]     = Math.max(0, (hourTracker[emp.id]||0) - SHIFT_HOURS);
          hourTracker[winner.id]  = (hourTracker[winner.id]||0) + SHIFT_HOURS;
          shiftsWorked[winner.id] = (shiftsWorked[winner.id]||0) + 1;
          swapsThisSweep++; fixCount++;
          break; // re-scan cell after swap
        }
      }
    }
    if (swapsThisSweep === 0) break;
  }
  return { ns, fixCount };
}

</script>

<script type="text/babel">
function ExcelPreviewModal({ onDownload, onClose }) {
  const { employees } = useRoster();
  const { schedule, extShifts, trainingBlocks, weekStart } = useSchedule();
  const { timeOffReqs } = useTimeOff();
  const t = useTheme();

  const CLR = {
    headerBg:"#4F6228", dayBg:"#76923C", rowBlue:"#B8CCE4", rowGray:"#C0C0C0",
    rowWhite:"#FFFFFF", shift1:"#DAEEF3", shift2:"#E4DFEC", shift3:"#D9D9D9",
    ptoGreen:"#92D050", splitYellow:"#FFFF00", splitOrange:"#FFC000",
    multiYellow:"#FFF2CC", separator:"#F2F2F2", footerYellow:"#FFFF00",
    white:"#FFFFFF", black:"#000000", darkGreen:"#375623",
    red:"#CC0000", orange:"#CC6600", lightText:"#E8F0D0",
  };

  // Returns the approved time-off request (non-partial) for an employee on a given day name
  const approvedTimeOffPrev = (empId, day) =>
    (timeOffReqs||[]).find(r =>
      r.status === "approved" && r.empId === empId && r.type !== "partial" &&
      timeOffCoversSlot(r, day, "first", weekStart)
    ) || null;

  const getShiftLabel = (emp, day) => {
    // Approved vacation or day-off requests always override schedule display
    const req = approvedTimeOffPrev(emp.id, day);
    if (req) {
      const trnDay = (trainingBlocks||[]).filter(t => t.empId === emp.id && t.day === day);
      const trnSuffix = trnDay.length > 0
        ? " +" + trnDay.map(t => { const fh=h=>`${h%12||12}${h<12?"A":"P"}`; return `TRN ${fh(t.startHour)}-${fh((t.startHour+t.durationHours)%24)}`; }).join(",")
        : "";
      return req.type === "vacation"
        ? { text:"Vac"+trnSuffix, kind:"pto" }
        : { text:"Off"+trnSuffix, kind:"pto" };
    }
    const result = [];
    for (const shift of SHIFTS) {
      const asgn = (schedule[cellKey(day, shift.id)] || []).find(a => a.employeeId === emp.id);
      if (asgn) result.push({ sid: shift.id, pos: asgn.position });
    }
    const extDay = (extShifts || []).filter(e => e.day === day);
    if (extDay.some(e => e.empAId === emp.id)) return { text:"6A-6P",  kind:"splitDay"   };
    if (extDay.some(e => e.empBId === emp.id)) return { text:"6P-6A",  kind:"splitNight" };
    const trnDay = (trainingBlocks||[]).filter(t => t.empId === emp.id && t.day === day);
    const trnSuffix = trnDay.length > 0
      ? " +" + trnDay.map(t => { const fh=h=>`${h%12||12}${h<12?"A":"P"}`; return `TRN ${fh(t.startHour)}-${fh((t.startHour+t.durationHours)%24)}`; }).join(",")
      : "";
    if (!result.length) {
      if (trnSuffix) return { text: trnSuffix.trim().replace(/^\+/,""), kind:"training" };
      return { text:"X", kind:"absent" };
    }
    if (result.length === 1 && result[0].pos === "PTO") return { text:"Vac"+trnSuffix, kind:"pto" };
    if (result.length === 1 && result[0].pos === "Off") return { text:"Off"+trnSuffix, kind:"pto" };
    if (result.length === 2) {
      const nums = result.map(r=>({first:"1",second:"2",third:"3"}[r.sid])).join("+");
      return { text:nums+trnSuffix, kind:"multi" };
    }
    const { sid, pos } = result[0];
    const num = {first:"1",second:"2",third:"3"}[sid];
    const shiftAsgn = schedule[cellKey(day, sid)] || [];
    const scaleOnShift = shiftAsgn.filter(a => {
      const e = employees.find(x => x.id === a.employeeId);
      return a.position === "Scale" || (e && (e.qualifications||[]).includes("Scale"));
    }).length;
    // Supervisor counts as Medical-qualified for the purposes of the "-Med" annotation only
    const medOnShift = shiftAsgn.filter(a => {
      const e = employees.find(x => x.id === a.employeeId);
      return a.position === "Medical" || a.position === "Supervisor"
        || (e && ((e.qualifications||[]).includes("Medical") || (e.qualifications||[]).includes("Supervisor")));
    }).length;
    const suffix = pos==="Scale" && scaleOnShift > 1 ? "-Scale"
                 : pos==="Medical" && medOnShift > 1 ? "-Med" : "";
    return { text:num+suffix+trnSuffix, kind:sid };
  };

  const primaryShift = (emp) => {
    if (emp.requiredShift) return emp.requiredShift;
    if ((emp.preferredShifts||[]).length === 1) return emp.preferredShifts[0];
    const counts = {first:0,second:0,third:0};
    DAYS.forEach(day => SHIFTS.forEach(s => {
      if ((schedule[cellKey(day,s.id)]||[]).some(a=>a.employeeId===emp.id)) counts[s.id]++;
    }));
    return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]?.[0] || "first";
  };

  const rowBgFor = (emp) => {
    if (primaryShift(emp)==="first") return CLR.rowBlue;
    if (primaryShift(emp) === "third") return CLR.rowGray;
    return CLR.rowWhite;
  };

  const kindStyle = (kind, rowBg) => {
    const bg = {first:CLR.shift1,second:CLR.shift2,third:CLR.shift3,
      splitDay:CLR.splitYellow,splitNight:CLR.splitOrange,
      multi:CLR.multiYellow,pto:CLR.ptoGreen,training:"#FFF0D0",
      absent:rowBg,off:rowBg,empty:rowBg}[kind]||rowBg;
    const color = {splitDay:CLR.red,splitNight:CLR.red,pto:CLR.darkGreen,training:"#B45309",absent:"#999999"}[kind]||CLR.black;
    const fontWeight = ["splitDay","splitNight","multi","training"].includes(kind) ? "bold" : "normal";
    return { background:bg, color, fontWeight };
  };

  const shiftRank = {first:0,second:1,third:2};
  const isSupervisor = (e) => (e.qualifications||[]).includes("Supervisor");
  const sortedEmps = [...employees].sort((a,b) => {
    // Supervisor on 1st shift always sorts to top row
    const aRank = isSupervisor(a) && primaryShift(a) === "first" ? -1 : shiftRank[primaryShift(a)]||0;
    const bRank = isSupervisor(b) && primaryShift(b) === "first" ? -1 : shiftRank[primaryShift(b)]||0;
    return aRank - bRank;
  });

  const [wy,wm,wd] = (weekStart||"2024-01-07").split("-").map(Number);
  const sun = new Date(wy,wm-1,wd,12);
  const dayDates = DAYS.map((_,i)=>{ const d=new Date(sun); d.setDate(sun.getDate()+i); return d; });
  const fmtDate = (d) => `${d.getMonth()+1}/${String(d.getDate()).padStart(2,"0")}`;
  const weekLabel = `${fmtDate(dayDates[0])} \u2013 ${fmtDate(dayDates[6])}`;
  const today = new Date();

  const thStyle = (extra={}) => ({
    background:CLR.headerBg, color:CLR.white, fontWeight:"bold",
    padding:"5px 8px", fontSize:11, border:"1px solid #BFBFBF",
    textAlign:"center", whiteSpace:"nowrap", ...extra,
  });
  const dayThStyle = { background:CLR.dayBg, color:CLR.white, fontWeight:"bold",
    padding:"5px 8px", fontSize:11, border:"1px solid #BFBFBF", textAlign:"center" };
  const tdStyle = (extra={}) => ({
    padding:"4px 6px", fontSize:11, border:"1px solid #BFBFBF",
    textAlign:"center", whiteSpace:"nowrap", ...extra,
  });

  let prevGroup = null;
  const rows = [];
  for (const emp of sortedEmps) {
    const curGroup = primaryShift(emp);
    if (prevGroup !== null && curGroup !== prevGroup) {
      rows.push(
        <tr key={"sep-"+emp.id}>
          {Array(9).fill(0).map((_,i)=>(
            <td key={i} style={{background:CLR.separator,padding:2,border:"1px solid #BFBFBF",height:4}}/>
          ))}
        </tr>
      );
    }
    prevGroup = curGroup;
    const hrs = calcHours(emp.id, schedule, extShifts);
    const isFT = emp.employmentType === "full-time";
    const rowBg = rowBgFor(emp);
    const hrsColor = isFT && hrs < 40 ? CLR.red : hrs > 40 ? CLR.orange : CLR.black;
    const hrsBold = (isFT && hrs < 40) || hrs > 40;
    rows.push(
      <tr key={emp.id}>
        <td style={tdStyle({background:rowBg,fontWeight:"bold",textAlign:"left",minWidth:110,color:"#000000"})}>{emp.name}</td>
        <td style={tdStyle({background:rowBg,color:hrsColor,fontWeight:hrsBold?"bold":"normal",minWidth:36})}>{hrs}</td>
        {DAYS.map(day => {
          const { text, kind } = getShiftLabel(emp, day);
          const cs = kindStyle(kind, rowBg);
          return <td key={day} style={tdStyle({...cs,minWidth:58})}>{text || "\u00a0"}</td>;
        })}
      </tr>
    );
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",zIndex:9999,
      display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"var(--ss-bg)",border:"1px solid var(--ss-border)",borderRadius:10,
        display:"flex",flexDirection:"column",maxWidth:"96vw",maxHeight:"92vh",
        boxShadow:"0 8px 40px rgba(0,0,0,.5)",overflow:"hidden"}}>

        {}
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 20px",
          background:"var(--ss-surface)",borderBottom:"1px solid var(--ss-border)",flexShrink:0}}>
          <span style={{fontSize:13,fontWeight:700,color:"var(--ss-text)",flex:1}}>
            📊 Excel Preview &nbsp;
            <span style={{fontWeight:400,color:"var(--ss-text-dim)",fontSize:11}}>Week of {weekLabel}</span>
          </span>
          <button onClick={onDownload}
            style={{background:"var(--ss-scale)",color:"#fff",border:"none",padding:"8px 18px",
              borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit",
              display:"flex",alignItems:"center",gap:6}}>
            ↓ Download Excel
          </button>
          <button onClick={onClose}
            style={{background:"transparent",border:"1px solid var(--ss-border)",color:"var(--ss-text-dim)",
              padding:"8px 14px",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>
            Close
          </button>
        </div>

        {}
        <div style={{overflowX:"auto",overflowY:"auto",padding:"16px 20px",flex:1}}>
          <table style={{borderCollapse:"collapse",fontFamily:"Arial,sans-serif",fontSize:11,minWidth:700}}>
            <thead>
              {}
              <tr>
                <td colSpan={9} style={{background:CLR.headerBg,color:CLR.white,fontWeight:"bold",
                  fontSize:13,padding:"7px 10px",border:"1px solid #BFBFBF",textAlign:"center"}}>
                  Shift Schedule — Week of {weekLabel}
                </td>
              </tr>
              {}
              <tr>
                <th style={thStyle({textAlign:"left"})}>Employee</th>
                <th style={thStyle()}>Hrs</th>
                {DAYS.map((d,i)=>(
                  <th key={d} style={dayThStyle}>
                    <div style={{fontWeight:"bold"}}>{d.substring(0,3).toUpperCase()}</div>
                    <div style={{fontSize:9,fontWeight:"normal",color:CLR.lightText}}>{fmtDate(dayDates[i])}</div>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows}
              {}
              <tr>
                <td colSpan={9} style={{background:CLR.footerYellow,color:CLR.darkGreen,
                  fontWeight:"bold",padding:"6px 10px",fontSize:11,border:"1px solid #BFBFBF",
                  textAlign:"center"}}>
                  Any changes to this schedule must be approved by the Supervisor in advance*
                </td>
              </tr>
              <tr>
                <td colSpan={6} style={{background:"#fff",border:"1px solid #BFBFBF",padding:4}}/>
                <td colSpan={3} style={{background:CLR.splitYellow,border:"1px solid #BFBFBF",
                  padding:"4px 8px",fontSize:10,textAlign:"right",color:CLR.black}}>
                  {today.toLocaleDateString()}
                </td>
              </tr>
            </tbody>
          </table>

          {}
          <div style={{marginTop:24,fontSize:11,fontWeight:700,color:"var(--ss-text-dim)",
            letterSpacing:".06em",marginBottom:8}}>EMPLOYEE HOURS SHEET</div>
          <table style={{borderCollapse:"collapse",fontFamily:"Arial,sans-serif",fontSize:11,minWidth:500}}>
            <thead>
              <tr>
                {["Employee","Type","Qualifications","Shifts","Hours","Status","Days Off"].map((h,i)=>(
                  <th key={h} style={thStyle({textAlign:i===0?"left":"center",
                    minWidth:i===0?120:i===2?140:i===6?120:60})}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {sortedEmps.map((emp,ri)=>{
                const hrs = calcHours(emp.id, schedule, extShifts);
                const isFT = emp.employmentType==="full-time";
                const bg = ri%2===0?"#FFFFFF":"#DCE6F1";
                const status = hrs>40?`OT +${hrs-40}h`:(isFT&&hrs<40)?`! ${hrs}/40h`:`${hrs}h`;
                const hFg = isFT&&hrs<40?CLR.red:hrs>40?CLR.orange:"#1A1A1A";
                const statusBold = hrs>40||(isFT&&hrs<40);
                return (
                  <tr key={emp.id}>
                    <td style={tdStyle({background:bg,textAlign:"left",fontWeight:"bold",color:"#1A1A1A"})}>{emp.name}</td>
                    <td style={tdStyle({background:bg,color:"#1A1A1A"})}>{isFT?"Full-Time":"Part-Time"}</td>
                    <td style={tdStyle({background:bg,textAlign:"left",color:"#1A1A1A"})}>{emp.qualifications.join(", ")}</td>
                    <td style={tdStyle({background:bg,color:"#1A1A1A"})}>{hrs/SHIFT_HOURS}</td>
                    <td style={tdStyle({background:bg,color:hFg,fontWeight:"bold"})}>{hrs}</td>
                    <td style={tdStyle({background:bg,color:hFg,fontWeight:statusBold?"bold":"normal"})}>{status}</td>
                    <td style={tdStyle({background:bg,textAlign:"left",color:"#1A1A1A"})}>{(emp.unavailableDays||[]).join(", ")||"\u2014"}</td>
                  </tr>
                );
              })}
              <tr>
                {["TOTAL","","",
                  sortedEmps.reduce((s,e)=>s+calcHours(e.id,schedule,extShifts),0)/SHIFT_HOURS,
                  sortedEmps.reduce((s,e)=>s+calcHours(e.id,schedule,extShifts),0),
                  "",""].map((v,i)=>(
                  <td key={i} style={tdStyle({background:CLR.headerBg,color:CLR.white,fontWeight:"bold"})}>{v}</td>
                ))}
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

async function exportToExcel(employees, schedule, extShifts, weekStart, trainingBlocks, timeOffReqs) {
  const getName = (id) => employees.find(e => e.id === id)?.name || "?";

  const CLR = {
    headerBg:    "4F6228",
    dayBg:       "76923C",
    rowBlue:     "B8CCE4",
    rowGray:     "C0C0C0",
    rowWhite:    "FFFFFF",
    shift1:      "DAEEF3",
    shift2:      "E4DFEC",
    shift3:      "D9D9D9",
    ptoGreen:    "92D050",
    splitYellow: "FFFF00",
    splitOrange: "FFC000",
    multiYellow: "FFF2CC",
    separator:   "F2F2F2",
    footerYellow:"FFFF00",
    border:      "BFBFBF",
    white:       "FFFFFF",
    black:       "000000",
    darkGreen:   "375623",
    red:         "CC0000",
    orange:      "CC6600",
    lightText:   "E8F0D0",
    subText:     "4F4F4F",
  };

  // Returns the approved time-off request (non-partial) for an employee on a given day name
  const approvedTimeOff = (empId, day) =>
    (timeOffReqs||[]).find(r =>
      r.status === "approved" && r.empId === empId && r.type !== "partial" &&
      timeOffCoversSlot(r, day, "first", weekStart)
    ) || null;

  const getShiftLabel = (emp, day) => {
    // Approved vacation or day-off requests always override schedule display
    const req = approvedTimeOff(emp.id, day);
    if (req) {
      const trnDay = (trainingBlocks||[]).filter(t => t.empId === emp.id && t.day === day);
      const trnSuffix = trnDay.length > 0
        ? " +" + trnDay.map(t => { const fh=h=>`${h%12||12}${h<12?"A":"P"}`; return `TRN ${fh(t.startHour)}-${fh((t.startHour+t.durationHours)%24)}`; }).join(",")
        : "";
      return req.type === "vacation"
        ? { text:"Vac"+trnSuffix, kind:"pto" }
        : { text:"Off"+trnSuffix, kind:"pto" };
    }
    const result = [];
    for (const shift of SHIFTS) {
      const asgn = (schedule[cellKey(day, shift.id)] || []).find(a => a.employeeId === emp.id);
      if (asgn) result.push({ sid: shift.id, pos: asgn.position });
    }
    const extDay = (extShifts || []).filter(e => e.day === day);
    if (extDay.some(e => e.empAId === emp.id)) return { text:"6A-6P",  kind:"splitDay"   };
    if (extDay.some(e => e.empBId === emp.id)) return { text:"6P-6A",  kind:"splitNight" };
    // Training block annotation: append TRN label to existing shift text
    const trnDay = (trainingBlocks||[]).filter(t => t.empId === emp.id && t.day === day);
    const trnSuffix = trnDay.length > 0
      ? " +" + trnDay.map(t => { const fh=h=>`${h%12||12}${h<12?"A":"P"}`; return `TRN ${fh(t.startHour)}-${fh((t.startHour+t.durationHours)%24)}`; }).join(",")
      : "";
    if (!result.length) {
      if (trnSuffix) return { text: trnSuffix.trim().replace(/^\+/,""), kind:"training" };
      // Not scheduled (including hard unavailableDays blocks) → X
      return { text:"X", kind:"absent" };
    }
    if (result.length === 1 && result[0].pos === "PTO") return { text:"Vac"+trnSuffix, kind:"pto" };
    if (result.length === 1 && result[0].pos === "Off") return { text:"Off"+trnSuffix, kind:"pto" };
    if (result.length === 2) {
      const nums = result.map(r => ({ first:"1",second:"2",third:"3" }[r.sid])).join("+");
      return { text:nums+trnSuffix, kind:"multi" };
    }
    const { sid, pos } = result[0];
    const num = { first:"1", second:"2", third:"3" }[sid];
    const shiftAsgn = schedule[cellKey(day, sid)] || [];
    const scaleOnShift = shiftAsgn.filter(a => {
      const e = employees.find(x => x.id === a.employeeId);
      return a.position === "Scale" || (e && (e.qualifications||[]).includes("Scale"));
    }).length;
    // Supervisor counts as Medical-qualified for the purposes of the "-Med" annotation only
    const medOnShift = shiftAsgn.filter(a => {
      const e = employees.find(x => x.id === a.employeeId);
      return a.position === "Medical" || a.position === "Supervisor"
        || (e && ((e.qualifications||[]).includes("Medical") || (e.qualifications||[]).includes("Supervisor")));
    }).length;
    const suffix = pos==="Scale" && scaleOnShift > 1 ? "-Scale"
                 : pos==="Medical" && medOnShift > 1 ? "-Med" : "";
    return { text: num+suffix+trnSuffix, kind: sid };
  };

  const kindBg   = (kind, rowBg) => ({ first:CLR.shift1, second:CLR.shift2, third:CLR.shift3,
    splitDay:CLR.splitYellow, splitNight:CLR.splitOrange, multi:CLR.multiYellow,
    pto:CLR.ptoGreen, training:"FFF0D0", absent:rowBg, off:rowBg, empty:rowBg }[kind] || rowBg);
  const kindFg   = (kind) => ({ splitDay:CLR.red, splitNight:CLR.red, pto:CLR.darkGreen, training:"B45309", absent:"999999" }[kind] || CLR.black);
  const kindBold = (kind) => ["splitDay","splitNight","multi","training"].includes(kind);

  const primaryShift = (emp) => {
    if (emp.requiredShift) return emp.requiredShift;
    if ((emp.preferredShifts||[]).length === 1) return emp.preferredShifts[0];
    const counts = { first:0, second:0, third:0 };
    DAYS.forEach(day => SHIFTS.forEach(s => {
      if ((schedule[cellKey(day,s.id)]||[]).some(a=>a.employeeId===emp.id)) counts[s.id]++;
    }));
    return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]?.[0] || "first";
  };
  const shiftRank = { first:0, second:1, third:2 };
  const isSupervisor = (e) => (e.qualifications||[]).includes("Supervisor");
  const sortedEmps = [...employees].sort((a,b) => {
    // Supervisor on 1st shift always sorts to top row
    const aRank = isSupervisor(a) && primaryShift(a) === "first" ? -1 : shiftRank[primaryShift(a)] || 0;
    const bRank = isSupervisor(b) && primaryShift(b) === "first" ? -1 : shiftRank[primaryShift(b)] || 0;
    return aRank - bRank;
  });
  const rowBgFor = (emp) => {
    if (primaryShift(emp)==="first") return CLR.rowBlue;
    if (primaryShift(emp) === "third") return CLR.rowGray;
    return CLR.rowWhite;
  };

  const weekStartDate = weekStart ? new Date(weekStart + "T12:00:00") : (() => {
    const d = new Date(); d.setDate(d.getDate() - d.getDay()); return d;
  })();
  const dayDates = DAYS.map((_, i) => {
    const d = new Date(weekStartDate); d.setDate(weekStartDate.getDate() + i); return d;
  });
  const fmtDate = (d) => `${d.getMonth()+1}/${String(d.getDate()).padStart(2,"0")}`;
  const weekLabel = `${fmtDate(dayDates[0])} – ${fmtDate(dayDates[6])}`;
  const today = new Date();

  const styles = {};
  let styleIdSeq = 0;
  const getStyleId = (bg, fg="000000", bold=false, align="Center", vAlign="Center", wrapText=false, fontSize=10, italic=false) => {
    const key = `${bg}|${fg}|${bold}|${align}|${vAlign}|${wrapText}|${fontSize}|${italic}`;
    if (!styles[key]) {
      styles[key] = { id: ++styleIdSeq, bg, fg, bold, align, vAlign, wrapText, fontSize, italic };
    }
    return styles[key].id;
  };

  const cell = (val, styleId, opts={}) => {
    const type = opts.type || "String";
    const merge = opts.merge ? ` ss:MergeAcross="${opts.merge}"` : "";
    const height = opts.height ? ` ss:Height="${opts.height}"` : "";
    const safeVal = String(val ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    return `<Cell ss:StyleID="s${styleId}"${merge}><Data ss:Type="${type}">${safeVal}</Data></Cell>`;
  };

  const emptyCell = (styleId, count=1) =>
    Array(count).fill(`<Cell ss:StyleID="s${styleId}"><Data ss:Type="String"></Data></Cell>`).join("");

  const S = {
    title:     () => getStyleId(CLR.headerBg, CLR.white, true,  "Center", "Center", false, 13),
    dayHdr:    () => getStyleId(CLR.dayBg,    CLR.white, true,  "Center", "Center", true,  10),
    dayHdrSub: () => getStyleId(CLR.dayBg,    CLR.lightText, false, "Center", "Center", false, 8),
    colHdr:    () => getStyleId(CLR.headerBg, CLR.white, true,  "Left",   "Center", false, 10),
    colHdrC:   () => getStyleId(CLR.headerBg, CLR.white, true,  "Center", "Center", false, 10),
    empName:   (bg) => getStyleId(bg, CLR.black, true,  "Left",   "Center", false, 10),
    empHrs:    (bg, fg) => getStyleId(bg, fg,       true,  "Center", "Center", false, 10),
    empHrsOk:  (bg) => getStyleId(bg, CLR.black,    false, "Center", "Center", false, 10),
    shiftCell: (bg, fg, bold) => getStyleId(bg, fg, bold, "Center", "Center", false, 10),
    sep:       () => getStyleId(CLR.separator, CLR.separator, false, "Center", "Center", false, 6),
    footer:    () => getStyleId(CLR.footerYellow, CLR.darkGreen, true, "Center", "Center", true, 10),
    footerDate:() => getStyleId(CLR.splitYellow,  CLR.black,     false,"Right",  "Center", false, 9),
    footerBlank:()=> getStyleId(CLR.white, CLR.white, false, "Center","Center", false, 10),
    s2Hdr:     () => getStyleId(CLR.headerBg, CLR.white, true,  "Center", "Center", false, 10),
    s2HdrL:    () => getStyleId(CLR.headerBg, CLR.white, true,  "Left",   "Center", false, 10),
    s2Name:    (bg) => getStyleId(bg, CLR.black, true,  "Left",   "Center", false, 10),
    s2Cell:    (bg, fg="000000", bold=false) => getStyleId(bg, fg, bold, "Left", "Center", false, 10),
    s2CellC:   (bg, fg="000000", bold=false) => getStyleId(bg, fg, bold, "Center", "Center", false, 10),
    s2Total:   () => getStyleId(CLR.headerBg, CLR.white, true, "Center", "Center", false, 10),
  };

  const COLS = 9;
  let r1 = "";

  r1 += `<Row ss:Height="22">`;
  r1 += cell(`Shift Schedule — Week of ${weekLabel}`, S.title(), { merge: COLS-1 });
  r1 += `</Row>`;

  r1 += `<Row ss:Height="30">`;
  r1 += cell("Employee", S.colHdr(),  { });
  r1 += cell("Hrs",      S.colHdrC(), { });
  DAYS.forEach((day, i) => {
    const dd = fmtDate(dayDates[i]);
    const hdrStyleId = getStyleId(CLR.dayBg, CLR.white, true, "Center", "Center", true, 10);
    r1 += cell(`${day.substring(0,3).toUpperCase()}\n${dd}`, hdrStyleId);
  });
  r1 += `</Row>`;

  let prevGroup = null;
  for (const emp of sortedEmps) {
    const hours   = calcHours(emp.id, schedule, extShifts);
    const isFT    = emp.employmentType === "full-time";
    const rowBg   = rowBgFor(emp);
    const curGroup = primaryShift(emp);

    if (prevGroup !== null && curGroup !== prevGroup) {
      r1 += `<Row ss:Height="4">`;
      r1 += Array(COLS).fill(`<Cell ss:StyleID="s${S.sep()}"><Data ss:Type="String"></Data></Cell>`).join("");
      r1 += `</Row>`;
    }
    prevGroup = curGroup;

    const hrsColor = isFT && hours < 40 ? CLR.red : hours > 40 ? CLR.orange : CLR.black;
    const hrsBold  = (isFT && hours < 40) || hours > 40;

    r1 += `<Row ss:Height="16">`;
    r1 += cell(emp.name, S.empName(rowBg));
    r1 += cell(hours,    getStyleId(rowBg, hrsColor, hrsBold, "Center", "Center", false, 10), { type:"Number" });
    DAYS.forEach(day => {
      const { text, kind } = getShiftLabel(emp, day);
      const bg   = kindBg(kind, rowBg);
      const fg   = kindFg(kind);
      const bold = kindBold(kind);
      r1 += cell(text, S.shiftCell(bg, fg, bold));
    });
    r1 += `</Row>`;
  }

  r1 += `<Row ss:Height="18">`;
  r1 += cell("Any changes to this schedule must be approved by the Supervisor in advance*",
             S.footer(), { merge: COLS-1 });
  r1 += `</Row>`;
  r1 += `<Row ss:Height="14">`;
  r1 += emptyCell(S.footerBlank(), 6);
  r1 += cell(today.toLocaleDateString(), S.footerDate(), { merge: 2 });
  r1 += `</Row>`;

  let r2 = "";
  const hdrCols2 = ["Employee","Type","Qualifications","Shifts","Hours","Status","Days Off"];

  r2 += `<Row ss:Height="20">`;
  r2 += cell(hdrCols2[0], S.s2HdrL());
  hdrCols2.slice(1).forEach(h => { r2 += cell(h, S.s2Hdr()); });
  r2 += `</Row>`;

  sortedEmps.forEach((emp, ri) => {
    const hrs   = calcHours(emp.id, schedule, extShifts);
    const isFT  = emp.employmentType === "full-time";
    const bg    = ri % 2 === 0 ? "FFFFFF" : "DCE6F1";
    const status = hrs > 40 ? `OT +${hrs-40}h` : (isFT && hrs < 40) ? `! ${hrs}/40h` : `${hrs}h`;
    const hFg   = isFT && hrs < 40 ? CLR.red : hrs > 40 ? CLR.orange : "1F1F1F";
    const statusFg = hFg;
    const statusBold = hrs > 40 || (isFT && hrs < 40);
    r2 += `<Row ss:Height="18">`;
    r2 += cell(emp.name,                             getStyleId(bg, "1A1A1A", true,  "Left",   "Center", false, 10));
    r2 += cell(isFT ? "Full-Time" : "Part-Time",     getStyleId(bg, "1A1A1A", false, "Left",   "Center", false, 10));
    r2 += cell(emp.qualifications.join(", "),         getStyleId(bg, "1A1A1A", false, "Left",   "Center", false, 10));
    r2 += cell(hrs / SHIFT_HOURS,                    getStyleId(bg, "1A1A1A", false, "Center", "Center", false, 10), { type:"Number" });
    r2 += cell(hrs,                                  getStyleId(bg, hFg,      true,  "Center", "Center", false, 10), { type:"Number" });
    r2 += cell(status,                               getStyleId(bg, statusFg, statusBold, "Center", "Center", false, 10));
    r2 += cell((emp.unavailableDays||[]).join(", ")||"—", getStyleId(bg, "1A1A1A", false, "Left", "Center", false, 10));
    r2 += `</Row>`;
  });

  const totalHrs = sortedEmps.reduce((s,e) => s + calcHours(e.id, schedule, extShifts), 0);
  r2 += `<Row ss:Height="18">`;
  ["TOTAL","","",totalHrs/SHIFT_HOURS,totalHrs,"",""].forEach((v,i) => {
    r2 += cell(v, S.s2Total(), i===3||i===4 ? { type:"Number" } : {});
  });
  r2 += `</Row>`;

  const stylesXml = Object.values(styles).map(st => `
  <Style ss:ID="s${st.id}">
    <Alignment ss:Horizontal="${st.align}" ss:Vertical="${st.vAlign}"${st.wrapText?' ss:WrapText="1"':''} />
    <Borders>
      <Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#BFBFBF"/>
      <Border ss:Position="Left"   ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#BFBFBF"/>
      <Border ss:Position="Right"  ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#BFBFBF"/>
      <Border ss:Position="Top"    ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#BFBFBF"/>
    </Borders>
    <Font ss:FontName="Arial" ss:Size="${st.fontSize}" ss:Color="#${st.fg}"${st.bold?' ss:Bold="1"':''}${st.italic?' ss:Italic="1"':''} />
    <Interior ss:Color="#${st.bg}" ss:Pattern="Solid"/>
  </Style>`).join("");

  const cols1 = `
  <Column ss:Width="110"/>
  <Column ss:Width="40"/>
  <Column ss:Width="62"/>
  <Column ss:Width="62"/>
  <Column ss:Width="62"/>
  <Column ss:Width="62"/>
  <Column ss:Width="62"/>
  <Column ss:Width="62"/>
  <Column ss:Width="62"/>`;

  const cols2 = `
  <Column ss:Width="130"/>
  <Column ss:Width="80"/>
  <Column ss:Width="170"/>
  <Column ss:Width="55"/>
  <Column ss:Width="55"/>
  <Column ss:Width="85"/>
  <Column ss:Width="145"/>`;

  const xml = `<?xml version="1.0" encoding="UTF-8"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
  xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"
  xmlns:x="urn:schemas-microsoft-com:office:excel">
  <Styles>${stylesXml}
  </Styles>
  <Worksheet ss:Name="Weekly Schedule">
    <Table>${cols1}
      ${r1}
    </Table>
    <WorksheetOptions xmlns="urn:schemas-microsoft-com:office:excel">
      <FreezePanes/>
      <SplitHorizontal>2</SplitHorizontal>
      <TopRowBottomPane>2</TopRowBottomPane>
      <SplitVertical>1</SplitVertical>
      <LeftColumnRightPane>1</LeftColumnRightPane>
      <ActivePane>2</ActivePane>
    </WorksheetOptions>
  </Worksheet>
  <Worksheet ss:Name="Employee Hours">
    <Table>${cols2}
      ${r2}
    </Table>
  </Worksheet>
</Workbook>`;

  const blob     = new Blob([xml], { type: "application/vnd.ms-excel;charset=utf-8" });
  const fileName = `ShiftSchedule_${today.toISOString().slice(0,10)}.xls`;

  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: fileName,
        types: [{ description: "Excel Spreadsheet", accept: { "application/vnd.ms-excel": [".xls"] } }],
      });
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      return;
    } catch (err) {
      if (err.name === "AbortError") return;
    }
  }

  const url = URL.createObjectURL(blob);
  const a   = document.createElement("a");
  a.href    = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function TestPopulationModal({ onGenerate, onCancel }) {
  const t = useTheme();
  const [counts, setCounts] = useState({
    ft_supervisor:1, ft_guard:4, ft_medic:2, ft_scale:2, ft_dual_sm:1,
    ft_sup_scale:0, ft_sup_medic:0, ft_sup_dual:0, ft_all:0,
    pt_guard:2, pt_supervisor:0, pt_medic:0, pt_scale:0, pt_dual_sm:0,
    pt_sup_scale:0, pt_sup_medic:0, pt_sup_dual:0, pt_all:0,
  });
  const set = (key) => (updater) =>
    setCounts(prev => ({ ...prev, [key]: Math.max(0, typeof updater==="function"?updater(prev[key]):updater) }));

  const ROSTER_DEFS = [
    { section:"FULL-TIME EMPLOYEES", type:"full-time", entries:[
      { key:"ft_supervisor", label:"Supervisors",            sub:"Guard (Supervisor role)",               quals:["Supervisor","Guard"] },
      { key:"ft_guard",      label:"Guards",                 sub:"Guard only",                           quals:["Guard"] },
      { key:"ft_medic",      label:"Medics",                 sub:"Medical + Guard",                      quals:["Medical","Guard"] },
      { key:"ft_scale",      label:"Scale Operators",        sub:"Scale + Guard",                        quals:["Scale","Guard"] },
      { key:"ft_dual_sm",    label:"Dual Scale / Medic",     sub:"Scale + Medical + Guard",              quals:["Scale","Medical","Guard"] },
      { key:"ft_sup_scale",  label:"Supervisor + Scale",     sub:"Scale + Guard (Supervisor role)",       quals:["Supervisor","Scale","Guard"] },
      { key:"ft_sup_medic",  label:"Supervisor + Medic",     sub:"Medical + Guard (Supervisor role)",     quals:["Supervisor","Medical","Guard"] },
      { key:"ft_sup_dual",   label:"Supervisor + Scale/Med", sub:"Scale + Medical + Guard (Supervisor)", quals:["Supervisor","Scale","Medical","Guard"] },
      { key:"ft_all",        label:"All Positions",          sub:"Scale + Medical + Guard (Supervisor)", quals:["Supervisor","Scale","Medical","Guard"] },
    ]},
    { section:"PART-TIME EMPLOYEES", type:"part-time", entries:[
      { key:"pt_guard",      label:"Guards",                 sub:"Guard only",                           quals:["Guard"] },
      { key:"pt_supervisor", label:"Supervisors",            sub:"Guard (Supervisor role)",               quals:["Supervisor","Guard"] },
      { key:"pt_medic",      label:"Medics",                 sub:"Medical + Guard",                      quals:["Medical","Guard"] },
      { key:"pt_scale",      label:"Scale Operators",        sub:"Scale + Guard",                        quals:["Scale","Guard"] },
      { key:"pt_dual_sm",    label:"Dual Scale / Medic",     sub:"Scale + Medical + Guard",              quals:["Scale","Medical","Guard"] },
      { key:"pt_sup_scale",  label:"Supervisor + Scale",     sub:"Scale + Guard (Supervisor)",            quals:["Supervisor","Scale","Guard"] },
      { key:"pt_sup_medic",  label:"Supervisor + Medic",     sub:"Medical + Guard (Supervisor)",          quals:["Supervisor","Medical","Guard"] },
      { key:"pt_sup_dual",   label:"Supervisor + Scale/Med", sub:"Scale + Medical + Guard (Supervisor)", quals:["Supervisor","Scale","Medical","Guard"] },
      { key:"pt_all",        label:"All Positions",          sub:"Scale + Medical + Guard (Supervisor)", quals:["Supervisor","Scale","Medical","Guard"] },
    ]},
  ];

  const getColor = (quals) => {
    
    if (quals.includes("Scale") && quals.includes("Medical")) return "var(--ss-scale)";
    if (quals.includes("Scale")) return "var(--ss-scale)";
    if (quals.includes("Medical")) return "var(--ss-medical)";
    return "var(--ss-guard)";
  };

  const total = Object.values(counts).reduce((a,b)=>a+b, 0);
  const numStyle = { background:"var(--ss-surface-alt)",border:"1px solid var(--ss-border)",color:"var(--ss-text)",
    padding:"7px 0",borderRadius:6,outline:"none",fontSize:14,fontFamily:"inherit",width:56,textAlign:"center" };

  const Stepper = ({ k }) => (
    <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
      <button onClick={()=>set(k)(v=>v-1)} style={{width:28,height:28,borderRadius:5,border:"1px solid var(--ss-border)",
        background:"var(--ss-surface)",color:"var(--ss-text)",cursor:"pointer",fontSize:18,lineHeight:1,
        display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>−</button>
      <input type="number" value={counts[k]} min={0} onChange={e=>set(k)(parseInt(e.target.value)||0)} style={numStyle}/>
      <button onClick={()=>set(k)(v=>v+1)} style={{width:28,height:28,borderRadius:5,border:"1px solid var(--ss-border)",
        background:"var(--ss-surface)",color:"var(--ss-text)",cursor:"pointer",fontSize:18,lineHeight:1,
        display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>+</button>
    </div>
  );

  const QualDots = ({quals}) => (
    <span style={{display:"flex",gap:3,alignItems:"center",flexShrink:0}}>
      {ALL_POSITIONS.map(p => (
        <span key={p} style={{width:8,height:8,borderRadius:"50%",
          background:quals.includes(p)?pC(p,t):"var(--ss-border)",
          border:"1px solid "+(quals.includes(p)?pC(p,t):"var(--ss-text-dim)"),
          display:"inline-block",flexShrink:0}} title={p}/>
      ))}
    </span>
  );

  const handleGenerate = () => {
    const usedNames = new Set();
    const employees = [];
    const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2);
    const make = (qualifications, type) => {
      const name = generateName(usedNames);
      usedNames.add(name);
      employees.push({id:uid(), name, qualifications, employmentType:type, unavailableDays:[], preferredShifts:[], blockedShifts:[], requiredShift:null, preferredDaysOff:[], overtimePref:"neutral"});
    };
    ROSTER_DEFS.forEach(section => {
      section.entries.forEach(entry => {
        const n = counts[entry.key]||0;
        for (let i=0; i<n; i++) make([...entry.quals], section.type);
      });
    });
    onGenerate(employees);
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
      <div style={{background:"var(--ss-surface)",border:"1px solid var(--ss-accent)",borderRadius:12,
        padding:28,maxWidth:560,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.6)",
        maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <span style={{fontSize:22}}>🧪</span>
          <h2 style={{margin:0,fontSize:16,fontWeight:700,color:"var(--ss-accent)"}}>GENERATE TEST ROSTER</h2>
        </div>
        <p style={{margin:"0 0 20px",fontSize:12,color:"var(--ss-text-muted)"}}>
          Configure your test workforce composition. Each row generates randomly named employees with the listed qualifications.
        </p>
        {ROSTER_DEFS.map(section => (
          <div key={section.section}>
            <div style={{fontSize:10,color:"var(--ss-text-dim)",fontWeight:700,letterSpacing:".08em",marginBottom:8,marginTop:4}}>{section.section}</div>
            <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:16}}>
              {section.entries.map(entry => {
                const color = getColor(entry.quals);
                const active = (counts[entry.key]||0) > 0;
                return (
                  <div key={entry.key} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:6,
                    background:active?color+"0d":"var(--ss-surface-alt)",border:"1px solid "+(active?color+"55":"var(--ss-border)")}}>
                    <QualDots quals={entry.quals}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:12,color:active?color:"var(--ss-text)",lineHeight:1.3}}>{entry.label}</div>
                      <div style={{fontSize:10,color:"var(--ss-text-dim)",marginTop:1}}>{entry.sub}</div>
                    </div>
                    <Stepper k={entry.key}/>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
        <div style={{padding:"10px 14px",background:"var(--ss-accent-12)",border:"1px solid var(--ss-accent-35)",
          borderRadius:6,marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:12,color:"var(--ss-text-muted)"}}>Total employees to generate:</span>
          <span style={{fontSize:20,fontWeight:700,color:"var(--ss-accent)"}}>{total}</span>
        </div>
        {total===0&&<div style={{padding:"8px 14px",background:"var(--ss-danger-dim)",border:"1px solid var(--ss-danger)",
          borderRadius:6,marginBottom:16,fontSize:12,color:"var(--ss-danger-readable)"}}>
          Set at least one employee count above to generate a roster.</div>}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={onCancel} style={{background:"transparent",color:"var(--ss-text-muted)",border:"1px solid var(--ss-border)",
            padding:"9px 20px",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>CANCEL</button>
          <button onClick={handleGenerate} disabled={total===0}
            style={{background:total===0?"var(--ss-border)":"var(--ss-accent)",color:total===0?"var(--ss-text-dim)":"#fff",border:"none",
              padding:"9px 22px",borderRadius:6,cursor:total===0?"not-allowed":"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit"}}>
            ⚡ GENERATE & AUTO-FILL
          </button>
        </div>
      </div>
    </div>
  );
}

function CopyWeekModal({ onSave, onLoad, onDelete, onClose }) {
  const { schedule } = useSchedule();
  const { savedWeeks } = useHistory();
  const t = useTheme();
  const [saveName, setSaveName] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(null);

  const filledCount = Object.values(schedule).reduce((s,a)=>s+a.length,0);

  const handleSave = () => {
    const name = saveName.trim();
    if (!name) return;
    onSave(name);
    setSaveName("");
  };

  const iS = { background:"var(--ss-surface-alt)",border:"1px solid var(--ss-border)",color:"var(--ss-text)",
    padding:"9px 12px",borderRadius:6,outline:"none",fontSize:13,fontFamily:"inherit",flex:1 };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
      <div style={{background:"var(--ss-surface)",border:"1px solid var(--ss-accent)",borderRadius:12,
        padding:28,maxWidth:480,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.6)",maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>💾</span>
            <h2 style={{margin:0,fontSize:16,fontWeight:700,color:"var(--ss-accent)"}}>SAVED WEEKS</h2>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:"var(--ss-text-dim)",
            cursor:"pointer",fontSize:18,padding:4}}>✕</button>
        </div>

        {}
        <div style={{marginBottom:24}}>
          <div style={{fontSize:10,color:"var(--ss-text-dim)",fontWeight:700,letterSpacing:".08em",marginBottom:8}}>SAVE CURRENT WEEK</div>
          <div style={{background:"var(--ss-surface-alt)",border:"1px solid var(--ss-border)",borderRadius:6,padding:"10px 14px",marginBottom:10,fontSize:11,color:"var(--ss-text-muted)"}}>
            Current schedule: <span style={{color:"var(--ss-text)",fontWeight:700}}>{filledCount}</span> assignments across {Object.values(schedule).filter(a=>a.length>0).length} shifts
          </div>
          <div style={{display:"flex",gap:8}}>
            <input value={saveName} onChange={e=>setSaveName(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handleSave()}
              placeholder='Name this week (e.g. "Week 1 - Standard")'
              style={iS}/>
            <button onClick={handleSave} disabled={!saveName.trim()||!filledCount}
              style={{background:saveName.trim()&&filledCount?"var(--ss-accent)":"var(--ss-border)",
                color:saveName.trim()&&filledCount?"#fff":"var(--ss-text-dim)",
                border:"none",padding:"9px 16px",borderRadius:6,cursor:saveName.trim()&&filledCount?"pointer":"not-allowed",
                fontSize:12,fontWeight:700,fontFamily:"inherit",whiteSpace:"nowrap"}}>
              SAVE
            </button>
          </div>
          {!filledCount&&<div style={{fontSize:11,color:"var(--ss-text-dim)",marginTop:6}}>No assignments to save — fill the schedule first.</div>}
        </div>

        {}
        <div style={{fontSize:10,color:"var(--ss-text-dim)",fontWeight:700,letterSpacing:".08em",marginBottom:8}}>SAVED WEEKS</div>
        {savedWeeks.length===0 ? (
          <div style={{textAlign:"center",padding:"24px 0",color:"var(--ss-text-dim)",fontSize:13}}>
            <div style={{fontSize:28,marginBottom:8}}>💾</div>
            No saved weeks yet. Save the current schedule above.
          </div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {savedWeeks.map((week,i) => (
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",
                background:"var(--ss-surface-alt)",border:"1px solid var(--ss-border)",borderRadius:6}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,color:"var(--ss-text)"}}>{week.name}</div>
                  <div style={{fontSize:10,color:"var(--ss-text-dim)",marginTop:2}}>
                    {week.assignments} assignments • saved {week.savedAt}
                  </div>
                </div>
                {confirmDelete===i ? (
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <span style={{fontSize:10,color:"var(--ss-danger)"}}>Delete?</span>
                    <button onClick={()=>{onDelete(i);setConfirmDelete(null);}}
                      style={{background:"var(--ss-danger)",color:"#fff",border:"none",padding:"4px 10px",
                        borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>YES</button>
                    <button onClick={()=>setConfirmDelete(null)}
                      style={{background:"transparent",color:"var(--ss-text-muted)",border:"1px solid var(--ss-border)",
                        padding:"4px 10px",borderRadius:4,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>NO</button>
                  </div>
                ) : (
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>onLoad(i)}
                      style={{background:"var(--ss-accent)",color:"#fff",border:"none",padding:"6px 14px",
                        borderRadius:5,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>
                      LOAD
                    </button>
                    <button onClick={()=>setConfirmDelete(i)}
                      style={{background:"transparent",color:"var(--ss-text-dim)",border:"1px solid var(--ss-border)",
                        padding:"6px 10px",borderRadius:5,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>
                      ✕
                    </button>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function ExtShiftApprovalModal({ suggestions, onApprove, onCancel }) {
  const t = useTheme();
  const [selected, setSelected] = useState(null);

  const s = selected !== null ? suggestions[selected] : suggestions[0];
  const empColor = "#7c3aed";

  const formatCovered = (gaps) => {
    const byShift = {};
    gaps.forEach(g => { (byShift[g.shiftId] = byShift[g.shiftId] || []).push(g.role); });
    return Object.entries(byShift).map(([sid, roles]) => {
      const lbl = SHIFTS.find(sh => sh.id === sid)?.label || sid;
      return `${lbl}: ${roles.join(", ")}`;
    }).join(" · ");
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",
      alignItems:"center",justifyContent:"center",zIndex:1100,padding:20}}>
      <div style={{background:"var(--ss-surface)",border:"1px solid "+empColor,borderRadius:10,
        padding:28,maxWidth:520,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.6)",maxHeight:"90vh",overflowY:"auto"}}>

        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <span style={{fontSize:22}}>⏱</span>
          <h2 style={{margin:0,fontSize:16,fontWeight:700,color:empColor}}>12-HOUR EXTENDED SHIFT APPROVAL</h2>
        </div>
        <p style={{margin:"0 0 18px",fontSize:12,color:"var(--ss-text-muted)",lineHeight:1.6}}>
          A coverage gap exists that cannot be filled with normal 8-hour shifts.
          The following pairing would resolve it by having two employees each work
          a 12-hour shift. <strong style={{color:"var(--ss-warning)"}}>This requires explicit approval.</strong>
        </p>

        {}
        {suggestions.length > 1 && (
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,color:"var(--ss-text-dim)",fontWeight:700,letterSpacing:".06em",marginBottom:6}}>
              SELECT PAIRING ({suggestions.length} options available)
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {suggestions.map((sg, i) => (
                <button key={i} onClick={()=>setSelected(i)} style={{
                  background:(selected===i||(selected===null&&i===0))?empColor+"18":"var(--ss-surface-alt)",
                  border:"1.5px solid "+((selected===i||(selected===null&&i===0))?empColor:"var(--ss-border)"),
                  borderRadius:6,padding:"8px 12px",cursor:"pointer",textAlign:"left",fontFamily:"inherit",
                  display:"flex",alignItems:"center",gap:10,
                }}>
                  <span style={{fontSize:11,fontWeight:700,color:empColor}}>Option {i+1}</span>
                  <span style={{fontSize:11,color:"var(--ss-text)"}}>
                    {sg.empA.name}{sg.empB?" + "+sg.empB.name:" (solo)"}
                  </span>
                  <span style={{marginLeft:"auto",fontSize:10,color:"var(--ss-text-muted)"}}>
                    {sg.pair.label}
                  </span>
                </button>
              ))}
            </div>
          </div>
        )}

        {s && (
          <>
            {}
            <div style={{background:"var(--ss-surface-alt)",borderRadius:8,padding:16,marginBottom:16,
              border:"1px solid "+empColor+"30"}}>
              <div style={{fontSize:10,color:"var(--ss-text-dim)",fontWeight:700,letterSpacing:".06em",marginBottom:12}}>
                SHIFT PAIRING — {s.day.toUpperCase()} — {s.pair.label.toUpperCase()} COVERAGE
              </div>

              {}
              <div style={{marginBottom:14}}>
                <div style={{display:"flex",borderRadius:4,overflow:"hidden",height:28,marginBottom:6}}>
                  <div style={{flex:1,background:"var(--ss-shift-first-30)",border:"1px solid var(--ss-shift-first-60)",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"var(--ss-shift-first)"}}>
                    1st 0600–1400
                  </div>
                  <div style={{flex:1,background:"var(--ss-shift-second-30)",border:"1px solid var(--ss-shift-second-60)",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"var(--ss-shift-second)"}}>
                    2nd 1400–2200
                  </div>
                  <div style={{flex:1,background:"var(--ss-shift-third-30)",border:"1px solid var(--ss-shift-third-60)",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"var(--ss-shift-third)"}}>
                    3rd 2200–0600
                  </div>
                </div>
                {}
                {s.empA && (
