    //   comfortable    (4 emps) → +100  (mild nudge — Guard assignment more OK)
    //   abundant       (5+)     →  +80 or less (diminishing, Guard is fine)
    //
    // Stacks per scarce qualification, so Scale+Medical in a thin roster accumulates
    // a very large penalty — exactly the "hold in reserve" behaviour wanted.
    let scarcityReservePenalty = 0;
    if (isGuardSlot && hasSpecialist) {
      for (const q of ["Scale", "Medical"]) {
        if (!quals.includes(q)) continue;
        const poolSize = (qualGroups[q] || []).length;
        if (poolSize > 0) scarcityReservePenalty += Math.round(400 / poolSize);
      }
    }

    // ── Weighted Soft Preferences ─────────────────────────────────────────────
    // Score is penalty-based: lower = higher priority. Bonuses are negative deltas.

    // +100 preferred-shift bonus: reward placements that match the employee's
    // declared preferredShifts list.  Applies to both FT and PT employees.
    const prefShifts = emp.preferredShifts || [];
    const preferredShiftBonus = prefShifts.includes(shiftId) ? -100 : 0;

    // +50 consecutive-day rhythm bonus: reward placements that continue an
    // active work streak (1–4 days so far this week), nudging the scheduler
    // to keep employees on a natural 5-on/2-off rhythm rather than scattering
    // their shifts across non-consecutive days.
    const rhythmBonus = (consec >= 1 && consec <= 4 && (empPlan ? empPlan.workDays.has(day) : true))
      ? -50 : 0;

    // -200 approaching-overtime soft ramp: once an FT employee exceeds 32 hours
    // (4 shifts), apply a growing penalty that ramps toward the hard 40h wall.
    // This spreads scheduling pressure earlier so the algorithm avoids backing
    // into corners where the only remaining options are already-OT employees.
    // At 40h exactly the ramp adds 80pts — the hard ftOtPenalty (600) takes over.
    const hoursOverSoftCap   = isFT ? Math.max(0, myHours - 32) : 0;
    const overtimeRampPenalty = hoursOverSoftCap * 10; // +10/hr above 32h → max +80 at 40h

    const bottleneckPenalty = Math.min(empRemainingOptions(emp), 50) * 0.6;
    return onPlannedShift + onWorkDay + overworkPenalty + ptPenalty + ftOtPenalty + fairPenalty
         - underHoursBoost + supWeekendPenalty + roleStretchPenalty + scarcityReservePenalty
         + bottleneckPenalty + preferredShiftBonus + rhythmBonus + overtimeRampPenalty;

  };

  // Slot cap: maximum regular (non-Supervisor) bodies for a given slot,
  // reduced by any ext-shift bodies already covering that slot.
  const slotCap = (day, shiftId) =>
    Math.max(0, REGULAR_SLOTS(day, shiftId) -
      (extShiftsArg||[]).reduce((n, ext) => {
        const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
        if (!pair) return n;
        if (pair.covers.includes(shiftId) && ext.day === day) {
          const idx = pair.covers.indexOf(shiftId);
          return n + ((idx === 0 ? !!ext.empAId : idx === 1 ? !!ext.empBId : false) ? 1 : 0);
        }
        // Split cross-day: empB covers next day's first shift
        if (pair.crossDayB === shiftId && ext.empBId) {
          const nextDay = DAYS[(DAYS.indexOf(ext.day) + 1) % 7];
          if (nextDay === day) return n + 1;
        }
        return n;
      }, 0));

  // ── Step 3: Backtracking CSP fill with two-phase optimization ─────────
  // Replaces greedy MRV fill with a backtracking search that guarantees
  // complete coverage when feasible, then optimises for preferences via
  // hill-climbing.  Incorporates improvements 1 (backtracking + AC-3),
  // 3 (role-reservation), 4 (dynamic MRV), 5 (feasibility pre-check),
  // and 6 (two-phase optimisation: feasibility first, then preference swaps).
  {
    const empMap = new Map(sourceEmps.map(e => [e.id, e]));
    const btSlots = DAYS.flatMap(d => SHIFTS.map(s => ({ day: d, shiftId: s.id })));

    // Build per-slot ext-shift role coverage + blocked employees
    const extRoleBySlot = {};
    const extBlockedBySlot = {};
    for (const { day, shiftId } of btSlots) {
      const key = cellKey(day, shiftId);
      const activeExts = (extShiftsArg||[]).filter(e => extCovers(e, day, shiftId));
      const blocked = new Set();
      let hasScale = false, hasMedical = false;
      activeExts.forEach(ext => {
        const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
        if (!pair) return;
        const idx = pair.covers.indexOf(shiftId);
        if (idx === 0 && ext.empAId) blocked.add(ext.empAId);
        if (idx === 1 && ext.empBId) blocked.add(ext.empBId);
        if (pair.crossDayB === shiftId && ext.empBId) {
          const nextDay = DAYS[(DAYS.indexOf(ext.day) + 1) % 7];
          if (nextDay === day) blocked.add(ext.empBId);
        }
        const presentId = idx === 0 ? ext.empAId : idx === 1 ? ext.empBId : null;
        const presentEmp = presentId ? empMap.get(presentId) : null;
        const roles = presentEmp
          ? ["Scale","Medical"].filter(r => presentEmp.qualifications.includes(r))
          : (ext.roles||[]);
        if (roles.includes("Scale")) hasScale = true;
        if (roles.includes("Medical")) hasMedical = true;
      });
      extRoleBySlot[key] = { hasScale, hasMedical };
      extBlockedBySlot[key] = blocked;
    }

    // Static eligibility from domain matrix + empTimeOffDays
    const btStaticEligible = (day, shiftId) => {
      const key = cellKey(day, shiftId);
      const blocked = extBlockedBySlot[key] || new Set();
      return sourceEmps.filter(e => {
        if (blocked.has(e.id)) return false;
        if (!domains[e.id]?.[key]?.size) return false;
        if (empTimeOffDays && empTimeOffDays.has(e.id + "__" + day)) return false;
        return true;
      }).map(e => e.id);
    };

    // ── SearchState class ──────────────────────────────────────────────────
    class SearchState {
      constructor() {
        this.schedule = {};
        this.hourTracker = { ...hourTracker }; // inherit ext-shift hours
        this.dayWorked = {};
        this.shiftsWorked = {};
        this.domains = [];
        sourceEmps.forEach(e => {
          if (this.hourTracker[e.id] == null) this.hourTracker[e.id] = 0;
          this.dayWorked[e.id] = new Set();
          this.shiftsWorked[e.id] = 0;
        });
        for (const { day, shiftId } of btSlots) {
          this.domains.push(new Set(btStaticEligible(day, shiftId)));
        }
      }

      canAssign(empId, slotIdx) {
        const { day, shiftId } = btSlots[slotIdx];
        const emp = empMap.get(empId);
        if (!emp) return false;
        const key = cellKey(day, shiftId);
        if ((this.schedule[key] || []).some(a => a.employeeId === empId)) return false;
        // Same day, different shift: only if willing16h + adjacent
        for (const s of SHIFTS) {
          if (s.id === shiftId) continue;
          if ((this.schedule[cellKey(day, s.id)] || []).some(a => a.employeeId === empId)) {
            if (!emp.willing16h) return false;
            const adj = new Set(["first__second","second__first","second__third","third__second"]);
            if (!adj.has(s.id + "__" + shiftId)) return false;
          }
        }
        // Weekly shift cap
        const empMaxW = emp.maxShiftsPerWeek;
        if (empMaxW != null && this.shiftsWorked[empId] >= empMaxW) return false;
        // Consecutive days cap
        const workDays = new Set(this.dayWorked[empId]);
        workDays.add(day);
        let maxConsecDays = 0, streak = 0;
        for (const d of DAYS) {
          if (workDays.has(d)) { streak++; maxConsecDays = Math.max(maxConsecDays, streak); } else streak = 0;
        }
        if (workDays.has("Sunday") && workDays.has("Saturday")) {
          let head = 0, tail = 0;
          for (const d of DAYS) { if (workDays.has(d)) head++; else break; }
          for (let i = 6; i >= 0; i--) { if (workDays.has(DAYS[i])) tail++; else break; }
          maxConsecDays = Math.max(maxConsecDays, head + tail);
        }
        if (maxConsecDays > maxShifts) return false;
        // Weekend cap
        if (["Saturday","Sunday"].includes(day) && emp.maxWeekendDays != null) {
          const wkd = [...this.dayWorked[empId]].filter(d => ["Saturday","Sunday"].includes(d)).length;
          if (wkd >= emp.maxWeekendDays) return false;
        }
        // Fatigue constraints against current schedule
        if (isRestViolation(emp, rg(empId, this.schedule, day, shiftId), minRest)) return false;
        if (calcConsecutiveHours(empId, this.schedule, day, shiftId, extShiftsArg) > empMaxConsec(emp)) return false;
        if (shiftId === "third" && calcConsecutiveNights(empId, this.schedule, day, shiftId) >= maxNights) return false;
        return true;
      }

      assign(empId, position, slotIdx) {
        const { day, shiftId } = btSlots[slotIdx];
        const key = cellKey(day, shiftId);
        if (!this.schedule[key]) this.schedule[key] = [];
        this.schedule[key].push({ employeeId: empId, position });
        if (!this.schedule[key].slice(0, -1).some(a => a.employeeId === empId)) {
          this.hourTracker[empId] = (this.hourTracker[empId] || 0) + SHIFT_HOURS;
          this.shiftsWorked[empId] = (this.shiftsWorked[empId] || 0) + 1;
          this.dayWorked[empId].add(day);
        }
      }

      // Lightweight propagation: prune obvious conflicts only
      propagate(slotIdx) {
        const { day, shiftId } = btSlots[slotIdx];
        const assignedHere = new Set((this.schedule[cellKey(day, shiftId)] || []).map(a => a.employeeId));
        const ADJ = new Set(["first__second","second__first","second__third","third__second"]);
        for (let j = 0; j < btSlots.length; j++) {
          if (j === slotIdx) continue;
          const jKey = cellKey(btSlots[j].day, btSlots[j].shiftId);
          const jAsgn = this.schedule[jKey] || [];
          const needed = slotCap(btSlots[j].day, btSlots[j].shiftId) +
            (SUP_SLOT_DAY(btSlots[j].day, btSlots[j].shiftId) ? 1 : 0);
          if (jAsgn.length >= needed) { this.domains[j] = new Set(); continue; }
          const toRemove = [];
          for (const empId of this.domains[j]) {
            if (btSlots[j].day === day && btSlots[j].shiftId !== shiftId && assignedHere.has(empId)) {
              const emp = empMap.get(empId);
              if (!emp || !emp.willing16h || !ADJ.has(shiftId + "__" + btSlots[j].shiftId)) {
                toRemove.push(empId); continue;
              }
            }
            const emp = empMap.get(empId);
            if (emp && emp.maxShiftsPerWeek != null && (this.shiftsWorked[empId] || 0) >= emp.maxShiftsPerWeek) {
              toRemove.push(empId); continue;
            }
            if (emp && this.dayWorked[empId]) {
              const wd = new Set(this.dayWorked[empId]);
              wd.add(btSlots[j].day);
              let s = 0, ms = 0;
              for (const d of DAYS) { if (wd.has(d)) { s++; ms = Math.max(ms, s); } else s = 0; }
              if (ms > maxShifts) toRemove.push(empId);
            }
          }
          for (const empId of toRemove) this.domains[j].delete(empId);
        }
      }

      isFeasible() {
        for (let j = 0; j < btSlots.length; j++) {
          const jKey = cellKey(btSlots[j].day, btSlots[j].shiftId);
          const jAsgn = this.schedule[jKey] || [];
          const regCount = jAsgn.filter(a => a.position !== "Supervisor").length;
          const cap = slotCap(btSlots[j].day, btSlots[j].shiftId);
          const supNeeded = SUP_SLOT_DAY(btSlots[j].day, btSlots[j].shiftId) ? 1 : 0;
          const supFilled = jAsgn.some(a => a.position === "Supervisor") ? 1 : 0;
          const totalNeeded = Math.max(0, cap - regCount) + Math.max(0, supNeeded - supFilled);
          if (totalNeeded <= 0) continue;
          const inSlot = new Set(jAsgn.map(a => a.employeeId));
          const avail = [...this.domains[j]].filter(id => !inSlot.has(id));
          if (avail.length < totalNeeded) return false;
        }
        return true;
      }
    }

    // ── Pick best position for an employee in a slot ───────────────────────
    const btPickPosition = (emp, currentAsgn, day, shiftId) => {
      const isSup = (emp.qualifications||[]).includes("Supervisor");
      if (isSup && SUP_SLOT_DAY(day, shiftId)) return "Supervisor";
      const key = cellKey(day, shiftId);
      const extR = extRoleBySlot[key] || {};
      const ap = getAvailPos(day, shiftId).filter(p => canFillPos(emp, p, day));
      if (!ap.length) return null;
      const hasScale = slotHasRole(currentAsgn, sourceEmps, "Scale") || extR.hasScale;
      const hasMedical = slotHasRole(currentAsgn, sourceEmps, "Medical") || extR.hasMedical;
      if (!hasScale && ap.includes("Scale")) return "Scale";
      if (!hasMedical && ap.includes("Medical")) return "Medical";
      if (ap.includes("Guard")) return "Guard";
      return ap[0];
    };

    // ── Dynamic MRV slot selection (Improvement 4) ─────────────────────────
    const btSelectNextSlot = (state) => {
      let bestIdx = -1, bestScore = Infinity;
      for (let i = 0; i < btSlots.length; i++) {
        const { day, shiftId } = btSlots[i];
        const key = cellKey(day, shiftId);
        const asgn = state.schedule[key] || [];
        const regCount = asgn.filter(a => a.position !== "Supervisor").length;
        const cap = slotCap(day, shiftId);
        const supFilled = asgn.some(a => a.position === "Supervisor") ? 1 : 0;
        const supNeeded = SUP_SLOT_DAY(day, shiftId) ? 1 : 0;
        if (regCount >= cap && supFilled >= supNeeded) continue;
        const inSlot = new Set(asgn.map(a => a.employeeId));
        const avail = [...state.domains[i]].filter(id => !inSlot.has(id));
        let size = avail.length;
        if (size === 0) return i;
        // Role-priority boost
        const extR = extRoleBySlot[key] || {};
        const hasScale = slotHasRole(asgn, sourceEmps, "Scale") || extR.hasScale;
        const hasMedical = slotHasRole(asgn, sourceEmps, "Medical") || extR.hasMedical;
        let rolePenalty = 0;
        if (!hasScale) {
          const scaleAvail = avail.filter(id => {
            const e = empMap.get(id);
            return e && (e.qualifications||[]).includes("Scale") && canFillPos(e, "Scale", day);
          });
          rolePenalty += scaleAvail.length <= 1 ? -1000 : -500 / scaleAvail.length;
        }
        if (!hasMedical) {
          const medAvail = avail.filter(id => {
            const e = empMap.get(id);
            return e && (e.qualifications||[]).includes("Medical") && canFillPos(e, "Medical", day);
          });
          rolePenalty += medAvail.length <= 1 ? -1000 : -500 / medAvail.length;
        }
        const score = size + rolePenalty;
        if (score < bestScore) { bestScore = score; bestIdx = i; }
      }
      return bestIdx;
    };

    // ── Phase 1 scoring: feasibility-focused ───────────────────────────────
    const btScore = (state, empId, slotIdx) => {
      const emp = empMap.get(empId);
      if (!emp) return 99999;
      const { day, shiftId } = btSlots[slotIdx];
      const empPlan = plan[emp.id];
      const hours = state.hourTracker[empId] || 0;
      const isFT = emp.employmentType === "full-time";
      let score = 0;
      if (isFT && hours < FT_MIN_HOURS) { score -= 400; score -= (FT_MIN_HOURS - hours) * 8; }
      if (isFT && hours >= FT_MIN_HOURS) score += 600;
      if (!isFT) score += 200;
      if (empPlan && empPlan.workDays.has(day)) score -= 100;
      else if (isFT) score += 80;
      // Phase 1: mild shift guide (preferences enforced in Phase 2)
      if (empPlan && empPlan.shiftId === shiftId) score -= 150;
      else if (isFT && empPlan && empPlan.shiftId !== shiftId && !emp.crossShiftOT) score += 100;
      if (isGuardOnly(emp)) score -= 50;
      const key = cellKey(day, shiftId);
      const curAsgn = state.schedule[key] || [];
      const extR = extRoleBySlot[key] || {};
      const hasScale = slotHasRole(curAsgn, sourceEmps, "Scale") || extR.hasScale;
      const hasMedical = slotHasRole(curAsgn, sourceEmps, "Medical") || extR.hasMedical;
      if (!hasScale && (emp.qualifications||[]).includes("Scale")) score -= 200;
      if (!hasMedical && (emp.qualifications||[]).includes("Medical")) score -= 200;
      score += hours * 3;
      // Phase 1: day-off hint. Raised from +50 to +300 so it outweighs the
      // stacked preferredShift + rhythm pull and redirects Phase 1 search
      // toward non-day-off candidates when alternatives exist. At 99999 this
      // helped harms-pto errors (−9) by steering the CSP onto different
      // branches; 300 keeps that nudge without being an absolute block.
      if ((emp.preferredDaysOff||[]).includes(day)) score += 300 * ps(emp, "daysOff");
      // A1b: employee's direct preferredShifts bonus.
      // plan.shiftId already covers FT, but PT has no plan shift and FT crossShiftOT
      // can rotate — this term rewards hitting the employee's own stated preference.
      const prefShifts = emp.preferredShifts || [];
      if (prefShifts.includes(shiftId)) score -= 80 * ps(emp, "shift");
      // A1b: PT preferred-shift mismatch — PT with a shift preference but landing
      // on a non-preferred shift gets strongly deprioritised (mirrors empScore's
      // ptPrefMismatch). Scaled smaller than empScore's 800 so it doesn't outweigh
      // the FT-underhours -400 that must dominate Phase 1.
      if (!isFT && prefShifts.length > 0 && !prefShifts.includes(shiftId)) score += 400 * ps(emp, "shift");
      // A1b: rhythm bonus — reward extending an active 1–4 day streak so runs
      // stay consecutive rather than fragmenting across the week.
      const todayIdx = dayIdx(day);
      let consec = 0;
      for (let i = todayIdx - 1; i >= 0; i--) {
        if (state.dayWorked[empId] && state.dayWorked[empId].has(DAYS[i])) consec++;
        else break;
      }
      if (consec >= 1 && consec <= 4) score -= 40;
      // A1b: FT overtime ramp — spread scheduling pressure before the hard 40h
      // wall so the search doesn't back itself into a corner where only already-OT
      // employees remain. Mirrors empScore's overtimeRampPenalty at lower magnitude.
      if (isFT && hours > 32) score += (hours - 32) * 8;
      let appearances = 0;
      for (let j = 0; j < state.domains.length; j++) {
        if (j === slotIdx) continue;
        if (state.domains[j].has(empId)) appearances++;
      }
      score += appearances * 0.5;
      return score;
    };

    // ── Backtracking search ────────────────────────────────────────────────
    let nodesExplored = 0;
    const MAX_NODES = 500000;
    const btSearchStart = Date.now();

    const btBacktrack = (state, depth) => {
      nodesExplored++;
      if (nodesExplored > MAX_NODES) return null;

      const slotIdx = btSelectNextSlot(state);
      if (slotIdx === -1) return state;

      const { day, shiftId } = btSlots[slotIdx];
      const key = cellKey(day, shiftId);
      const currentAsgn = state.schedule[key] || [];
      const inSlot = new Set(currentAsgn.map(a => a.employeeId));

      const candidates = [...state.domains[slotIdx]]
        .filter(id => !inSlot.has(id) && state.canAssign(id, slotIdx));
      if (candidates.length === 0) return null;

      candidates.sort((a, b) => btScore(state, a, slotIdx) - btScore(state, b, slotIdx));

      for (const empId of candidates) {
        if (nodesExplored > MAX_NODES) return null;
        const emp = empMap.get(empId);
        if (!emp) continue;
        const pos = btPickPosition(emp, currentAsgn, day, shiftId);
        if (!pos) continue;

        // Save state for undo
        const savedSchedule = {};
        for (const k of Object.keys(state.schedule)) savedSchedule[k] = [...state.schedule[k]];
        const savedHours = { ...state.hourTracker };
        const savedShifts = { ...state.shiftsWorked };
        const savedDays = {};
        for (const id of Object.keys(state.dayWorked)) savedDays[id] = new Set(state.dayWorked[id]);
        const savedDomains = state.domains.map(d => new Set(d));

        state.assign(empId, pos, slotIdx);
        state.propagate(slotIdx);

        if (state.isFeasible()) {
          const result = btBacktrack(state, depth + 1);
          if (result) return result;
        }

        // Undo
        state.schedule = savedSchedule;
        state.hourTracker = savedHours;
        state.shiftsWorked = savedShifts;
        state.dayWorked = savedDays;
        state.domains = savedDomains;
      }
      return null;
    };

    // ── Improvement 5: Feasibility pre-check ───────────────────────────────
    let impossibleCount = 0;
    for (let i = 0; i < btSlots.length; i++) {
      const { day, shiftId } = btSlots[i];
      for (const role of ["Scale", "Medical", "Guard"]) {
        const extR = extRoleBySlot[cellKey(day, shiftId)] || {};
        if (role === "Scale" && extR.hasScale) continue;
        if (role === "Medical" && extR.hasMedical) continue;
        const qualified = sourceEmps.filter(e => {
          if (!(e.qualifications||[]).includes(role)) return false;
          if (!canFillPos(e, role, day)) return false;
          if (!domains[e.id]?.[cellKey(day, shiftId)]?.size) return false;
          if (empTimeOffDays && empTimeOffDays.has(e.id + "__" + day)) return false;
          return true;
        });
        if (qualified.length === 0) { impossibleCount++; console.log(`[Pre-check] IMPOSSIBLE: ${day}/${shiftId} ${role}`); }
        else if (qualified.length === 1) console.log(`[Pre-check] CRITICAL: ${day}/${shiftId} ${role} — ${qualified[0].name}`);
      }
    }

    // ── Run search ─────────────────────────────────────────────────────────
    console.log(`[Backtrack] Starting search: ${btSlots.length} slots, ${sourceEmps.length} employees`);
    const initialState = new SearchState();

    // Pre-assign supervisors
    for (let i = 0; i < btSlots.length; i++) {
      const { day, shiftId } = btSlots[i];
      if (!SUP_SLOT_DAY(day, shiftId)) continue;
      const supEmp = sourceEmps.find(e =>
        (e.qualifications||[]).includes("Supervisor") &&
        !(e.unavailableDays||[]).includes(day) &&
        !(empTimeOffDays && empTimeOffDays.has(e.id + "__" + day))
      );
      if (supEmp && initialState.canAssign(supEmp.id, i)) {
        initialState.assign(supEmp.id, "Supervisor", i);
      }
    }
    initialState.propagate(0);

    // ── Improvement 3: Role-reservation (singleton propagation) ────────────
    let reservations = 0;
    for (let i = 0; i < btSlots.length; i++) {
      const { day, shiftId } = btSlots[i];
      const key = cellKey(day, shiftId);
      const curAsgn = initialState.schedule[key] || [];
      const extR = extRoleBySlot[key] || {};
      for (const role of ["Scale", "Medical"]) {
        if (slotHasRole(curAsgn, sourceEmps, role) || (role === "Scale" && extR.hasScale) || (role === "Medical" && extR.hasMedical)) continue;
        const cands = [...initialState.domains[i]].filter(id => {
          const e = empMap.get(id);
          if (!e) return false;
          if (!(e.qualifications||[]).includes(role)) return false;
          if (!canFillPos(e, role, day)) return false;
          if (curAsgn.some(a => a.employeeId === id)) return false;
          return initialState.canAssign(id, i);
        });
        if (cands.length === 1) {
          const empId = cands[0];
          const emp = empMap.get(empId);
          if (emp && !curAsgn.some(a => a.employeeId === empId)) {
            initialState.assign(empId, role, i);
            initialState.propagate(i);
            reservations++;
          }
        }
      }
    }
    if (reservations > 0) console.log(`[Backtrack] ${reservations} role reservations locked`);

    const btResult = btBacktrack(initialState, 0);
    const btElapsed = Date.now() - btSearchStart;
    console.log(`[Backtrack] Completed in ${btElapsed}ms, ${nodesExplored} nodes explored`);

    // ── Improvement 6: Phase 2 — Simulated Annealing preference optimisation ──
    // Replaces the previous 20-round greedy pairwise hill-climb. SA accepts
    // uphill moves early with decreasing probability, escaping local minima
    // that pairwise-best-move could not. Supports two move neighborhoods:
    //   • Pairwise swap (70%) — swap two employees between slots
    //   • 3-chain rotation (30%) — A→B, B→C, C→A cycle, unreachable via pairs
    // After SA, a short greedy polish catches any obvious remaining wins.
    const btSchedule = btResult ? btResult.schedule : initialState.schedule;

    // B1: Lexicographic SA objective — returns [hard, soft] tuple.
    // Tier 0 (hard): FT shift mismatch (non-crossShiftOT) + FT under-40h deviation.
    //   These are near-violations the algorithm should fix before optimising comfort.
    // Tier 1 (soft): day-off hits, crossShiftOT mismatch, PT pref mismatch, FT over-40h.
    //   These are quality-of-life — SA may trade among them freely but never at
    //   the expense of tier 0.
    const btSoftScore = (sched) => {
      let hard = 0, soft = 0;
      const empH = {};
      sourceEmps.forEach(e => empH[e.id] = hourTracker[e.id] || 0); // start from ext-shift hours
      for (const day of DAYS) for (const shift of SHIFTS) {
        for (const a of (sched[cellKey(day, shift.id)] || [])) {
          const emp = empMap.get(a.employeeId);
          if (!emp) continue;
          empH[a.employeeId] = (empH[a.employeeId] || 0) + SHIFT_HOURS;
          if ((emp.preferredDaysOff||[]).includes(day)) soft += 800 * ps(emp, "daysOff");
          const empP = plan[emp.id];
          const isFT = emp.employmentType === "full-time";
          if (isFT && empP && empP.shiftId !== shift.id && !emp.crossShiftOT) hard += 500 * ps(emp, "shift");
          if (isFT && empP && empP.shiftId !== shift.id && emp.crossShiftOT) soft += 400 * ps(emp, "shift");
          if (!isFT) {
            const prefs = emp.preferredShifts || [];
            if (prefs.length > 0 && !prefs.includes(shift.id)) soft += 600 * ps(emp, "shift");
          }
        }
      }
      for (const emp of sourceEmps) {
        if (emp.employmentType !== "full-time") continue;
        const h = empH[emp.id] || 0;
        if (h < FT_MIN_HOURS) {
          const d = FT_MIN_HOURS - h;
          hard += 10 * d * d;   // under-40 is a payroll-guarantee issue → hard (not weighted)
        } else {
          const d = h - FT_MIN_HOURS;
          soft += d * d * ps(emp, "overtime"); // over-40 weighted by OT preference strength
        }
      }
      return [hard, soft];
    };

    // Lexicographic comparison: negative = a better, positive = b better, 0 = tie.
    const lexCmp = (a, b) => a[0] !== b[0] ? a[0] - b[0] : a[1] - b[1];

    const btCanWorkSlot = (empId, sched, day, shiftId) => {
      const emp = empMap.get(empId);
      if (!emp) return false;
      if (!domains[emp.id]?.[cellKey(day, shiftId)]?.size) return false;
      if (empTimeOffDays && empTimeOffDays.has(empId + "__" + day)) return false;
      for (const s of SHIFTS) {
        if (s.id === shiftId) continue;
        if ((sched[cellKey(day, s.id)]||[]).some(a => a.employeeId === empId)) {
          if (!emp.willing16h) return false;
          const adj = new Set(["first__second","second__first","second__third","third__second"]);
          if (!adj.has(s.id + "__" + shiftId)) return false;
        }
      }
      if (isRestViolation(emp, rg(empId, sched, day, shiftId), minRest)) return false;
      if (calcConsecutiveHours(empId, sched, day, shiftId, extShiftsArg) > empMaxConsec(emp)) return false;
      if (shiftId === "third" && calcConsecutiveNights(empId, sched, day, shiftId) >= maxNights) return false;
      if (emp.maxShiftsPerWeek != null) {
        let cnt = 0;
        for (const d of DAYS) for (const s of SHIFTS) {
          if ((sched[cellKey(d, s.id)]||[]).some(a => a.employeeId === empId)) cnt++;
        }
        if (cnt >= emp.maxShiftsPerWeek) return false;
      }
      const wd = new Set();
      for (const d of DAYS) for (const s of SHIFTS) {
        if ((sched[cellKey(d, s.id)]||[]).some(a => a.employeeId === empId)) wd.add(d);
      }
      wd.add(day);
      let strk = 0, ms = 0;
      for (const d of DAYS) { if (wd.has(d)) { strk++; ms = Math.max(ms, strk); } else strk = 0; }
      if (wd.has("Sunday") && wd.has("Saturday")) {
        let h = 0, t = 0;
        for (const d of DAYS) { if (wd.has(d)) h++; else break; }
        for (let i = 6; i >= 0; i--) { if (wd.has(DAYS[i])) t++; else break; }
        ms = Math.max(ms, h + t);
      }
      if (ms > maxShifts) return false;
      if (["Saturday","Sunday"].includes(day) && emp.maxWeekendDays != null) {
        const wkCnt = [...wd].filter(d => ["Saturday","Sunday"].includes(d)).length;
        if (wkCnt > emp.maxWeekendDays) return false;
      }
      return true;
    };

    // Role coverage helper: a move may not cause a slot that HAD Scale/Medical
    // to lose it (hard invariant — we never sacrifice role coverage for soft score).
    const rolePreserved = (oldAsgn, newAsgn) => {
      if (slotHasRole(oldAsgn, sourceEmps, "Scale")   && !slotHasRole(newAsgn, sourceEmps, "Scale"))   return false;
      if (slotHasRole(oldAsgn, sourceEmps, "Medical") && !slotHasRole(newAsgn, sourceEmps, "Medical")) return false;
      return true;
    };

    // Try a pairwise swap between two slots. Returns {sched, keyI, keyJ} on success,
    // null on constraint violation. Does not mutate the input schedule.
    const tryPairSwap = (sched, iI, iJ) => {
      const si = btSlots[iI], sj = btSlots[iJ];
      const keyI = cellKey(si.day, si.shiftId), keyJ = cellKey(sj.day, sj.shiftId);
      const asgnI = sched[keyI] || [], asgnJ = sched[keyJ] || [];
      if (!asgnI.length || !asgnJ.length) return null;
      const aiIdx = Math.floor(Math.random() * asgnI.length);
      const ajIdx = Math.floor(Math.random() * asgnJ.length);
      const eA = asgnI[aiIdx], eB = asgnJ[ajIdx];
      if (!eA || !eB) return null;
      if (eA.employeeId === eB.employeeId) return null;
      if (eA.position === "Supervisor" || eB.position === "Supervisor") return null;
      const work = { ...sched };
      work[keyI] = asgnI.filter((_, idx) => idx !== aiIdx);
      work[keyJ] = asgnJ.filter((_, idx) => idx !== ajIdx);
      if (!btCanWorkSlot(eA.employeeId, work, sj.day, sj.shiftId) ||
          !btCanWorkSlot(eB.employeeId, work, si.day, si.shiftId)) return null;
      const eAo = empMap.get(eA.employeeId), eBo = empMap.get(eB.employeeId);
      const posA = btPickPosition(eAo, work[keyJ], sj.day, sj.shiftId);
      const posB = btPickPosition(eBo, work[keyI], si.day, si.shiftId);
      if (!posA || !posB) return null;
      work[keyI] = [...work[keyI], { employeeId: eB.employeeId, position: posB }];
      work[keyJ] = [...work[keyJ], { employeeId: eA.employeeId, position: posA }];
      if (!rolePreserved(asgnI, work[keyI]) || !rolePreserved(asgnJ, work[keyJ])) return null;
      return work;
    };

    // Try a 3-chain rotation: emp at slot I → J, emp at slot J → K, emp at slot K → I.
    // Reaches improvements pairwise swaps cannot (e.g. fixing three simultaneous
    // preference violations where no 2-swap alone helps).
    const try3Chain = (sched, iI, iJ, iK) => {
      const bi = btSlots[iI], bj = btSlots[iJ], bk = btSlots[iK];
      const kI = cellKey(bi.day, bi.shiftId);
      const kJ = cellKey(bj.day, bj.shiftId);
      const kK = cellKey(bk.day, bk.shiftId);
      const aI = sched[kI] || [], aJ = sched[kJ] || [], aK = sched[kK] || [];
      if (!aI.length || !aJ.length || !aK.length) return null;
      const rI = Math.floor(Math.random() * aI.length);
      const rJ = Math.floor(Math.random() * aJ.length);
      const rK = Math.floor(Math.random() * aK.length);
      const eI = aI[rI], eJ = aJ[rJ], eK = aK[rK];
      if (!eI || !eJ || !eK) return null;
      if (eI.position === "Supervisor" || eJ.position === "Supervisor" || eK.position === "Supervisor") return null;
      const idSet = new Set([eI.employeeId, eJ.employeeId, eK.employeeId]);
      if (idSet.size !== 3) return null;
      const work = { ...sched };
      work[kI] = aI.filter((_, idx) => idx !== rI);
      work[kJ] = aJ.filter((_, idx) => idx !== rJ);
      work[kK] = aK.filter((_, idx) => idx !== rK);
      // Rotation: eI → J, eJ → K, eK → I
      if (!btCanWorkSlot(eI.employeeId, work, bj.day, bj.shiftId) ||
          !btCanWorkSlot(eJ.employeeId, work, bk.day, bk.shiftId) ||
          !btCanWorkSlot(eK.employeeId, work, bi.day, bi.shiftId)) return null;
      const eIo = empMap.get(eI.employeeId);
      const eJo = empMap.get(eJ.employeeId);
      const eKo = empMap.get(eK.employeeId);
      const pI = btPickPosition(eKo, work[kI], bi.day, bi.shiftId);
      const pJ = btPickPosition(eIo, work[kJ], bj.day, bj.shiftId);
      const pK = btPickPosition(eJo, work[kK], bk.day, bk.shiftId);
      if (!pI || !pJ || !pK) return null;
      work[kI] = [...work[kI], { employeeId: eK.employeeId, position: pI }];
      work[kJ] = [...work[kJ], { employeeId: eI.employeeId, position: pJ }];
      work[kK] = [...work[kK], { employeeId: eJ.employeeId, position: pK }];
      if (!rolePreserved(aI, work[kI]) || !rolePreserved(aJ, work[kJ]) || !rolePreserved(aK, work[kK])) return null;
      return work;
    };

    // ── C3: Large Neighborhood Search (LNS) move ─────────────────────────
    // Unassigns 5–8 related slots, greedily re-fills. Escapes deep local
    // minima unreachable via pair-swap or 3-chain. Three neighborhood
    // selection strategies, picked at random:
    //   • day-based: all 3 shifts on 2 random days (6 slots)
    //   • shift-based: all 7 days for 1 random shift (7 slots)
    //   • employee-based: all slots where a specific employee is assigned (varies)
    const tryLNS = (sched) => {
      const work = { ...sched };
      let targetSlots = [];
      const strategy = Math.random();

      if (strategy < 0.4) {
        // Day-based: 2 random days × 3 shifts = 6 slots
        const d1 = Math.floor(Math.random() * DAYS.length);
        let d2 = Math.floor(Math.random() * DAYS.length);
        if (d1 === d2) d2 = (d2 + 1) % DAYS.length;
        for (const d of [DAYS[d1], DAYS[d2]]) {
          for (const s of SHIFTS) targetSlots.push({ day: d, shiftId: s.id });
        }
      } else if (strategy < 0.7) {
        // Shift-based: 1 random shift × all 7 days = 7 slots
        const s = SHIFTS[Math.floor(Math.random() * SHIFTS.length)];
        for (const d of DAYS) targetSlots.push({ day: d, shiftId: s.id });
      } else {
        // Employee-based: all slots where a random employee is assigned
        const empIds = [...new Set(btSlots.flatMap(sl =>
          (work[cellKey(sl.day, sl.shiftId)] || []).map(a => a.employeeId)
        ))];
        if (!empIds.length) return null;
        const targetEmpId = empIds[Math.floor(Math.random() * empIds.length)];
        for (const sl of btSlots) {
          if ((work[cellKey(sl.day, sl.shiftId)] || []).some(a => a.employeeId === targetEmpId)) {
            targetSlots.push(sl);
          }
        }
        // Also include neighboring slots to give room for rearrangement
        const extraSlots = [];
        for (const sl of targetSlots) {
          const adj = sl.shiftId === "first" ? ["second"] : sl.shiftId === "second" ? ["first", "third"] : ["second"];
          for (const as of adj) {
            if (!targetSlots.some(t => t.day === sl.day && t.shiftId === as) &&
                !extraSlots.some(t => t.day === sl.day && t.shiftId === as)) {
              extraSlots.push({ day: sl.day, shiftId: as });
            }
          }
        }
        // Add up to 2 extra adjacent slots
        for (let i = 0; i < Math.min(2, extraSlots.length); i++) {
          targetSlots.push(extraSlots[Math.floor(Math.random() * extraSlots.length)]);
        }
      }

      if (targetSlots.length < 3) return null;

      // Destroy: collect all employees from target slots, remove non-supervisors
      const displaced = []; // {empId, day, shiftId, position}
      for (const sl of targetSlots) {
        const key = cellKey(sl.day, sl.shiftId);
        const asgn = work[key] || [];
        for (const a of asgn) {
          if (a.position === "Supervisor") continue;
          displaced.push({ empId: a.employeeId, day: sl.day, shiftId: sl.shiftId, position: a.position });
        }
        work[key] = asgn.filter(a => a.position === "Supervisor");
      }

      if (!displaced.length) return null;

      // Repair: greedily re-insert displaced employees into target slots.
      // Sort slots by MRV (fewest current assignees first) for better filling.
      const slotsByMRV = [...targetSlots].sort((a, b) => {
        const cA = (work[cellKey(a.day, a.shiftId)] || []).length;
        const cB = (work[cellKey(b.day, b.shiftId)] || []).length;
        return cA - cB;
      });

      // Shuffle displaced employees so we don't always fill in same order
      for (let i = displaced.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [displaced[i], displaced[j]] = [displaced[j], displaced[i]];
      }

      const placedEmps = new Set();
      for (const sl of slotsByMRV) {
        const key = cellKey(sl.day, sl.shiftId);
        const cap = getSlotCount(sl.day, sl.shiftId);
        const currentCount = (work[key] || []).length;
        const slotsLeft = cap - currentCount;
        if (slotsLeft <= 0) continue;

        // Find best employees to fill this slot
        const slotCandidates = [];
        for (const d of displaced) {
          if (placedEmps.has(d.empId + "__" + sl.day)) continue; // already placed on this day
          const emp = empMap.get(d.empId);
          if (!emp) continue;
          if (!btCanWorkSlot(d.empId, work, sl.day, sl.shiftId)) continue;
          const pos = btPickPosition(emp, work[key] || [], sl.day, sl.shiftId);
          if (!pos) continue;

          // Score: prefer placing employee back on their preferred shift,
          // and filling critical roles (Scale/Medical)
          let score = 0;
          const prefs = emp.preferredShifts || [];
          if (prefs.length && prefs.includes(sl.shiftId)) score -= 50;
          if (prefs.length && !prefs.includes(sl.shiftId)) score += 30;
          if (pos === "Scale" && !slotHasRole(work[key] || [], sourceEmps, "Scale")) score -= 40;
          if (pos === "Medical" && !slotHasRole(work[key] || [], sourceEmps, "Medical")) score -= 40;
          // Prefer FT employees who need hours
          if (emp.employmentType === "full-time") {
            const empPlan = plan[emp.id];
            if (empPlan && empPlan.shiftId === sl.shiftId) score -= 30; // on-plan shift
          }
          slotCandidates.push({ d, emp, pos, score });
        }

        slotCandidates.sort((a, b) => a.score - b.score);

        let placed = 0;
        for (const c of slotCandidates) {
          if (placed >= slotsLeft) break;
          // Re-check position with updated slot state
          const pos = btPickPosition(c.emp, work[key] || [], sl.day, sl.shiftId);
          if (!pos) continue;
          work[key] = [...(work[key] || []), { employeeId: c.d.empId, position: pos }];
          placedEmps.add(c.d.empId + "__" + sl.day);
          placed++;
        }
      }

      // Verify no slot lost coverage (LNS shouldn't make things worse)
      for (const sl of targetSlots) {
        const key = cellKey(sl.day, sl.shiftId);
        const origAsgn = sched[key] || [];
        const newAsgn = work[key] || [];
        if (newAsgn.length < origAsgn.length) return null; // lost bodies, reject
        if (!rolePreserved(origAsgn, newAsgn)) return null; // lost role coverage
      }

      return work;
    };

    // ── SA driver (lexicographic) ───────────────────────────────────────────
    let curScore = btSoftScore(btSchedule);
    let current = { ...btSchedule };
    let bestSchedule = { ...btSchedule };
    let bestScore = [...curScore];

    const SA_ITERATIONS = 8000;
    // T₀ calibrated so ~1 preferred-day-off violation (800pts) has ~20% accept prob
    // initially: exp(-800/500) ≈ 0.20. Cools geometrically to T_final = 1.
    const T0 = 500;
    const T_FINAL = 1;
    const coolingRate = Math.pow(T_FINAL / T0, 1 / SA_ITERATIONS);
    let T = T0;

    let attempts = 0, accepted = 0, uphill = 0, improvements = 0, lnsAccepted = 0;
    for (let iter = 0; iter < SA_ITERATIONS; iter++) {
      attempts++;
      let candidate = null;
      let wasLNS = false;
      if (iter < SA_ITERATIONS / 2) {
        // First half: original 70/30 split — PRNG sequence identical to pre-LNS
        if (Math.random() < 0.7) {
          const iI = Math.floor(Math.random() * btSlots.length);
          let iJ = Math.floor(Math.random() * btSlots.length);
          if (iI === iJ) iJ = (iJ + 1) % btSlots.length;
          candidate = tryPairSwap(current, iI, iJ);
        } else {
          const iI = Math.floor(Math.random() * btSlots.length);
          let iJ = Math.floor(Math.random() * btSlots.length);
          let iK = Math.floor(Math.random() * btSlots.length);
          if (iI === iJ) iJ = (iJ + 1) % btSlots.length;
          if (iK === iI || iK === iJ) iK = (iK + 2) % btSlots.length;
          if (iI === iJ || iJ === iK || iI === iK) { T *= coolingRate; continue; }
          candidate = try3Chain(current, iI, iJ, iK);
        }
      } else {
        // Second half: C3 LNS at ~5%, pair-swap ~66%, 3-chain ~29%
        const r = Math.random();
        if (r < 0.05) {
          candidate = tryLNS(current);
          wasLNS = true;
        } else if (r < 0.71) {
          const iI = Math.floor(Math.random() * btSlots.length);
          let iJ = Math.floor(Math.random() * btSlots.length);
          if (iI === iJ) iJ = (iJ + 1) % btSlots.length;
          candidate = tryPairSwap(current, iI, iJ);
        } else {
          const iI = Math.floor(Math.random() * btSlots.length);
          let iJ = Math.floor(Math.random() * btSlots.length);
          let iK = Math.floor(Math.random() * btSlots.length);
          if (iI === iJ) iJ = (iJ + 1) % btSlots.length;
          if (iK === iI || iK === iJ) iK = (iK + 2) % btSlots.length;
          if (iI === iJ || iJ === iK || iI === iK) { T *= coolingRate; continue; }
          candidate = try3Chain(current, iI, iJ, iK);
        }
      }
      if (!candidate) { T *= coolingRate; continue; }
      const newSc = btSoftScore(candidate);
      // Lexicographic: never accept a move that worsens hard tier.
      // Within same hard tier, use SA acceptance on soft tier.
      const hardDelta = newSc[0] - curScore[0];
      const softDelta = newSc[1] - curScore[1];
      const accept = hardDelta < 0                                        // hard improved → always accept
        || (hardDelta === 0 && (softDelta <= 0 || Math.random() < Math.exp(-softDelta / T))); // same hard → SA on soft
      if (accept) {
        current = candidate;
        curScore = newSc;
        accepted++;
        if (wasLNS) lnsAccepted++;
        if (hardDelta > 0 || (hardDelta === 0 && softDelta > 0)) uphill++;
        else if (hardDelta < 0 || softDelta < 0) improvements++;
        if (lexCmp(curScore, bestScore) < 0) {
          bestScore = [...curScore];
          bestSchedule = { ...current };
        }
      }
      T *= coolingRate;
    }

    // ── Final greedy polish on the best SA result ─────────────────────────
    // SA is random and may leave obvious pairwise wins on the table near the end.
    // A short deterministic pass guarantees monotone convergence at termination.
    current = { ...bestSchedule };
    let polishScore = [...bestScore];
    let polishSwaps = 0;
    for (let round = 0; round < 5; round++) {
      let bestCmp = 0, bestWork = null, bestNewSc = null;
      for (let i = 0; i < btSlots.length; i++) {
        for (let j = i + 1; j < btSlots.length; j++) {
          const si = btSlots[i], sj = btSlots[j];
          const keyI = cellKey(si.day, si.shiftId), keyJ = cellKey(sj.day, sj.shiftId);
          const asgnI = current[keyI] || [], asgnJ = current[keyJ] || [];
          for (let ai = 0; ai < asgnI.length; ai++) {
            for (let aj = 0; aj < asgnJ.length; aj++) {
              const eA = asgnI[ai], eB = asgnJ[aj];
              if (eA.employeeId === eB.employeeId) continue;
              if (eA.position === "Supervisor" || eB.position === "Supervisor") continue;
              const work = { ...current };
              work[keyI] = asgnI.filter((_, idx) => idx !== ai);
              work[keyJ] = asgnJ.filter((_, idx) => idx !== aj);
              if (!btCanWorkSlot(eA.employeeId, work, sj.day, sj.shiftId) ||
                  !btCanWorkSlot(eB.employeeId, work, si.day, si.shiftId)) continue;
              const eAo = empMap.get(eA.employeeId), eBo = empMap.get(eB.employeeId);
              const posA = btPickPosition(eAo, work[keyJ], sj.day, sj.shiftId);
              const posB = btPickPosition(eBo, work[keyI], si.day, si.shiftId);
              if (!posA || !posB) continue;
              work[keyI] = [...work[keyI], { employeeId: eB.employeeId, position: posB }];
              work[keyJ] = [...work[keyJ], { employeeId: eA.employeeId, position: posA }];
              if (!rolePreserved(asgnI, work[keyI]) || !rolePreserved(asgnJ, work[keyJ])) continue;
              const newSc = btSoftScore(work);
              const cmp = lexCmp(newSc, polishScore);  // negative = improvement
              if (cmp < bestCmp) { bestCmp = cmp; bestWork = work; bestNewSc = newSc; }
            }
          }
        }
      }
      if (!bestWork) break;
      current = bestWork;
      polishScore = bestNewSc;
      polishSwaps++;
    }
    if (lexCmp(polishScore, bestScore) < 0) { bestScore = [...polishScore]; bestSchedule = current; }

    // Commit best schedule back to btSchedule
    for (const k of Object.keys(bestSchedule)) btSchedule[k] = bestSchedule[k];
    console.log(`[Phase 2 SA] ${attempts} attempts, ${accepted} accepted (${improvements} improv, ${uphill} uphill, ${lnsAccepted} LNS), +${polishSwaps} polish swaps, final score [hard=${bestScore[0]}, soft=${bestScore[1]}]`);

    // ── Write backtracking results to ns and rebuild tracking state ─────────
    for (const { day, shiftId } of btSlots) {
      const key = cellKey(day, shiftId);
      ns[key] = btSchedule[key] || [];
      // B3: log CSP+SA assignments
      for (const a of ns[key]) {
        logAssign(day, shiftId, a.employeeId, "CSP+SA", `position=${a.position}`);
      }
    }
    sourceEmps.forEach(e => {
      hourTracker[e.id] = 0;
      shiftsWorked[e.id] = 0;
      dayWorked[e.id] = new Set();
    });
    // Re-seed ext shift hours
    (extShiftsArg||[]).forEach(ext => {
      const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
      if (!pair) return;
      if (ext.empAId && hourTracker[ext.empAId] !== undefined) hourTracker[ext.empAId] += extEmpHours(pair, true);
      if (ext.empBId && hourTracker[ext.empBId] !== undefined) hourTracker[ext.empBId] += extEmpHours(pair, false);
    });
    // Count hours from schedule
    for (const { day, shiftId } of btSlots) {
      for (const a of (ns[cellKey(day, shiftId)] || [])) {
        hourTracker[a.employeeId] = (hourTracker[a.employeeId] || 0) + SHIFT_HOURS;
        shiftsWorked[a.employeeId] = (shiftsWorked[a.employeeId] || 0) + 1;
        dayWorked[a.employeeId].add(day);
      }
    }
    // Update domain matrix for post-processing compatibility
    sourceEmps.forEach(emp => {
      for (const day of DAYS) {
        if (dayWorked[emp.id].has(day)) {
          for (const s of SHIFTS) delete domains[emp.id][cellKey(day, s.id)];
        }
      }
      const cap = emp.maxShiftsPerWeek;
      if (cap != null && (shiftsWorked[emp.id] || 0) >= cap) domains[emp.id] = {};
    });
  }
  // ── Shared helpers for Steps 4/5/5b ─────────────────────────────────────
  // These consolidate patterns that were repeated identically across every
  // fill pass: computing the effective slot cap, building the assigned-set
  // (including ext-shift bodies), picking the best position (Scale→Medical→Guard),
  // and updating all tracking state after a placement.

  const slotAssigned = (asgn, day, shiftId) => {
    const s = new Set(asgn.map(a => a.employeeId));
    (extShiftsArg||[]).forEach(ext => {
      const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
      if (!pair) return;
      const idx = pair.covers.indexOf(shiftId);
      if (idx === 0 && ext.empAId) s.add(ext.empAId);
      if (idx === 1 && ext.empBId) s.add(ext.empBId);
      // Split cross-day: empB covers next day's first shift
      if (pair.crossDayB === shiftId && ext.empBId) {
        const nextDay = DAYS[(DAYS.indexOf(ext.day) + 1) % 7];
        if (nextDay === day) s.add(ext.empBId);
      }
    });
    return s;
  };

  const pickPosition = (emp, asgn, day, shiftId) => {
    const ap = getAvailPos(day, shiftId).filter(p => canFillPos(emp, p, day));
    if (!ap.length) return null;
    const nowHasScale   = slotHasRole(asgn, sourceEmps, "Scale");
    const nowHasMedical = slotHasRole(asgn, sourceEmps, "Medical");
    if (!nowHasScale   && ap.includes("Scale"))   return "Scale";
    if (!nowHasMedical && ap.includes("Medical")) return "Medical";
    if (ap.includes("Guard")) return "Guard";
    return ap[0];
  };

  const weekendCapHit = (emp, day) => {
    if (!["Saturday","Sunday"].includes(day)) return false;
    if (emp.maxWeekendDays == null) return false;
    const worked = [...(dayWorked[emp.id]||new Set())]
      .filter(d => ["Saturday","Sunday"].includes(d)).length;
    return worked >= emp.maxWeekendDays;
  };



  // ── Steps 4/5/5b: Shared makeup helper ────────────────────────────────────
  // Fills open slots for a given employment type, respecting all hard constraints.
  // Called once each for FT makeup (40h guarantee), PT fill, and OC fill.
  const fillPass = (empType, opts = {}) => {
    const { capAt40 = false, shiftLocked = true, isOnCall = false } = opts;
    for (const day of DAYS) {
      for (const shift of SHIFTS) {
        const key  = cellKey(day, shift.id);
        const asgn = ns[key] || [];
        const cap  = slotCap(day, shift.id);
        if (asgn.length >= cap) continue;
        const assigned = slotAssigned(asgn, day, shift.id);

        const candidates = sourceEmps
          .filter(e => {
            if (e.employmentType !== empType) return false;
            if (assigned.has(e.id)) return false;
            if (capAt40 && (hourTracker[e.id]||0) >= FT_MIN_HOURS) return false;
            if (shiftLocked) {
              const empPlan = plan[e.id];
              if (empPlan && empPlan.shiftId !== shift.id) return false;
            } else {
              const prefs = e.preferredShifts || [];
              if (prefs.length > 0 && !prefs.includes(shift.id)) return false;
            }
            if ((e.unavailableDays||[]).includes(day)) return false;
            if (empTimeOffDays && empTimeOffDays.has(e.id + "__" + day)) return false;
            if ((e.blockedShifts||[]).includes(shift.id)) return false;
            if (e.requiredShift && e.requiredShift !== shift.id) return false;
            if (isRestViolation(e, rg(e.id, ns, day, shift.id), minRest)) return false;
            if (calcConsecutiveHours(e.id, ns, day, shift.id, extShiftsArg) > empMaxConsec(e)) return false;
            if (shift.id === "third" && calcConsecutiveNights(e.id, ns, day, shift.id) >= maxNights) return false;
            if (!getAvailPos(day, shift.id).some(p => e.qualifications.includes(p))) return false;
            if (e.maxShiftsPerWeek !== null && (shiftsWorked[e.id]||0) >= e.maxShiftsPerWeek) return false;
            return true;
          })
          .sort((a, b) => {
            const sa = empScore(a, day, shift.id, null);
            const sb = empScore(b, day, shift.id, null);
            const scoreA = sa == null ? 999999 : sa;
            const scoreB = sb == null ? 999999 : sb;
            if (scoreA !== scoreB) return scoreA - scoreB;
            return (hourTracker[a.id]||0) - (hourTracker[b.id]||0);
          });
        for (const emp of candidates) {
          if (asgn.length >= cap) break;
          const pos = pickPosition(emp, asgn, day, shift.id);
          if (!pos) continue;
          // Guard-only preference handled by backtracking; post-processing is last resort
          if (weekendCapHit(emp, day)) continue;
          hourTracker[emp.id]  = (hourTracker[emp.id]  || 0) + SHIFT_HOURS;
          shiftsWorked[emp.id] = (shiftsWorked[emp.id] || 0) + 1;
          dayWorked[emp.id].add(day);
          asgn.push({ employeeId: emp.id, position: pos, ...(isOnCall ? { isOnCall: true } : {}) });
          assigned.add(emp.id);
          logAssign(day, shift.id, emp.id, "fillPass", `type=${empType} pos=${pos}${capAt40?" capAt40":""}${isOnCall?" OC":""}`);
        }
        ns[key] = asgn;
      }
    }
  };

  // Step 4: FT makeup — ensure 40h, up to 4 sweeps.
  // First 2 sweeps: planned shift only (normal case).
  // If any FT employee is still short after 2 sweeps, do 2 more with shiftLocked:false
  // so they can pick up any available slot on their off-shift days rather than stay short.
  for (let sweep = 0; sweep < 4; sweep++) {
    if (!sourceEmps.some(e => e.employmentType === "full-time" && (hourTracker[e.id]||0) < FT_MIN_HOURS)) break;
    fillPass("full-time", { capAt40: true, shiftLocked: sweep < 2 });
  }
  // ── Step 4b: FT double-shift top-off (willing16h only) ─────────────────────
  // For FT employees still under 40h who are willing to work 16h, assign them
  // to the shift adjacent to a day they already work — up to 40h total.
  {
    const ADJACENT = { first: ["second"], second: ["first", "third"], third: ["second"] };
    for (const emp of sourceEmps) {
      if (emp.employmentType !== "full-time") continue;
      if (!emp.willing16h) continue;
      if ((hourTracker[emp.id] || 0) >= FT_MIN_HOURS) continue;
      if (emp.maxShiftsPerWeek != null && (shiftsWorked[emp.id] || 0) >= emp.maxShiftsPerWeek) continue;
      const empPlan = plan[emp.id];
      const plannedShift = empPlan?.shiftId;
      if (!plannedShift) continue;
      const adjShifts = ADJACENT[plannedShift] || [];
      for (const day of DAYS) {
        if ((hourTracker[emp.id] || 0) >= FT_MIN_HOURS) break;
        if (emp.maxShiftsPerWeek != null && (shiftsWorked[emp.id] || 0) >= emp.maxShiftsPerWeek) break;
        const primaryKey = cellKey(day, plannedShift);
        const alreadyOnPrimary = (ns[primaryKey] || []).some(a => a.employeeId === emp.id);
        if (!alreadyOnPrimary) continue;
        if ((emp.unavailableDays || []).includes(day)) continue;
        if (empTimeOffDays && empTimeOffDays.has(emp.id + "__" + day)) continue;
        for (const adjShift of adjShifts) {
          if ((hourTracker[emp.id] || 0) >= FT_MIN_HOURS) break;
          if (emp.maxShiftsPerWeek != null && (shiftsWorked[emp.id] || 0) >= emp.maxShiftsPerWeek) break;
          if ((emp.blockedShifts || []).includes(adjShift)) continue;
          const adjKey = cellKey(day, adjShift);
          const adjAsgn = ns[adjKey] || [];
          const cap = slotCap(day, adjShift);
          if (adjAsgn.length >= cap) continue;
          if (adjAsgn.some(a => a.employeeId === emp.id)) continue;
          const gap = rg(emp.id, ns, day, adjShift);
          if (isRestViolation(emp, gap, minRest)) continue;
          if (calcConsecutiveHours(emp.id, ns, day, adjShift, extShiftsArg) > MAX_CONSECUTIVE_HOURS) continue;
          const pos = pickPosition(emp, adjAsgn, day, adjShift);
          if (!pos) continue;
          hourTracker[emp.id]  = (hourTracker[emp.id]  || 0) + SHIFT_HOURS;
          shiftsWorked[emp.id] = (shiftsWorked[emp.id] || 0) + 1;
          dayWorked[emp.id].add(day);
          adjAsgn.push({ employeeId: emp.id, position: pos });
          ns[adjKey] = adjAsgn;
          logAssign(day, adjShift, emp.id, "Step4b", `willing16h double on ${plannedShift}+${adjShift}`);
        }
      }
    }
  }

  // Step 5: PT fill — preferred shift only
  fillPass("part-time", { shiftLocked: false });
  // Step 5b: On-call fill — last resort
  fillPass("on-call", { shiftLocked: false, isOnCall: true });

  // ── Step 4c: OC→FT substitution pass ────────────────────────────────────────
  // Find slots where on-call employees fill Guard positions while FT Guard employees
  // are still under 40h. Swap the on-call out for the FT employee.
  for (const day of DAYS) {
    for (const shift of SHIFTS) {
      const key  = cellKey(day, shift.id);
      const asgn = ns[key] || [];
      for (let ai = 0; ai < asgn.length; ai++) {
        const slot = asgn[ai];
        const ocEmp = sourceEmps.find(e => e.id === slot.employeeId);
        if (!ocEmp || ocEmp.employmentType !== "on-call") continue;
        if (slot.position !== "Guard") continue;
        const replacement = sourceEmps.find(e => {
          if (e.employmentType !== "full-time") return false;
          if ((hourTracker[e.id] || 0) >= FT_MIN_HOURS) return false;
          if (e.maxShiftsPerWeek != null && (shiftsWorked[e.id] || 0) >= e.maxShiftsPerWeek) return false;
          if (asgn.some(a => a.employeeId === e.id)) return false;
          if ((e.unavailableDays || []).includes(day)) return false;
          if (empTimeOffDays && empTimeOffDays.has(e.id + "__" + day)) return false;
          if ((e.blockedShifts || []).includes(shift.id)) return false;
          if (e.requiredShift && e.requiredShift !== shift.id) return false;
          if (!e.qualifications.includes("Guard")) return false;
          if (isRestViolation(e, rg(e.id, ns, day, shift.id), minRest)) return false;
          if (calcConsecutiveHours(e.id, ns, day, shift.id, extShiftsArg) > empMaxConsec(e)) return false;
          if (shift.id === "third" && calcConsecutiveNights(e.id, ns, day, shift.id) >= maxNights) return false;
          return true;
        });
        if (!replacement) continue;
        asgn[ai] = { employeeId: replacement.id, position: "Guard" };
        hourTracker[ocEmp.id]        = Math.max(0, (hourTracker[ocEmp.id] || 0) - SHIFT_HOURS);
        shiftsWorked[ocEmp.id]       = Math.max(0, (shiftsWorked[ocEmp.id] || 0) - 1);
        hourTracker[replacement.id]  = (hourTracker[replacement.id] || 0) + SHIFT_HOURS;
        shiftsWorked[replacement.id] = (shiftsWorked[replacement.id] || 0) + 1;
        dayWorked[replacement.id].add(day);
        ns[key] = asgn;
        logAssign(day, shift.id, replacement.id, "Step4c", `OC→FT sub replacing ${ocEmp.name}`);
      }
    }
  }

  // ── Step 5e: Ripple Effect Cascade ───────────────────────────────────────────
  // When FT employees are still under 40h after all fill passes, cascade-displace
  // PT/OC employees from filled slots to make room, then relocate the displaced
  // body to a vacant slot elsewhere — so the FT guarantee is met without leaving
  // the displaced employee stranded (their hours stay the same, just different day).
  //
  // 1-hop ripple per iteration; up to MAX_RIPPLE_PASSES sweeps.
  // Runs before role-enforcement (5c) and DLS (5d) so they can repair any
  // role-coverage side-effects the ripple creates.
  {
    const MAX_RIPPLE_PASSES = 3;

    for (let pass = 0; pass < MAX_RIPPLE_PASSES; pass++) {
      const underFT = sourceEmps
        .filter(e => e.employmentType === "full-time" &&
                     !(e.qualifications||[]).includes("Supervisor") &&
                     (hourTracker[e.id]||0) < FT_MIN_HOURS)
        .sort((a, b) => (hourTracker[a.id]||0) - (hourTracker[b.id]||0)); // most under-hours first

      if (!underFT.length) break;
      let rippleThisPass = false;

      for (const ftEmp of underFT) {
        if ((hourTracker[ftEmp.id]||0) >= FT_MIN_HOURS) continue;
        const empPlan = plan[ftEmp.id];
        let ripped = false;

        for (const day of DAYS) {
          if (ripped) break;
          if (dayWorked[ftEmp.id].has(day)) continue; // already working this day

          for (const shift of SHIFTS) {
            if (ripped) break;
            // FT employees stay on their planned shift
            if (empPlan && shift.id !== empPlan.shiftId) continue;

            const key  = cellKey(day, shift.id);
            const asgn = ns[key] || [];
            if (!asgn.length) continue; // nothing to displace

            // FT employee must be eligible for this slot
            if (ftEmp.maxShiftsPerWeek != null && (shiftsWorked[ftEmp.id] || 0) >= ftEmp.maxShiftsPerWeek) continue;
            if ((ftEmp.unavailableDays||[]).includes(day)) continue;
            if (empTimeOffDays && empTimeOffDays.has(ftEmp.id + "__" + day)) continue;
            if (isRestViolation(ftEmp, rg(ftEmp.id, ns, day, shift.id), minRest)) continue;
            if (calcConsecutiveHours(ftEmp.id, ns, day, shift.id, extShiftsArg) > empMaxConsec(ftEmp)) continue;
            if (shift.id === "third" && calcConsecutiveNights(ftEmp.id, ns, day, shift.id) >= maxNights) continue;
            const ftAp = getAvailPos(day, shift.id).filter(p => canFillPos(ftEmp, p, day));
            if (!ftAp.length) continue;

            // Find a PT or on-call employee in this slot to displace
            const displaceIdx = asgn.findIndex(a => {
              const e = sourceEmps.find(x => x.id === a.employeeId);
              return e && (e.employmentType === "part-time" || e.employmentType === "on-call");
            });
            if (displaceIdx === -1) continue;

            const displaced    = asgn[displaceIdx];
            const displacedEmp = sourceEmps.find(x => x.id === displaced.employeeId);
            if (!displacedEmp) continue;

            // Find a valid vacant (or under-capacity) slot to relocate the displaced employee
            let relocateKey = null, relocateDay = null, relocateShift = null, relocatePos = null;

            for (const rDay of DAYS) {
              if (relocateKey) break;
              if (rDay === day) continue; // skip same day (employee just worked it)
              if (dayWorked[displacedEmp.id].has(rDay)) continue; // already working this day
              for (const rShift of SHIFTS) {
                if (relocateKey) break;
                const rKey   = cellKey(rDay, rShift.id);
                const rAsgn  = ns[rKey] || [];
                const rCount = rAsgn.filter(a => a.position !== "Supervisor").length;
                if (rCount >= slotCap(rDay, rShift.id)) continue; // slot full
                if ((displacedEmp.unavailableDays||[]).includes(rDay)) continue;
                if (empTimeOffDays && empTimeOffDays.has(displacedEmp.id + "__" + rDay)) continue;
                if ((displacedEmp.blockedShifts||[]).includes(rShift.id)) continue;
                if (displacedEmp.requiredShift && displacedEmp.requiredShift !== rShift.id) continue;
                if (isRestViolation(displacedEmp, rg(displacedEmp.id, ns, rDay, rShift.id), minRest)) continue;
                if (calcConsecutiveHours(displacedEmp.id, ns, rDay, rShift.id, extShiftsArg) > empMaxConsec(displacedEmp)) continue;
                const rAp = getAvailPos(rDay, rShift.id).filter(p => canFillPos(displacedEmp, p, rDay));
                if (!rAp.length) continue;
                relocateKey   = rKey;
                relocateDay   = rDay;
                relocateShift = rShift;
                relocatePos   = rAp.includes("Guard") ? "Guard" : rAp[0];
              }
            }

            if (!relocateKey) continue; // nowhere to put the displaced employee — skip

            // Determine position for FT employee taking the vacated slot
            const remainingAsgn = asgn.filter((_, i) => i !== displaceIdx);
            const nowHasScale   = slotHasRole(remainingAsgn, sourceEmps, "Scale");
            const nowHasMedical = slotHasRole(remainingAsgn, sourceEmps, "Medical");
            let ftPos;
            if      (!nowHasScale   && ftAp.includes("Scale"))   ftPos = "Scale";
            else if (!nowHasMedical && ftAp.includes("Medical")) ftPos = "Medical";
            else if (ftAp.includes("Guard"))                     ftPos = "Guard";
            else ftPos = ftAp[0];

            // ── Perform the ripple ──
            // Remove displaced PT/OC from original slot, insert FT employee
            if (remainingAsgn.some(a => a.employeeId === ftEmp.id)) continue; // already in slot
            ns[key] = [...remainingAsgn, { employeeId: ftEmp.id, position: ftPos }];
            hourTracker[displacedEmp.id]  = Math.max(0, (hourTracker[displacedEmp.id]||0) - SHIFT_HOURS);
            shiftsWorked[displacedEmp.id] = Math.max(0, (shiftsWorked[displacedEmp.id]||0) - 1);
            dayWorked[displacedEmp.id]?.delete(day);

            // Place displaced PT/OC in their new slot
            if ((ns[relocateKey]||[]).some(a => a.employeeId === displacedEmp.id)) continue; // already in slot
            ns[relocateKey] = [...(ns[relocateKey]||[]), { employeeId: displacedEmp.id, position: relocatePos }];
            hourTracker[displacedEmp.id]  = (hourTracker[displacedEmp.id]||0) + SHIFT_HOURS;
            shiftsWorked[displacedEmp.id] = (shiftsWorked[displacedEmp.id]||0) + 1;
            (dayWorked[displacedEmp.id] = dayWorked[displacedEmp.id] || new Set()).add(relocateDay);

            // Update FT employee tracking
            hourTracker[ftEmp.id]  = (hourTracker[ftEmp.id]||0) + SHIFT_HOURS;
            shiftsWorked[ftEmp.id] = (shiftsWorked[ftEmp.id]||0) + 1;
            dayWorked[ftEmp.id].add(day);

            console.log(`[Ripple] ${ftEmp.name} (FT, ${hourTracker[ftEmp.id]}h) takes ${day}/${shift.id} from ${displacedEmp.name} → ${displacedEmp.name} relocated to ${relocateDay}/${relocateShift.id}`);
            logAssign(day, shift.id, ftEmp.id, "Step5e", `ripple: displaced ${displacedEmp.name} to ${relocateDay}/${relocateShift.id}`);
            logAssign(relocateDay, relocateShift.id, displacedEmp.id, "Step5e", `ripple: relocated from ${day}/${shift.id}`);
            ripped = rippleThisPass = true;
          }
        }
      }
      if (!rippleThisPass) break;
    }
  }

  // ── Step 5c: Role-enforcement swap pass ───────────────────────────────────
  // Business rule: every shift MUST have Scale AND Medical coverage.
  // If a slot is full but missing a required role, swap out a Guard-only body
  // for the cheapest available qualified replacement.
  for (const day of DAYS) {
    for (const shift of SHIFTS) {
      const key  = cellKey(day, shift.id);
      const asgn = ns[key] || [];
      if (!asgn.length) continue;

      const activeExts = (extShiftsArg||[]).filter(e => extCovers(e, day, shift.id));
      const hasScale   = slotHasRole(asgn, sourceEmps, "Scale")   || activeExts.some(e=>(e.roles||[]).includes("Scale"));
      const hasMedical = slotHasRole(asgn, sourceEmps, "Medical") || activeExts.some(e=>(e.roles||[]).includes("Medical"));

      for (const missingRole of [
        ...(!hasScale   ? ["Scale"]   : []),
        ...(!hasMedical ? ["Medical"] : []),
      ]) {
        const cap = slotCap(day, shift.id);
        const currentAsgn = ns[key] || [];

        // Find a Guard-only body in this slot we can swap out
        const swapOutIdx = currentAsgn.findIndex(a => {
          const e = sourceEmps.find(x => x.id === a.employeeId);
          return e && isGuardOnly(e);
        });

        // Find a replacement who covers the missing role
        const assigned = new Set(currentAsgn.map(a => a.employeeId));
        const replacement = sourceEmps.find(e => {
          if (assigned.has(e.id)) return false;
          if (!(e.qualifications||[]).includes(missingRole)) return false;
          if ((e.unavailableDays||[]).includes(day)) return false;
          if (empTimeOffDays && empTimeOffDays.has(e.id + "__" + day)) return false;
          if ((e.blockedShifts||[]).includes(shift.id)) return false;
          if (e.requiredShift && e.requiredShift !== shift.id) return false;
          if (e.maxShiftsPerWeek != null && (shiftsWorked[e.id] || 0) >= e.maxShiftsPerWeek) return false;
          if (isRestViolation(e, rg(e.id, ns, day, shift.id), minRest)) return false;
          if (calcConsecutiveHours(e.id, ns, day, shift.id, extShiftsArg) > empMaxConsec(e)) return false;
          return true;
        });

        if (!replacement) continue; // no one available — gap remains, surfaces as violation

        if (swapOutIdx !== -1) {
          // Swap: remove Guard-only body, insert replacement
          const removed = currentAsgn[swapOutIdx];
          const removedEmp = sourceEmps.find(x => x.id === removed.employeeId);
          ns[key] = [
            ...currentAsgn.slice(0, swapOutIdx),
            { employeeId: replacement.id, position: missingRole },
            ...currentAsgn.slice(swapOutIdx + 1),
          ];
          if (removedEmp) {
            hourTracker[removedEmp.id] = Math.max(0, (hourTracker[removedEmp.id]||0) - SHIFT_HOURS);
            shiftsWorked[removedEmp.id] = Math.max(0, (shiftsWorked[removedEmp.id]||0) - 1);
          }
        } else if (currentAsgn.length < cap) {
          // Slot not full — just add the replacement
          ns[key] = [...currentAsgn, { employeeId: replacement.id, position: missingRole }];
        } else {
          continue; // slot full, no Guard-only to swap — gap remains
        }
        hourTracker[replacement.id]  = (hourTracker[replacement.id]  || 0) + SHIFT_HOURS;
        shiftsWorked[replacement.id] = (shiftsWorked[replacement.id] || 0) + 1;
        dayWorked[replacement.id].add(day);
        logAssign(day, shift.id, replacement.id, "Step5c", `role-enforce: added ${missingRole} coverage`);
      }
    }
  }

  // ── Step 5d: Directed Local Search (Smart Swapping) ─────────────────────────
  // When a slot is still missing Scale or Medical after 5c, and no fresh employee
  // is available (all qualified staff are already at cap or scheduled elsewhere),
  // attempt a targeted 2-hop chain swap:
  //   1. Find a qualified employee already scheduled in a DIFFERENT slot that week.
  //   2. Check whether a substitute (Guard or other eligible body) can take their
  //      current slot — keeping that slot's headcount and roles intact.
  //   3. If yes: move the qualified employee to the gap, put the sub in their old slot.
  // Hours/shifts/dayWorked are updated to reflect the swap so all downstream
  // tracking remains consistent.
  {
    const MAX_DLS_PASSES = 3; // re-scan after each swap in case one swap unlocks another

    const slotMissingRoles = () => {
      const gaps = [];
      for (const day of DAYS) {
        for (const shift of SHIFTS) {
          const key  = cellKey(day, shift.id);
          const asgn = ns[key] || [];
          if (!asgn.length) continue;
          const activeExts = (extShiftsArg||[]).filter(e => extCovers(e, day, shift.id));
          const hasScale   = slotHasRole(asgn, sourceEmps, "Scale")   || activeExts.some(e=>(e.roles||[]).includes("Scale"));
          const hasMedical = slotHasRole(asgn, sourceEmps, "Medical") || activeExts.some(e=>(e.roles||[]).includes("Medical"));
          if (!hasScale)   gaps.push({ day, shift, key, role: "Scale"   });
          if (!hasMedical) gaps.push({ day, shift, key, role: "Medical" });
        }
      }
      return gaps;
    };

    for (let pass = 0; pass < MAX_DLS_PASSES; pass++) {
      const gaps = slotMissingRoles();
      if (!gaps.length) break;
      let swappedThisPass = false;

      for (const { day: gapDay, shift: gapShift, key: gapKey, role: neededRole } of gaps) {
        const gapAsgn = ns[gapKey] || [];
        const cap     = slotCap(gapDay, gapShift.id);

        // ── Find a donor: qualified employee already assigned somewhere else ──
        let swapDone = false;
        for (const donor of sourceEmps) {
          if (swapDone) break;
          if (!(donor.qualifications||[]).includes(neededRole)) continue;
          if ((donor.unavailableDays||[]).includes(gapDay)) continue;
          if (empTimeOffDays && empTimeOffDays.has(donor.id + "__" + gapDay)) continue;
          if ((donor.blockedShifts||[]).includes(gapShift.id)) continue;
          if (donor.requiredShift && donor.requiredShift !== gapShift.id) continue;
          if (isRestViolation(donor, rg(donor.id, ns, gapDay, gapShift.id), minRest)) continue;
          if (calcConsecutiveHours(donor.id, ns, gapDay, gapShift.id, extShiftsArg) > empMaxConsec(donor)) continue;

          // Already filling the gap slot? Skip.
          if (gapAsgn.some(a => a.employeeId === donor.id)) continue;

          // Find the donor's current scheduled slot this week (any day/shift)
          let donorSourceKey = null, donorSourceDay = null, donorSourceShift = null;
          for (const d of DAYS) {
            if (donorSourceKey) break;
            for (const s of SHIFTS) {
              const k = cellKey(d, s.id);
              if ((ns[k]||[]).some(a => a.employeeId === donor.id)) {
                donorSourceKey   = k;
                donorSourceDay   = d;
                donorSourceShift = s;
                break;
              }
            }
          }
          if (!donorSourceKey) continue; // donor not scheduled at all — should be caught by earlier passes

          // Same slot as the gap? Would be a no-op.
          if (donorSourceKey === gapKey) continue;

          // ── Find a substitute who can cover the donor's vacated slot ──
          const donorSourceAsgn = ns[donorSourceKey] || [];
          const donorEntry      = donorSourceAsgn.find(a => a.employeeId === donor.id);
          const vacatedPosition = donorEntry?.position || "Guard";

          // The sub must be able to fill the vacated position (or Guard as fallback)
          // and must not already be in that slot or exceed their constraints.
          const sub = sourceEmps.find(sub => {
            if (sub.id === donor.id) return false;
            if (donorSourceAsgn.some(a => a.employeeId === sub.id)) return false;
            if ((sub.unavailableDays||[]).includes(donorSourceDay)) return false;
            if (empTimeOffDays && empTimeOffDays.has(sub.id + "__" + donorSourceDay)) return false;
            if ((sub.blockedShifts||[]).includes(donorSourceShift.id)) return false;
            if (sub.requiredShift && sub.requiredShift !== donorSourceShift.id) return false;
            // Check the sub can fill the vacated role (or at least Guard)
            const subAp = getAvailPos(donorSourceDay, donorSourceShift.id).filter(p => canFillPos(sub, p, donorSourceDay));
            if (!subAp.includes(vacatedPosition) && !subAp.includes("Guard")) return false;
            if (isRestViolation(sub, rg(sub.id, ns, donorSourceDay, donorSourceShift.id), minRest)) return false;
            if (calcConsecutiveHours(sub.id, ns, donorSourceDay, donorSourceShift.id, extShiftsArg) > empMaxConsec(sub)) return false;
            // Respect weekly shift cap
            const subCap = sub.maxShiftsPerWeek;
            if (subCap !== null && subCap !== undefined && (shiftsWorked[sub.id]||0) >= subCap) return false;
            return true;
          });

          if (!sub) continue; // can't free this donor without leaving their slot uncovered

          // ── Perform the swap ──
          const subAp = getAvailPos(donorSourceDay, donorSourceShift.id).filter(p => canFillPos(sub, p, donorSourceDay));
          const subPos = subAp.includes(vacatedPosition) ? vacatedPosition : (subAp.includes("Guard") ? "Guard" : subAp[0]);

          // Remove donor from source slot, insert sub
          ns[donorSourceKey] = donorSourceAsgn
            .filter(a => a.employeeId !== donor.id)
            .concat({ employeeId: sub.id, position: subPos });

          // Add donor to gap slot (or replace a Guard-only body if slot is full)
          if (gapAsgn.length < cap) {
            ns[gapKey] = [...gapAsgn, { employeeId: donor.id, position: neededRole }];
          } else {
            // Slot is full — swap out a Guard-only body to make room
            const evictIdx = gapAsgn.findIndex(a => {
              const e = sourceEmps.find(x => x.id === a.employeeId);
              return e && isGuardOnly(e);
            });
            if (evictIdx === -1) {
              // Can't evict anyone — undo source-slot change and move on
              ns[donorSourceKey] = donorSourceAsgn;
              continue;
            }
            const evicted = gapAsgn[evictIdx];
            const evictedEmp = sourceEmps.find(x => x.id === evicted.employeeId);
            ns[gapKey] = [
              ...gapAsgn.slice(0, evictIdx),
              { employeeId: donor.id, position: neededRole },
              ...gapAsgn.slice(evictIdx + 1),
            ];
            // Update hour/shift tracking for evicted employee
            if (evictedEmp) {
              hourTracker[evictedEmp.id]   = Math.max(0, (hourTracker[evictedEmp.id]||0)   - SHIFT_HOURS);
              shiftsWorked[evictedEmp.id]  = Math.max(0, (shiftsWorked[evictedEmp.id]||0)  - 1);
              dayWorked[evictedEmp.id]?.delete(gapDay);
            }
          }

          // Update hour/shift tracking for donor (source → gap, same total hours)
          hourTracker[donor.id]  = (hourTracker[donor.id]||0); // net change = 0
          shiftsWorked[donor.id] = (shiftsWorked[donor.id]||0); // net = 0 (removed from one, added to another)
          dayWorked[donor.id]?.delete(donorSourceDay);
          dayWorked[donor.id]?.add(gapDay);

          // Update hour/shift tracking for sub (new assignment)
          hourTracker[sub.id]   = (hourTracker[sub.id]||0)  + SHIFT_HOURS;
          shiftsWorked[sub.id]  = (shiftsWorked[sub.id]||0) + 1;
          (dayWorked[sub.id] = dayWorked[sub.id] || new Set()).add(donorSourceDay);

          console.log(`[DLS] Swap: ${donor.name} freed from ${donorSourceDay}/${donorSourceShift.id} → fills ${neededRole} on ${gapDay}/${gapShift.id} | Sub: ${sub.name} covers vacated slot`);
          logAssign(gapDay, gapShift.id, donor.id, "Step5d", `DLS: moved from ${donorSourceDay}/${donorSourceShift.id} for ${neededRole}`);
          logAssign(donorSourceDay, donorSourceShift.id, sub.id, "Step5d", `DLS: sub covering ${donor.name}'s vacated slot`);
          swapDone        = true;
          swappedThisPass = true;
        }
      }
      if (!swappedThisPass) break; // no progress — stop scanning
    }
  }

  // Capture each FT employee's blockStart + shiftId for week-to-week continuity.
  // Only FT employees get rotation-tracked; PT and on-call are fill-as-available.
  const usedPatterns = {};
  Object.keys(plan).forEach(empId => {
    const p    = plan[empId];
    const emp  = sourceEmps.find(e => e.id === empId);
    if (!emp || emp.employmentType !== "full-time") return;
    // Count trailing consecutive days worked at end of this week for next week's cross-boundary check
    let trailingDays = 0;
    for (let i = DAYS.length - 1; i >= 0; i--) {
      const worked = SHIFTS.some(s => (ns[cellKey(DAYS[i], s.id)]||[]).some(a => a.employeeId === empId));
      if (worked) trailingDays++; else break;
    }
    usedPatterns[empId] = { blockStart: p.blockStart ?? 0, shiftId: p.shiftId, trailingDays };
  });
  // ── Step 6: Violation minimizer pass ────────────────────────────────────
  const { fixCount } = violationMinimizerPass(
    ns, sourceEmps, cfg, empTimeOffDays, extShiftsArg, plan, hourTracker, shiftsWorked
  );
  if (fixCount > 0) {
    console.log("[AutoFill] Violation minimizer fixed " + fixCount + " slot(s)");
    // B3: mark any new/changed assignments from Step 6
    for (const day of DAYS) for (const shift of SHIFTS) {
      for (const a of (ns[cellKey(day, shift.id)] || [])) {
        const logKey = day + "__" + shift.id + "__" + a.employeeId;
        if (!assignLog[logKey]) logAssign(day, shift.id, a.employeeId, "Step6", "violation minimizer swap");
      }
    }
  }

  // ── Final dedup safety net: remove duplicate employee entries in any slot ──
  for (const day of DAYS) {
    for (const shift of SHIFTS) {
