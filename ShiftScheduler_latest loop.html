function HistoryBar({ viewingHistory, setViewingHistory, liveSchedule, liveWeekStart }) {
  const t = useTheme();
  const { history } = useHistory();
  const { setSchedule, setWeekStart } = useSchedule();
  if (!history || history.length === 0) return null;
  const sorted = [...history].sort((a,b) => (b.savedAtISO||b.weekStart||"").localeCompare(a.savedAtISO||a.weekStart||""));
  const currentHistIdx = viewingHistory
    ? sorted.findIndex(h => h.weekStart === viewingHistory.weekStart && h.savedAt === viewingHistory.savedAt)
    : -1;
  const canPrev = viewingHistory ? currentHistIdx > 0 : false;
  const canNext = viewingHistory ? currentHistIdx < sorted.length - 1 : false;
  const historyLabel = (h) => {
    const prefix = h.isAutoSave ? "Auto" : "Saved";
    return `${prefix}: ${h.weekStart||""} ${h.label ? "· "+h.label : ""}`.trim();
  };
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,fontSize:11,flexWrap:"wrap"}}>
      <span style={{color:"var(--ss-text-dim)",fontWeight:600}}>History:</span>
      <button
        onClick={() => {
          if (viewingHistory && currentHistIdx > 0) setViewingHistory(sorted[currentHistIdx-1]);
        }}
        disabled={!canPrev}
        style={{background:"transparent",border:"1px solid var(--ss-border)",color:canPrev?"var(--ss-text)":"var(--ss-text-dim)",
          padding:"2px 8px",borderRadius:4,cursor:canPrev?"pointer":"default",fontSize:11}}>
        ◀
      </button>
      <select
        value={viewingHistory ? currentHistIdx : "__live__"}
        onChange={e => {
          const v = e.target.value;
          if (v === "__live__") {
            setViewingHistory(null);
            if (liveSchedule) setSchedule(liveSchedule);
            if (liveWeekStart) setWeekStart(liveWeekStart);
          } else {
            setViewingHistory(sorted[parseInt(v)]);
          }
        }}
        style={{fontSize:11,padding:"2px 6px",borderRadius:4,border:"1px solid var(--ss-border)",
          background:"var(--ss-surface-alt)",color:"var(--ss-text)",flex:1,minWidth:160}}>
        <option value="__live__">▶ Current (live)</option>
        {sorted.map((h,i) => (
          <option key={i} value={i}>{historyLabel(h)}</option>
        ))}
      </select>
      <button
        onClick={() => {
          if (viewingHistory && canNext) setViewingHistory(sorted[currentHistIdx+1]);
        }}
        disabled={!canNext}
        style={{background:"transparent",border:"1px solid var(--ss-border)",color:canNext?"var(--ss-text)":"var(--ss-text-dim)",
          padding:"2px 8px",borderRadius:4,cursor:canNext?"pointer":"default",fontSize:11}}>
        ▶
      </button>
      {viewingHistory && (
        <button
          onClick={() => {
            setViewingHistory(null);
            if (liveSchedule) setSchedule(liveSchedule);
            if (liveWeekStart) setWeekStart(liveWeekStart);
          }}
          style={{background:"var(--ss-accent-22)",border:"1px solid var(--ss-accent)",color:"var(--ss-accent)",
            padding:"2px 8px",borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:700}}>
          ✕ Exit History
        </button>
      )}
    </div>
  );
}

function WeekPickerBar({ weekStart, setWeekStart, stepWeek, t }) {
  const [y,m,d] = (weekStart||"2024-01-07").split("-").map(Number);
  const sun = new Date(y, m-1, d, 12);
  const fmtHeader = (offset) => {
    const dt = new Date(sun);
    dt.setDate(sun.getDate() + offset);
    const mm = String(dt.getMonth()+1).padStart(2,"0");
    const dd = String(dt.getDate()).padStart(2,"0");
    return mm+"/"+dd;
  };
  const monthName = sun.toLocaleString("default", { month:"long", year:"numeric" });
  window.__schedWeekDates = [0,1,2,3,4,5,6].map(fmtHeader);
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:12,fontSize:11,flexWrap:"wrap"}}>
      <button onClick={() => stepWeek(-1)}
        style={{background:"var(--ss-surface-alt)",border:"1px solid var(--ss-border)",color:"var(--ss-text)",
          padding:"4px 12px",borderRadius:5,cursor:"pointer",fontSize:13,fontWeight:700}}>
        ‹
      </button>
      <span style={{fontSize:13,fontWeight:700,color:"var(--ss-text)",minWidth:160,textAlign:"center"}}>
        {monthName} — Week of {fmtHeader(0)}
      </span>
      <button onClick={() => stepWeek(1)}
        style={{background:"var(--ss-surface-alt)",border:"1px solid var(--ss-border)",color:"var(--ss-text)",
          padding:"4px 12px",borderRadius:5,cursor:"pointer",fontSize:13,fontWeight:700}}>

      <span style={{fontSize:10,color:"var(--ss-text-dim)",margin:"0 4px"}}>|</span>
      <label style={{fontSize:11,color:"var(--ss-text-dim)",fontWeight:600}}>Jump to:</label>
      <input type="date" value={weekStart||""} onChange={e => {
          const v = e.target.value;
          if (!v) return;
          const dt = new Date(v+"T12:00:00");
          const day = dt.getDay();

          setWeekStart(dt.toISOString().slice(0,10));
        }}
        style={{fontSize:11,padding:"3px 6px",borderRadius:4,border:"1px solid var(--ss-border)",
          background:"var(--ss-surface-alt)",color:"var(--ss-text)"}}
      />
    </div>
  );
}

      if (subSource)    { setSubSource(null); setEditingCell(null); e.preventDefault(); return; }
      if (dragEmp)      { setDragEmp(null); e.preventDefault(); return; }
      if (dragChip)     { setDragChip(null); e.preventDefault(); return; }
      if (editingCell)  { setEditingCell(null); e.preventDefault(); return; }
    };

  }, [swapSource, subSource, dragEmp, dragChip, editingCell]); // eslint-disable-line react-hooks/exhaustive-deps

  // Clear picker-hover shadow when the picker is closed
  useEffect(() => { if (!editingCell) setHoverPickEmp(null); }, [editingCell]);

  const autoSaveToHistory = useCallback((ws, sched) => {
    const hasAssignments = Object.values(sched).some(a => a.length > 0);
    if (!hasAssignments) return;
    setHistory(prev => {
      const existing = prev.findIndex(h => h.weekStart === ws && h.isAutoSave);
      const entry = {
        weekStart: ws,
        savedAt: new Date().toISOString(),
        label: null,
        schedule: JSON.parse(JSON.stringify(sched)),
        isAutoSave: true,
      };
      const next = existing >= 0
        ? prev.map((h, i) => i === existing ? entry : h)
        : [...prev, entry];
      return next.sort((a,b) => a.weekStart.localeCompare(b.weekStart));
    });
  }, [setHistory]);

  const manualSaveToHistory = useCallback((label, ws, sched) => {
    const trimmedLabel = label.trim();
    if (!trimmedLabel) return;
    setHistory(prev => {
      const entry = {
        weekStart: ws,
        savedAt: new Date().toISOString(),
        label: trimmedLabel,
        schedule: JSON.parse(JSON.stringify(sched)),
        isAutoSave: false,
      };
      const existing = prev.findIndex(h => h.weekStart === ws && !h.isAutoSave && h.label === trimmedLabel);
      const next = existing >= 0
        ? prev.map((h,i) => i === existing ? entry : h)
        : [...prev, entry];
      return next.sort((a,b) => a.weekStart.localeCompare(b.weekStart));
    });
  }, [setHistory]);

  const deleteFromHistory = useCallback((idx) => {
    setHistory(prev => prev.filter((_,i) => i !== idx));
  }, [setHistory]);

  const historyLabel = (h) => {
    if (h.label) return h.label;
    const [wy,wm,wd] = h.weekStart.split("-").map(Number);
    const sun = new Date(wy,wm-1,wd,12);
    const sat = new Date(wy,wm-1,wd+6,12);
    const fmt = d => (d.getMonth()+1)+"/"+d.getDate();
    return fmt(sun)+" – "+fmt(sat);
  };

  const scheduleStale    = scheduleStaleP ?? false;
  const setScheduleStale = setScheduleStaleProp ?? (() => {});
  const [extSuggestions,     setExtSuggestions]   = useState(null);
  const [pendingExtShifts,   setPendingExtShifts] = useState([]);

  const [trainingBlockDay,   setTrainingBlockDay] = useState(null);
  const cellRefs = useRef({});

  useEffect(() => {

      el.style.outlineOffset = "2px";

      return () => clearTimeout(timer);

  const displaySchedule = viewingHistory ? viewingHistory.schedule : schedule;
  const liveSchedule   = schedule;
  const liveWeekStart  = weekStart;
  const isReadOnly     = !!viewingHistory;
  const stepWeek = (dir) => {
    const [y,m,d] = (weekStart||"2024-01-07").split("-").map(Number);
    const dt = new Date(y, m-1, d, 12);
    dt.setDate(dt.getDate() + dir * 7);
    const ns = dt.toISOString().slice(0,10);
    setWeekStart(ns);
  };
  const getAsgn       = (d,s) => displaySchedule[cellKey(d,s)]||[];
  const getName       = (id)  => employees.find(e=>e.id===id)?.name||"?";
  const getAssignable = (emp,d,s) => getAvailPos(d,s).filter(p=>canFillPos(emp,p,d));
  const unassigned    = (d,s) => {
    const ids=getAsgn(d,s).map(a=>a.employeeId);
    return employees.filter(e=>{
      if(ids.includes(e.id)) return false;                   // already in this cell
      if(e.maxShiftsPerWeek!=null && countShiftsInWeek(e.id,schedule)>=e.maxShiftsPerWeek) return false; // at weekly cap
      return true;
    });
  };

  const stableEmpOrder = useMemo(() => {
    const shiftRank = { first:0, second:1, third:2 };
    const primarySh = (emp) => {
      if (emp.requiredShift) return emp.requiredShift;
      if ((emp.preferredShifts||[]).length===1) return emp.preferredShifts[0];
      const counts = { first:0, second:0, third:0 };
      DAYS.forEach(day => SHIFTS.forEach(s => {
        if ((schedule[cellKey(day,s.id)]||[]).some(a=>a.employeeId===emp.id)) counts[s.id]++;
      }));
      return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]?.[0] || "first";
    };
    return [...employees].sort((a,b) => {
      const aSuper = (a.qualifications||[]).includes("Supervisor") ? 0 : 1;
      const bSuper = (b.qualifications||[]).includes("Supervisor") ? 0 : 1;
      if (aSuper !== bSuper) return aSuper - bSuper;
      const shiftDiff = (shiftRank[primarySh(a)]||0) - (shiftRank[primarySh(b)]||0);
      if (shiftDiff !== 0) return shiftDiff;
      return a.name.localeCompare(b.name);

  }, [employees, schedule]);

  const sortedAsgn = (asgn) => {
    const orderMap = new Map(stableEmpOrder.map((e,i) => [e.id, i]));
    return [...asgn].sort((a,b) => {
      return (orderMap.get(a.employeeId) ?? 999) - (orderMap.get(b.employeeId) ?? 999);
    });
  };

  // ── Undo / Redo ─────────────────────────────────────────────────────────────
  const MAX_UNDO = 50;
  const snapNow = () => ({
    schedule:  JSON.parse(JSON.stringify(schedule)),
    extShifts: JSON.parse(JSON.stringify(extShifts || [])),
  });
  const pushUndo = () => {
    if (isReadOnly) return;
    setUndoStack(s => [...s.slice(-(MAX_UNDO - 1)), snapNow()]);
    setRedoStack([]);
  };
  const undo = () => {
    if (isReadOnly || !undoStack.length) return;
    const snap = undoStack[undoStack.length - 1];
    setUndoStack(s => s.slice(0, -1));
    setRedoStack(s => [...s.slice(-(MAX_UNDO - 1)), snapNow()]);
    setSchedule(snap.schedule);
    setExtShifts(snap.extShifts);
  };
  const redo = () => {
    if (isReadOnly || !redoStack.length) return;
    const snap = redoStack[redoStack.length - 1];
    setRedoStack(s => s.slice(0, -1));
    setUndoStack(s => [...s.slice(-(MAX_UNDO - 1)), snapNow()]);
    setSchedule(snap.schedule);
    setExtShifts(snap.extShifts);

  // Stable refs so the keyboard handler never goes stale
  const undoRef = useRef(undo); undoRef.current = undo;
  const redoRef = useRef(redo); redoRef.current = redo;
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.isContentEditable) return;
      if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === "z") { e.preventDefault(); undoRef.current(); }
      if ((e.ctrlKey || e.metaKey) && (e.key === "y" || (e.shiftKey && e.key === "z"))) { e.preventDefault(); redoRef.current(); }
    };
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, []);

  const assignEmp = (d,s,eid,pos) => {
    if (isReadOnly) return;
    const key=cellKey(d,s);
    const cur=schedule[key]||[];
    // Hard block: already in this cell, or cell full
    if(cur.length>=getEffectiveSlotCount(d,s,extShifts)||cur.some(a=>a.employeeId===eid)) return;
    // Hard block: maxShiftsPerWeek cap reached
    const emp = employees.find(e=>e.id===eid);
    if(emp && emp.maxShiftsPerWeek!=null && countShiftsInWeek(eid,schedule)>=emp.maxShiftsPerWeek) return;
    pushUndo();
    // Use updater to read latest state (prevents race conditions on rapid clicks)
    setSchedule(p=>{
      const latest=p[key]||[];
      if(latest.some(a=>a.employeeId===eid)) return p; // double-check inside updater
      return {...p,[key]:[...latest,{employeeId:eid,position:pos}]};
    });
    setEditingCell(null);
  };
  const removeAsgn = (d,s,eid) => {
    if (isReadOnly) return;
    pushUndo();
    const key=cellKey(d,s);
    setSchedule(p=>({...p,[key]:(p[key]||[]).filter(a=>a.employeeId!==eid)}));
  };
  const getSwapViolations = (srcEmp, srcDay, srcShiftId, srcPos, tgtEmp, tgtDay, tgtShiftId, tgtPos) => {
    const viols = [];
    if ((srcEmp?.unavailableDays||[]).includes(tgtDay))
      viols.push({ hard:true, msg:`${srcEmp.name} is unavailable on ${tgtDay}` });
    if ((tgtEmp?.unavailableDays||[]).includes(srcDay))
      viols.push({ hard:true, msg:`${tgtEmp.name} is unavailable on ${srcDay}` });
    if (srcEmp?.requiredShift && srcEmp.requiredShift !== tgtShiftId)
      viols.push({ hard:true, msg:`${srcEmp.name} is locked to ${srcEmp.requiredShift} shift` });
    if (tgtEmp?.requiredShift && tgtEmp.requiredShift !== srcShiftId)
      viols.push({ hard:true, msg:`${tgtEmp.name} is locked to ${tgtEmp.requiredShift} shift` });
    if (tgtPos !== "Guard" && !(srcEmp?.qualifications||[]).includes(tgtPos))
      viols.push({ hard:true, msg:`${srcEmp.name} is not qualified for ${tgtPos}` });
    if (srcPos !== "Guard" && !(tgtEmp?.qualifications||[]).includes(srcPos))
      viols.push({ hard:true, msg:`${tgtEmp.name} is not qualified for ${srcPos}` });
    const srcPrefViolsOnTgt = srcEmp ? getPreferenceViolations(srcEmp, tgtDay, tgtShiftId, schedule) : [];
    const tgtPrefViolsOnSrc = tgtEmp ? getPreferenceViolations(tgtEmp, srcDay, srcShiftId, schedule) : [];
    srcPrefViolsOnTgt.forEach(v => viols.push({ hard:false, msg:`${srcEmp.name}: ${v.msg}` }));
    tgtPrefViolsOnSrc.forEach(v => viols.push({ hard:false, msg:`${tgtEmp.name}: ${v.msg}` }));
    const swapped = {...schedule};
    const sk = cellKey(srcDay, srcShiftId);
    const tk = cellKey(tgtDay, tgtShiftId);
    swapped[sk] = (schedule[sk]||[]).map(a => a.employeeId===srcEmp.id ? {...a,employeeId:tgtEmp.id,position:srcPos} : a);
    swapped[tk] = (schedule[tk]||[]).map(a => a.employeeId===tgtEmp.id ? {...a,employeeId:srcEmp.id,position:tgtPos} : a);
    const srcRestAfter = calcRestGap(srcEmp.id, swapped, tgtDay, tgtShiftId);
    const tgtRestAfter = calcRestGap(tgtEmp.id, swapped, srcDay, srcShiftId);
    const minRest = cfg?.minRestHours ?? 12;
    if (srcRestAfter < minRest && srcRestAfter !== Infinity)
      viols.push({ hard:false, msg:`${srcEmp.name} would have only ${Math.round(srcRestAfter*10)/10}h rest (min ${minRest}h)` });
    if (tgtRestAfter < minRest && tgtRestAfter !== Infinity)
      viols.push({ hard:false, msg:`${tgtEmp.name} would have only ${Math.round(tgtRestAfter*10)/10}h rest (min ${minRest}h)` });
    return viols;
  };

  const executeSwap = (src, tgt) => {
    pushUndo();
    const sk = cellKey(src.day, src.shiftId);
    const tk = cellKey(tgt.day, tgt.shiftId);
    setSchedule(prev => {
      const ns = {...prev};
      ns[sk] = (prev[sk]||[]).map(a =>
        a.employeeId === src.employeeId ? {...a, employeeId:tgt.employeeId, position:src.position} : a
      );
      ns[tk] = (prev[tk]||[]).map(a =>
        a.employeeId === tgt.employeeId ? {...a, employeeId:src.employeeId, position:tgt.position} : a
      );
      return ns;
    });
    setSwapSource(null);
  };

  // Move a chip from one cell to another with available space — one atomic undo step.
  const moveChip = (srcDay, srcShift, tgtDay, tgtShift, empId, srcPos) => {
    if (isReadOnly) return;
    if (srcDay === tgtDay && srcShift === tgtShift) return;
    const tgtAsgn = getAsgn(tgtDay, tgtShift);
    const tgtCap  = getEffectiveSlotCount(tgtDay, tgtShift, extShifts);
    if (tgtAsgn.length >= tgtCap) return;           // target full
    if (tgtAsgn.some(a => a.employeeId === empId)) return; // already there
    const emp = employees.find(e => e.id === empId);
    if (!emp) return;
    const ap = getAssignable(emp, tgtDay, tgtShift);
    if (!ap.length) return;                          // not qualified for target slot
    const tgtSt = getStatus(tgtDay, tgtShift);
    let pos = ap.includes(srcPos) ? srcPos : null;  // keep same role if possible
    if (!pos) {
      if (!tgtSt.hasScale   && ap.includes("Scale"))   pos = "Scale";
      else if (!tgtSt.hasMedical && ap.includes("Medical")) pos = "Medical";
      else if (ap.includes("Guard"))                        pos = "Guard";
      else pos = ap[0];
    }
    pushUndo();
    setSchedule(prev => {
      const ns = { ...prev };
      ns[cellKey(srcDay, srcShift)] = (prev[cellKey(srcDay, srcShift)] || []).filter(a => a.employeeId !== empId);
      ns[cellKey(tgtDay, tgtShift)] = [...(prev[cellKey(tgtDay, tgtShift)] || []), { employeeId: empId, position: pos }];
      return ns;
    });
  };

  const executeSub = async (subSrc, newEmpId, newPosition) => {
    const subEmp = employees.find(e => e.id === subSrc.employeeId);
    const newEmp = employees.find(e => e.id === newEmpId);
    if (!subEmp || !newEmp) return;
    const viols = [];
    if ((newEmp.unavailableDays||[]).includes(subSrc.day))
      viols.push({ hard:true,  msg:`${newEmp.name} is unavailable on ${subSrc.day}` });
    if (newEmp.requiredShift && newEmp.requiredShift !== subSrc.shiftId)
      viols.push({ hard:true,  msg:`${newEmp.name} is locked to ${newEmp.requiredShift} shift` });
    if (newPosition !== "Guard" && !(newEmp.qualifications||[]).includes(newPosition))
      viols.push({ hard:true,  msg:`${newEmp.name} is not qualified for ${newPosition}` });
    const prefViols = getPreferenceViolations(newEmp, subSrc.day, subSrc.shiftId, schedule);
    prefViols.forEach(v => viols.push({ hard:false, msg:`${newEmp.name}: ${v.msg}` }));
    const rest = calcRestGap(newEmp.id, schedule, subSrc.day, subSrc.shiftId);
    const minRest = cfg?.minRestHours ?? 12;
    if (rest < minRest && rest !== Infinity)
      viols.push({ hard:false, msg:`${newEmp.name} would have only ${Math.round(rest*10)/10}h rest (min ${minRest}h)` });
    const hardBlocks = viols.filter(v => v.hard);
    const softWarns  = viols.filter(v => !v.hard);
    if (hardBlocks.length > 0) {
      showAlert({
        title: "Sub Blocked",
        message: softWarns.length ? "This substitution cannot proceed. Additional notes are listed below." : "This substitution cannot proceed.",
        items: [...hardBlocks, ...softWarns],
        variant: "danger",
      });
      return;
    }
    if (softWarns.length > 0) {
      const ok = await showConfirm({
        title: "Sub Warnings",
        message: "Approve to continue with the substitution.",
        items: softWarns,
        confirmLabel: "Proceed with Sub",
        variant: "warning",
      });
      if (!ok) return;
    }
    pushUndo();
    const key = cellKey(subSrc.day, subSrc.shiftId);
    setSchedule(prev => ({
      ...prev,
      [key]: (prev[key]||[]).map(a =>
        a.employeeId === subSrc.employeeId
          ? { ...a, employeeId: newEmpId, position: newPosition }
          : a

    }));

    setEditingCell(null);

  const handleChipClick = async (empId, day, shiftId, position, e) => {
    e.stopPropagation();
    if (isReadOnly) return;
    if (swapSource) {
      if (swapSource.employeeId === empId && swapSource.day === day && swapSource.shiftId === shiftId) {
        setSwapSource(null); return;
      }
      const srcEmp = employees.find(e => e.id === swapSource.employeeId);
      const tgtEmp = employees.find(e => e.id === empId);
      const viols  = getSwapViolations(srcEmp, swapSource.day, swapSource.shiftId, swapSource.position,
                                        tgtEmp, day, shiftId, position);
      const hardBlocks = viols.filter(v => v.hard);
      const softWarns  = viols.filter(v => !v.hard);
      if (hardBlocks.length > 0) {
        showAlert({
          title: "Swap Blocked",
          message: softWarns.length ? "This swap cannot proceed. Additional notes listed below." : "This swap cannot proceed.",
          items: [...hardBlocks, ...softWarns],
          variant: "danger",
        });
        return;
      }
      if (softWarns.length > 0) {
        const ok = await showConfirm({
          title: "Swap Warnings",
          message: "Approve to continue with the swap.",
          items: softWarns,
          confirmLabel: "Proceed with Swap",
          variant: "warning",
        });
        if (!ok) return;
      }
      executeSwap(swapSource, { employeeId:empId, day, shiftId, position });
      return;
    }
    if (subSource) {
      if (subSource.employeeId === empId && subSource.day === day && subSource.shiftId === shiftId) {
        setSubSource(null); setEditingCell(null);
      }
      return;
    }
    setEditingCell(prev => {
      const key = cellKey(day, shiftId);
      return prev === key + "__chipprompt__" + empId ? null : key + "__chipprompt__" + empId;
    });
  };

  const isSwapHardBlocked = (empId, day, shiftId, position) => {
    if (!swapSource) return false;
    const srcEmp = employees.find(e => e.id === swapSource.employeeId);
    const tgtEmp = employees.find(e => e.id === empId);
    if (!srcEmp || !tgtEmp) return false;
    if ((srcEmp.unavailableDays||[]).includes(day)) return true;
    if ((tgtEmp.unavailableDays||[]).includes(swapSource.day)) return true;
    if (srcEmp.requiredShift && srcEmp.requiredShift !== shiftId) return true;
    if (tgtEmp.requiredShift && tgtEmp.requiredShift !== swapSource.shiftId) return true;
    if (position !== "Guard" && !(srcEmp.qualifications||[]).includes(position)) return true;
    if (swapSource.position !== "Guard" && !(tgtEmp.qualifications||[]).includes(swapSource.position)) return true;
    return false;
  };

  const getStatus = (d,s) => {
    const a=getAsgn(d,s);
    const cellExtList=(extShifts||[]).filter(e=>extCovers(e,d,s));
    const extHasScale=cellExtList.some(e=>e.roles.includes("Scale"));
    const extHasMed=cellExtList.some(e=>e.roles.includes("Medical"));
    const hasScale=slotHasRole(a,employees,"Scale")||extHasScale;
    // Supervisor counts as Medical for coverage display purposes
    const supOnShift=a.some(x=>x.position==="Supervisor");
    const hasMed=slotHasRole(a,employees,"Medical")||extHasMed||supOnShift;
    const isFull=a.length>=getEffectiveSlotCount(d,s,extShifts);
    const missing=[...(!hasScale?["Scale"]:[]),...(!hasMed?["Medical"]:[])];
    return{hasScale,hasMedical:hasMed,isFull,missing,ok:missing.length===0,cellExtList};
  };

  const handleDrop = async (d,s) => {
    if(!dragEmp) return;

    if(dragEmp.maxShiftsPerWeek!=null && countShiftsInWeek(dragEmp.id,schedule)>=dragEmp.maxShiftsPerWeek) return;
    const ap=getAssignable(dragEmp,d,s); if(!ap.length) return;
    const st=getStatus(d,s);

    let pos;
    if     (!st.hasScale  &&ap.includes("Scale")  &&canFillPos(dragEmp,"Scale",d))   pos="Scale";
    else if(!st.hasMedical&&ap.includes("Medical")&&canFillPos(dragEmp,"Medical",d)) pos="Medical";
    else if(ap.includes("Guard"))                                                     pos="Guard";
    else pos=ap[0];

    const warns = [];
    const isUnavailable = (dragEmp.unavailableDays||[]).includes(d);
    const rest        = calcRestGap(dragEmp.id, schedule, d, s);
    const consecHDrag = calcConsecutiveHours(dragEmp.id, schedule, d, s, extShifts);
    const shortRest = rest < (cfg?.minRestHours??MIN_REST_HOURS) && rest !== Infinity;
    const nights = s==="third" ? calcConsecutiveNights(dragEmp.id, schedule, d, s) : 0;
    const tooManyNights = nights >= (cfg?.maxConsecutiveNights??MAX_CONSECUTIVE_NIGHTS);
    const currentHours = calcHours(dragEmp.id, schedule, extShifts||[]);
    const wouldBeOver = dragEmp.employmentType==="full-time" && currentHours>=40;
    if (consecHDrag > empMaxConsec(dragEmp)) { setDragOver(null); return; }
    if (isUnavailable) warns.push(`${dragEmp.name} is marked unavailable on ${d}.`);
    if (shortRest) warns.push(`Only ${Math.round(rest*10)/10}h rest since last shift.`);
    if (tooManyNights) warns.push(`${nights} consecutive night shifts.`);
    const empDragOtPref = dragEmp.overtimePref && dragEmp.overtimePref !== "neutral" ? dragEmp.overtimePref : (cfg?.defaultOvertimePref || "neutral");
    const dragOtPref    = dragEmp.employmentType === "full-time" ? empDragOtPref : "neutral";
    if (wouldBeOver) {
      if (dragOtPref === "blocked") warns.push(`${dragEmp.name} prefers NO overtime — currently at ${currentHours}h.`);
      else warns.push(`${dragEmp.name} would go to ${currentHours+SHIFT_HOURS}h (overtime).`);
    }

      const ok = await showConfirm({title:"Assignment Warnings",message:"Assign anyway?",items:warns.map(m=>({msg:m,hard:false})),confirmLabel:"Assign",variant:"warning"});
      if (!ok) { setDragEmp(null); return; }

  };

  const validateSchedule = useCallback((sched, exts, emps, handoffsArg) => {
    const issues = [];
    const E = (msg) => issues.push({ level:"error", msg });
    const W = (msg) => issues.push({ level:"warn",  msg });
    const rmap = Object.fromEntries((emps||employees).map(e => [e.id, e]));
    const allExts = exts || extShifts || [];
    const allHandoffs = handoffsArg || [];

    const handoffBodyCount = (day, shiftId) =>
      allHandoffs.filter(h => h.day === day && h.targetShiftId === shiftId).length;

    const extBodyCount = (day, shiftId) => {
      let n = 0;
      (allExts).forEach(ext => {
        const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
        if (!pair) return;
        const idx = pair.covers.indexOf(shiftId);
        if (idx === 0 && ext.empAId && ext.day === day) n++;
        if (idx === 1 && ext.empBId && ext.day === day) n++;
      });
      return n;
    };

    DAYS.forEach(day => {
      SHIFTS.forEach(shift => {
        const isWd1 = isWeekday(day) && shift.id === "first";
        const regNeed = REGULAR_SLOTS(day, shift.id);
        const supNeed = SUP_SLOT_DAY(day, shift.id) ? 1 : 0;
        const totalNeed = regNeed + supNeed;
        const key = cellKey(day, shift.id);
        const asgn = sched[key] || [];
        const extBodies = extBodyCount(day, shift.id);
        const hoHandoffs = handoffBodyCount(day, shift.id);
        const regCount = asgn.length + extBodies + hoHandoffs;
        const supCount = asgn.filter(a => a.position === "Supervisor").length;
        const total = regCount + supCount;

        if (total < totalNeed) {
          const names = asgn.map(a => (rmap[a.employeeId]?.name||"?").split(" ").pop()).join(", ");
          E(`Coverage gap: ${day} ${shift.id} — ${total}/${totalNeed} bodies${names ? " ["+names+"]" : ""}`);
        }

        if (isWd1 && supNeed > 0 && supCount === 0) {
          E(`No supervisor on ${day} 1st shift`);
        }

        const regs = asgn.filter(a => a.position !== "Supervisor");
        const hasScale   = regs.some(a => (rmap[a.employeeId]?.qualifications||[]).includes("Scale"));
        const hasMedical = regs.some(a => (rmap[a.employeeId]?.qualifications||[]).includes("Medical"));
        const extEmps = (allExts).filter(ext => ext.day === day)
          .flatMap(ext => [ext.empAId, ext.empBId].filter(Boolean)
            .map(id => rmap[id]).filter(Boolean)
            .filter(e => {
              const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
              if (!pair) return false;
              const idx = pair.covers.indexOf(shift.id);
              return idx >= 0;
            }));
        const extHasScale   = extEmps.some(e => (e.qualifications||[]).includes("Scale"));
        const extHasMedical = extEmps.some(e => (e.qualifications||[]).includes("Medical"));
        const hoEmps = allHandoffs.filter(h => h.day === day && h.targetShiftId === shift.id)
          .map(h => rmap[h.employeeId]).filter(Boolean);
        const hoHasScale   = hoEmps.some(e => (e.qualifications||[]).includes("Scale"));
        const hoHasMedical = hoEmps.some(e => (e.qualifications||[]).includes("Medical"));
        if (!hasScale && !extHasScale && !hoHasScale)     E(`No Scale on ${day} ${shift.id}`);
        if (!hasMedical && !extHasMedical && !hoHasMedical) E(`No Medical on ${day} ${shift.id}`);
      });
    });

    const shiftCount = {};
    const weekendCount = {};
    const dayShifts = {};

    DAYS.forEach(day => {
      SHIFTS.forEach(shift => {
        const key = cellKey(day, shift.id);
        const asgn = sched[key] || [];
        asgn.forEach(a => {
          const emp = rmap[a.employeeId];
          if (!emp) return;
          const id = emp.id;

          if ((emp.unavailableDays||[]).includes(day))
            E(`${emp.name} assigned on unavailable day ${day} (${shift.id})`);

          if ((emp.blockedShifts||[]).includes(shift.id))
            E(`${emp.name} assigned to blocked shift ${shift.id} on ${day}`);

          if (emp.requiredShift && emp.requiredShift !== shift.id)
            E(`${emp.name} on ${shift.id} but required on ${emp.requiredShift} (${day})`);

          shiftCount[id] = (shiftCount[id]||0) + 1;
          if (["Saturday","Sunday"].includes(day))
            weekendCount[id] = (weekendCount[id]||0) + 1;

          const dk = id+"__"+day;
          if (!dayShifts[dk]) dayShifts[dk] = [];
          dayShifts[dk].push(shift.id);
        });
      });
    });

    (emps||employees).forEach(emp => {
      const mxs = emp.maxShiftsPerWeek;
      if (mxs != null && (shiftCount[emp.id]||0) > mxs)
        E(`${emp.name} worked ${shiftCount[emp.id]} shifts, max is ${mxs}`);

      const mxw = emp.maxWeekendDays;
      if (mxw != null && (weekendCount[emp.id]||0) > mxw)
        E(`${emp.name} worked ${weekendCount[emp.id]} weekend days, max is ${mxw}`);
    });

    Object.entries(dayShifts).forEach(([dk, shifts]) => {
      if (shifts.length > 1) {
        const [empId, day] = dk.split("__");
        const emp = rmap[empId];
        if (!emp) return;
        if (!emp.willing16h)
          E(`${emp.name} double-shifted on ${day} (${shifts.join("+")})`);
      }
    });

    const hoursByEmp = {};
    DAYS.forEach(day => {
      SHIFTS.forEach(shift => {
        const key = cellKey(day, shift.id);
        (sched[key]||[]).forEach(a => {
          hoursByEmp[a.employeeId] = (hoursByEmp[a.employeeId]||0) + SHIFT_HOURS;
        });
      });
    });
    allHandoffs.forEach(h => {
      hoursByEmp[h.employeeId] = (hoursByEmp[h.employeeId]||0) + (h.hours || HANDOFF_HOURS);
    });
    (emps||employees).forEach(emp => {
      if (emp.employmentType !== "full-time") return;
      const h = hoursByEmp[emp.id] || 0;
      if (h < 40)  W(`${emp.name} has ${h}h (under 40h target)`);
      if (h > 48)  W(`${emp.name} has ${h}h (over 48h)`);
    });

    return issues;
  }, [employees, extShifts]);

  const runAutoFill = useCallback((empOverride) => {
    const allSource = empOverride || employees;
    const excludeSet = new Set(afExclude || []);
    const source = allSource.filter(e => !excludeSet.has(e.id));
    if (!source.length) return;

    // ── Cross-week awareness: look up previous week in history ───────────────
    // Compute ISO date for the week immediately before the current weekStart.
    const prevWeekStart = (() => {
      if (!weekStart) return null;
      const [y, m, d] = weekStart.split("-").map(Number);
      const dt = new Date(y, m - 1, d);
      dt.setDate(dt.getDate() - 7);
      return [
        dt.getFullYear(),
        String(dt.getMonth() + 1).padStart(2, "0"),
        String(dt.getDate()).padStart(2, "0"),
      ].join("-");
    })();
    // Prefer the most recent non-auto-save for that week; fall back to auto-save.
    const prevEntry = prevWeekStart
      ? ([...(history || [])].reverse().find(h => h.weekStart === prevWeekStart && !h.isAutoSave)
         || [...(history || [])].reverse().find(h => h.weekStart === prevWeekStart))
      : null;
    const prevWeekData = prevEntry ? buildPrevWeekData(prevEntry.schedule) : null;

    // Merge cross-week data into a fresh patterns object (don't mutate persisted state).
    const enrichedPatterns = { ...(empPatterns || {}) };
    if (prevWeekData) {
      source.forEach(emp => {
        const existing = enrichedPatterns[emp.id] || {};
        enrichedPatterns[emp.id] = {
          ...existing,
          trailingDays:     prevWeekData.trailingDays[emp.id]     ?? existing.trailingDays     ?? 0,
          prevWeekLastSlot: prevWeekData.prevWeekLastSlot[emp.id] ?? existing.prevWeekLastSlot ?? null,
        };
      });
    }

    // ── Single-attempt worker — pure function, no side effects ───────────────
    const attempt = (jitter) => {
      const manualExtShifts = (extShifts||[]).filter(e => e.approvedAt !== "auto-fill");

      // Step 0: proactive ext shift deployment — analyze roster for structural
      // specialist deficits and pre-create 12hr ext shifts so the CSP plans
      // around pre-committed coverage rather than discovering gaps afterward.
      const proactiveExts = deployProactiveExtShifts(source, cfg, empTimeOffDays, manualExtShifts);
      const inputExtShifts = [...manualExtShifts, ...proactiveExts];

      const {schedule:ns, hourTracker, shiftsWorked, usedPatterns, assignLog} = buildAutoFill(source, cfg, empTimeOffDays, enrichedPatterns, inputExtShifts, jitter);

      // Seed autoExtShifts with proactive deployments; reactive code below will
      // skip any day+pairId already covered via usedExtPairs.
      const autoExtShifts = [...proactiveExts];
      const usedExtPairs  = new Set(proactiveExts.map(e => e.day + "__" + e.pairId));
      DAYS.forEach(day => {
        EXT_PAIRS.forEach(pair => {
          if (usedExtPairs.has(day + "__" + pair.id)) return;

          // ── Swing shifts: single-employee, trigger on headcount gap ──────────
          if (pair.isSwing) {
            const hasGap = pair.covers.some(shiftId => {
              const asgn = ns[cellKey(day, shiftId)] || [];
              const bodies = asgn.filter(a => !(source.find(x => x.id === a.employeeId)?.inTraining)).length;
              return bodies < REGULAR_SLOTS(day, shiftId);
            });
            if (!hasGap) return;
            // Exclude employees already scheduled on any slot this swing covers —
            // otherwise we'd double-count them (regular body + phantom ext body).
            const alreadyOnCoveredSlot = (empId) => pair.covers.some(shiftId =>
              (ns[cellKey(day, shiftId)] || []).some(a => a.employeeId === empId)
            );
            const swingCandidates = source.filter(emp => {
              if ((emp.unavailableDays || []).includes(day)) return false;
              if (emp.maxShiftsPerWeek !== null && (shiftsWorked[emp.id]||0) >= emp.maxShiftsPerWeek) return false;
              if (alreadyOnCoveredSlot(emp.id)) return false;
              return canWorkExtHalf(emp, pair.id, 0); // checks swingEligible[]
            });
            const swingDesigId = (swingDesig || {})[pair.id];
            if (swingDesigId) swingCandidates.sort((a, b) => (b.id === swingDesigId ? 1 : 0) - (a.id === swingDesigId ? 1 : 0));
            if (!swingCandidates.length) return;
            const empA = swingCandidates[0];
            autoExtShifts.push({ pairId: pair.id, day, empAId: empA.id, empBId: null,
              roles: ["Scale","Medical"].filter(r => empA.qualifications.includes(r)),
              approvedAt: "auto-fill", auto: true });
            usedExtPairs.add(day + "__" + pair.id);
            return;
          }

          // ── Standard 12-hr pairs: two employees, trigger on Scale/Medical gap ─
          const neededRoles = [];
          pair.covers.forEach(shiftId => {
            const asgn = ns[cellKey(day, shiftId)] || [];
            if (!slotHasRole(asgn, source, "Scale"))   neededRoles.push("Scale");
            if (!slotHasRole(asgn, source, "Medical")) neededRoles.push("Medical");
          });
          const uniqueNeeded = [...new Set(neededRoles)];
          if (!uniqueNeeded.length) return;

          // Hard cap: ext body occupies one of the 3 regular slots on each covered
          // shift. If the CSP has already filled a covered shift to REGULAR_SLOTS,
          // adding an ext body would push that slot to 4 bodies. Skip.
          const hasRoomForExtBody = pair.covers.every(shiftId => {
            const asgn = ns[cellKey(day, shiftId)] || [];
            const regCount = asgn.filter(a => a.position !== "Supervisor").length;
            return regCount < REGULAR_SLOTS(day, shiftId);
          });
          if (!hasRoomForExtBody) return;

          // Helper: is emp already scheduled on the covered slot they'd occupy?
          // empA occupies pair.covers[0], empB occupies pair.covers[1]. If the
          // candidate is already on either slot, they'd be double-counted.
          const onSlot = (empId, shiftId) =>
            (ns[cellKey(day, shiftId)] || []).some(a => a.employeeId === empId);
          const alreadyInBoth = (empId) => pair.covers.every(shiftId => onSlot(empId, shiftId));

          const candidates = source.filter(emp => {
            if ((emp.unavailableDays || []).includes(day)) return false;
            if (alreadyInBoth(emp.id)) return false;
            if (!uniqueNeeded.every(r => emp.qualifications.includes(r))) return false;
            if (emp.maxShiftsPerWeek !== null && (shiftsWorked[emp.id]||0) >= emp.maxShiftsPerWeek) return false;
            if (!emp.willing16h) return false;
            return canWorkExtHalf(emp, pair.id, 0) || canWorkExtHalf(emp, pair.id, 1);
          });
          // Prioritize designated employee for this pair type
          const desigId = (swingDesig || {})[pair.id];
          if (desigId) candidates.sort((a, b) => (b.id === desigId ? 1 : 0) - (a.id === desigId ? 1 : 0));
          for (let i = 0; i < candidates.length; i++) {
            for (let j = i + 1; j < candidates.length; j++) {
              const [empA, empB] = (() => {
                const a = candidates[i], b = candidates[j];
                // Orientation must satisfy canWorkExtHalf AND candidate must not
                // already be on the slot they'd cover (else double-count).
                const abOk = canWorkExtHalf(a, pair.id, 0) && canWorkExtHalf(b, pair.id, 1)
                          && !onSlot(a.id, pair.covers[0]) && !onSlot(b.id, pair.covers[1]);
                const baOk = canWorkExtHalf(b, pair.id, 0) && canWorkExtHalf(a, pair.id, 1)
                          && !onSlot(b.id, pair.covers[0]) && !onSlot(a.id, pair.covers[1]);
                if (abOk) return [a, b];
                if (baOk) return [b, a];
                return [null, null];
              })();
              if (!empA || !empB) continue;
              const aRoles = ["Scale","Medical"].filter(r => empA.qualifications.includes(r));
              const bRoles = ["Scale","Medical"].filter(r => empB.qualifications.includes(r));
              if (!uniqueNeeded.every(r => aRoles.includes(r) && bRoles.includes(r))) continue;
              const combinedExtRoles = [...new Set([
                ...["Scale","Medical"].filter(r => empA.qualifications.includes(r)),
                ...["Scale","Medical"].filter(r => empB.qualifications.includes(r)),
              ])];
              autoExtShifts.push({ pairId: pair.id, day, empAId: empA.id, empBId: empB.id,
                roles: combinedExtRoles, approvedAt: "auto-fill", auto: true });
              usedExtPairs.add(day + "__" + pair.id);
              break;
            }
            if (usedExtPairs.has(day + "__" + pair.id)) break;
          }
        });
      });

      const allExtShiftsForCleanup = [...(extShifts||[]).filter(e => e.approvedAt !== "auto-fill"), ...autoExtShifts];
      const seenExtKeys = new Set();
      const dedupedExts = allExtShiftsForCleanup.filter(ext => {
        const k = ext.day + "__" + ext.pairId;
        if (seenExtKeys.has(k)) return false;
        seenExtKeys.add(k);
        return true;
      });
      dedupedExts.forEach(ext => {
        const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
        if (!pair) return;
        pair.covers.forEach(shiftId => {
          const key = cellKey(ext.day, shiftId);
          const asgn = ns[key];
          if (!asgn) return;
          const shiftIdx = pair.covers.indexOf(shiftId);
          const extBodyHere = shiftIdx === 0 ? (ext.empAId ? 1 : 0) : shiftIdx === 1 ? (ext.empBId ? 1 : 0) : 0;
          const presentEmpId = shiftIdx === 0 ? ext.empAId : shiftIdx === 1 ? ext.empBId : null;
          const presentEmp   = presentEmpId ? source.find(e => e.id === presentEmpId) : null;
          const shiftRoles   = presentEmp ? ["Scale","Medical"].filter(r => presentEmp.qualifications.includes(r)) : (ext.roles||[]);
          const extScale     = shiftRoles.includes("Scale");
          const extMedical   = shiftRoles.includes("Medical");
          const targetSize   = Math.max(0, getSlotCount(ext.day, shiftId) - extBodyHere);
          let cleaned = asgn.filter(a => {
            if (a.position === "Scale"   && extScale   && asgn.length > 1) return false;
            if (a.position === "Medical" && extMedical && asgn.length > 1) return false;
            return true;
          });
          if (cleaned.length > targetSize) {
            const priority = (pos) => pos === "Scale" ? 0 : pos === "Medical" ? 1 : 2;
            cleaned = [...cleaned].sort((a,b) => priority(a.position) - priority(b.position)).slice(0, targetSize);
          }
          const removed = asgn.filter(a => !cleaned.includes(a));
          removed.forEach(a => {
            if (hourTracker[a.employeeId] !== undefined)
              hourTracker[a.employeeId] = Math.max(0, hourTracker[a.employeeId] - SHIFT_HOURS);
          });
          ns[key] = cleaned;
        });
      });

      const issues = validateSchedule(ns, autoExtShifts, source);
      const errors = issues.filter(i => i.level === "error").length;
      const warns  = issues.filter(i => i.level === "warn").length;
      return { ns, autoExtShifts, issues, errors, warns, usedPatterns, hourTracker, assignLog, handoffs: [] };
    };

    // ── Commit best result to state ──────────────────────────────────────────
    const commit = ({ ns, autoExtShifts, issues, usedPatterns, hourTracker, assignLog, handoffs: ho }) => {
      pushUndo();
      if (usedPatterns && Object.keys(usedPatterns).length)
        setEmpPatterns(prev => ({...prev, ...usedPatterns}));
      const resolveOtPref = (e) => {
        const raw = e.overtimePref;
        return (raw && raw !== "neutral") ? raw : (cfg?.defaultOvertimePref || "neutral");
      };
      const scheduleIsEmpty = !schedule || Object.keys(schedule).every(k => !(schedule[k]||[]).length);
      const otItems = scheduleIsEmpty ? [] : source
        .filter(e => e.employmentType==="full-time" && (hourTracker[e.id]||0)>40 && resolveOtPref(e)!=="preferred")
        .map(e => ({emp:e, currentHours:calcHours(e.id,schedule,extShifts), newHours:hourTracker[e.id]}));
      if (otItems.length > 0) {
        setPendingSchedule(ns);
        setPendingExtShifts(autoExtShifts);
        setOvertimeItems(otItems);
      } else {
        setSchedule(ns);
        if (autoExtShifts.length) setExtShifts(autoExtShifts);
        setScheduleIssues(issues);
      }
      if (assignLog) setAssignLog(assignLog);
      setHandoffs(ho || []);
      setScheduleStale(false);
    };

    // ── C2: Cost-ranked strategy generator for gap repair ──────────────────
    // Instead of trying strategies in fixed S1→S2→S3 order and taking the first
    // eligible candidate, generate ALL feasible candidates across all strategy
    // types, score each by estimated cost, and apply cheapest first. This picks
    // the least-disruptive repair for each gap.
    const repairGaps = (result) => {
      const { ns, autoExtShifts, hourTracker } = result;
      const handoffs = result.handoffs || [];
      let changed = false;

      // Parse coverage gap errors → list of {day, shiftId, have, need}
      const gaps = result.issues
        .filter(i => i.level === "error" && i.msg.startsWith("Coverage gap:"))
        .map(i => {
          const m = i.msg.match(/Coverage gap: (\w+) (\w+) — (\d+)\/(\d+)/);
          if (!m) return null;
          return { day: m[1], shiftId: m[2], have: +m[3], need: +m[4] };
        }).filter(Boolean);

      // Parse role gap errors → list of {day, shiftId, role}
      const roleGaps = result.issues
        .filter(i => i.level === "error" && (i.msg.startsWith("No Scale") || i.msg.startsWith("No Medical")))
        .map(i => {
          const m = i.msg.match(/No (Scale|Medical) on (\w+) (\w+)/);
          if (!m) return null;
          return { role: m[1], day: m[2], shiftId: m[3] };
        }).filter(Boolean);

      if (!gaps.length && !roleGaps.length) return result;

      // Build lookup of who's assigned where this week
      const empDayShifts = {};  // empId → Set of "day__shiftId"
      for (const day of DAYS) for (const shift of SHIFTS) {
        for (const a of (ns[cellKey(day, shift.id)] || [])) {
          if (!empDayShifts[a.employeeId]) empDayShifts[a.employeeId] = new Set();
          empDayShifts[a.employeeId].add(day + "__" + shift.id);
        }
      }
      const empShiftCount = {};
      for (const [id, s] of Object.entries(empDayShifts)) empShiftCount[id] = s.size;

      // ── Cost scoring helper ──
      // Lower cost = better candidate. Factors: base type cost, shift preference
      // alignment, hour impact (under-40 good, over-48 bad), OT preference,
      // role-fill bonus for missing Scale/Medical.
      const candidateCost = (emp, gapShiftId, strategyType, hoursAdded, fillsRole) => {
        let cost = 0;
        // Base cost by strategy type
        if (strategyType === "insert")  cost += 0;
        if (strategyType === "steal")   cost += 50;
        if (strategyType === "handoff") cost += 30;
        // Shift preference alignment (scaled by prefStrength.shift)
        const prefs = emp.preferredShifts || [];
        const sw = ps(emp, "shift");
        if (prefs.length && !prefs.includes(gapShiftId)) cost += 80 * sw;
        if (prefs.length && prefs.includes(gapShiftId))  cost -= 20 * sw;
        // Hour impact: under-40 employees benefit from more hours
        const h = hourTracker ? (hourTracker[emp.id] || 0) : 0;
        const ow = ps(emp, "overtime");
        if (h < 32)      cost -= 40;  // very under-hours, adding is great
        else if (h < 40) cost -= 20;  // slightly under, still good
        else if (h > 48) cost += 100 * ow; // already over 48, avoid piling on
        else if (h > 40) cost += 30 * ow;  // OT territory
        // OT preference
        const otPref = emp.overtimePref || "neutral";
        if (otPref === "preferred" && h >= 40) cost -= 30 * ow; // wants OT
        if (otPref === "blocked" && h + hoursAdded > 40) cost += 120 * ow; // doesn't want OT
        // Role-fill bonus: filling a missing critical role is valuable
        if (fillsRole === "Scale" || fillsRole === "Medical") cost -= 50;
        // Employment type: prefer using FT for coverage (more reliable)
        if (emp.employmentType === "part-time") cost += 20;
        if (emp.employmentType === "on-call")   cost += 40;
        return cost;
      };

      const ADJACENT_HANDOFF = { first: ["second"], second: ["first", "third"], third: ["second"] };
      const shiftOrder = { first: 0, second: 1, third: 2 };

      for (const gap of gaps) {
        const gapKey = cellKey(gap.day, gap.shiftId);
        const currentAsgn = ns[gapKey] || [];
        const assignedIds = new Set(currentAsgn.map(a => a.employeeId));
        const deficit = gap.need - gap.have;
        let filled = 0;

        // Determine which roles the gap slot still needs
        const needsScale = !slotHasRole(currentAsgn, source, "Scale");
        const needsMedical = !slotHasRole(currentAsgn, source, "Medical");

        const pickPosition = (emp, existingBodies) => {
          const q = emp.qualifications || [];
          const isSup = q.includes("Supervisor");
          if (isSup && !(isWeekday(gap.day) && gap.shiftId === "first")) return null;
          if (isSup) return "Supervisor";
          const hs = slotHasRole(existingBodies, source, "Scale");
          const hm = slotHasRole(existingBodies, source, "Medical");
          if (!hs && q.includes("Scale"))     return "Scale";
          if (!hm && q.includes("Medical"))   return "Medical";
          if (q.includes("Guard"))            return "Guard";
          return null;
        };

        // ── Generate all feasible candidates ──
        const candidates = [];

        // Type: insert — add unassigned employee to gap slot
        for (const emp of source) {
          if (assignedIds.has(emp.id)) continue;
          if (emp.inTraining) continue;
          if ((emp.unavailableDays || []).includes(gap.day)) continue;
          if (empTimeOffDays && empTimeOffDays.has(emp.id + "__" + gap.day)) continue;
          if ((emp.blockedShifts || []).includes(gap.shiftId)) continue;
          if (emp.requiredShift && emp.requiredShift !== gap.shiftId && !emp.crossShiftOT) continue;
          const onThisDay = SHIFTS.some(s =>
            s.id !== gap.shiftId && (ns[cellKey(gap.day, s.id)] || []).some(a => a.employeeId === emp.id)
          );
          if (onThisDay && !emp.willing16h) continue;
          if (emp.maxShiftsPerWeek != null && (empShiftCount[emp.id] || 0) >= emp.maxShiftsPerWeek) continue;
          const pos = pickPosition(emp, currentAsgn);
          if (!pos) continue;
          const fillsRole = (pos === "Scale" && needsScale) || (pos === "Medical" && needsMedical) ? pos : null;
          candidates.push({
            type: "insert", emp, pos, fillsRole,
            cost: candidateCost(emp, gap.shiftId, "insert", SHIFT_HOURS, fillsRole),
            apply: () => {
              ns[gapKey] = [...(ns[gapKey] || []), { employeeId: emp.id, position: pos }];
              assignedIds.add(emp.id);
              empShiftCount[emp.id] = (empShiftCount[emp.id] || 0) + 1;
              if (hourTracker) hourTracker[emp.id] = (hourTracker[emp.id] || 0) + SHIFT_HOURS;
            },
          });
        }

        // Type: steal — move from overstaffed slot on same day
        for (const donor of SHIFTS) {
          if (donor.id === gap.shiftId) continue;
          const donorKey = cellKey(gap.day, donor.id);
          const donorAsgn = ns[donorKey] || [];
          const donorNeed = REGULAR_SLOTS(gap.day, donor.id) + (SUP_SLOT_DAY(gap.day, donor.id) ? 1 : 0);
          if (donorAsgn.length <= donorNeed) continue;

          for (let di = donorAsgn.length - 1; di >= 0; di--) {
            const a = donorAsgn[di];
            if (a.position === "Supervisor") continue;
            const emp = source.find(e => e.id === a.employeeId);
            if (!emp) continue;
            if ((emp.blockedShifts || []).includes(gap.shiftId)) continue;
            if (emp.requiredShift && emp.requiredShift !== gap.shiftId && !emp.crossShiftOT) continue;
            if (assignedIds.has(emp.id)) continue;
            const pos = pickPosition(emp, ns[gapKey] || []);
            if (!pos) continue;
            const donorWithout = donorAsgn.filter((_, idx) => idx !== di);
            if (slotHasRole(donorAsgn, source, "Scale") && !slotHasRole(donorWithout, source, "Scale")) continue;
            if (slotHasRole(donorAsgn, source, "Medical") && !slotHasRole(donorWithout, source, "Medical")) continue;
            const fillsRole = (pos === "Scale" && needsScale) || (pos === "Medical" && needsMedical) ? pos : null;
            const capturedDi = di;
            const capturedDonorKey = donorKey;
            candidates.push({
              type: "steal", emp, pos, fillsRole, donorShiftId: donor.id,
              cost: candidateCost(emp, gap.shiftId, "steal", 0, fillsRole),
              apply: () => {
                ns[capturedDonorKey] = ns[capturedDonorKey].filter((_, idx) => idx !== capturedDi);
                ns[gapKey] = [...(ns[gapKey] || []), { employeeId: emp.id, position: pos }];
                assignedIds.add(emp.id);
                // No hour change — employee moves from one 8h slot to another
              },
            });
          }
        }

        // Type: handoff — 4h partial shift from adjacent shift employee
        const adjShifts = ADJACENT_HANDOFF[gap.shiftId] || [];
        for (const adjShiftId of adjShifts) {
          const adjKey = cellKey(gap.day, adjShiftId);
          const adjAsgn = ns[adjKey] || [];
          for (const a of adjAsgn) {
            if (handoffs.some(h => h.day === gap.day && h.employeeId === a.employeeId && h.targetShiftId === gap.shiftId)) continue;
            if (assignedIds.has(a.employeeId)) continue;
            if (a.position === "Supervisor") continue;
            const emp = source.find(e => e.id === a.employeeId);
            if (!emp) continue;
            if (emp.inTraining) continue;
            if ((emp.blockedShifts || []).includes(gap.shiftId)) continue;

            const hoType = shiftOrder[adjShiftId] < shiftOrder[gap.shiftId] ? "late-stay" : "early-arrival";
            // Build current bodies including previously-added handoffs for role check
            const handoffBodiesInGap = handoffs.filter(h => h.day === gap.day && h.targetShiftId === gap.shiftId);
            const allBodies = [...(ns[gapKey] || []), ...handoffBodiesInGap.map(h => {
              const he = source.find(e => e.id === h.employeeId);
              return he ? { employeeId: h.employeeId, position: h.position } : null;
            }).filter(Boolean)];
            const pos = pickPosition(emp, allBodies);
            if (!pos) continue;
            const fillsRole = (pos === "Scale" && needsScale) || (pos === "Medical" && needsMedical) ? pos : null;
            candidates.push({
              type: "handoff", emp, pos, fillsRole, adjShiftId, hoType,
              cost: candidateCost(emp, gap.shiftId, "handoff", HANDOFF_HOURS, fillsRole),
              apply: () => {
                handoffs.push({
                  day: gap.day, employeeId: emp.id, type: hoType,
                  sourceShiftId: adjShiftId, targetShiftId: gap.shiftId,
                  position: pos, hours: HANDOFF_HOURS,
                });
                if (hourTracker) hourTracker[emp.id] = (hourTracker[emp.id] || 0) + HANDOFF_HOURS;
              },
            });
          }
        }

        // ── Sort by cost ascending, apply cheapest until deficit filled ──
        candidates.sort((a, b) => a.cost - b.cost);
        const usedEmpIds = new Set();
        for (const c of candidates) {
          if (filled >= deficit) break;
          if (usedEmpIds.has(c.emp.id)) continue; // one move per employee per gap
          c.apply();
          usedEmpIds.add(c.emp.id);
          filled++;
          changed = true;
        }
      }

      // ── Role gap repair: swap in a qualified employee for a missing role ──
      for (const rg of roleGaps) {
        const rgKey = cellKey(rg.day, rg.shiftId);
        const currentAsgn = ns[rgKey] || [];
        const assignedIds = new Set(currentAsgn.map(a => a.employeeId));

        // Strategy 1: insert — find unassigned employee with the needed role
        const insertCands = source.filter(emp => {
          if (assignedIds.has(emp.id)) return false;
          if (emp.inTraining) return false;
          if (!(emp.qualifications || []).includes(rg.role)) return false;
          if ((emp.unavailableDays || []).includes(rg.day)) return false;
          if (empTimeOffDays && empTimeOffDays.has(emp.id + "__" + rg.day)) return false;
          if ((emp.blockedShifts || []).includes(rg.shiftId)) return false;
          if (emp.requiredShift && emp.requiredShift !== rg.shiftId && !emp.crossShiftOT) return false;
          const onThisDay = SHIFTS.some(s =>
            s.id !== rg.shiftId && (ns[cellKey(rg.day, s.id)] || []).some(a => a.employeeId === emp.id)
          );
          if (onThisDay && !emp.willing16h) return false;
          if (emp.maxShiftsPerWeek != null && (empShiftCount[emp.id] || 0) >= emp.maxShiftsPerWeek) return false;
          return true;
        }).sort((a, b) => candidateCost(a, rg.shiftId, "insert", SHIFT_HOURS, rg.role) - candidateCost(b, rg.shiftId, "insert", SHIFT_HOURS, rg.role));

        if (insertCands.length) {
          const emp = insertCands[0];
          const cap = REGULAR_SLOTS(rg.day, rg.shiftId) + (SUP_SLOT_DAY(rg.day, rg.shiftId) ? 1 : 0);
          if (currentAsgn.length < cap) {
            // Room to add — just insert
            ns[rgKey] = [...currentAsgn, { employeeId: emp.id, position: rg.role }];
            if (hourTracker) hourTracker[emp.id] = (hourTracker[emp.id] || 0) + SHIFT_HOURS;
            empShiftCount[emp.id] = (empShiftCount[emp.id] || 0) + 1;
            changed = true;
            continue;
          }
        }

        // Strategy 2: swap — replace a non-role-holding guard with a qualified employee
        const guardIdx = currentAsgn.findIndex(a => {
          const e = source.find(x => x.id === a.employeeId);
          return e && a.position === "Guard" && !(e.qualifications || []).includes(rg.role);
        });
        if (guardIdx >= 0 && insertCands.length) {
          const emp = insertCands[0];
          const evicted = currentAsgn[guardIdx];
          const evictedEmp = source.find(e => e.id === evicted.employeeId);
          ns[rgKey] = currentAsgn.filter((_, i) => i !== guardIdx);
          ns[rgKey] = [...ns[rgKey], { employeeId: emp.id, position: rg.role }];
          if (hourTracker) {
            hourTracker[emp.id] = (hourTracker[emp.id] || 0) + SHIFT_HOURS;
            if (evictedEmp) hourTracker[evictedEmp.id] = Math.max(0, (hourTracker[evictedEmp.id] || 0) - SHIFT_HOURS);
          }
          empShiftCount[emp.id] = (empShiftCount[emp.id] || 0) + 1;
          if (evictedEmp) empShiftCount[evictedEmp.id] = Math.max(0, (empShiftCount[evictedEmp.id] || 0) - 1);
          changed = true;
          continue;
        }

        // Strategy 3: handoff — pull qualified employee from adjacent shift for 4h
        const adjShiftsForRole = ADJACENT_HANDOFF[rg.shiftId] || [];
        for (const adjSid of adjShiftsForRole) {
          const adjAsgn = ns[cellKey(rg.day, adjSid)] || [];
          const cand = adjAsgn.find(a => {
            if (a.position === "Supervisor") return false;
            const e = source.find(x => x.id === a.employeeId);
            return e && (e.qualifications || []).includes(rg.role) &&
              !handoffs.some(h => h.day === rg.day && h.employeeId === e.id && h.targetShiftId === rg.shiftId);
          });
          if (cand) {
            const emp = source.find(e => e.id === cand.employeeId);
            const hoType = shiftOrder[adjSid] < shiftOrder[rg.shiftId] ? "late-stay" : "early-arrival";
            handoffs.push({
              day: rg.day, employeeId: emp.id, type: hoType,
              sourceShiftId: adjSid, targetShiftId: rg.shiftId,
              position: rg.role, hours: HANDOFF_HOURS,
            });
            if (hourTracker) hourTracker[emp.id] = (hourTracker[emp.id] || 0) + HANDOFF_HOURS;
            changed = true;
            break;
          }
        }
      }

      if (!changed) return result;

      // Re-validate after repairs (pass handoffs so they count as bodies)
      const issues = validateSchedule(ns, autoExtShifts, source, handoffs);
      const errors = issues.filter(i => i.level === "error").length;
      const warns  = issues.filter(i => i.level === "warn").length;
      return { ...result, ns, issues, errors, warns, handoffs };
    };

    // ── Iterative loop with diagnostic escalation ─────────────────────────────
    // Attempt 1 is deterministic baseline. Gap + role repair runs after each
    // attempt. If errors plateau for 3 consecutive attempts, the loop stops
    // early — jitter alone won't solve a structural block.
    const MAX_ATTEMPTS = 10;
    const PLATEAU_LIMIT = 3;
    autoFillCancelRef.current = false;
    setAutoFillRunning(true);

    let best = null;
    let attemptNum = 0;
    let plateauCount = 0;
    let prevBestErrors = Infinity;

    const tick = () => {
      if (autoFillCancelRef.current) {
        if (best) commit(best);
        setAutoFillRunning(false);
        setAutoFillProgress(null);
        return;
      }

      attemptNum++;
      let result = attempt(attemptNum > 1);
      if (result.errors > 0) result = repairGaps(result);

      if (!best || result.errors < best.errors || (result.errors === best.errors && result.warns < best.warns)) {
        best = result;
      }

      // Detect plateau: if best error count hasn't improved, increment counter
      if (best.errors >= prevBestErrors) {
        plateauCount++;
      } else {
        plateauCount = 0;
      }
      prevBestErrors = best.errors;

      setAutoFillProgress({ attempt: attemptNum, bestErrors: best.errors, bestWarns: best.warns });

      if (best.errors === 0) {
        commit(best);
        setAutoFillRunning(false);
        setAutoFillProgress(null);
        return;
      }

      if (attemptNum >= MAX_ATTEMPTS || plateauCount >= PLATEAU_LIMIT) {
        commit(best);
        setAutoFillRunning(false);
        setAutoFillProgress(null);
        return;
      }

      setTimeout(tick, 0);
    };

    setTimeout(tick, 0);
  }, [employees, setSchedule, setExtShifts, cfg, empTimeOffDays, empPatterns, extShifts, schedule, weekStart, history]);

  useEffect(()=>{

      runAutoFill(pendingAutoFill);

  const prevEmpsRef = useRef(null);
  useEffect(() => {

        JSON.stringify(emp.blockedShifts||[]) !== JSON.stringify(prev.blockedShifts||[]) ||

        JSON.stringify(emp.preferredDaysOff||[]) !== JSON.stringify(prev.preferredDaysOff||[]) ||
        JSON.stringify(emp.unavailableDays||[]) !== JSON.stringify(prev.unavailableDays||[]) ||
        JSON.stringify(emp.qualifications) !== JSON.stringify(prev.qualifications)

  const handleLoadWeek = (idx) => {

  if (!employees.length) return (

  const shadowEmp = dragEmp || hoverPickEmp;

  return (

          onDownload={()=>{ exportToExcel(employees, viewingHistory?viewingHistory.schedule:schedule, extShifts||[], weekStart, trainingBlocks||[], timeOffReqs||[]); setShowExcelPreview(false); }}

      {extSuggestions&&<ExtShiftApprovalModal suggestions={extSuggestions}
        onApprove={approveExtShift} onCancel={()=>setExtSuggestions(null)}/>}

      {scheduleStale && (
        <div style={{background:"transparent",border:"1px solid var(--ss-accent)",borderRadius:8,
          padding:"12px 18px",marginBottom:12,display:"flex",alignItems:"center",
          justifyContent:"space-between",gap:16,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {Icon("refresh-cw", {size:18, color:"var(--ss-accent)"})}
            <div>
              <div style={{fontSize:13,fontWeight:700,color:"var(--ss-accent)"}}>Schedule may need recalculating</div>
              <div style={{fontSize:11,color:"var(--ss-text-muted)",marginTop:2}}>
                Employee preferences, qualifications, or fatigue thresholds have changed. Recalculate to apply them.
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,flexShrink:0}}>
            <button onClick={()=>runAutoFill()} className="ss-btn ss-btn-md ss-btn-primary">
              {Icon("zap", {size:14, color:"#fff"})} Recalculate Schedule
            </button>
            <button onClick={()=>setScheduleStale(false)} className="ss-btn ss-btn-md ss-btn-secondary">
              Dismiss
            </button>
          </div>
        </div>
      )}
      {(()=>{

        const uhCount  = employees.filter(e=>e.employmentType==="full-time"&&calcHours(e.id,schedule,extShifts||[])<40).length;
        const fatCount = employees.filter(e=>DAYS.some(d=>SHIFTS.some(s=>(schedule[cellKey(d,s.id)]||[]).some(a=>a.employeeId===e.id&&(calcConsecutiveNights(e.id,schedule,d,s.id)>=(cfg?.maxConsecutiveNights??MAX_CONSECUTIVE_NIGHTS)))))).length;
        const extCount = (extShifts||[]).length;
        const totalBanners = (uhCount>0?1:0)+(fatCount>0?1:0)+(extCount>0?1:0);
        if(totalBanners===0) return null;
        return (
          <div style={{marginBottom:8}}>
