  Fragment:      preact.Fragment,
  createContext: preact.createContext,
  useState:      preactHooks.useState,

  useRef:        preactHooks.useRef,

<div id="app"></div>
<script>

// ── Destructure React hooks so bare names work throughout (useState, useEffect, etc.)
const {
  useState, useEffect, useCallback, useMemo, useRef,
  useContext, useReducer, createContext, memo, Fragment,
} = React;

// ── Storage layer ────────────────────────────────────────────────────────────
// Prefers window.storage (Claude artifact runner); falls back to localStorage.
const _hasWinStorage = (typeof window !== "undefined") &&
  !!window.storage && (typeof window.storage.get === "function");

const lsGet = (k) => {
  if (_hasWinStorage) return window.storage.get(k).catch(() => null);
  return Promise.resolve((() => {
    try { const v = localStorage.getItem(k); return v !== null ? {key:k,value:v} : null; }
    catch(_) { return null; }
  })());
};
const lsSet = (k, v) => {
  if (_hasWinStorage) return window.storage.set(k, v).catch(() => null);
  return Promise.resolve((() => {
    try { localStorage.setItem(k, v); return {key:k,value:v}; }
    catch(_) { return null; }
  })());
};
const lsDelete = (k) => {
  if (_hasWinStorage) return window.storage.delete(k).catch(() => null);
  return Promise.resolve((() => {
    try { localStorage.removeItem(k); return {key:k,deleted:true}; }
    catch(_) { return null; }
  })());
};
const lsList = (pfx) => {
  if (_hasWinStorage) return window.storage.list(pfx).catch(() => ({keys:[]}));
  return Promise.resolve((() => {
    try { return {keys:Object.keys(localStorage).filter(k=>!pfx||k.startsWith(pfx))}; }
    catch(_) { return {keys:[]}; }
  })());
};

// ShiftScheduler v34 — build 2026-03-10
// Sessions: 18 | Features: shift prefs, fatigue, 12hr ext shifts, OT relief,
//   dashboard, history, violations, time-off, rosters, ntfy, Excel export
// APP_BUILD_DATE reads from the file's own last-modified timestamp.
// In a browser this is set by the OS when the file is saved — always accurate.
const APP_BUILD_DATE = (() => {
  try {
    const d = new Date(document.lastModified);
    if (isNaN(d.getTime())) return "2026-03-12"; // fallback
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  } catch(_) { return "2026-03-12"; }
})();

const SCHEMA_VERSION = 4;
const APP_VERSION_MAJOR = 35;
// Version auto-combines major (hand-bumped per session) +
// minor (SCHEMA_VERSION, bumped when data shape changes).
const APP_VERSION = "v" + APP_VERSION_MAJOR + "." + SCHEMA_VERSION;
const SCHEMA_KEY = "shift_schema_version";

// Per-version employee migrations
// Each function takes the raw stored array and returns the migrated array.
const EMP_MIGRATIONS = {
  2: (emps) => emps.map(e => ({ notes: "", ...e })),
  3: (emps) => emps.map(e => ({
    availableDaysOfWeek: null,
    inTraining: false,
    swingEligible: [],
    crossShiftOT: false,
    ...e,
  })),
  4: (emps) => emps.map(e => ({ ...e, splitShiftEligible: e.splitShiftEligible ?? false })),
};

// runSchemaMigrations: call once on startup before usePersistentState loads.
// Reads stored version, runs needed migrations in order, writes new version.
async function runSchemaMigrations() {
  // Thin wrappers over the module-level lsGet/lsSet — avoids duplicating storage logic.
  const lsRead = async (key) => {
    try {
      const r = await lsGet(key);
      return r ? JSON.parse(r.value) : undefined;
    } catch(_) { return undefined; }
  };
  const lsWrite = async (key, val) => {
    try { await lsSet(key, JSON.stringify(val)); } catch(_) {}
  };

  const stored = await lsRead(SCHEMA_KEY);
  const fromVer = typeof stored === "number" ? stored : 0;

  if (fromVer >= SCHEMA_VERSION) return; // already current

  console.log("[Schema] Migrating from v" + fromVer + " to v" + SCHEMA_VERSION);

  // Migrate employees
  const emps = await lsRead("shift_employees");
  if (Array.isArray(emps)) {
    let migrated = emps;
    for (let v = fromVer + 1; v <= SCHEMA_VERSION; v++) {
      if (EMP_MIGRATIONS[v]) {
        migrated = EMP_MIGRATIONS[v](migrated);
        console.log("[Schema] Employee migration v" + v + " applied");
      }
    }
    await lsWrite("shift_employees", migrated);
  }

  // Migrate schedule: rename position "Supervisor" → "Guard" (v3)
  // Stamp the new version
  await lsWrite(SCHEMA_KEY, SCHEMA_VERSION);
  console.log("[Schema] Migration complete -> v" + SCHEMA_VERSION);
}

const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const WEEKDAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday"];
const SHIFTS = [
  { id: "first",  label: "1st Shift", time: "0600 \u2013 1400" },
  { id: "second", label: "2nd Shift", time: "1400 \u2013 2200" },
  { id: "third",  label: "3rd Shift", time: "2200 \u2013 0600" },
];
const POSITIONS = ["Guard","Scale","Medical"];
const ALL_POSITIONS = ["Supervisor",...POSITIONS];
const SHIFT_HOURS = 8;
const FT_MIN_HOURS = 40;
// MAX_CONSECUTIVE_NIGHTS and MIN_REST_HOURS are now user-configurable via SettingsCtx.
// Fallback values used in module-level helpers that can't access context:
const MAX_CONSECUTIVE_NIGHTS = 3;   // fallback only
const MIN_REST_HOURS = 12;          // fallback only

// ── 12-Hour Extended Shift constants ─────────────────────────────────────────
// A 12-hr extended shift pairs two employees to cover a gap:
//   DAY  variant: emp A works 0600–1800 (covers 1st+half-2nd)
//   NIGHT variant: emp B works 1800–0600 (covers half-2nd+3rd)
// Together they guarantee Scale+Medical coverage on 2nd shift.

// Can an employee work one half of a 12hr ext pair?
// slotIndex: 0 = first half (empA), 1 = second half (empB)
// pairId: "day" | "night" | "swing-10a-10p" | "swing-10p-10a" | "swing-2p-2a" | "swing-2a-2p"
// Checks requiredShift, blockedShifts, and shift availability against the 8hr shifts that half covers.
const canWorkExtHalf = (emp, pairId, slotIndex) => {
  const pair = EXT_PAIRS.find(p => p.id === pairId);
  if (!pair) return true;
  const shiftId = pair.covers[slotIndex]; // primary 8hr shift for this half
  if (shiftId && (emp.blockedShifts || []).includes(shiftId)) return false;
  if (shiftId && emp.requiredShift && emp.requiredShift !== shiftId) return false;
  // Swing shifts: check per-employee swingEligible array
  if (pair.isSwing) {
    const eligible = emp.swingEligible || [];
    return eligible.includes(pairId);
  }
  // Split pair: check splitShiftEligible flag + no block on the covered shift
  if (pairId === "split") {
    if (!emp.splitShiftEligible) return false;
    // empA (slot 0) covers second; empB (slot 1) covers third + next day first
    if (slotIndex === 1 && (emp.blockedShifts || []).includes("first")) return false;
    return true;
  }
  // Original 12hr pairs: check ext12hPref
  // ext12hPref: null=not available, "day"=day half only, "night"=night half only, "both"=either
  const pref = emp.ext12hPref || null;
  if (pref === null) return false;          // not available for any 12hr shifts
  if (pref === "both") return true;         // available for either
  if (pref === "day"   && pairId !== "day")   return false;
  if (pref === "night" && pairId !== "night") return false;
  return true;
};

  const shiftId = pair.covers[slotIndex];
  const label = { first:"1st", second:"2nd", third:"3rd" }[shiftId] || shiftId;
  if (shiftId && (emp.blockedShifts || []).includes(shiftId))

    return `${emp.name} is locked to ${({first:"1st",second:"2nd",third:"3rd"}[emp.requiredShift]||emp.requiredShift)} shift`;
  if (pair.isSwing) {

const SUP_SLOT_DAY = (d, s) => isWeekday(d) && s === "first";  // days a Sup slot exists

// Returns true when a slot has a given role covered — either by an assignment
// with that exact position, OR by any assigned employee who holds that qualification.
// This means a Scale+Medical employee assigned as "Scale" also covers Medical,
// so the slot correctly shows no missing-role warning.
// Exception: Supervisors assigned as "Supervisor" do NOT contribute their personal
// qualifications to role coverage — their non-Supervisor quals are last-resort only.
const slotHasRole = (asgn, employees, role) =>
  asgn.some(a => {
    const emp = employees ? employees.find(e => e.id === a.employeeId) : null;
    if (emp?.inTraining) return false; // trainees don't count toward coverage requirements
    if (a.position === role) return true;
    if (a.position === "Supervisor") return false; // Sup slot never covers Guard/Scale/Medical
    return emp && (emp.qualifications || []).includes(role);
  });

// Effective slot cap accounting for ext-shift bodies already covering this slot.
// Use this for fullness checks so a 12hr employee doesn't open a phantom slot.
const getEffectiveSlotCount = (d, s, extShifts) => {
  const base = getSlotCount(d, s);
  if (!extShifts || !extShifts.length) return base;
  const extBodies = extShifts.reduce((n, ext) => {
    const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
    if (!pair) return n;
    if (pair.covers.includes(s) && ext.day === d) {
      const idx = pair.covers.indexOf(s);
      return n + ((idx === 0 ? !!ext.empAId : idx === 1 ? !!ext.empBId : false) ? 1 : 0);
    }
    // Split cross-day: empB covers next day's first shift
    if (pair.crossDayB === s && ext.empBId) {
      const nextDay = DAYS[(DAYS.indexOf(ext.day) + 1) % 7];
      if (nextDay === d) return n + 1;
    }
    return n;
  }, 0);
  return Math.max(0, base - extBodies);
};

// Format a weekStart ISO string as "MM/DD – MM/DD"
function weekRangeLabel(weekStart) {
  const [wy,wm,wd] = weekStart.split("-").map(Number);
  const sun = new Date(wy,wm-1,wd,12);
  const sat = new Date(wy,wm-1,wd+6,12);
  const fmt = d => (d.getMonth()+1)+"/"+String(d.getDate()).padStart(2,"0");
  return fmt(sun)+" – "+fmt(sat);
}

// Compute a summary stat object from a schedule snapshot + employee list
function computeWeekStats(schedule, employees, extShiftsArg) {
  const totalSlots = DAYS.reduce((n,d)=>SHIFTS.reduce((m,s)=>m+getSlotCount(d,s.id),n),0);
  let totalOk=0, totalEmpty=0, totalMissingRole=0, totalOTHours=0, totalViolations=0;
  let underHoursFT=0;

  // Index 1: employee lookup map — O(1) vs O(N) find per slot per role
  const empMap = new Map(employees.map(e => [e.id, e]));
  const empHours = new Map(employees.map(e => [e.id, 0]));

  // Index 2: ext shifts grouped by "day__shiftId" key — O(1) vs O(extShifts) filter per slot
  const extBySlot = new Map();
  for (const ext of (extShiftsArg || [])) {
    const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
    if (!pair) continue;
    for (const shiftId of pair.covers) {
      const k = ext.day + "__" + shiftId;
      if (!extBySlot.has(k)) extBySlot.set(k, []);
      extBySlot.get(k).push(ext);
    }
  }

  for (const day of DAYS) {
    for (const shift of SHIFTS) {
      const key  = cellKey(day, shift.id);
      const asgn = schedule[key] || [];
      const max  = getSlotCount(day, shift.id);

      // Count hours and check roles using empMap for O(1) lookup
      let hasScale = false, hasMed = false;
      for (const a of asgn) {
        empHours.set(a.employeeId, (empHours.get(a.employeeId) || 0) + SHIFT_HOURS);
        if (a.position === "Scale") { hasScale = true; continue; }
        if (a.position === "Medical") { hasMed = true; continue; }
        if (a.position !== "Supervisor") {
          const emp = empMap.get(a.employeeId);
          if (emp) {
            if (!hasScale && (emp.qualifications||[]).includes("Scale")) hasScale = true;
            if (!hasMed  && (emp.qualifications||[]).includes("Medical")) hasMed = true;
          }
        }
      }

      // O(1) ext slot lookup
      const cellExt   = extBySlot.get(key) || [];
      const extScale   = cellExt.some(e => (e.roles||[]).includes("Scale"));
      const extMedical = cellExt.some(e => (e.roles||[]).includes("Medical"));
      const extFilled  = cellExt.reduce((n, e) => n + (e.empAId ? 1 : 0) + (e.empBId ? 1 : 0), 0);
      const effectiveFilled  = Math.min(asgn.length + extFilled, max);
      const effectiveScale   = hasScale || extScale;
      const effectiveMedical = hasMed   || extMedical;
      if (!asgn.length && !extFilled) totalEmpty++;
      else if (!effectiveScale || !effectiveMedical) totalMissingRole++;
      else if (effectiveFilled === max) totalOk++;
    }
  }

  for (const e of employees) {
    const h = empHours.get(e.id) || 0;
    if (e.employmentType === "full-time" && h > 40) totalOTHours += h - 40;
    if (e.employmentType === "full-time" && h < 40) underHoursFT++;
    totalViolations += getAllPrefViolations(e, schedule).length;
  }

  const coveragePct = totalSlots > 0 ? Math.round((totalOk / totalSlots) * 100) : 0;
  return { coveragePct, totalEmpty, totalMissingRole, totalOTHours, underHoursFT, totalViolations, totalOk, totalSlots };
}

// ── Persistent State ──────────────────────────────────────────────────────────
function usePersistentState(key, fallback) {
  // Always start loaded=true and hydrate value from storage if available.
  // This avoids loading gate hangs if window.storage is slow or unavailable.
  const loadInit = () => {
    if (_hasWinStorage) {
      return typeof fallback === "function" ? fallback() : fallback;
    }
    try {
      const raw = localStorage.getItem(key);
      if (raw !== null) return JSON.parse(raw);
    } catch (_) {}
    return typeof fallback === "function" ? fallback() : fallback;
  };

  const [val, setValRaw] = useState(loadInit);
  // Always start as loaded — window.storage hydration is best-effort
  const [loaded, setLoaded] = useState(true);

  useEffect(() => {
    if (!_hasWinStorage) return;
    // Best-effort hydration from window.storage — don't block loading gate
    (async () => {
      try {
        const r = await window.storage.get(key);
        if (r && r.value !== undefined) setValRaw(JSON.parse(r.value));
      } catch (_) {}
    })();
  }, [key]);

  const setVal = useCallback((updater) => {
    setValRaw((prev) => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      const serialized = JSON.stringify(next);
      if (_hasWinStorage) {
        try { window.storage.set(key, serialized); } catch (_) {}
      } else {
        try { localStorage.setItem(key, serialized); } catch (_) {}
      }
      return next;
    });
  }, [key]);

  return [val, setVal, loaded];
}
// ── Hours calculator ──────────────────────────────────────────────────────────
function calcHours(empId, schedule, extShifts) {
  let hours = 0;
  Object.values(schedule).forEach(a => a.forEach(x => { if (x.employeeId === empId) hours += SHIFT_HOURS; }));
  if (extShifts) {
    extShifts.forEach(ext => {
      if (ext.empAId === empId || ext.empBId === empId) hours += EXT_SHIFT_HOURS;
    });
  }
  return hours;
}

// ── Fatigue helpers ───────────────────────────────────────────────────────────
// Returns how many consecutive 3rd-shift (night) slots this employee is assigned
// ending at (and including) the given slot, looking backwards.
function calcConsecutiveNights(empId, schedule, upToDay, upToShiftId) {
  const idx = slotIndex(upToDay, upToShiftId);
  let count = 0;
  for (let i = idx; i >= 0; i--) {
    const { day, shiftId } = ALL_SLOTS[i];
    if (shiftId !== "third") { count = 0; continue; }
    const asgn = schedule[cellKey(day, shiftId)] || [];
    if (asgn.some(a => a.employeeId === empId)) count++;
    else break;
  }
  return count;
}

// Returns hours since the employee's previous shift ended, relative to the
// start of the given slot. Returns Infinity if no previous shift this week.
// Shift order within a day: first starts 06:00, second 14:00, third 22:00
// Each lasts 8 hours: first ends 14:00, second ends 22:00, third ends 06:00 next day
const SHIFT_START_HOUR = { first: 6, second: 14, third: 22 };
const SLOT_OFFSET_HOURS = (day, shiftId) =>
  DAYS.indexOf(day) * 24 + SHIFT_START_HOUR[shiftId];

function calcRestGap(empId, schedule, day, shiftId, extShifts) {
  const myStart = SLOT_OFFSET_HOURS(day, shiftId);
  let prevEnd = -Infinity;
  // Walk backwards through regular schedule slots
  const idx = slotIndex(day, shiftId);
  for (let i = idx - 1; i >= 0; i--) {
    const { day: d, shiftId: s } = ALL_SLOTS[i];
    const end = SLOT_OFFSET_HOURS(d, s) + SHIFT_HOURS;
    if (end > myStart) continue;
    const asgn = schedule[cellKey(d, s)] || [];
    if (asgn.some(a => a.employeeId === empId)) {
      if (end > prevEnd) prevEnd = end;
      break;
    }
    if (myStart - end > 24) break;
  }
  // Also check ext shifts (12hr, swing, split) the employee is participating in
  for (const ext of (extShifts || [])) {
    if (ext.empAId !== empId && ext.empBId !== empId) continue;
    const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
    if (!pair) continue;
    const di = DAYS.indexOf(ext.day);
    let startH;
    if (ext.empAId === empId) {
      startH = di * 24 + (pair.startHour ?? 6);
    } else {
      const dayOffset = pair.nextDayB ? 1 : 0;
      startH = (di + dayOffset) * 24 + (pair.startHourB ?? pair.startHour ?? 18);
    }
    const endH = startH + EXT_SHIFT_HOURS;
    if (endH <= myStart && endH > prevEnd) prevEnd = endH;
  }
  if (prevEnd === -Infinity) return Infinity;
  return myStart - prevEnd;
}

// Collect all fatigue issues for an employee across the whole schedule


// Returns true if the rest gap is a genuine violation.
// Exempts willing16h employees from the 0-gap check (adjacent same-day shifts
// like 1st→2nd are intentional back-to-back; calcConsecutiveHours caps the 16h limit).
const isRestViolation = (emp, gap, minRest) =>
  gap < minRest && !(emp.willing16h && gap === 0);

const MAX_CONSECUTIVE_HOURS = 16; // hard cap — strictly enforced everywhere
const OT_RELIEF_THRESHOLD = 48;   // hours above which OT relief suggestions are generated

// Per-employee effective cap: employees not willing to work 16h are limited to
// one shift (8h) at a time. All other fatigue/rest rules still apply on top.
const empMaxConsec = (emp) => (emp && emp.willing16h) ? MAX_CONSECUTIVE_HOURS : SHIFT_HOURS;

// Returns total consecutive hours an employee would work if placed on (day, shiftId).
// Merges adjacent/overlapping existing shifts + the proposed slot into contiguous blocks,
// then returns the length of whichever merged block contains the proposed slot.
// Includes 12-hr ext shifts so a 12h+8h back-to-back is correctly counted as 20h.
function calcConsecutiveHours(empId, schedule, day, shiftId, extShifts) {
  // Build blocks only from keys where this employee appears — O(assigned) not O(all slots)
  const blocks = [];
  for (const key of Object.keys(schedule)) {
    const asgn = schedule[key];
    if (!asgn.length) continue;
    if (!asgn.some(a => a.employeeId === empId)) continue;
    const [d, s] = key.split("__");
    if (!SHIFT_START_HOUR[s]) continue; // guard malformed keys
    blocks.push([SLOT_OFFSET_HOURS(d, s), SLOT_OFFSET_HOURS(d, s) + SHIFT_HOURS]);
  }
  for (const ext of (extShifts || [])) {
    if (ext.empAId !== empId && ext.empBId !== empId) continue;
    const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
    if (!pair) continue;
    const di = DAYS.indexOf(ext.day);
    let startH;
    if (ext.empAId === empId) {
      startH = di * 24 + (pair.startHour ?? 6);
    } else {
      // empB — split pair starts on next calendar day
      const dayOffset = pair.nextDayB ? 1 : 0;
      startH = (di + dayOffset) * 24 + (pair.startHourB ?? pair.startHour ?? 18);
    }
    blocks.push([startH, startH + EXT_SHIFT_HOURS]);
  }
  const propStart = SLOT_OFFSET_HOURS(day, shiftId);
  blocks.push([propStart, propStart + SHIFT_HOURS]);
  blocks.sort((a, b) => a[0] - b[0]);
  const merged = [];
  for (const [s, e] of blocks) {
    if (merged.length && s <= merged[merged.length - 1][1]) {
      merged[merged.length - 1][1] = Math.max(merged[merged.length - 1][1], e);
    } else {
      merged.push([s, e]);
    }
  }
  const hit = merged.find(([s, e]) => s <= propStart && propStart < e);
  return hit ? hit[1] - hit[0] : SHIFT_HOURS;
}

function getFatigueIssues(empId, schedule, cfg, employees, extShifts) {
  const maxNights = cfg?.maxConsecutiveNights ?? MAX_CONSECUTIVE_NIGHTS;
  const minRest   = cfg?.minRestHours ?? MIN_REST_HOURS;
  const issues = [];
  // Hoist employee lookup — avoids O(N) find on every slot
  const emp16  = employees ? employees.find(e => e.id === empId) : null;
  const maxC16 = emp16 ? empMaxConsec(emp16) : MAX_CONSECUTIVE_HOURS;
  // Scan only schedule keys where this employee appears — O(assigned) not O(allSlots)
  for (const key of Object.keys(schedule)) {
    const asgn = schedule[key];
    if (!asgn.length || !asgn.some(a => a.employeeId === empId)) continue;
    const [day, shiftId] = key.split("__");
    if (!SHIFT_START_HOUR[shiftId]) continue;
    const nights = calcConsecutiveNights(empId, schedule, day, shiftId);
    if (nights > maxNights) issues.push({ day, shiftId, type: "consecutive_nights", count: nights });
    const rest = calcRestGap(empId, schedule, day, shiftId);
    if (rest < minRest && rest !== Infinity) issues.push({ day, shiftId, type: "short_rest", restHours: Math.round(rest * 10) / 10 });
    const consecH = calcConsecutiveHours(empId, schedule, day, shiftId, extShifts);
    if (consecH > maxC16) issues.push({ day, shiftId, type: "over_16h", hours: consecH, cap: maxC16 });
  }
  return issues;
}

// ── Preferred-shift / 5-on-2-off helpers ─────────────────────────────────────

// Returns the index of the day in the DAYS array
const dayIdx = (d) => DAYS.indexOf(d);

// Given an employee's preferredDaysOff (array of 2 day names), check if
// a given (day, shiftId) assignment violates it
function violatesDaysOff(emp, day) {
  const off = emp.preferredDaysOff || [];
  return off.includes(day);
}

// Count how many consecutive working days this employee has ending on `day`.
// prevWeekTail: days worked consecutively at end of previous week (cross-boundary detection).
function consecutiveWorkingDays(empId, schedule, upToDay, prevWeekTail) {
  const idx = dayIdx(upToDay);
  let count = 0;
  for (let i = idx; i >= 0; i--) {
    const d = DAYS[i];
    const workedThisDay = SHIFTS.some(s => {
      const asgn = schedule[cellKey(d, s.id)] || [];
      return asgn.some(a => a.employeeId === empId);
    });
    if (workedThisDay) count++;
    else break;
  }
  // Only add prevWeekTail when past Sunday (idx > 0) and streak runs
  // unbroken back to Sunday — idx === 0 means we're ON Sunday (fresh start).
  if (idx > 0 && count === idx + 1 && prevWeekTail) count += prevWeekTail;
  return count;
}

// Violation checks for a single assignment
function getPreferenceViolations(emp, day, shiftId, schedule) {
  const v = [];
  if (violatesDaysOff(emp, day)) {
    v.push({ type: "days_off", msg: `Scheduled on preferred day off (${day})` });
  }
  // Blocked shift — hard violation
  if ((emp.blockedShifts||[]).includes(shiftId)) {
    const shiftLabel = SHIFTS.find(s=>s.id===shiftId)?.label || shiftId;
    v.push({ type: "blocked_shift", msg: `Placed on BLOCKED shift (${shiftLabel})` });
  }
  // Required shift — placed on wrong shift
  if (emp.requiredShift && emp.requiredShift !== shiftId) {
    const shiftLabel = SHIFTS.find(s=>s.id===shiftId)?.label || shiftId;
    const reqLabel   = SHIFTS.find(s=>s.id===emp.requiredShift)?.label || emp.requiredShift;
    v.push({ type: "wrong_shift_required", msg: `REQUIRED ${reqLabel} — placed on ${shiftLabel}` });
  }
  // Preferred shifts — soft violation if placed off-preference
  const prefs = emp.preferredShifts||[];
  if (!emp.requiredShift && prefs.length > 0 && !prefs.includes(shiftId)) {
    const shiftLabel = SHIFTS.find(s=>s.id===shiftId)?.label || shiftId;
    const prefLabels = prefs.map(p=>SHIFTS.find(s=>s.id===p)?.label||p).join(" or ");
    v.push({ type: "wrong_shift", msg: `On ${shiftLabel} (prefers ${prefLabels})` });
  }
  // 5-on-2-off: flag if consecutive working days exceeds 5
  const consec = consecutiveWorkingDays(emp.id, schedule, day, 0);
  if (consec > 5) {
    v.push({ type: "overwork", msg: `${consec} consecutive days (max 5)` });
  }
  return v;
}

// Collect all preference violations for an employee across the whole schedule
function getAllPrefViolations(emp, schedule) {
  const all = [];
  // Scan only keys where this employee appears — O(assigned) not O(allSlots)
  for (const key of Object.keys(schedule)) {
    const asgn = schedule[key];
    if (!asgn.length || !asgn.some(a => a.employeeId === emp.id)) continue;
    const [day, shiftId] = key.split("__");
    if (!SHIFT_START_HOUR[shiftId]) continue;
    const v = getPreferenceViolations(emp, day, shiftId, schedule);
    for (const viol of v) all.push({ day, shiftId, ...viol });
  }
  return all;
}

// ── Extended-Shift Pair Finder ───────────────────────────────────────────────
// Finds candidate pairs of employees who could cover a gap on (day) using
// 12-hour extended shifts. Returns array of suggestion objects.
// Only suggests when: (a) a role gap exists on 2nd shift that cannot be filled
// normally, and (b) the pair shares the needed qualifications.
function findExtShiftPairs(day, employees, schedule, extShifts) {
  const pairs = [];

  // For each ext pair type (day/night)
  for (const pair of EXT_PAIRS) {
    // Check if any covered shift has unmet roles
    const coveredGaps = pair.covers.flatMap(shiftId => {
      const asgn = schedule[cellKey(day, shiftId)] || [];
      const missing = [];
      if (!slotHasRole(asgn, employees, "Scale"))   missing.push("Scale");
      if (!slotHasRole(asgn, employees, "Medical")) missing.push("Medical");
      return missing.map(role => ({ shiftId, role }));
    });
    if (!coveredGaps.length) continue;

    // Check if this pair is already assigned for this day
    const alreadyUsed = extShifts.some(e => e.day === day && e.pairId === pair.id);
    if (alreadyUsed) continue;

    // Find employees who can fill the missing roles
    const neededRoles = [...new Set(coveredGaps.map(g => g.role))];

    // Find candidates: must have ALL needed roles as qualifications
    const candidates = employees.filter(emp => {
      if ((emp.unavailableDays || []).includes(day)) return false;
      // Already assigned in both covered shifts? skip
      const alreadyInBoth = pair.covers.every(shiftId => {
        const asgn = schedule[cellKey(day, shiftId)] || [];
        return asgn.some(a => a.employeeId === emp.id);
      });
      if (alreadyInBoth) return false;
      return neededRoles.every(role => emp.qualifications.includes(role));
    });

    if (candidates.length < 1) continue;

    // Build pair suggestions: need one employee for DAY side and one for NIGHT
    // Or a single employee can do both (single person 12hr — less common)
    // Primary suggestion: pick best two candidates with matching qual
    for (let i = 0; i < candidates.length; i++) {
      for (let j = i + 1; j < candidates.length; j++) {
        const empA = candidates[i]; // would work first half
        const empB = candidates[j]; // would work second half
        // Both must share all needed roles
        const aRoles = extRoles(empA);
        const bRoles = extRoles(empB);
        const sharedRoles = neededRoles.filter(r => aRoles.includes(r) && bRoles.includes(r));
        if (sharedRoles.length !== neededRoles.length) continue;
        // Enforce shift lock: empA works covers[0], empB works covers[1]
        const aOk = canWorkExtHalf(empA, pair.id, 0) && canWorkExtHalf(empB, pair.id, 1);
        const bOk = canWorkExtHalf(empB, pair.id, 0) && canWorkExtHalf(empA, pair.id, 1);
        if (!aOk && !bOk) continue; // neither slot order works
        const [finalA, finalB] = aOk ? [empA, empB] : [empB, empA];
        pairs.push({ pairId: pair.id, pair, day, empA: finalA, empB: finalB, neededRoles, coveredGaps });
        if (pairs.length >= 6) return pairs; // cap at 6 suggestions
      }
    }
    // If no two-person pair but one person covers all: single-person 12hr (rare)
    if (!pairs.length) {
      for (const emp of candidates) {
        if (neededRoles.every(r => emp.qualifications.includes(r))) {
          pairs.push({ pairId: pair.id, pair, day, empA: emp, empB: null, neededRoles, coveredGaps });
          break;
        }
      }
    }
  }
  return pairs;
}

// ── Time-off helpers (used by buildAutoFill + EmpPicker) ─────────────────────
// Checks if a time-off request covers a given week-day + shiftId
function timeOffCoversSlot(req, dayName, shiftId, weekStartISO) {
  if (req.status !== "approved") return false;
  const weekBase = new Date(weekStartISO + "T00:00:00");
  const dayIdx   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"].indexOf(dayName);
  const slotDate = new Date(weekBase);
  slotDate.setDate(weekBase.getDate() + dayIdx);
  const slotISO  = slotDate.toISOString().slice(0,10);
  if (slotISO < req.startDate || slotISO > req.endDate) return false;
  if (req.type === "partial" && req.shiftId !== shiftId) return false;
  return true;
}
function getTimeOffForDay(timeOffRequests, empId, dayName, weekStartISO, shiftId) {
  return (timeOffRequests||[]).filter(r =>
    r.empId === empId && timeOffCoversSlot(r, dayName, shiftId ?? "first", weekStartISO)
    && (shiftId == null || r.type !== "partial" || r.shiftId === shiftId)
  );
}

// ── Auto-fill builder ─────────────────────────────────────────────────────────
// Goal: each employee works consecutive days on a consistent shift, then takes
// their days off together, then repeats — matching their preferredShift and
// preferredDaysOff as closely as possible.
//
// Algorithm:
//  1. Pre-assign each employee a "work block" across the week using a rotating
//     pattern: (maxShifts) consecutive work days, then (7-maxShifts) days off.
//     The block start rotates per employee to spread coverage across all days.
//  2. Each employee is locked to one shift for their whole block (preferredShift
//     if set, otherwise assigned to the shift with the most coverage need).
//  3. Score-based slot filling resolves ties and handles edge cases.
// Guard-only: qualifications contain Guard but NOT Scale or Medical.
// Pure function — no closure deps, accessible everywhere.
const isGuardOnly = (e) => {
  const q = e.qualifications || [];
  return q.includes("Guard") && !q.includes("Scale") && !q.includes("Medical");
};

function buildAutoFill(sourceEmps, cfg, empTimeOffDays, empPatterns, extShiftsArg, jitter = false) {
  const maxNights = cfg?.maxConsecutiveNights ?? MAX_CONSECUTIVE_NIGHTS;
  const minRest   = cfg?.minRestHours ?? MIN_REST_HOURS;
  // Wrapper that automatically includes extShiftsArg in rest-gap checks
  const rg = (id, sched, d, s) => calcRestGap(id, sched, d, s, extShiftsArg);
  const maxShifts = cfg?.maxConsecutiveShifts ?? 5;
  const daysOff   = Math.max(1, 7 - maxShifts); // rest days in the cycle
  const ns          = {};
  const hourTracker = {};
  const dayWorked   = {};
  const shiftsWorked = {};
  sourceEmps.forEach(e => { hourTracker[e.id] = 0; dayWorked[e.id] = new Set(); shiftsWorked[e.id] = 0; });
  // Seed ext shift hours so the algorithm knows these employees are pre-committed.
  // Without this, an employee with a 12h ext shift still shows 0h and gets a full
  // regular week assigned on top of it (causing 60h+ overloads like Harms).
  (extShiftsArg || []).forEach(ext => {
    if (ext.empAId && hourTracker[ext.empAId] !== undefined) hourTracker[ext.empAId] += EXT_SHIFT_HOURS;
    if (ext.empBId && hourTracker[ext.empBId] !== undefined) hourTracker[ext.empBId] += EXT_SHIFT_HOURS;
  });

  // ── Step 1: Assign each employee a shift + work-block plan for the week ───
  // "plan[empId]" = { shiftId, workDays: Set<dayName> }
  const plan = {};

  // Spread employees across shifts, respecting preferred shift where possible.
  // Group employees by their preferred shift (or "any" if none set).
  const shiftGroups = { first: [], second: [], third: [], any: [] };
  sourceEmps.forEach(e => {
    const prefs = e.preferredShifts||[];
    if ((e.qualifications||[]).includes("Supervisor")) {
      shiftGroups.first.push(e);
    } else if (e.requiredShift && shiftGroups[e.requiredShift]) {
      shiftGroups[e.requiredShift].push(e);
    } else if (prefs.length === 1 && shiftGroups[prefs[0]]) {
      shiftGroups[prefs[0]].push(e);
    } else if (prefs.length > 1) {
      // Multi-preferred: assign to whichest preferred group needs most help (handled below via any)
      shiftGroups.any.push(e);
    } else if (empPatterns && empPatterns[e.id]?.shiftId && shiftGroups[empPatterns[e.id].shiftId]) {
      // No preference set — carry forward last week's shift assignment for continuity
      shiftGroups[empPatterns[e.id].shiftId].push(e);
    } else {
      shiftGroups.any.push(e);
    }
  });

  // Distribute "any" employees to under-staffed shifts
  const shiftNeeds = SHIFTS.map(s => ({
    id: s.id,
    count: shiftGroups[s.id].length,
  }));
  shiftGroups.any.forEach(e => {
    const lightest = shiftNeeds.slice().sort((a, b) => a.count - b.count)[0];
    shiftGroups[lightest.id].push(e);
    lightest.count++;
  });

  // For each shift group, assign rotating work-block start days so the whole
  // week gets covered evenly.  Employees within a group stagger their start.
  SHIFTS.forEach(shift => {
    const group = shiftGroups[shift.id];
    if (!group.length) return;

    // How many employees do we need on any given day for this shift?
    const slotsPerDay = DAYS.reduce((sum, d) => sum + REGULAR_SLOTS(d, shift.id), 0) / 7;
    // Stagger: spread block-starts evenly across 7 days
    // Only count FT employees for spacing — OC/PT get their own plan path
    const ftGroupSize = group.filter(e => e.employmentType === "full-time").length || 1;
    let ftIdx = 0; // separate index counter for FT employees only
    group.forEach((emp, idx) => {
      // Even spacing: Math.floor distributes starts across all 7 days without collisions.
      // Pattern memory: advance the employee's blockStart from the previous week by the
      // full cycle length (maxShifts work days + daysOff rest days = 7) so the rotation
      // rolls forward predictably each week.  For a 5-on/2-off pattern this always
      // advances by 7, which wraps cleanly — the employee's rest days shift by one
      // position each week, giving a fair rolling schedule over time.
      const freshBlockStart = Math.floor((ftIdx / ftGroupSize) * 7);
      const prevPattern = empPatterns && empPatterns[emp.id];
      // requiredShift employees anchor to Sunday on fresh start so they cover
      // the beginning of the week where specialist gaps are most critical.
      // On subsequent weeks their blockStart advances normally from storage.
      const freshBlockStartEff = emp.requiredShift ? 0 : freshBlockStart;
      // rotationMode: "rolling" advances by 1 day/week; "fixed" keeps same days off.
      const rotationMode = cfg?.rotationMode ?? "fixed";
      const advancement = rotationMode === "rolling" ? 1 : (maxShifts + daysOff);
      const blockStart = prevPattern?.blockStart !== undefined
        ? (prevPattern.blockStart + advancement) % 7
        : freshBlockStartEff;

      // Build the set of work days: maxShifts consecutive starting at blockStart,
      // wrapping around the week, but respecting preferred days off.
      const preferredOff = new Set(emp.preferredDaysOff || []);
      const workDays = new Set();

      // Try to place exactly maxShifts work days starting at blockStart,
      // skipping preferred-off days as the "gap".
      let placed = 0;
      for (let offset = 0; offset < 7 && placed < maxShifts; offset++) {
        const d = DAYS[(blockStart + offset) % 7];
        if (!preferredOff.has(d) && !(emp.unavailableDays || []).includes(d)) {
          workDays.add(d);
          placed++;
        }
      }
      // If we couldn't fill maxShifts (e.g. many unavail days), relax and fill rest
      if (placed < maxShifts) {
        for (let offset = 0; offset < 7 && placed < maxShifts; offset++) {
          const d = DAYS[(blockStart + offset) % 7];
          if (!workDays.has(d) && !(emp.unavailableDays || []).includes(d)) {
            workDays.add(d);
            placed++;
          }
        }
      }

      // PT employees: override the plan with just their available days —
      // don't force them into the 5-on-2-off FT rotation block.
      if (emp.employmentType !== "full-time") {
        const ptAvail = new Set(
          DAYS.filter(d =>
            !(emp.unavailableDays||[]).includes(d) &&
            !(emp.preferredDaysOff||[]).includes(d)
          )
        );
        // If they've blocked everything, fall back to just non-unavailable days
        const ptWorkDays = ptAvail.size > 0 ? ptAvail
          : new Set(DAYS.filter(d => !(emp.unavailableDays||[]).includes(d)));
        plan[emp.id] = { shiftId: shift.id, workDays: ptWorkDays, isPT: true, maxShiftsPerWeek: emp.maxShiftsPerWeek ?? null };
      } else if ((emp.qualifications||[]).includes("Supervisor")) {
        // Supervisors must be scheduled every weekday on 1st shift — enforce it
        const supWorkDays = new Set(
          DAYS.filter(d => isWeekday(d) && !(emp.unavailableDays||[]).includes(d))
        );
        // Also allow weekend days from the regular work-block so they can still reach 40h
        // if a weekday is unavailable — add remaining non-unavail days up to maxShifts
        let supPlaced = supWorkDays.size;
        for (let offset = 0; offset < 7 && supPlaced < maxShifts; offset++) {
          const d = DAYS[(blockStart + offset) % 7];
          if (!supWorkDays.has(d) && !(emp.unavailableDays||[]).includes(d)) {
            supWorkDays.add(d);
            supPlaced++;
          }
        }
        plan[emp.id] = { shiftId: "first", workDays: supWorkDays, maxShiftsPerWeek: emp.maxShiftsPerWeek ?? null, blockStart };
      } else {
        plan[emp.id] = { shiftId: shift.id, workDays, maxShiftsPerWeek: emp.maxShiftsPerWeek ?? null, blockStart };
      }
      if (emp.employmentType === "full-time") ftIdx++; // advance FT index after FT plan assigned
    });
  });

  // ── Step 2: Build qualification-group peer sets for fairness ────────────
  // For each employee, find peers who share at least one qualifying position.
  // "fairness penalty" = how many MORE hours this emp has vs the peer-group minimum.
  // This strongly levels shift counts across employees with shared qualifications.
  const qualGroups = {}; // qual -> [empId, ...]
  POSITIONS.forEach(pos => {  // Supervisor excluded from regular peer groups
    qualGroups[pos] = sourceEmps.filter(e => e.qualifications.includes(pos)).map(e => e.id);
  });
  const peerMinHours = (emp) => {
    // Minimum hours among all employees sharing any qualification with this emp
    const peerIds = new Set();
    emp.qualifications.forEach(q => (qualGroups[q] || []).forEach(id => peerIds.add(id)));
    peerIds.delete(emp.id);
    if (!peerIds.size) return 0;
    return Math.min(...[...peerIds].map(id => hourTracker[id] || 0));
  };

  // ── Step 2b: CSP Domain Matrix ───────────────────────────────────────────
  // Pre-compute feasibility: domains[empId][cellKey] = Set<positions>.
  // Hard eliminations applied once — before any slot is touched:
  //   • unavailableDays        (calendar block — specific dates)
  //   • availableDaysOfWeek    (day-of-week lock — e.g. Ray: Tue/Wed only)
  //   • blockedShifts          (shift-type block)
  //   • empTimeOffDays         (approved time off)
  //   • qualifications         (position eligibility via canFillPos)
  //   • requiredShift          (FT anchored to a single shift)
  //   • Supervisor logic       (weekday 1st only)
  // What remains is the strict pre-filtered matrix of mathematically possible moves.
  const domains = {};
  sourceEmps.forEach(emp => {
    domains[emp.id] = {};
    const isSup = (emp.qualifications||[]).includes("Supervisor");
    const allowedDOW = emp.availableDaysOfWeek && emp.availableDaysOfWeek.length > 0
      ? emp.availableDaysOfWeek : null; // null = all days OK
    for (const day of DAYS) {
      if ((emp.unavailableDays||[]).includes(day)) continue;
      if (allowedDOW && !allowedDOW.includes(day)) continue; // day-of-week lock
      if (empTimeOffDays && empTimeOffDays.has(emp.id + "__" + day)) continue;
      for (const shift of SHIFTS) {
        if ((emp.blockedShifts||[]).includes(shift.id)) continue;
        if (emp.requiredShift && emp.requiredShift !== shift.id && !emp.crossShiftOT) continue;
        if (isSup && !SUP_SLOT_DAY(day, shift.id)) continue;
        const key = cellKey(day, shift.id);
        const eligible = new Set(
          ALL_POSITIONS.filter(p => canFillPos(emp, p, day) && getAvailPos(day, shift.id).includes(p))
        );
        if (eligible.size > 0) domains[emp.id][key] = eligible;
      }
    }
  });

  const totalFeasible = Object.values(domains).flatMap(d => Object.values(d)).reduce((n,s) => n + s.size, 0);
  const totalPossible = sourceEmps.length * 21 * ALL_POSITIONS.length;
  console.log(`[CSP] Domain matrix: ${sourceEmps.length} emps × 21 slots → ${totalFeasible} feasible triples (${((totalFeasible/totalPossible)*100).toFixed(1)}% of ${totalPossible} possible remain after exclusion)`);

  // Slot domain size: total (emp, position) pairs still feasible for a given slot key.
  const slotDomainSize = (key) => {
    let count = 0;
    for (const emp of sourceEmps) {
      const d = domains[emp.id]?.[key];
      if (d) count += d.size;
    }
    return count;
  };

  // Bottleneck score: total (slot, position) pairs remaining in emp's domain.
  // Lower = more constrained = should be placed before flexible employees.
  // Reads the live domain (updated by forwardCheck), so it's reactive as the week fills.
  const empRemainingOptions = (emp) =>
    Object.values(domains[emp.id] || {}).reduce((n, s) => n + s.size, 0);

  // Forward checking: after assigning emp to a day, remove them from all slots on
  // that day (can't double-book) and from all slots if their weekly cap is now full.
  const forwardCheck = (emp, assignedDay) => {
    for (const s of SHIFTS) delete domains[emp.id][cellKey(assignedDay, s.id)];
    const cap = emp.maxShiftsPerWeek;
    if (cap !== null && cap !== undefined && (shiftsWorked[emp.id] || 0) >= cap) {
      domains[emp.id] = {};
    }
  };

  // ── Score function used for tie-breaking within a slot ───────────────────
  // targetPos: position being scored for — drives role-stretch penalty.
  const empScore = (emp, day, shiftId, targetPos) => {
    // CSP domain gate: pre-filtered matrix says this (emp, slot) is impossible → skip
    if (!domains[emp.id]?.[cellKey(day, shiftId)]) return null;
    // Hard blocks (kept as safety net — domain matrix already excludes most of these)
    if ((emp.unavailableDays || []).includes(day)) return null;
    // Day-of-week availability lock (e.g. Ray: Tue/Wed only)
    const allowedDOW = emp.availableDaysOfWeek && emp.availableDaysOfWeek.length > 0
      ? emp.availableDaysOfWeek : null;
    if (allowedDOW && !allowedDOW.includes(day)) return null;
    if (empTimeOffDays && empTimeOffDays.has(emp.id + "__" + day)) return null;
    // Qualification gate: employee must be able to fill at least one position in this slot
    if (!getAvailPos(day, shiftId).some(p => emp.qualifications.includes(p))) return null;
    if (isRestViolation(emp, rg(emp.id, ns, day, shiftId), minRest)) return null;
    if (calcConsecutiveHours(emp.id, ns, day, shiftId, extShiftsArg) > empMaxConsec(emp)) return null;
    if (shiftId === "third" && calcConsecutiveNights(emp.id, ns, day, shiftId) >= maxNights) return null;
    // Requires: employee must only appear on their required shift — hard block all others.
    // Exception: crossShiftOT flag overrides this so the employee can fill any shift for OT.
    if (emp.requiredShift && emp.requiredShift !== shiftId && !emp.crossShiftOT) return null;
    if ((emp.blockedShifts||[]).includes(shiftId)) return null;
    // Supervisor employees: block from regular slot scoring on weekday 1st shift
    // (they fill the dedicated Supervisor slot via a separate path in the fill loop).
    // Also block from any other weekday shift.
    const isSupervisorEmp = (emp.qualifications||[]).includes("Supervisor");
    if (isSupervisorEmp && isWeekday(day)) return null;  // all weekday slots handled separately
    // PT employees with a shift preference are strongly discouraged from other shifts
    // but NOT hard-blocked — they can still fill as last resort when no FT is available.
    // This penalty is applied later in scoring (see ptShiftMismatch below).

    const empPlan = plan[emp.id];
    const myHours = hourTracker[emp.id] || 0;
    const isFT    = emp.employmentType === "full-time";
    // Read cap from plan (preferred) or directly from emp as fallback
    const empMaxW = empPlan?.maxShiftsPerWeek ?? emp.maxShiftsPerWeek ?? null;
    if (empMaxW !== null && (shiftsWorked[emp.id] || 0) >= empMaxW) return null;

    // FT employees are hard-blocked from any shift other than their planned shift.
    // Exception: crossShiftOT flag allows FT to work any shift for OT (e.g. Harms).
    // PT employees keep a soft penalty — they fill as last resort across shifts.
    if (isFT && empPlan && empPlan.shiftId !== shiftId && !emp.crossShiftOT) return null;

    const ptPrefMismatch = (!isFT && (emp.preferredShifts||[]).length > 0
      && !(emp.preferredShifts||[]).includes(shiftId)) ? 800 : 0;
    const shiftMismatch = empPlan && empPlan.shiftId === shiftId ? 0 : 20; // PT only now
    // FT employees with crossShiftOT can work any shift, but are deprioritized on non-planned shifts
    // (high penalty keeps them as last resort after same-shift staff, same as FT overtime)
    const crossShiftPenalty = (isFT && emp.crossShiftOT && empPlan && empPlan.shiftId !== shiftId) ? 400 : 0;
    const onPlannedShift = shiftMismatch + ptPrefMismatch + crossShiftPenalty;

    // Strong preference: employee is scheduled to work today in their plan
    // PT: their plan covers all available days, so this penalty rarely fires
    const onWorkDay = empPlan && empPlan.workDays.has(day) ? 0 : (isFT ? 40 : 10);

    // Count consecutive days worked to detect overwork, including cross-week tail.
    const todayIdx = dayIdx(day);
    const prevTail = (empPatterns && empPatterns[emp.id]?.trailingDays) || 0;
    let consec = 0;
    for (let i = todayIdx - 1; i >= 0; i--) {
      if (dayWorked[emp.id].has(DAYS[i])) consec++; else break;
    }
    // Only add prevTail when we're past Sunday AND the streak runs unbroken
    // all the way back to Sunday (consec === todayIdx means no gap found).
    // todayIdx === 0 means we ARE on Sunday — that always starts fresh.
    if (todayIdx > 0 && consec === todayIdx && prevTail) consec += prevTail;
    // Hard-block: cannot work if already at/over maxShifts consecutive days
    if (consec >= maxShifts) return null;
    const overworkPenalty = 0; // enforced by hard null above

    // ── Tier logic (three priority levels) ───────────────────────────────────
    //
    // TIER 1 — FT under 40h:          score normally (lowest scores, always picked first)
    // TIER 2 — PT while any FT under 40h: +500 penalty (effectively blocked)
    // TIER 3 — FT already at 40h+:    +400 penalty  (prefer PT over FT overtime)
    //          PT once all FT at 40h:  no ptPenalty  (PT now preferred over FT OT)
    //
    // Net effect:
    //   • FT < 40h always wins        (score ~0–170)
    //   • PT while FT needs hours     (score ~500+)  → skipped
    //   • PT once all FT ≥ 40h        (score ~0–170) → preferred over FT overtime
    //   • FT already at 40h+          (score ~400+)  → used only when no PT available

    // Check whether any FT peer can fill the SAME positions this PT employee can,
    // is still under 40h, and is genuinely available for this day+shift.
    // We match on overlapping qualifications so a Guard-only PT isn't suppressed
    // by a Scale-only FT employee — they're filling different roles.
    const empAvailPos = getAvailPos(day, shiftId).filter(p => emp.qualifications.includes(p));
    const anyQualFtAvailableUnder40 = !isFT && empAvailPos.some(pos =>
      (qualGroups[pos] || []).some(id => {
        const peer = sourceEmps.find(e => e.id === id);
        if (!peer || peer.employmentType !== "full-time") return false;
        if ((hourTracker[id] || 0) >= FT_MIN_HOURS) return false;
        if ((peer.unavailableDays || []).includes(day)) return false;
        if ((peer.blockedShifts || []).includes(shiftId)) return false;
        if (peer.requiredShift && peer.requiredShift !== shiftId) return false;
        if (!getAvailPos(day, shiftId).some(p => peer.qualifications.includes(p))) return false;
        const peerPlan = plan[id];
        if (peerPlan && !peerPlan.workDays.has(day)) return false;
        return true;
      })
    );

    // Suppress PT only when a real same-role FT option exists and is under 40h.
    const ptPenalty = anyQualFtAvailableUnder40 ? 200 : 0;

    // FT overtime avoidance: once an FT employee is at/above 40h, strongly
    // prefer PT employees over giving this FT more overtime.
    // Only applies when there IS at least one PT employee with shared quals
    // (otherwise we have no choice and must use the FT employee).
    // hasPtOption: only true when a PT employee can ACTUALLY fill THIS slot
    // (right shift, not unavailable, not blocked, qualifies for at least one position).
    // A 2nd-shift PT Guard on a 3rd-shift slot should not suppress FT OT penalty.
    const hasPtOption = emp.qualifications.some(q =>
      (qualGroups[q] || []).some(id => {
        const peer = sourceEmps.find(e => e.id === id);
        if (!peer || peer.employmentType === "full-time") return false;
        // Must be able to fill a position in this specific slot
        if (!getAvailPos(day, shiftId).some(p => peer.qualifications.includes(p))) return false;
        // Must not be unavailable or blocked for this day/shift
        if ((peer.unavailableDays || []).includes(day)) return false;
        if ((peer.blockedShifts || []).includes(shiftId)) return false;
        if (peer.requiredShift && peer.requiredShift !== shiftId) return false;
        // Must prefer or be willing to work this shift (no extreme mismatch)
        const peerPrefs = peer.preferredShifts || [];
        if (peerPrefs.length > 0 && !peerPrefs.includes(shiftId)) return false;
        return true;
      })
    );
    // overtimePref: resolves per-employee pref, falling back to the global default.
    // "blocked" → skip in auto-fill (hard null); warn on manual assignment.
    // "preferred" → no ftOtPenalty so they fill first when over 40h.
    // "neutral" → normal behaviour.
    const empOtPref  = emp.overtimePref && emp.overtimePref !== "neutral" ? emp.overtimePref : (cfg?.defaultOvertimePref || "neutral");
    const otPref     = isFT ? empOtPref : "neutral";
    if (isFT && myHours >= FT_MIN_HOURS && otPref === "blocked") return null;

    // Preferred OT: no ftOtPenalty (acts like they're still under 40h for scoring)
    // Stronger FT OT penalty: PT employees are strongly preferred over giving FT more OT.
    // Raised from 400 → 600 so a PT employee at 0h always beats an FT at 40h+.
    const ftOtPenalty = (isFT && myHours >= FT_MIN_HOURS && hasPtOption && otPref !== "preferred") ? 600 : 0;

    // Fairness within each tier: penalize employees with more hours than their
    // qual-group peers (3 pts per extra hour).  Keeps hours even within groups.
    const minPeer     = peerMinHours(emp);
    const fairPenalty = Math.max(0, myHours - minPeer) * 15;

    // Under-hours urgency boost for FT employees.
    // Expected pace: FT_MIN_HOURS prorated by how far through the week we are.
    // Each hour below pace reduces score by 15 — strong enough to overcome the
    // onWorkDay/onPlannedShift penalties that would otherwise leave them unassigned.
    // Only applies within TIER 1 (FT under 40h) — no effect on PT or FT-OT tiers.
    let underHoursBoost = 0;
    if (isFT && myHours < FT_MIN_HOURS && ptPenalty === 0 && ftOtPenalty === 0) {
      const daysProcessed = dayIdx(day) + 1;
      const pace = Math.round(FT_MIN_HOURS * daysProcessed / 7);
      const behindBy = Math.max(0, pace - myHours);
      // Cap boost at onWorkDay so it can't pull an emp onto a wrong-shift slot.
      // It lifts them within their planned days/shift, not across shift boundaries.
      underHoursBoost = Math.min(behindBy * 15, onWorkDay + fairPenalty);
    }

    // Supervisor employee: very high penalty — only fills as last resort
    const supWeekendPenalty = (
      (emp.qualifications||[]).includes("Supervisor") && !isWeekday(day)
    ) ? 2000 : 0;

    // Role-stretch penalty: penalise Scale/Medical employees filling Guard slots.
    // Guard-only employees and PT Guard staff are preferred for Guard coverage,
    // preserving specialist hours for Scale/Medical slots and reducing their OT.
    //   Guard-only                  → 0
    //   Scale or Medical + Guard    → 150  (PT guard-only still beats them)
    //   Scale + Medical + Guard     → 250  (triple-qual is last resort for Guard)
    const quals = emp.qualifications || [];
    const isGuardSlot      = targetPos === "Guard";
    const hasSpecialist    = quals.includes("Scale") || quals.includes("Medical");
    const specialistCount  = (quals.includes("Scale") ? 1 : 0) + (quals.includes("Medical") ? 1 : 0);
    const roleStretchPenalty = isGuardSlot && hasSpecialist
      ? (specialistCount >= 2 ? 250 : 150)
      : 0;

    // ── Scarcity Reserve Penalty ──────────────────────────────────────────────
    // Prevent "Jacks-of-all-trades" from being wasted on Guard slots early in
    // the week when their Medical/Scale qualifications are rare in the roster.
    //
    // Logic: for each specialist qualification (Scale, Medical) this employee holds,
    // look up how many OTHER roster members share that qualification.  The fewer
    // there are, the more irreplaceable this employee is for that role — so apply
    // a proportionally stronger deterrent against placing them as a Guard.
    //
    //   sole provider  (1 emp)  → +400  (almost never waste them on Guard)
    //   scarce         (2 emps) → +200  (strong preference to save them)
    //   limited        (3 emps) → +133  (moderate push)
    //   comfortable    (4 emps) → +100  (mild nudge — Guard assignment more OK)
    //   abundant       (5+)     →  +80 or less (diminishing, Guard is fine)
    //
    // Stacks per scarce qualification, so Scale+Medical in a thin roster accumulates
    // a very large penalty — exactly the "hold in reserve" behaviour wanted.
    let scarcityReservePenalty = 0;
    if (isGuardSlot && hasSpecialist) {
      for (const q of ["Scale", "Medical"]) {
        if (!quals.includes(q)) continue;
        const poolSize = (qualGroups[q] || []).length;
        if (poolSize > 0) scarcityReservePenalty += Math.round(400 / poolSize);
      }
    }

    // ── Weighted Soft Preferences ─────────────────────────────────────────────
    // Score is penalty-based: lower = higher priority. Bonuses are negative deltas.

    // +100 preferred-shift bonus: reward placements that match the employee's
    // declared preferredShifts list.  Applies to both FT and PT employees.
    const prefShifts = emp.preferredShifts || [];
    const preferredShiftBonus = prefShifts.includes(shiftId) ? -100 : 0;

    // +50 consecutive-day rhythm bonus: reward placements that continue an
    // active work streak (1–4 days so far this week), nudging the scheduler
    // to keep employees on a natural 5-on/2-off rhythm rather than scattering
    // their shifts across non-consecutive days.
    const rhythmBonus = (consec >= 1 && consec <= 4 && (empPlan ? empPlan.workDays.has(day) : true))
      ? -50 : 0;

    // -200 approaching-overtime soft ramp: once an FT employee exceeds 32 hours
    // (4 shifts), apply a growing penalty that ramps toward the hard 40h wall.
    // This spreads scheduling pressure earlier so the algorithm avoids backing
    // into corners where the only remaining options are already-OT employees.
    // At 40h exactly the ramp adds 80pts — the hard ftOtPenalty (600) takes over.
    const hoursOverSoftCap   = isFT ? Math.max(0, myHours - 32) : 0;
    const overtimeRampPenalty = hoursOverSoftCap * 10; // +10/hr above 32h → max +80 at 40h

    const bottleneckPenalty = Math.min(empRemainingOptions(emp), 50) * 0.6;
    return onPlannedShift + onWorkDay + overworkPenalty + ptPenalty + ftOtPenalty + fairPenalty
         - underHoursBoost + supWeekendPenalty + roleStretchPenalty + scarcityReservePenalty
         + bottleneckPenalty + preferredShiftBonus + rhythmBonus + overtimeRampPenalty;

  };

  // Slot cap: maximum regular (non-Supervisor) bodies for a given slot,
  // reduced by any ext-shift bodies already covering that slot.
  const slotCap = (day, shiftId) =>
    Math.max(0, REGULAR_SLOTS(day, shiftId) -
      (extShiftsArg||[]).reduce((n, ext) => {
        const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
        if (!pair) return n;
        if (pair.covers.includes(shiftId) && ext.day === day) {
          const idx = pair.covers.indexOf(shiftId);
          return n + ((idx === 0 ? !!ext.empAId : idx === 1 ? !!ext.empBId : false) ? 1 : 0);
        }
        // Split cross-day: empB covers next day's first shift
        if (pair.crossDayB === shiftId && ext.empBId) {
          const nextDay = DAYS[(DAYS.indexOf(ext.day) + 1) % 7];
          if (nextDay === day) return n + 1;
        }
        return n;
      }, 0));

  // ── Step 3: CSP fill — process most-constrained slots first (MRV) ─────────
  // Snapshot domain sizes before any assignments, sort 21 slots ascending.
  // Slots with the fewest eligible (emp, position) pairs are filled first —
  // preventing early calendar slots from consuming employees that scarce slots need.
  const allSlots = DAYS.flatMap(d => SHIFTS.map(s => ({ day: d, shift: s })));
  const slotMRVKey = Object.fromEntries(
    allSlots.map(({ day: d, shift: s }) => [cellKey(d, s.id), slotDomainSize(cellKey(d, s.id))])
  );
  const orderedSlots = allSlots.sort((a, b) =>
    (slotMRVKey[cellKey(a.day, a.shift.id)] || 0) - (slotMRVKey[cellKey(b.day, b.shift.id)] || 0)
  );
  console.log("[CSP] MRV slot order:", orderedSlots.map(({ day, shift }) =>
    `${day.slice(0,3)}/${shift.id.slice(0,2)}(${slotMRVKey[cellKey(day, shift.id)]})`).join(" "));
  for (const { day, shift } of orderedSlots) {
    {
      const key   = cellKey(day, shift.id);
      const slots = getSlotCount(day, shift.id);
      const asgn  = [];
      const used  = new Set();

      // Pre-block any employee already covering this slot via an ext shift.
      (extShiftsArg||[]).forEach(ext => {
        const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
        if (!pair) return;
        const idx = pair.covers.indexOf(shift.id);
        if (idx === 0 && ext.empAId) used.add(ext.empAId);
        if (idx === 1 && ext.empBId) used.add(ext.empBId);
        // Split cross-day: empB is working next day's first shift
        if (pair.crossDayB === shift.id && ext.empBId) {
          const nextDay = DAYS[(DAYS.indexOf(ext.day) + 1) % 7];
          if (nextDay === day) used.add(ext.empBId);
        }
      });

      // Relaxed scorer: allows FT on rest days — only used when no compliant
      // employee can fill the slot (escape hatch, Step 3b).
      const rankScoreRelaxed = (emp, shiftId) => {
        const empPlan = plan[emp.id];
        const isFT    = emp.employmentType === "full-time";
        if (!isFT) return null; // PT/OC already tried in normal pass
        if (empPlan && empPlan.shiftId !== shiftId) return null;
        if ((emp.unavailableDays||[]).includes(day)) return null;
        if (empTimeOffDays && empTimeOffDays.has(emp.id + "__" + day)) return null;
        if ((emp.blockedShifts||[]).includes(shiftId)) return null;
        const myHours = hourTracker[emp.id] || 0;
        if (myHours >= OT_RELIEF_THRESHOLD) return null;
        if (isRestViolation(emp, rg(emp.id, ns, day, shiftId), minRest)) return null;
        if (calcConsecutiveHours(emp.id, ns, day, shiftId, extShiftsArg) > empMaxConsec(emp)) return null;
        const restDayPenalty = (empPlan && !empPlan.workDays.has(day)) ? 500 : 0;
        const fairPenalty    = Math.max(0, myHours - peerMinHours(emp)) * 15;
        return restDayPenalty + fairPenalty + (myHours >= FT_MIN_HOURS ? 600 : 0);
      };

      const assign = (emp, position) => {
        hourTracker[emp.id] = (hourTracker[emp.id] || 0) + SHIFT_HOURS;
        shiftsWorked[emp.id] = (shiftsWorked[emp.id] || 0) + 1;
        dayWorked[emp.id].add(day);
        asgn.push({ employeeId: emp.id, position });
        used.add(emp.id);
        forwardCheck(emp, day); // propagate: remove emp from remaining domains on this day
      };

      // Count only non-Supervisor entries toward the regular-slot cap.
      // The Supervisor occupies a dedicated +1 slot on weekday 1st shift
      // and must not consume one of the 3 regular Guard/Scale/Medical slots.
      const regularCount = () => asgn.filter(a => a.position !== "Supervisor").length;

      const activeExts = (extShiftsArg||[]).filter(e => extCovers(e, day, shift.id));
      const extBodyCount = activeExts.reduce((n, ext) => {
        const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
        if (!pair) return n;
        const shiftIdx = pair.covers.indexOf(shift.id);
        let hasBody = shiftIdx === 0 ? !!ext.empAId : shiftIdx === 1 ? !!ext.empBId : false;
        // Split cross-day: empB counts as a body for next day's first shift
        if (!hasBody && pair.crossDayB === shift.id && ext.empBId) {
          const nextDay = DAYS[(DAYS.indexOf(ext.day) + 1) % 7];
          if (nextDay === day) hasBody = true;
        }
        return n + (hasBody ? 1 : 0);
      }, 0);
      // effectiveSlots = cap for REGULAR (non-Supervisor) bodies only.
      const effectiveSlots = Math.max(0, REGULAR_SLOTS(day, shift.id) - extBodyCount);

      // Helper: resolve which employee ID is "present" for an ext shift in this slot
      const extPresentId = (e, pair) => {
        const idx = pair.covers.indexOf(shift.id);
        if (idx === 0) return e.empAId;
        if (idx === 1) return e.empBId;
        // Split cross-day: empB covers next day's first shift
        if (pair.crossDayB === shift.id && e.empBId) {
          const nextDay = DAYS[(DAYS.indexOf(e.day) + 1) % 7];
          if (nextDay === day) return e.empBId;
        }
        return null;
      };
      const extAlreadyScale = activeExts.some(e => {
        const pair = EXT_PAIRS.find(p => p.id === e.pairId);
        if (!pair) return false;
        const presentId = extPresentId(e, pair);
        const presentEmp = presentId ? sourceEmps.find(x => x.id === presentId) : null;
        const roles = presentEmp
          ? ["Scale","Medical"].filter(r => presentEmp.qualifications.includes(r))
          : (e.roles||[]);
        return roles.includes("Scale");
      });
      const extAlreadyMedical = activeExts.some(e => {
        const pair = EXT_PAIRS.find(p => p.id === e.pairId);
        if (!pair) return false;
        const presentId = extPresentId(e, pair);
        const presentEmp = presentId ? sourceEmps.find(x => x.id === presentId) : null;
        const roles = presentEmp
          ? ["Scale","Medical"].filter(r => presentEmp.qualifications.includes(r))
          : (e.roles||[]);
        return roles.includes("Medical");
      });

      // ── 1. Supervisor slot (weekday 1st only) ─────────────────────────────
      // Assigned first so they're in `used` before regular scoring.
      // Does NOT count against effectiveSlots — it is an additional slot.
      if (SUP_SLOT_DAY(day, shift.id)) {
        const supPick = sourceEmps.find(e =>
          !used.has(e.id) &&
          (e.qualifications||[]).includes("Supervisor") &&
          !(e.unavailableDays||[]).includes(day) &&
          !(empTimeOffDays && empTimeOffDays.has(e.id + "__" + day))
        );
        if (supPick) assign(supPick, "Supervisor");
      }

      // Build ranked list AFTER supervisor is in `used`, so they don't appear here.
      // jitter: shuffle employees with equal scores so repeated attempts explore different orderings.
      const ranked = sourceEmps
        .map(e => { const s = empScore(e, day, shift.id); return s === null ? null : { e, s }; })
        .filter(Boolean)
        .sort((a, b) => {
          const d = a.s - b.s;
          if (d !== 0) return d;
          return jitter ? Math.random() - 0.5 : 0;
        });

      // ── 2. Required roles: Scale and Medical ──────────────────────────────
      // Cap checked against regularCount() so the Supervisor slot doesn't eat
      // one of the 3 regular positions.
      // Uses slotHasRole (qualification-aware) so a dual-qualified Scale+Medical
      // employee assigned as "Scale" satisfies both roles — no phantom Medical slot.
      for (const role of ["Scale", "Medical"]) {
        if (regularCount() >= effectiveSlots) break;
        if (slotHasRole(asgn, sourceEmps, role)) continue;
        if (role === "Scale"   && extAlreadyScale)   continue;
        if (role === "Medical" && extAlreadyMedical) continue;
        const pick = ranked.find(({ e }) => !used.has(e.id) && canFillPos(e, role, day) && !(!isWeekday(day) && (e.qualifications||[]).includes("Supervisor") && (role === "Scale" || role === "Medical")))
                  || ranked.find(({ e }) => !used.has(e.id) && canFillPos(e, role, day));
        if (pick) assign(pick.e, role);
      }

      // ── 3. Remaining regular slots — two-pass Guard-first logic ─────────────
      // Pass A fills Scale/Medical roles and Guard slots using Guard-only employees.
      // Pass B allows specialists to fill any remaining Guard slots only if no
      // Guard-only employee is available — hard preference, not just a soft penalty.
      //
      const hasGuardOnlyAvailable = () =>
        sourceEmps.some(e =>
          !used.has(e.id) &&
          isGuardOnly(e) &&
          canFillPos(e, "Guard", day) &&
          empScore(e, day, shift.id, "Guard") !== null
        );
      const WEEKEND_DAYS = new Set(["Saturday","Sunday"]);
      const isWeekendDay = WEEKEND_DAYS.has(day);
      const weekendDaysWorked = (empId) =>
        [...(dayWorked[empId]||new Set())].filter(d => WEEKEND_DAYS.has(d)).length;
      const atWeekendCap = (emp) =>
        isWeekendDay &&
        emp.maxWeekendDays !== null &&
        emp.maxWeekendDays !== undefined &&
        weekendDaysWorked(emp.id) >= emp.maxWeekendDays;

      // Fail-Fast: force-assign any employee whose only remaining domain slot is this one
      if (regularCount() < effectiveSlots) {
        for (const emp of sourceEmps) {
          if (regularCount() >= effectiveSlots) break;
          if (used.has(emp.id)) continue;
          if ((emp.qualifications||[]).includes("Supervisor")) continue;
          const remaining = Object.keys(domains[emp.id] || {});
          if (remaining.length !== 1 || remaining[0] !== key) continue;
          if (isRestViolation(emp, rg(emp.id, ns, day, shift.id), minRest)) continue;
          if (calcConsecutiveHours(emp.id, ns, day, shift.id, extShiftsArg) > empMaxConsec(emp)) continue;
          const ap = getAvailPos(day, shift.id).filter(p => canFillPos(emp, p, day));
          if (!ap.length) continue;
          if (atWeekendCap(emp)) continue;
          const nowHasScale   = slotHasRole(asgn, sourceEmps, "Scale");
          const nowHasMedical = slotHasRole(asgn, sourceEmps, "Medical");
          let pos;
          if      (!nowHasScale   && !extAlreadyScale   && ap.includes("Scale"))   pos = "Scale";
          else if (!nowHasMedical && !extAlreadyMedical && ap.includes("Medical")) pos = "Medical";
          else if (ap.includes("Guard"))                                            pos = "Guard";
          else pos = ap[0];
          assign(emp, pos);
          console.log(`[Fail-Fast] Forced: ${emp.name} → ${day}/${shift.id} as ${pos} (only remaining slot)`);
        }
      }

      const buildRankedPos = () => {
        const nowHasSc = slotHasRole(asgn, sourceEmps, "Scale");
        const nowHasMd = slotHasRole(asgn, sourceEmps, "Medical");
        return sourceEmps
          .map(e => {
            const ap = getAvailPos(day, shift.id).filter(p => canFillPos(e, p, day));
            if (!ap.length) return null;
            const needSc = !nowHasSc && !extAlreadyScale;
            const needMe = !nowHasMd && !extAlreadyMedical;
            const likelyPos = (needSc && ap.includes("Scale"))   ? "Scale"
                            : (needMe && ap.includes("Medical")) ? "Medical"
                            : ap.includes("Guard")               ? "Guard"
                            : ap[0];
            const s = empScore(e, day, shift.id, likelyPos);
            return s === null ? null : { e, s, likelyPos };
          })
          .filter(Boolean)
          .sort((a, b) => a.s - b.s);
      };

      // Pass A: fill Scale/Medical roles + Guard slots using Guard-only employees.
      // Specialists are skipped for Guard slots if Guard-only employees exist.
      for (const { e, likelyPos } of buildRankedPos()) {
        if (regularCount() >= effectiveSlots) break;
        if (used.has(e.id)) continue;
        const ap = getAvailPos(day, shift.id).filter(p => canFillPos(e, p, day));
        if (!ap.length) continue;
        const nowHasScale   = slotHasRole(asgn, sourceEmps, "Scale");
        const nowHasMedical = slotHasRole(asgn, sourceEmps, "Medical");
        const needScale   = !nowHasScale   && !extAlreadyScale;
        const needMedical = !nowHasMedical && !extAlreadyMedical;
        let pos;
        if      (needScale   && ap.includes("Scale"))   pos = "Scale";
        else if (needMedical && ap.includes("Medical")) pos = "Medical";
        else if (ap.includes("Guard"))                  pos = "Guard";
        else pos = ap[0];
        // Hard block: if this would put a specialist in a Guard slot
        // AND Guard-only employees are still available, skip them for now.
        if (pos === "Guard" && !isGuardOnly(e) && hasGuardOnlyAvailable()) continue;
        if (atWeekendCap(e)) continue;
        assign(e, pos);
      }

      // Pass B: any remaining slots — now allow specialists to fill Guard.
      // Guard-only employees were either all placed or unavailable.
      if (regularCount() < effectiveSlots) {
        for (const { e } of buildRankedPos()) {
          if (regularCount() >= effectiveSlots) break;
          if (used.has(e.id)) continue;
          const ap = getAvailPos(day, shift.id).filter(p => canFillPos(e, p, day));
          if (!ap.length) continue;
          const nowHasScale   = slotHasRole(asgn, sourceEmps, "Scale");
          const nowHasMedical = slotHasRole(asgn, sourceEmps, "Medical");
          const needScale   = !nowHasScale   && !extAlreadyScale;
          const needMedical = !nowHasMedical && !extAlreadyMedical;
          let pos;
          if      (needScale   && ap.includes("Scale"))   pos = "Scale";
          else if (needMedical && ap.includes("Medical")) pos = "Medical";
          else if (ap.includes("Guard"))                  pos = "Guard";
          else pos = ap[0];
          if (atWeekendCap(e)) continue;
          assign(e, pos);
        }
      }

      // ── 3b. Rest-day escape hatch ──────────────────────────────────────
      // Fires when: (a) open body slots remain, OR (b) required roles (Scale/Medical)
      // are still missing even if headcount is full.
      // Allows FT on their planned rest days as absolute last resort.
      const hatchNeedsScale   = !slotHasRole(asgn, sourceEmps, "Scale")   && !extAlreadyScale;
      const hatchNeedsMedical = !slotHasRole(asgn, sourceEmps, "Medical") && !extAlreadyMedical;
      const hatchOpen = regularCount() < effectiveSlots || hatchNeedsScale || hatchNeedsMedical;
      if (hatchOpen) {
        const relaxed = sourceEmps
          .map(e => ({ e, score: rankScoreRelaxed(e, shift.id) }))
          .filter(x => x.score !== null && !used.has(x.e.id))
          .sort((a, b) => a.score - b.score);
        for (const { e } of relaxed) {
          // Stop when headcount is full AND all required roles are covered
          const stillNeedsScale   = !slotHasRole(asgn, sourceEmps, "Scale")   && !extAlreadyScale;
          const stillNeedsMedical = !slotHasRole(asgn, sourceEmps, "Medical") && !extAlreadyMedical;
          if (regularCount() >= effectiveSlots && !stillNeedsScale && !stillNeedsMedical) break;
          const ap = getAvailPos(day, shift.id).filter(p => canFillPos(e, p, day));
          if (!ap.length) continue;
          const needScale   = stillNeedsScale;
          const needMedical = stillNeedsMedical;
          // Only add a body if a slot is genuinely open — never exceed the slot cap.
          // Missing roles on a full slot are flagged as coverage gaps, not fixed by
          // adding a 4th body. The 12hr pair system handles role gaps on full shifts.
          if (regularCount() >= effectiveSlots) continue;
          let pos;
          if      (needScale   && ap.includes("Scale"))   pos = "Scale";
          else if (needMedical && ap.includes("Medical")) pos = "Medical";
          else if (ap.includes("Guard"))                  pos = "Guard";
          else pos = ap[0];
          // Guard-only preference: skip specialist for Guard if guard-only still available
          if (pos === "Guard" && !isGuardOnly(e) && hasGuardOnlyAvailable()) continue;
          if (atWeekendCap(e)) continue;
          assign(e, pos);
        }
      }

      ns[key] = asgn;
    }
  }
  // ── Shared helpers for Steps 4/5/5b ─────────────────────────────────────
  // These consolidate patterns that were repeated identically across every
  // fill pass: computing the effective slot cap, building the assigned-set
  // (including ext-shift bodies), picking the best position (Scale→Medical→Guard),
  // and updating all tracking state after a placement.

  const slotAssigned = (asgn, day, shiftId) => {
    const s = new Set(asgn.map(a => a.employeeId));
    (extShiftsArg||[]).forEach(ext => {
      const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
      if (!pair) return;
      const idx = pair.covers.indexOf(shiftId);
      if (idx === 0 && ext.empAId) s.add(ext.empAId);
      if (idx === 1 && ext.empBId) s.add(ext.empBId);
      // Split cross-day: empB covers next day's first shift
      if (pair.crossDayB === shiftId && ext.empBId) {
        const nextDay = DAYS[(DAYS.indexOf(ext.day) + 1) % 7];
        if (nextDay === day) s.add(ext.empBId);
      }
    });
    return s;
  };

  const pickPosition = (emp, asgn, day, shiftId) => {
    const ap = getAvailPos(day, shiftId).filter(p => canFillPos(emp, p, day));
    if (!ap.length) return null;
    const nowHasScale   = slotHasRole(asgn, sourceEmps, "Scale");
    const nowHasMedical = slotHasRole(asgn, sourceEmps, "Medical");
    if (!nowHasScale   && ap.includes("Scale"))   return "Scale";
    if (!nowHasMedical && ap.includes("Medical")) return "Medical";
    if (ap.includes("Guard")) return "Guard";
    return ap[0];
  };

  const weekendCapHit = (emp, day) => {
    if (!["Saturday","Sunday"].includes(day)) return false;
    if (emp.maxWeekendDays == null) return false;
    const worked = [...(dayWorked[emp.id]||new Set())]
      .filter(d => ["Saturday","Sunday"].includes(d)).length;
    return worked >= emp.maxWeekendDays;
  };



  // ── Steps 4/5/5b: Shared makeup helper ────────────────────────────────────
  // Fills open slots for a given employment type, respecting all hard constraints.
  // Called once each for FT makeup (40h guarantee), PT fill, and OC fill.
  const fillPass = (empType, opts = {}) => {
    const { capAt40 = false, shiftLocked = true, isOnCall = false } = opts;
    for (const day of DAYS) {
      for (const shift of SHIFTS) {
        const key  = cellKey(day, shift.id);
        const asgn = ns[key] || [];
        const cap  = slotCap(day, shift.id);
        if (asgn.length >= cap) continue;
        const assigned = slotAssigned(asgn, day, shift.id);

        const candidates = sourceEmps
          .filter(e => {
            if (e.employmentType !== empType) return false;
            if (assigned.has(e.id)) return false;
            if (capAt40 && (hourTracker[e.id]||0) >= FT_MIN_HOURS) return false;
            if (shiftLocked) {
              const empPlan = plan[e.id];
              if (empPlan && empPlan.shiftId !== shift.id) return false;
            } else {
              const prefs = e.preferredShifts || [];
              if (prefs.length > 0 && !prefs.includes(shift.id)) return false;
            }
            if ((e.unavailableDays||[]).includes(day)) return false;
            if (empTimeOffDays && empTimeOffDays.has(e.id + "__" + day)) return false;
            if ((e.blockedShifts||[]).includes(shift.id)) return false;
            if (e.requiredShift && e.requiredShift !== shift.id) return false;
            if (isRestViolation(e, rg(e.id, ns, day, shift.id), minRest)) return false;
            if (calcConsecutiveHours(e.id, ns, day, shift.id, extShiftsArg) > empMaxConsec(e)) return false;
            if (shift.id === "third" && calcConsecutiveNights(e.id, ns, day, shift.id) >= maxNights) return false;
            if (!getAvailPos(day, shift.id).some(p => e.qualifications.includes(p))) return false;
            if (e.maxShiftsPerWeek !== null && (shiftsWorked[e.id]||0) >= e.maxShiftsPerWeek) return false;
            return true;
          })
          .sort((a, b) => (hourTracker[a.id]||0) - (hourTracker[b.id]||0));

        for (const emp of candidates) {
          if (asgn.length >= cap) break;
          const pos = pickPosition(emp, asgn, day, shift.id);
          if (!pos) continue;
          if (pos === "Guard" && !isGuardOnly(emp) && hasGuardOnlyAvailable()) continue;
          if (weekendCapHit(emp, day)) continue;
          hourTracker[emp.id]  = (hourTracker[emp.id]  || 0) + SHIFT_HOURS;
          shiftsWorked[emp.id] = (shiftsWorked[emp.id] || 0) + 1;
          dayWorked[emp.id].add(day);
          asgn.push({ employeeId: emp.id, position: pos, ...(isOnCall ? { isOnCall: true } : {}) });
          assigned.add(emp.id);
        }
        ns[key] = asgn;
      }
    }
  };

  // Step 4: FT makeup — ensure 40h, up to 4 sweeps.
  // First 2 sweeps: planned shift only (normal case).
  // If any FT employee is still short after 2 sweeps, do 2 more with shiftLocked:false
  // so they can pick up any available slot on their off-shift days rather than stay short.
  for (let sweep = 0; sweep < 4; sweep++) {
    if (!sourceEmps.some(e => e.employmentType === "full-time" && (hourTracker[e.id]||0) < FT_MIN_HOURS)) break;
    fillPass("full-time", { capAt40: true, shiftLocked: sweep < 2 });
  }
  // ── Step 4b: FT double-shift top-off (willing16h only) ─────────────────────
  // For FT employees still under 40h who are willing to work 16h, assign them
  // to the shift adjacent to a day they already work — up to 40h total.
  {
    const ADJACENT = { first: ["second"], second: ["first", "third"], third: ["second"] };
    for (const emp of sourceEmps) {
      if (emp.employmentType !== "full-time") continue;
      if (!emp.willing16h) continue;
      if ((hourTracker[emp.id] || 0) >= FT_MIN_HOURS) continue;
      const empPlan = plan[emp.id];
      const plannedShift = empPlan?.shiftId;
      if (!plannedShift) continue;
      const adjShifts = ADJACENT[plannedShift] || [];
      for (const day of DAYS) {
        if ((hourTracker[emp.id] || 0) >= FT_MIN_HOURS) break;
        const primaryKey = cellKey(day, plannedShift);
