      const cellExt    = (extShifts||[]).filter(e=>extCovers(e,d,s.id));
      const hasScale   = slotHasRole(a,employees,"Scale")   || cellExt.some(e=>(e.roles||[]).includes("Scale"));
      const supOnShift = a.some(x=>x.position==="Supervisor");
      const hasMedical = slotHasRole(a,employees,"Medical") || cellExt.some(e=>(e.roles||[]).includes("Medical")) || supOnShift;
      const smDual     = (!hasScale || !hasMedical) && slotSMDualCoverage(a);
      if(!(hasScale||smDual) || !(hasMedical||smDual)) c++;
    }));
    return c;
  },[schedule,extShifts,employees,slotSMDualCoverage]);

      const supOnShift = a.some(x=>x.position==="Supervisor");
      const hasMedical = slotHasRole(a,employees,"Medical") || cellExt.some(e=>(e.roles||[]).includes("Medical")) || supOnShift;
      const smDual     = (!hasScale || !hasMedical) && slotSMDualCoverage(a);

      const effMedical = hasMedical || smDual;

                              background:dotCol,flexShrink:0}}/>
                            <span style={{flex:1}}>
                              <span style={{fontSize:11,fontWeight:600,color:"var(--ss-text)",display:"block"}}>
                                {u.day.substring(0,3)} · {u.shiftLabel}
                              </span>
                              <span style={{fontSize:9,color:"var(--ss-text-dim)"}}>
                                {isEmpty?"Completely empty":u.filled+"/"+u.max+" filled"} · {u.open} slot{u.open!==1?"s":""} open
                              </span>
                            </span>
                            <span style={{fontSize:9,color:"var(--ss-accent)",fontWeight:700,flexShrink:0}}>→</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                )}
              </span>
            );})()}
          <span style={{display:"inline-flex",alignItems:"center",gap:4}}>{Icon("layers", {size:12, color:"var(--ss-text-muted)"})}<span style={{color:"var(--ss-text-muted)",fontSize:10,fontWeight:600}}>SHIFTS/WK</span> <span style={{fontWeight:700}}>21</span></span>
          {unmetReqs>0&&(
              <span ref={covRef} style={{position:"relative",display:"inline-flex",alignItems:"center"}}>
                <button onClick={()=>setCovOpen(o=>!o)} style={{background:"none",border:"none",padding:0,
                  cursor:"pointer",fontFamily:"inherit",fontSize:"inherit",
                  display:"flex",alignItems:"center",gap:4,color:"inherit"}}>
                  {Icon("shield-alert", {size:12, color:"var(--ss-warning)"})}
                  <span style={{color:"var(--ss-warning)",fontSize:10,fontWeight:600}}>COVERAGE</span>{" "}
                  <span style={{color:"var(--ss-warning)",fontWeight:700}}>{unmetReqs}</span>
                  <span style={{fontSize:9,color:"var(--ss-warning)",opacity:.7,marginLeft:1}}>
                    {covOpen?"▲":"▼"}
                  </span>
                </button>
                {covOpen&&(
                  <div style={{position:"absolute",top:"100%",left:0,zIndex:999,
                    background:"var(--ss-surface)",border:"1px solid var(--ss-border)",borderRadius:7,
                    boxShadow:"0 8px 32px rgba(0,0,0,0.35)",minWidth:230,marginTop:4,
                    overflow:"hidden"}}>
                    <div style={{padding:"8px 12px 6px",fontSize:9,fontWeight:700,
                      color:"var(--ss-text-dim)",letterSpacing:".07em",borderBottom:"1px solid var(--ss-border-60)"}}>
                      COVERAGE GAPS — {unmetReqs} shift{unmetReqs!==1?"s":""} missing roles
                    </div>
                    <div style={{maxHeight:260,overflowY:"auto"}}>
                      {coverageIssueSlots.map((u,i)=>(
                        <button key={i} onClick={()=>{
                          setCovOpen(false);
                          setActiveTab("schedule");
                          setHighlightSlot({day:u.day,shiftId:u.shiftId});
                        }} style={{display:"flex",alignItems:"center",gap:10,width:"100%",
                          padding:"8px 12px",background:"none",border:"none",
                          borderBottom:"1px solid var(--ss-border-40)",cursor:"pointer",
                          fontFamily:"inherit",textAlign:"left",transition:"background .12s"}}
                          onMouseEnter={e=>e.currentTarget.style.background="var(--ss-surface-alt)"}
                          onMouseLeave={e=>e.currentTarget.style.background="none"}>
                          <span style={{width:7,height:7,borderRadius:"50%",
                            background:"var(--ss-warning)",flexShrink:0}}/>
                          <span style={{flex:1}}>
                            <span style={{fontSize:11,fontWeight:600,color:"var(--ss-text)",display:"block"}}>
                              {u.day.substring(0,3)} · {u.shiftLabel}
                            </span>
                            <span style={{fontSize:9,color:"var(--ss-danger)"}}>
                              Missing: {u.missing.join(" & ")}
                            </span>
                          </span>
                          <span style={{fontSize:9,color:"var(--ss-accent)",fontWeight:700,flexShrink:0}}>→</span>
                        </button>
                      ))}
                    </div>
                  </div>
                )}
              </span>
          )}
          {underHoursCount>0&&<span style={{display:"inline-flex",alignItems:"center",gap:4}}>{Icon("clock", {size:12, color:"var(--ss-danger)"})}<span style={{color:"var(--ss-danger)",fontSize:10,fontWeight:600}}>UNDER 40H</span> <span style={{color:"var(--ss-danger)",fontWeight:700}}>{underHoursCount} FT</span></span>}
          {fatigueCount>0&&<span style={{display:"inline-flex",alignItems:"center",gap:4}}>{Icon("alert-triangle", {size:12, color:"var(--ss-fatigue)"})}<span style={{color:"var(--ss-fatigue)",fontSize:10,fontWeight:600}}>FATIGUE</span> <span style={{color:"var(--ss-fatigue)",fontWeight:700}}>{fatigueCount}</span></span>}
          {prefViolCount>0&&<span style={{display:"inline-flex",alignItems:"center",gap:4}}>{Icon("alert-circle", {size:12, color:"var(--ss-warning)"})}<span style={{color:"var(--ss-warning)",fontSize:10,fontWeight:600}}>PREF</span> <span style={{color:"var(--ss-warning)",fontWeight:700}}>{prefViolCount}</span></span>}
          {savedWeeks.length>0&&<span style={{display:"inline-flex",alignItems:"center",gap:4}}>{Icon("save", {size:12, color:"var(--ss-text-muted)"})}<span style={{color:"var(--ss-text-muted)",fontSize:10,fontWeight:600}}>SAVED</span> <span style={{color:"var(--ss-accent)",fontWeight:700}}>{savedWeeks.length}</span></span>}
        </div>

        {}
        <div style={{padding:mobileView?"10px 10px":"16px 28px"}}>
          {activeTab==="employees"&&(
            <EmployeeManager onOpenTestModal={()=>setShowTestModal(true)}/>
          )}
          {activeTab==="schedule"&&(
            <div style={{display:"flex",gap:0,alignItems:"flex-start"}}>
              <div style={{flex:1,minWidth:0}}>
                <ScheduleGrid onOpenTestModal={()=>setShowTestModal(true)}/>
              </div>
              {}
              <div style={{flexShrink:0,transition:"width .2s",
                width:mobileView?0:sidebarOpen?260:36,overflow:"hidden",
                borderLeft:mobileView?"none":"1px solid var(--ss-border)",marginLeft:mobileView?0:8,
                background:"var(--ss-surface)",borderRadius:6}}>
                <button onClick={()=>setSidebarOpen(o=>!o)}
                  title={sidebarOpen?"Close coverage sidebar":"Open coverage sidebar"}
                  style={{width:"100%",background:"none",border:"none",cursor:"pointer",
                    padding:"10px 0",display:"flex",alignItems:"center",
                    justifyContent:sidebarOpen?"flex-end":"center",
                    paddingRight:sidebarOpen?10:0,
                    color:"var(--ss-text-dim)",fontSize:13,fontFamily:"inherit",
                    borderBottom:"1px solid var(--ss-border)"}}>
                  {sidebarOpen?"▶ ":"◀"}
                </button>
                {sidebarOpen&&(()=>{
                  const totalSlots  = DAYS.length * SHIFTS.length * 3;
                  const filled      = Object.values(schedule||{}).reduce((n,a)=>n+a.filter(x=>x.position!=="Supervisor").length,0);
                  const pct         = totalSlots>0?Math.round(filled/totalSlots*100):0;
                  const ftShort     = employees.filter(e=>e.employmentType==="full-time"&&calcHours(e.id,schedule||{},extShifts||[])<40);
                  const ftOver      = employees.filter(e=>e.employmentType==="full-time"&&calcHours(e.id,schedule||{},extShifts||[])>40);
                  const ftHours     = employees.filter(e=>e.employmentType==="full-time").map(e=>({
                    name:e.name.split(" ").pop(), h:calcHours(e.id,schedule||{},extShifts||[])
                  })).sort((a,b)=>a.h-b.h);
                  const statRow = (label, val, col) => (
                    <div style={{display:"flex",justifyContent:"space-between",
                      alignItems:"center",padding:"5px 12px",borderBottom:"1px solid var(--ss-border-40)"}}>
                      <span style={{fontSize:10,color:"var(--ss-text-dim)"}}>{label}</span>
                      <span style={{fontSize:11,fontWeight:700,color:col||"var(--ss-text)"}}>{val}</span>
                    </div>
                  );
                  return (
                    <div style={{padding:"6px 0"}}>
                      <div style={{padding:"6px 12px 4px",fontSize:9,fontWeight:800,
                        color:"var(--ss-text-dim)",letterSpacing:".08em"}}>COVERAGE</div>
                      {statRow("Filled slots", filled+"/"+totalSlots, pct>=90?"var(--ss-scale)":pct>=70?"var(--ss-warning)":"var(--ss-danger)")}
                      {statRow("Coverage %", pct+"%", pct>=90?"var(--ss-scale)":pct>=70?"var(--ss-warning)":"var(--ss-danger)")}
                      {statRow("Under 40h", ftShort.length, ftShort.length>0?"var(--ss-danger)":"var(--ss-scale)")}
                      {statRow("Overtime", ftOver.length, ftOver.length>0?"var(--ss-warning)":"var(--ss-scale)")}
                      <div style={{padding:"8px 12px 4px",fontSize:9,fontWeight:800,
                        color:"var(--ss-text-dim)",letterSpacing:".08em",marginTop:4}}>HOURS BY EMPLOYEE</div>
                      {ftHours.map(({name,h})=>(
                        <div key={name} style={{padding:"3px 12px",display:"flex",
                          justifyContent:"space-between",alignItems:"center"}}>
                          <span style={{fontSize:10,color:"var(--ss-text-muted)",overflow:"hidden",
                            textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:150}}>{name}</span>
                          <span style={{fontSize:10,fontWeight:700,flexShrink:0,
                            color:h>=48?"var(--ss-danger)":h>=40?"var(--ss-scale)":h>0?"var(--ss-warning)":"var(--ss-text-dim)"}}>{h}h</span>
                        </div>
                      ))}
                      <div style={{padding:"10px 12px 4px",borderTop:"1px solid var(--ss-border)",marginTop:4}}>
                        <button onClick={()=>setActiveTab("dashboard")}
                          style={{width:"100%",background:"var(--ss-accent-18)",border:"1px solid var(--ss-accent-40)",
                            color:"var(--ss-accent)",borderRadius:5,cursor:"pointer",padding:"6px 0",
                            fontSize:10,fontWeight:700,fontFamily:"inherit"}}>Full Dashboard →</button>
                      </div>
                    </div>
                  );
                })()}
              </div>
            </div>
          )}
          {activeTab==="dashboard"&&(
            <CoverageDashboard
              navigateToWeek={(weekStartVal) => { setWeekStart(weekStartVal); setActiveTab("schedule"); }}/>
          )}
          {activeTab==="timeoff"&&(
            <TimeOffManager/>
          )}
          {activeTab==="settings"&&(
            <SettingsPanel
                themeName={themeName} setThemeName={setThemeName}
                customTheme={customTheme} setCustomTheme={setCustomTheme}
                mobileView={mobileView} setMobileView={setMobileView}
                settingsTab={settingsTab} setSettingsTab={setSettingsTab}/>
          )}
          {activeTab==="help"&&(
            <HelpPanel/>
          )}
        </div>
      {showExcelPreviewApp && (
        <ExcelPreviewModal
          onDownload={()=>{ exportToExcel(employees, schedule, extShifts||[], weekStartApp, trainingBlocks||[], timeOffReqs||[]); setShowExcelPreviewApp(false); }}
          onClose={()=>setShowExcelPreviewApp(false)}
        />
      )}
      </div>
    </UICtx.Provider>
    </TimeOffCtx.Provider>
    </HistoryCtx.Provider>
    </ScheduleCtx.Provider>
    </RosterCtx.Provider>
    </SettingsCtx.Provider>
    </ThemeCtx.Provider>
    </ConfirmDialogProvider>
  );
}

preact.render(preact.h(ShiftSchedulerApp, null), document.getElementById("app"));
</script>

</body>
</html>
