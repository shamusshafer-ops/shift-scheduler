                        onClick={()=>{ setTrainingBlockDay(d); }}
                        title={"Add a training block on "+d}
                        style={{fontSize:9,fontWeight:700,color:"#d97706",background:"var(--ss-surface)",
                          border:"1px solid #d9770650",borderRadius:3,padding:"1px 6px",
                          cursor:"pointer",whiteSpace:"nowrap",lineHeight:"16px"}}>
                        ✏ trn
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {SHIFTS.map(shift => (
            <div key={shift.id} style={{display:"grid",gridTemplateColumns:"64px repeat(7,1fr)",gap:2,marginBottom:2}}>
              <div style={{background:"var(--ss-surface)",padding:"8px 6px",display:"flex",flexDirection:"column",
                justifyContent:"center",borderLeft:"3px solid "+sC(shift.id,t),borderRadius:"4px 0 0 4px"}}>
                <div style={{fontSize:10,fontWeight:700}}>{shift.label}</div>
                <div style={{fontSize:9,color:"var(--ss-text-dim)",marginTop:1}}>{shift.time}</div>
              </div>

              {DAYS.map(day => {
                const asgn = getAsgn(day,shift.id);
                const max  = getEffectiveSlotCount(day, shift.id, extShifts);
                const st   = getStatus(day,shift.id);
                const isEd = editingCell?.day===day&&editingCell?.shiftId===shift.id;
                const warn = asgn.length>0&&!st.ok;

                const cellFatigue = asgn.filter(a => {
                  const nights = shift.id==="third" ? calcConsecutiveNights(a.employeeId,schedule,day,shift.id) : 0;
                  const rest   = calcRestGap(a.employeeId,schedule,day,shift.id);
                  const unavail= (employees.find(e=>e.id===a.employeeId)?.unavailableDays||[]).includes(day);
                  return nights>(cfg?.maxConsecutiveNights??MAX_CONSECUTIVE_NIGHTS)||(rest<(cfg?.minRestHours??MIN_REST_HOURS)&&rest!==Infinity)||unavail;
                });

                const cellExt          = (extShifts||[]).filter(e=>extCovers(e,day,shift.id));
                const extCoversScale   = cellExt.some(e=>e.roles.includes("Scale"));
                const extCoversMedical = cellExt.some(e=>e.roles.includes("Medical"));
                const missingScale     = !st.hasScale && !extCoversScale;
                const missingMedical   = !st.hasMedical && !extCoversMedical;
                const hasUnfillableGap = asgn.length>0&&(missingScale||missingMedical)&&
                  !unassigned(day,shift.id).some(e=>
                    (missingScale&&e.qualifications.includes("Scale"))||
                    (missingMedical&&e.qualifications.includes("Medical")));

                const isBodyGap   = asgn.filter(a=>a.position!=="Supervisor").length < (max - ((extShifts||[]).filter(e=>extCovers(e,day,shift.id)).length));
                const isRoleGap   = !st.ok && !isBodyGap;
                const isFull      = st.isFull && st.ok && cellFatigue.length===0;
                const borderColor = cellFatigue.length>0 ? "var(--ss-fatigue-80)"
                                  : isBodyGap             ? "var(--ss-danger-70)"
                                  : isRoleGap             ? "var(--ss-warning-60)"
                                  : isFull                ? "var(--ss-scale-50)"
                                  : "var(--ss-border)";
                const bgColor     = cellFatigue.length>0 ? "var(--ss-fatigue-08)"
                                  : isBodyGap             ? "var(--ss-danger-0d)"
                                  : isRoleGap             ? "var(--ss-warning-0a)"
                                  : isFull                ? "var(--ss-scale-08)"
                                  : "var(--ss-surface)";

                return (
                  <div key={day}
                    ref={el => { if(el) cellRefs.current[cellKey(day,shift.id)] = el; }}
                    onDragEnter={e=>{if(isReadOnly||!dragEmp)return;e.preventDefault();e.currentTarget.style.borderColor="var(--ss-accent)";e.currentTarget.style.boxShadow="0 0 0 2px "+"var(--ss-accent-40)";}}
                    onDragOver={e=>{if(isReadOnly||!dragEmp)return;e.preventDefault();}}
                    onDragLeave={e=>{if(!e.currentTarget.contains(e.relatedTarget)){e.currentTarget.style.borderColor=borderColor;e.currentTarget.style.boxShadow="none";}}}
                    onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor=borderColor;e.currentTarget.style.boxShadow="none";if(!isReadOnly)handleDrop(day,shift.id);}}
                    style={{background:bgColor,border:"1px solid "+borderColor,borderRadius:4,
                      padding:8,minHeight:105,display:"flex",flexDirection:"column",gap:4,transition:"border-color .2s",minWidth:0,overflow:"hidden"}}>

                    {(warn||cellFatigue.length>0||cellExt.length>0)&&(
                      <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:2}}>
                        {st.missing
                          .filter(r=>!(r==="Scale"&&extCoversScale)&&!(r==="Medical"&&extCoversMedical))
                          .map(r=>(<span key={r} style={{fontSize:8,fontWeight:700,color:"var(--ss-warning)",
                            background:"var(--ss-warning-18)",border:"1px solid var(--ss-warning-30)",padding:"1px 5px",borderRadius:3}}>
                            ⚠ NEED {r.toUpperCase()}</span>))}
                        {cellExt.map((ext,ei)=>{
                          const extPairDef=EXT_PAIRS.find(p=>p.id===ext.pairId);
                          const empAName=employees.find(e=>e.id===ext.empAId)?.name?.split(" ")[0]||"?";
                          const empBName=ext.empBId?employees.find(e=>e.id===ext.empBId)?.name?.split(" ")[0]||"?":null;
                          return (<span key={ei} style={{display:"inline-flex",alignItems:"center",gap:3,
                            fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:3,
                            background:"#7c3aed14",border:"1px solid #7c3aed40",color:"#7c3aed"}}>
                            ⏱ {extPairDef?.id==="day"?"DAY":"NGT"}: <span style={{color:"#7c3aed"}}>{empAName}</span>
                            {empBName&&<><span style={{color:"#64748b"}}>/</span><span style={{color:"#0e7490"}}>{empBName}</span></>}
                          </span>);
                        })}
                        {cellFatigue.length>0&&<span style={{fontSize:8,fontWeight:700,color:"var(--ss-fatigue)",
                          background:"var(--ss-fatigue-18)",border:"1px solid var(--ss-fatigue-30)",padding:"1px 5px",borderRadius:3}}>
                          ⚠ FATIGUE</span>}
                      </div>
                    )}

                    {sortedAsgn(asgn).map(a => {
                      const emp      = employees.find(e=>e.id===a.employeeId);
                      const unavail  = (emp?.unavailableDays||[]).includes(day);
                      const nights   = shift.id==="third" ? calcConsecutiveNights(a.employeeId,schedule,day,shift.id) : 0;
                      const rest     = calcRestGap(a.employeeId,schedule,day,shift.id);
                      const hasFatigue = unavail||(nights>(cfg?.maxConsecutiveNights??MAX_CONSECUTIVE_NIGHTS))||(rest<(cfg?.minRestHours??MIN_REST_HOURS)&&rest!==Infinity);
                      const prefViolations = emp ? getPreferenceViolations(emp, day, shift.id, schedule) : [];
                      const hasPrefWarn    = prefViolations.length > 0;
                      const hasReqViol     = prefViolations.some(v=>v.type==="wrong_shift_required");
                      const isOnCallSlot = !!a.isOnCall;
                      // S&M: employee covers BOTH Scale and Medical in this slot
                      // (dual-qualified, and no separate Scale/Medical assignee fills the other role)
                      const isSMDual = (
                        (a.position === "Scale" || a.position === "Medical") &&
                        (emp?.qualifications||[]).includes("Scale") &&
                        (emp?.qualifications||[]).includes("Medical") &&
                        !asgn.some(x => x.employeeId !== a.employeeId &&
                          (a.position === "Scale" ? x.position === "Medical" : x.position === "Scale"))
                      );
                      const borderCol = hasFatigue?"var(--ss-fatigue-60)":hasReqViol?"var(--ss-danger-60)":hasPrefWarn?"var(--ss-warning-50)":isOnCallSlot?"var(--ss-warning-60)":pC(a.position,t)+"30";
                      const bgCol     = hasFatigue?"var(--ss-fatigue-18)":hasReqViol?"var(--ss-danger-0d)":hasPrefWarn?"var(--ss-warning-0a)":pC(a.position,t)+"15";
                      const dotCol    = hasFatigue?"var(--ss-fatigue)":pC(a.position,t);
                      const isSwapSelected = swapSource?.employeeId===a.employeeId && swapSource?.day===day && swapSource?.shiftId===shift.id;
                      const isSwapBlocked  = swapSource && !isSwapSelected && isSwapHardBlocked(a.employeeId, day, shift.id, a.position);
                      const isSwapTarget   = swapSource && !isSwapSelected && !isSwapBlocked;
                      const swapBorder = isSwapSelected ? "2px solid #f59e0b"
                                       : isSwapBlocked  ? "1px solid var(--ss-border)"
                                       : isSwapTarget   ? "1.5px dashed #22c55e"
                                       : (isOnCallSlot?"1.5px dashed ":"1px solid ")+borderCol;
                      const swapBg     = isSwapSelected ? "#f59e0b22"
                                       : isSwapBlocked  ? bgCol
                                       : isSwapTarget   ? "#22c55e0a"
                                       : bgCol;
                      const swapOpacity = isSwapBlocked ? 0.35 : 1;
                      return (
                        <Fragment key={a.employeeId}>
                        <div
                          onClick={!isReadOnly ? (e=>handleChipClick(a.employeeId,day,shift.id,a.position,e)) : undefined}
                          style={{display:"flex",alignItems:"center",gap:5,padding:"4px 6px",
                            background:swapBg,border:swapBorder,borderRadius:4,fontSize:11,
                            opacity:swapOpacity,overflow:"hidden",minWidth:0,
                            cursor:isReadOnly?"default":isSwapBlocked?"not-allowed":"pointer",
                            transition:"opacity .15s, border .1s, background .1s"}}>
                          <span style={{width:6,height:6,borderRadius:"50%",background:dotCol,flexShrink:0}}/>
                          <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                            fontWeight:600,fontSize:10,
                            color:isSwapSelected?"#f59e0b":isSwapTarget?"#22c55e":undefined}}>{getName(a.employeeId)}</span>
                          {emp?.employmentType==="on-call"&&(
                            <span style={{fontSize:8,fontWeight:800,
                              color:"var(--ss-warning)",background:"var(--ss-warning-18)",border:"1px solid var(--ss-warning-50)",
                              padding:"0 3px",borderRadius:2,flexShrink:0,letterSpacing:".03em"}}>OC</span>
                          )}
                          {emp?.employmentType==="part-time"&&(
                            <span style={{fontSize:8,fontWeight:800,
                              color:"var(--ss-text-muted)",background:"var(--ss-surface-alt)",border:"1px solid var(--ss-border)",
                              padding:"0 3px",borderRadius:2,flexShrink:0,letterSpacing:".03em"}}>PT</span>
                          )}
                          {hasFatigue&&<span style={{fontSize:8,color:"var(--ss-fatigue)",fontWeight:800,flexShrink:0}}
                            title="Fatigue warning">⚠</span>}
                          {!hasFatigue&&hasPrefWarn&&<span style={{fontSize:8,color:hasReqViol?"var(--ss-danger)":"var(--ss-warning)",fontWeight:800,flexShrink:0}} title={prefViolations.map(v=>v.msg).join("; ")}>⚠</span>}
                          {(()=>{
                            if(emp?.employmentType!=="full-time") return null;
                            const h = calcHours(a.employeeId, displaySchedule, extShifts);
                            const col = h >= 48 ? "var(--ss-danger)" : h >= 40 ? "var(--ss-scale)" : h > 0 ? "var(--ss-warning)" : "var(--ss-text-dim)";
                            return (
                              <span style={{fontSize:8,fontWeight:800,color:col,flexShrink:0,
                                background:col+"18",border:"1px solid "+col+"40",
                                padding:"0 3px",borderRadius:2,letterSpacing:".02em",
                                minWidth:22,textAlign:"center"}}
                                title={h+"h this week"}>
                                {h}h
                              </span>
                            );
                          })()}
                          <span style={{fontSize:9,color:isSMDual?"var(--ss-medical)":pC(a.position,t),fontWeight:700,flexShrink:0}}>{isSMDual?"S&M":a.position.substring(0,3).toUpperCase()}</span>
                          {!isReadOnly&&<button onClick={(e)=>{e.stopPropagation();removeAsgn(day,shift.id,a.employeeId);}}
                            style={{background:"transparent",border:"none",color:"var(--ss-text-dim)",cursor:"pointer",fontSize:10,padding:"0 2px",lineHeight:1}}>✕</button>}
                        </div>
                        {}
                        {!isReadOnly && !swapSource && !subSource &&
                          editingCell === cellKey(day,shift.id)+"__chipprompt__"+a.employeeId && (
                          <div style={{display:"flex",gap:4,marginTop:2,marginLeft:2}}>
                            <button
                              onClick={e=>{e.stopPropagation();setEditingCell(null);setSwapSource({employeeId:a.employeeId,day,shiftId:shift.id,position:a.position});}}
                              style={{flex:1,fontSize:9,fontWeight:700,padding:"3px 0",borderRadius:3,cursor:"pointer",
                                background:"#f59e0b22",color:"#f59e0b",border:"1px solid #f59e0b66"}}>
                              🔄 Swap
                            </button>
                            <button
                              onClick={e=>{e.stopPropagation();setSubSource({employeeId:a.employeeId,day,shiftId:shift.id,position:a.position});setEditingCell({day,shiftId:shift.id});}}
                              style={{flex:1,fontSize:9,fontWeight:700,padding:"3px 0",borderRadius:3,cursor:"pointer",
                                background:"var(--ss-scale-22)",color:"var(--ss-scale)",border:"1px solid var(--ss-scale-66)"}}>
                              ⇄ Sub
                            </button>
                            <button
                              onClick={e=>{e.stopPropagation();setEditingCell(null);}}
                              style={{fontSize:9,fontWeight:700,padding:"3px 5px",borderRadius:3,cursor:"pointer",
                                background:"transparent",color:"var(--ss-text-dim)",border:"1px solid var(--ss-border)"}}>
                              ✕
                            </button>
                          </div>
                        )}
                        </Fragment>
                      );
                    })}

                    {cellExt.map((ext,ei)=>{
                      const extPair=EXT_PAIRS.find(p=>p.id===ext.pairId);
                      const coversFirst=extPair?.covers[0]===shift.id;
                      const coversSecond=extPair?.covers[1]===shift.id;
                      const empIdForCell=coversFirst?ext.empAId:coversSecond?(ext.empBId||ext.empAId):null;
                      if(!empIdForCell) return null;
                      const extEmp=employees.find(e=>e.id===empIdForCell);
                      if(!extEmp) return null;
                      const extColor=extPair?.id==="day"?"#7c3aed":"#0e7490";
                      const halfLabel=extPair?.id==="day"?(coversFirst?"6A–2P":"2P–6P"):(coversFirst?"6P–2A":"2A–6A");
                      return (
                        <div key={"ext-"+ei+"-"+empIdForCell} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 6px",
                          background:extColor+"12",border:"1px dashed "+extColor+"60",borderRadius:4,fontSize:11}}>
                          <span style={{fontSize:9,flexShrink:0}}>⏱</span>
                          <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                            fontWeight:600,fontSize:10,color:extColor}}>{extEmp.name}</span>
                          {extEmp.employmentType!=="full-time"&&<span style={{fontSize:8,fontWeight:800,
                            color:"var(--ss-text-muted)",background:"var(--ss-surface-alt)",border:"1px solid var(--ss-border)",
                            padding:"0 3px",borderRadius:2,flexShrink:0}}>PT</span>}
                          <span style={{fontSize:8,color:extColor,fontWeight:700,flexShrink:0,
                            background:extColor+"20",border:"1px solid "+extColor+"40",padding:"1px 4px",borderRadius:2}}>
                            12H {halfLabel}</span>
                          <button onClick={()=>removeExtShift((extShifts||[]).findIndex(e=>e===ext))}
                            style={{background:"transparent",border:"none",color:"var(--ss-text-dim)",cursor:"pointer",fontSize:10,padding:"0 2px",lineHeight:1}}
                            title="Remove 12hr shift">✕</button>
                        </div>
                      );
                    })}

                    {(trainingBlocks||[]).filter(trn=>{
                      if (trn.day !== day) return false;
                      // Show the training block in the shift cell whose 8h window overlaps it
                      const shiftStart = SHIFT_START_HOUR[shift.id];
                      const shiftEnd = shiftStart + 8; // 8h shift
                      const trnEnd = trn.startHour + trn.durationHours;
                      // Overlap: training starts before shift ends AND ends after shift starts
                      return trn.startHour < shiftEnd && trnEnd > shiftStart;
                    }).map(trn=>{
                      const trnEmp = employees.find(e=>e.id===trn.empId);
                      if (!trnEmp) return null;
                      const fmt = h => { const s=h<12?"AM":"PM"; const d=h%12||12; return `${d}${s}`; };
                      const endHr = trn.startHour + trn.durationHours;
                      return (
                        <div key={trn.id} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 6px",
                          background:"#d9770612",border:"1px dashed #d9770660",borderRadius:4,fontSize:11}}>
                          <span style={{fontSize:9,flexShrink:0}}>✏</span>
                          <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                            fontWeight:600,fontSize:10,color:"#d97706"}}>{trnEmp.name}</span>
                          <span style={{fontSize:8,color:"#d97706",fontWeight:700,flexShrink:0,
                            background:"#d9770620",border:"1px solid #d9770640",padding:"1px 4px",borderRadius:2}}>
                            {trn.durationHours}H {fmt(trn.startHour)}–{fmt(endHr%24)}</span>
                          {!isReadOnly&&<button onClick={()=>setTrainingBlocks(prev=>prev.filter(t=>t.id!==trn.id))}
                            style={{background:"transparent",border:"none",color:"var(--ss-text-dim)",cursor:"pointer",
                              fontSize:10,padding:"0 2px",lineHeight:1}} title="Remove training block">✕</button>}
                        </div>
                      );
                    })}

                    {!isReadOnly&&!st.isFull&&!isEd&&(
                      <button onClick={()=>setEditingCell({day,shiftId:shift.id})}
                        style={{background:"var(--ss-accent-10)",border:"1px dashed var(--ss-border)",borderRadius:4,
                          color:"var(--ss-text-dim)",cursor:"pointer",fontSize:11,padding:"4px 0",fontFamily:"inherit",
                          transition:"all .2s",marginTop:"auto"}}
                        onMouseEnter={e=>{e.target.style.borderColor="var(--ss-accent)";e.target.style.color="var(--ss-accent)";}}
                        onMouseLeave={e=>{e.target.style.borderColor="var(--ss-border)";e.target.style.color="var(--ss-text-dim)";}}>
                        + Add ({asgn.length}/{max})
                      </button>
                    )}
                    {(hasUnfillableGap||(asgn.length>0&&!st.ok))&&!isEd&&(st.missing.length>0)&&(
                      <button onClick={()=>suggestExtShifts(day)}
                        style={{background:"#7c3aed14",border:"1px dashed #7c3aed50",borderRadius:4,
                          color:"#7c3aed",cursor:"pointer",fontSize:10,padding:"3px 0",fontFamily:"inherit",
                          marginTop:"auto",fontWeight:700,transition:"background .2s"}}
                        onMouseEnter={e=>{e.currentTarget.style.background="#7c3aed28";}}
                        onMouseLeave={e=>{e.currentTarget.style.background="#7c3aed14";}}>
                        ⏱ {hasUnfillableGap?"12hr pair (no 8hr option)":"12hr pair option"}
                      </button>
                    )}
                    {isEd&&(
                      <div style={{background:"var(--ss-surface-alt)",border:"1px solid var(--ss-accent)",borderRadius:4,padding:6,marginTop:"auto"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                          {subSource && subSource.day===day && subSource.shiftId===shift.id ? (
                            <span style={{fontSize:10,color:"var(--ss-scale)",fontWeight:700}}>
                              ⇄ SUB for {employees.find(e=>e.id===subSource.employeeId)?.name?.split(" ")[1]||"?"}
                            </span>
                          ) : (
                            <span style={{fontSize:10,color:"var(--ss-text-muted)",fontWeight:600}}>SELECT</span>
                          )}
                          <button onClick={()=>{setEditingCell(null);setSubSource(null);}} style={{background:"transparent",border:"none",color:"var(--ss-text-dim)",cursor:"pointer",fontSize:12}}>✕</button>
                        </div>
                        <EmpPickerSearch
                          day={day} shift={shift} subSource={subSource}
                          unassigned={unassigned}
                          getAssignable={getAssignable} assignEmp={assignEmp}
                          schedule={schedule} extShifts={extShifts} timeOffReqs={timeOffReqs}
                          weekStart={weekStart} executeSub={executeSub} st={st}
                          setEditingCell={setEditingCell} setSubSource={setSubSource} t={t}/>
                      </div>
                    )}
                    {st.isFull&&st.ok&&cellFatigue.length===0&&(
                      <div style={{fontSize:9,color:"var(--ss-scale)",textAlign:"center",marginTop:"auto",fontWeight:700,letterSpacing:".05em"}}>● FULL</div>
                    )}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      {}
      {swapSource && (
        <SwapIndicator
          swapSource={swapSource}
          employees={employees}
          onCancel={() => setSwapSource(null)} />
      )}
      {subSource && (
        <SubIndicator
          subSource={subSource}
          employees={employees}
          onCancel={() => { setSubSource(null); setEditingCell(null); }} />
      )}

      {}
      {scheduleIssues !== null && (
        <div style={{
          marginTop:16, borderRadius:8, overflow:"hidden",
          border:"1px solid "+(scheduleIssues.length===0 ? "var(--ss-scale)" : scheduleIssues.some(i=>i.level==="error") ? "var(--ss-danger)" : "var(--ss-warning)")+"60",
        }}>
          <div style={{
            padding:"8px 14px", display:"flex", alignItems:"center", justifyContent:"space-between",
            background:scheduleIssues.length===0 ? "var(--ss-scale-18)" : scheduleIssues.some(i=>i.level==="error") ? "var(--ss-danger-18)" : "var(--ss-warning-18)",
          }}>
            <span style={{fontWeight:700, fontSize:12,
              color:scheduleIssues.length===0 ? "var(--ss-scale)" : scheduleIssues.some(i=>i.level==="error") ? "var(--ss-danger)" : "var(--ss-warning)"}}>
              {scheduleIssues.length===0
                ? "✓ Schedule validated — no issues found"
                : scheduleIssues.some(i=>i.level==="error")
                  ? `⚠ ${scheduleIssues.filter(i=>i.level==="error").length} coverage/constraint issue${scheduleIssues.filter(i=>i.level==="error").length!==1?"s":""} found`
                  : `ℹ ${scheduleIssues.length} informational warning${scheduleIssues.length!==1?"s":""}`
              }
            </span>
            <button onClick={()=>setScheduleIssues(null)}
              style={{background:"none",border:"none",cursor:"pointer",fontSize:14,
                color:"var(--ss-text-dim)",padding:"0 4px",fontFamily:"inherit"}}>✕</button>
          </div>
          {scheduleIssues.length>0 && (
            <div style={{padding:"8px 14px",display:"flex",flexDirection:"column",gap:4,
              maxHeight:200,overflowY:"auto"}}>
              {scheduleIssues.map((issue,i) => (
                <div key={i} style={{fontSize:11,display:"flex",alignItems:"flex-start",gap:6}}>
                  <span style={{flexShrink:0,fontWeight:700,
                    color:issue.level==="error" ? "var(--ss-danger)" : "var(--ss-warning)"}}>
                    {issue.level==="error" ? "✗" : "ℹ"}
                  </span>
                  <span style={{color:"var(--ss-text)"}}>{issue.msg}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {}
      {Object.values(schedule||{}).some(a=>a.length>0) && (
        <div style={{display:"grid",gridTemplateColumns:"64px repeat(7,1fr)",gap:2,marginTop:4,marginBottom:4}}>
          <div style={{padding:"4px 8px",fontSize:9,fontWeight:700,color:"var(--ss-text-dim)",
            letterSpacing:".06em",display:"flex",alignItems:"center"}}>DAILY</div>
          {DAYS.map(day => {
            const totals = SHIFTS.map(shift => {
              const a = getAsgn(day, shift.id);
              const cap = getEffectiveSlotCount(day, shift.id, extShifts);
              const sup = isWeekday(day) && shift.id==="first" ? 1 : 0;
              const need = cap + sup;
              const bodies = a.length;
              const ok = bodies >= need && getStatus(day,shift.id).ok;
              const gap = bodies < need;
              return {ok, gap, bodies, need};
            });
            const anyGap = totals.some(t=>t.gap);
            const allOk  = totals.every(t=>t.ok);

function TimeOffCalendar() {
  const { employees } = useRoster();
  const { timeOffReqs: timeOffRequests } = useTimeOff();
  const t = useTheme();
  const [focusDate, setFocusDate] = useState(null);
  const [monthOffset, setMonthOffset] = useState(0);

  const today = new Date();
  today.setHours(0,0,0,0);

  const dateMap = {};
  (timeOffRequests||[]).forEach(req => {
    const emp = employees.find(e => e.id === req.empId);
    if (!emp) return;
    const start = new Date(req.startDate + "T00:00:00");
    const end   = new Date((req.endDate || req.startDate) + "T00:00:00");
    for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
      const key = d.toISOString().slice(0,10);
      if (!dateMap[key]) dateMap[key] = [];
      dateMap[key].push({ emp, req });
    }
  });

  const statusDot = (status) => {
    if (status === "approved") return "var(--ss-scale)";
    if (status === "denied")   return "var(--ss-danger)";
    return "var(--ss-warning)";
  };

  const renderMonth = (year, month) => {
    const monthName = new Date(year, month, 1).toLocaleString("default", { month:"long", year:"numeric" });
    const firstDay  = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const cells = [];

    for (let i = 0; i < firstDay; i++) cells.push(null);
    for (let d = 1; d <= daysInMonth; d++) cells.push(d);

    return (
      <div key={`${year}-${month}`} style={{flex:"1 1 260px",minWidth:230}}>
        <div style={{textAlign:"center",fontWeight:700,fontSize:12,color:"var(--ss-text)",
          marginBottom:8,letterSpacing:".04em"}}>{monthName.toUpperCase()}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1}}>
          {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>(
            <div key={d} style={{textAlign:"center",fontSize:9,fontWeight:700,
              color:"var(--ss-text-dim)",padding:"3px 0",letterSpacing:".04em"}}>{d}</div>
          ))}
          {cells.map((day,i) => {
            if (!day) return <div key={"e"+i}/>;
            const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            const entries = dateMap[dateStr] || [];
            const isToday = dateStr === today.toISOString().slice(0,10);
            const isFocus = focusDate?.dateStr === dateStr;

            const dots = entries.slice(0,4);
            const extra = entries.length - 4;

            return (
              <div key={dateStr}
                onClick={e => {
                  if (!entries.length) { setFocusDate(null); return; }
                  const r = e.currentTarget.getBoundingClientRect();
                  setFocusDate(isFocus ? null : { dateStr, entries, x: r.left, y: r.bottom });
                }}
                style={{
                  position:"relative",
                  textAlign:"center",
                  padding:"4px 2px 3px",
                  borderRadius:4,
                  cursor: entries.length ? "pointer" : "default",
                  background: isFocus ? "var(--ss-accent-22)" : isToday ? "var(--ss-accent-15)" : "transparent",
                  border: isToday ? "1px solid var(--ss-accent-40)" : "1px solid transparent",
                  transition:"background .15s",
                }}>
                <div style={{fontSize:10,fontWeight: isToday?800:500,
                  color: isToday?"var(--ss-accent)":"var(--ss-text)",lineHeight:1.2}}>{day}</div>
                {entries.length > 0 && (
                  <div style={{display:"flex",justifyContent:"center",gap:1.5,marginTop:2,flexWrap:"wrap"}}>
                    {dots.map(({req},di) => (
                      <span key={di} style={{
                        width:5,height:5,borderRadius:"50%",
                        background:statusDot(req.status),
                        flexShrink:0,display:"inline-block",
                      }}/>
                    ))}
                    {extra > 0 && (
                      <span style={{fontSize:7,color:"var(--ss-text-dim)",fontWeight:700,lineHeight:"5px"}}>+{extra}</span>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  const months = [];
  for (let i = 0; i < 3; i++) {
    const d = new Date(today.getFullYear(), today.getMonth() + monthOffset + i, 1);
    months.push({ year: d.getFullYear(), month: d.getMonth() });
  }

  const tooltip = focusDate ? (() => {
    const d = new Date(focusDate.dateStr + "T00:00:00");
    const label = d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
    return (
      <div style={{
        position:"fixed", left:Math.min(focusDate.x, window.innerWidth-220),
        top: focusDate.y+6, zIndex:9999,
        background:"var(--ss-surface)", border:"1px solid var(--ss-border)",
        borderRadius:8, padding:"10px 14px", minWidth:190,
        boxShadow:"0 4px 20px rgba(0,0,0,.18)",
      }}>
        <div style={{fontSize:11,fontWeight:800,color:"var(--ss-text)",marginBottom:8,
          letterSpacing:".04em"}}>{label.toUpperCase()}</div>
        {focusDate.entries.map(({emp,req},i) => (
          <div key={i} style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:statusDot(req.status),flexShrink:0}}/>
            <span style={{fontSize:12,fontWeight:600,color:"var(--ss-text)",flex:1}}>{emp.name}</span>
            <span style={{fontSize:10,fontWeight:700,
              color:statusDot(req.status),textTransform:"uppercase",letterSpacing:".04em"}}>
              {req.status}
            </span>
          </div>
        ))}
        <div style={{fontSize:10,color:"var(--ss-text-dim)",marginTop:6,borderTop:"1px solid var(--ss-border)",paddingTop:6}}>
          Click again to close
        </div>
      </div>
    );
  })() : null;

  const totalReqs = (timeOffRequests||[]).length;

  return (
    <div style={{marginBottom:20}}>
      {}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:"var(--ss-text-dim)",letterSpacing:".06em"}}>
          CALENDAR VIEW
        </div>
        <div style={{display:"flex",gap:10,marginLeft:"auto",alignItems:"center"}}>
          {}
          {[["Pending","var(--ss-warning)"],["Approved","var(--ss-scale)"],["Denied","var(--ss-danger)"]].map(([label,col])=>(
            <div key={label} style={{display:"flex",alignItems:"center",gap:4}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:col,display:"inline-block"}}/>
              <span style={{fontSize:10,color:"var(--ss-text-dim)",fontWeight:600}}>{label}</span>
            </div>
          ))}
          {}
          <button onClick={()=>setMonthOffset(o=>o-1)}
            style={{background:"var(--ss-surface-alt)",border:"1px solid var(--ss-border)",color:"var(--ss-text)",
              padding:"3px 10px",borderRadius:5,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>‹</button>
          <button onClick={()=>setMonthOffset(0)}
            style={{background:monthOffset===0?"var(--ss-accent-22)":"transparent",
              border:"1px solid "+(monthOffset===0?"var(--ss-accent)":"var(--ss-border)"),
              color:monthOffset===0?"var(--ss-accent)":"var(--ss-text-muted)",
              padding:"3px 10px",borderRadius:5,cursor:"pointer",fontSize:10,
              fontWeight:700,fontFamily:"inherit",letterSpacing:".04em"}}>TODAY</button>
          <button onClick={()=>setMonthOffset(o=>o+1)}
            style={{background:"var(--ss-surface-alt)",border:"1px solid var(--ss-border)",color:"var(--ss-text)",
              padding:"3px 10px",borderRadius:5,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>›</button>
        </div>
      </div>

      {totalReqs === 0 ? (
        <div style={{background:"var(--ss-surface)",border:"1px solid var(--ss-border)",borderRadius:8,
          padding:"20px",textAlign:"center",color:"var(--ss-text-dim)",fontSize:12}}>
          No time-off requests yet — submit one below to see them here.
        </div>
      ) : (
        <div style={{background:"var(--ss-surface)",border:"1px solid var(--ss-border)",borderRadius:8,padding:"16px"}}>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            {months.map(({year,month}) => renderMonth(year, month))}
          </div>
        </div>
      )}

      {}
      {focusDate && (
        <div onClick={()=>setFocusDate(null)}
          style={{position:"fixed",inset:0,zIndex:9998}}/>
      )}
      {tooltip}
    </div>
  );
}

function TimeOffManager() {
  const { employees } = useRoster();
  const { weekStart } = useSchedule();
  const { timeOffReqs: timeOffRequests, setTimeOffReqs: setTimeOffRequests } = useTimeOff();
  const t   = useTheme();
  const uid = () => Math.random().toString(36).slice(2,10);

  const EMPTY_FORM = { empId:"", type:"single_day", startDate:"", endDate:"", shiftId:"", note:"" };
  const [form,      setForm]      = useState(EMPTY_FORM);
  const [errors,    setErrors]    = useState([]);
  const [filter,    setFilter]    = useState("all");
  const [empFilter, setEmpFilter] = useState("all");

  const upd = (k,v) => setForm(f => ({...f, [k]:v}));

  const validate = () => {
    const e = [];
    if (!form.empId)      e.push("Select an employee.");
    if (!form.startDate)  e.push("Start date is required.");
    if (form.type === "vacation" && !form.endDate) e.push("End date required for vacation.");
    if (form.type === "partial" && !form.shiftId)  e.push("Select a shift for partial time-off.");
    if (form.type === "vacation" && form.endDate && form.endDate < form.startDate)
      e.push("End date must be on or after start date.");
    return e;
  };

  const submit = () => {
    const e = validate();
    if (e.length) { setErrors(e); return; }
    const endDate = form.type === "vacation" ? form.endDate : form.startDate;
    setTimeOffRequests(prev => [...(prev||[]), {
      id: uid(),
      empId:       form.empId,
      type:        form.type,
      status:      "pending",
      startDate:   form.startDate,
      endDate,
      shiftId:     form.type === "partial" ? form.shiftId : null,
      note:        form.note.trim(),
      submittedAt: new Date().toISOString(),
      reviewedAt:  null,
    }]);
    setForm(EMPTY_FORM);
    setErrors([]);
  };

  const setStatus = (id, status) => {
    setTimeOffRequests(prev => prev.map(r =>
      r.id === id ? {...r, status, reviewedAt: new Date().toISOString()} : r
    ));
  };

  const remove = (id) => {
    if (!window.confirm("Delete this request?")) return;
    setTimeOffRequests(prev => prev.filter(r => r.id !== id));
  };

  const getName = id => employees.find(e => e.id === id)?.name || "Unknown";

  const statusColor = s => s==="approved" ? "var(--ss-scale)" : s==="denied" ? "var(--ss-danger)" : "var(--ss-warning)";
  const statusIcon  = s => s==="approved" ? "✓" : s==="denied" ? "✕" : "⏳";
  const typeLabel   = tp => tp==="vacation"?"🏖 Vacation":tp==="single_day"?"📅 Day Off":"⏰ Partial";

  const filtered = (timeOffRequests||[])
    .filter(r => filter==="all" || r.status===filter)
    .filter(r => empFilter==="all" || r.empId===empFilter)
    .sort((a,b) => b.submittedAt.localeCompare(a.submittedAt));

  const pending  = (timeOffRequests||[]).filter(r=>r.status==="pending").length;
  const approved = (timeOffRequests||[]).filter(r=>r.status==="approved").length;
  const denied   = (timeOffRequests||[]).filter(r=>r.status==="denied").length;

  const iS = { background:"var(--ss-surface-alt)", border:"1px solid var(--ss-border)", color:"var(--ss-text)",
    padding:"9px 12px", borderRadius:6, outline:"none", fontSize:13,
    fontFamily:"'JetBrains Mono',monospace", width:"100%", boxSizing:"border-box" };

  const btnS = (active, col) => ({
    background: active ? col+"22" : "transparent",
    border: "1px solid " + (active ? col : "var(--ss-border)"),
    color: active ? col : "var(--ss-text-muted)",
    padding:"5px 14px", borderRadius:20, cursor:"pointer",
    fontSize:11, fontWeight:700, fontFamily:"inherit", letterSpacing:".05em",
  });

  return (
    <div style={{maxWidth:900}}>

function StorageInspector() {
  const t = useTheme();
  const [keys,     setKeys]     = useState([]);
  const [selected, setSelected] = useState(null);
  const [raw,      setRaw]      = useState("");
  const [editRaw,  setEditRaw]  = useState("");
  const [msg,      setMsg]      = useState(null);
  const [loading,  setLoading]  = useState(false);
  const [open,     setOpen]     = useState(false);

  const flash = (m, ok=true) => { setMsg({text:m,ok}); setTimeout(()=>setMsg(null), 3500); };

  const loadKeys = async () => {
    setLoading(true);
    try {
      const res = lsList();
      setKeys((res?.keys || []).sort());
    } catch(e) { setKeys([]); }
    setLoading(false);
  };

  const loadKey = async (k) => {
    setSelected(k);
    try {
      const res = lsGet(k);
      const text = res?.value ?? "null";
      try { setRaw(JSON.stringify(JSON.parse(text), null, 2)); setEditRaw(JSON.stringify(JSON.parse(text), null, 2)); }
      catch { setRaw(text); setEditRaw(text); }
    } catch(e) { setRaw("(not found)"); setEditRaw(""); }
  };

  const saveEdit = async () => {
    if (!selected) return;
    try {
      JSON.parse(editRaw);
      lsSet(selected, editRaw);
      flash("✓ Saved. Reload the app to apply.", true);
    } catch(e) { flash("✗ Invalid JSON — fix before saving.", false); }
  };

  const deleteKey = async () => {
    if (!selected) return;
    if (!window.confirm(`Delete storage key "${selected}"? This cannot be undone.`)) return;
    try {
      lsDelete(selected);
      flash(`✓ Deleted "${selected}".`, true);
      setSelected(null); setRaw(""); setEditRaw("");
      loadKeys();
    } catch(e) { flash("✗ Delete failed.", false); }
  };

  useEffect(() => { if (open) loadKeys(); }, [open]);

  const btnBase = {
    border:"none", padding:"7px 14px", borderRadius:5, cursor:"pointer",
    fontSize:11, fontWeight:700, fontFamily:"inherit",
  };

  return (
    <div style={{background:"var(--ss-surface)",border:"1px solid var(--ss-border)",borderRadius:8,marginBottom:20}}>
      <button onClick={()=>setOpen(o=>!o)} style={{
        width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",
        background:"transparent",border:"none",padding:"16px 20px",cursor:"pointer",
        fontFamily:"inherit",
      }}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:"var(--ss-text)",textAlign:"left"}}>🗄 Storage Inspector</div>
          <div style={{fontSize:11,color:"var(--ss-text-dim)",marginTop:2,textAlign:"left"}}>
            View, edit, or restore raw storage data. Use this to recover lost employee data.
          </div>
        </div>
        <span style={{fontSize:12,color:"var(--ss-text-dim)"}}>{open?"▲":"▼"}</span>
      </button>

      {open && (
        <div style={{padding:"0 20px 20px"}}>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
            <button onClick={loadKeys} style={{...btnBase,background:"var(--ss-accent)",color:"#fff"}}>
              {loading?"Loading…":"⟳ Refresh Keys"}
            </button>
            {msg && (
              <span style={{fontSize:11,fontWeight:700,color:msg.ok?t.success||"#4ade80":"var(--ss-danger)"}}>
                {msg.text}
              </span>
            )}
          </div>

          {keys.length === 0 && !loading && (
            <div style={{fontSize:12,color:"var(--ss-text-dim)",padding:"8px 0"}}>
              No storage keys found. Click Refresh Keys to scan.
            </div>
          )}

          {keys.length > 0 && (
            <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
              {}
              <div style={{flexShrink:0,width:180,border:"1px solid var(--ss-border)",borderRadius:6,overflow:"hidden"}}>
                {keys.map(k => (
                  <div key={k} onClick={()=>loadKey(k)} style={{
                    padding:"8px 12px",fontSize:11,fontWeight:k===selected?700:400,
                    cursor:"pointer",background:k===selected?"var(--ss-accent-22)":"var(--ss-surface-alt)",
                    color:k===selected?"var(--ss-accent)":"var(--ss-text)",
                    borderBottom:"1px solid var(--ss-border)",
                    wordBreak:"break-all",
                  }}>{k}</div>
                ))}
              </div>

              {}
              {selected && (
                <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
                  <div style={{fontSize:11,fontWeight:700,color:"var(--ss-text-dim)",letterSpacing:".05em"}}>
                    EDITING: {selected}
                    {selected==="shift_employees" && (
                      <span style={{marginLeft:8,fontSize:10,color:"var(--ss-warning)",fontWeight:400}}>
                        ⚠ This is your employee roster. After saving, reload the app tab.
                      </span>
                    )}
                  </div>
                  <textarea
                    value={editRaw}
                    onChange={e=>setEditRaw(e.target.value)}
                    spellCheck={false}
                    style={{
                      width:"100%",height:240,fontFamily:"'JetBrains Mono',monospace",
                      fontSize:10,background:"var(--ss-surface-alt)",color:"var(--ss-text)",
                      border:"1px solid var(--ss-border)",borderRadius:5,padding:10,
                      resize:"vertical",outline:"none",boxSizing:"border-box",lineHeight:1.5,
                    }}
                  />
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={saveEdit}
                      style={{...btnBase,background:"var(--ss-accent)",color:"#fff"}}>
                      💾 Save to Storage
                    </button>
                    <button onClick={()=>setEditRaw(raw)}
                      style={{...btnBase,background:"var(--ss-surface-alt)",color:"var(--ss-text)",border:"1px solid var(--ss-border)"}}>
                      ⟳ Reset

                    full roster — if it looks like only Scale employees, your previous save may be in

                </div>

            </div>
          )}
        </div>
      )}
    </div>
  );

const ALL_BACKUP_KEYS = [
  "shift_employees","shift_settings","shift_schedule","shift_ext_shifts",
  "shift_saved_weeks","shift_history","shift_timeoff","shift_patterns",
  "shift_week_start","shift_saved_rosters","shift_custom_theme","shift_theme",
];

function RosterBackup() {
  const { employees, setEmployees, setEmpPatterns, setSavedRosters } = useRoster();
  const { setSchedule, setExtShifts, setWeekStart } = useSchedule();
  const { setHistory, setSavedWeeks } = useHistory();
  const { setTimeOffReqs } = useTimeOff();
  const { setSettings } = useSettings();
  const t = useTheme();
  const [msg,  setMsg]  = useState(null);
  const [busy, setBusy] = useState(false);
  const fileRef = useRef(null);
  const [ghToken,   setGhToken]   = useState(() => localStorage.getItem("shift_github_token") || "");
  const [showToken, setShowToken] = useState(false);
  const [syncMsg,   setSyncMsg]   = useState(null);
  const [syncBusy,  setSyncBusy]  = useState(false);

  const syncToGitHub = async () => {
    if (!ghToken.trim()) { setSyncMsg({ text: "Enter a GitHub token first", ok: false }); return; }
    setSyncBusy(true);
    setSyncMsg(null);
    try {
      // Build full backup payload
      const snapshot = {};
      for (const k of ALL_BACKUP_KEYS) {
        try {
          const r = await lsGet(k);
          if (r && r.value !== undefined) snapshot[k] = JSON.parse(r.value);
        } catch(_) {}
      }
      const payload = {
        _meta: {
          version: APP_VERSION,
          exportedAt: new Date().toISOString(),
          employeeCount: (snapshot.shift_employees||[]).length,
          label: "ShiftScheduler Full Backup",
        },
        data: snapshot,
      };
      const json = JSON.stringify(payload, null, 2);
      // btoa needs latin1 — encodeURIComponent + unescape handles unicode safely
      const b64 = btoa(unescape(encodeURIComponent(json)));

      const owner = "shamusshafer-ops";
      const repo  = "shift-scheduler";
      const path  = "roster-backup-current.json";
      const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
      const headers = {
        Authorization: `token ${ghToken.trim()}`,
        Accept: "application/vnd.github.v3+json",
        "Content-Type": "application/json",
      };

      // Fetch current SHA (required by GitHub API to update existing file)
      const getRes = await fetch(apiUrl, { headers });
      if (!getRes.ok) throw new Error(`GitHub ${getRes.status} — check token/permissions`);
      const { sha } = await getRes.json();

      // Push updated content
      const putRes = await fetch(apiUrl, {
        method: "PUT",
        headers,
        body: JSON.stringify({
          message: `Auto-sync roster backup — ${new Date().toLocaleDateString()}`,
          content: b64,
          sha,
        }),
      });
      if (!putRes.ok) throw new Error(`GitHub ${putRes.status} on push — ${await putRes.text()}`);

      localStorage.setItem("shift_github_last_sync", new Date().toISOString());
      setSyncMsg({ text: `✓ Synced to GitHub at ${new Date().toLocaleTimeString()}`, ok: true });
      setTimeout(() => setSyncMsg(null), 6000);
    } catch(e) {
      setSyncMsg({ text: "✗ " + e.message, ok: false });
    }
    setSyncBusy(false);
  };

  const flash = (text, ok=true) => {
    setMsg({text, ok});
    setTimeout(() => setMsg(null), 4000);
  };

  const downloadBackup = async () => {
    setBusy(true);
    try {
      const snapshot = {};
      for (const k of ALL_BACKUP_KEYS) {
        try {
          const r = await lsGet(k);
          if (r && r.value !== undefined) snapshot[k] = JSON.parse(r.value);
        } catch(_) {}
      }
      const payload = {
        _meta: {
          version: APP_VERSION,
          exportedAt: new Date().toISOString(),
          employeeCount: (snapshot.shift_employees||[]).length,
          label: "ShiftScheduler Full Backup",
        },
        data: snapshot,
      };
      const json = JSON.stringify(payload, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = `shift-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("✓ Backup downloaded to your computer.");
    } catch(e) {
      flash("✗ Backup failed: " + e.message, false);
    }
    setBusy(false);
  };

  const handleFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    e.target.value = "";
    const reader = new FileReader();
    reader.onload = async (ev) => {
      setBusy(true);
      try {
        const parsed = JSON.parse(ev.target.result);
        const snapshot = parsed.data || parsed;

        const rawEmps = snapshot.shift_employees || snapshot.employees;
        if (!Array.isArray(rawEmps) || !rawEmps.length)
          throw new Error("No employee data found in file.");
        // Apply all employee migrations so imported data always has current shape
        let emps = rawEmps;
        for (let v = 1; v <= SCHEMA_VERSION; v++) {
          if (EMP_MIGRATIONS[v]) emps = EMP_MIGRATIONS[v](emps);
        }

        const writes = [
          { key:"shift_employees",     val: emps,                              setter: setEmployees     },
          { key:"shift_theme",         val: snapshot.shift_theme,              setter: ()=>{}  },
          { key:"shift_custom_theme",  val: snapshot.shift_custom_theme,       setter: ()=>{}  },
          { key:"shift_settings",      val: snapshot.shift_settings,           setter: setSettings      },
          { key:"shift_schedule",      val: snapshot.shift_schedule,           setter: setSchedule      },
          { key:"shift_ext_shifts",    val: snapshot.shift_ext_shifts,         setter: setExtShifts     },
          { key:"shift_timeoff",       val: snapshot.shift_timeoff,            setter: setTimeOffReqs   },
          { key:"shift_saved_weeks",   val: snapshot.shift_saved_weeks,        setter: setSavedWeeks    },
          { key:"shift_history",       val: snapshot.shift_history,            setter: setHistory       },
          { key:"shift_patterns",      val: snapshot.shift_patterns,           setter: setEmpPatterns   },
          { key:"shift_week_start",    val: snapshot.shift_week_start,         setter: setWeekStart     },
          { key:"shift_saved_rosters", val: snapshot.shift_saved_rosters,      setter: setSavedRosters  },
        ];

        for (const { key, val, setter } of writes) {
          if (val === undefined || val === null) continue;
          try {
            lsSet(key, JSON.stringify(val));
            setter(val);
          } catch(_) {}
        }

        flash(`✓ Restored ${emps.length} employees and all settings. No reload needed.`);
      } catch(err) {

function RotationPreview() {
  const { employees, empPatterns } = useRoster();
  const settings = useSettings();
  const t = useTheme();
  const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const DAY3 = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const maxShifts = settings?.maxConsecutiveShifts ?? 5;
  const daysOff   = Math.max(1, 7 - maxShifts);

  const ftEmps = employees.filter(e =>
    e.employmentType === "full-time"
  );

  const getDaysOff = (emp, mode) => {
    const stored = empPatterns?.[emp.id]?.blockStart;
    const idx = ftEmps.indexOf(emp);
    const freshBs = emp.requiredShift ? 0 : Math.floor((idx / ftEmps.length) * 7);
    const week0bs = stored !== undefined ? stored : freshBs;

    return [0,1,2,3].map(week => {
      const advancement = mode === "rolling" ? 1 : (maxShifts + daysOff);
      const bs = (week0bs + advancement * week) % 7;
      const offDays = [];
      for (let i = 0; i < daysOff; i++) {
        offDays.push(DAY3[(bs + maxShifts + i) % 7]);
      }
      return offDays.join("/");
    });
  };

  const colStyle = (i) => ({
    padding: "5px 8px", fontSize: 11, textAlign: "center",
    background: i % 2 === 0 ? "var(--ss-surface)" : "var(--ss-surface-alt)",
    borderBottom: "1px solid " + "var(--ss-border)",
  });

  const modes = ["fixed", "rolling"];
  const modeLabels = { fixed: "Fixed (current)", rolling: "Rolling (proposed)" };
  const modeColors = { fixed: "var(--ss-text-muted)", rolling: "var(--ss-scale)" };

  return (
    <div style={{display:"flex", gap:16, flexWrap:"wrap"}}>
      {modes.map(mode => (
        <div key={mode} style={{flex:"1 1 340px", minWidth:300}}>
          <div style={{fontSize:12, fontWeight:700, color:modeColors[mode],
            marginBottom:8, display:"flex", alignItems:"center", gap:6}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:modeColors[mode],flexShrink:0}}/>
            {modeLabels[mode]}
            {mode === (settings?.rotationMode ?? "fixed") &&
              <span style={{fontSize:10,fontWeight:700,color:"#fff",
                background:modeColors[mode],padding:"1px 6px",borderRadius:3,marginLeft:4}}>
                ACTIVE
              </span>
            }
          </div>
          <div style={{border:"1px solid var(--ss-border)", borderRadius:6, overflow:"hidden"}}>
            {}
            <div style={{display:"grid", gridTemplateColumns:"120px repeat(4,1fr)",
              background:"var(--ss-surface-alt)", borderBottom:"1px solid var(--ss-border)"}}>
              <div style={{padding:"5px 8px",fontSize:10,fontWeight:700,color:"var(--ss-text-dim)",textTransform:"uppercase",letterSpacing:".05em"}}>Employee</div>
              {[1,2,3,4].map(w=>(
                <div key={w} style={{padding:"5px 8px",fontSize:10,fontWeight:700,
                  color:"var(--ss-text-dim)",textAlign:"center",textTransform:"uppercase",letterSpacing:".05em"}}>
                  Wk {w}
                </div>
              ))}
            </div>
            {}
            {ftEmps.map((emp, ri) => {
              const offWeeks = getDaysOff(emp, mode);
              const allSame = offWeeks.every(d => d === offWeeks[0]);
              return (
                <div key={emp.id} style={{display:"grid",
                  gridTemplateColumns:"120px repeat(4,1fr)",
                  background: ri%2===0 ? "var(--ss-surface)" : "var(--ss-surface-alt)"}}>
                  <div style={{padding:"5px 8px",fontSize:11,fontWeight:600,
                    color:"var(--ss-text)",borderRight:"1px solid var(--ss-border)",
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}
                    title={emp.name}>
                    {emp.name}
                  </div>
                  {offWeeks.map((daysStr, wi) => {
                    const prevSame = wi > 0 && offWeeks[wi-1] === daysStr;
                    return (
                      <div key={wi} style={{padding:"5px 4px",fontSize:10,
                        textAlign:"center",fontWeight:prevSame&&mode==="rolling"?400:600,
                        color: allSame && mode==="rolling" ? "var(--ss-danger)" :
                               prevSame ? "var(--ss-text-dim)" : "var(--ss-scale)",
                        borderLeft:"1px solid var(--ss-border-44)"}}>
                        {daysStr}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
          {mode === "fixed" && (
            <div style={{fontSize:10,color:"var(--ss-danger)",marginTop:5,fontWeight:600}}>
              ⚠ Same days off every week — rotation never advances
            </div>
          )}
          {mode === "rolling" && (
            <div style={{fontSize:10,color:"var(--ss-scale)",marginTop:5,fontWeight:600}}>
              ✓ Days off slide forward by 1 each week — fair rotation over 7 weeks
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function RosterDiagnostic() {
  const { employees } = useRoster();
  const { schedule, extShifts } = useSchedule();
  const t = useTheme();
  const [results, setResults] = useState(null);
  const [running, setRunning]  = useState(false);

  const run = () => {
    setRunning(true);
    setTimeout(() => {
      const issues = [];
      const E = (msg) => issues.push({ level:"error", msg });
      const W = (msg) => issues.push({ level:"warn",  msg });
      const rmap = Object.fromEntries(employees.map(e => [e.id, e]));

      const ftByShift = { first:0, second:0, third:0 };
      employees.forEach(e => {
        if (e.employmentType !== "full-time") return;
        const prefs = e.preferredShifts || [];
        const req   = e.requiredShift;
        const shift = req || (prefs.length===1 ? prefs[0] : null);
        if (shift) ftByShift[shift] = (ftByShift[shift]||0) + 1;
      });
      ["first","second","third"].forEach(sid => {
        if (ftByShift[sid] < 3) E(`R1: ${sid} shift has only ${ftByShift[sid]} FT employees (need ≥3 for full coverage)`);
      });

      const scaleByShift = { first:false, second:false, third:false };
      employees.forEach(e => {
        if (!(e.qualifications||[]).includes("Scale")) return;
        const prefs = e.preferredShifts || [];
        const req   = e.requiredShift;
        const shifts = req ? [req] : prefs;
        shifts.forEach(s => { if (s in scaleByShift) scaleByShift[s] = true; });
      });
      Object.entries(scaleByShift).forEach(([sid, has]) => {
        if (!has) E(`R2: No Scale-qualified employee on ${sid} shift`);
      });

      const medByShift = { first:false, second:false, third:false };
      employees.forEach(e => {
        if (!(e.qualifications||[]).includes("Medical")) return;
        const prefs = e.preferredShifts || [];
        const req   = e.requiredShift;
        const shifts = req ? [req] : prefs;
        shifts.forEach(s => { if (s in medByShift) medByShift[s] = true; });
      });
      Object.entries(medByShift).forEach(([sid, has]) => {
        if (!has) E(`R3: No Medical-qualified employee on ${sid} shift`);
      });

      const hasSup = employees.some(e => (e.qualifications||[]).includes("Supervisor"));
      if (!hasSup) E("R4: No Supervisor on the roster — weekday 1st shift will have no supervisor slot");

      employees.filter(e => e.employmentType==="on-call").forEach(e => {
        if (e.maxShiftsPerWeek == null)
          W(`R5: ${e.name} is on-call with no weekly shift limit — may be over-used in autofill`);
      });

      employees.filter(e => e.employmentType==="full-time").forEach(e => {
        const quals = e.qualifications || [];
        if (!(e.preferredShifts||[]).length && !e.requiredShift)
          W(`R6: ${e.name} has no preferred or required shift — autofill may place them anywhere`);
      });

      employees.forEach(e => {
        const pref = e.preferredShifts || [];
        const blocked = e.blockedShifts || [];
        const req = e.requiredShift;

        if (pref.length && pref.every(s => blocked.includes(s)))
          E(`R7: ${e.name} has all preferred shifts blocked — autofill can never place them`);

        if (req && blocked.includes(req))
          E(`R7: ${e.name} required shift "${req}" is also blocked — impossible constraint`);

        if ((e.unavailableDays||[]).length === 7)
          E(`R7: ${e.name} is marked unavailable every day of the week`);
      });

      const hasSched = Object.values(schedule||{}).some(a => a.length > 0);
      if (hasSched) {

        const shiftCount = {}; const weekendCount = {}; const dayShifts = {};
        DAYS.forEach(day => {
          SHIFTS.forEach(shift => {
            const key = cellKey(day, shift.id);
            const asgn = (schedule||{})[key] || [];
            const isWd1 = isWeekday(day) && shift.id === "first";
            const totalNeed = REGULAR_SLOTS(day, shift.id) + (SUP_SLOT_DAY(day,shift.id)?1:0);
            const total = asgn.length;
            if (total < totalNeed) {
              const names = asgn.map(a=>(rmap[a.employeeId]?.name||"?").split(" ").pop()).join(",");
              E(`S1: Coverage gap ${day} ${shift.id} — ${total}/${totalNeed}${names ? " ["+names+"]" : ""}`);
            }
            asgn.forEach(a => {
              const emp = rmap[a.employeeId]; if(!emp) return;
              const id = emp.id;
              if ((emp.unavailableDays||[]).includes(day)) E(`S3: ${emp.name} on unavailable day ${day}`);
              if ((emp.blockedShifts||[]).includes(shift.id)) E(`S4: ${emp.name} on blocked shift ${shift.id}`);
              if (emp.requiredShift && emp.requiredShift!==shift.id) E(`S5: ${emp.name} on ${shift.id} but required on ${emp.requiredShift}`);
              shiftCount[id]=(shiftCount[id]||0)+1;
              if (["Saturday","Sunday"].includes(day)) weekendCount[id]=(weekendCount[id]||0)+1;
              const dk=id+"__"+day;
              if(!dayShifts[dk]) dayShifts[dk]=[];
              dayShifts[dk].push(shift.id);
            });
          });
        });
        employees.forEach(e => {
          const mxs=e.maxShiftsPerWeek;
          if(mxs!=null&&(shiftCount[e.id]||0)>mxs) E(`S6: ${e.name} worked ${shiftCount[e.id]} shifts, max ${mxs}`);
          const mxw=e.maxWeekendDays;
          if(mxw!=null&&(weekendCount[e.id]||0)>mxw) E(`S7: ${e.name} worked ${weekendCount[e.id]} weekend days, max ${mxw}`);
        });
        Object.entries(dayShifts).forEach(([dk,shifts]) => {
          if(shifts.length>1){
            const [empId,day]=dk.split("__");
            const emp=rmap[empId]; if(!emp) return;
            if(!emp.willing16h) E(`S8: ${emp.name} double-shifted ${day} (${shifts.join("+")})`);
          }
        });
      }

      setResults(issues);
      setRunning(false);
    }, 50);
  };

  const errors  = (results||[]).filter(i=>i.level==="error");
  const warns   = (results||[]).filter(i=>i.level==="warn");

  return (
    <div style={{marginTop:8}}>
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <button onClick={run} disabled={running}
          style={{background:"var(--ss-accent)",color:"#fff",border:"none",
            padding:"8px 18px",borderRadius:6,cursor:running?"default":"pointer",
            fontSize:12,fontWeight:700,fontFamily:"inherit",opacity:running?0.7:1}}>
          {running ? "Running…" : "🔍 Run Diagnostic"}
        </button>
        {results !== null && (
          <span style={{fontSize:12,fontWeight:600,
            color:errors.length ? "var(--ss-danger)" : warns.length ? "var(--ss-warning)" : "var(--ss-scale)"}}>
            {errors.length===0 && warns.length===0
              ? "✓ No issues found"
              : errors.length
                ? `${errors.length} error${errors.length!==1?"s":""}${warns.length ? `, ${warns.length} warning${warns.length!==1?"s":""}` : ""}`
                : `${warns.length} warning${warns.length!==1?"s":""}`}
          </span>
        )}
        {results !== null && <button onClick={()=>setResults(null)}
          style={{background:"none",border:"none",cursor:"pointer",fontSize:12,
            color:"var(--ss-text-dim)",padding:0,fontFamily:"inherit"}}>Clear</button>}
      </div>

      {results !== null && results.length > 0 && (
        <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:4,
          maxHeight:280,overflowY:"auto",
          border:"1px solid var(--ss-border)",borderRadius:6,padding:"8px 12px"}}>
          {errors.length>0 && (
            <>
              <div style={{fontSize:10,fontWeight:700,color:"var(--ss-danger)",
                letterSpacing:".06em",marginBottom:2}}>ERRORS — will cause wrong schedules</div>
              {errors.map((issue,i)=>(
                <div key={"e"+i} style={{display:"flex",gap:6,alignItems:"flex-start",fontSize:11}}>
                  <span style={{color:"var(--ss-danger)",flexShrink:0,fontWeight:700}}>✗</span>
                  <span style={{color:"var(--ss-text)"}}>{issue.msg}</span>
                </div>
              ))}
            </>
          )}
          {warns.length>0 && (
            <>
              <div style={{fontSize:10,fontWeight:700,color:"var(--ss-warning)",
                letterSpacing:".06em",marginTop:errors.length?8:2,marginBottom:2}}>WARNINGS — review recommended</div>
              {warns.map((issue,i)=>(
                <div key={"w"+i} style={{display:"flex",gap:6,alignItems:"flex-start",fontSize:11}}>
                  <span style={{color:"var(--ss-warning)",flexShrink:0,fontWeight:700}}>!</span>
                  <span style={{color:"var(--ss-text)"}}>{issue.msg}</span>
                </div>
              ))}
            </>
          )}
        </div>
      )}
    </div>
  );
}
