function AfExcludeGroupToggles() {
  const t = useTheme();
  const { employees, afExclude, setAfExclude } = useRoster();
  const ptIds = employees.filter(e => e.employmentType === "part-time").map(e => e.id);
  const ocIds = employees.filter(e => e.employmentType === "on-call").map(e => e.id);
  const allPtExcl = ptIds.length > 0 && ptIds.every(id => afExclude.includes(id));
  const allOcExcl = ocIds.length > 0 && ocIds.every(id => afExclude.includes(id));
  const toggleGroup = (ids, exclude) => setAfExclude(prev => {
    const s = new Set(prev || []);
    ids.forEach(id => exclude ? s.add(id) : s.delete(id));
    return [...s];
  });
  if (ptIds.length === 0 && ocIds.length === 0) return null;
  return (
    <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginTop:6}}>
      <span style={{fontSize:11,color:"var(--ss-text-dim)",fontWeight:600}}>Autofill exclude:</span>
      {ptIds.length > 0 && (
        <button onClick={() => toggleGroup(ptIds, !allPtExcl)}
          style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:4,cursor:"pointer",
            background:allPtExcl ? "var(--ss-danger-20)" : "transparent",
            color:allPtExcl ? "var(--ss-danger)" : "var(--ss-text-muted)",
            border:"1px solid "+(allPtExcl ? "var(--ss-danger)" : "var(--ss-border)")}}>
          {allPtExcl ? "⊘ PT excluded" : "⚡ Exclude PT"}
        </button>
      )}
      {ocIds.length > 0 && (
        <button onClick={() => toggleGroup(ocIds, !allOcExcl)}
          style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:4,cursor:"pointer",
            background:allOcExcl ? "var(--ss-danger-20)" : "transparent",
            color:allOcExcl ? "var(--ss-danger)" : "var(--ss-text-muted)",
            border:"1px solid "+(allOcExcl ? "var(--ss-danger)" : "var(--ss-border)")}}>
          {allOcExcl ? "⊘ OC excluded" : "⚡ Exclude OC"}
        </button>
      )}
      {afExclude.length > 0 && (
        <button onClick={() => setAfExclude([])}
          style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:4,cursor:"pointer",
            background:"transparent",color:"var(--ss-scale)",border:"1px solid var(--ss-scale)"}}>
          ✓ Include all
        </button>
      )}
    </div>
  );
}

function ShiftSchedulerApp() {
  const [migrationDone, setMigrationDone] = useState(false);
  useEffect(() => {

    const t = setTimeout(() => setMigrationDone(true), 2000);
    runSchemaMigrations().finally(() => {
      clearTimeout(t);
      setMigrationDone(true);
    });
  }, []);

  const [themeName,   setThemeName,  themeLoaded] = usePersistentState("shift_theme","dark");
  const [customTheme, setCustomTheme, customThemeLoaded] = usePersistentState("shift_custom_theme", {});
  const [buildCount,  setBuildCount, buildLoaded] = usePersistentState("shift_build", 0);
  const [customSeed, setCustomSeed] = usePersistentState("shift_custom_seed", null);
  const [employees,   setEmployees,  empLoaded]   = usePersistentState("shift_employees",[]);
  const [schedule,    setSchedule,   schedLoaded] = usePersistentState("shift_schedule",{});
  const [savedWeeks,  setSavedWeeks, weeksLoaded] = usePersistentState("shift_saved_weeks",[]);
  const [history,     setHistory,    histLoaded]  = usePersistentState("shift_history",[]);
  const [extShifts,   setExtShifts,  extLoaded]   = usePersistentState("shift_ext_shifts",[]);
  const [trainingBlocks, setTrainingBlocks] = usePersistentState("shift_training_blocks",[]);
  const [settings,    setSettings,   settLoaded]  = usePersistentState("shift_settings", DEFAULT_SETTINGS);
  const [showExcelPreviewApp, setShowExcelPreviewApp] = useState(false);
  const [weekStartApp, setWeekStartApp] = useState("");
  const [savedRosters,setSavedRosters,rostersLoaded] = usePersistentState("shift_saved_rosters",[]);
  const [timeOffReqs, setTimeOffReqs,timeOffLoaded]= usePersistentState("shift_timeoff",[]);
  const [afExclude,   setAfExclude,  afExcLoaded]  = usePersistentState("shift_af_exclude",[]);
  const [swingDesig,  setSwingDesig, swingDesigLoaded] = usePersistentState("shift_swing_desig", {});
  const [empPatterns, setEmpPatterns, patternsLoaded] = usePersistentState("shift_patterns",{});
  const [weekStart,   setWeekStart,  weekLoaded]  = usePersistentState("shift_week_start", (() => {
    const now = new Date();
    const day = now.getDay();
    const sun = new Date(now);
    sun.setDate(now.getDate() - day);
    return sun.toISOString().slice(0,10);
  })());
  const cfg = useMemo(() => ({ ...DEFAULT_SETTINGS, ...settings }), [settings]);

  // Apply theme class to <html> so CSS custom properties cascade correctly
  useEffect(() => {
    document.documentElement.className = themeName === "dark" ? "dark" : "light";
  }, [themeName]);

  // Sync custom theme color overrides to CSS custom properties
  useEffect(() => {
    const el = document.documentElement;
    const CSS_MAP = {
      bg:"--ss-bg", surface:"--ss-surface", surfaceAlt:"--ss-surface-alt",
      border:"--ss-border", text:"--ss-text", textMuted:"--ss-text-muted", textDim:"--ss-text-dim",
      accent:"--ss-accent", supervisor:"--ss-supervisor", guard:"--ss-guard",
      scale:"--ss-scale", medical:"--ss-medical", shiftFirst:"--ss-shift-first",
      shiftSecond:"--ss-shift-second", shiftThird:"--ss-shift-third",
      danger:"--ss-danger", dangerDim:"--ss-danger-dim", warning:"--ss-warning",
      warningDim:"--ss-warning-dim", fatigue:"--ss-fatigue", fatigueDim:"--ss-fatigue-dim",
    };
    Object.values(CSS_MAP).forEach(v => el.style.removeProperty(v));
    Object.entries(customTheme||{}).forEach(([k,v]) => {
      if (CSS_MAP[k]) el.style.setProperty(CSS_MAP[k], v);
    });
  }, [customTheme, themeName]);

  const empTimeOffDays = useMemo(() => {
    const s = new Set();
    (timeOffReqs||[]).filter(r=>r.status==="approved").forEach(r=>{
      DAYS.forEach(day=>{
        if(timeOffCoversSlot(r, day, r.shiftId||"first", weekStart) ||
           (r.type!=="partial" && timeOffCoversSlot(r, day, "first", weekStart))) {
          s.add(r.empId+"__"+day);
        }
      });
    });
    return s;
  }, [timeOffReqs, weekStart]);
  const [activeTab,       setActiveTab]       = useState("schedule");
  const [showTestModal,   setShowTestModal]   = useState(false);
  const [pendingAutoFill, setPendingAutoFill] = useState(null);
  const [highlightSlot,   setHighlightSlot]   = useState(null);
  const [sidebarOpen,     setSidebarOpen]     = useState(false);
  const [rosterOpen,      setRosterOpen]      = useState(false);
  const [scheduleStale,   setScheduleStale]   = useState(false);
  const rosterRef = useRef(null);

  const baseTheme = themeName==="dark" ? dark : light;
  const t = useMemo(() => ({ ...baseTheme, ...(customTheme||{}) }), [baseTheme, customTheme]);

  const prevCfgFatigueRef = useRef(null);
  useEffect(() => {
    const prev = prevCfgFatigueRef.current;
    if (prev && Object.keys(schedule).length > 0) {
      if (prev.maxConsecutiveNights !== cfg.maxConsecutiveNights ||
          prev.minRestHours         !== cfg.minRestHours         ||
          prev.maxConsecutiveShifts !== cfg.maxConsecutiveShifts) {
        setScheduleStale(true);
      }
    }
    prevCfgFatigueRef.current = cfg;
  }, [cfg]); // eslint-disable-line react-hooks/exhaustive-deps

  useEffect(() => {
    if (!buildLoaded) return;
    setBuildCount(n => (typeof n === "number" ? n : 0) + 1);
  }, [buildLoaded]); // eslint-disable-line react-hooks/exhaustive-deps

  useEffect(() => {
    if (!customSeed || !Array.isArray(customSeed)) return;
    if (!Array.isArray(employees)) return;
    const isFactoryDefault = employees.length > 0 && employees[0].id === "psi-1";
    if (isFactoryDefault) {
      setEmployees(customSeed);
    }
  }, [customSeed]); // eslint-disable-line react-hooks/exhaustive-deps

  useEffect(() => {
    if (!empLoaded) return;
    const needsMigration = employees.some(e =>
      e.preferredDaysOff === undefined || e.overtimePref === undefined ||
      e.preferredShifts === undefined || e.blockedShifts === undefined ||
      e.willing16h === undefined || e.maxShiftsPerWeek === undefined ||
      e.ext12hPref === undefined || e.splitShiftEligible === undefined
    );
    if (needsMigration) {
      setEmployees(employees.map(e => ({
        ...e,
        preferredShifts: e.preferredShifts !== undefined ? e.preferredShifts
          : (e.preferredShift ? [e.preferredShift] : []),
        blockedShifts: e.blockedShifts !== undefined ? e.blockedShifts : [],
        requiredShift: e.requiredShift !== undefined ? e.requiredShift
          : (e.shiftStrength === "requires" && e.preferredShift ? e.preferredShift : null),
        preferredDaysOff: e.preferredDaysOff !== undefined ? e.preferredDaysOff : [],
        unavailableDays: e.unavailableDays !== undefined ? e.unavailableDays : [],
        overtimePref: e.overtimePref !== undefined ? e.overtimePref : "neutral",
        willing16h: e.willing16h !== undefined ? e.willing16h : false,
        maxShiftsPerWeek: e.maxShiftsPerWeek !== undefined ? e.maxShiftsPerWeek : null,
        ext12hPref: e.ext12hPref !== undefined ? e.ext12hPref : null,
        maxWeekendDays: e.maxWeekendDays !== undefined ? e.maxWeekendDays : null,
        splitShiftEligible: e.splitShiftEligible !== undefined ? e.splitShiftEligible : false,
      })));
    }
  }, [empLoaded]);

  const handleGenerateTest = useCallback((newEmployees) => {
    setEmployees(newEmployees);
    setSchedule({});
    setPendingAutoFill(newEmployees);
    setShowTestModal(false);
    setActiveTab("schedule");
  }, [setEmployees, setSchedule]);

  useEffect(() => {
    if (!rosterOpen) return;
    const handler = (e) => {
      if (rosterRef.current && !rosterRef.current.contains(e.target)) {
        setRosterOpen(false);
      }
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [rosterOpen]);

  const totalSlots  = useMemo(()=>{let n=0;DAYS.forEach(d=>SHIFTS.forEach(s=>(n+=getSlotCount(d,s.id))));return n;},[]);
  const filledSlots = useMemo(()=>{
    let count = Object.values(schedule).reduce((s,a)=>s+a.length,0);
    (extShifts||[]).forEach(ext=>{
      EXT_PAIRS.find(p=>p.id===ext.pairId)?.covers.forEach(shiftId=>{
        const key=cellKey(ext.day,shiftId);
        const already=(schedule[key]||[]).length;
        const max=getSlotCount(ext.day,shiftId);
        if(already<max) count+=1;
      });
      EXT_PAIRS.find(p=>p.id===ext.pairId)?.covers.forEach(shiftId=>{
        const key=cellKey(ext.day,shiftId);
        const already=(schedule[key]||[]).length;
        const max=getSlotCount(ext.day,shiftId);
        if(already+1<max) count+=1;
      });
    });
    return Math.min(count, totalSlots);
  },[schedule,extShifts,totalSlots]);
  const unfilledSlots = useMemo(()=>{
    const result=[];
    DAYS.forEach(d=>SHIFTS.forEach(s=>{
      const schedFilled=(schedule[cellKey(d,s.id)]||[]).length;
      const extFilled=(extShifts||[]).filter(e=>extCovers(e,d,s.id)).reduce((n,e)=>n+(e.empAId?1:0)+(e.empBId?1:0),0);
      const filled=Math.min(schedFilled+extFilled, getSlotCount(d,s.id));
      const max=getSlotCount(d,s.id);
      if(filled<max) result.push({day:d,shiftId:s.id,shiftLabel:s.label,filled,max,open:max-filled});
    }));
    return result;
  },[schedule,extShifts]);
  const [filledOpen, setFilledOpen] = useState(false);
  const filledRef = useRef(null);
  useEffect(()=>{
    if(!filledOpen) return;
    const h=(e)=>{if(filledRef.current&&!filledRef.current.contains(e.target))setFilledOpen(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[filledOpen]);
  const [covOpen, setCovOpen] = useState(false);
  const covRef = useRef(null);
  useEffect(()=>{
    if(!covOpen) return;
    const h=(e)=>{if(covRef.current&&!covRef.current.contains(e.target))setCovOpen(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[covOpen]);
  // S&M dual-role helper: an employee assigned as Scale or Medical who holds BOTH
  // qualifications implicitly covers the complementary role in the same slot.
  // Used by coverage-gap memos so S&M assignments don't generate false positives.
  const slotSMDualCoverage = useCallback((a) =>
    a.some(x => {
      const emp = employees.find(e => e.id === x.employeeId);
      return emp &&
        (emp.qualifications||[]).includes("Scale") &&
        (emp.qualifications||[]).includes("Medical") &&
        (x.position === "Scale" || x.position === "Medical");
    }), [employees]);

  const unmetReqs = useMemo(()=>{
    let c=0;
    DAYS.forEach(d=>SHIFTS.forEach(s=>{
      const a=schedule[cellKey(d,s.id)]||[];
      if(!a.length) return;
      const cellExt    = (extShifts||[]).filter(e=>extCovers(e,d,s.id));
      const hasScale   = slotHasRole(a,employees,"Scale")   || cellExt.some(e=>(e.roles||[]).includes("Scale"));
      const supOnShift = a.some(x=>x.position==="Supervisor");
      const hasMedical = slotHasRole(a,employees,"Medical") || cellExt.some(e=>(e.roles||[]).includes("Medical")) || supOnShift;
      const smDual     = (!hasScale || !hasMedical) && slotSMDualCoverage(a);
      if(!(hasScale||smDual) || !(hasMedical||smDual)) c++;
    }));
    return c;
  },[schedule,extShifts,employees,slotSMDualCoverage]);

  const coverageIssueSlots = useMemo(()=>{
    const result=[];
    DAYS.forEach(d=>SHIFTS.forEach(s=>{
      const a=schedule[cellKey(d,s.id)]||[];
      if(!a.length) return;
      const cellExt    = (extShifts||[]).filter(e=>extCovers(e,d,s.id));
      const hasScale   = slotHasRole(a,employees,"Scale")   || cellExt.some(e=>(e.roles||[]).includes("Scale"));
      const supOnShift = a.some(x=>x.position==="Supervisor");
      const hasMedical = slotHasRole(a,employees,"Medical") || cellExt.some(e=>(e.roles||[]).includes("Medical")) || supOnShift;
      const smDual     = (!hasScale || !hasMedical) && slotSMDualCoverage(a);
      const effScale   = hasScale   || smDual;
      const effMedical = hasMedical || smDual;
      if(!effScale||!effMedical){
        const missing=[...(!effScale?["Scale"]:[]),...(!effMedical?["Medical"]:[])];
        result.push({day:d,shiftId:s.id,shiftLabel:s.label,missing});
      }
    }));
    return result;
  },[schedule,extShifts,employees,slotSMDualCoverage]);
  const underHoursCount = useMemo(()=>
    employees.filter(e=>e.employmentType==="full-time"&&calcHours(e.id,schedule)<FT_MIN_HOURS).length
  ,[employees,schedule]);
  const fatigueCount = useMemo(()=>
    employees.filter(e=>getFatigueIssues(e.id,schedule,cfg,employees,extShifts||[]).length>0).length
  ,[employees,schedule,extShifts]);
  const prefViolCount = useMemo(()=>
    employees.filter(e=>getAllPrefViolations(e,schedule).length>0).length
  ,[employees,schedule]);

  return (
    <ThemeCtx.Provider value={t}>
    <SettingsCtx.Provider value={{ ...cfg, setSettings }}>
    <RosterCtx.Provider value={{
      employees, setEmployees,
      afExclude, setAfExclude,
      swingDesig, setSwingDesig,
      empPatterns, setEmpPatterns,
      customSeed, setCustomSeed,
      savedRosters, setSavedRosters,
    }}>
    <ScheduleCtx.Provider value={{
      schedule, setSchedule,
      extShifts, setExtShifts,
      trainingBlocks, setTrainingBlocks,
      weekStart, setWeekStart: (ws) => { setWeekStart(ws); setWeekStartApp(ws); },
      scheduleStale, setScheduleStale,
      empTimeOffDays,
    }}>
    <HistoryCtx.Provider value={{
      history, setHistory,
      savedWeeks, setSavedWeeks,
    }}>
    <TimeOffCtx.Provider value={{
      timeOffReqs, setTimeOffReqs,
    }}>
    <UICtx.Provider value={{
      activeTab, setActiveTab,
      sidebarOpen, setSidebarOpen,
      highlightSlot, setHighlightSlot: setHighlightSlot,
      clearHighlightSlot: () => setHighlightSlot(null),
      pendingAutoFill, setPendingAutoFill,
      clearPendingAutoFill: () => setPendingAutoFill(null),
      showTestModal, setShowTestModal,
    }}>
      <div style={{minHeight:"100vh",fontFamily:"inherit"}}>

        {showTestModal&&<TestPopulationModal onGenerate={handleGenerateTest} onCancel={()=>setShowTestModal(false)}/>}

        {}
        <div style={{background:"var(--ss-surface)",borderBottom:"1px solid var(--ss-border)",padding:"20px 28px",
          display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:4}}>
              <img src="logo-psi.avif" alt="PSI" style={{width:104,height:104,borderRadius:8,objectFit:"contain",flexShrink:0}}/>
              <div style={{width:10,height:10,borderRadius:"50%",background:"var(--ss-accent)",boxShadow:"0 0 10px "+"var(--ss-accent-88)"}}/>
              <div style={{display:"flex",flexDirection:"column",gap:1}}>
                <h1 style={{margin:0,fontSize:22,fontWeight:700,letterSpacing:"-.02em"}}>SHIFT SCHEDULER</h1>
                <span style={{margin:0,fontSize:9,fontWeight:600,color:"var(--ss-text-dim)",letterSpacing:".08em",paddingLeft:2}}>{APP_VERSION}</span>
              </div>
            </div>

          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>setThemeName(p=>p==="dark"?"light":"dark")} title="Toggle theme"
              style={{background:"var(--ss-surface-alt)",border:"1px solid var(--ss-border)",color:"var(--ss-text-muted)",
                padding:"8px 14px",borderRadius:6,cursor:"pointer",fontSize:14,fontFamily:"inherit",
                display:"flex",alignItems:"center",gap:6,transition:"all .2s"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--ss-accent)";e.currentTarget.style.color="var(--ss-accent)";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--ss-border)";e.currentTarget.style.color="var(--ss-text-muted)";}}>
              {themeName==="dark"?"\u2600":"\u263d"}
            </button>
          </div>
        </div>

        {}
        <div style={{display:"flex",justifyContent:"center",padding:"8px 28px",background:"var(--ss-surface)",borderBottom:"1px solid var(--ss-border)",gap:6}}>
          {[{id:"employees",label:"\u25a3 Employees"},{id:"schedule",label:"\u25a6 Schedule"},{id:"dashboard",label:"\u25a4 Dashboard"},{id:"timeoff",label:"📅 Time Off"},{id:"settings",label:"\u2699 Settings"}].map(tab=>(
            <button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{
              background:activeTab===tab.id?"var(--ss-accent-18)":"transparent",
              border:"1px solid "+(activeTab===tab.id?"var(--ss-accent)":"var(--ss-border)"),
              borderRadius:6,
              color:activeTab===tab.id?"var(--ss-accent)":"var(--ss-text-muted)",
              padding:"8px 20px",cursor:"pointer",
              fontSize:13,fontWeight:600,fontFamily:"inherit",letterSpacing:".05em",
              textTransform:"uppercase",transition:"all .2s",display:"flex",alignItems:"center",gap:7}}>
              {tab.label}
              {tab.id==="dashboard"&&(unmetReqs>0||underHoursCount>0||fatigueCount>0||prefViolCount>0)&&(
                <span style={{background:"var(--ss-danger)",color:"#fff",fontSize:9,fontWeight:800,
                  padding:"1px 6px",borderRadius:10,lineHeight:1.4}}>
                  {unmetReqs+underHoursCount+fatigueCount+prefViolCount}
                </span>
              )}
              {tab.id==="timeoff"&&(timeOffReqs||[]).filter(r=>r.status==="pending").length>0&&(
                <span style={{background:"var(--ss-warning)",color:"#000",fontSize:9,fontWeight:800,
                  padding:"1px 6px",borderRadius:10,lineHeight:1.4}}>
                  {(timeOffReqs||[]).filter(r=>r.status==="pending").length}
                </span>

            </button>

        </div>

        {}
        <div style={{display:"flex",gap:24,padding:"14px 28px",background:"var(--ss-surface)",
          borderBottom:"1px solid var(--ss-border)",fontSize:12,flexWrap:"wrap"}}>
          <span ref={rosterRef} style={{position:"relative"}}>

                background:rosterOpen?"var(--ss-accent-18)":"transparent"}}
              onMouseEnter={e=>e.currentTarget.style.background="var(--ss-accent-12)"}
              onMouseLeave={e=>e.currentTarget.style.background=rosterOpen?"var(--ss-accent-18)":"transparent"}>
              <span style={{color:"var(--ss-text-muted)"}}>ROSTER:</span>
              <span style={{color:"var(--ss-accent)",fontWeight:700}}>{employees.length}</span>
              <span style={{fontSize:9,color:"var(--ss-accent)",marginLeft:1}}>{rosterOpen?"▲":"▼"}</span>
            </span>
            {rosterOpen && (() => {
              const byQual = {};
              POSITIONS.forEach(pos => {
                const matched = employees.filter(e => e.qualifications.includes(pos));
                if (matched.length) byQual[pos] = matched;
              });
              const unqualified = employees.filter(e => !e.qualifications.length);
              return (
                <div style={{position:"absolute",top:"calc(100% + 8px)",left:0,zIndex:200,
                  background:"var(--ss-surface)",border:"1px solid var(--ss-border)",borderRadius:8,
                  boxShadow:"0 8px 32px rgba(0,0,0,0.25)",minWidth:240,maxWidth:320,
                  padding:"12px 0",overflow:"hidden"}}>
                  {}
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                    padding:"0 14px 10px",borderBottom:"1px solid var(--ss-border)",marginBottom:8}}>
                    <span style={{fontSize:11,fontWeight:700,color:"var(--ss-text-muted)",letterSpacing:".06em"}}>
                      CURRENT ROSTER
                    </span>
                    <span style={{fontSize:10,color:"var(--ss-text-dim)"}}>
                      {employees.filter(e=>e.employmentType==="full-time").length} FT
                      {" · "}
                      {employees.filter(e=>e.employmentType!=="full-time").length} PT
                    </span>
                  </div>
                  {}
                  {ALL_POSITIONS.map(pos => {
                    const group = employees.filter(e => e.qualifications.includes(pos));
                    if (!group.length) return null;
                    return (
                      <div key={pos} style={{padding:"4px 14px 8px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
                          <span style={{width:8,height:8,borderRadius:2,
                            background:pC(pos,t),flexShrink:0}}/>
                          <span style={{fontSize:10,fontWeight:700,color:pC(pos,t),
                            letterSpacing:".05em",textTransform:"uppercase"}}>{pos}</span>
                          <span style={{fontSize:9,color:"var(--ss-text-dim)",marginLeft:"auto"}}>{group.length}</span>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:2,paddingLeft:14}}>
                          {group.map(emp => {
                            const isFT = emp.employmentType==="full-time";
                            const otherQuals = emp.qualifications.filter(q=>q!==pos);
                            return (
                              <div key={emp.id} style={{display:"flex",alignItems:"center",
                                gap:6,fontSize:11,color:"var(--ss-text)",padding:"3px 0",
                                borderBottom:"1px solid var(--ss-border-30)"}}>
                                <span style={{flex:1,fontWeight:500,overflow:"hidden",
                                  textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{emp.name}</span>
                                <span style={{fontSize:8,fontWeight:700,padding:"1px 4px",
                                  borderRadius:3,flexShrink:0,
                                  background:(isFT?"var(--ss-accent)":emp.employmentType==="on-call"?"var(--ss-warning)":"var(--ss-scale)")+"20",
                                  color:isFT?"var(--ss-accent)":emp.employmentType==="on-call"?"var(--ss-warning)":"var(--ss-scale)",
                                  border:"1px solid "+(isFT?"var(--ss-accent)":emp.employmentType==="on-call"?"var(--ss-warning)":"var(--ss-scale)")+"40"}}>
                                  {isFT?"FT":emp.employmentType==="on-call"?"OC":"PT"}
                                </span>
                                {otherQuals.map(q=>(
                                  <span key={q} style={{width:6,height:6,borderRadius:"50%",
                                    background:pC(q,t),flexShrink:0}} title={q}/>
                                ))}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                  {unqualified.length > 0 && (
                    <div style={{padding:"4px 14px 8px"}}>
                      <div style={{fontSize:10,fontWeight:700,color:"var(--ss-text-dim)",marginBottom:4}}>
                        UNQUALIFIED
                      </div>
                      {unqualified.map(emp=>(
                        <div key={emp.id} style={{fontSize:11,color:"var(--ss-text-dim)",padding:"2px 0 2px 14px"}}>
                          {emp.name}
                        </div>
                      ))}
                    </div>
                  )}
                  {!employees.length && (
                    <div style={{padding:"12px 14px",fontSize:12,color:"var(--ss-text-dim)",textAlign:"center"}}>
                      No employees added yet.
                    </div>
                  )}
                  {}
                  <div style={{marginTop:4,padding:"8px 14px 0",borderTop:"1px solid var(--ss-border)",
                    fontSize:10,color:"var(--ss-text-dim)",display:"flex",gap:12,flexWrap:"wrap"}}>
                    {ALL_POSITIONS.map(pos=>(
                      <span key={pos} style={{display:"flex",alignItems:"center",gap:4}}>
                        <span style={{width:6,height:6,borderRadius:2,background:pC(pos,t)}}/>
                        <span style={{color:pC(pos,t),fontWeight:600}}>{pos}:</span>
                        {" "}{employees.filter(e=>e.qualifications.includes(pos)).length}
                      </span>
                    ))}
                  </div>
                </div>
              );
            })()}
          </span>
            {(()=>{
            const filledColor=filledSlots===totalSlots?"var(--ss-scale)":unfilledSlots.length>0?"var(--ss-supervisor)":"var(--ss-text)";
                        return (
                        <span ref={filledRef} style={{position:"relative",display:"inline-flex",alignItems:"center"}}>
                <button onClick={()=>unfilledSlots.length>0&&setFilledOpen(o=>!o)} style={{
                  background:"none",border:"none",padding:0,cursor:unfilledSlots.length>0?"pointer":"default",
                  fontFamily:"inherit",fontSize:"inherit",display:"flex",alignItems:"center",gap:4,color:"inherit",
                }}>
                  <span style={{color:"var(--ss-text-muted)"}}>FILLED:</span>{" "}
                  <span style={{color:filledColor,fontWeight:700}}>{filledSlots}/{totalSlots}</span>
                  {unfilledSlots.length>0?(
                    <span style={{fontSize:9,color:filledColor,opacity:.7,marginLeft:1}}>
                      {filledOpen?"▲":"▼"}
                    </span>
                  ):(
                    <span style={{fontSize:9,color:"var(--ss-scale)",fontWeight:700,marginLeft:3,opacity:.85}}>✓</span>
                  )}
                </button>
                {filledOpen&&unfilledSlots.length>0&&(
                  <div style={{position:"absolute",top:"100%",left:0,zIndex:999,
                    background:"var(--ss-surface)",border:"1px solid var(--ss-border)",borderRadius:7,
                    boxShadow:"0 8px 32px rgba(0,0,0,0.35)",minWidth:220,marginTop:4,
                    overflow:"hidden"}}>
                    <div style={{padding:"8px 12px 6px",fontSize:9,fontWeight:700,
                      color:"var(--ss-text-dim)",letterSpacing:".07em",borderBottom:"1px solid var(--ss-border-60)"}}>
                      UNFILLED SHIFTS — {unfilledSlots.reduce((s,x)=>s+x.open,0)} open slot{unfilledSlots.reduce((s,x)=>s+x.open,0)!==1?"s":""}
                    </div>
                    <div style={{maxHeight:260,overflowY:"auto"}}>
                      {unfilledSlots.map((u,i)=>{
                        const isEmpty=u.filled===0;
                        const dotCol=isEmpty?"var(--ss-danger)":"var(--ss-warning)";
                        return(
                          <button key={i} onClick={()=>{
                            setFilledOpen(false);
                            setActiveTab("schedule");
                            setHighlightSlot({day:u.day,shiftId:u.shiftId});
                          }} style={{
                            display:"flex",alignItems:"center",gap:10,width:"100%",
                            padding:"8px 12px",background:"none",border:"none",
                            borderBottom:"1px solid var(--ss-border-40)",cursor:"pointer",
                            fontFamily:"inherit",textAlign:"left",
                            transition:"background .12s",
                          }}
                          onMouseEnter={e=>e.currentTarget.style.background="var(--ss-surface-alt)"}
                          onMouseLeave={e=>e.currentTarget.style.background="none"}>
                            <span style={{width:7,height:7,borderRadius:"50%",
                              background:dotCol,flexShrink:0}}/>
                            <span style={{flex:1}}>
                              <span style={{fontSize:11,fontWeight:600,color:"var(--ss-text)",display:"block"}}>
                                {u.day.substring(0,3)} · {u.shiftLabel}
                              </span>
                              <span style={{fontSize:9,color:"var(--ss-text-dim)"}}>
                                {isEmpty?"Completely empty":u.filled+"/"+u.max+" filled"} · {u.open} slot{u.open!==1?"s":""} open
                              </span>
                            </span>
                            <span style={{fontSize:9,color:"var(--ss-accent)",fontWeight:700,flexShrink:0}}>→</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                )}
              </span>
            );})()}
          <span><span style={{color:"var(--ss-text-muted)"}}>SHIFTS/WEEK:</span> <span style={{fontWeight:700}}>21</span></span>
          {unmetReqs>0&&(
              <span ref={covRef} style={{position:"relative",display:"inline-flex",alignItems:"center"}}>
                <button onClick={()=>setCovOpen(o=>!o)} style={{background:"none",border:"none",padding:0,
                  cursor:"pointer",fontFamily:"inherit",fontSize:"inherit",
                  display:"flex",alignItems:"center",gap:4,color:"inherit"}}>
                  <span style={{color:"var(--ss-warning)"}}>⚠ COVERAGE:</span>{" "}
                  <span style={{color:"var(--ss-warning)",fontWeight:700}}>{unmetReqs}</span>
                  <span style={{fontSize:9,color:"var(--ss-warning)",opacity:.7,marginLeft:1}}>
                    {covOpen?"▲":"▼"}
                  </span>
                </button>
                {covOpen&&(
                  <div style={{position:"absolute",top:"100%",left:0,zIndex:999,
                    background:"var(--ss-surface)",border:"1px solid var(--ss-border)",borderRadius:7,
                    boxShadow:"0 8px 32px rgba(0,0,0,0.35)",minWidth:230,marginTop:4,
                    overflow:"hidden"}}>
                    <div style={{padding:"8px 12px 6px",fontSize:9,fontWeight:700,
                      color:"var(--ss-text-dim)",letterSpacing:".07em",borderBottom:"1px solid var(--ss-border-60)"}}>
                      COVERAGE GAPS — {unmetReqs} shift{unmetReqs!==1?"s":""} missing roles
                    </div>
                    <div style={{maxHeight:260,overflowY:"auto"}}>
                      {coverageIssueSlots.map((u,i)=>(
                        <button key={i} onClick={()=>{
                          setCovOpen(false);
                          setActiveTab("schedule");
                          setHighlightSlot({day:u.day,shiftId:u.shiftId});
                        }} style={{display:"flex",alignItems:"center",gap:10,width:"100%",
                          padding:"8px 12px",background:"none",border:"none",
                          borderBottom:"1px solid var(--ss-border-40)",cursor:"pointer",
                          fontFamily:"inherit",textAlign:"left",transition:"background .12s"}}
                          onMouseEnter={e=>e.currentTarget.style.background="var(--ss-surface-alt)"}
                          onMouseLeave={e=>e.currentTarget.style.background="none"}>

                            background:"var(--ss-warning)",flexShrink:0}}/>
                          <span style={{flex:1}}>
                            <span style={{fontSize:11,fontWeight:600,color:"var(--ss-text)",display:"block"}}>
                              {u.day.substring(0,3)} · {u.shiftLabel}
                            </span>
                            <span style={{fontSize:9,color:"var(--ss-danger)"}}>
                              Missing: {u.missing.join(" & ")}

                  </div>

              </span>

          {underHoursCount>0&&<span><span style={{color:"var(--ss-danger)"}}>\u26a0 UNDER 40H:</span> <span style={{color:"var(--ss-danger)",fontWeight:700}}>{underHoursCount} FT</span></span>}
          {fatigueCount>0&&<span><span style={{color:"var(--ss-fatigue)"}}>⚠ FATIGUE:</span> <span style={{color:"var(--ss-fatigue)",fontWeight:700}}>{fatigueCount} staff</span></span>}
          {prefViolCount>0&&<span><span style={{color:"var(--ss-warning)"}}>⚠ PREF VIOLATIONS:</span> <span style={{color:"var(--ss-warning)",fontWeight:700}}>{prefViolCount} staff</span></span>}
          {savedWeeks.length>0&&<span><span style={{color:"var(--ss-text-muted)"}}>SAVED WEEKS:</span> <span style={{color:"var(--ss-accent)",fontWeight:700}}>{savedWeeks.length}</span></span>}
        </div>

        {}
        <div style={{padding:"24px 28px"}}>
          {activeTab==="employees"&&(
            <EmployeeManager onOpenTestModal={()=>setShowTestModal(true)}/>
          )}
          {activeTab==="schedule"&&(
            <div style={{display:"flex",gap:0,alignItems:"flex-start"}}>
              <div style={{flex:1,minWidth:0}}>
                <ScheduleGrid onOpenTestModal={()=>setShowTestModal(true)}/>
              </div>
              {}
              <div style={{flexShrink:0,transition:"width .2s",
                width:sidebarOpen?260:36,overflow:"hidden",
                borderLeft:"1px solid var(--ss-border)",marginLeft:8,
                background:"var(--ss-surface)",borderRadius:6}}>
                <button onClick={()=>setSidebarOpen(o=>!o)}
                  title={sidebarOpen?"Close coverage sidebar":"Open coverage sidebar"}
                  style={{width:"100%",background:"none",border:"none",cursor:"pointer",
                    padding:"10px 0",display:"flex",alignItems:"center",
                    justifyContent:sidebarOpen?"flex-end":"center",
                    paddingRight:sidebarOpen?10:0,
                    color:"var(--ss-text-dim)",fontSize:13,fontFamily:"inherit",
                    borderBottom:"1px solid var(--ss-border)"}}>
                  {sidebarOpen?"▶ ":"◀"}
                </button>
                {sidebarOpen&&(()=>{
                  const totalSlots  = DAYS.length * SHIFTS.length * 3;
                  const filled      = Object.values(schedule||{}).reduce((n,a)=>n+a.filter(x=>x.position!=="Supervisor").length,0);
                  const pct         = totalSlots>0?Math.round(filled/totalSlots*100):0;
                  const ftShort     = employees.filter(e=>e.employmentType==="full-time"&&calcHours(e.id,schedule||{},extShifts||[])<40);
                  const ftOver      = employees.filter(e=>e.employmentType==="full-time"&&calcHours(e.id,schedule||{},extShifts||[])>40);
                  const ftHours     = employees.filter(e=>e.employmentType==="full-time").map(e=>({
                    name:e.name.split(" ").pop(), h:calcHours(e.id,schedule||{},extShifts||[])
                  })).sort((a,b)=>a.h-b.h);
                  const statRow = (label, val, col) => (
                    <div style={{display:"flex",justifyContent:"space-between",
                      alignItems:"center",padding:"5px 12px",borderBottom:"1px solid var(--ss-border-40)"}}>
                      <span style={{fontSize:10,color:"var(--ss-text-dim)"}}>{label}</span>
                      <span style={{fontSize:11,fontWeight:700,color:col||"var(--ss-text)"}}>{val}</span>
                    </div>
                  );
                  return (
                    <div style={{padding:"6px 0"}}>
                      <div style={{padding:"6px 12px 4px",fontSize:9,fontWeight:800,
                        color:"var(--ss-text-dim)",letterSpacing:".08em"}}>COVERAGE</div>
                      {statRow("Filled slots", filled+"/"+totalSlots, pct>=90?"var(--ss-scale)":pct>=70?"var(--ss-warning)":"var(--ss-danger)")}
                      {statRow("Coverage %", pct+"%", pct>=90?"var(--ss-scale)":pct>=70?"var(--ss-warning)":"var(--ss-danger)")}
                      {statRow("Under 40h", ftShort.length, ftShort.length>0?"var(--ss-danger)":"var(--ss-scale)")}
                      {statRow("Overtime", ftOver.length, ftOver.length>0?"var(--ss-warning)":"var(--ss-scale)")}
                      <div style={{padding:"8px 12px 4px",fontSize:9,fontWeight:800,
                        color:"var(--ss-text-dim)",letterSpacing:".08em",marginTop:4}}>HOURS BY EMPLOYEE</div>
                      {ftHours.map(({name,h})=>(
                        <div key={name} style={{padding:"3px 12px",display:"flex",
                          justifyContent:"space-between",alignItems:"center"}}>
                          <span style={{fontSize:10,color:"var(--ss-text-muted)",overflow:"hidden",
                            textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:150}}>{name}</span>
                          <span style={{fontSize:10,fontWeight:700,flexShrink:0,
                            color:h>=48?"var(--ss-danger)":h>=40?"var(--ss-scale)":h>0?"var(--ss-warning)":"var(--ss-text-dim)"}}>{h}h</span>
                        </div>
                      ))}
                      <div style={{padding:"10px 12px 4px",borderTop:"1px solid var(--ss-border)",marginTop:4}}>
                        <button onClick={()=>setActiveTab("dashboard")}
                          style={{width:"100%",background:"var(--ss-accent-18)",border:"1px solid var(--ss-accent-40)",
                            color:"var(--ss-accent)",borderRadius:5,cursor:"pointer",padding:"6px 0",
                            fontSize:10,fontWeight:700,fontFamily:"inherit"}}>Full Dashboard →</button>
                      </div>
                    </div>
                  );
                })()}
              </div>
            </div>
          )}
          {activeTab==="dashboard"&&(
            <CoverageDashboard
              navigateToWeek={(weekStartVal) => { setWeekStart(weekStartVal); setActiveTab("schedule"); }}/>
          )}
          {activeTab==="timeoff"&&(
            <TimeOffManager/>
          )}
          {activeTab==="settings"&&(
            <SettingsPanel
                themeName={themeName} setThemeName={setThemeName}
                customTheme={customTheme} setCustomTheme={setCustomTheme}/>
          )}
        </div>
      {showExcelPreviewApp && (
        <ExcelPreviewModal
          onDownload={()=>{ exportToExcel(employees, schedule, extShifts||[], weekStartApp, trainingBlocks||[], timeOffReqs||[]); setShowExcelPreviewApp(false); }}
          onClose={()=>setShowExcelPreviewApp(false)}
        />
      )}
      </div>
    </UICtx.Provider>
    </TimeOffCtx.Provider>
    </HistoryCtx.Provider>
    </ScheduleCtx.Provider>
    </RosterCtx.Provider>
    </SettingsCtx.Provider>
    </ThemeCtx.Provider>
  );
}

preact.render(preact.h(ShiftSchedulerApp, null), document.getElementById("app"));
</script>

</body>
</html>
