                  <div style={{display:"flex",height:22,marginBottom:3}}>
                    <div style={{width:"33.3%",background: s.pair.id==="night"?"transparent":empColor+"40",
                      borderRadius: s.pair.id==="night"?"0":"3px 0 0 3px",
                      border: s.pair.id==="night"?"none":"1px solid "+empColor+"80",
                      display:"flex",alignItems:"center",paddingLeft:4,fontSize:9,fontWeight:700,color:empColor}}>
                      {s.pair.id!=="night" ? s.empA.name : ""}

                      display:"flex",alignItems:"center",paddingLeft:4,fontSize:9,fontWeight:700,color:empColor}}>

                      borderRadius: s.pair.id==="day"?"0":"0 3px 3px 0",

                      {s.empB.name.split(" ")[0]}

                    <div style={{width:"33.4%",background:"#0e7490"+"40",border:"1px solid #0e7490"+"80",
                      borderRadius:"0 3px 3px 0",display:"flex",alignItems:"center",paddingLeft:4,fontSize:9,fontWeight:700,color:"#0e7490"}}>
                      {s.empB.name.split(" ")[0]}
                    </div>
                  </div>
                )}
              </div>

              {}
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {[s.empA, s.empB].filter(Boolean).map((emp, i) => (

                    border:"1px solid "+(i===0?empColor:"#0e7490")+"50",borderRadius:6,padding:"10px 12px"}}>
                    <div style={{fontSize:11,fontWeight:700,color:i===0?empColor:"#0e7490",marginBottom:4}}>

                    </div>
                    <div style={{fontSize:10,color:"var(--ss-text-muted)"}}>

                ))}
              </div>
            </div>

            {}
            <div style={{background:"var(--ss-accent-0a)",border:"1px solid var(--ss-accent-30)",borderRadius:6,
              padding:"10px 14px",marginBottom:18,fontSize:11,color:"var(--ss-text-muted)"}}>
              <span style={{color:"var(--ss-accent)",fontWeight:700}}>✓ Gaps resolved: </span>

            <div style={{background:"var(--ss-warning-dim)",border:"1px solid var(--ss-warning-60)",borderRadius:6,
              padding:"10px 14px",marginBottom:18,fontSize:11,color:"var(--ss-warning-readable)"}}>
              <div style={{fontWeight:700,marginBottom:4}}>⚠ Before approving, confirm:</div>
              <div style={{lineHeight:1.7}}>
                • Each employee will work {EXT_SHIFT_HOURS} consecutive hours<br/>
                • This should only be used when no normal 8-hour solution is possible<br/>
                • Extended hours count toward weekly totals and may trigger overtime<br/>
                • Employees retain the right to refuse extended assignments
              </div>
            </div>
          </>
        )}

        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={onCancel} style={{background:"transparent",color:"var(--ss-text-muted)",
            border:"1px solid var(--ss-border)",padding:"9px 20px",borderRadius:6,cursor:"pointer",
            fontSize:12,fontWeight:600,fontFamily:"inherit"}}>
            CANCEL — Keep Normal Shifts
          </button>
          <button onClick={()=>onApprove(s)} disabled={!s}
            style={{background:s?empColor:"var(--ss-border)",color:s?"#fff":"var(--ss-text-dim)",border:"none",
              padding:"9px 20px",borderRadius:6,cursor:s?"pointer":"not-allowed",
              fontSize:12,fontWeight:700,fontFamily:"inherit"}}>

function ManualPairModal({ initialDay, onApprove, onCancel }) {
  const { employees } = useRoster();
  const { schedule, extShifts } = useSchedule();
  const t = useTheme();
  const [day,     setDay]     = useState(initialDay || DAYS[1]);
  const [pairId,  setPairId]  = useState("day");
  const [empAId,  setEmpAId]  = useState("");
  const [empBId,  setEmpBId]  = useState("");
  const [mode,    setMode]    = useState("suggest");

  const pair = EXT_PAIRS.find(p => p.id === pairId);
  const isSwing = pair?.isSwing || false;

  const alreadyExists = (extShifts||[]).some(e => e.day === day && e.pairId === pairId);

  const available = employees.filter(e => !(e.unavailableDays||[]).includes(day));

  const availableA = available.filter(e => canWorkExtHalf(e, pairId, 0));
  const availableB = available.filter(e => canWorkExtHalf(e, pairId, 1));

  const empAConflict = empA ? extHalfConflictReason(empA, pairId, 0) : null;
  const empBConflict = empB ? extHalfConflictReason(empB, pairId, 1) : null;

  const suggestions = useMemo(() => {
    if (isSwing) {
      // Swing: single-employee suggestions filtered by swingEligible
      return availableA.map(e => ({ a: e, b: null, coversScale: e.qualifications.includes("Scale"),
        coversMedical: e.qualifications.includes("Medical"), score: 0 })).slice(0, 6);
    }
    const out = [];
    for (let i = 0; i < available.length; i++) {
      for (let j = i + 1; j < available.length; j++) {
        const a = available[i], b = available[j];
        const combined = [...new Set([...a.qualifications, ...b.qualifications])];
        const coversScale   = combined.includes("Scale");
        const coversMedical = combined.includes("Medical");
        if (!coversScale || !coversMedical) continue;
        const bothFull = a.qualifications.includes("Scale") && a.qualifications.includes("Medical")
                      && b.qualifications.includes("Scale") && b.qualifications.includes("Medical");
        const score = bothFull ? 2 : (a.qualifications.includes("Scale") && b.qualifications.includes("Medical"))
                               || (b.qualifications.includes("Scale") && a.qualifications.includes("Medical")) ? 1 : 0;
        const abOk = canWorkExtHalf(a, pairId, 0) && canWorkExtHalf(b, pairId, 1);
        const baOk = canWorkExtHalf(b, pairId, 0) && canWorkExtHalf(a, pairId, 1);
        if (!abOk && !baOk) continue;
        const [sa, sb] = abOk ? [a, b] : [b, a];
        out.push({ a: sa, b: sb, coversScale, coversMedical, score });
      }
    }
    return out.sort((x, y) => y.score - x.score).slice(0, 6);
  }, [available, availableA, isSwing, pairId]);

  const empA = employees.find(e => e.id === empAId);
  const empB = employees.find(e => e.id === empBId);

  const combined = empA && empB ? [...new Set([...empA.qualifications, ...empB.qualifications])]
    : empA ? [...empA.qualifications] : [];
  const hasScale   = combined.includes("Scale");
  const hasMedical = combined.includes("Medical");
  const compatible = isSwing ? !!empAId : hasScale && hasMedical;
  const canSubmit  = empAId && (isSwing || (empBId && empAId !== empBId)) && !alreadyExists;

  const QDot = ({ pos }) => (
    <span style={{width:7,height:7,borderRadius:"50%",background:pC(pos,t),
      display:"inline-block",flexShrink:0}} title={pos}/>
  );

  const EmpRow = ({ emp, slot }) => {
    if (!emp) return null;
    const isFT = emp.employmentType === "full-time";
    return (
      <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",
        background:"var(--ss-surface)",border:"1px solid var(--ss-accent-40)",borderRadius:5,marginTop:6}}>
        <span style={{fontWeight:700,fontSize:12,flex:1}}>{emp.name}</span>
        <span style={{fontSize:8,fontWeight:700,padding:"1px 4px",borderRadius:3,
          background:(isFT?"var(--ss-accent)":emp.employmentType==="on-call"?"var(--ss-warning)":"var(--ss-scale)")+"20",color:isFT?"var(--ss-accent)":emp.employmentType==="on-call"?"var(--ss-warning)":"var(--ss-scale)",
          border:"1px solid "+(isFT?"var(--ss-accent)":emp.employmentType==="on-call"?"var(--ss-warning)":"var(--ss-scale)")+"40"}}>{isFT?"FT":emp.employmentType==="on-call"?"OC":"PT"}</span>
        <div style={{display:"flex",gap:3}}>
          {emp.qualifications.map(q => <QDot key={q} pos={q}/>)}
        </div>
        <span style={{fontSize:9,color:"var(--ss-text-dim)"}}>{slot}</span>
      </div>
    );
  };

  const handleApprove = () => {
    if (!canSubmit) return;
    onApprove({
      pairId,
      day,
      empAId,
      empBId: isSwing ? (empBId || null) : empBId,
      roles: ["Scale","Medical"].filter(r => combined.includes(r)),
      approvedAt: new Date().toLocaleDateString(),
    });
  };

  const iS = { background:"var(--ss-surface-alt)", border:"1px solid var(--ss-border)", color:"var(--ss-text)",
    padding:"8px 12px", borderRadius:6, fontSize:12, fontFamily:"inherit",
    outline:"none", width:"100%", boxSizing:"border-box" };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",
      alignItems:"center",justifyContent:"center",zIndex:1100,padding:20}}>

            {isSwing ? `SWING SHIFT — ${pair?.label || ""}` : "PAIR EMPLOYEES — 12-HOUR SHIFTS"}
          </h2>
        </div>
        <p style={{margin:"0 0 20px",fontSize:12,color:"var(--ss-text-muted)",lineHeight:1.6}}>

        </p>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>

                {iss.type==="over_16h"
                  ? `${iss.hours}h consecutive (cap: ${iss.cap ?? MAX_CONSECUTIVE_HOURS}h) on ${iss.day}`

function PreferenceEditor({ prefShifts, setPrefShifts, blockedShifts, setBlockedShifts, requiredShift, setRequiredShift, daysOff, setDaysOff }) {
  const t = useTheme();

  const toggleDay = (day) => {
    if (daysOff.includes(day)) {
      setDaysOff(daysOff.filter(d => d !== day));
    } else {
      const next = daysOff.length < 2 ? [...daysOff, day] : [daysOff[1], day];
      setDaysOff(next);
    }
  };

  const suggestPair = (startIdx) => {
    setDaysOff([DAYS[startIdx % 7], DAYS[(startIdx + 1) % 7]]);
  };

  const togglePref = (sid) => {
    if ((blockedShifts||[]).includes(sid)) return;
    const cur = prefShifts||[];
    if (cur.includes(sid)) {
      setPrefShifts(cur.filter(s=>s!==sid));
      if (requiredShift===sid) setRequiredShift(null);
    } else {
      setPrefShifts([...cur, sid]);
    }
  };

  const toggleBlocked = (sid) => {
    if ((prefShifts||[]).includes(sid)) return;
    const cur = blockedShifts||[];
    setBlockedShifts(cur.includes(sid) ? cur.filter(s=>s!==sid) : [...cur, sid]);
  };

  const toggleRequired = (sid) => {
    if (!(prefShifts||[]).includes(sid)) return;
    setRequiredShift(requiredShift===sid ? null : sid);
  };

  return (
    <div style={{marginTop:10}}>
      <div style={{fontSize:10,color:"var(--ss-text-dim)",fontWeight:700,letterSpacing:".06em",marginBottom:8}}>
        SCHEDULE PREFERENCES
      </div>
      <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
        {}
        <div style={{flex:"1 1 260px"}}>
          <div style={{fontSize:9,color:"var(--ss-text-dim)",marginBottom:6}}>SHIFT PREFERENCES</div>
          {}
          <div style={{display:"grid",gridTemplateColumns:"1fr 80px 80px 80px",gap:3,marginBottom:4}}>
            <div/>
            {["Preferred","Blocked","Required"].map(h=>(
              <div key={h} style={{fontSize:8,fontWeight:700,color:"var(--ss-text-dim)",
                letterSpacing:".05em",textAlign:"center"}}>{h}</div>
            ))}
          </div>
          {SHIFTS.map(s => {
            const isPref    = (prefShifts||[]).includes(s.id);
            const isBlocked = (blockedShifts||[]).includes(s.id);
            const isReq     = requiredShift===s.id;
            const canReq    = isPref;
            const canBlock  = !isPref;
            const canPref   = !isBlocked;
            const col       = sC(s.id, t);
            return (
              <div key={s.id} style={{display:"grid",gridTemplateColumns:"1fr 80px 80px 80px",
                gap:3,marginBottom:4,alignItems:"center"}}>
                <div style={{fontSize:10,fontWeight:600,color:"var(--ss-text)",paddingLeft:2}}>
                  {s.label}
                  <span style={{fontSize:8,color:"var(--ss-text-dim)",marginLeft:4}}>{s.time}</span>
                </div>
                {}
                <button onClick={()=>canPref&&togglePref(s.id)} style={{
                  fontSize:9,fontWeight:700,padding:"4px 0",borderRadius:5,fontFamily:"inherit",
                  cursor:canPref?"pointer":"not-allowed",opacity:canPref?1:0.4,
                  background:isPref?col+"25":"var(--ss-surface-alt)",
                  border:"1.5px solid "+(isPref?col:"var(--ss-border)"),
                  color:isPref?col:"var(--ss-text-dim)",
                }}>{isPref?"★ Yes":"—"}</button>
                {}
                <button onClick={()=>canBlock&&toggleBlocked(s.id)} style={{
                  fontSize:9,fontWeight:700,padding:"4px 0",borderRadius:5,fontFamily:"inherit",
                  cursor:canBlock?"pointer":"not-allowed",opacity:canBlock?1:0.4,
                  background:isBlocked?"var(--ss-danger-25)":"var(--ss-surface-alt)",
                  border:"1.5px solid "+(isBlocked?"var(--ss-danger)":"var(--ss-border)"),
                  color:isBlocked?"var(--ss-danger)":"var(--ss-text-dim)",
                }}>{isBlocked?"🚫 No":"—"}</button>
                {}
                <button onClick={()=>canReq&&toggleRequired(s.id)} style={{
                  fontSize:9,fontWeight:700,padding:"4px 0",borderRadius:5,fontFamily:"inherit",
                  cursor:canReq?"pointer":"not-allowed",opacity:canReq?1:0.3,
                  background:isReq?"var(--ss-danger-20)":"var(--ss-surface-alt)",
                  border:"1.5px solid "+(isReq?"var(--ss-danger)":"var(--ss-border)"),
                  color:isReq?"var(--ss-danger)":"var(--ss-text-dim)",
                  title:canReq?"Hard-lock to this shift only":"Mark as Preferred first",
                }}>{isReq?"⚠ Lock":"—"}</button>
              </div>
            );
          })}
          {requiredShift&&(
            <div style={{fontSize:9,color:"var(--ss-danger)",marginTop:4,padding:"4px 8px",
              background:"var(--ss-danger-10)",borderRadius:4,border:"1px solid var(--ss-danger-30)"}}>
              ⚠ Required: will never be placed on any other shift
            </div>
          )}
          {(prefShifts||[]).length===0&&(blockedShifts||[]).length===0&&(
            <div style={{fontSize:9,color:"var(--ss-text-dim)",marginTop:2}}>
              No preferences set — auto-fill will assign any shift
            </div>
          )}
        </div>

        {}
        <div style={{flex:1,minWidth:200}}>
          <div style={{fontSize:9,color:"var(--ss-text-dim)",marginBottom:5}}>
            PREFERRED DAYS OFF <span style={{color:"var(--ss-text-dim)",fontWeight:400}}>(pick 2 consecutive)</span>
          </div>
          <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:5}}>
            {DAYS.map((day, i) => {
              const on = daysOff.includes(day);
              const order = daysOff.indexOf(day);
              return (
                <button key={day} onClick={()=>toggleDay(day)} style={{
                  fontSize:10,fontWeight:on?700:500,padding:"4px 8px",borderRadius:5,
                  fontFamily:"inherit",cursor:"pointer",position:"relative",
                  background:on?"var(--ss-accent-22)":"var(--ss-surface-alt)",
                  border:"1.5px solid "+(on?"var(--ss-accent)":"var(--ss-border)"),
                  color:on?"var(--ss-accent)":"var(--ss-text-dim)",
                }}>
                  {day.substring(0,3)}
                  {on&&<span style={{position:"absolute",top:-4,right:-4,width:14,height:14,
                    borderRadius:"50%",background:"var(--ss-accent)",color:"#fff",fontSize:8,
                    display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800}}>
                    {order+1}
                  </span>}
                </button>
              );
            })}
          </div>
          {}
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            <span style={{fontSize:9,color:"var(--ss-text-dim)",alignSelf:"center",marginRight:2}}>Quick:</span>
            {[[5,6,"Sat+Sun"],[6,0,"Sun+Mon"],[0,1,"Mon+Tue"],[1,2,"Tue+Wed"],[2,3,"Wed+Thu"],[3,4,"Thu+Fri"],[4,5,"Fri+Sat"]].map(([a,b,label])=>(
              <button key={label} onClick={()=>setDaysOff([DAYS[a],DAYS[b]])} style={{
                fontSize:9,padding:"2px 7px",borderRadius:4,fontFamily:"inherit",cursor:"pointer",
                background:"var(--ss-surface-alt)",border:"1px solid var(--ss-border)",color:"var(--ss-text-dim)",
              }}>{label}</button>
            ))}
          </div>
        </div>
      </div>
      {daysOff.length===2&&Math.abs(DAYS.indexOf(daysOff[0])-DAYS.indexOf(daysOff[1]))!==1&&
       !(daysOff.includes("Saturday")&&daysOff.includes("Sunday"))&&(
        <div style={{marginTop:5,fontSize:9,color:"var(--ss-warning)"}}>
          ⚠ Days off are not consecutive — this is allowed but less optimal for scheduling.
        </div>
      )}
    </div>
  );
}

function PreferenceViolationBanner() {
  const { employees } = useRoster();
  const { schedule } = useSchedule();
  const t = useTheme();
  const [expandedReq,  setExpandedReq]  = useState(false);
  const [expandedPref, setExpandedPref] = useState(false);

  const violations = useMemo(() => {
    const out = [];
    employees.forEach(emp => {
      const pv = getAllPrefViolations(emp, schedule);
      if (pv.length) out.push({ emp, violations: pv });
    });
    return out;
  }, [employees, schedule]);

  if (!violations.length) return null;

  const reqViolations  = violations.filter(({violations:vl}) => vl.some(v=>v.type==="wrong_shift_required"));
  const prefViolations = violations.filter(({violations:vl}) => vl.some(v=>v.type!=="wrong_shift_required"));

  const reqCount  = reqViolations.reduce((n,{violations:vl})=>n+vl.filter(v=>v.type==="wrong_shift_required").length, 0);
  const prefCount = prefViolations.reduce((n,{violations:vl})=>n+vl.filter(v=>v.type!=="wrong_shift_required").length, 0);

  const SummaryPills = ({ items, color }) => (
    <div style={{display:"flex",gap:5,flexWrap:"wrap",flex:1,minWidth:0}}>
      {items.map(({emp}) => (
        <span key={emp.id} style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:4,
          background:color+"18",border:"1px solid "+color+"40",color,whiteSpace:"nowrap"}}>
          {emp.name}
        </span>
      ))}
    </div>
  );

  return (
    <>
      {reqViolations.length > 0 && (
        <div style={{border:"1px solid var(--ss-danger)",borderRadius:6,marginBottom:8,overflow:"hidden"}}>
          {}
          <div onClick={()=>setExpandedReq(e=>!e)}
            style={{background:"var(--ss-danger-dim)",padding:"8px 14px",cursor:"pointer",
              display:"flex",alignItems:"center",gap:10,userSelect:"none"}}
            onMouseEnter={e=>e.currentTarget.style.filter="brightness(1.06)"}
            onMouseLeave={e=>e.currentTarget.style.filter="none"}>
            <span style={{fontWeight:700,color:"var(--ss-danger)",fontSize:12,flexShrink:0}}>
              ✕ REQUIRED VIOLATIONS
            </span>
            <span style={{background:"var(--ss-danger)",color:"#fff",fontSize:10,fontWeight:800,
              padding:"1px 7px",borderRadius:10,flexShrink:0}}>{reqCount}</span>
            <SummaryPills items={reqViolations} color={"var(--ss-danger)"}/>
            <span style={{fontSize:11,color:"var(--ss-danger)",flexShrink:0,marginLeft:"auto",paddingLeft:8}}>
              {expandedReq ? "▲ hide" : "▼ show"}
            </span>
          </div>
          {}
          {expandedReq && (
            <div style={{background:"var(--ss-danger-dim-88)",padding:"10px 14px",
              borderTop:"1px solid var(--ss-danger-40)",display:"flex",flexDirection:"column",gap:4}}>
              {reqViolations.map(({emp,violations:vlist}) => (
                <div key={emp.id} style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-start"}}>
                  <span style={{fontWeight:700,color:"var(--ss-danger)",fontSize:11,minWidth:120,flexShrink:0}}>{emp.name}</span>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {vlist.filter(v=>v.type==="wrong_shift_required").map((v,i) => (
                      <span key={i} style={{background:"var(--ss-danger-18)",border:"1px solid var(--ss-danger-50)",
                        padding:"2px 8px",borderRadius:4,color:"var(--ss-danger)",fontWeight:700,fontSize:10}}>
                        {v.msg}
                      </span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {prefViolations.length > 0 && (
        <div style={{border:"1px solid var(--ss-warning)",borderRadius:6,marginBottom:12,overflow:"hidden"}}>
          {}
          <div onClick={()=>setExpandedPref(e=>!e)}
            style={{background:"var(--ss-warning-dim)",padding:"8px 14px",cursor:"pointer",
              display:"flex",alignItems:"center",gap:10,userSelect:"none"}}
            onMouseEnter={e=>e.currentTarget.style.filter="brightness(1.06)"}
            onMouseLeave={e=>e.currentTarget.style.filter="none"}>
            <span style={{fontWeight:700,color:"var(--ss-warning)",fontSize:12,flexShrink:0}}>
              ⚠ PREFERENCE VIOLATIONS
            </span>
            <span style={{background:"var(--ss-warning)",color:"#000",fontSize:10,fontWeight:800,
              padding:"1px 7px",borderRadius:10,flexShrink:0}}>{prefCount}</span>
            <SummaryPills items={prefViolations} color={"var(--ss-warning)"}/>
            <span style={{fontSize:11,color:"var(--ss-warning)",flexShrink:0,marginLeft:"auto",paddingLeft:8}}>
              {expandedPref ? "▲ hide" : "▼ show"}
            </span>
          </div>
          {}
          {expandedPref && (
            <div style={{background:"var(--ss-warning-dim-88)",padding:"10px 14px",
              borderTop:"1px solid var(--ss-warning-40)",display:"flex",flexDirection:"column",gap:4}}>
              {prefViolations.map(({emp,violations:vlist}) => (
                <div key={emp.id} style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"flex-start"}}>
                  <span style={{fontWeight:700,color:"var(--ss-text)",fontSize:11,minWidth:120,flexShrink:0}}>{emp.name}</span>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {vlist.filter(v=>v.type!=="wrong_shift_required").map((v,i) => (
                      <span key={i} style={{background:"var(--ss-warning-20)",border:"1px solid var(--ss-warning-50)",
                        padding:"2px 8px",borderRadius:4,color:"var(--ss-warning)",fontWeight:600,fontSize:10}}>
                        {v.msg}
                      </span>
                    ))}
                  </div>
                </div>
              ))}
              <div style={{marginTop:6,fontSize:10,color:"var(--ss-text-dim)"}}>
                5-on-2-off rule: employees should work 5 consecutive days then have 2 days off.
                Preferred shifts keep staff on consistent rotations.
              </div>
            </div>
          )}
        </div>
      )}
    </>
  );
}

        fontWeight:600,fontFamily:"inherit",display:"flex",alignItems:"center",gap:7,
        transition:"all .2s"}}>
      🔧 Minimize
      {count > 0 && (
        <span style={{background:col,color: col==="var(--ss-text-dim)"?"#fff":"#000",
          fontSize:10,fontWeight:800,padding:"1px 7px",borderRadius:10,lineHeight:"16px"}}>
          {count}
        </span>
      )}
    </button>
  );
}

function buildViolationList(employees, schedule, extShiftsArg) {
  const SEVERITY = { supervisor_missing: -1, wrong_shift_required: 0, unavailable: 1, days_off: 2, wrong_shift: 3, overwork: 4, under_hours: 5 };
  const items = [];
  // O(1) employee lookup — avoids O(N) find inside slot loops
  const empMap = new Map(employees.map(e => [e.id, e]));
  // Set of supervisor employee IDs for O(1) supervisor check
  const supervisorIds = new Set(employees.filter(e => (e.qualifications||[]).includes("Supervisor")).map(e => e.id));
  // Pre-index assigned slots per employee: empId → [{day, shiftId, position}]
  const empSlots = new Map(employees.map(e => [e.id, []]));
  for (const [key, asgn] of Object.entries(schedule)) {
    const [day, shiftId] = key.split("__");
    for (const a of asgn) {
      if (empSlots.has(a.employeeId)) empSlots.get(a.employeeId).push({ day, shiftId, position: a.position });
    }
  }

  WEEKDAYS.forEach(day => {
    const asgn = schedule[cellKey(day, "first")] || [];
    for (const empId of supervisorIds) {
      const emp = empMap.get(empId);
      if (!emp || (emp.unavailableDays||[]).includes(day)) continue;
      if (asgn.some(a => a.employeeId === empId)) continue;
      items.push({ emp, day, shiftId: "first", position: null,
        type: "supervisor_missing", severity: -1,
        msg: `Supervisor not scheduled for 1st shift on ${day}` });
    }
  });

  employees.forEach(emp => {
    if (emp.employmentType !== "full-time") return;
    const hrs = calcHours(emp.id, schedule, extShiftsArg || []);
    if (hrs >= FT_MIN_HOURS) return;
    const needed = Math.ceil((FT_MIN_HOURS - hrs) / SHIFT_HOURS);

    const candidateSlots = [];
    ALL_SLOTS.forEach(({ day, shiftId }) => {
      if ((emp.unavailableDays||[]).includes(day)) return;
      if ((emp.blockedShifts||[]).includes(shiftId)) return;
      if (emp.requiredShift && emp.requiredShift !== shiftId) return;
      const asgn = schedule[cellKey(day, shiftId)] || [];
      if (asgn.some(a => a.employeeId === emp.id)) return;
      if (!getAvailPos(day, shiftId).some(p => emp.qualifications.includes(p))) return;
      const isFull = asgn.length >= getEffectiveSlotCount(day, shiftId, extShiftsArg);
      const hasPTBumpable = isFull && asgn.some(a => {
        const peer = empMap.get(a.employeeId);
        return peer && peer.employmentType !== "full-time";
      });
      candidateSlots.push({ day, shiftId, isFull, hasPTBumpable });
    });

    candidateSlots.sort((a, b) => {
      if (!a.isFull && b.isFull) return -1;
      if (a.isFull && !b.isFull) return 1;
      if (a.hasPTBumpable && !b.hasPTBumpable) return -1;
      if (!a.hasPTBumpable && b.hasPTBumpable) return 1;
      return 0;
    });

    const targets = candidateSlots.filter(s => !s.isFull || s.hasPTBumpable).slice(0, needed);

    if (targets.length > 0) {
      targets.forEach(({ day, shiftId, isFull }) => {
        items.push({ emp, day, shiftId, position: null, type: "under_hours",
          severity: SEVERITY.under_hours,
          msg: `Under 40h (${hrs}h) — ${isFull ? "can swap a PT employee on" : "open slot on"} ${day}` });
      });
    } else {
      items.push({ emp, day: DAYS[0], shiftId: "first", position: null, type: "under_hours",
        severity: SEVERITY.under_hours,
        msg: `Under 40h (${hrs}h) — no available slots this week to fill` });
    }
  });

  // Use pre-indexed empSlots — O(assigned) instead of O(employees × allSlots)
  for (const emp of employees) {
    for (const { day, shiftId, position } of (empSlots.get(emp.id) || [])) {
      if ((emp.unavailableDays || []).includes(day)) {
        items.push({ emp, day, shiftId, position, type: "unavailable",
          severity: SEVERITY.unavailable, msg: `Unavailable on ${day}` });
        continue;
      }
      const v = getPreferenceViolations(emp, day, shiftId, schedule);
      for (const viol of v) {
        items.push({ emp, day, shiftId, position,
          type: viol.type, severity: SEVERITY[viol.type] ?? 99, msg: viol.msg });
      }
    }
  }

  items.sort((a, b) =>
    a.severity !== b.severity ? a.severity - b.severity :
    a.emp.name.localeCompare(b.emp.name) ||
    DAYS.indexOf(a.day) - DAYS.indexOf(b.day)
  );
  return items;
}

function tryFixViolation(item, employees, schedule, cfg, extShiftsArg) {
  const { emp, day, shiftId, position, type } = item;
  const key = cellKey(day, shiftId);
  const ns = JSON.parse(JSON.stringify(schedule));

  const isAssigned = (empId, d, s, sched) =>
    (sched[cellKey(d, s)] || []).some(a => a.employeeId === empId);

  const hasConflict = (candidate, d, s) => {
    if ((candidate.unavailableDays || []).includes(d)) return true;
    if (candidate.requiredShift && candidate.requiredShift !== s) return true;
    if ((candidate.blockedShifts||[]).includes(s)) return true;
    if (violatesDaysOff(candidate, d)) return true;
    return false;
  };

  const isQualified = (candidate, d, s) =>
    getAvailPos(d, s).some(p => candidate.qualifications.includes(p));

  if (type === "wrong_shift_required" || type === "wrong_shift" || type === "blocked_shift") {
    const prefs = emp.requiredShift ? [emp.requiredShift]
                : (emp.preferredShifts||[]).length > 0 ? emp.preferredShifts
                : SHIFTS.map(s=>s.id).filter(s=>(emp.blockedShifts||[]).includes(s)===false && s!==shiftId);
    const prefShift = prefs.find(s => s !== shiftId) || null;
    if (!prefShift) return null;

    const prefKey = cellKey(day, prefShift);
    const prefAsgn = ns[prefKey] || [];
    const maxSlots = getSlotCount(day, prefShift);
    const availPos = getAvailPos(day, prefShift).filter(p => emp.qualifications.includes(p));

    if (availPos.length === 0) return null;

    if (prefAsgn.length < maxSlots && !prefAsgn.some(a => a.employeeId === emp.id)) {
      // Preferred slot has room — move employee there directly
      ns[key] = (ns[key] || []).filter(a => a.employeeId !== emp.id);
      const usedPositions = new Set(prefAsgn.map(a => a.position));
      const pos = availPos.find(p => !usedPositions.has(p)) || availPos[0];
      ns[prefKey] = [...prefAsgn, { employeeId: emp.id, position: pos }];
      const vacatedPos = position;
      const replacements = employees.filter(c =>
        c.id !== emp.id &&
        !isAssigned(c.id, day, shiftId, ns) &&
        getAvailPos(day, shiftId).includes(vacatedPos) && c.qualifications.includes(vacatedPos) &&
        !hasConflict(c, day, shiftId)
      );
      if (replacements.length > 0) {
        ns[key] = [...(ns[key] || []), { employeeId: replacements[0].id, position: vacatedPos }];
      }
      return ns;
    }

    // Preferred slot is full — try swapping out a PT or non-conflicting employee to make room
    if (prefAsgn.length >= maxSlots && !prefAsgn.some(a => a.employeeId === emp.id)) {
      const swapOut = prefAsgn.find(a => {
        const peer = employees.find(e => e.id === a.employeeId);
        if (!peer) return false;
        if (peer.employmentType !== "full-time") return true; // prefer bumping PT
        if (peer.requiredShift && peer.requiredShift !== prefShift) return false;
        return !hasConflict(peer, day, shiftId); // can the bumped person go to the current shift instead?
      });
      if (!swapOut) return null;
      const swapPeer = employees.find(e => e.id === swapOut.employeeId);
      if (!swapPeer) return null;
      // Remove swapOut from preferred slot, add emp
      const usedPositions = new Set(prefAsgn.filter(a => a !== swapOut).map(a => a.position));
      const pos = availPos.find(p => !usedPositions.has(p)) || availPos[0];
      ns[prefKey] = [...prefAsgn.filter(a => a !== swapOut), { employeeId: emp.id, position: pos }];
      ns[key] = (ns[key] || []).filter(a => a.employeeId !== emp.id);
      // Try to place the bumped employee in the vacated slot
      const bumpedPos = getAvailPos(day, shiftId).filter(p => swapPeer.qualifications.includes(p));
      if (bumpedPos.length > 0 && !hasConflict(swapPeer, day, shiftId)) {
        const usedCur = new Set((ns[key]||[]).map(a => a.position));
        const bPos = bumpedPos.find(p => !usedCur.has(p)) || bumpedPos[0];
        ns[key] = [...(ns[key]||[]), { employeeId: swapPeer.id, position: bPos }];
      }
      return ns;
    }
    return null;
  }

  if (type === "supervisor_missing") {
    const key3 = cellKey(day, "first");
    const asgn3 = ns[key3] || [];
    if (asgn3.some(a => a.employeeId === emp.id)) return null;
    if (isRestViolation(emp, calcRestGap(emp.id, ns, day, "first"), cfg?.minRestHours ?? 12)) return null;
    if (calcConsecutiveHours(emp.id, ns, day, "first") > empMaxConsec(emp)) return null;
    const maxSlots = getSlotCount(day, "first");
    if (asgn3.length >= maxSlots) return null; // slot full, can't add
    const pos3 = (emp.qualifications||[]).includes("Supervisor") ? "Supervisor" : "Guard";
    ns[key3] = [...asgn3, { employeeId: emp.id, position: pos3 }];
    return ns;
  }

  if (type === "under_hours") {
    const key2   = cellKey(day, shiftId);
    const asgn2  = ns[key2] || [];
    if (asgn2.some(a => a.employeeId === emp.id)) return null;
    const availPos2 = getAvailPos(day, shiftId).filter(p => canFillPos(emp, p, day));
    if (!availPos2.length) return null;
    if (isRestViolation(emp, calcRestGap(emp.id, ns, day, shiftId), cfg?.minRestHours ?? 12)) return null;
    if (calcConsecutiveHours(emp.id, ns, day, shiftId, extShiftsArg) > empMaxConsec(emp)) return null;
    const isFull = asgn2.length >= getEffectiveSlotCount(day, shiftId, extShiftsArg);
    if (isFull) {
      const ptIdx = asgn2.findIndex(a => {
        const peer = employees.find(e => e.id === a.employeeId);
        return peer && peer.employmentType !== "full-time";
      });
      if (ptIdx === -1) return null;
      const bumped = asgn2[ptIdx];
      ns[key2] = asgn2.filter((_, i) => i !== ptIdx);
      const usedPos3 = new Set(ns[key2].map(a => a.position));
      const pos3 = availPos2.find(p => p === bumped.position)
                || availPos2.find(p => !usedPos3.has(p))
                || availPos2[0];
      ns[key2] = [...ns[key2], { employeeId: emp.id, position: pos3 }];
      return ns;
    }

    const usedPos = new Set(asgn2.map(a => a.position));
    const needsScale   = !asgn2.some(a => a.position === "Scale");
    const needsMedical = !asgn2.some(a => a.position === "Medical");
    const pos = availPos2.find(p => needsScale && p === "Scale")
             || availPos2.find(p => needsMedical && p === "Medical")
             || availPos2.find(p => !usedPos.has(p))
             || availPos2[0];
    ns[key2] = [...asgn2, { employeeId: emp.id, position: pos }];
    return ns;
  }

  if (type === "days_off" || type === "unavailable" || type === "overwork") {
    ns[key] = (ns[key] || []).filter(a => a.employeeId !== emp.id);
    const replacements = employees.filter(c =>
      c.id !== emp.id &&
      !isAssigned(c.id, day, shiftId, ns) &&
      c.qualifications.includes(position) &&
      getAvailPos(day, shiftId).includes(position) &&
      !hasConflict(c, day, shiftId) &&
      isRestViolation(c, calcRestGap(c.id, ns, day, shiftId), cfg?.minRestHours ?? 12) === false &&
      calcConsecutiveHours(c.id, ns, day, shiftId) <= empMaxConsec(c)
    );
    if (replacements.length > 0) {
      ns[key] = [...(ns[key] || []), { employeeId: replacements[0].id, position }];
      return ns;
    }
    return ns;
  }

  return null;
}

function MinimizeViolationsPanel({ onClose }) {
  const { employees } = useRoster();
  const { schedule, setSchedule, extShifts } = useSchedule();
  const t = useTheme();
  const cfg = useSettings();

  const violations = useMemo(() => buildViolationList(employees, schedule, extShifts), [employees, schedule, extShifts]);

  const [fixedIds, setFixedIds] = useState(new Set());
  const [unfixableIds, setUnfixableIds] = useState(new Set());

  const itemKey = (item) => `${item.emp.id}__${item.day}__${item.shiftId}__${item.type}`;

  const fixOne = (item) => {
    const result = tryFixViolation(item, employees, schedule, cfg, extShifts);
    if (result) {
      setSchedule(result);
      setFixedIds(s => new Set([...s, itemKey(item)]));
    } else {
      setUnfixableIds(s => new Set([...s, itemKey(item)]));
    }
  };

  const fixAll = () => {
    let cur = JSON.parse(JSON.stringify(schedule));
    const nowFixed = new Set(fixedIds);
    const nowUnfix = new Set(unfixableIds);
    const items = buildViolationList(employees, cur, extShifts);
    items.forEach(item => {
      if (nowFixed.has(itemKey(item))) return;
      const result = tryFixViolation(item, employees, cur, cfg, extShifts);
      if (result) { cur = result; nowFixed.add(itemKey(item)); }
      else nowUnfix.add(itemKey(item));
    });
    setSchedule(cur);
    setFixedIds(nowFixed);
    setUnfixableIds(nowUnfix);
  };

  const TYPE_META = {
    wrong_shift_required: { label: "REQUIRED SHIFT",  color: (t) => "var(--ss-danger)" },
    unavailable:          { label: "UNAVAILABLE",      color: (t) => "var(--ss-danger)" },
    days_off:             { label: "PREF DAY OFF",     color: (t) => "var(--ss-warning)" },
    wrong_shift:          { label: "WRONG SHIFT",      color: (t) => "var(--ss-warning)" },
    overwork:             { label: "OVERWORK",         color: (t) => "var(--ss-fatigue)" },
    under_hours:          { label: "UNDER 40H",        color: (t) => "var(--ss-danger)" },
    supervisor_missing:   { label: "SUP MISSING",      color: (t) => "var(--ss-danger)" },
  };

  const activeViolations = violations.filter(v => !fixedIds.has(itemKey(v)));
  const fixableCount = activeViolations.filter(v => !unfixableIds.has(itemKey(v))).length;

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.72)",display:"flex",
      alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
      <div style={{background:"var(--ss-surface)",border:"1px solid var(--ss-border)",borderRadius:12,
        padding:28,maxWidth:620,width:"100%",maxHeight:"85vh",display:"flex",
        flexDirection:"column",boxShadow:"0 24px 64px rgba(0,0,0,0.55)"}}>

        {}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>🔧</span>
            <h2 style={{margin:0,fontSize:16,fontWeight:700,color:"var(--ss-text)"}}>MINIMIZE VIOLATIONS</h2>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",
            color:"var(--ss-text-dim)",cursor:"pointer",fontSize:18,padding:4}}>✕</button>
        </div>
        <p style={{margin:"0 0 16px",fontSize:11,color:"var(--ss-text-muted)",flexShrink:0}}>
          {violations.length === 0
            ? "No violations found — schedule looks clean."
            : `${violations.length} violation${violations.length!==1?"s":""} found across ${new Set(violations.map(v=>v.emp.id)).size} employee${new Set(violations.map(v=>v.emp.id)).size!==1?"s":""}.`}
        </p>

        {violations.length > 0 && (
          <div style={{display:"flex",gap:8,marginBottom:16,flexShrink:0,flexWrap:"wrap",alignItems:"center"}}>
            <button onClick={fixAll}
              style={{background:"var(--ss-scale)",color:"#fff",border:"none",
                padding:"9px 20px",borderRadius:6,cursor:"pointer",fontSize:12,
                fontWeight:700,fontFamily:"inherit"}}>
              ⚡ Fix All ({fixableCount} fixable)
            </button>
            {fixedIds.size > 0 && (
              <span style={{fontSize:11,color:"var(--ss-scale)",fontWeight:600}}>
                ✓ {fixedIds.size} fixed this session
              </span>
            )}
            {unfixableIds.size > 0 && (
              <span style={{fontSize:11,color:"var(--ss-text-dim)"}}>
                {unfixableIds.size} could not be auto-fixed
              </span>
            )}
          </div>
        )}

        {}
        <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:5}}>
          {violations.length === 0 && (
            <div style={{textAlign:"center",padding:"40px 0",color:"var(--ss-scale)",fontSize:14}}>
              <div style={{fontSize:32,marginBottom:10}}>✓</div>
              All schedule preferences are satisfied.
            </div>
          )}
          {violations.map((item) => {
            const id = itemKey(item);
            const isFixed    = fixedIds.has(id);
            const isUnfixable = unfixableIds.has(id);
            const meta = TYPE_META[item.type] || { label: item.type.toUpperCase(), color: () => "var(--ss-text-muted)" };
            const col  = meta.color(t);
            const shiftLabel = SHIFTS.find(s=>s.id===item.shiftId)?.label || item.shiftId;
            return (
              <div key={id} style={{display:"flex",alignItems:"center",gap:10,
                padding:"10px 14px",borderRadius:6,
                background: isFixed ? "var(--ss-scale-12)" : isUnfixable ? "var(--ss-surface-alt)" : "var(--ss-surface-alt)",
                border:"1px solid "+(isFixed?"var(--ss-scale-40)":isUnfixable?"var(--ss-border)":col+"30"),
                opacity: isFixed ? 0.7 : 1, transition:"all .2s"}}>

                <span style={{width:8,height:8,borderRadius:"50%",
                  background:isFixed?"var(--ss-scale)":col,flexShrink:0}}/>

                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    <span style={{fontWeight:700,fontSize:12,color:"var(--ss-text)"}}>{item.emp.name}</span>
                    <span style={{fontSize:9,fontWeight:800,padding:"1px 6px",borderRadius:3,
                      background:col+"20",color:col,border:"1px solid "+col+"40"}}>
                      {meta.label}
                    </span>
                    <span style={{fontSize:10,color:"var(--ss-text-dim)"}}>{item.day} · {shiftLabel}</span>
                  </div>
                  <div style={{fontSize:10,color:"var(--ss-text-muted)",marginTop:2}}>{item.msg}</div>
                </div>

                {isFixed ? (
                  <span style={{fontSize:11,fontWeight:700,color:"var(--ss-scale)",flexShrink:0}}>✓ Fixed</span>
                ) : isUnfixable ? (
                  <span style={{fontSize:10,color:"var(--ss-text-dim)",flexShrink:0,textAlign:"right",maxWidth:90}}>
                    No swap<br/>available
                  </span>
                ) : (
                  <button onClick={()=>fixOne(item)}
                    style={{background:"var(--ss-accent)",color:"#fff",border:"none",
                      padding:"6px 14px",borderRadius:5,cursor:"pointer",
                      fontSize:11,fontWeight:700,fontFamily:"inherit",flexShrink:0}}>
                    Fix
                  </button>
                )}
              </div>
            );
          })}
        </div>

        <div style={{marginTop:16,flexShrink:0,display:"flex",justifyContent:"space-between",
          alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:10,color:"var(--ss-text-dim)"}}>
            Fixes move employees to their preferred shift or substitute a conflict-free replacement.<br/>
            "No swap available" means no qualified employee is free for that slot without creating a new violation.
          </div>
          <button onClick={onClose}
            style={{background:"transparent",border:"1px solid var(--ss-border)",color:"var(--ss-text-muted)",
              padding:"8px 18px",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>
            Close
          </button>
        </div>
      </div>
    </div>
  );
}

function RosterManager() {
  const { employees, setEmployees, savedRosters, setSavedRosters } = useRoster();
  const { setSchedule } = useSchedule();
  const t = useTheme();
  const [saveName,   setSaveName]   = useState("");
  const [confirmDel, setConfirmDel] = useState(null);
  const [loadedId,   setLoadedId]   = useState(null);
  const [flash,      setFlash]      = useState(null);
  const [importErr,  setImportErr]  = useState(null);
  const importRef = useRef(null);

  const showFlash = (type) => { setFlash(type); setTimeout(()=>setFlash(null), 2200); };

  const exportRosters = () => {
    if (!savedRosters.length) return;
    const payload = JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), rosters: savedRosters }, null, 2);
    const blob = new Blob([payload], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `shift-rosters-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showFlash("exported");
  };

  const importRosters = (e) => {
    setImportErr(null);
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const incoming = data.rosters || (Array.isArray(data) ? data : null);
        if (!incoming || !Array.isArray(incoming)) throw new Error("Unrecognized format");
        if (!incoming.every(r => r.id && r.name && Array.isArray(r.employees)))
          throw new Error("Missing required fields");
        setSavedRosters(prev => {
          const existingIds = new Set(prev.map(r => r.id));
          const newOnes = incoming.filter(r => !existingIds.has(r.id));
          return [...newOnes, ...prev];
        });
        showFlash("imported");
      } catch(err) {
        setImportErr("Import failed: " + err.message);
      }
      e.target.value = "";
    };
    reader.readAsText(file);
  };

  const saveRoster = () => {
    const name = saveName.trim();
    if (!name || !employees.length) return;
    const entry = {
      id: Date.now().toString(),
      name,
      savedAt: new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),
      savedAtISO: new Date().toISOString(),
      employees: JSON.parse(JSON.stringify(employees)),
      count: employees.length,
      ft: employees.filter(e=>e.employmentType==="full-time").length,
      pt: employees.filter(e=>e.employmentType!=="full-time").length,
    };
    setSavedRosters(p=>[entry,...p]);
    setSaveName("");
    showFlash("saved");
  };

  const [confirmLoad, setConfirmLoad] = useState(null);

  const loadRoster = (entry) => {
    setEmployees(entry.employees);
    setSchedule({});
    setLoadedId(entry.id);
    setConfirmLoad(null);
    showFlash("loaded");
  };

  const deleteRoster = (idx) => {
    setSavedRosters(p=>p.filter((_,i)=>i!==idx));
    setConfirmDel(null);
    showFlash("deleted");
  };

  const iS = {
    background:"var(--ss-surface-alt)", border:"1px solid var(--ss-border)", color:"var(--ss-text)",

function AvailableDaysOfWeekToggle({ val, set }) {
  const active = val && val.length > 0;
  const toggle = (day) => {
    const current = val || [];
    const next = current.includes(day) ? current.filter(d => d !== day) : [...current, day];
    set(next.length > 0 ? next : null);
  };
  return (
    <div style={{marginTop:12}}>
      <div style={{fontSize:11,color:"var(--ss-text-dim)",fontWeight:600,letterSpacing:".04em",marginBottom:6}}>
        AVAILABLE DAYS OF WEEK
      </div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:4}}>
        {["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"].map(day => {
          const on = (val || []).includes(day);
          return (
            <button key={day} onClick={()=>toggle(day)} style={{
              background: on ? "var(--ss-accent-22)" : "var(--ss-surface-alt)",
              border: "1.5px solid "+(on ? "var(--ss-accent)" : "var(--ss-border)"),
              color: on ? "var(--ss-accent)" : "var(--ss-text-dim)",
              padding:"4px 10px", borderRadius:6, cursor:"pointer",
              fontSize:11, fontWeight:on?700:500, fontFamily:"inherit",
              transition:"all .15s",
            }}>{day.slice(0,3)}</button>
          );
        })}
      </div>
      <div style={{fontSize:10,color: active ? "var(--ss-warning)" : "var(--ss-text-dim)",lineHeight:1.5}}>
        {active
          ? `Only available on: ${(val||[]).join(", ")}. Will be hard-blocked on all other days.`
          : "Available any day of the week (default). Use this for employees like Ray (Tue/Wed only)."}
      </div>
    </div>
  );
}

function SwingEligibleToggle({ val, set }) {

            <button key={opt.id} onClick={()=>toggle(opt.id)} style={{
              background: on ? opt.color+"22" : "var(--ss-surface-alt)",

    </div>
  );

function AvailabilityEditor({ emp, onUpdate }) {
  const t = useTheme();
  const unavail = emp.unavailableDays || [];
  const toggle = (day) => {
    const next = unavail.includes(day)
      ? unavail.filter(d=>d!==day)
      : [...unavail, day];
    onUpdate(next);
  };
  return (
    <div style={{marginTop:10}}>
      <div style={{fontSize:10,color:"var(--ss-text-dim)",fontWeight:700,letterSpacing:".06em",marginBottom:6}}>
        UNAVAILABLE DAYS
      </div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
        {DAYS.map(day => {
          const off = unavail.includes(day);
          return (
            <button key={day} onClick={()=>toggle(day)} style={{
              background:off?"var(--ss-danger-18)":"var(--ss-surface-alt)",
              border:"1.5px solid "+(off?"var(--ss-danger)":"var(--ss-border)"),
              color:off?"var(--ss-danger)":"var(--ss-text-dim)",
              padding:"4px 9px",borderRadius:5,cursor:"pointer",
              fontSize:10,fontWeight:off?700:500,fontFamily:"inherit",
              transition:"all .15s",
            }}>
              {day.substring(0,3)}
              {off&&<span style={{marginLeft:4,fontSize:9}}>\u2715</span>}

          );
        })}
      </div>
      {unavail.length>0&&(
        <div style={{marginTop:5,fontSize:10,color:"var(--ss-danger)"}}>

      )}

  );

// OT_RELIEF_THRESHOLD is defined in the plain script block above (accessible globally)

function findOTReliefSuggestions(employees, schedule, extShifts, cfg) {
  const suggestions = [];
  const maxConsec   = MAX_CONSECUTIVE_HOURS;

  const hoursMap = {};
  employees.forEach(e => { hoursMap[e.id] = calcHours(e.id, schedule, extShifts); });

  const overloaded = employees.filter(e =>
    e.employmentType === "full-time" && hoursMap[e.id] > OT_RELIEF_THRESHOLD
  );
  // Pre-index used ext pairs for O(1) lookup instead of O(extShifts) scan per slot
  const usedExtPairs = new Set((extShifts||[]).map(e => e.day + "__" + e.pairId));

  for (const overEmp of overloaded) {
    for (const day of DAYS) {
      for (const shift of SHIFTS) {
        const key  = cellKey(day, shift.id);
        const asgn = schedule[key] || [];
        const myAsgn = asgn.find(a => a.employeeId === overEmp.id);
        if (!myAsgn) continue;

        const coveringPair = EXT_PAIRS.find(p => p.covers.includes(shift.id));
        if (!coveringPair) continue;

        if (usedExtPairs.has(day + "__" + coveringPair.id)) continue;

        const slotRoles = asgn
          .filter(a => a.position === "Scale" || a.position === "Medical")
          .map(a => a.position);
        const needsScale   = slotRoles.includes("Scale")   || myAsgn.position === "Scale";
        const needsMedical = slotRoles.includes("Medical") || myAsgn.position === "Medical";

        const candidates = employees.filter(c => {
          if (c.id === overEmp.id) return false;
          if ((c.unavailableDays||[]).includes(day)) return false;
          if ((c.blockedShifts||[]).includes(shift.id)) return false;
          if (c.requiredShift && c.requiredShift !== shift.id) return false;
          if (!canWorkExtHalf(c, coveringPair.id, 0) || !canWorkExtHalf(c, coveringPair.id, 1)) return false;
          const pos = getAvailPos(day, shift.id);
          if (!pos.some(p => c.qualifications.includes(p))) return false;
          const afterH = hoursMap[c.id] + EXT_SHIFT_HOURS;
          if (afterH > 56) return false;
          if (calcConsecutiveHours(c.id, schedule, day, shift.id) > empMaxConsec(c)) return false;
          return true;
        });

        for (let i = 0; i < candidates.length; i++) {
          for (let j = i + 1; j < candidates.length; j++) {
            const cA = candidates[i];
            const cB = candidates[j];

            const aQuals = cA.qualifications;
            const bQuals = cB.qualifications;
            if (needsScale   && !aQuals.includes("Scale")   && !bQuals.includes("Scale"))   continue;
            if (needsMedical && !aQuals.includes("Medical") && !bQuals.includes("Medical")) continue;

            const overHoursBefore = hoursMap[overEmp.id];
            const overHoursAfter  = overHoursBefore - SHIFT_HOURS;
            const aHoursAfter     = hoursMap[cA.id] + EXT_SHIFT_HOURS;
            const bHoursAfter     = hoursMap[cB.id] + EXT_SHIFT_HOURS;

            const overOTBefore = Math.max(0, overHoursBefore - FT_MIN_HOURS);
            if (Math.max(0, aHoursAfter - FT_MIN_HOURS) > overOTBefore) continue;
            if (Math.max(0, bHoursAfter - FT_MIN_HOURS) > overOTBefore) continue;

            const otBefore = overOTBefore
                           + Math.max(0, hoursMap[cA.id] - FT_MIN_HOURS)
                           + Math.max(0, hoursMap[cB.id] - FT_MIN_HOURS);
            const otAfter  = Math.max(0, overHoursAfter - FT_MIN_HOURS)
                           + Math.max(0, aHoursAfter - FT_MIN_HOURS)
                           + Math.max(0, bHoursAfter - FT_MIN_HOURS);
            const otReduction = otBefore - otAfter;
            if (otReduction <= 0) continue;

            suggestions.push({
              overEmp, day, shift, pairId: coveringPair.id, pair: coveringPair,
              empA: cA, empB: cB,
              overHoursBefore, overHoursAfter,
              aHoursBefore: hoursMap[cA.id], aHoursAfter,
              bHoursBefore: hoursMap[cB.id], bHoursAfter,
              otReduction, myAsgn,
            });

            if (suggestions.length >= 20) break;
          }
          if (suggestions.length >= 20) break;
        }
      }
    }
  }

  suggestions.sort((a, b) =>
    b.otReduction - a.otReduction ||
    (a.overHoursAfter + a.aHoursAfter + a.bHoursAfter) -
    (b.overHoursAfter + b.aHoursAfter + b.bHoursAfter)
  );

  return suggestions;
}

                    <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
                      {hoursBar(s.overHoursBefore, s.overHoursAfter,

                        flexShrink:0,marginBottom:14}}>→</div>

                      {hoursBar(s.bHoursBefore, s.bHoursAfter,

                    </div>

                    {}
                    <div style={{display:"flex",gap:4,marginTop:8,flexWrap:"wrap"}}>
                      {["Scale","Medical"].map(role => {
                        const covered = s.empA.qualifications.includes(role)
                                     || s.empB.qualifications.includes(role);

              {visible.length > 5 && (
                <div style={{fontSize:10,color:"var(--ss-text-dim)",textAlign:"center",padding:"6px 0"}}>
                  +{visible.length-5} more suggestions — approve or dismiss above to see them
                </div>
              )}
            </div>
          </div>
        );
}
function CoverageDashboard({ navigateToWeek }) {
  const { setActiveTab } = useUI();
  const { employees } = useRoster();
  const { schedule, setSchedule, extShifts, setExtShifts } = useSchedule();
  const { history } = useHistory();
  const t = useTheme();
  const cfg = useSettings();
  const [quickFilling, setQuickFilling] = useState(null);

  const analysis = useMemo(() => {
    const gaps = [];
    const empStats = {};

    employees.forEach(e => {
      empStats[e.id] = { emp: e, hours: 0, shifts: 0, nights: 0,
        fatigueIssues: getFatigueIssues(e.id, schedule, cfg, employees, extShifts||[]).length };
    });

    let totalEmpty = 0, totalMissingRole = 0, totalPartial = 0, totalOk = 0;

    DAYS.forEach(day => {
      SHIFTS.forEach(shift => {
        const asgn     = schedule[cellKey(day, shift.id)] || [];
        const max      = getSlotCount(day, shift.id);
        const hasScale = slotHasRole(asgn, employees, "Scale");
        // Supervisor counts as Medical for coverage display purposes
        const hasMed   = slotHasRole(asgn, employees, "Medical") || asgn.some(a => a.position === "Supervisor");
        const filled   = asgn.length;
        const openSlots = max - filled;

        asgn.forEach(a => {
          if (empStats[a.employeeId]) {
            empStats[a.employeeId].hours += SHIFT_HOURS;
            empStats[a.employeeId].shifts++;
            if (shift.id === "third") empStats[a.employeeId].nights++;
          }
        });

        const cellExt    = (extShifts||[]).filter(e => extCovers(e, day, shift.id));
        const extScale   = cellExt.some(e => (e.roles||[]).includes("Scale"));
        const extMedical = cellExt.some(e => (e.roles||[]).includes("Medical"));
        const extFilled  = cellExt.reduce((n, e) => n + (e.empAId ? 1 : 0) + (e.empBId ? 1 : 0), 0);
        const effFilled  = Math.min(filled + extFilled, max);
        const effHasScale = hasScale  || extScale;
        const effHasMed   = hasMed || extMedical;
        const effOpen     = max - effFilled;

        if (!effFilled) {
          totalEmpty++;
          gaps.push({ day, shiftId: shift.id, type: "empty", severity: 3,
            label: "Completely unstaffed", openSlots: max, hasScale: effHasScale, hasMed: effHasMed,
            missingRoles: ["Scale","Medical"] });
        } else {
          const missing = [...(!effHasScale?["Scale"]:[]),...(!effHasMed?["Medical"]:[])];
          if (missing.length) {
            totalMissingRole++;
            gaps.push({ day, shiftId: shift.id, type: "missing_role", severity: 2,
              label: `Missing: ${missing.join(" & ")}`, openSlots: effOpen, hasScale: effHasScale, hasMed: effHasMed,
              missingRoles: missing });
          } else if (effFilled < max) {
            totalPartial++;
            gaps.push({ day, shiftId: shift.id, type: "partial", severity: 1,
              label: `${effOpen} open slot${effOpen>1?"s":""}`, openSlots: effOpen, hasScale: effHasScale, hasMed: effHasMed,
              missingRoles: [] });
          } else {
            totalOk++;
          }
        }
      });
    });

    gaps.sort((a,b) => b.severity - a.severity || slotIndex(a.day,a.shiftId) - slotIndex(b.day,b.shiftId));

    const ftUnderHours = employees.filter(e =>
      e.employmentType === "full-time" && (empStats[e.id]?.hours||0) < FT_MIN_HOURS);

    const overtimeEmps = employees
      .filter(e => (empStats[e.id]?.hours||0) > FT_MIN_HOURS)
      .map(e => ({ emp: e, hours: empStats[e.id].hours, ot: empStats[e.id].hours - FT_MIN_HOURS }))
      .sort((a,b) => b.ot - a.ot);
    const totalOTHours = overtimeEmps.reduce((s, x) => s + x.ot, 0);

    const totalSlots   = DAYS.reduce((s,d) => s + SHIFTS.reduce((ss,sh) => ss + getSlotCount(d,sh.id), 0), 0);
    const shiftsPerFT  = FT_MIN_HOURS / SHIFT_HOURS;
    const idealFTTotal = Math.ceil(totalSlots / shiftsPerFT);

    const scaleSlots      = DAYS.length * SHIFTS.length;
    const medicalSlots    = scaleSlots;
    const idealMinScale      = Math.ceil(scaleSlots / shiftsPerFT);
    const idealMinMedical    = Math.ceil(medicalSlots / shiftsPerFT);

    const currFT         = employees.filter(e => e.employmentType === "full-time");
    const currFTTotal    = currFT.length;
    const currScale      = currFT.filter(e => e.qualifications.includes("Scale")).length;
    const currMedical    = currFT.filter(e => e.qualifications.includes("Medical")).length;
    const currSupervisor = 0;
    const currGuardOnly  = currFT.filter(e =>
      !e.qualifications.includes("Scale") &&
      !e.qualifications.includes("Medical")
    ).length;
    const idealGuardOnly = Math.max(0, idealFTTotal - Math.max(idealMinScale, idealMinMedical));

    const idealModel = {
      totalSlots, shiftsPerFT, idealFTTotal,
      roles: [
        { role:"Scale",      ideal:idealMinScale,      current:currScale,
          note:"One Scale per shift × 21 shifts ÷ 5 shifts/FT" },
        { role:"Medical",    ideal:idealMinMedical,    current:currMedical,
          note:"One Medical per shift × 21 shifts ÷ 5 shifts/FT" },

        { role:"Guard-only", ideal:idealGuardOnly,     current:currGuardOnly,
          note:"Remaining slots filled by Guard-qualified staff" },
      ],
      currFTTotal,
      ftGap: idealFTTotal - currFTTotal,
    };

    return { gaps, empStats, totalEmpty, totalMissingRole, totalPartial, totalOk,
             ftUnderHours, totalShifts: DAYS.length * SHIFTS.length,
             overtimeEmps, totalOTHours, idealModel };
  }, [employees, schedule, extShifts]);

  const otReliefSuggestions = useMemo(() =>
    findOTReliefSuggestions(employees, schedule, extShifts, cfg),
  [employees, schedule, extShifts]);

  const approveOTRelief = useCallback((s) => {
    setSchedule(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const key  = cellKey(s.day, s.shift.id);
      next[key]  = (next[key] || []).filter(a => a.employeeId !== s.overEmp.id);
      return next;
    });
    setExtShifts(prev => [...(prev||[]), {
      pairId:      s.pairId,
      day:         s.day,
      empAId:      s.empA.id,
      empBId:      s.empB.id,
      roles:       [s.empA,s.empB].flatMap(e=>["Scale","Medical"].filter(r=>e.qualifications.includes(r))),
      approvedAt:  new Date().toLocaleDateString(),
      otRelief:    true,
      relievedEmpId: s.overEmp.id,
    }]);
  }, [setSchedule, setExtShifts]);

  const historyStats = useMemo(() => {
    if (!history || !history.length) return [];
    const byWeek = {};
    [...history].sort((a,b)=>a.savedAt.localeCompare(b.savedAt)).forEach(h => {
      if (!byWeek[h.weekStart] || !h.isAutoSave) byWeek[h.weekStart] = h;
    });
    return Object.values(byWeek)
      .sort((a,b) => a.weekStart.localeCompare(b.weekStart))
      .map(h => ({
        weekStart: h.weekStart,
        label: weekRangeLabel(h.weekStart),
        isNamed: !h.isAutoSave,
        snapshotLabel: h.label,
        ...computeWeekStats(h.schedule, employees, h.extShifts||[]),
      }));
  }, [history, employees]);

  const quickFill = useCallback((day, shiftId, neededRole) => {
    setQuickFilling({ day, shiftId });
    const key = cellKey(day, shiftId);
    const cur = schedule[key] || [];
    const max = getEffectiveSlotCount(day, shiftId, extShifts);
    if (cur.length >= max) { setQuickFilling(null); return; }
    const usedIds  = new Set(cur.map(a => a.employeeId));
    const avail    = getAvailPos(day, shiftId);
    const candidates = employees
      .filter(e => {
        if (usedIds.has(e.id)) return false;
        if ((e.unavailableDays||[]).includes(day)) return false;
        if (isRestViolation(e, calcRestGap(e.id,schedule,day,shiftId), cfg?.minRestHours??MIN_REST_HOURS)) return false;
      if (calcConsecutiveHours(e.id,schedule,day,shiftId) > empMaxConsec(e)) return false;
        if (shiftId==="third" && calcConsecutiveNights(e.id,schedule,day,shiftId)>=(cfg?.maxConsecutiveNights??MAX_CONSECUTIVE_NIGHTS)) return false;
        return avail.some(p => e.qualifications.includes(p));
      })
      .map(e => {
        const qualPos     = avail.filter(p => e.qualifications.includes(p));
        const fillsNeeded = neededRole && qualPos.includes(neededRole);
        const hours       = calcHours(e.id, schedule, extShifts);
        const underHours  = e.employmentType==="full-time" && hours < FT_MIN_HOURS;
        const score       = (fillsNeeded?100:0) + (underHours?10:0) - (hours/8);
        const pos         = fillsNeeded ? neededRole : (qualPos.includes("Guard")?"Guard":qualPos[0]);
        return { emp: e, pos, score };
      })
      .sort((a,b) => b.score - a.score);

    if (candidates.length) {
      const { emp, pos } = candidates[0];
      setSchedule(p => ({ ...p, [key]: [...(p[key]||[]), { employeeId: emp.id, position: pos }] }));
    }
    setTimeout(() => setQuickFilling(null), 600);
  }, [employees, schedule, setSchedule]);

  const jumpToShift = (day, shiftId) => setActiveTab("schedule", { day, shiftId });

  const cellColors = (day, shiftId) => {
    const asgn = schedule[cellKey(day,shiftId)] || [];
    const max  = getEffectiveSlotCount(day, shiftId, extShifts);
    if (!asgn.length)                                           return { bg:"var(--ss-danger-22)",  border:"var(--ss-danger-55)",  dot:"var(--ss-danger)"  };

    const hasMed   = slotHasRole(asgn, employees, "Medical");

    if (asgn.length < max)                                      return { bg:"var(--ss-accent-12)",  border:"var(--ss-accent-40)",  dot:"var(--ss-accent)"  };
    return                                                             { bg:"var(--ss-scale-10)",   border:"var(--ss-scale-35)",   dot:"var(--ss-scale)"   };
  };
  const sevColor  = (s) => s===3?"var(--ss-danger)":s===2?"var(--ss-warning)":"var(--ss-accent)";
  const sevLabel  = (s) => s===3?"EMPTY":s===2?"ROLE GAP":"PARTIAL";
  const scoreColor= (pct) => pct>=1?"var(--ss-scale)":pct>=.75?"var(--ss-accent)":pct>=.5?"var(--ss-warning)":"var(--ss-danger)";

  const totalFatigue  = employees.filter(e => (analysis.empStats[e.id]?.fatigueIssues||0) > 0).length;
  const coveragePct   = analysis.totalShifts > 0 ? analysis.totalOk / analysis.totalShifts : 0;

  const cards = [
    { label:"COVERAGE SCORE",   icon:"◉",
      value:`${Math.round(coveragePct*100)}%`,
      sub:`${analysis.totalOk} / ${analysis.totalShifts} shifts fully staffed`,
      color: scoreColor(coveragePct) },
    { label:"OPEN ISSUES",      icon:"\u26a0",
      value: analysis.gaps.length,
      sub:`${analysis.totalEmpty} empty · ${analysis.totalMissingRole} role gap · ${analysis.totalPartial} partial`,
      color: analysis.gaps.length===0?"var(--ss-scale)":analysis.totalEmpty>0?"var(--ss-danger)":"var(--ss-warning)" },
    { label:"FATIGUE RISK",     icon:"\u25d1",
      value: totalFatigue,
      sub: totalFatigue===0?"No fatigue warnings this week":`${totalFatigue} staff with scheduling concerns`,
      color: totalFatigue===0?"var(--ss-scale)":"var(--ss-fatigue)" },
    { label:"HOURS COMPLIANCE", icon:"\u25f7",
      value: analysis.ftUnderHours.length===0?"\u2713":`${analysis.ftUnderHours.length} FT`,
      sub: analysis.ftUnderHours.length===0?"All FT staff at 40h target"
        :`Under 40h: ${analysis.ftUnderHours.map(e=>e.name.split(" ")[0]).join(", ")}`,
      color: analysis.ftUnderHours.length===0?"var(--ss-scale)":"var(--ss-danger)" },
    { label:"OVERTIME THIS WEEK", icon:"\u23f1",
      value: analysis.totalOTHours===0?"\u2013":`+${analysis.totalOTHours}h`,
      sub: analysis.overtimeEmps.length===0?"No overtime scheduled"
        :`${analysis.overtimeEmps.length} staff · ${analysis.overtimeEmps.map(e=>e.emp.name.split(" ")[0]+"(+"+e.ot+"h)").join(", ")}`,
      color: analysis.totalOTHours===0?"var(--ss-scale)":analysis.totalOTHours>16?"var(--ss-danger)":"var(--ss-warning)" },
  ];

  return (
    <div>
      {}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:12,marginBottom:24}}>
        {cards.map(card => (
          <div key={card.label} style={{background:"var(--ss-surface)",border:"1px solid "+card.color+"40",
            borderRadius:8,padding:"16px 20px",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:10,right:14,fontSize:32,opacity:.07,
              color:card.color,fontWeight:900,userSelect:"none"}}>{card.icon}</div>
            <div style={{fontSize:9,color:"var(--ss-text-dim)",fontWeight:700,letterSpacing:".1em",marginBottom:6}}>{card.label}</div>
            <div style={{fontSize:30,fontWeight:800,color:card.color,lineHeight:1,marginBottom:4}}>{card.value}</div>
            <div style={{fontSize:10,color:"var(--ss-text-muted)",lineHeight:1.4}}>{card.sub}</div>
          </div>
        ))}
      </div>

      {}
      {historyStats.length > 0 && (() => {
        const [trendTab, setTrendTab] = useState("chart");
        const [sortCol,  setSortCol]  = useState("weekStart");
        const [sortAsc,  setSortAsc]  = useState(false);

        const METRICS = [
          { key:"coveragePct",     label:"Coverage",    unit:"%",  good:"high", color: "var(--ss-scale)" },
          { key:"totalOTHours",    label:"OT Hours",    unit:"h",  good:"low",  color: "var(--ss-warning)" },
          { key:"underHoursFT",    label:"Under-40h FT",unit:"",   good:"low",  color: "var(--ss-danger)" },
          { key:"totalViolations", label:"Violations",  unit:"",   good:"low",  color: "var(--ss-fatigue)" },
          { key:"totalEmpty",      label:"Empty Shifts",unit:"",   good:"low",  color: "var(--ss-danger)" },

            <svg width={W} height={H} style={{overflow:"visible",cursor:"pointer"}}>
              {vals.map((v, i) => {
                const h = Math.max(2, Math.round((v/max)*H));
                const x = i*(barW+2);
                const isLast = i===vals.length-1;
                const isHov  = hovered===i;
                return (
                  <g key={i}
                    onMouseEnter={()=>setHovered(i)}
                    onMouseLeave={()=>setHovered(null)}
                    onClick={(e)=>{ e.stopPropagation(); navigateToWeek(historyStats[i].weekStart); }}
                    style={{cursor:"pointer"}}>
                    <title>{"Go to "+historyStats[i].label+": "+v+unit}</title>
                    <rect x={x} y={H-h} width={barW} height={h} rx={1}
                      fill={isHov ? color : isLast ? color : color+"55"}
                      stroke={isHov||isLast ? color : "none"}
                      strokeWidth={isHov||isLast?1.5:0}
                      opacity={isHov?1:isLast?1:0.65}/>
                    {isHov && (
                      <rect x={x-1} y={0} width={barW+2} height={H}
                        fill={color} opacity={0.12} rx={1}/>
                    )}
                  </g>
                );
              })}
            </svg>
          );
        };

        const Trend = ({ metricKey, good }) => {
          if (historyStats.length < 2) return null;

          const curr = historyStats[historyStats.length-1][metricKey] ?? 0;

          const up = delta > 0;
          const good_direction = good==="high" ? up : !up;
          return (
            <span style={{fontSize:10,fontWeight:700,color:good_direction?"var(--ss-scale)":"var(--ss-danger)"}}>

            </span>
          );
        };

        const sorted = [...historyStats].sort((a,b)=>{
          const v = a[sortCol]<b[sortCol]?-1:a[sortCol]>b[sortCol]?1:0;
          return sortAsc?v:-v;
        });

        const thStyle = (col) => ({

          letterSpacing:".05em", padding:"6px 8px", textAlign:"right",
          cursor:"pointer", userSelect:"none", whiteSpace:"nowrap",
          borderBottom:"2px solid "+(sortCol===col?"var(--ss-accent)":"var(--ss-border)"),
        });

        return (
          <div style={{background:"var(--ss-surface)",border:"1px solid var(--ss-border)",borderRadius:8,
            padding:18,marginBottom:24}}>

            {}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
              marginBottom:16,flexWrap:"wrap",gap:10}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:"var(--ss-text-muted)",letterSpacing:".06em"}}>

                  {historyStats.length} week{historyStats.length!==1?"s":""} of history

                        </div>
                      )}
                    </div>
                  );
                })}

            )}

            {trendTab==="table" && (
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                  <thead>
                    <tr style={{background:"var(--ss-surface-alt)"}}>
                      <th onClick={()=>{setSortCol("weekStart");setSortAsc(s=>!s);}}
                        style={{...thStyle("weekStart"),textAlign:"left",paddingLeft:12}}>

                      </th>
                      {METRICS.map(m=>(
                        <th key={m.key} onClick={()=>{setSortCol(m.key);setSortAsc(s=>!s);}}
