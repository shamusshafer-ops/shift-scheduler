                ? `✓ Compatible — covers: ${combined.filter(q=>["Scale","Medical"].includes(q)).join(" + ")}`
                : `⚠ Missing: ${["Scale","Medical"].filter(r=>!combined.includes(r)).join(" + ")} — pair won't meet shift requirements`}
          </div>
        )}

        {}
        {(empAId || (mode==="suggest" && empAId)) && (isSwing || empBId) && (
          <div style={{marginTop:14,background:"var(--ss-surface-alt)",borderRadius:6,overflow:"hidden",
            border:"1px solid var(--ss-border)"}}>
            <div style={{display:"flex",height:28}}>
              <div style={{flex:1,background:"#7c3aed30",borderRight:"2px solid #7c3aed",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,
                fontWeight:700,color:"#7c3aed"}}>
                {employees.find(e=>e.id===empAId)?.name.split(" ")[0]} · {pairId==="day"?"0600–1800":pairId==="split"?"1400–0200":"1800–0600"}
              </div>
              <div style={{flex:1,background:"#0e749018",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,
                fontWeight:700,color:"#0e7490"}}>
                {employees.find(e=>e.id===empBId)?.name.split(" ")[0]} · {pairId==="day"?"1800–0600":pairId==="split"?"0200–1400 (+1d)":"0600–1800"}
              </div>
            </div>
          </div>
        )}

        {(()=>{
          // Warn if any selected employee already has a regular schedule assignment on this day
          // that falls OUTSIDE the ext pair's dedup window — those hours will stack, not replace.
          const warnings = [];
          [[empAId, pair?.covers], [empBId, pair?.coversB || pair?.covers]].forEach(([eid, coveredShifts]) => {
            if (!eid || !coveredShifts) return;
            const emp = employees.find(e => e.id === eid);
            if (!emp) return;
            const daySlots = Object.entries(schedule)
              .filter(([key]) => key.startsWith(day+"__"))
              .filter(([, asgn]) => asgn.some(x => x.employeeId === eid));
            daySlots.forEach(([key]) => {
              const shiftId = key.split("__")[1];
              if (!coveredShifts.includes(shiftId)) {
                const label = {first:"1st",second:"2nd",third:"3rd"}[shiftId] || shiftId;
                warnings.push(`${emp.name} has a regular ${label} shift on ${day} that won't be replaced — hours will stack.`);
              }
            });
          });
          if (!warnings.length) return null;
          return (
            <div style={{marginTop:14,background:"var(--ss-danger-18)",border:"1px solid var(--ss-danger-50)",
              borderRadius:6,padding:"10px 14px",fontSize:11,color:"var(--ss-danger)",fontWeight:600,lineHeight:1.6}}>

              {warnings.map((w,i)=><div key={i} style={{marginTop:4,paddingLeft:10}}>• {w}</div>)}
            </div>
          );
        })()}

        {}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:24}}>

            style={{background:"transparent",color:"var(--ss-text-muted)",border:"1px solid var(--ss-border)",
              padding:"9px 20px",borderRadius:6,cursor:"pointer",fontSize:12,
              fontWeight:600,fontFamily:"inherit"}}>
            CANCEL

            style={{background:canSubmit?"#7c3aed":"var(--ss-border)",color:canSubmit?"#fff":"var(--ss-text-dim)",
              border:"none",padding:"9px 22px",borderRadius:6,cursor:canSubmit?"pointer":"default",
              fontSize:12,fontWeight:700,fontFamily:"inherit",transition:"background .2s"}}>
            {isSwing ? "⏱ CONFIRM SWING" : "⏱ CONFIRM PAIRING"}
          </button>
        </div>
      </div>
    </div>
  );
}

function PreferenceEditor({ prefShifts, setPrefShifts, blockedShifts, setBlockedShifts, requiredShift, setRequiredShift, daysOff, setDaysOff }) {

  const toggleDay = (day) => {
    if (daysOff.includes(day)) {
      setDaysOff(daysOff.filter(d => d !== day));
    } else {
      const next = daysOff.length < 2 ? [...daysOff, day] : [daysOff[1], day];
      setDaysOff(next);
    }
  };

  const suggestPair = (startIdx) => {
    setDaysOff([DAYS[startIdx % 7], DAYS[(startIdx + 1) % 7]]);

    if ((blockedShifts||[]).includes(sid)) return;
    const cur = prefShifts||[];

      if (requiredShift===sid) setRequiredShift(null);

function buildViolationList(employees, schedule, extShiftsArg) {
  const SEVERITY = { supervisor_missing: -1, wrong_shift_required: 0, unavailable: 1, days_off: 2, wrong_shift: 3, overwork: 4, under_hours: 5 };
  const items = [];
  // O(1) employee lookup — avoids O(N) find inside slot loops
  const empMap = new Map(employees.map(e => [e.id, e]));
  // Set of supervisor employee IDs for O(1) supervisor check
  const supervisorIds = new Set(employees.filter(e => (e.qualifications||[]).includes("Supervisor")).map(e => e.id));
  // Pre-index assigned slots per employee: empId → [{day, shiftId, position}]
  const empSlots = new Map(employees.map(e => [e.id, []]));
  for (const [key, asgn] of Object.entries(schedule)) {
    const [day, shiftId] = key.split("__");
    for (const a of asgn) {
      if (empSlots.has(a.employeeId)) empSlots.get(a.employeeId).push({ day, shiftId, position: a.position });
    }
  }

  WEEKDAYS.forEach(day => {
    const asgn = schedule[cellKey(day, "first")] || [];
    for (const empId of supervisorIds) {
      const emp = empMap.get(empId);
      if (!emp || (emp.unavailableDays||[]).includes(day)) continue;
      if (asgn.some(a => a.employeeId === empId)) continue;
      items.push({ emp, day, shiftId: "first", position: null,
        type: "supervisor_missing", severity: -1,
        msg: `Supervisor not scheduled for 1st shift on ${day}` });
    }
  });

  employees.forEach(emp => {
    if (emp.employmentType !== "full-time") return;
    const hrs = calcHours(emp.id, schedule, extShiftsArg || []);
    if (hrs >= FT_MIN_HOURS) return;
    const needed = Math.ceil((FT_MIN_HOURS - hrs) / SHIFT_HOURS);

    const candidateSlots = [];
    ALL_SLOTS.forEach(({ day, shiftId }) => {
      if ((emp.unavailableDays||[]).includes(day)) return;
      if ((emp.blockedShifts||[]).includes(shiftId)) return;
      if (emp.requiredShift && emp.requiredShift !== shiftId) return;
      const asgn = schedule[cellKey(day, shiftId)] || [];
      if (asgn.some(a => a.employeeId === emp.id)) return;
      if (!getAvailPos(day, shiftId).some(p => emp.qualifications.includes(p))) return;
      const isFull = asgn.length >= getEffectiveSlotCount(day, shiftId, extShiftsArg);
      const hasPTBumpable = isFull && asgn.some(a => {
        const peer = empMap.get(a.employeeId);
        return peer && peer.employmentType !== "full-time";
      });
      candidateSlots.push({ day, shiftId, isFull, hasPTBumpable });
    });

    candidateSlots.sort((a, b) => {
      if (!a.isFull && b.isFull) return -1;
      if (a.isFull && !b.isFull) return 1;
      if (a.hasPTBumpable && !b.hasPTBumpable) return -1;
      if (!a.hasPTBumpable && b.hasPTBumpable) return 1;
      return 0;
    });

    const targets = candidateSlots.filter(s => !s.isFull || s.hasPTBumpable).slice(0, needed);

    if (targets.length > 0) {
      targets.forEach(({ day, shiftId, isFull }) => {
        items.push({ emp, day, shiftId, position: null, type: "under_hours",
          severity: SEVERITY.under_hours,
          msg: `Under 40h (${hrs}h) — ${isFull ? "can swap a PT employee on" : "open slot on"} ${day}` });
      });
    } else {
      items.push({ emp, day: DAYS[0], shiftId: "first", position: null, type: "under_hours",
        severity: SEVERITY.under_hours,
        msg: `Under 40h (${hrs}h) — no available slots this week to fill` });
    }
  });

  // Use pre-indexed empSlots — O(assigned) instead of O(employees × allSlots)
  for (const emp of employees) {
    for (const { day, shiftId, position } of (empSlots.get(emp.id) || [])) {
      if ((emp.unavailableDays || []).includes(day)) {
        items.push({ emp, day, shiftId, position, type: "unavailable",
          severity: SEVERITY.unavailable, msg: `Unavailable on ${day}` });
        continue;
      }
      const v = getPreferenceViolations(emp, day, shiftId, schedule);
      for (const viol of v) {
        items.push({ emp, day, shiftId, position,
          type: viol.type, severity: SEVERITY[viol.type] ?? 99, msg: viol.msg });
      }
    }
  }

  items.sort((a, b) =>
    a.severity !== b.severity ? a.severity - b.severity :
    a.emp.name.localeCompare(b.emp.name) ||
    DAYS.indexOf(a.day) - DAYS.indexOf(b.day)
  );
  return items;
}

function tryFixViolation(item, employees, schedule, cfg, extShiftsArg) {
  const { emp, day, shiftId, position, type } = item;
  const key = cellKey(day, shiftId);
  const ns = JSON.parse(JSON.stringify(schedule));

  const isAssigned = (empId, d, s, sched) =>
    (sched[cellKey(d, s)] || []).some(a => a.employeeId === empId);

  const hasConflict = (candidate, d, s) => {
    if ((candidate.unavailableDays || []).includes(d)) return true;
    if (candidate.requiredShift && candidate.requiredShift !== s) return true;
    if ((candidate.blockedShifts||[]).includes(s)) return true;
    if (violatesDaysOff(candidate, d)) return true;
    return false;
  };

  const isQualified = (candidate, d, s) =>
    getAvailPos(d, s).some(p => candidate.qualifications.includes(p));

  if (type === "wrong_shift_required" || type === "wrong_shift" || type === "blocked_shift") {
    const prefs = emp.requiredShift ? [emp.requiredShift]
                : (emp.preferredShifts||[]).length > 0 ? emp.preferredShifts
                : SHIFTS.map(s=>s.id).filter(s=>(emp.blockedShifts||[]).includes(s)===false && s!==shiftId);
    const prefShift = prefs.find(s => s !== shiftId) || null;
    if (!prefShift) return null;

    const prefKey = cellKey(day, prefShift);
    const prefAsgn = ns[prefKey] || [];
    const maxSlots = getSlotCount(day, prefShift);
    const availPos = getAvailPos(day, prefShift).filter(p => emp.qualifications.includes(p));

    if (availPos.length === 0) return null;

    if (prefAsgn.length < maxSlots && !prefAsgn.some(a => a.employeeId === emp.id)) {
      // Preferred slot has room — move employee there directly
      ns[key] = (ns[key] || []).filter(a => a.employeeId !== emp.id);
      const usedPositions = new Set(prefAsgn.map(a => a.position));
      const pos = availPos.find(p => !usedPositions.has(p)) || availPos[0];
      ns[prefKey] = [...prefAsgn, { employeeId: emp.id, position: pos }];
      const vacatedPos = position;
      const replacements = employees.filter(c =>
        c.id !== emp.id &&
        !isAssigned(c.id, day, shiftId, ns) &&
        getAvailPos(day, shiftId).includes(vacatedPos) && c.qualifications.includes(vacatedPos) &&
        !hasConflict(c, day, shiftId)
      );
      if (replacements.length > 0) {
        ns[key] = [...(ns[key] || []), { employeeId: replacements[0].id, position: vacatedPos }];
      }
      return ns;
    }

    // Preferred slot is full — try swapping out a PT or non-conflicting employee to make room
    if (prefAsgn.length >= maxSlots && !prefAsgn.some(a => a.employeeId === emp.id)) {
      const swapOut = prefAsgn.find(a => {
        const peer = employees.find(e => e.id === a.employeeId);
        if (!peer) return false;
        if (peer.employmentType !== "full-time") return true; // prefer bumping PT
        if (peer.requiredShift && peer.requiredShift !== prefShift) return false;
        return !hasConflict(peer, day, shiftId); // can the bumped person go to the current shift instead?
      });
      if (!swapOut) return null;
      const swapPeer = employees.find(e => e.id === swapOut.employeeId);
      if (!swapPeer) return null;
      // Remove swapOut from preferred slot, add emp
      const usedPositions = new Set(prefAsgn.filter(a => a !== swapOut).map(a => a.position));
      const pos = availPos.find(p => !usedPositions.has(p)) || availPos[0];
      ns[prefKey] = [...prefAsgn.filter(a => a !== swapOut), { employeeId: emp.id, position: pos }];
      ns[key] = (ns[key] || []).filter(a => a.employeeId !== emp.id);
      // Try to place the bumped employee in the vacated slot
      const bumpedPos = getAvailPos(day, shiftId).filter(p => swapPeer.qualifications.includes(p));
      if (bumpedPos.length > 0 && !hasConflict(swapPeer, day, shiftId)) {
        const usedCur = new Set((ns[key]||[]).map(a => a.position));
        const bPos = bumpedPos.find(p => !usedCur.has(p)) || bumpedPos[0];
        ns[key] = [...(ns[key]||[]), { employeeId: swapPeer.id, position: bPos }];
      }
      return ns;
    }
    return null;
  }

  if (type === "supervisor_missing") {
    const key3 = cellKey(day, "first");
    const asgn3 = ns[key3] || [];
    if (asgn3.some(a => a.employeeId === emp.id)) return null;
    if (isRestViolation(emp, calcRestGap(emp.id, ns, day, "first"), cfg?.minRestHours ?? 12)) return null;
    if (calcConsecutiveHours(emp.id, ns, day, "first") > empMaxConsec(emp)) return null;
    const maxSlots = getSlotCount(day, "first");
    if (asgn3.length >= maxSlots) return null; // slot full, can't add
    const pos3 = (emp.qualifications||[]).includes("Supervisor") ? "Supervisor" : "Guard";
    ns[key3] = [...asgn3, { employeeId: emp.id, position: pos3 }];
    return ns;
  }

  if (type === "under_hours") {
    const key2   = cellKey(day, shiftId);
    const asgn2  = ns[key2] || [];
    if (asgn2.some(a => a.employeeId === emp.id)) return null;
    const availPos2 = getAvailPos(day, shiftId).filter(p => canFillPos(emp, p, day));
    if (!availPos2.length) return null;
    if (isRestViolation(emp, calcRestGap(emp.id, ns, day, shiftId), cfg?.minRestHours ?? 12)) return null;
    if (calcConsecutiveHours(emp.id, ns, day, shiftId, extShiftsArg) > empMaxConsec(emp)) return null;
    const isFull = asgn2.length >= getEffectiveSlotCount(day, shiftId, extShiftsArg);
    if (isFull) {
      const ptIdx = asgn2.findIndex(a => {
        const peer = employees.find(e => e.id === a.employeeId);
        return peer && peer.employmentType !== "full-time";
      });
      if (ptIdx === -1) return null;
      const bumped = asgn2[ptIdx];
      ns[key2] = asgn2.filter((_, i) => i !== ptIdx);
      const usedPos3 = new Set(ns[key2].map(a => a.position));
      const pos3 = availPos2.find(p => p === bumped.position)
                || availPos2.find(p => !usedPos3.has(p))
                || availPos2[0];
      ns[key2] = [...ns[key2], { employeeId: emp.id, position: pos3 }];
      return ns;
    }

    const usedPos = new Set(asgn2.map(a => a.position));
    const needsScale   = !asgn2.some(a => a.position === "Scale");
    const needsMedical = !asgn2.some(a => a.position === "Medical");
    const pos = availPos2.find(p => needsScale && p === "Scale")
             || availPos2.find(p => needsMedical && p === "Medical")
             || availPos2.find(p => !usedPos.has(p))
             || availPos2[0];
    ns[key2] = [...asgn2, { employeeId: emp.id, position: pos }];
    return ns;
  }

  if (type === "days_off" || type === "unavailable" || type === "overwork") {
    ns[key] = (ns[key] || []).filter(a => a.employeeId !== emp.id);
    const replacements = employees.filter(c =>
      c.id !== emp.id &&
      !isAssigned(c.id, day, shiftId, ns) &&
      c.qualifications.includes(position) &&
      getAvailPos(day, shiftId).includes(position) &&
      !hasConflict(c, day, shiftId) &&
      isRestViolation(c, calcRestGap(c.id, ns, day, shiftId), cfg?.minRestHours ?? 12) === false &&
      calcConsecutiveHours(c.id, ns, day, shiftId) <= empMaxConsec(c)
    );
    if (replacements.length > 0) {
      ns[key] = [...(ns[key] || []), { employeeId: replacements[0].id, position }];
      return ns;
    }
    return ns;
  }

  return null;
}

function MinimizeViolationsPanel({ onClose }) {
  const { employees } = useRoster();
  const { schedule, setSchedule, extShifts } = useSchedule();
  const t = useTheme();
  const cfg = useSettings();

  const violations = useMemo(() => buildViolationList(employees, schedule, extShifts), [employees, schedule, extShifts]);

  const [fixedIds, setFixedIds] = useState(new Set());
  const [unfixableIds, setUnfixableIds] = useState(new Set());

  const itemKey = (item) => `${item.emp.id}__${item.day}__${item.shiftId}__${item.type}`;

  const fixOne = (item) => {
    const result = tryFixViolation(item, employees, schedule, cfg, extShifts);
    if (result) {
      setSchedule(result);
      setFixedIds(s => new Set([...s, itemKey(item)]));
    } else {
      setUnfixableIds(s => new Set([...s, itemKey(item)]));
    }
  };

  const fixAll = () => {
    let cur = JSON.parse(JSON.stringify(schedule));
    const nowFixed = new Set(fixedIds);
    const nowUnfix = new Set(unfixableIds);
    const items = buildViolationList(employees, cur, extShifts);
    items.forEach(item => {
      if (nowFixed.has(itemKey(item))) return;
      const result = tryFixViolation(item, employees, cur, cfg, extShifts);
      if (result) { cur = result; nowFixed.add(itemKey(item)); }
      else nowUnfix.add(itemKey(item));
    });
    setSchedule(cur);
    setFixedIds(nowFixed);
    setUnfixableIds(nowUnfix);
  };

  const TYPE_META = {
    wrong_shift_required: { label: "REQUIRED SHIFT",  color: (t) => "var(--ss-danger)" },
    unavailable:          { label: "UNAVAILABLE",      color: (t) => "var(--ss-danger)" },
    days_off:             { label: "PREF DAY OFF",     color: (t) => "var(--ss-warning)" },
    wrong_shift:          { label: "WRONG SHIFT",      color: (t) => "var(--ss-warning)" },
    overwork:             { label: "OVERWORK",         color: (t) => "var(--ss-fatigue)" },
    under_hours:          { label: "UNDER 40H",        color: (t) => "var(--ss-danger)" },
    supervisor_missing:   { label: "SUP MISSING",      color: (t) => "var(--ss-danger)" },
  };

  const activeViolations = violations.filter(v => !fixedIds.has(itemKey(v)));
  const fixableCount = activeViolations.filter(v => !unfixableIds.has(itemKey(v))).length;

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.72)",display:"flex",
      alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
      <div style={{background:"var(--ss-surface)",border:"1px solid var(--ss-border)",borderRadius:12,
        padding:28,maxWidth:620,width:"100%",maxHeight:"85vh",display:"flex",
        flexDirection:"column",boxShadow:"0 24px 64px rgba(0,0,0,0.55)"}}>

        {}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {Icon("wrench", {size:20, color:"var(--ss-accent)"})}
            <h2 style={{margin:0,fontSize:16,fontWeight:700,color:"var(--ss-text)"}}>MINIMIZE VIOLATIONS</h2>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",
            color:"var(--ss-text-dim)",cursor:"pointer",fontSize:18,padding:4}}>✕</button>
        </div>
        <p style={{margin:"0 0 16px",fontSize:11,color:"var(--ss-text-muted)",flexShrink:0}}>
          {violations.length === 0
            ? "No violations found — schedule looks clean."
            : `${violations.length} violation${violations.length!==1?"s":""} found across ${new Set(violations.map(v=>v.emp.id)).size} employee${new Set(violations.map(v=>v.emp.id)).size!==1?"s":""}.`}
        </p>

        {violations.length > 0 && (
          <div style={{display:"flex",gap:8,marginBottom:16,flexShrink:0,flexWrap:"wrap",alignItems:"center"}}>
            <button onClick={fixAll}
              style={{background:"var(--ss-scale)",color:"#fff",border:"none",
                padding:"9px 20px",borderRadius:6,cursor:"pointer",fontSize:12,
                fontWeight:700,fontFamily:"inherit"}}>
              {Icon("zap", {size:13, color:"#fff"})} Fix All ({fixableCount} fixable)
            </button>
            {fixedIds.size > 0 && (
              <span style={{fontSize:11,color:"var(--ss-scale)",fontWeight:600}}>
                ✓ {fixedIds.size} fixed this session
              </span>
            )}
            {unfixableIds.size > 0 && (
              <span style={{fontSize:11,color:"var(--ss-text-dim)"}}>
                {unfixableIds.size} could not be auto-fixed
              </span>
            )}
          </div>
        )}

        {}
        <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:5}}>
          {violations.length === 0 && (
            <div style={{textAlign:"center",padding:"40px 0",color:"var(--ss-scale)",fontSize:14}}>
              <div style={{fontSize:32,marginBottom:10}}>✓</div>
              All schedule preferences are satisfied.
            </div>
          )}
          {violations.map((item) => {
            const id = itemKey(item);
            const isFixed    = fixedIds.has(id);
            const isUnfixable = unfixableIds.has(id);
            const meta = TYPE_META[item.type] || { label: item.type.toUpperCase(), color: () => "var(--ss-text-muted)" };
            const col  = meta.color(t);
            const shiftLabel = SHIFTS.find(s=>s.id===item.shiftId)?.label || item.shiftId;
            return (
              <div key={id} style={{display:"flex",alignItems:"center",gap:10,
                padding:"10px 14px",borderRadius:6,
                background: isFixed ? "var(--ss-scale-12)" : isUnfixable ? "var(--ss-surface-alt)" : "var(--ss-surface-alt)",
                border:"1px solid "+(isFixed?"var(--ss-scale-40)":isUnfixable?"var(--ss-border)":col+"30"),
                opacity: isFixed ? 0.7 : 1, transition:"all .2s"}}>

                <span style={{width:8,height:8,borderRadius:"50%",
                  background:isFixed?"var(--ss-scale)":col,flexShrink:0}}/>

                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    <span style={{fontWeight:700,fontSize:12,color:"var(--ss-text)"}}>{item.emp.name}</span>
                    <span style={{fontSize:9,fontWeight:800,padding:"1px 6px",borderRadius:3,
                      background:col+"20",color:col,border:"1px solid "+col+"40"}}>
                      {meta.label}
                    </span>
                    <span style={{fontSize:10,color:"var(--ss-text-dim)"}}>{item.day} · {shiftLabel}</span>
                  </div>
                  <div style={{fontSize:10,color:"var(--ss-text-muted)",marginTop:2}}>{item.msg}</div>
                </div>

                {isFixed ? (
                  <span style={{fontSize:11,fontWeight:700,color:"var(--ss-scale)",flexShrink:0}}>✓ Fixed</span>
                ) : isUnfixable ? (
                  <span style={{fontSize:10,color:"var(--ss-text-dim)",flexShrink:0,textAlign:"right",maxWidth:90}}>
                    No swap<br/>available
                  </span>
                ) : (
                  <button onClick={()=>fixOne(item)}
                    style={{background:"var(--ss-accent)",color:"#fff",border:"none",
                      padding:"6px 14px",borderRadius:5,cursor:"pointer",
                      fontSize:11,fontWeight:700,fontFamily:"inherit",flexShrink:0}}>
                    Fix
                  </button>
                )}
              </div>
            );
          })}
        </div>

        <div style={{marginTop:16,flexShrink:0,display:"flex",justifyContent:"space-between",
          alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:10,color:"var(--ss-text-dim)"}}>
            Fixes move employees to their preferred shift or substitute a conflict-free replacement.<br/>
            "No swap available" means no qualified employee is free for that slot without creating a new violation.
          </div>
          <button onClick={onClose}
            style={{background:"transparent",border:"1px solid var(--ss-border)",color:"var(--ss-text-muted)",
              padding:"8px 18px",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>
            Close
          </button>
        </div>
      </div>
    </div>
  );
}

function RosterManager() {
  const { employees, setEmployees, savedRosters, setSavedRosters } = useRoster();
  const { setSchedule } = useSchedule();
  const t = useTheme();
  const [saveName,   setSaveName]   = useState("");
  const [confirmDel, setConfirmDel] = useState(null);
  const [loadedId,   setLoadedId]   = useState(null);
  const [flash,      setFlash]      = useState(null);
  const [importErr,  setImportErr]  = useState(null);
  const importRef = useRef(null);

  const showFlash = (type) => { setFlash(type); setTimeout(()=>setFlash(null), 2200); };

  const exportRosters = () => {
    if (!savedRosters.length) return;
    const payload = JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), rosters: savedRosters }, null, 2);
    const blob = new Blob([payload], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `shift-rosters-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showFlash("exported");
  };

  const importRosters = (e) => {
    setImportErr(null);
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const incoming = data.rosters || (Array.isArray(data) ? data : null);
        if (!incoming || !Array.isArray(incoming)) throw new Error("Unrecognized format");
        if (!incoming.every(r => r.id && r.name && Array.isArray(r.employees)))
          throw new Error("Missing required fields");
        setSavedRosters(prev => {
          const existingIds = new Set(prev.map(r => r.id));
          const newOnes = incoming.filter(r => !existingIds.has(r.id));
          return [...newOnes, ...prev];
        });
        showFlash("imported");
      } catch(err) {
        setImportErr("Import failed: " + err.message);
      }
      e.target.value = "";
    };
    reader.readAsText(file);
  };

  const saveRoster = () => {
    const name = saveName.trim();
    if (!name || !employees.length) return;
    const entry = {
      id: Date.now().toString(),
      name,
      savedAt: new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),
      savedAtISO: new Date().toISOString(),
      employees: JSON.parse(JSON.stringify(employees)),
      count: employees.length,
      ft: employees.filter(e=>e.employmentType==="full-time").length,
      pt: employees.filter(e=>e.employmentType!=="full-time").length,
    };
    setSavedRosters(p=>[entry,...p]);
    setSaveName("");
    showFlash("saved");
  };

  const [confirmLoad, setConfirmLoad] = useState(null);

  const loadRoster = (entry) => {
    setEmployees(entry.employees);
    setSchedule({});
    setLoadedId(entry.id);
    setConfirmLoad(null);
    showFlash("loaded");
  };

  const deleteRoster = (idx) => {
    setSavedRosters(p=>p.filter((_,i)=>i!==idx));
    setConfirmDel(null);
    showFlash("deleted");
  };

  const iS = {
    background:"var(--ss-surface-alt)", border:"1px solid var(--ss-border)", color:"var(--ss-text)",
    padding:"10px 14px", borderRadius:6, outline:"none", fontSize:13,
    fontFamily:"inherit", flex:"1 1 200px", boxSizing:"border-box",
  };

  return (
    <div style={{marginBottom:28}}>
      {}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <h3 style={{margin:0,fontSize:14,fontWeight:700,color:"var(--ss-text)",letterSpacing:".04em"}}>
          📋 SAVED ROSTERS
        </h3>
        {savedRosters.length>0&&(
          <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:10,
            background:"var(--ss-accent-20)",color:"var(--ss-accent)",border:"1px solid var(--ss-accent-40)"}}>
            {savedRosters.length}
          </span>
        )}
        <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
          {}
          <input ref={importRef} type="file" accept=".json" onChange={importRosters}
            style={{display:"none"}}/>
          <button onClick={()=>importRef.current?.click()}
            title="Import rosters from a backup file"
            style={{background:"var(--ss-surface-alt)",color:"var(--ss-text-dim)",border:"1px solid var(--ss-border)",
              padding:"4px 10px",borderRadius:5,cursor:"pointer",fontSize:10,fontWeight:700,
              fontFamily:"inherit",display:"flex",alignItems:"center",gap:4}}>
            📥 Import
          </button>
          <button onClick={exportRosters} disabled={!savedRosters.length}
            title="Download all rosters as a backup JSON file"
            style={{background:!savedRosters.length?"var(--ss-surface-alt)":"var(--ss-accent-18)",
              color:!savedRosters.length?"var(--ss-text-dim)":"var(--ss-accent)",
              border:"1px solid "+(!savedRosters.length?"var(--ss-border)":"var(--ss-accent-50)"),
              padding:"4px 10px",borderRadius:5,
              cursor:!savedRosters.length?"not-allowed":"pointer",
              fontSize:10,fontWeight:700,fontFamily:"inherit",
              display:"flex",alignItems:"center",gap:4}}>
            📤 Export

        </div>
        {flash&&(
          <span style={{fontSize:11,fontWeight:700,padding:"4px 12px",borderRadius:6,
            background:flash==="deleted"?"var(--ss-danger-20)":"var(--ss-scale-20)",
            color:flash==="deleted"?"var(--ss-danger)":"var(--ss-scale)",
            border:"1px solid "+(flash==="deleted"?"var(--ss-danger-40)":"var(--ss-scale-40)")}}>
            {flash==="saved"?"✓ Roster saved"
              :flash==="loaded"?"✓ Roster loaded — schedule cleared"
              :flash==="exported"?"✓ Backup downloaded"
              :flash==="imported"?"✓ Rosters imported"
              :"✓ Roster deleted"}
          </span>
        )}
      </div>

      {}
      <div style={{background:"var(--ss-surface)",border:"1px solid var(--ss-border)",borderRadius:8,padding:16,marginBottom:14}}>
        <div style={{fontSize:11,color:"var(--ss-text-dim)",fontWeight:600,letterSpacing:".05em",marginBottom:10}}>

function AvailableDaysOfWeekToggle({ val, set }) {
  const active = val && val.length > 0;
  const toggle = (day) => {
    const current = val || [];
    const next = current.includes(day) ? current.filter(d => d !== day) : [...current, day];
    set(next.length > 0 ? next : null);
  };
  return (
    <div style={{marginTop:12}}>
      <div style={{fontSize:11,color:"var(--ss-text-dim)",fontWeight:600,letterSpacing:".04em",marginBottom:6}}>

          const on = (val || []).includes(day);
          return (
            <button key={day} onClick={()=>toggle(day)} style={{
              background: on ? "var(--ss-accent-22)" : "var(--ss-surface-alt)",
              border: "1.5px solid "+(on ? "var(--ss-accent)" : "var(--ss-border)"),
              color: on ? "var(--ss-accent)" : "var(--ss-text-dim)",

      <div style={{fontSize:10,color: active ? "var(--ss-warning)" : "var(--ss-text-dim)",lineHeight:1.5}}>

function AvailabilityEditor({ emp, onUpdate }) {
  const t = useTheme();
  const unavail = emp.unavailableDays || [];
  const toggle = (day) => {
    const next = unavail.includes(day)
      ? unavail.filter(d=>d!==day)
      : [...unavail, day];
    onUpdate(next);
  };
  return (
    <div style={{marginTop:10}}>
      <div style={{fontSize:10,color:"var(--ss-text-dim)",fontWeight:700,letterSpacing:".06em",marginBottom:6}}>
        UNAVAILABLE DAYS
      </div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
        {DAYS.map(day => {
          const off = unavail.includes(day);
          return (
            <button key={day} onClick={()=>toggle(day)} style={{
              background:off?"var(--ss-danger-18)":"var(--ss-surface-alt)",
              border:"1.5px solid "+(off?"var(--ss-danger)":"var(--ss-border)"),
              color:off?"var(--ss-danger)":"var(--ss-text-dim)",
              padding:"4px 9px",borderRadius:5,cursor:"pointer",
              fontSize:10,fontWeight:off?700:500,fontFamily:"inherit",
              transition:"all .15s",
            }}>
              {day.substring(0,3)}
              {off&&<span style={{marginLeft:4,fontSize:9}}>\u2715</span>}
            </button>
          );
        })}
      </div>
      {unavail.length>0&&(
        <div style={{marginTop:5,fontSize:10,color:"var(--ss-danger)"}}>
          Off: {unavail.join(", ")}
        </div>
      )}
    </div>
  );
}

// OT_RELIEF_THRESHOLD is defined in the plain script block above (accessible globally)

function findOTReliefSuggestions(employees, schedule, extShifts, cfg) {
  const suggestions = [];
  const maxConsec   = MAX_CONSECUTIVE_HOURS;

  const hoursMap = {};
  employees.forEach(e => { hoursMap[e.id] = calcHours(e.id, schedule, extShifts); });

  const overloaded = employees.filter(e =>
    e.employmentType === "full-time" && hoursMap[e.id] > OT_RELIEF_THRESHOLD
  );
  // Pre-index used ext pairs for O(1) lookup instead of O(extShifts) scan per slot
  const usedExtPairs = new Set((extShifts||[]).map(e => e.day + "__" + e.pairId));

  for (const overEmp of overloaded) {
    for (const day of DAYS) {
      for (const shift of SHIFTS) {
        const key  = cellKey(day, shift.id);
        const asgn = schedule[key] || [];
        const myAsgn = asgn.find(a => a.employeeId === overEmp.id);
        if (!myAsgn) continue;

        const coveringPair = EXT_PAIRS.find(p => p.covers.includes(shift.id));
        if (!coveringPair) continue;

        if (usedExtPairs.has(day + "__" + coveringPair.id)) continue;

        const slotRoles = asgn
          .filter(a => a.position === "Scale" || a.position === "Medical")
          .map(a => a.position);
        const needsScale   = slotRoles.includes("Scale")   || myAsgn.position === "Scale";
        const needsMedical = slotRoles.includes("Medical") || myAsgn.position === "Medical";

        const candidates = employees.filter(c => {
          if (c.id === overEmp.id) return false;
          if ((c.unavailableDays||[]).includes(day)) return false;
          if ((c.blockedShifts||[]).includes(shift.id)) return false;
          if (c.requiredShift && c.requiredShift !== shift.id) return false;
          if (!canWorkExtHalf(c, coveringPair.id, 0) || !canWorkExtHalf(c, coveringPair.id, 1)) return false;
          const pos = getAvailPos(day, shift.id);
          if (!pos.some(p => c.qualifications.includes(p))) return false;
          const afterH = hoursMap[c.id] + EXT_SHIFT_HOURS;
          if (afterH > 56) return false;
          if (calcConsecutiveHours(c.id, schedule, day, shift.id) > empMaxConsec(c)) return false;
          return true;
        });

        for (let i = 0; i < candidates.length; i++) {
          for (let j = i + 1; j < candidates.length; j++) {
            const cA = candidates[i];
            const cB = candidates[j];

            const aQuals = cA.qualifications;
            const bQuals = cB.qualifications;
            if (needsScale   && !aQuals.includes("Scale")   && !bQuals.includes("Scale"))   continue;
            if (needsMedical && !aQuals.includes("Medical") && !bQuals.includes("Medical")) continue;

            const overHoursBefore = hoursMap[overEmp.id];
            const overHoursAfter  = overHoursBefore - SHIFT_HOURS;
            const aHoursAfter     = hoursMap[cA.id] + EXT_SHIFT_HOURS;
            const bHoursAfter     = hoursMap[cB.id] + EXT_SHIFT_HOURS;

            const overOTBefore = Math.max(0, overHoursBefore - FT_MIN_HOURS);
            if (Math.max(0, aHoursAfter - FT_MIN_HOURS) > overOTBefore) continue;
            if (Math.max(0, bHoursAfter - FT_MIN_HOURS) > overOTBefore) continue;

            const otBefore = overOTBefore
                           + Math.max(0, hoursMap[cA.id] - FT_MIN_HOURS)
                           + Math.max(0, hoursMap[cB.id] - FT_MIN_HOURS);
            const otAfter  = Math.max(0, overHoursAfter - FT_MIN_HOURS)
                           + Math.max(0, aHoursAfter - FT_MIN_HOURS)
                           + Math.max(0, bHoursAfter - FT_MIN_HOURS);
            const otReduction = otBefore - otAfter;
            if (otReduction <= 0) continue;

            suggestions.push({
              overEmp, day, shift, pairId: coveringPair.id, pair: coveringPair,
              empA: cA, empB: cB,
              overHoursBefore, overHoursAfter,
              aHoursBefore: hoursMap[cA.id], aHoursAfter,
              bHoursBefore: hoursMap[cB.id], bHoursAfter,
              otReduction, myAsgn,
            });

            if (suggestions.length >= 20) break;
          }
          if (suggestions.length >= 20) break;
        }
      }
    }
  }

  suggestions.sort((a, b) =>
    b.otReduction - a.otReduction ||
    (a.overHoursAfter + a.aHoursAfter + a.bHoursAfter) -
    (b.overHoursAfter + b.aHoursAfter + b.bHoursAfter)
  );

  return suggestions;
}

function CoverageDashboard({ navigateToWeek }) {

        // Supervisor counts as Medical for coverage display purposes
        const hasMed   = slotHasRole(asgn, employees, "Medical") || asgn.some(a => a.position === "Supervisor");
        const filled   = asgn.length;
        const openSlots = max - filled;

        asgn.forEach(a => {

        const extFilled  = cellExt.reduce((n, e) => n + (e.empAId ? 1 : 0) + (e.empBId ? 1 : 0), 0);
        const effFilled  = Math.min(filled + extFilled, max);
        const effHasScale = hasScale  || extScale;
        const effHasMed   = hasMed || extMedical;
        const effOpen     = max - effFilled;

        if (!effFilled) {
          totalEmpty++;
          gaps.push({ day, shiftId: shift.id, type: "empty", severity: 3,
            label: "Completely unstaffed", openSlots: max, hasScale: effHasScale, hasMed: effHasMed,
            missingRoles: ["Scale","Medical"] });
        } else {
          const missing = [...(!effHasScale?["Scale"]:[]),...(!effHasMed?["Medical"]:[])];
          if (missing.length) {
            totalMissingRole++;
            gaps.push({ day, shiftId: shift.id, type: "missing_role", severity: 2,
              label: `Missing: ${missing.join(" & ")}`, openSlots: effOpen, hasScale: effHasScale, hasMed: effHasMed,
              missingRoles: missing });
          } else if (effFilled < max) {
            totalPartial++;
            gaps.push({ day, shiftId: shift.id, type: "partial", severity: 1,
              label: `${effOpen} open slot${effOpen>1?"s":""}`, openSlots: effOpen, hasScale: effHasScale, hasMed: effHasMed,
              missingRoles: [] });
          } else {
            totalOk++;
          }
        }
      });
    });

    gaps.sort((a,b) => b.severity - a.severity || slotIndex(a.day,a.shiftId) - slotIndex(b.day,b.shiftId));

    const ftUnderHours = employees.filter(e =>
      e.employmentType === "full-time" && (empStats[e.id]?.hours||0) < FT_MIN_HOURS);

    const overtimeEmps = employees
      .filter(e => (empStats[e.id]?.hours||0) > FT_MIN_HOURS)
      .map(e => ({ emp: e, hours: empStats[e.id].hours, ot: empStats[e.id].hours - FT_MIN_HOURS }))
      .sort((a,b) => b.ot - a.ot);
    const totalOTHours = overtimeEmps.reduce((s, x) => s + x.ot, 0);

    const totalSlots   = DAYS.reduce((s,d) => s + SHIFTS.reduce((ss,sh) => ss + getSlotCount(d,sh.id), 0), 0);
    const shiftsPerFT  = FT_MIN_HOURS / SHIFT_HOURS;
    const idealFTTotal = Math.ceil(totalSlots / shiftsPerFT);

    const scaleSlots      = DAYS.length * SHIFTS.length;
    const medicalSlots    = scaleSlots;
    const idealMinScale      = Math.ceil(scaleSlots / shiftsPerFT);
    const idealMinMedical    = Math.ceil(medicalSlots / shiftsPerFT);

    const currFT         = employees.filter(e => e.employmentType === "full-time");
    const currFTTotal    = currFT.length;
    const currScale      = currFT.filter(e => e.qualifications.includes("Scale")).length;
    const currMedical    = currFT.filter(e => e.qualifications.includes("Medical")).length;
    const currSupervisor = 0;
    const currGuardOnly  = currFT.filter(e =>
      !e.qualifications.includes("Scale") &&
      !e.qualifications.includes("Medical")
    ).length;
    const idealGuardOnly = Math.max(0, idealFTTotal - Math.max(idealMinScale, idealMinMedical));

    const idealModel = {

      roles: [
        { role:"Scale",      ideal:idealMinScale,      current:currScale,
          note:"One Scale per shift × 21 shifts ÷ 5 shifts/FT" },
        { role:"Medical",    ideal:idealMinMedical,    current:currMedical,
          note:"One Medical per shift × 21 shifts ÷ 5 shifts/FT" },

      ],
      currFTTotal,
      ftGap: idealFTTotal - currFTTotal,

                            <span key={q} style={{width:6,height:6,borderRadius:"50%",background:pC(q,t),display:"inline-block"}} title={q}/>
                          ))}
                        </span>
                      </div>
                    </div>
                  );
                })}
            </div>
          )}
          {employees.length>0&&(
            <div style={{marginTop:12,padding:"10px 12px",background:"var(--ss-border-22)",borderRadius:6}}>
              {[
                ["Total shifts assigned", Object.values(analysis.empStats).reduce((s,e)=>s+e.shifts,0)],
                ["Total hours scheduled", Object.values(analysis.empStats).reduce((s,e)=>s+e.hours,0)+"h"],
                ["FT at / above 40h",
                  `${employees.filter(e=>e.employmentType==="full-time"&&(analysis.empStats[e.id]?.hours||0)>=40).length} / ${employees.filter(e=>e.employmentType==="full-time").length}`],
              ].map(([label,val])=>(
                <div key={label} style={{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:10,color:"var(--ss-text-dim)"}}>
                  <span>{label}</span>
                  <span style={{color:"var(--ss-text)",fontWeight:700}}>{val}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {}
      {historyStats.length > 0 && employees.length > 0 && (() => {
        const byWeek = {};
        (history||[]).slice().sort((a,b)=>a.savedAt.localeCompare(b.savedAt))
          .forEach(h => { if (!byWeek[h.weekStart]||!h.isAutoSave) byWeek[h.weekStart]=h; });
        const weeks = Object.values(byWeek).sort((a,b)=>a.weekStart.localeCompare(b.weekStart));

        const empWeekData = {};
        employees.forEach(e => {
          empWeekData[e.id] = weeks.map(w => {
            let hrs = 0;
            Object.values(w.schedule||{}).forEach(asgn =>
              asgn.forEach(a => { if (a.employeeId===e.id) hrs+=SHIFT_HOURS; })
            );
            const isFT = e.employmentType==="full-time";
            return { weekStart:w.weekStart, label:weekRangeLabel(w.weekStart), hrs,
                     ot: isFT&&hrs>40 ? hrs-40 : 0,
                     under: isFT&&hrs<40 ? 40-hrs : 0 };
          });
        });

        const empTotals = {};
        employees.forEach(e => {
          const rows = empWeekData[e.id];
          empTotals[e.id] = {
            totalHrs:   rows.reduce((s,r)=>s+r.hrs, 0),
            totalOT:    rows.reduce((s,r)=>s+r.ot, 0),
            totalShifts:rows.reduce((s,r)=>s+(r.hrs/SHIFT_HOURS), 0),
            avgHrs:     rows.length ? rows.reduce((s,r)=>s+r.hrs,0)/rows.length : 0,
            weeksActive:rows.filter(r=>r.hrs>0).length,
          };
        });

        const [selectedEmpId, setSelectedEmpId] = useState(employees[0]?.id||null);
        const [sortEmpCol, setSortEmpCol] = useState("totalHrs");
        const [sortEmpAsc, setSortEmpAsc] = useState(false);

        const selectedEmp = employees.find(e=>e.id===selectedEmpId);
        const selectedRows = selectedEmpId ? empWeekData[selectedEmpId] : [];

        const sortedEmps = [...employees].sort((a,b)=>{
          const av = empTotals[a.id]?.[sortEmpCol]??0;
          const bv = empTotals[b.id]?.[sortEmpCol]??0;
          return sortEmpAsc ? av-bv : bv-av;
        });

        const thS = (col) => ({
          fontSize:9, fontWeight:700,
          color: sortEmpCol===col ? "var(--ss-accent)" : "var(--ss-text-dim)",
          letterSpacing:".05em", padding:"6px 8px", textAlign:"right",
          cursor:"pointer", userSelect:"none", whiteSpace:"nowrap",
          borderBottom:"2px solid "+(sortEmpCol===col?"var(--ss-accent)":"var(--ss-border)"),
          background:"var(--ss-surface-alt)",
        });

        const EmpSparkline = ({ empId }) => {
          const vals = empWeekData[empId].map(r=>r.hrs);
          if (vals.length < 2) return null;
          const max = Math.max(...vals, 8);
          const W=52, H=20, n=vals.length;
          const bw = Math.max(2, Math.floor((W-(n-1)*1)/n));
          return (
            <svg width={W} height={H} style={{flexShrink:0}}>
              {vals.map((v,i)=>{
                const h = Math.max(1,Math.round((v/max)*H));
                const isFT = employees.find(e=>e.id===empId)?.employmentType==="full-time";
                const color = isFT&&v>40?"var(--ss-warning)":isFT&&v<40&&v>0?"var(--ss-danger)":v===0?"var(--ss-border)":"var(--ss-scale)";
                return <rect key={i} x={i*(bw+1)} y={H-h} width={bw} height={h} rx={1} fill={color} opacity={i===vals.length-1?1:0.6}/>;
              })}
            </svg>
          );
        };

        return (
          <div style={{background:"var(--ss-surface)",border:"1px solid var(--ss-border)",borderRadius:8,padding:18,marginTop:20}}>
            <div style={{fontSize:11,fontWeight:700,color:"var(--ss-text-muted)",letterSpacing:".06em",marginBottom:4}}>
              EMPLOYEE HOURS — ALL WEEKS
            </div>
            <div style={{fontSize:10,color:"var(--ss-text-dim)",marginBottom:16}}>
              {weeks.length} week{weeks.length!==1?"s":""} of history · click an employee to see week-by-week breakdown
            </div>

            {}
            <div style={{overflowX:"auto",marginBottom:16}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead>
                  <tr>
                    <th style={{...thS("name"),textAlign:"left",paddingLeft:10}}>EMPLOYEE</th>
                    <th onClick={()=>{setSortEmpCol("totalHrs");setSortEmpAsc(s=>!s);}} style={thS("totalHrs")}>
                      TOTAL HRS {sortEmpCol==="totalHrs"?(sortEmpAsc?"▲":"▼"):""}
                    </th>
                    <th onClick={()=>{setSortEmpCol("avgHrs");setSortEmpAsc(s=>!s);}} style={thS("avgHrs")}>
                      AVG/WK {sortEmpCol==="avgHrs"?(sortEmpAsc?"▲":"▼"):""}
                    </th>
                    <th onClick={()=>{setSortEmpCol("totalOT");setSortEmpAsc(s=>!s);}} style={thS("totalOT")}>
                      TOTAL OT {sortEmpCol==="totalOT"?(sortEmpAsc?"▲":"▼"):""}
                    </th>
                    <th onClick={()=>{setSortEmpCol("totalShifts");setSortEmpAsc(s=>!s);}} style={thS("totalShifts")}>
                      SHIFTS {sortEmpCol==="totalShifts"?(sortEmpAsc?"▲":"▼"):""}
                    </th>
                    <th onClick={()=>{setSortEmpCol("weeksActive");setSortEmpAsc(s=>!s);}} style={thS("weeksActive")}>
                      WKS ACTIVE {sortEmpCol==="weeksActive"?(sortEmpAsc?"▲":"▼"):""}
                    </th>
                    <th style={{...thS("spark"),cursor:"default",textAlign:"center"}}>TREND</th>
                  </tr>
                </thead>
                <tbody>
                  {sortedEmps.map((emp,i)=>{
                    const tot = empTotals[emp.id];
                    const isFT = emp.employmentType==="full-time";
                    const isSelected = emp.id===selectedEmpId;
                    const avgColor = isFT&&tot.avgHrs<40?"var(--ss-danger)":isFT&&tot.avgHrs>40?"var(--ss-warning)":"var(--ss-scale)";
                    return (
                      <tr key={emp.id}
                        onClick={()=>setSelectedEmpId(emp.id===selectedEmpId?null:emp.id)}
                        style={{
                          background:isSelected?"var(--ss-accent-15)":i%2===0?"var(--ss-surface)":"var(--ss-surface-alt)",
                          borderBottom:"1px solid var(--ss-border-40)",
                          cursor:"pointer",
                          outline:isSelected?"1px solid var(--ss-accent-60)":"none",
                        }}
                        onMouseEnter={e=>{ if(!isSelected) e.currentTarget.style.background="var(--ss-accent-0a)"; }}
                        onMouseLeave={e=>{ e.currentTarget.style.background=isSelected?"var(--ss-accent-15)":i%2===0?"var(--ss-surface)":"var(--ss-surface-alt)"; }}>
                        <td style={{padding:"8px 8px 8px 10px",fontWeight:isSelected?700:500}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:110}}>{emp.name}</span>
                            <span style={{fontSize:8,fontWeight:700,padding:"1px 4px",borderRadius:3,flexShrink:0,
                              background:(isFT?"var(--ss-accent)":emp.employmentType==="on-call"?"var(--ss-warning)":"var(--ss-scale)")+"20",color:isFT?"var(--ss-accent)":emp.employmentType==="on-call"?"var(--ss-warning)":"var(--ss-scale)",
                              border:"1px solid "+(isFT?"var(--ss-accent)":emp.employmentType==="on-call"?"var(--ss-warning)":"var(--ss-scale)")+"40"}}>{isFT?"FT":emp.employmentType==="on-call"?"OC":"PT"}</span>
                          </div>
                        </td>
                        <td style={{padding:"8px",textAlign:"right",fontWeight:700,color:"var(--ss-text)"}}>{tot.totalHrs}h</td>
                        <td style={{padding:"8px",textAlign:"right",fontWeight:700,color:avgColor}}>{tot.avgHrs.toFixed(1)}h</td>
                        <td style={{padding:"8px",textAlign:"right",fontWeight:tot.totalOT>0?700:400,
                          color:tot.totalOT>0?"var(--ss-warning)":"var(--ss-text-dim)"}}>
                          {tot.totalOT>0?"+"+tot.totalOT+"h":"—"}
                        </td>
                        <td style={{padding:"8px",textAlign:"right",color:"var(--ss-text)"}}>{tot.totalShifts}</td>
                        <td style={{padding:"8px",textAlign:"right",color:"var(--ss-text-muted)"}}>
                          {tot.weeksActive} / {weeks.length}
                        </td>
                        <td style={{padding:"8px",display:"flex",justifyContent:"center",alignItems:"center"}}>
                          <EmpSparkline empId={emp.id}/>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            {}
            {selectedEmp && selectedRows.length > 0 && (
              <div style={{background:"var(--ss-surface-alt)",border:"1px solid var(--ss-accent-50)",borderRadius:6,padding:14}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                  <div>
                    <span style={{fontWeight:700,fontSize:13,color:"var(--ss-accent)"}}>{selectedEmp.name}</span>
                    <span style={{fontSize:10,color:"var(--ss-text-dim)",marginLeft:8}}>week-by-week breakdown</span>
                  </div>
                  <button onClick={()=>setSelectedEmpId(null)}
                    style={{background:"transparent",border:"none",color:"var(--ss-text-dim)",cursor:"pointer",fontSize:14,padding:2}}>✕</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:6}}>
                  {selectedRows.map((row,i)=>{
                    const isFT = selectedEmp.employmentType==="full-time";
                    const isLatest = i===selectedRows.length-1;
                    const cardColor = row.ot>0?"var(--ss-warning)":row.under>0?"var(--ss-danger)":row.hrs>0?"var(--ss-scale)":"var(--ss-text-dim)";
                    return (
                      <div key={row.weekStart} style={{
                        padding:"9px 11px",borderRadius:5,
                        background:isLatest?"var(--ss-accent-12)":"var(--ss-surface)",
                        border:"1px solid "+(isLatest?"var(--ss-accent-60)":cardColor+"30"),
                      }}>
                        <div style={{fontSize:9,color:isLatest?"var(--ss-accent)":"var(--ss-text-dim)",fontWeight:700,marginBottom:4}}>
                          {row.label}{isLatest&&<span style={{marginLeft:4,fontSize:8,background:"var(--ss-accent)",color:"#fff",padding:"0 4px",borderRadius:8}}>NOW</span>}
                        </div>
                        {row.hrs===0 ? (
                          <div style={{fontSize:11,color:"var(--ss-text-dim)",fontStyle:"italic"}}>not scheduled</div>
                        ) : (
                          <>
                            <div style={{fontSize:18,fontWeight:800,color:cardColor,lineHeight:1}}>{row.hrs}h</div>
                            {isFT&&(
                              <div style={{fontSize:9,color:cardColor,marginTop:2,fontWeight:600}}>
                                {row.ot>0?"+"+row.ot+"h OT":row.under>0?row.under+"h short":"✓ 40h"}
                              </div>
                            )}
                            <div style={{fontSize:9,color:"var(--ss-text-dim)",marginTop:2}}>{row.hrs/SHIFT_HOURS} shift{row.hrs/SHIFT_HOURS!==1?"s":""}</div>
                          </>
                        )}
                      </div>
                    );
                  })}
                </div>
                {}
                <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid var(--ss-border)",display:"flex",gap:16,flexWrap:"wrap",fontSize:10,color:"var(--ss-text-dim)"}}>
                  <span>Total: <strong style={{color:"var(--ss-text)"}}>{empTotals[selectedEmp.id].totalHrs}h</strong></span>
                  <span>Avg/wk: <strong style={{color:"var(--ss-text)"}}>{empTotals[selectedEmp.id].avgHrs.toFixed(1)}h</strong></span>
                  {empTotals[selectedEmp.id].totalOT>0&&(
                    <span>Cumulative OT: <strong style={{color:"var(--ss-warning)"}}>+{empTotals[selectedEmp.id].totalOT}h</strong></span>
                  )}
                  <span>Active {empTotals[selectedEmp.id].weeksActive} of {weeks.length} week{weeks.length!==1?"s":""}</span>
                  <span style={{marginLeft:"auto"}}>{empTotals[selectedEmp.id].totalShifts} total shifts</span>
                </div>
              </div>
            )}
          </div>
        );
      })()}

    </div>
  );
}

function SchedulePopout({ onClose }) {
  const { employees } = useRoster();
  const { schedule, extShifts, weekStart } = useSchedule();
  const t = useTheme();
  const [pos,  setPos]  = useState({ x: 40, y: 60 });
  const [size, setSize] = useState({ w: 960, h: 520 });

  const onDragStart = (e) => {
    if (e.button !== 0) return;
    e.preventDefault();
    const sx = e.clientX - pos.x, sy = e.clientY - pos.y;
    const move = (ev) => setPos({ x: ev.clientX - sx, y: ev.clientY - sy });
    const up   = () => { window.removeEventListener("mousemove", move); window.removeEventListener("mouseup", up); };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
  };

  const onResizeStart = (e) => {
    e.stopPropagation(); e.preventDefault();
    const sx = e.clientX, sy = e.clientY, sw = size.w, sh = size.h;
    const move = (ev) => setSize({ w: Math.max(600, sw + ev.clientX - sx), h: Math.max(300, sh + ev.clientY - sy) });
    const up   = () => { window.removeEventListener("mousemove", move); window.removeEventListener("mouseup", up); };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
  };

  const [wy, wm, wd] = (weekStart || "2024-01-07").split("-").map(Number);
  const sun = new Date(wy, wm - 1, wd, 12);
  const fmtDate = (offset) => {
    const d = new Date(sun); d.setDate(sun.getDate() + offset);
    return String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  };
  const weekLabel = (() => {
    const d0 = new Date(sun), d6 = new Date(sun); d6.setDate(sun.getDate()+6);
    const opts = { month:"short", year:"numeric" };
    const s0 = d0.toLocaleDateString("en-US", opts), s6 = d6.toLocaleDateString("en-US", opts);
    return s0 === s6 ? s0 : s0 + " – " + s6;
  })();

  const getPopoutStatus = (day, shiftId) => {
    const asgn = schedule[cellKey(day, shiftId)] || [];
    const max  = getSlotCount(day, shiftId);
    const cellExt = (extShifts||[]).filter(e => extCovers(e, day, shiftId));
    const hasScale   = slotHasRole(asgn, employees, "Scale")   || cellExt.some(e => (e.roles||[]).includes("Scale"));
    // Supervisor counts as Medical for coverage display purposes
    const supOnShift = asgn.some(a => a.position === "Supervisor");
    const hasMedical = slotHasRole(asgn, employees, "Medical") || cellExt.some(e => (e.roles||[]).includes("Medical")) || supOnShift;
    const missing = [...(!hasScale ? ["Scale"] : []), ...(!hasMedical ? ["Medical"] : [])];
    return { missing, ok: missing.length === 0, count: asgn.length, max };
  };
  const pCol = (p) => ({ Supervisor: "var(--ss-supervisor)", Guard: "var(--ss-guard)", Scale: "var(--ss-scale)", Medical: "var(--ss-medical)" }[p] || "var(--ss-text-muted)");

  return (
    <div style={{
      position:"fixed", left:pos.x, top:pos.y, width:size.w, height:size.h,
      background:"var(--ss-bg)", border:"1.5px solid var(--ss-border)", borderRadius:10,
      boxShadow:"0 8px 40px rgba(0,0,0,.6)", display:"flex", flexDirection:"column",
      zIndex:99999, overflow:"hidden", fontFamily:"inherit",
    }}>
      <div onMouseDown={onDragStart} style={{
        display:"flex", alignItems:"center", gap:10, padding:"8px 14px",
        background:"var(--ss-surface)", borderBottom:"1px solid var(--ss-border)",
        cursor:"grab", userSelect:"none", flexShrink:0,
      }}>
        <span style={{fontSize:12,fontWeight:700,color:"var(--ss-text)",flex:1}}>
          ⛶ Pop-out &nbsp;
          <span style={{fontWeight:400,color:"var(--ss-text-dim)",fontSize:11}}>{weekLabel}</span>
        </span>
        <span style={{fontSize:10,color:"var(--ss-text-dim)"}}>drag to move &nbsp;·&nbsp; drag corner to resize</span>
        <button onMouseDown={e=>e.stopPropagation()} onClick={onClose}
          style={{background:"transparent",border:"none",color:"var(--ss-text-dim)",fontSize:16,cursor:"pointer",lineHeight:1,padding:"2px 4px"}}
          title="Close pop-out">✕</button>
      </div>

      <div style={{flex:1,overflowX:"auto",overflowY:"auto",padding:"10px 12px"}}>
        <div style={{minWidth:820}}>
          <div style={{display:"grid",gridTemplateColumns:"78px repeat(7,1fr)",gap:2,marginBottom:2}}>
            <div/>
            {DAYS.map((d,di)=>(
              <div key={d} style={{background:"var(--ss-surface-alt)",padding:"5px 6px",textAlign:"center",
                borderRadius:"4px 4px 0 0",color:isWeekday(d)?"var(--ss-text)":"var(--ss-text-muted)"}}>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:".04em"}}>{d.substring(0,3).toUpperCase()}</div>
                <div style={{fontSize:9,color:"var(--ss-text-dim)",marginTop:1}}>{fmtDate(di)}</div>
              </div>
            ))}
          </div>

          {SHIFTS.map(shift=>(
            <div key={shift.id} style={{display:"grid",gridTemplateColumns:"78px repeat(7,1fr)",gap:2,marginBottom:2}}>
              <div style={{background:"var(--ss-surface-alt)",padding:"6px 8px",borderRadius:"4px 0 0 4px",
                display:"flex",flexDirection:"column",justifyContent:"center"}}>
                <div style={{fontSize:10,fontWeight:700,color:"var(--ss-text)"}}>{shift.label}</div>
                <div style={{fontSize:9,color:"var(--ss-text-dim)"}}>{shift.time}</div>
              </div>
              {DAYS.map(day=>{
                const asgn = schedule[cellKey(day,shift.id)]||[];
                const st   = getPopoutStatus(day,shift.id);
                const cellExt = (extShifts||[]).filter(e=>extCovers(e,day,shift.id));
                const bg = !asgn.length&&!cellExt.length ? "var(--ss-bg)" : !st.ok ? "var(--ss-warning-12)" : "var(--ss-surface)";
                const bdr= !asgn.length&&!cellExt.length ? "var(--ss-border)" : !st.ok ? "var(--ss-warning-55)" : "var(--ss-accent-30)";
                return (
                  <div key={day} style={{background:bg,border:"1px solid "+bdr,borderRadius:4,
                    padding:"5px 6px",display:"flex",flexDirection:"column",gap:3,minHeight:58}}>
                    {asgn.map(a=>{
                      const emp=employees.find(e=>e.id===a.employeeId);
                      if(!emp) return null;
                      return (
                        <div key={a.employeeId} style={{display:"flex",alignItems:"center",gap:4,
                          background:"var(--ss-surface-alt)",borderRadius:3,padding:"3px 5px"}}>
                          <span style={{width:6,height:6,borderRadius:"50%",background:pCol(a.position),flexShrink:0}}/>
                          <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                            fontWeight:600,fontSize:10,color:"var(--ss-text)"}}>{emp.name}</span>
                          <span style={{fontSize:8,color:pCol(a.position),fontWeight:700,flexShrink:0}}>
                            {a.position.substring(0,3).toUpperCase()}</span>
                        </div>
                      );
                    })}
                    {cellExt.map((ext,ei)=>{
                      const pair=EXT_PAIRS.find(p=>p.id===ext.pairId);
                      const cf=pair?.covers[0]===shift.id;
                      // Only show a pill for the empA cell if empA exists, and only
                      // for the empB cell if empB exists. Don't fall back to empA
                      // on the empB cell — that creates a phantom body at a slot
                      // no one is physically working.
                      const empId=cf?ext.empAId:ext.empBId;
                      if(!empId) return null;
                      const extEmp=employees.find(e=>e.id===empId);
                      if(!extEmp) return null;
                      const ec=pair?.id==="day"?"#7c3aed":"#0e7490";
                      return (
                        <div key={"x"+ei} style={{display:"flex",alignItems:"center",gap:4,
                          background:ec+"12",border:"1px dashed "+ec+"60",borderRadius:3,padding:"3px 5px"}}>
                          <span style={{fontSize:8,flexShrink:0}}>⏱</span>
                          <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                            fontWeight:600,fontSize:10,color:ec}}>{extEmp.name}</span>
                          <span style={{fontSize:8,color:ec,fontWeight:700,flexShrink:0}}>12H</span>
                        </div>
                      );
                    })}
                    {asgn.length>0&&st.missing.length>0&&(
                      <div style={{fontSize:8,color:"var(--ss-warning)",fontWeight:700,marginTop:"auto"}}>
                        ⚠ {st.missing.join(" + ")}
                      </div>
                    )}
                    <div style={{fontSize:8,color:"var(--ss-text-dim)",marginTop:"auto",textAlign:"right"}}>
                      {st.count}/{st.max}
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      <div onMouseDown={onResizeStart} style={{
        position:"absolute",right:0,bottom:0,width:18,height:18,cursor:"se-resize",
        display:"flex",alignItems:"flex-end",justifyContent:"flex-end",
        padding:3,color:"var(--ss-text-dim)",fontSize:11,userSelect:"none",
      }}>⊡</div>
    </div>
  );
}

function EmpPicker({emp,day,sid,st,assign,getPos,subSource,onSub,onHover}) {
  const { schedule, extShifts, weekStart } = useSchedule();
  const { timeOffReqs } = useTimeOff();
  const { showConfirm } = useConfirm();
  const t = useTheme();
  const cfg = useSettings();
  const [sel,setSel] = useState(null);
  const pos = getPos(emp,day,sid);
  if (!pos.length) return null;

  const currentHours  = calcHours(emp.id, schedule, extShifts||[]);
  const wouldBeOver   = emp.employmentType==="full-time" && currentHours>=40;
  const isUnavailable = (emp.unavailableDays||[]).includes(day);
  const restGap       = calcRestGap(emp.id, schedule, day, sid);
  const consecH       = calcConsecutiveHours(emp.id, schedule, day, sid, extShifts);
  const shortRest     = restGap < (cfg?.minRestHours??MIN_REST_HOURS) && restGap !== Infinity;
  const consNights    = sid==="third" ? calcConsecutiveNights(emp.id, schedule, day, sid) : 0;
  const tooManyNights = consNights >= (cfg?.maxConsecutiveNights??MAX_CONSECUTIVE_NIGHTS);

  const hasFatigueWarning = shortRest || tooManyNights;
  const isSubMode = subSource && subSource.day === day && subSource.shiftId === sid;
  const warningColor = isSubMode ? "var(--ss-scale)" : isUnavailable ? "var(--ss-danger)" : hasFatigueWarning ? "var(--ss-fatigue)" : wouldBeOver ? "var(--ss-warning)" : "var(--ss-border)";
  const doAssign = async (position) => {
    if (isSubMode) {
      onSub(subSource, emp.id, subSource.position);
      return;
    }
    // Hard block: maxShiftsPerWeek cap reached
    if (emp.maxShiftsPerWeek != null && countShiftsInWeek(emp.id, schedule) >= emp.maxShiftsPerWeek) return;
    const empOtPref = emp.overtimePref && emp.overtimePref !== "neutral" ? emp.overtimePref : (cfg?.defaultOvertimePref || "neutral");
    const otPref    = emp.employmentType === "full-time" ? empOtPref : "neutral";
    const warns = [];
    if (isUnavailable) warns.push(`${emp.name} is marked unavailable on ${day}.`);
    const hasApprovedTimeOff = (timeOffReqs||[]).some(r =>
      r.empId===emp.id && r.status==="approved" && timeOffCoversSlot(r, day, sid, weekStart)
    );
    if (hasApprovedTimeOff) warns.push(`${emp.name} has approved time off on ${day}.`);
    const isSupWeekdayViolation = false;
    if (isSupWeekdayViolation) warns.push(`${emp.name} is a Supervisor — must work 1st shift on weekdays. Assigning to another shift is not recommended.`);
    if (consecH > empMaxConsec(emp)) return;
    if (shortRest) warns.push(`Only ${Math.round(restGap*10)/10}h rest since last shift (min ${cfg?.minRestHours??MIN_REST_HOURS}h).`);
    if (tooManyNights) warns.push(`${consNights} consecutive night shifts exceeds the ${cfg?.maxConsecutiveNights??MAX_CONSECUTIVE_NIGHTS}-shift limit.`);
    if (wouldBeOver) {
      if (otPref === "blocked") warns.push(`${emp.name} prefers NO overtime — currently at ${currentHours}h.`);
      else warns.push(`${emp.name} is at ${currentHours}h this week — overtime.`);
    }
    if (warns.length) {
      const ok = await showConfirm({title:"Assignment Warnings",message:"Assign anyway?",items:warns.map(m=>({msg:m,hard:false})),confirmLabel:"Assign",variant:"warning"});
      if (!ok) return;
    }
    assign(day,sid,emp.id,position);
  };

  const badge = shortRest ? `${Math.round(restGap)}h` : null;
  const badgeColor = "var(--ss-fatigue)";

  if (sel===null) return (
    <button onClick={()=>{
      if(pos.length===1) doAssign(pos[0]);
      else{
        const pickIsSup = (emp.qualifications||[]).includes("Supervisor");
        let d;
        if(!isWeekday(day)&&pickIsSup&&pos.includes("Guard"))  d="Guard";
        else if(!st.hasScale&&pos.includes("Scale"))            d="Scale";
        else if(!st.hasMedical&&pos.includes("Medical"))        d="Medical";
        else if(pos.includes("Guard"))                          d="Guard";
        else d=pos[0];
        setSel(d);
        doAssign(d);
      }
    }} style={{background:"var(--ss-surface)",border:"1px solid "+warningColor,borderRadius:3,color:"var(--ss-text)",
      cursor:"pointer",fontSize:10,padding:"5px 8px",textAlign:"left",fontFamily:"inherit",fontWeight:600,
      display:"flex",alignItems:"center",justifyContent:"space-between",gap:6,opacity:isUnavailable?0.6:1}}
       onMouseEnter={e=>{ onHover?.(emp); e.currentTarget.style.borderColor="var(--ss-accent)"; }}
       onMouseLeave={e=>{ onHover?.(null); e.currentTarget.style.borderColor=warningColor; }}>
      <span style={{display:"flex",alignItems:"center",gap:4}}>
        {emp.name}
        {badge&&<span style={{color:badgeColor,fontSize:8,fontWeight:800,background:badgeColor+"20",
          padding:"1px 4px",borderRadius:2}}>{badge}</span>}
        {wouldBeOver&&!badge&&<span style={{color:"var(--ss-warning)",fontSize:8}}>OT</span>}
      </span>
      <span style={{display:"flex",gap:3}}>{pos.map(p=>(<span key={p} style={{width:6,height:6,borderRadius:"50%",background:pC(p,t),display:"inline-block"}}/>))}</span>
    </button>
  );
  return (
    <div style={{display:"flex",gap:4,alignItems:"center",background:"var(--ss-surface)",border:"1px solid var(--ss-accent)",borderRadius:3,padding:"3px 6px"}}>
      <span style={{fontSize:10,fontWeight:600,flex:1}}>{emp.name}</span>
      <select value={sel} onChange={e=>setSel(e.target.value)} style={{background:"var(--ss-surface-alt)",border:"1px solid var(--ss-border)",
        color:"var(--ss-text)",fontSize:9,padding:"2px 4px",borderRadius:2,fontFamily:"inherit",cursor:"pointer"}}>
        {pos.map(p=>(<option key={p} value={p}>{p}</option>))}
      </select>
      <button onClick={()=>doAssign(sel)} style={{background:"var(--ss-accent)",border:"none",color:"#fff",
        fontSize:9,padding:"3px 6px",borderRadius:2,cursor:"pointer",fontWeight:700,fontFamily:"inherit"}}>\u2713</button>
    </div>
  );
}

function printWeekSchedule(schedule, employees, extShifts, weekStart) {
  const getName = (id) => (employees.find(e => e.id === id) || {}).name || id;
  const [wy, wm, wd] = (weekStart || "2024-01-07").split("-").map(Number);
  const sun = new Date(wy, wm - 1, wd, 12);

  const dateCols = DAYS.map((day, i) => {
    const d = new Date(sun); d.setDate(sun.getDate() + i);
    return {
      day,
      label: d.toLocaleDateString("en-US", { weekday: "short", month: "numeric", day: "numeric" }),
    };
  });
  const d0 = new Date(sun);
  const d6 = new Date(sun); d6.setDate(sun.getDate() + 6);
  const weekLabel = d0.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })
    + " – " + d6.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  const printedOn = new Date().toLocaleDateString("en-US",
    { weekday: "short", month: "short", day: "numeric", year: "numeric" });

  const posColor = (pos) =>
    pos === "Supervisor_REMOVED" ? "#7c3aed"
    : pos === "Scale"    ? "#0e7490"
    : pos === "Medical"  ? "#166534"
    :                      "#374151";
  const posAbbr = (pos) =>
    pos === "Supervisor_REMOVED" ? "SUP"
    : pos === "Scale"    ? "SCA"
    : pos === "Medical"  ? "MED"
    :                      "GUA";

  let rows = "";
  SHIFTS.forEach(shift => {
    rows += `<tr>
      <td colspan="8" style="background:#374151;color:#f9fafb;font-weight:700;
        font-size:9pt;padding:4px 8px;text-align:left;">
        ${shift.label} &nbsp;&middot;&nbsp; ${shift.time}
      </td></tr>`;
    rows += "<tr>";
    rows += `<td style="background:#f3f4f6;font-weight:700;font-size:8pt;
      color:#6b7280;padding:4px 6px;border:1px solid #d1d5db;">STAFF</td>`;
    dateCols.forEach(({ day }) => {
      const key = day + "__" + shift.id;
      const asgn = schedule[key] || [];
      const cellExts = (extShifts || []).filter(e => {
        const pair = EXT_PAIRS.find(p => p.id === e.pairId);
        return pair && e.day === day && pair.covers.includes(shift.id);
      });
      let cell = "";
      asgn.forEach(a => {
        const empQ = (employees.find(e => e.id === a.employeeId)?.qualifications) || [];
        const smDual = (
          (a.position === "Scale" || a.position === "Medical") &&
          empQ.includes("Scale") && empQ.includes("Medical") &&
          !asgn.some(x => x.employeeId !== a.employeeId &&
            (a.position === "Scale" ? x.position === "Medical" : x.position === "Scale"))
        );
        const c = smDual ? posColor("Medical") : posColor(a.position);
        const lbl = smDual ? "S&M" : posAbbr(a.position);
        cell += `<div style="margin-bottom:3px;">
          <span style="font-weight:700;font-size:7.5pt;color:${c};
            background:${c}22;border-radius:2px;padding:0 3px;margin-right:3px;">
            ${lbl}
          </span>
          <span style="font-size:8pt;">${getName(a.employeeId)}</span>
        </div>`;
      });
      cellExts.forEach(ext => {
        const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
        const idx = pair.covers.indexOf(shift.id);
        const empId = idx === 0 ? ext.empAId : ext.empBId;
        if (!empId) return;
        cell += `<div style="margin-bottom:3px;">
          <span style="font-weight:700;font-size:7.5pt;color:#7c3aed;
            background:#7c3aed22;border-radius:2px;padding:0 3px;margin-right:3px;">12H</span>
          <span style="font-size:8pt;">${getName(empId)}</span>
        </div>`;
      });
      if (!cell) cell = `<span style="color:#ef4444;font-weight:700;font-size:8pt;">OPEN</span>`;
      rows += `<td style="border:1px solid #d1d5db;padding:5px 6px;
        vertical-align:top;">${cell}</td>`;
    });
    rows += "</tr>";
  });

  let colHdrs = `<th style="background:#1e3a1e;color:#fff;font-weight:700;
    font-size:9pt;padding:5px 6px;border:1px solid #d1d5db;width:72px;">SHIFT</th>`;
  dateCols.forEach(({ label, day }) => {
    colHdrs += `<th style="background:#1e3a1e;color:#fff;font-weight:700;
      font-size:9pt;padding:5px 6px;border:1px solid #d1d5db;text-align:center;">
      ${label}<br><span style="font-weight:400;font-size:8pt;">${day}</span>
    </th>`;
  });

  const html = `<!DOCTYPE html>
<html><head>
  <meta charset="utf-8">
  <title>PSI Shift Schedule &mdash; ${weekLabel}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; padding: 14px; background: #fff; color: #111; }
    table { border-collapse: collapse; width: 100%; table-layout: fixed; }
    @page { size: landscape; margin: 10mm; }
    @media print { body { padding: 0; } }
  </style>
</head><body>
  <div style="display:flex;align-items:center;margin-bottom:12px;">
    <div>
      <div style="font-size:17pt;font-weight:800;color:#111;">PROJECT SERVICE INC.</div>
      <div style="font-size:10pt;color:#555;margin-top:3px;">
        Shift Schedule &mdash; Week of ${weekLabel}
      </div>
    </div>
    <div style="margin-left:auto;font-size:8pt;color:#888;">
      Printed ${printedOn}
    </div>
  </div>
  <table>
    <thead><tr>${colHdrs}</tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div style="margin-top:10px;display:flex;gap:20px;font-size:8pt;color:#555;">
    <span>SUP = Supervisor</span><span>SCA = Scale</span>
    <span>MED = Medical</span><span>GUA = Guard</span>
    <span>12H = 12-hr Extended Shift</span>
  </div>
</body></html>`;

  const win = window.open("", "_blank", "width=1100,height=700");
  if (!win) { alert("Please allow pop-ups to print the schedule."); return; }
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(() => { win.print(); win.close(); }, 400);
}
