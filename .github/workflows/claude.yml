name: Claude

on:
  # Trigger on hourly schedule
  schedule:
    - cron: '0 * * * *'
  
  # Trigger on issue comments
  issue_comment:
    types: [created]
  
  # Trigger on pull request review comments
  pull_request_review_comment:
    types: [created]
  
  # Trigger on issues
  issues:
    types: [opened, edited, closed]
  
  # Trigger on pull request reviews
  pull_request_review:
    types: [submitted, edited]

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - name: Run Claude
        uses: claude-run/claude-action@v1