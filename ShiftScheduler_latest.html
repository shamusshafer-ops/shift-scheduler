function ScheduleGrid({ employees, schedule, setSchedule, onOpenTestModal, pendingAutoFill, clearPendingAutoFill, savedWeeks, setSavedWeeks, history, setHistory, highlightSlot, clearHighlightSlot, extShifts, setExtShifts, weekStart, setWeekStart, timeOffReqs, empTimeOffDays, empPatterns, setEmpPatterns, afExclude, setAfExclude, scheduleStale: scheduleStaleP, setScheduleStale: setScheduleStaleProp }) {
  const t = useTheme();
  const cfg = useSettings();
  const [editingCell,      setEditingCell]     = useState(null);
  const [swapSource,        setSwapSource]        = useState(null);
  const [subSource,         setSubSource]         = useState(null);
  const [dragEmp,          setDragEmp]         = useState(null);
  const [dragOver,         setDragOver]         = useState(null);
  const dragEmpRef = useRef(null); // sync ref so onDragOver closure always has current value
  const [overtimeItems,    setOvertimeItems]   = useState(null);
  const [pendingSchedule,  setPendingSchedule] = useState(null);
  const [supervisorItems,  setSupervisorItems] = useState(null);
  const [showCopyModal,    setShowCopyModal]   = useState(false);
  const [showMinimize,     setShowMinimize]    = useState(false);
  const [showPopout,       setShowPopout]      = useState(false);
  const [showExcelPreview, setShowExcelPreview] = useState(false);
  const [viewingHistory,   setViewingHistory]  = useState(null);
  const [histSaveLabel,    setHistSaveLabel]   = useState("");
  const [showHistSave,     setShowHistSave]    = useState(false);
  const [scheduleIssues,   setScheduleIssues]  = useState(null);
  const [bannersExpanded,  setBannersExpanded]  = useState(false);
  const [showPublish,      setShowPublish]       = useState(false);
  const [previewMode,      setPreviewMode]       = useState(false);

  useEffect(() => {
    const handler = (e) => {
      if (e.key !== "Escape") return;
      if (swapSource)   { setSwapSource(null); e.preventDefault(); return; }
      if (subSource)    { setSubSource(null); setEditingCell(null); e.preventDefault(); return; }
      if (dragEmp)      { setDragEmp(null); e.preventDefault(); return; }
      if (editingCell)  { setEditingCell(null); e.preventDefault(); return; }
    };
    document.addEventListener("keydown", handler);
    return () => document.removeEventListener("keydown", handler);
  }, [swapSource, subSource, dragEmp, editingCell]); // eslint-disable-line react-hooks/exhaustive-deps

  const autoSaveToHistory = useCallback((ws, sched, exts) => {
    const hasAssignments = Object.values(sched).some(a => a.length > 0);
    if (!hasAssignments) return;
    setHistory(prev => {
      const existing = prev.findIndex(h => h.weekStart === ws && h.isAutoSave);
      const entry = {
        weekStart: ws,
        savedAt: new Date().toISOString(),
        label: null,
        schedule: JSON.parse(JSON.stringify(sched)),
        extShifts: JSON.parse(JSON.stringify(exts || [])),
        isAutoSave: true,
      };
      const next = existing >= 0
        ? prev.map((h, i) => i === existing ? entry : h)
        : [...prev, entry];
      const sorted = next.sort((a,b) => a.weekStart.localeCompare(b.weekStart));
      // Cap history at 30 entries — drop oldest auto-saves first, then oldest named
      if (sorted.length > 30) {
        const autoIdx = sorted.findIndex(h => h.isAutoSave);
        if (autoIdx >= 0) sorted.splice(autoIdx, 1);
        else sorted.splice(0, 1);
      }
      return sorted;
    });
  }, [setHistory]);

  const manualSaveToHistory = useCallback((label, ws, sched, exts) => {
    const trimmedLabel = label.trim();
    if (!trimmedLabel) return;
    setHistory(prev => {
      const entry = {
        weekStart: ws,
        savedAt: new Date().toISOString(),
        label: trimmedLabel,
        schedule: JSON.parse(JSON.stringify(sched)),
        extShifts: JSON.parse(JSON.stringify(exts || [])),
        isAutoSave: false,
      };
      const existing = prev.findIndex(h => h.weekStart === ws && !h.isAutoSave && h.label === trimmedLabel);
      const next = existing >= 0
        ? prev.map((h,i) => i === existing ? entry : h)
        : [...prev, entry];
      return next.sort((a,b) => a.weekStart.localeCompare(b.weekStart));
    });
  }, [setHistory]);

  const deleteFromHistory = useCallback((idx) => {
    setHistory(prev => prev.filter((_,i) => i !== idx));
  }, [setHistory]);

  const historyLabel = (h) => {
    if (h.label) return h.label;
    const [wy,wm,wd] = h.weekStart.split("-").map(Number);
    const sun = new Date(wy,wm-1,wd,12);
    const sat = new Date(wy,wm-1,wd+6,12);
    const fmt = d => (d.getMonth()+1)+"/"+d.getDate();
    return fmt(sun)+" – "+fmt(sat);
  };

  const scheduleStale    = scheduleStaleP ?? false;
  const setScheduleStale = setScheduleStaleProp ?? (() => {});
  const [extSuggestions,     setExtSuggestions]   = useState(null);
  const [pendingExtShifts,   setPendingExtShifts] = useState([]);
  const [manualPairDay,      setManualPairDay]    = useState(null);
  const [enforcementBlock,   setEnforcementBlock] = useState(null); // {violations:[], action:"publish"|"excel"} or null
  const cellRefs = useRef({});

  useEffect(() => {
    if (!highlightSlot) return;
    const key = cellKey(highlightSlot.day, highlightSlot.shiftId);
    const el = cellRefs.current[key];
    if (el) {
      el.scrollIntoView({ behavior:"smooth", block:"center" });
      el.style.outline = "3px solid " + t.accent;
      el.style.outlineOffset = "2px";
      const timer = setTimeout(() => { el.style.outline = ""; el.style.outlineOffset = ""; clearHighlightSlot?.(); }, 2000);
      return () => clearTimeout(timer);
    }
  }, [highlightSlot]);

  const displaySchedule = viewingHistory ? viewingHistory.schedule : schedule;
  const displayExtShifts = viewingHistory ? (viewingHistory.extShifts || []) : (extShifts || []);
  const liveSchedule   = schedule;
  const liveWeekStart  = weekStart;
  const isReadOnly     = !!viewingHistory;
  const stepWeek = (dir) => {
    const [y,m,d] = (weekStart||"2024-01-07").split("-").map(Number);
    const dt = new Date(y, m-1, d, 12);
    dt.setDate(dt.getDate() + dir * 7);
    const ns = dt.toISOString().slice(0,10);
    setWeekStart(ns);
  };
  const getAsgn       = (d,s) => displaySchedule[cellKey(d,s)]||[];
  const getName       = (id)  => employees.find(e=>e.id===id)?.name||"?";
  const getAssignable = (emp,d,s) => getAvailPos(d,s).filter(p=>canFillPos(emp,p,d));
  const unassigned    = (d,s) => {const ids=getAsgn(d,s).map(a=>a.employeeId);return employees.filter(e=>!ids.includes(e.id));};

  const stableEmpOrder = useMemo(() => {
    const shiftRank = { first:0, second:1, third:2 };
    const primarySh = (emp) => {
      if (emp.requiredShift) return emp.requiredShift;
      if ((emp.preferredShifts||[]).length===1) return emp.preferredShifts[0];
      const counts = { first:0, second:0, third:0 };
      DAYS.forEach(day => SHIFTS.forEach(s => {
        if ((schedule[cellKey(day,s.id)]||[]).some(a=>a.employeeId===emp.id)) counts[s.id]++;
      }));
      return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]?.[0] || "first";
    };
    return [...employees].sort((a,b) => {
      const aSuper = (a.qualifications||[]).includes("Supervisor") ? 0 : 1;
      const bSuper = (b.qualifications||[]).includes("Supervisor") ? 0 : 1;
      if (aSuper !== bSuper) return aSuper - bSuper;
      const shiftDiff = (shiftRank[primarySh(a)]||0) - (shiftRank[primarySh(b)]||0);
      if (shiftDiff !== 0) return shiftDiff;
      return a.name.localeCompare(b.name);
    });
  }, [employees, schedule]);

  const sortedAsgn = (asgn) => {
    const orderMap = new Map(stableEmpOrder.map((e,i) => [e.id, i]));
    return [...asgn].sort((a,b) => {
      return (orderMap.get(a.employeeId) ?? 999) - (orderMap.get(b.employeeId) ?? 999);
    });
  };

  const assignEmp = (d,s,eid,pos) => {
    if (isReadOnly) return;
    const key=cellKey(d,s); const cur=schedule[key]||[];
    if(cur.length>=getEffectiveSlotCount(d,s,extShifts)||cur.some(a=>a.employeeId===eid)) return;
    setSchedule(p=>({...p,[key]:[...cur,{employeeId:eid,position:pos}]}));
    setEditingCell(null);
  };
  const removeAsgn = (d,s,eid) => {
    if (isReadOnly) return;
    const key=cellKey(d,s);
    const cur = schedule[key]||[];
    const remaining = cur.filter(a=>a.employeeId!==eid);
    // Warn if removal would break Rule 2 (min 3) or Rule 3 (Scale/Medical)
    const warns = [];
    const cellExt=(extShifts||[]).filter(e=>extCovers(e,d,s));
    const extBodies=cellExt.reduce((n,ext)=>{
      const pair=EXT_PAIRS.find(p=>p.id===ext.pairId); if(!pair) return n;
      const idx=pair.covers.indexOf(s);
      return n+((idx===0?!!ext.empAId:idx===1?!!ext.empBId:false)?1:0);
    },0);
    const totalAfter = remaining.length + extBodies;
    if (totalAfter < 3) warns.push(`Rule 2 — shift will have only ${totalAfter} person${totalAfter===1?"":"s"} (minimum 3 required).`);
    const extHasScale=cellExt.some(e=>(e.roles||[]).includes("Scale"));
    const extHasMed=cellExt.some(e=>(e.roles||[]).includes("Medical"));
    const hasScale=slotHasRole(remaining,employees,"Scale")||extHasScale;
    const hasMed=slotHasRole(remaining,employees,"Medical")||extHasMed;
    if (!hasScale) warns.push("Rule 3 — shift will have no Scale employee.");
    if (!hasMed)   warns.push("Rule 3 — shift will have no Medical employee.");
    if (warns.length > 0 && !window.confirm(
      "\u26a0 Removing this person will create a rule violation:\n\n" +
      warns.map(w=>"\u2022 "+w).join("\n") +
      "\n\nRemove anyway?"
    )) return;
    setSchedule(p=>({...p,[key]:remaining}));
  };
  const getSwapViolations = (srcEmp, srcDay, srcShiftId, srcPos, tgtEmp, tgtDay, tgtShiftId, tgtPos) => {
    const viols = [];
    if ((srcEmp?.unavailableDays||[]).includes(tgtDay))
      viols.push({ hard:true, msg:`${srcEmp.name} is unavailable on ${tgtDay}` });
    if ((tgtEmp?.unavailableDays||[]).includes(srcDay))
      viols.push({ hard:true, msg:`${tgtEmp.name} is unavailable on ${srcDay}` });
    // Check approved time-off — hard block (same as unavailability)
    const srcHasTimeOff = srcEmp && (timeOffReqs||[]).some(r =>
      r.empId===srcEmp.id && r.status==="approved" && timeOffCoversSlot(r, tgtDay, tgtShiftId, weekStart));
    const tgtHasTimeOff = tgtEmp && (timeOffReqs||[]).some(r =>
      r.empId===tgtEmp.id && r.status==="approved" && timeOffCoversSlot(r, srcDay, srcShiftId, weekStart));
    if (srcHasTimeOff) viols.push({ hard:true, msg:`${srcEmp.name} has approved time off on ${tgtDay}` });
    if (tgtHasTimeOff) viols.push({ hard:true, msg:`${tgtEmp.name} has approved time off on ${srcDay}` });
    if (srcEmp?.requiredShift && srcEmp.requiredShift !== tgtShiftId)
      viols.push({ hard:true, msg:`${srcEmp.name} is locked to ${srcEmp.requiredShift} shift` });
    if (tgtEmp?.requiredShift && tgtEmp.requiredShift !== srcShiftId)
      viols.push({ hard:true, msg:`${tgtEmp.name} is locked to ${tgtEmp.requiredShift} shift` });
    if (tgtPos !== "Guard" && !(srcEmp?.qualifications||[]).includes(tgtPos))
      viols.push({ hard:true, msg:`${srcEmp.name} is not qualified for ${tgtPos}` });
    if (srcPos !== "Guard" && !(tgtEmp?.qualifications||[]).includes(srcPos))
      viols.push({ hard:true, msg:`${tgtEmp.name} is not qualified for ${srcPos}` });
    const srcPrefViolsOnTgt = srcEmp ? getPreferenceViolations(srcEmp, tgtDay, tgtShiftId, schedule) : [];
    const tgtPrefViolsOnSrc = tgtEmp ? getPreferenceViolations(tgtEmp, srcDay, srcShiftId, schedule) : [];
    srcPrefViolsOnTgt.forEach(v => viols.push({ hard:false, msg:`${srcEmp.name}: ${v.msg}` }));
    tgtPrefViolsOnSrc.forEach(v => viols.push({ hard:false, msg:`${tgtEmp.name}: ${v.msg}` }));
    const swapped = {...schedule};
    const sk = cellKey(srcDay, srcShiftId);
    const tk = cellKey(tgtDay, tgtShiftId);
    swapped[sk] = (schedule[sk]||[]).map(a => a.employeeId===srcEmp.id ? {...a,employeeId:tgtEmp.id,position:srcPos} : a);
    swapped[tk] = (schedule[tk]||[]).map(a => a.employeeId===tgtEmp.id ? {...a,employeeId:srcEmp.id,position:tgtPos} : a);
    const srcRestAfter = calcRestGap(srcEmp.id, swapped, tgtDay, tgtShiftId);
    const tgtRestAfter = calcRestGap(tgtEmp.id, swapped, srcDay, srcShiftId);
    const minRest = cfg?.minRestHours ?? 12;
    if (srcRestAfter < minRest && srcRestAfter !== Infinity)
      viols.push({ hard:false, msg:`${srcEmp.name} would have only ${Math.round(srcRestAfter*10)/10}h rest (min ${minRest}h)` });
    if (tgtRestAfter < minRest && tgtRestAfter !== Infinity)
      viols.push({ hard:false, msg:`${tgtEmp.name} would have only ${Math.round(tgtRestAfter*10)/10}h rest (min ${minRest}h)` });
    // Check Rule 3: would either cell lose its only Scale or Medical after the swap?
    const checkRule3 = (cellKey, shiftId, day, incomingEmp, outgoingEmpId) => {
      const cellAfter = (swapped[cellKey]||[]);
      const cellExt   = (extShifts||[]).filter(e=>extCovers(e,day,shiftId));
      const extScale  = cellExt.some(e=>(e.roles||[]).includes("Scale"));
      const extMed    = cellExt.some(e=>(e.roles||[]).includes("Medical"));
      const hasScale  = slotHasRole(cellAfter, employees, "Scale") || extScale;
      const hasMed    = slotHasRole(cellAfter, employees, "Medical") || extMed;
      const shiftLabel= SHIFTS.find(s=>s.id===shiftId)?.label||shiftId;
      if (!hasScale) viols.push({ hard:false, msg:`Swap would leave ${day} ${shiftLabel} with no Scale` });
      if (!hasMed)   viols.push({ hard:false, msg:`Swap would leave ${day} ${shiftLabel} with no Medical` });
    };
    checkRule3(sk, srcShiftId, srcDay, tgtEmp, srcEmp?.id);
    checkRule3(tk, tgtShiftId, tgtDay, srcEmp, tgtEmp?.id);
    return viols;
  };

  const executeSwap = (src, tgt) => {
    const sk = cellKey(src.day, src.shiftId);
    const tk = cellKey(tgt.day, tgt.shiftId);
    setSchedule(prev => {
      const ns = {...prev};
      ns[sk] = (prev[sk]||[]).map(a =>
        a.employeeId === src.employeeId ? {...a, employeeId:tgt.employeeId, position:src.position} : a
      );
      ns[tk] = (prev[tk]||[]).map(a =>
        a.employeeId === tgt.employeeId ? {...a, employeeId:src.employeeId, position:tgt.position} : a
      );
      return ns;
    });
    setSwapSource(null);
  };

  const executeSub = (subSrc, newEmpId, newPosition) => {
    const subEmp = employees.find(e => e.id === subSrc.employeeId);
    const newEmp = employees.find(e => e.id === newEmpId);
    if (!subEmp || !newEmp) return;
    const viols = [];
    if ((newEmp.unavailableDays||[]).includes(subSrc.day))
      viols.push({ hard:true,  msg:`${newEmp.name} is unavailable on ${subSrc.day}` });
    if (newEmp.requiredShift && newEmp.requiredShift !== subSrc.shiftId)
      viols.push({ hard:true,  msg:`${newEmp.name} is locked to ${newEmp.requiredShift} shift` });
    if (newPosition !== "Guard" && !(newEmp.qualifications||[]).includes(newPosition))
      viols.push({ hard:true,  msg:`${newEmp.name} is not qualified for ${newPosition}` });
    const prefViols = getPreferenceViolations(newEmp, subSrc.day, subSrc.shiftId, schedule);
    prefViols.forEach(v => viols.push({ hard:false, msg:`${newEmp.name}: ${v.msg}` }));
    const rest = calcRestGap(newEmp.id, schedule, subSrc.day, subSrc.shiftId);
    const minRest = cfg?.minRestHours ?? 12;
    if (rest < minRest && rest !== Infinity)
      viols.push({ hard:false, msg:`${newEmp.name} would have only ${Math.round(rest*10)/10}h rest (min ${minRest}h)` });
    // Rule 3 check: would removing subEmp leave the shift without Scale or Medical?
    const key0 = cellKey(subSrc.day, subSrc.shiftId);
    const afterSub = (schedule[key0]||[]).map(a =>
      a.employeeId === subSrc.employeeId ? {...a, employeeId: newEmpId, position: newPosition} : a
    );
    const cellExt0=(extShifts||[]).filter(e=>extCovers(e,subSrc.day,subSrc.shiftId));
    const extScale0=cellExt0.some(e=>(e.roles||[]).includes("Scale"));
    const extMed0  =cellExt0.some(e=>(e.roles||[]).includes("Medical"));
    const hasScale0=slotHasRole(afterSub,employees,"Scale")||extScale0;
    const hasMed0  =slotHasRole(afterSub,employees,"Medical")||extMed0;
    if (!hasScale0) viols.push({ hard:false, msg:`Sub would leave ${subSrc.day} ${SHIFTS.find(s=>s.id===subSrc.shiftId)?.label||subSrc.shiftId} with no Scale employee` });
    if (!hasMed0)   viols.push({ hard:false, msg:`Sub would leave ${subSrc.day} ${SHIFTS.find(s=>s.id===subSrc.shiftId)?.label||subSrc.shiftId} with no Medical employee` });
    const hardBlocks = viols.filter(v => v.hard);
    const softWarns  = viols.filter(v => !v.hard);
    if (hardBlocks.length > 0) {
      alert("Sub blocked:\n\n" + hardBlocks.map(v => "• " + v.msg).join("\n")
        + (softWarns.length ? "\n\nAlso note:\n" + softWarns.map(v => "• " + v.msg).join("\n") : ""));
      return;
    }
    if (softWarns.length > 0) {
      const ok = window.confirm(
        "Sub warnings — approve to continue:\n\n"
        + softWarns.map(v => "⚠ " + v.msg).join("\n")
        + "\n\nProceed with sub?"
      );
      if (!ok) return;
    }
    const key = cellKey(subSrc.day, subSrc.shiftId);
    setSchedule(prev => ({
      ...prev,
      [key]: (prev[key]||[]).map(a =>
        a.employeeId === subSrc.employeeId
          ? { ...a, employeeId: newEmpId, position: newPosition }
          : a
      )
    }));
    setSubSource(null);
    setEditingCell(null);
  };

  const handleChipClick = (empId, day, shiftId, position, e) => {
    e.stopPropagation();
    if (isReadOnly) return;
    if (swapSource) {
      if (swapSource.employeeId === empId && swapSource.day === day && swapSource.shiftId === shiftId) {
        setSwapSource(null); return;
      }
      const srcEmp = employees.find(e => e.id === swapSource.employeeId);
      const tgtEmp = employees.find(e => e.id === empId);
      const viols  = getSwapViolations(srcEmp, swapSource.day, swapSource.shiftId, swapSource.position,
                                        tgtEmp, day, shiftId, position);
      const hardBlocks = viols.filter(v => v.hard);
      const softWarns  = viols.filter(v => !v.hard);
      if (hardBlocks.length > 0) {
        alert("Swap blocked:\n\n" + hardBlocks.map(v => "• " + v.msg).join("\n")
          + (softWarns.length ? "\n\nAlso note:\n" + softWarns.map(v => "• " + v.msg).join("\n") : ""));
        return;
      }
      if (softWarns.length > 0) {
        const ok = window.confirm("Swap warnings — approve to continue:\n\n"
          + softWarns.map(v => "⚠ " + v.msg).join("\n") + "\n\nProceed with swap?");
        if (!ok) return;
      }
      executeSwap(swapSource, { employeeId:empId, day, shiftId, position });
      return;
    }
    if (subSource) {
      if (subSource.employeeId === empId && subSource.day === day && subSource.shiftId === shiftId) {
        setSubSource(null); setEditingCell(null);
      }
      return;
    }
    setEditingCell(prev => {
      const key = cellKey(day, shiftId);
      return prev === key + "__chipprompt__" + empId ? null : key + "__chipprompt__" + empId;
    });
  };

  const isSwapHardBlocked = (empId, day, shiftId, position) => {
    if (!swapSource) return false;
    const srcEmp = employees.find(e => e.id === swapSource.employeeId);
    const tgtEmp = employees.find(e => e.id === empId);
    if (!srcEmp || !tgtEmp) return false;
    if ((srcEmp.unavailableDays||[]).includes(day)) return true;
    if ((tgtEmp.unavailableDays||[]).includes(swapSource.day)) return true;
    if (srcEmp.requiredShift && srcEmp.requiredShift !== shiftId) return true;
    if (tgtEmp.requiredShift && tgtEmp.requiredShift !== swapSource.shiftId) return true;
    if (position !== "Guard" && !(srcEmp.qualifications||[]).includes(position)) return true;
    if (swapSource.position !== "Guard" && !(tgtEmp.qualifications||[]).includes(swapSource.position)) return true;
    return false;
  };

  const getStatus = (d,s) => {
    const a=getAsgn(d,s);
    const cellExtList=displayExtShifts.filter(e=>extCovers(e,d,s));
    const extHasScale=cellExtList.some(e=>e.roles.includes("Scale"));
    const extHasMed=cellExtList.some(e=>e.roles.includes("Medical"));
    const hasScale=slotHasRole(a,employees,"Scale")||extHasScale;
    const hasMed=slotHasRole(a,employees,"Medical")||extHasMed;
    const isFull=a.length>=getEffectiveSlotCount(d,s,displayExtShifts);
    const missing=[...(!hasScale?["Scale"]:[]),...(!hasMed?["Medical"]:[])];
    return{hasScale,hasMedical:hasMed,isFull,missing,ok:missing.length===0,cellExtList};
  };

  const handleDrop = (d,s) => {
    if(!dragEmp) return;
    const cur=getAsgn(d,s);
    if(cur.length>=getEffectiveSlotCount(d,s,extShifts)||cur.some(a=>a.employeeId===dragEmp.id)) return;
    const ap=getAssignable(dragEmp,d,s); if(!ap.length) return;
    const st=getStatus(d,s);

    let pos;
    if     (!st.hasScale  &&ap.includes("Scale")  &&canFillPos(dragEmp,"Scale",d))   pos="Scale";
    else if(!st.hasMedical&&ap.includes("Medical")&&canFillPos(dragEmp,"Medical",d)) pos="Medical";
    else if(ap.includes("Guard"))                                                     pos="Guard";
    else pos=ap[0];

    const warns = [];
    const isUnavailable = (dragEmp.unavailableDays||[]).includes(d);
    const rest        = calcRestGap(dragEmp.id, schedule, d, s);
    const consecHDrag = calcConsecutiveHours(dragEmp.id, schedule, d, s, extShifts);
    const shortRest = rest < (cfg?.minRestHours??MIN_REST_HOURS) && rest !== Infinity;
    const nights = s==="third" ? calcConsecutiveNights(dragEmp.id, schedule, d, s) : 0;
    const tooManyNights = nights >= (cfg?.maxConsecutiveNights??MAX_CONSECUTIVE_NIGHTS);
    const currentHours = calcHours(dragEmp.id, schedule, extShifts);
    const wouldBeOver = dragEmp.employmentType==="full-time" && currentHours>=40;
    if (consecHDrag > empMaxConsec(dragEmp)) { setDragOver(null); return; }
    if (isUnavailable) warns.push(`${dragEmp.name} is marked unavailable on ${d}.`);
    if (shortRest) warns.push(`Only ${Math.round(rest*10)/10}h rest since last shift.`);
    if (tooManyNights) warns.push(`${nights} consecutive night shifts.`);
    const empDragOtPref = dragEmp.overtimePref && dragEmp.overtimePref !== "neutral" ? dragEmp.overtimePref : (cfg?.defaultOvertimePref || "neutral");
    const dragOtPref    = dragEmp.employmentType === "full-time" ? empDragOtPref : "neutral";
    if (wouldBeOver) {
      if (dragOtPref === "blocked") warns.push(`${dragEmp.name} prefers NO overtime — currently at ${currentHours}h.`);
      else warns.push(`${dragEmp.name} would go to ${currentHours+SHIFT_HOURS}h (overtime).`);
    }
    if (warns.length && !window.confirm(warns.join("\n\n")+"\n\nAssign anyway?")) { setDragEmp(null); return; }
    assignEmp(d,s,dragEmp.id,pos); setDragEmp(null);
  };

  const validateSchedule = useCallback((sched, exts, emps) => {
    const issues = [];
    const E = (msg) => issues.push({ level:"error", msg });
    const W = (msg) => issues.push({ level:"warn",  msg });
    const rmap = Object.fromEntries((emps||employees).map(e => [e.id, e]));
    const allExts = exts || extShifts || [];

    const extBodyCount = (day, shiftId) => {
      let n = 0;
      (allExts).forEach(ext => {
        const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
        if (!pair) return;
        const idx = pair.covers.indexOf(shiftId);
        if (idx === 0 && ext.empAId && ext.day === day) n++;
        if (idx === 1 && ext.empBId && ext.day === day) n++;
      });
      return n;
    };

    DAYS.forEach(day => {
      SHIFTS.forEach(shift => {
        const key  = cellKey(day, shift.id);
        const asgn = sched[key] || [];
        const extBodies = extBodyCount(day, shift.id);
        const totalBodies = asgn.length + extBodies;
        const shiftLabel = `${day} ${shift.label}`;

        // Rule 2: minimum 3 people per shift (non-negotiable — error)
        if (totalBodies < 3) {
          const names = asgn.map(a => (rmap[a.employeeId]?.name||"?").split(" ").pop()).join(", ");
          E(`Rule 2 — ${shiftLabel}: only ${totalBodies} person${totalBodies===1?"":"s"} (min 3 required)${names ? " ["+names+"]" : ""}`);
        }

        // Rule 3: must have Scale and Medical (error, not warning)
        const extEmps = (allExts).filter(ext => ext.day === day)
          .flatMap(ext => [ext.empAId, ext.empBId].filter(Boolean)
            .map(id => rmap[id]).filter(Boolean)
            .filter(e => {
              const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
              if (!pair) return false;
              return pair.covers.indexOf(shift.id) >= 0;
            }));
        const extHasScale   = extEmps.some(e => (e.qualifications||[]).includes("Scale"));
        const extHasMedical = extEmps.some(e => (e.qualifications||[]).includes("Medical"));
        const hasScale   = slotHasRole(asgn, Object.values(rmap), "Scale")   || extHasScale;
        const hasMedical = slotHasRole(asgn, Object.values(rmap), "Medical") || extHasMedical;

        if (!hasScale)   E(`Rule 3 — ${shiftLabel}: no Scale assigned`);
        if (!hasMedical) E(`Rule 3 — ${shiftLabel}: no Medical assigned`);

        // Supervisor slot check (informational only — not a business rule block)
        const supNeed  = SUP_SLOT_DAY(day, shift.id) ? 1 : 0;
        const supCount = asgn.filter(a => a.position === "Supervisor").length;
        if (supNeed > 0 && supCount === 0) {
          W(`No Supervisor assigned on ${day} 1st shift`);
        }
      });
    });

    const shiftCount = {};
    const weekendCount = {};
    const dayShifts = {};

    DAYS.forEach(day => {
      SHIFTS.forEach(shift => {
        const key = cellKey(day, shift.id);
        const asgn = sched[key] || [];
        asgn.forEach(a => {
          const emp = rmap[a.employeeId];
          if (!emp) return;
          const id = emp.id;

          if ((emp.unavailableDays||[]).includes(day))
            E(`${emp.name} assigned on unavailable day ${day} (${shift.id})`);

          // R8: check approved time-off violations
          const hasApprovedTO = (timeOffReqs||[]).some(r =>
            r.empId===emp.id && r.status==="approved" &&
            timeOffCoversSlot(r, day, shift.id, weekStart)
          );
          if (hasApprovedTO)
            W(`${emp.name} assigned on approved time-off day ${day} (${shift.label})`);

          if ((emp.blockedShifts||[]).includes(shift.id))
            E(`${emp.name} assigned to blocked shift ${shift.id} on ${day}`);

          if (emp.requiredShift && emp.requiredShift !== shift.id)
            E(`${emp.name} on ${shift.id} but required on ${emp.requiredShift} (${day})`);

          shiftCount[id] = (shiftCount[id]||0) + 1;
          if (["Saturday","Sunday"].includes(day))
            weekendCount[id] = (weekendCount[id]||0) + 1;

          const dk = id+"__"+day;
          if (!dayShifts[dk]) dayShifts[dk] = [];
          dayShifts[dk].push(shift.id);
        });
      });
    });

    (emps||employees).forEach(emp => {
      const mxs = emp.maxShiftsPerWeek;
      if (mxs != null && (shiftCount[emp.id]||0) > mxs)
        E(`${emp.name} worked ${shiftCount[emp.id]} shifts, max is ${mxs}`);

      const mxw = emp.maxWeekendDays;
      if (mxw != null && (weekendCount[emp.id]||0) > mxw)
        E(`${emp.name} worked ${weekendCount[emp.id]} weekend days, max is ${mxw}`);
    });

    Object.entries(dayShifts).forEach(([dk, shifts]) => {
      if (shifts.length > 1) {
        const [empId, day] = dk.split("__");
        const emp = rmap[empId];
        if (!emp) return;
        if (!emp.willing16h)
          E(`${emp.name} double-shifted on ${day} (${shifts.join("+")})`);
      }
    });

    const hoursByEmp = {};
    DAYS.forEach(day => {
      SHIFTS.forEach(shift => {
        const key = cellKey(day, shift.id);
        (sched[key]||[]).forEach(a => {
          hoursByEmp[a.employeeId] = (hoursByEmp[a.employeeId]||0) + SHIFT_HOURS;
        });
      });
    });
    // Also count ext shift hours (12h per ext shift body)
    (allExts||[]).forEach(ext => {
      if (ext.empAId) hoursByEmp[ext.empAId] = (hoursByEmp[ext.empAId]||0) + EXT_SHIFT_HOURS;
      if (ext.empBId) hoursByEmp[ext.empBId] = (hoursByEmp[ext.empBId]||0) + EXT_SHIFT_HOURS;
    });
    (emps||employees).forEach(emp => {
      if (emp.employmentType !== "full-time") return;
      const h = hoursByEmp[emp.id] || 0;
      if (h < 40)  E(`Rule 1 — ${emp.name} has only ${h}h scheduled (full-time minimum is 40h)`);
      if (h > 48)  W(`${emp.name} has ${h}h this week (over 48h)`);
    });

    return issues;
  }, [employees, extShifts]);

  const runAutoFill = useCallback((empOverride) => {
    const allSource = empOverride || employees;
    const excludeSet = new Set(afExclude || []);
    const source = allSource.filter(e => !excludeSet.has(e.id));
    if (!source.length) return;

    // ── Pre-flight feasibility check ─────────────────────────────────────────
    // Warn the user before running if the roster structurally cannot satisfy
    // the business rules, so they understand why violations will appear.
    const feasibilityIssues = [];
    const totalShifts = DAYS.length * SHIFTS.length; // 21 slots per week
    const ftEmps = source.filter(e => e.employmentType === "full-time");
    const scaleEmps  = source.filter(e => (e.qualifications||[]).includes("Scale"));
    const medEmps    = source.filter(e => (e.qualifications||[]).includes("Medical"));
    // Rule 2: need at least 3 available bodies per shift on average
    const minBodiesNeeded = totalShifts * 3;
    const shiftsPerFT = 5; // nominal 5-on-2-off
    const estCoverage = ftEmps.length * shiftsPerFT + source.filter(e=>e.employmentType!=="full-time").length * 3;
    if (estCoverage < minBodiesNeeded) {
      feasibilityIssues.push(`Rule 2 risk — roster may not have enough staff to put 3 people on every shift. Need ~${Math.ceil(minBodiesNeeded/shiftsPerFT)} FT employees; have ${ftEmps.length} FT + ${source.length - ftEmps.length} PT/OC.`);
    }
    // Rule 3: need at least one Scale and one Medical qualified per shift
    const scaleShiftsNeeded = SHIFTS.length; // 3 per day minimum
    const medShiftsNeeded   = SHIFTS.length;
    if (scaleEmps.length === 0) {
      feasibilityIssues.push("Rule 3 — no Scale-qualified employees on roster. Every shift will be missing Scale.");
    } else if (scaleEmps.length < scaleShiftsNeeded) {
      feasibilityIssues.push(`Rule 3 risk — only ${scaleEmps.length} Scale-qualified employee${scaleEmps.length===1?"":"s"} for ${scaleShiftsNeeded} shifts/day. Some shifts may lack Scale coverage.`);
    }
    if (medEmps.length === 0) {
      feasibilityIssues.push("Rule 3 — no Medical-qualified employees on roster. Every shift will be missing Medical.");
    } else if (medEmps.length < medShiftsNeeded) {
      feasibilityIssues.push(`Rule 3 risk — only ${medEmps.length} Medical-qualified employee${medEmps.length===1?"":"s"} for ${medShiftsNeeded} shifts/day. Some shifts may lack Medical coverage.`);
    }
    // Rule 1: check if FT employees can mathematically reach 40h
    const ftUnreachable = ftEmps.filter(e => {
      const unavailCount = (e.unavailableDays||[]).length;
      const maxPossibleShifts = 7 - unavailCount;
      return maxPossibleShifts * SHIFT_HOURS < FT_MIN_HOURS;
    });
    if (ftUnreachable.length > 0) {
      ftUnreachable.forEach(e => {
        const avail = 7 - (e.unavailableDays||[]).length;
        feasibilityIssues.push(`Rule 1 — ${e.name} has ${avail} available day${avail===1?"":"s"} this week (${avail*SHIFT_HOURS}h max) — cannot reach 40h.`);
      });
    }

    if (feasibilityIssues.length > 0) {
      const proceed = window.confirm(
        "⚠ ROSTER FEASIBILITY WARNING\n\n" +
        "Auto-fill may produce rule violations because the current roster " +
        "cannot satisfy all business rules:\n\n" +
        feasibilityIssues.map(i => "• " + i).join("\n") +
        "\n\nProceed with auto-fill anyway? Violations will be shown after."
      );
      if (!proceed) return;
    }
    // ── End pre-flight ────────────────────────────────────────────────────────

    const manualExtShifts = (extShifts||[]).filter(e => e.approvedAt !== "auto-fill");
    const {schedule:ns, hourTracker, usedPatterns} = buildAutoFill(source, cfg, empTimeOffDays, empPatterns, manualExtShifts);
    if (usedPatterns && Object.keys(usedPatterns).length) setEmpPatterns(prev => ({...prev, ...usedPatterns}));

    const autoExtShifts = [];
    const usedExtPairs  = new Set();
    DAYS.forEach(day => {
      EXT_PAIRS.forEach(pair => {
        if (usedExtPairs.has(day + "__" + pair.id)) return;
        const neededRoles = [];
        pair.covers.forEach(shiftId => {
          const asgn = ns[cellKey(day, shiftId)] || [];
          if (!asgn.some(a => a.position === "Scale")) neededRoles.push("Scale");
          if (!asgn.some(a => a.position === "Medical")) neededRoles.push("Medical");
        });
        const uniqueNeeded = [...new Set(neededRoles)];
        if (!uniqueNeeded.length) return;

        const alreadyInBoth = (empId) => pair.covers.every(shiftId =>
          (ns[cellKey(day, shiftId)] || []).some(a => a.employeeId === empId)
        );
        const candidates = source.filter(emp => {
          if ((emp.unavailableDays || []).includes(day)) return false;
          if (alreadyInBoth(emp.id)) return false;
          if (!uniqueNeeded.every(r => emp.qualifications.includes(r))) return false;
          return canWorkExtHalf(emp, pair.id, 0) || canWorkExtHalf(emp, pair.id, 1);
        });

        for (let i = 0; i < candidates.length; i++) {
          for (let j = i + 1; j < candidates.length; j++) {
            const [empA, empB] = (() => {
              const a = candidates[i], b = candidates[j];
              const abOk = canWorkExtHalf(a, pair.id, 0) && canWorkExtHalf(b, pair.id, 1);
              const baOk = canWorkExtHalf(b, pair.id, 0) && canWorkExtHalf(a, pair.id, 1);
              if (abOk) return [a, b];
              if (baOk) return [b, a];
              return [null, null];
            })();
            if (!empA || !empB) continue;
            const aRoles = ["Scale","Medical"].filter(r => empA.qualifications.includes(r));
            const bRoles = ["Scale","Medical"].filter(r => empB.qualifications.includes(r));
            if (!uniqueNeeded.every(r => aRoles.includes(r) && bRoles.includes(r))) continue;
            const combinedExtRoles = [...new Set([
              ...["Scale","Medical"].filter(r => empA.qualifications.includes(r)),
              ...["Scale","Medical"].filter(r => empB.qualifications.includes(r)),
            ])];
            autoExtShifts.push({
              pairId: pair.id,
              day,
              empAId: empA.id,
              empBId: empB.id,
              roles:  combinedExtRoles,
              approvedAt: "auto-fill",
              auto: true,
            });
            usedExtPairs.add(day + "__" + pair.id);
            break;
          }
          if (usedExtPairs.has(day + "__" + pair.id)) break;
        }
      });
    });

    const allExtShiftsForCleanup = [
      ...manualExtShifts,
      ...autoExtShifts,
    ];
    const seenExtKeys = new Set();
    const dedupedExts = allExtShiftsForCleanup.filter(ext => {
      const k = ext.day + "__" + ext.pairId;
      if (seenExtKeys.has(k)) return false;
      seenExtKeys.add(k);
      return true;
    });
    dedupedExts.forEach(ext => {
      const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
      if (!pair) return;
      pair.covers.forEach(shiftId => {
        const key = cellKey(ext.day, shiftId);
        const asgn = ns[key];
        if (!asgn) return;
        const shiftIdx = pair.covers.indexOf(shiftId);
        const extBodyHere = shiftIdx === 0 ? (ext.empAId ? 1 : 0)
                          : shiftIdx === 1 ? (ext.empBId ? 1 : 0) : 0;
        const presentEmpId = shiftIdx === 0 ? ext.empAId : shiftIdx === 1 ? ext.empBId : null;
        const presentEmp   = presentEmpId ? source.find(e => e.id === presentEmpId) : null;
        const shiftRoles = presentEmp
          ? ["Scale","Medical"].filter(r => presentEmp.qualifications.includes(r))
          : (ext.roles||[]);
        const extScale   = shiftRoles.includes("Scale");
        const extMedical = shiftRoles.includes("Medical");

        const rawSlots   = getSlotCount(ext.day, shiftId);
        const targetSize = Math.max(0, rawSlots - extBodyHere);

        let cleaned = asgn.filter(a => {
          if (a.position === "Scale"   && extScale   && asgn.length > 1) return false;
          if (a.position === "Medical" && extMedical && asgn.length > 1) return false;
          return true;
        });

        if (cleaned.length > targetSize) {
          const priority = (pos) =>
pos === "Scale" ? 0 : pos === "Medical" ? 1 : 2;
          cleaned = [...cleaned].sort((a,b) => priority(a.position) - priority(b.position));
          cleaned = cleaned.slice(0, targetSize);
        }

        const removed = asgn.filter(a => !cleaned.includes(a));
        removed.forEach(a => {
          if (hourTracker[a.employeeId] !== undefined)
            hourTracker[a.employeeId] = Math.max(0, hourTracker[a.employeeId] - SHIFT_HOURS);
        });
        ns[key] = cleaned;
      });
    });

    const extConflictWarnings = autoExtShifts.flatMap(ext => {
      const a = source.find(e => e.id === ext.empAId);
      const b = source.find(e => e.id === ext.empBId);
      const warns = [];
      if (a && !canWorkExtHalf(a, ext.pairId, 0)) warns.push(extHalfConflictReason(a, ext.pairId, 0));
      if (b && !canWorkExtHalf(b, ext.pairId, 1)) warns.push(extHalfConflictReason(b, ext.pairId, 1));
      return warns.filter(Boolean);
    });
    if (extConflictWarnings.length) {
      console.warn("[ShiftScheduler] Auto-fill ext pair shift-lock conflicts:", extConflictWarnings);
    }

    const resolveOtPref = (e) => {
      const raw = e.overtimePref;
      return (raw && raw !== "neutral") ? raw : (cfg?.defaultOvertimePref || "neutral");
    };
    const otItems = source
      .filter(e=>e.employmentType==="full-time"&&(hourTracker[e.id]||0)>40&&resolveOtPref(e)!=="preferred")
      .map(e=>({emp:e,currentHours:calcHours(e.id,schedule,extShifts),newHours:hourTracker[e.id]}));

    if (otItems.length>0) {
      setPendingSchedule(ns);
      setPendingExtShifts(autoExtShifts);
      setOvertimeItems(otItems);
    } else {
      setSchedule(ns);
      if (autoExtShifts.length) setExtShifts(autoExtShifts);
      setScheduleIssues(validateSchedule(ns, autoExtShifts, source));
      autoSaveToHistory(weekStart, ns, autoExtShifts);
    }
    setScheduleStale(false);
  }, [employees, setSchedule, setExtShifts, cfg, empTimeOffDays, empPatterns, extShifts, schedule]);

  useEffect(()=>{
    if(pendingAutoFill&&pendingAutoFill.length>0){
      runAutoFill(pendingAutoFill);
      clearPendingAutoFill();
    }
  },[pendingAutoFill]);

  const prevEmpsRef = useRef(null);
  useEffect(() => {
    if (prevEmpsRef.current === null) { prevEmpsRef.current = employees; return; }
    const prefChanged = employees.some(emp => {
      const prev = prevEmpsRef.current.find(e => e.id === emp.id);
      if (!prev) return true;
      return (
        JSON.stringify(emp.preferredShifts||[]) !== JSON.stringify(prev.preferredShifts||[]) ||
        JSON.stringify(emp.blockedShifts||[]) !== JSON.stringify(prev.blockedShifts||[]) ||
        emp.requiredShift !== prev.requiredShift ||
        JSON.stringify(emp.preferredDaysOff||[]) !== JSON.stringify(prev.preferredDaysOff||[]) ||
        JSON.stringify(emp.unavailableDays||[]) !== JSON.stringify(prev.unavailableDays||[]) ||
        JSON.stringify(emp.qualifications) !== JSON.stringify(prev.qualifications)
      );
    });
    if (prefChanged && Object.keys(schedule).length > 0) setScheduleStale(true);
    prevEmpsRef.current = employees;
  }, [employees]);

  const handleOvertimeApproval = (approved) => {
    if(!pendingSchedule) return;
    const unapprovedIds=new Set(overtimeItems.filter(i=>!approved[i.emp.id]).map(i=>i.emp.id));
    let cleaned = null;
    if(unapprovedIds.size>0){
      const hourTracker={};employees.forEach(e=>{hourTracker[e.id]=0;});
      cleaned={};
      Object.keys(pendingSchedule).forEach(key=>{
        cleaned[key]=pendingSchedule[key].filter(a=>{
          if(!unapprovedIds.has(a.employeeId)){hourTracker[a.employeeId]=(hourTracker[a.employeeId]||0)+SHIFT_HOURS;return true;}
          const emp=employees.find(e=>e.id===a.employeeId);
          if(!emp) return false;
          if((hourTracker[a.employeeId]||0)+SHIFT_HOURS>40) return false;
          hourTracker[a.employeeId]=(hourTracker[a.employeeId]||0)+SHIFT_HOURS;
          return true;
        });
      });
      setSchedule(cleaned);
    } else setSchedule(pendingSchedule);
    setOvertimeItems(null); setPendingSchedule(null);
    const finalExts = pendingExtShifts.length ? pendingExtShifts : extShifts;
    if (pendingExtShifts.length) { setExtShifts(pendingExtShifts); setPendingExtShifts([]); }
    autoSaveToHistory(weekStart, cleaned || pendingSchedule, finalExts);
    setScheduleIssues(validateSchedule(
      cleaned || pendingSchedule,
      pendingExtShifts.length ? pendingExtShifts : extShifts,
      employees));
  };

  const suggestExtShifts = useCallback((day) => {
    const suggestions = findExtShiftPairs(day, employees, schedule, extShifts||[]);
    if (suggestions.length) setExtSuggestions(suggestions);
    else alert("No valid 12-hour pairing found for " + day + ". All potential pairs are unavailable or already assigned.");
  }, [employees, schedule, extShifts]);

  const approveExtShift = useCallback((suggestion) => {
    const extEmpA = suggestion.empA;
    const extEmpB = suggestion.empB;
    const fullExtRoles = [...new Set([
      ...["Scale","Medical"].filter(r => extEmpA?.qualifications?.includes(r)),
      ...["Scale","Medical"].filter(r => extEmpB?.qualifications?.includes(r)),
    ])];
    const newExt = {
      pairId: suggestion.pairId,
      day:    suggestion.day,
      empAId: extEmpA.id,
      empBId: extEmpB?.id || null,
      roles:  fullExtRoles.length ? fullExtRoles : suggestion.neededRoles,
      approvedAt: new Date().toLocaleDateString(),
    };
    setExtShifts(p => [...(p||[]), newExt]);
    setExtSuggestions(null);
  }, [setExtShifts]);

  const approveManualPair = useCallback((pairing) => {
    setExtShifts(p => [...(p||[]), pairing]);
    setShowManualPair(false);
  }, [setExtShifts]);

  const removeExtShift = useCallback((idx) => {
    setExtShifts(p => p.filter((_,i)=>i!==idx));
  }, [setExtShifts]);

  const handleSaveWeek = (name) => {
    const newWeek = {
      name,
      schedule: JSON.parse(JSON.stringify(schedule)),
      extShifts: JSON.parse(JSON.stringify(extShifts||[])),
      assignments: Object.values(schedule).reduce((s,a)=>s+a.length,0),
      savedAt: new Date().toLocaleDateString(),
    };
    setSavedWeeks(p=>[...p,newWeek]);
  };
  const handleLoadWeek = (idx) => {
    setSchedule(JSON.parse(JSON.stringify(savedWeeks[idx].schedule)));
    if (savedWeeks[idx].extShifts) setExtShifts(savedWeeks[idx].extShifts);
    setShowCopyModal(false);
  };
  const handleDeleteWeek = (idx) => {
    setSavedWeeks(p=>p.filter((_,i)=>i!==idx));
  };

  if (!employees.length) return (
    <div style={{textAlign:"center",padding:60,color:t.textDim,fontSize:14}}>
      <div style={{fontSize:36,marginBottom:12}}>◇</div>
      <div style={{marginBottom:20}}>Add employees first to build a schedule.</div>
      <button onClick={onOpenTestModal} style={{background:t.accent,color:"#fff",border:"none",
        padding:"11px 24px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit"}}>
        🧪 Generate Test Roster
      </button>
    </div>
  );

  return (
    <>
      {overtimeItems&&<OvertimeModal items={overtimeItems} onApprove={handleOvertimeApproval} onCancel={()=>{setOvertimeItems(null);setPendingSchedule(null);}}/>}

      {showExcelPreview && (
        <ExcelPreviewModal
          employees={employees}
          schedule={viewingHistory ? viewingHistory.schedule : schedule}
          extShifts={extShifts||[]}
          weekStart={weekStart}
          onDownload={()=>{ exportToExcel(employees, viewingHistory?viewingHistory.schedule:schedule, extShifts||[], weekStart); setShowExcelPreview(false); }}
          onClose={()=>{setShowExcelPreview(false);setPreviewMode(false);}}
          previewMode={previewMode}
        />
      )}
      {showPopout && (
        <SchedulePopout
          schedule={viewingHistory ? viewingHistory.schedule : schedule}
          extShifts={extShifts||[]}
          employees={employees}
          weekStart={weekStart}
          onClose={()=>setShowPopout(false)}
        />
      )}
      {showMinimize&&<MinimizeViolationsPanel employees={employees} schedule={schedule} setSchedule={setSchedule} extShifts={extShifts||[]} onClose={()=>setShowMinimize(false)}/>}
      {showCopyModal&&<CopyWeekModal schedule={schedule} savedWeeks={savedWeeks}
        onSave={handleSaveWeek} onLoad={handleLoadWeek} onDelete={handleDeleteWeek}
        onClose={()=>setShowCopyModal(false)}/>}
      {manualPairDay&&<ManualPairModal
        employees={employees} schedule={schedule}
        extShifts={extShifts||[]}
        initialDay={manualPairDay}
        onApprove={approveManualPair}
        onCancel={()=>setManualPairDay(null)}/>}
      {extSuggestions&&<ExtShiftApprovalModal suggestions={extSuggestions}
        onApprove={approveExtShift} onCancel={()=>setExtSuggestions(null)}/>}

      {scheduleStale && (
        <div style={{background:"transparent",border:"1px solid "+t.accent,borderRadius:8,
          padding:"12px 18px",marginBottom:12,display:"flex",alignItems:"center",
          justifyContent:"space-between",gap:16,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>🔁</span>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:t.accent}}>Schedule may need recalculating</div>
              <div style={{fontSize:11,color:t.textMuted,marginTop:2}}>
                Employee preferences, qualifications, or fatigue thresholds have changed. Recalculate to apply them.
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,flexShrink:0}}>
            <button onClick={()=>runAutoFill()} style={{background:t.accent,color:"#fff",border:"none",
              padding:"9px 20px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:700,
              fontFamily:"inherit",display:"flex",alignItems:"center",gap:6}}>
              ⚡ Recalculate Schedule
            </button>
            <button onClick={()=>setScheduleStale(false)} style={{background:"transparent",color:t.textMuted,
              border:"1px solid "+t.border,padding:"9px 14px",borderRadius:6,cursor:"pointer",
              fontSize:12,fontWeight:600,fontFamily:"inherit"}}>
              Dismiss
            </button>
          </div>
        </div>
      )}
      {(()=>{

        const uhCount  = employees.filter(e=>e.employmentType==="full-time"&&calcHours(e.id,schedule,extShifts||[])<40).length;
        const fatCount = employees.filter(e=>DAYS.some(d=>SHIFTS.some(s=>(schedule[cellKey(d,s.id)]||[]).some(a=>a.employeeId===e.id&&(calcConsecutiveNights(e.id,schedule,d,s.id)>=(cfg?.maxConsecutiveNights??MAX_CONSECUTIVE_NIGHTS)))))).length;
        const extCount = (extShifts||[]).length;
        const totalBanners = (uhCount>0?1:0)+(fatCount>0?1:0)+(extCount>0?1:0);
        if(totalBanners===0) return null;
        return (
          <div style={{marginBottom:8}}>
            {}
            {!bannersExpanded && (
              <button onClick={()=>setBannersExpanded(true)}
                style={{display:"flex",alignItems:"center",gap:8,background:t.warning+"14",
                  border:"1px solid "+t.warning+"50",borderRadius:6,padding:"5px 12px",
                  cursor:"pointer",fontFamily:"inherit",width:"100%",textAlign:"left"}}>
                <span style={{fontSize:11,fontWeight:700,color:t.warning}}>⚠ {totalBanners} schedule notice{totalBanners!==1?"s":""}</span>
                {uhCount>0&&<span style={{fontSize:10,color:t.textDim}}>{uhCount} under 40h</span>}
                {fatCount>0&&<span style={{fontSize:10,color:t.textDim}}>{fatCount} fatigue</span>}
                {extCount>0&&<span style={{fontSize:10,color:t.textDim}}>{extCount} 12hr pair{extCount!==1?"s":""}</span>}
                <span style={{marginLeft:"auto",fontSize:10,color:t.textDim}}>▼ expand</span>
              </button>
            )}
            {}
            {bannersExpanded && (
              <div>
                <div style={{display:"flex",justifyContent:"flex-end",marginBottom:4}}>
                  <button onClick={()=>setBannersExpanded(false)}
                    style={{background:"none",border:"none",cursor:"pointer",fontSize:11,
                      color:t.textDim,fontFamily:"inherit",padding:"0 4px"}}>▲ collapse</button>
                </div>
                <UnderHoursBanner employees={employees} schedule={schedule} extShifts={extShifts||[]}/>
                <FatigueBanner employees={employees} schedule={schedule}/>
                <PreferenceViolationBanner employees={employees} schedule={schedule}/>
                <ExtShiftBanner extShifts={extShifts||[]} employees={employees} onRemove={removeExtShift}/>
              </div>
            )}
          </div>
        );
      })()}

      {}
      <div style={{display:"flex",gap:20,marginBottom:12,fontSize:12,flexWrap:"wrap"}}>
        {ALL_POSITIONS.map(p=>(<span key={p} style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{width:10,height:10,borderRadius:2,background:pC(p,t)}}/>
          <span style={{color:t.textMuted}}>{p}</span>
        </span>))}
        <span style={{color:t.textDim}}>|</span>
        {SHIFTS.map(s=>(<span key={s.id} style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{width:10,height:3,borderRadius:1,background:sC(s.id,t)}}/>
          <span style={{color:t.textMuted}}>{s.label} ({s.time})</span>
        </span>))}
        <span style={{color:t.textDim}}>|</span>
        <span style={{display:"flex",alignItems:"center",gap:5,fontSize:10}}>
          <span style={{background:t.fatigue+"20",border:"1px solid "+t.fatigue+"50",padding:"1px 5px",borderRadius:3,color:t.fatigue,fontWeight:700}}>OFF</span>
          <span style={{color:t.textMuted}}>unavailable</span>
        </span>
        <span style={{display:"flex",alignItems:"center",gap:5,fontSize:10}}>
          <span style={{background:t.fatigue+"20",border:"1px solid "+t.fatigue+"50",padding:"1px 5px",borderRadius:3,color:t.fatigue,fontWeight:700}}>3N</span>
          <span style={{color:t.textMuted}}>consec. nights</span>
        </span>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,padding:"8px 14px",
        background:t.accent+"10",border:"1px solid "+t.accent+"25",borderRadius:6,fontSize:11,color:t.textMuted}}>
        <span style={{color:t.accent,fontWeight:700}}>ℹ</span>
        Every shift requires at least one <span style={{color:t.scale,fontWeight:700,margin:"0 3px"}}>Scale</span> and one
        <span style={{color:t.medical,fontWeight:700,margin:"0 3px"}}>Medical</span>.
        FT employees must reach {FT_MIN_HOURS}h/week. Max {cfg?.maxConsecutiveNights??MAX_CONSECUTIVE_NIGHTS} consecutive night shifts. Min {cfg?.minRestHours??MIN_REST_HOURS}h rest between shifts. Default OT: {cfg?.defaultOvertimePref||'neutral'}.
      </div>

      {}
      {!isReadOnly && <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16,padding:"10px 14px",
        background:t.surfaceAlt,border:"1px solid "+t.border,borderRadius:6}}>
        <span style={{fontSize:10,color:t.textDim,fontWeight:600,alignSelf:"center",marginRight:8}}>DRAG:</span>
        {stableEmpOrder.map(emp => {
          const hours     = calcHours(emp.id, schedule, extShifts);
          const isFT      = emp.employmentType==="full-time";
          const fatigueN  = getFatigueIssues(emp.id, schedule, cfg, employees).length;
          const borderCol = fatigueN>0 ? t.fatigue : isFT&&hours>40 ? t.warning : t.border;
          return (
            <span key={emp.id} draggable onDragStart={()=>{setDragEmp(emp);dragEmpRef.current=emp;}} onDragEnd={()=>{setDragEmp(null);dragEmpRef.current=null;}}
              style={{fontSize:10,fontWeight:600,padding:"4px 10px",borderRadius:4,background:t.surface,
                border:"1px solid "+borderCol,cursor:"grab",color:t.text,display:"flex",alignItems:"center",gap:4}}>
              {emp.name}
              {!isFT&&<span style={{fontSize:8,fontWeight:800,color:t.textMuted,
                background:t.surface,border:"1px solid "+t.border,padding:"0 3px",
                borderRadius:2,letterSpacing:".03em"}}>PT</span>}
              <span style={{fontSize:9,color:isFT&&hours<40?t.danger:isFT&&hours>40?t.warning:t.textDim}}>{hours}h</span>
              {fatigueN>0&&<span style={{fontSize:8,color:t.fatigue,fontWeight:800}}>⚠</span>}
              <span style={{display:"flex",gap:2}}>{emp.qualifications.map(q=>(
                <span key={q} style={{width:5,height:5,borderRadius:"50%",background:pC(q,t)}}/>
              ))}</span>
            </span>
          );
        })}
      </div>}

      {}
      <HistoryBar history={history} viewingHistory={viewingHistory} setViewingHistory={setViewingHistory} setSchedule={setSchedule} setWeekStart={setWeekStart} liveSchedule={liveSchedule} liveWeekStart={liveWeekStart} t={t} />

      {}
      {viewingHistory && (
        <div style={{background:t.warningDim,border:"1px solid "+t.warning,borderRadius:6,
          padding:"9px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span style={{fontSize:16}}>🔒</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:700,color:t.warning}}>
              VIEWING HISTORY — {viewingHistory.label || historyLabel(viewingHistory)}
            </div>
            <div style={{fontSize:10,color:t.textMuted,marginTop:2}}>
              Saved {new Date(viewingHistory.savedAt).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"})}
              {viewingHistory.isAutoSave ? "  •  Auto-save" : "  •  Named snapshot"}
            </div>

                      const hasFatigue = unavail||(nights>(cfg?.maxConsecutiveNights??MAX_CONSECUTIVE_NIGHTS))||(rest<(cfg?.minRestHours??MIN_REST_HOURS)&&rest!==Infinity);
                      const prefViolations = emp ? getPreferenceViolations(emp, day, shift.id, schedule) : [];
                      const hasPrefWarn    = prefViolations.length > 0;
                      const hasReqViol     = prefViolations.some(v=>v.type==="wrong_shift_required");
                      const isOnCallSlot = !!a.isOnCall;

                          {(()=>{

                        </div>

                                background:t.scale+"22",color:t.scale,border:"1px solid "+t.scale+"66"}}>
                              ⇄ Sub
                            </button>
                            <button
                              onClick={e=>{e.stopPropagation();setEditingCell(null);}}
                              style={{fontSize:9,fontWeight:700,padding:"3px 5px",borderRadius:3,cursor:"pointer",
                                background:"transparent",color:t.textDim,border:"1px solid "+t.border}}>
                              ✕
                            </button>
                          </div>
                        )}
                        </Fragment>
                      );

                    {cellExt.map((ext,ei)=>{

                      const extColor=extPair?.id==="day"?"#7c3aed":"#0e7490";
                      const halfLabel=extPair?.id==="day"?(coversFirst?"6A–2P":"2P–6P"):(coversFirst?"6P–2A":"2A–6A");
                      return (
                        <div key={"ext-"+ei+"-"+empIdForCell} style={{display:"flex",alignItems:"center",gap:5,padding:"4px 6px",

                          <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",

                            12H {halfLabel}</span>
                          <button onClick={()=>removeExtShift((extShifts||[]).findIndex(e=>e===ext))}
                            style={{background:"transparent",border:"none",color:t.textDim,cursor:"pointer",fontSize:10,padding:"0 2px",lineHeight:1}}
                            title="Remove 12hr shift">✕</button>
                        </div>
                      );
                    })}

                    {!isReadOnly&&!st.isFull&&!isEd&&(
                      <button onClick={()=>setEditingCell({day,shiftId:shift.id})}
                        style={{background:t.accent+"10",border:"1px dashed "+t.border,borderRadius:4,
                          color:t.textDim,cursor:"pointer",fontSize:11,padding:"4px 0",fontFamily:"inherit",
                          transition:"all .2s",marginTop:"auto"}}
                        onMouseEnter={e=>{e.target.style.borderColor=t.accent;e.target.style.color=t.accent;}}

                      <button onClick={()=>suggestExtShifts(day)}

                          marginTop:"auto",fontWeight:700,transition:"background .2s"}}
                        onMouseEnter={e=>{e.currentTarget.style.background="#7c3aed28";}}
                        onMouseLeave={e=>{e.currentTarget.style.background="#7c3aed14";}}>

                      </button>

                    {isEd&&(
                      <div style={{background:t.surfaceAlt,border:"1px solid "+t.accent,borderRadius:4,padding:6,marginTop:"auto"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                          {subSource && subSource.day===day && subSource.shiftId===shift.id ? (
                            <span style={{fontSize:10,color:t.scale,fontWeight:700}}>
                              ⇄ SUB for {employees.find(e=>e.id===subSource.employeeId)?.name?.split(" ")[1]||"?"}
                            </span>
                          ) : (
                            <span style={{fontSize:10,color:t.textMuted,fontWeight:600}}>SELECT</span>
                          )}
                          <button onClick={()=>{setEditingCell(null);setSubSource(null);}} style={{background:"transparent",border:"none",color:t.textDim,cursor:"pointer",fontSize:12}}>✕</button>
                        </div>
                        <EmpPickerSearch
                          day={day} shift={shift} subSource={subSource}
                          employees={employees} unassigned={unassigned}
                          getAssignable={getAssignable} assignEmp={assignEmp}
                          schedule={schedule} extShifts={extShifts} timeOffReqs={timeOffReqs}
                          weekStart={weekStart} executeSub={executeSub} st={st}
                          setEditingCell={setEditingCell} setSubSource={setSubSource} t={t}/>
                      </div>
                    )}
                    {st.isFull&&st.ok&&cellFatigue.length===0&&(
                      <div style={{fontSize:9,color:t.scale,textAlign:"center",marginTop:"auto",fontWeight:700,letterSpacing:".05em"}}>● FULL</div>
                    )}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      {}
      {swapSource && (
        <SwapIndicator
          swapSource={swapSource}
          employees={employees}
          onCancel={() => setSwapSource(null)} />
      )}
      {subSource && (
        <SubIndicator
          subSource={subSource}
          employees={employees}
          onCancel={() => { setSubSource(null); setEditingCell(null); }} />
      )}

      {}
      {scheduleIssues !== null && (
        <div style={{
          marginTop:16, borderRadius:8, overflow:"hidden",
          border:"1px solid "+(scheduleIssues.length===0 ? t.scale : scheduleIssues.some(i=>i.level==="error") ? t.danger : t.warning)+"60",
        }}>
          <div style={{
            padding:"8px 14px", display:"flex", alignItems:"center", justifyContent:"space-between",
            background:scheduleIssues.length===0 ? t.scale+"18" : scheduleIssues.some(i=>i.level==="error") ? t.danger+"18" : t.warning+"18",
          }}>
            <span style={{fontWeight:700, fontSize:12,
              color:scheduleIssues.length===0 ? t.scale : scheduleIssues.some(i=>i.level==="error") ? t.danger : t.warning}}>
              {scheduleIssues.length===0
                ? "✓ Schedule validated — no issues found"
                : scheduleIssues.some(i=>i.level==="error")
                  ? `⚠ ${scheduleIssues.filter(i=>i.level==="error").length} coverage/constraint issue${scheduleIssues.filter(i=>i.level==="error").length!==1?"s":""} found`
                  : `ℹ ${scheduleIssues.length} informational warning${scheduleIssues.length!==1?"s":""}`
              }
            </span>
            <button onClick={()=>setScheduleIssues(null)}
              style={{background:"none",border:"none",cursor:"pointer",fontSize:14,

          </div>
          {scheduleIssues.length>0 && (
            <div style={{padding:"8px 14px",display:"flex",flexDirection:"column",gap:4,

                  <span style={{flexShrink:0,fontWeight:700,
                    color:issue.level==="error" ? t.danger : t.warning}}>
                    {issue.level==="error" ? "✗" : "ℹ"}
                  </span>
                  <span style={{color:t.text}}>{issue.msg}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {}
      {Object.values(schedule||{}).some(a=>a.length>0) && (
        <div style={{display:"grid",gridTemplateColumns:"100px repeat(7,1fr)",gap:2,marginTop:4,marginBottom:4}}>
          <div style={{padding:"4px 8px",fontSize:9,fontWeight:700,color:t.textDim,
            letterSpacing:".06em",display:"flex",alignItems:"center"}}>DAILY</div>
          {DAYS.map(day => {
            const totals = SHIFTS.map(shift => {
              const a = getAsgn(day, shift.id);
              const cap = getEffectiveSlotCount(day, shift.id, displayExtShifts);
              const sup = isWeekday(day) && shift.id==="first" ? 1 : 0;
              const need = cap + sup;
              const bodies = a.length;
              const ok = bodies >= need && getStatus(day,shift.id).ok;
              const gap = bodies < need;
              return {ok, gap, bodies, need};
            });
            const anyGap = totals.some(t=>t.gap);
            const allOk  = totals.every(t=>t.ok);
            const col    = anyGap ? t.danger : allOk ? t.scale : t.warning;
            const total  = totals.reduce((s,t)=>s+t.bodies,0);
            const needed = totals.reduce((s,t)=>s+t.need,0);
            return (
              <div key={day} style={{padding:"3px 6px",borderRadius:3,textAlign:"center",
                background:col+"14",border:"1px solid "+col+"40"}}>

                  <div style={{fontSize:11,color:"#78350f",marginTop:1}}>This schedule has not passed all enforcement checks. Do not distribute until violations are resolved.</div>
                </div>
              </div>

                  <th style={{padding:"6px 10px",textAlign:"center",fontWeight:700,
                    borderBottom:"2px solid #ddd",width:60}}>Shift</th>

                    <th key={d} style={{padding:"6px 6px",textAlign:"center",fontWeight:700,
                      borderBottom:"2px solid #ddd"}}>{d.substring(0,3)}</th>

                    borderBottom:"2px solid #ddd"}}>Hrs</th>
