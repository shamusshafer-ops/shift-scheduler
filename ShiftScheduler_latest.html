      { key:"pt_guard",      label:"Guards",                 sub:"Guard only",                           quals:["Guard"] },
      { key:"pt_supervisor", label:"Supervisors",            sub:"Guard (Supervisor role)",               quals:["Supervisor","Guard"] },
      { key:"pt_medic",      label:"Medics",                 sub:"Medical + Guard",                      quals:["Medical","Guard"] },
      { key:"pt_scale",      label:"Scale Operators",        sub:"Scale + Guard",                        quals:["Scale","Guard"] },
      { key:"pt_dual_sm",    label:"Dual Scale / Medic",     sub:"Scale + Medical + Guard",              quals:["Scale","Medical","Guard"] },
      { key:"pt_sup_scale",  label:"Supervisor + Scale",     sub:"Scale + Guard (Supervisor)",            quals:["Supervisor","Scale","Guard"] },
      { key:"pt_sup_medic",  label:"Supervisor + Medic",     sub:"Medical + Guard (Supervisor)",          quals:["Supervisor","Medical","Guard"] },
      { key:"pt_sup_dual",   label:"Supervisor + Scale/Med", sub:"Scale + Medical + Guard (Supervisor)", quals:["Supervisor","Scale","Medical","Guard"] },
      { key:"pt_all",        label:"All Positions",          sub:"Scale + Medical + Guard (Supervisor)", quals:["Supervisor","Scale","Medical","Guard"] },
    ]},
  ];

  const getColor = (quals) => {
    
    if (quals.includes("Scale") && quals.includes("Medical")) return t.scale;
    if (quals.includes("Scale")) return t.scale;
    if (quals.includes("Medical")) return t.medical;
    return t.guard;
  };

  const total = Object.values(counts).reduce((a,b)=>a+b, 0);
  const numStyle = { background:t.surfaceAlt,border:"1px solid "+t.border,color:t.text,
    padding:"7px 0",borderRadius:6,outline:"none",fontSize:14,fontFamily:"inherit",width:56,textAlign:"center" };

  const Stepper = ({ k }) => (
    <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
      <button onClick={()=>set(k)(v=>v-1)} style={{width:28,height:28,borderRadius:5,border:"1px solid "+t.border,
        background:t.surface,color:t.text,cursor:"pointer",fontSize:18,lineHeight:1,
        display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>−</button>
      <input type="number" value={counts[k]} min={0} onChange={e=>set(k)(parseInt(e.target.value)||0)} style={numStyle}/>
      <button onClick={()=>set(k)(v=>v+1)} style={{width:28,height:28,borderRadius:5,border:"1px solid "+t.border,
        background:t.surface,color:t.text,cursor:"pointer",fontSize:18,lineHeight:1,
        display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>+</button>
    </div>
  );

  const QualDots = ({quals}) => (
    <span style={{display:"flex",gap:3,alignItems:"center",flexShrink:0}}>
      {ALL_POSITIONS.map(p => (
        <span key={p} style={{width:8,height:8,borderRadius:"50%",
          background:quals.includes(p)?pC(p,t):t.border,
          border:"1px solid "+(quals.includes(p)?pC(p,t):t.textDim),
          display:"inline-block",flexShrink:0}} title={p}/>
      ))}
    </span>
  );

  const handleGenerate = () => {
    const usedNames = new Set();
    const employees = [];
    const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2);
    const make = (qualifications, type) => {
      const name = generateName(usedNames);
      usedNames.add(name);
      employees.push({
        id:uid(), name, qualifications, employmentType:type,
        unavailableDays:[], preferredShifts:[], blockedShifts:[],
        requiredShift:null, preferredDaysOff:[], overtimePref:"neutral",
        willing16h:false, maxShiftsPerWeek:null, maxWeekendDays:null, ext12hPref:null,
      });
    };
    ROSTER_DEFS.forEach(section => {
      section.entries.forEach(entry => {
        const n = counts[entry.key]||0;
        for (let i=0; i<n; i++) make([...entry.quals], section.type);
      });
    });
    onGenerate(employees);
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
      <div style={{background:t.surface,border:"1px solid "+t.accent,borderRadius:12,
        padding:28,maxWidth:560,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.6)",
        maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <span style={{fontSize:22}}>🧪</span>
          <h2 style={{margin:0,fontSize:16,fontWeight:700,color:t.accent}}>GENERATE TEST ROSTER</h2>
        </div>
        <p style={{margin:"0 0 20px",fontSize:12,color:t.textMuted}}>
          Configure your test workforce composition. Each row generates randomly named employees with the listed qualifications.
        </p>
        {ROSTER_DEFS.map(section => (
          <div key={section.section}>
            <div style={{fontSize:10,color:t.textDim,fontWeight:700,letterSpacing:".08em",marginBottom:8,marginTop:4}}>{section.section}</div>
            <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:16}}>
              {section.entries.map(entry => {
                const color = getColor(entry.quals);
                const active = (counts[entry.key]||0) > 0;
                return (
                  <div key={entry.key} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:6,
                    background:active?color+"0d":t.surfaceAlt,border:"1px solid "+(active?color+"55":t.border)}}>
                    <QualDots quals={entry.quals}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:12,color:active?color:t.text,lineHeight:1.3}}>{entry.label}</div>
                      <div style={{fontSize:10,color:t.textDim,marginTop:1}}>{entry.sub}</div>
                    </div>
                    <Stepper k={entry.key}/>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
        <div style={{padding:"10px 14px",background:t.accent+"12",border:"1px solid "+t.accent+"35",
          borderRadius:6,marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:12,color:t.textMuted}}>Total employees to generate:</span>
          <span style={{fontSize:20,fontWeight:700,color:t.accent}}>{total}</span>
        </div>
        {total===0&&<div style={{padding:"8px 14px",background:t.dangerDim,border:"1px solid "+t.danger,
          borderRadius:6,marginBottom:16,fontSize:12,color:t.name==="dark"?"#fca5a5":t.danger}}>
          Set at least one employee count above to generate a roster.</div>}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={onCancel} style={{background:"transparent",color:t.textMuted,border:"1px solid "+t.border,
            padding:"9px 20px",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>CANCEL</button>
          <button onClick={handleGenerate} disabled={total===0}
            style={{background:total===0?t.border:t.accent,color:total===0?t.textDim:"#fff",border:"none",
              padding:"9px 22px",borderRadius:6,cursor:total===0?"not-allowed":"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit"}}>
            ⚡ GENERATE & AUTO-FILL
          </button>
        </div>
      </div>
    </div>
  );
}

function CopyWeekModal({ schedule, savedWeeks, onSave, onLoad, onDelete, onClose }) {
  const t = useTheme();
  const [saveName, setSaveName] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(null);

  const filledCount = Object.values(schedule).reduce((s,a)=>s+a.length,0);

  const handleSave = () => {
    const name = saveName.trim();
    if (!name) return;
    onSave(name);
    setSaveName("");
  };

  const iS = { background:t.surfaceAlt,border:"1px solid "+t.border,color:t.text,
    padding:"9px 12px",borderRadius:6,outline:"none",fontSize:13,fontFamily:"inherit",flex:1 };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
      <div style={{background:t.surface,border:"1px solid "+t.accent,borderRadius:12,
        padding:28,maxWidth:480,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.6)",maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>💾</span>
            <h2 style={{margin:0,fontSize:16,fontWeight:700,color:t.accent}}>SAVED WEEKS</h2>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:t.textDim,
            cursor:"pointer",fontSize:18,padding:4}}>✕</button>
        </div>

        {}
        <div style={{marginBottom:24}}>
          <div style={{fontSize:10,color:t.textDim,fontWeight:700,letterSpacing:".08em",marginBottom:8}}>SAVE CURRENT WEEK</div>
          <div style={{background:t.surfaceAlt,border:"1px solid "+t.border,borderRadius:6,padding:"10px 14px",marginBottom:10,fontSize:11,color:t.textMuted}}>
            Current schedule: <span style={{color:t.text,fontWeight:700}}>{filledCount}</span> assignments across {Object.values(schedule).filter(a=>a.length>0).length} shifts
          </div>
          <div style={{display:"flex",gap:8}}>
            <input value={saveName} onChange={e=>setSaveName(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handleSave()}
              placeholder='Name this week (e.g. "Week 1 - Standard")'
              style={iS}/>
            <button onClick={handleSave} disabled={!saveName.trim()||!filledCount}
              style={{background:saveName.trim()&&filledCount?t.accent:t.border,
                color:saveName.trim()&&filledCount?"#fff":t.textDim,
                border:"none",padding:"9px 16px",borderRadius:6,cursor:saveName.trim()&&filledCount?"pointer":"not-allowed",
                fontSize:12,fontWeight:700,fontFamily:"inherit",whiteSpace:"nowrap"}}>
              SAVE
            </button>
          </div>
          {!filledCount&&<div style={{fontSize:11,color:t.textDim,marginTop:6}}>No assignments to save — fill the schedule first.</div>}
        </div>

        {}
        <div style={{fontSize:10,color:t.textDim,fontWeight:700,letterSpacing:".08em",marginBottom:8}}>SAVED WEEKS</div>
        {savedWeeks.length===0 ? (
          <div style={{textAlign:"center",padding:"24px 0",color:t.textDim,fontSize:13}}>
            <div style={{fontSize:28,marginBottom:8}}>💾</div>
            No saved weeks yet. Save the current schedule above.
          </div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {savedWeeks.map((week,i) => (
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",
                background:t.surfaceAlt,border:"1px solid "+t.border,borderRadius:6}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:13,color:t.text}}>{week.name}</div>
                  <div style={{fontSize:10,color:t.textDim,marginTop:2}}>
                    {week.assignments} assignments • saved {week.savedAt}
                  </div>
                </div>
                {confirmDelete===i ? (
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <span style={{fontSize:10,color:t.danger}}>Delete?</span>
                    <button onClick={()=>{onDelete(i);setConfirmDelete(null);}}
                      style={{background:t.danger,color:"#fff",border:"none",padding:"4px 10px",
                        borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>YES</button>
                    <button onClick={()=>setConfirmDelete(null)}
                      style={{background:"transparent",color:t.textMuted,border:"1px solid "+t.border,
                        padding:"4px 10px",borderRadius:4,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>NO</button>
                  </div>
                ) : (
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>onLoad(i)}
                      style={{background:t.accent,color:"#fff",border:"none",padding:"6px 14px",
                        borderRadius:5,cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>
                      LOAD
                    </button>
                    <button onClick={()=>setConfirmDelete(i)}
                      style={{background:"transparent",color:t.textDim,border:"1px solid "+t.border,
                        padding:"6px 10px",borderRadius:5,cursor:"pointer",fontSize:11,fontFamily:"inherit"}}>
                      ✕
                    </button>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function ExtShiftApprovalModal({ suggestions, onApprove, onCancel }) {
  const t = useTheme();
  const [selected, setSelected] = useState(null);

  const s = selected !== null ? suggestions[selected] : suggestions[0];
  const empColor = "#7c3aed";

  const formatCovered = (gaps) => {
    const byShift = {};
    gaps.forEach(g => { (byShift[g.shiftId] = byShift[g.shiftId] || []).push(g.role); });
    return Object.entries(byShift).map(([sid, roles]) => {
      const lbl = SHIFTS.find(sh => sh.id === sid)?.label || sid;
      return `${lbl}: ${roles.join(", ")}`;
    }).join(" · ");
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",
      alignItems:"center",justifyContent:"center",zIndex:1100,padding:20}}>
      <div style={{background:t.surface,border:"1px solid "+empColor,borderRadius:10,
        padding:28,maxWidth:520,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.6)",maxHeight:"90vh",overflowY:"auto"}}>

        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <span style={{fontSize:22}}>⏱</span>
          <h2 style={{margin:0,fontSize:16,fontWeight:700,color:empColor}}>12-HOUR EXTENDED SHIFT APPROVAL</h2>
        </div>
        <p style={{margin:"0 0 18px",fontSize:12,color:t.textMuted,lineHeight:1.6}}>
          A coverage gap exists that cannot be filled with normal 8-hour shifts.
          The following pairing would resolve it by having two employees each work
          a 12-hour shift. <strong style={{color:t.warning}}>This requires explicit approval.</strong>
        </p>

        {}
        {suggestions.length > 1 && (
          <div style={{marginBottom:16}}>
            <div style={{fontSize:10,color:t.textDim,fontWeight:700,letterSpacing:".06em",marginBottom:6}}>
              SELECT PAIRING ({suggestions.length} options available)
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {suggestions.map((sg, i) => (
                <button key={i} onClick={()=>setSelected(i)} style={{
                  background:(selected===i||(selected===null&&i===0))?empColor+"18":t.surfaceAlt,
                  border:"1.5px solid "+((selected===i||(selected===null&&i===0))?empColor:t.border),
                  borderRadius:6,padding:"8px 12px",cursor:"pointer",textAlign:"left",fontFamily:"inherit",
                  display:"flex",alignItems:"center",gap:10,
                }}>
                  <span style={{fontSize:11,fontWeight:700,color:empColor}}>Option {i+1}</span>
                  <span style={{fontSize:11,color:t.text}}>
                    {sg.empA.name}{sg.empB?" + "+sg.empB.name:" (solo)"}
                  </span>
                  <span style={{marginLeft:"auto",fontSize:10,color:t.textMuted}}>
                    {sg.pair.label}
                  </span>
                </button>
              ))}
            </div>
          </div>
        )}

        {s && (
          <>
            {}
            <div style={{background:t.surfaceAlt,borderRadius:8,padding:16,marginBottom:16,
              border:"1px solid "+empColor+"30"}}>
              <div style={{fontSize:10,color:t.textDim,fontWeight:700,letterSpacing:".06em",marginBottom:12}}>
                SHIFT PAIRING — {s.day.toUpperCase()} — {s.pair.label.toUpperCase()} COVERAGE
              </div>

              {}
              <div style={{marginBottom:14}}>
                <div style={{display:"flex",borderRadius:4,overflow:"hidden",height:28,marginBottom:6}}>
                  <div style={{flex:1,background:t.shiftFirst+"30",border:"1px solid "+t.shiftFirst+"60",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:t.shiftFirst}}>
                    1st 0600–1400
                  </div>
                  <div style={{flex:1,background:t.shiftSecond+"30",border:"1px solid "+t.shiftSecond+"60",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:t.shiftSecond}}>
                    2nd 1400–2200
                  </div>
                  <div style={{flex:1,background:t.shiftThird+"30",border:"1px solid "+t.shiftThird+"60",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:t.shiftThird}}>
                    3rd 2200–0600
                  </div>
                </div>
                {}
                {s.empA && (
                  <div style={{display:"flex",height:22,marginBottom:3}}>
                    <div style={{width:"33.3%",background: s.pair.id==="night"?"transparent":empColor+"40",
                      borderRadius: s.pair.id==="night"?"0":"3px 0 0 3px",
                      border: s.pair.id==="night"?"none":"1px solid "+empColor+"80",
                      display:"flex",alignItems:"center",paddingLeft:4,fontSize:9,fontWeight:700,color:empColor}}>
                      {s.pair.id!=="night" ? s.empA.name : ""}

                      {s.empB.name.split(" ")[0]}

                  </div>

              {}
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {[s.empA, s.empB].filter(Boolean).map((emp, i) => (
                  <div key={emp.id} style={{flex:"1 1 200px",background:t.surface,

                      ))}
                    </div>
                    <div style={{fontSize:10,color:t.textMuted}}>
                      {emp.employmentType==="full-time"?"FT":"PT"} ·

              </div>
            </div>

            {}
            <div style={{background:t.accent+"0a",border:"1px solid "+t.accent+"30",borderRadius:6,
              padding:"10px 14px",marginBottom:18,fontSize:11,color:t.textMuted}}>
              <span style={{color:t.accent,fontWeight:700}}>✓ Gaps resolved: </span>
              {formatCovered(s.coveredGaps)}
            </div>

            {}
            <div style={{background:t.warningDim,border:"1px solid "+t.warning+"60",borderRadius:6,
              padding:"10px 14px",marginBottom:18,fontSize:11,color:t.name==="dark"?"#fcd34d":t.warning}}>
              <div style={{fontWeight:700,marginBottom:4}}>⚠ Before approving, confirm:</div>
              <div style={{lineHeight:1.7}}>
                • Each employee will work {EXT_SHIFT_HOURS} consecutive hours<br/>
                • This should only be used when no normal 8-hour solution is possible<br/>
                • Extended hours count toward weekly totals and may trigger overtime<br/>
                • Employees retain the right to refuse extended assignments
              </div>
            </div>
          </>
        )}

        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={onCancel} style={{background:"transparent",color:t.textMuted,
            border:"1px solid "+t.border,padding:"9px 20px",borderRadius:6,cursor:"pointer",
            fontSize:12,fontWeight:600,fontFamily:"inherit"}}>
            CANCEL — Keep Normal Shifts
          </button>
          <button onClick={()=>onApprove(s)} disabled={!s}
            style={{background:s?empColor:t.border,color:s?"#fff":t.textDim,border:"none",
              padding:"9px 20px",borderRadius:6,cursor:s?"pointer":"not-allowed",
              fontSize:12,fontWeight:700,fontFamily:"inherit"}}>
            ✓ APPROVE EXTENDED SHIFT
          </button>
        </div>
      </div>
    </div>
  );
}

              </div>
            ))}

        </div>

        <div style={{padding:"16px 28px 24px",flexShrink:0,borderTop:"1px solid "+t.border,display:"flex",gap:10,justifyContent:"flex-end"}}>

            padding:"9px 20px",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>CANCEL AUTO-FILL</button>
          <button onClick={()=>onApprove(approved)} style={{background:t.warning,color:"#000",border:"none",
            padding:"9px 20px",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"inherit"}}>

        </div>
      </div>
    </div>
  );
}

function ManualPairModal({ employees, schedule, extShifts, initialDay, onApprove, onCancel }) {
  const t = useTheme();
  const [day,     setDay]     = useState(initialDay || DAYS[1]);
  const [pairId,  setPairId]  = useState("day");
  const [empAId,  setEmpAId]  = useState("");
  const [empBId,  setEmpBId]  = useState("");
  const [mode,    setMode]    = useState("suggest");

  const pair = EXT_PAIRS.find(p => p.id === pairId);

  const alreadyExists = (extShifts||[]).some(e => e.day === day && e.pairId === pairId);

  const available = employees.filter(e => !(e.unavailableDays||[]).includes(day));

  const availableA = available.filter(e => canWorkExtHalf(e, pairId, 0));
  const availableB = available.filter(e => canWorkExtHalf(e, pairId, 1));

  const empAConflict = empA ? extHalfConflictReason(empA, pairId, 0) : null;
  const empBConflict = empB ? extHalfConflictReason(empB, pairId, 1) : null;

  const suggestions = useMemo(() => {
    const out = [];
    for (let i = 0; i < available.length; i++) {
      for (let j = i + 1; j < available.length; j++) {
        const a = available[i], b = available[j];
        const combined = [...new Set([...a.qualifications, ...b.qualifications])];
        const coversScale   = combined.includes("Scale");
        const coversMedical = combined.includes("Medical");
        if (!coversScale || !coversMedical) continue;
        const bothFull = a.qualifications.includes("Scale") && a.qualifications.includes("Medical")
                      && b.qualifications.includes("Scale") && b.qualifications.includes("Medical");
        const score = bothFull ? 2 : (a.qualifications.includes("Scale") && b.qualifications.includes("Medical"))
                               || (b.qualifications.includes("Scale") && a.qualifications.includes("Medical")) ? 1 : 0;
        const abOk = canWorkExtHalf(a, pairId, 0) && canWorkExtHalf(b, pairId, 1);
        const baOk = canWorkExtHalf(b, pairId, 0) && canWorkExtHalf(a, pairId, 1);
        if (!abOk && !baOk) continue;
        const [sa, sb] = abOk ? [a, b] : [b, a];
        out.push({ a: sa, b: sb, coversScale, coversMedical, score });
      }
    }
    return out.sort((x, y) => y.score - x.score).slice(0, 6);
  }, [available, pairId]);

  const empA = employees.find(e => e.id === empAId);
  const empB = employees.find(e => e.id === empBId);

  const combined = empA && empB ? [...new Set([...empA.qualifications, ...empB.qualifications])] : [];
  const hasScale   = combined.includes("Scale");
  const hasMedical = combined.includes("Medical");
  const compatible = hasScale && hasMedical;
  const canSubmit  = empAId && empBId && empAId !== empBId && !alreadyExists && compatible;

  const QDot = ({ pos }) => (
    <span style={{width:7,height:7,borderRadius:"50%",background:pC(pos,t),
      display:"inline-block",flexShrink:0}} title={pos}/>
  );

  const EmpRow = ({ emp, slot }) => {
    if (!emp) return null;
    const isFT = emp.employmentType === "full-time";
    return (
      <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",
        background:t.surface,border:"1px solid "+t.accent+"40",borderRadius:5,marginTop:6}}>
        <span style={{fontWeight:700,fontSize:12,flex:1}}>{emp.name}</span>
        <span style={{fontSize:8,fontWeight:700,padding:"1px 4px",borderRadius:3,
          background:(isFT?t.accent:emp.employmentType==="on-call"?t.warning:t.scale)+"20",color:isFT?t.accent:emp.employmentType==="on-call"?t.warning:t.scale,
          border:"1px solid "+(isFT?t.accent:emp.employmentType==="on-call"?t.warning:t.scale)+"40"}}>{isFT?"FT":emp.employmentType==="on-call"?"OC":"PT"}</span>
        <div style={{display:"flex",gap:3}}>
          {emp.qualifications.map(q => <QDot key={q} pos={q}/>)}
        </div>
        <span style={{fontSize:9,color:t.textDim}}>{slot}</span>
      </div>
    );
  };

  const handleApprove = () => {
    if (!canSubmit) return;
    onApprove({
      pairId,
      day,
      empAId,
      empBId,
      roles: ["Scale","Medical"].filter(r => combined.includes(r)),
      approvedAt: new Date().toLocaleDateString(),
    });
  };

  const iS = { background:t.surfaceAlt, border:"1px solid "+t.border, color:t.text,
    padding:"8px 12px", borderRadius:6, fontSize:12, fontFamily:"inherit",
    outline:"none", width:"100%", boxSizing:"border-box" };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",
      alignItems:"center",justifyContent:"center",zIndex:1100,padding:20}}>
      <div style={{background:t.surface,border:"1px solid #7c3aed",borderRadius:10,
        padding:28,maxWidth:540,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.6)",
        maxHeight:"90vh",overflowY:"auto"}}>

        {}
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <span style={{fontSize:22}}>⏱</span>
          <h2 style={{margin:0,fontSize:16,fontWeight:700,color:"#7c3aed"}}>
            PAIR EMPLOYEES — 12-HOUR SHIFTS
          </h2>
        </div>
        <p style={{margin:"0 0 20px",fontSize:12,color:t.textMuted,lineHeight:1.6}}>
          Pair two employees to cover a full day with 12-hour shifts.
          <strong style={{color:"#7c3aed"}}> Day: 0600–1800 · Night: 1800–0600.</strong>
          {" "}Together they must cover at least Scale and Medical.
        </p>

        {}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
          <div>
            <label style={{display:"block",fontSize:10,color:t.textDim,fontWeight:700,
              letterSpacing:".06em",marginBottom:6}}>DAY</label>
            <select value={day} onChange={e=>setDay(e.target.value)} style={iS}>
              {DAYS.map(d=>(
                <option key={d} value={d}>{d}</option>
              ))}
            </select>
          </div>
          <div>
            <label style={{display:"block",fontSize:10,color:t.textDim,fontWeight:700,
              letterSpacing:".06em",marginBottom:6}}>COVERAGE WINDOW</label>
            <div style={{display:"flex",borderRadius:6,overflow:"hidden",
              border:"1px solid "+t.border,height:36}}>
              {EXT_PAIRS.map(p=>(
                <button key={p.id} onClick={()=>setPairId(p.id)} style={{
                  flex:1,background:pairId===p.id?"#7c3aed":t.surfaceAlt,
                  color:pairId===p.id?"#fff":t.textMuted,border:"none",
                  cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit"}}>
                  {p.label}
                </button>
              ))}
            </div>
          </div>
        </div>

        {alreadyExists && (
          <div style={{background:t.warning+"18",border:"1px solid "+t.warning+"50",
            borderRadius:6,padding:"8px 14px",marginBottom:16,fontSize:12,color:t.warning,fontWeight:600}}>
            ⚠ A {pair?.label} pairing already exists for {day}. Adding another will stack.
          </div>
        )}

        {}
        <div style={{display:"flex",borderRadius:6,overflow:"hidden",border:"1px solid "+t.border,
          marginBottom:16,width:"fit-content"}}>
          {[["suggest","💡 Suggestions"],["free","✎ Free Pick"]].map(([v,label])=>(
            <button key={v} onClick={()=>{ setMode(v); setEmpAId(""); setEmpBId(""); }} style={{
              background:mode===v?t.accent:t.surfaceAlt,
              color:mode===v?"#fff":t.textMuted,
              border:"none",padding:"7px 18px",cursor:"pointer",
              fontSize:11,fontWeight:700,fontFamily:"inherit"}}>
              {label}
            </button>
          ))}
        </div>

        {}
        {mode==="suggest" && (
          <div>
            {suggestions.length === 0 ? (
              <div style={{textAlign:"center",padding:"20px 0",color:t.textDim,fontSize:12}}>
                No compatible pairs found for {day}. Try Free Pick to override.
              </div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {suggestions.map(({a, b, score},i)=>{
                  const sel = empAId===a.id && empBId===b.id;
                  const combinedQ = [...new Set([...a.qualifications,...b.qualifications])];
                  return (
                    <div key={i}
                      onClick={()=>{ setEmpAId(a.id); setEmpBId(b.id); }}
                      style={{padding:"10px 14px",borderRadius:6,cursor:"pointer",
                        background:sel?"#7c3aed18":t.surfaceAlt,
                        border:"1.5px solid "+(sel?"#7c3aed":t.border),
                        transition:"all .15s"}}
                      onMouseEnter={e=>{ if(!sel) e.currentTarget.style.borderColor="#7c3aed60"; }}
                      onMouseLeave={e=>{ if(!sel) e.currentTarget.style.borderColor=t.border; }}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                        <span style={{fontSize:11,fontWeight:700,color:t.text,flex:1}}>
                          {a.name}
                          <span style={{color:t.textDim,fontWeight:400}}> + </span>
                          {b.name}
                        </span>
                        {score===2&&<span style={{fontSize:9,background:"#7c3aed",color:"#fff",
                          padding:"1px 7px",borderRadius:10,fontWeight:700}}>BEST</span>}
                        {sel&&<span style={{fontSize:11,color:"#7c3aed",fontWeight:700}}>✓ Selected</span>}
                      </div>
                      <div style={{display:"flex",gap:8,fontSize:10,color:t.textDim,flexWrap:"wrap"}}>
                        <span>
                          <span style={{fontWeight:600,color:t.text}}>{a.name.split(" ")[0]}:</span>
                          {" "}{pairId==="day"?"0600–1800":"1800–0600"}
                        </span>
                        <span>
                          <span style={{fontWeight:600,color:t.text}}>{b.name.split(" ")[0]}:</span>
                          {" "}{pairId==="day"?"1800–0600":"0600–1800"}
                        </span>
                        <span style={{marginLeft:"auto",display:"flex",gap:4,alignItems:"center"}}>
                          Combined:{" "}
                          {combinedQ.map(q=><QDot key={q} pos={q}/>)}
                        </span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {}
        {mode==="free" && (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div>
              <label style={{display:"block",fontSize:10,color:t.textDim,fontWeight:700,
                letterSpacing:".06em",marginBottom:6}}>
                EMPLOYEE A — {pairId==="day"?"0600–1800":"1800–0600"}
              </label>
              <select value={empAId} onChange={e=>setEmpAId(e.target.value)} style={iS}>
                <option value="">— select —</option>
                {availableA.map(e=>(
                  <option key={e.id} value={e.id} disabled={e.id===empBId}>
                    {e.name} [{e.qualifications.join("/")}]
                  </option>
                ))}
                {available.filter(e=>!canWorkExtHalf(e,pairId,0)&&!e.unavailableDays?.includes(day)).length>0&&(
                  <option disabled value="">── shift-locked (hidden) ──</option>

              </select>
              {empAConflict&&<div style={{fontSize:10,color:t.warning,fontWeight:700,marginTop:4}}>⚠ {empAConflict}</div>}
              <EmpRow emp={empA} slot={pairId==="day"?"0600–1800":"1800–0600"}/>
            </div>
            <div>
              <label style={{display:"block",fontSize:10,color:t.textDim,fontWeight:700,
                letterSpacing:".06em",marginBottom:6}}>
                EMPLOYEE B — {pairId==="day"?"1800–0600":"0600–1800"}
              </label>
              <select value={empBId} onChange={e=>setEmpBId(e.target.value)} style={iS}>
                <option value="">— select —</option>
                {availableB.map(e=>(
                  <option key={e.id} value={e.id} disabled={e.id===empAId}>
                    {e.name} [{e.qualifications.join("/")}]
                  </option>
                ))}
                {available.filter(e=>!canWorkExtHalf(e,pairId,1)&&!e.unavailableDays?.includes(day)).length>0&&(
                  <option disabled value="">── shift-locked (hidden) ──</option>
                )}
              </select>
              {empBConflict&&<div style={{fontSize:10,color:t.warning,fontWeight:700,marginTop:4}}>⚠ {empBConflict}</div>}
              <EmpRow emp={empB} slot={pairId==="day"?"1800–0600":"0600–1800"}/>
            </div>
          </div>
        )}

        {}
        {mode==="free" && empAId && empBId && (
          <div style={{marginTop:14,padding:"8px 14px",borderRadius:6,fontSize:11,
            background:compatible?"#22c55e18":t.danger+"18",
            border:"1px solid "+(compatible?"#22c55e50":t.danger+"50"),
            color:compatible?"#22c55e":t.danger,fontWeight:600}}>
            {compatible
              ? `✓ Compatible — covers: ${combined.filter(q=>["Scale","Medical"].includes(q)).join(" + ")}`
              : `⚠ Missing: ${["Scale","Medical"].filter(r=>!combined.includes(r)).join(" + ")} — pair won't meet shift requirements`}
          </div>
        )}

        {}
        {(empAId || (mode==="suggest" && empAId)) && empBId && (
          <div style={{marginTop:14,background:t.surfaceAlt,borderRadius:6,overflow:"hidden",
            border:"1px solid "+t.border}}>
            <div style={{display:"flex",height:28}}>
              <div style={{flex:1,background:"#7c3aed30",borderRight:"2px solid #7c3aed",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,
                fontWeight:700,color:"#7c3aed"}}>
                {employees.find(e=>e.id===empAId)?.name.split(" ")[0]} · {pairId==="day"?"0600–1800":"1800–0600"}
              </div>
              <div style={{flex:1,background:"#0e749018",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,
                fontWeight:700,color:"#0e7490"}}>
                {employees.find(e=>e.id===empBId)?.name.split(" ")[0]} · {pairId==="day"?"1800–0600":"0600–1800"}
              </div>
            </div>
          </div>
        )}

        {}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:24}}>
          <button onClick={onCancel}
            style={{background:"transparent",color:t.textMuted,border:"1px solid "+t.border,
              padding:"9px 20px",borderRadius:6,cursor:"pointer",fontSize:12,
              fontWeight:600,fontFamily:"inherit"}}>
            CANCEL
          </button>
          <button onClick={handleApprove} disabled={!canSubmit}
            style={{background:canSubmit?"#7c3aed":t.border,color:canSubmit?"#fff":t.textDim,
              border:"none",padding:"9px 22px",borderRadius:6,cursor:canSubmit?"pointer":"default",
              fontSize:12,fontWeight:700,fontFamily:"inherit",transition:"background .2s"}}>
            ⏱ CONFIRM PAIRING
          </button>
        </div>
      </div>
    </div>
  );
}

function UnderHoursBanner({ employees, schedule, extShifts }) {

  const hasReq = useMemo(() =>

    [employees, schedule]);

  const borderCol = count === 0 ? t.border : hasReq ? t.danger+"55" : t.warning+"55";

function buildViolationList(employees, schedule, extShiftsArg) {
  const SEVERITY = { rule2_headcount: -3, rule3_role: -2, supervisor_missing: -1, wrong_shift_required: 0, unavailable: 1, days_off: 2, wrong_shift: 3, overwork: 4, under_hours: 5 };
  const items = [];

  // Rule 2/3 violations — shown as read-only info rows (cannot be auto-fixed by the minimizer)
  DAYS.forEach(day => {
    SHIFTS.forEach(shift => {
      const asgn     = schedule[cellKey(day, shift.id)] || [];
      const cellExt  = (extShiftsArg||[]).filter(e => extCovers(e, day, shift.id));
      const extBodies= cellExt.reduce((n,ext)=>{
        const pair=EXT_PAIRS.find(p=>p.id===ext.pairId); if(!pair) return n;
        const idx=pair.covers.indexOf(shift.id);
        return n+((idx===0?!!ext.empAId:idx===1?!!ext.empBId:false)?1:0);
      }, 0);
      const totalBodies = asgn.length + extBodies;
      const shiftLabel = `${day} ${shift.label}`;
      if (totalBodies > 0 && totalBodies < 3) {
        // Only show if someone IS scheduled (empty shifts are a separate issue)
        const anchorEmp = asgn.length > 0
          ? employees.find(e => e.id === asgn[0]?.employeeId)
          : null;
        if (anchorEmp) items.push({ emp: anchorEmp, day, shiftId: shift.id, position: null,
          type: "rule2_headcount", severity: -3, readOnly: true,
          msg: `${shiftLabel}: only ${totalBodies} person${totalBodies===1?"":"s"} (min 3 required)` });
      }
      const extHasScale=cellExt.some(e=>(e.roles||[]).includes("Scale"));
      const extHasMed  =cellExt.some(e=>(e.roles||[]).includes("Medical"));
      const hasScale   =slotHasRole(asgn,employees,"Scale")  ||extHasScale;
      const hasMed     =slotHasRole(asgn,employees,"Medical")||extHasMed;
      if (asgn.length > 0 && !hasScale) {
        const anchorEmp = employees.find(e => e.id === asgn[0]?.employeeId);
        if (anchorEmp) items.push({ emp: anchorEmp, day, shiftId: shift.id, position: null,
          type: "rule3_role", severity: -2, readOnly: true,
          msg: `${shiftLabel}: no Scale assigned` });
      }
      if (asgn.length > 0 && !hasMed) {
        const anchorEmp = employees.find(e => e.id === asgn[0]?.employeeId);
        if (anchorEmp) items.push({ emp: anchorEmp, day, shiftId: shift.id, position: null,
          type: "rule3_role", severity: -2, readOnly: true,
          msg: `${shiftLabel}: no Medical assigned` });
      }
    });
  });

  // Supervisor missing — one violation per day, only if roster has a supervisor
  const supervisors = employees.filter(e => (e.qualifications||[]).includes("Supervisor"));
  if (supervisors.length > 0) {
    WEEKDAYS.forEach(day => {
      const asgn = schedule[cellKey(day, "first")] || [];
      const supPresent = asgn.some(a => {
        const emp = employees.find(e => e.id === a.employeeId);
        return emp && (emp.qualifications||[]).includes("Supervisor");
      });
      if (!supPresent) {
        const sup = supervisors.find(e => !(e.unavailableDays||[]).includes(day)) || supervisors[0];
        items.push({ emp: sup, day, shiftId: "first", position: null,
          type: "supervisor_missing", severity: -1,
          msg: `No supervisor scheduled for 1st shift on ${day}` });
      }
    });
  }

  employees.forEach(emp => {
    if (emp.employmentType !== "full-time") return;
    const hrs = calcHours(emp.id, schedule, extShiftsArg || []);
    if (hrs >= FT_MIN_HOURS) return;
    const needed = Math.ceil((FT_MIN_HOURS - hrs) / SHIFT_HOURS);

    const candidateSlots = [];
    ALL_SLOTS.forEach(({ day, shiftId }) => {
      if ((emp.unavailableDays||[]).includes(day)) return;
      if ((emp.blockedShifts||[]).includes(shiftId)) return;
      if (emp.requiredShift && emp.requiredShift !== shiftId) return;
      const asgn = schedule[cellKey(day, shiftId)] || [];
      if (asgn.some(a => a.employeeId === emp.id)) return;
      if (!getAvailPos(day, shiftId).some(p => emp.qualifications.includes(p))) return;
      const isFull = asgn.length >= getEffectiveSlotCount(day, shiftId, extShiftsArg);
      const hasPTBumpable = isFull && asgn.some(a => {
        const peer = employees.find(e => e.id === a.employeeId);
        return peer && peer.employmentType !== "full-time";
      });
      candidateSlots.push({ day, shiftId, isFull, hasPTBumpable });
    });

    candidateSlots.sort((a, b) => {
      if (!a.isFull && b.isFull) return -1;
      if (a.isFull && !b.isFull) return 1;
      if (a.hasPTBumpable && !b.hasPTBumpable) return -1;
      if (!a.hasPTBumpable && b.hasPTBumpable) return 1;
      return 0;
    });

    const targets = candidateSlots.filter(s => !s.isFull || s.hasPTBumpable).slice(0, needed);

    if (targets.length > 0) {
      targets.forEach(({ day, shiftId, isFull }) => {
        items.push({ emp, day, shiftId, position: null, type: "under_hours",
          severity: SEVERITY.under_hours,
          msg: `Under 40h (${hrs}h) — ${isFull ? "can swap a PT employee on" : "open slot on"} ${day}` });
      });
    } else {
      items.push({ emp, day: DAYS[0], shiftId: "first", position: null, type: "under_hours",
        severity: SEVERITY.under_hours,
        msg: `Under 40h (${hrs}h) — no available slots this week to fill` });
    }
  });

  employees.forEach(emp => {
    ALL_SLOTS.forEach(({ day, shiftId }) => {
      const asgn = schedule[cellKey(day, shiftId)] || [];
      const slot = asgn.find(a => a.employeeId === emp.id);
      if (!slot) return;

      if ((emp.unavailableDays || []).includes(day)) {
        items.push({ emp, day, shiftId, position: slot.position, type: "unavailable",
          severity: SEVERITY.unavailable,
          msg: `Unavailable on ${day}` });
        return;
      }

      const v = getPreferenceViolations(emp, day, shiftId, schedule);
      v.forEach(viol => {
        items.push({ emp, day, shiftId, position: slot.position,
          type: viol.type, severity: SEVERITY[viol.type] ?? 99, msg: viol.msg });
      });
    });
  });

  items.sort((a, b) =>
    a.severity !== b.severity ? a.severity - b.severity :
    a.emp.name.localeCompare(b.emp.name) ||
    DAYS.indexOf(a.day) - DAYS.indexOf(b.day)
  );
  return items;
}

function tryFixViolation(item, employees, schedule, cfg, extShiftsArg) {
  const { emp, day, shiftId, position, type } = item;
  const key = cellKey(day, shiftId);
  const ns = JSON.parse(JSON.stringify(schedule));

  const isAssigned = (empId, d, s, sched) =>
    (sched[cellKey(d, s)] || []).some(a => a.employeeId === empId);

  const hasConflict = (candidate, d, s) => {
    if ((candidate.unavailableDays || []).includes(d)) return true;
    if (candidate.requiredShift && candidate.requiredShift !== s) return true;
    if ((candidate.blockedShifts||[]).includes(s)) return true;
    if (violatesDaysOff(candidate, d)) return true;
    return false;
  };

  const isQualified = (candidate, d, s) =>
    getAvailPos(d, s).some(p => candidate.qualifications.includes(p));

  if (type === "wrong_shift_required" || type === "wrong_shift" || type === "blocked_shift") {
    const prefs = emp.requiredShift ? [emp.requiredShift]
                : (emp.preferredShifts||[]).length > 0 ? emp.preferredShifts
                : SHIFTS.map(s=>s.id).filter(s=>(emp.blockedShifts||[]).includes(s)===false && s!==shiftId);
    const prefShift = prefs.find(s => s !== shiftId) || null;
    if (!prefShift) return null;

    const prefKey = cellKey(day, prefShift);
    const prefAsgn = ns[prefKey] || [];
    const maxSlots = getSlotCount(day, prefShift);
    const availPos = getAvailPos(day, prefShift).filter(p => emp.qualifications.includes(p));

    if (availPos.length === 0) return null;

    if (prefAsgn.length < maxSlots && !prefAsgn.some(a => a.employeeId === emp.id)) {
      ns[key] = (ns[key] || []).filter(a => a.employeeId !== emp.id);
      const usedPositions = new Set(prefAsgn.map(a => a.position));
      const pos = availPos.find(p => !usedPositions.has(p)) || availPos[0];
      ns[prefKey] = [...prefAsgn, { employeeId: emp.id, position: pos }];
      const vacatedPos = position;
      const replacements = employees.filter(c =>
        c.id !== emp.id &&
        !isAssigned(c.id, day, shiftId, ns) &&
        getAvailPos(day, shiftId).includes(vacatedPos) && c.qualifications.includes(vacatedPos) &&
        !hasConflict(c, day, shiftId)
      );
      if (replacements.length > 0) {
        ns[key] = [...(ns[key] || []), { employeeId: replacements[0].id, position: vacatedPos }];
      }
      return ns;
    }
    return null;
  }

  if (type === "supervisor_missing") {
    const key3 = cellKey(day, "first");
    const asgn3 = ns[key3] || [];
    if (asgn3.some(a => a.employeeId === emp.id)) return null;
    if (isRestViolation(emp, calcRestGap(emp.id, ns, day, "first"), cfg?.minRestHours ?? 12)) return null;
    if (calcConsecutiveHours(emp.id, ns, day, "first") > empMaxConsec(emp)) return null;
    // Check slot capacity before adding — don't exceed 4 total (3 regular + 1 sup)
    const maxSlots3 = getSlotCount(day, "first");
    if (asgn3.length >= maxSlots3) return null;
    // Use "Supervisor" position (not "Guard") so they display correctly
    const pos3 = (emp.qualifications||[]).includes("Supervisor") ? "Supervisor" : "Guard";
    ns[key3] = [...asgn3, { employeeId: emp.id, position: pos3 }];
    return ns;
  }

  if (type === "under_hours") {
    const key2   = cellKey(day, shiftId);
    const asgn2  = ns[key2] || [];
    if (asgn2.some(a => a.employeeId === emp.id)) return null;
    const availPos2 = getAvailPos(day, shiftId).filter(p => canFillPos(emp, p, day));
    if (!availPos2.length) return null;
    if (isRestViolation(emp, calcRestGap(emp.id, ns, day, shiftId), cfg?.minRestHours ?? 12)) return null;
    if (calcConsecutiveHours(emp.id, ns, day, shiftId) > empMaxConsec(emp)) return null;

    const isFull = asgn2.length >= getEffectiveSlotCount(day, shiftId, extShiftsArg);
    if (isFull) {
      const ptIdx = asgn2.findIndex(a => {
        const peer = employees.find(e => e.id === a.employeeId);
        return peer && peer.employmentType !== "full-time";
      });
      if (ptIdx === -1) return null;
      const bumped = asgn2[ptIdx];
      ns[key2] = asgn2.filter((_, i) => i !== ptIdx);
      const usedPos3 = new Set(ns[key2].map(a => a.position));
      const pos3 = availPos2.find(p => p === bumped.position)
                || availPos2.find(p => !usedPos3.has(p))
                || availPos2[0];
      ns[key2] = [...ns[key2], { employeeId: emp.id, position: pos3 }];
      return ns;
    }

    const usedPos = new Set(asgn2.map(a => a.position));
    const needsScale   = !asgn2.some(a => a.position === "Scale");
    const needsMedical = !asgn2.some(a => a.position === "Medical");
    const pos = availPos2.find(p => needsScale && p === "Scale")
             || availPos2.find(p => needsMedical && p === "Medical")
             || availPos2.find(p => !usedPos.has(p))
             || availPos2[0];
    ns[key2] = [...asgn2, { employeeId: emp.id, position: pos }];
    return ns;
  }

  if (type === "days_off" || type === "unavailable" || type === "overwork") {
    ns[key] = (ns[key] || []).filter(a => a.employeeId !== emp.id);
    const replacements = employees.filter(c =>
      c.id !== emp.id &&
      !isAssigned(c.id, day, shiftId, ns) &&
      c.qualifications.includes(position) &&
      getAvailPos(day, shiftId).includes(position) &&
      !hasConflict(c, day, shiftId) &&
      isRestViolation(c, calcRestGap(c.id, ns, day, shiftId), cfg?.minRestHours ?? 12) === false &&
      calcConsecutiveHours(c.id, ns, day, shiftId) <= empMaxConsec(c)
    );
    if (replacements.length > 0) {
      ns[key] = [...(ns[key] || []), { employeeId: replacements[0].id, position }];
      return ns;
    }
    return ns;
  }

  return null;
}

function MinimizeViolationsPanel({ employees, schedule, setSchedule, extShifts, onClose }) {
  const t = useTheme();
  const cfg = useSettings();

  const violations = useMemo(() => buildViolationList(employees, schedule, extShifts), [employees, schedule, extShifts]);

  const [fixedIds, setFixedIds] = useState(new Set());
  const [unfixableIds, setUnfixableIds] = useState(new Set());

  const itemKey = (item) => `${item.emp.id}__${item.day}__${item.shiftId}__${item.type}`;

  const fixOne = (item) => {
    const result = tryFixViolation(item, employees, schedule, cfg, extShifts);
    if (result) {
      setSchedule(result);
      setFixedIds(s => new Set([...s, itemKey(item)]));
    } else {
      setUnfixableIds(s => new Set([...s, itemKey(item)]));
    }
  };

  const fixAll = () => {
    let cur = JSON.parse(JSON.stringify(schedule));
    const nowFixed = new Set(fixedIds);
    const nowUnfix = new Set(unfixableIds);
    const items = buildViolationList(employees, cur, extShifts);
    items.forEach(item => {
      if (item.readOnly) return; // Rule 2/3 cannot be auto-fixed
      if (nowFixed.has(itemKey(item))) return;
      const result = tryFixViolation(item, employees, cur, cfg, extShifts);
      if (result) { cur = result; nowFixed.add(itemKey(item)); }
      else nowUnfix.add(itemKey(item));
    });
    setSchedule(cur);
    setFixedIds(nowFixed);
    setUnfixableIds(nowUnfix);
  };

  const TYPE_META = {
    rule2_headcount:      { label: "RULE 2 — HEADCOUNT", color: (t) => t.danger },
    rule3_role:           { label: "RULE 3 — ROLE GAP",  color: (t) => t.danger },
    wrong_shift_required: { label: "REQUIRED SHIFT",      color: (t) => t.danger },
    unavailable:          { label: "UNAVAILABLE",          color: (t) => t.danger },
    days_off:             { label: "PREF DAY OFF",         color: (t) => t.warning },
    wrong_shift:          { label: "WRONG SHIFT",          color: (t) => t.warning },
    overwork:             { label: "OVERWORK",             color: (t) => t.fatigue },
    under_hours:          { label: "UNDER 40H",            color: (t) => t.danger },
    supervisor_missing:   { label: "SUP MISSING",          color: (t) => t.danger },
  };

  const activeViolations = violations.filter(v => !fixedIds.has(itemKey(v)));
  // readOnly items (Rule 2/3) cannot be auto-fixed — exclude from fixable count
  const fixableCount = activeViolations.filter(v => !v.readOnly && !unfixableIds.has(itemKey(v))).length;
  const readOnlyCount = activeViolations.filter(v => v.readOnly).length;

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.72)",display:"flex",
      alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}}>
      <div style={{background:t.surface,border:"1px solid "+t.border,borderRadius:12,
        padding:28,maxWidth:620,width:"100%",maxHeight:"85vh",display:"flex",
        flexDirection:"column",boxShadow:"0 24px 64px rgba(0,0,0,0.55)"}}>

        {}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>🔧</span>
            <h2 style={{margin:0,fontSize:16,fontWeight:700,color:t.text}}>MINIMIZE VIOLATIONS</h2>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",
            color:t.textDim,cursor:"pointer",fontSize:18,padding:4}}>✕</button>
        </div>
        <p style={{margin:"0 0 16px",fontSize:11,color:t.textMuted,flexShrink:0}}>
          {violations.length === 0
            ? "No violations found — schedule looks clean."
            : (() => {
                const ruleViolations = violations.filter(v => v.readOnly).length;
                const prefViolations = violations.length - ruleViolations;
                const empCount = new Set(violations.filter(v=>!v.readOnly).map(v=>v.emp.id)).size;
                const parts = [];
                if (ruleViolations > 0) parts.push(`${ruleViolations} business rule issue${ruleViolations!==1?"s":""} (cannot auto-fix)`);
                if (prefViolations > 0) parts.push(`${prefViolations} preference violation${prefViolations!==1?"s":""} across ${empCount} employee${empCount!==1?"s":""}`);
                return parts.join(" · ");
              })()
          }
        </p>

        {violations.length > 0 && (
          <div style={{display:"flex",gap:8,marginBottom:16,flexShrink:0,flexWrap:"wrap",alignItems:"center"}}>
            <button onClick={fixAll}
              style={{background:t.scale,color:"#fff",border:"none",
                padding:"9px 20px",borderRadius:6,cursor:"pointer",fontSize:12,
                fontWeight:700,fontFamily:"inherit"}}>
              ⚡ Fix All ({fixableCount} fixable)
            </button>
            {fixedIds.size > 0 && (
              <span style={{fontSize:11,color:t.scale,fontWeight:600}}>
                ✓ {fixedIds.size} fixed this session
              </span>
            )}
            {unfixableIds.size > 0 && (
              <span style={{fontSize:11,color:t.textDim}}>
                {unfixableIds.size} could not be auto-fixed
              </span>
            )}
          </div>
        )}

        {}
        <div style={{overflowY:"auto",flex:1,display:"flex",flexDirection:"column",gap:5}}>
          {violations.length === 0 && (
            <div style={{textAlign:"center",padding:"40px 0",color:t.scale,fontSize:14}}>
              <div style={{fontSize:32,marginBottom:10}}>✓</div>
              All schedule preferences are satisfied.
            </div>
          )}
          {violations.map((item) => {
            const id = itemKey(item);
            const isFixed     = fixedIds.has(id);
            const isUnfixable = unfixableIds.has(id);
            const isReadOnly  = !!item.readOnly;
            const meta = TYPE_META[item.type] || { label: item.type.toUpperCase(), color: () => t.textMuted };
            const col  = meta.color(t);
            const shiftLabel = SHIFTS.find(s=>s.id===item.shiftId)?.label || item.shiftId;
            return (
              <div key={id} style={{display:"flex",alignItems:"center",gap:10,
                padding:"10px 14px",borderRadius:6,
                background: isReadOnly ? t.danger+"08" : isFixed ? t.scale+"12" : t.surfaceAlt,
                border:"1px solid "+(isReadOnly?t.danger+"40":isFixed?t.scale+"40":isUnfixable?t.border:col+"30"),
                opacity: isFixed ? 0.7 : 1, transition:"all .2s"}}>

                <span style={{width:8,height:8,borderRadius:"50%",
                  background:isFixed?t.scale:col,flexShrink:0}}/>

                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    {!isReadOnly && <span style={{fontWeight:700,fontSize:12,color:t.text}}>{item.emp.name}</span>}
                    <span style={{fontSize:9,fontWeight:800,padding:"1px 6px",borderRadius:3,
                      background:col+"20",color:col,border:"1px solid "+col+"40"}}>
                      {meta.label}
                    </span>
                    <span style={{fontSize:10,color:t.textDim}}>{item.day} · {shiftLabel}</span>
                  </div>
                  <div style={{fontSize:10,color:t.textMuted,marginTop:2}}>{item.msg}</div>
                  {isReadOnly && (
                    <div style={{fontSize:9,color:t.textDim,marginTop:3,fontStyle:"italic"}}>
                      Cannot auto-fix — add staff, use 12hr pair, or clear and re-run auto-fill
                    </div>
                  )}
                </div>

                {isReadOnly ? (
                  <span style={{fontSize:10,color:t.danger,flexShrink:0,fontWeight:700}}>🚫 Rule</span>
                ) : isFixed ? (
                  <span style={{fontSize:11,fontWeight:700,color:t.scale,flexShrink:0}}>✓ Fixed</span>
                ) : isUnfixable ? (
                  <span style={{fontSize:10,color:t.textDim,flexShrink:0,textAlign:"right",maxWidth:90}}>
                    No swap<br/>available
                  </span>
                ) : (
                  <button onClick={()=>fixOne(item)}
                    style={{background:t.accent,color:"#fff",border:"none",
                      padding:"6px 14px",borderRadius:5,cursor:"pointer",
                      fontSize:11,fontWeight:700,fontFamily:"inherit",flexShrink:0}}>
                    Fix
                  </button>
                )}
              </div>
            );
          })}
        </div>

        <div style={{marginTop:16,flexShrink:0,display:"flex",justifyContent:"space-between",
          alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:10,color:t.textDim}}>
            Fixes move employees to their preferred shift or substitute a conflict-free replacement. 🚫 Rule violations require manual action (staff changes or 12hr pairs).<br/>
            "No swap available" means no qualified employee is free for that slot without creating a new violation.
          </div>
          <button onClick={onClose}
            style={{background:"transparent",border:"1px solid "+t.border,color:t.textMuted,
              padding:"8px 18px",borderRadius:6,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>
            Close
          </button>
        </div>
      </div>
    </div>
  );
}

function RosterManager({ employees, setEmployees, setSchedule, savedRosters, setSavedRosters }) {
  const t = useTheme();
  const [saveName,   setSaveName]   = useState("");
  const [confirmDel, setConfirmDel] = useState(null);
  const [loadedId,   setLoadedId]   = useState(null);
  const [flash,      setFlash]      = useState(null);
  const [importErr,  setImportErr]  = useState(null);
  const importRef = useRef(null);

  const showFlash = (type) => { setFlash(type); setTimeout(()=>setFlash(null), 2200); };

  const exportRosters = () => {
    if (!savedRosters.length) return;
    const payload = JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), rosters: savedRosters }, null, 2);
    const blob = new Blob([payload], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `shift-rosters-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showFlash("exported");
  };

  const importRosters = (e) => {
    setImportErr(null);
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const incoming = data.rosters || (Array.isArray(data) ? data : null);
        if (!incoming || !Array.isArray(incoming)) throw new Error("Unrecognized format");
        if (!incoming.every(r => r.id && r.name && Array.isArray(r.employees)))
          throw new Error("Missing required fields");
        setSavedRosters(prev => {
          const existingIds = new Set(prev.map(r => r.id));
          const newOnes = incoming.filter(r => !existingIds.has(r.id));
          return [...newOnes, ...prev];
        });
        showFlash("imported");
      } catch(err) {
        setImportErr("Import failed: " + err.message);
      }
      e.target.value = "";
    };
    reader.readAsText(file);
  };

  const saveRoster = () => {
    const name = saveName.trim();
    if (!name || !employees.length) return;
    const entry = {
      id: Date.now().toString(),
      name,
      savedAt: new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),
      savedAtISO: new Date().toISOString(),
      employees: JSON.parse(JSON.stringify(employees)),
      count: employees.length,
      ft: employees.filter(e=>e.employmentType==="full-time").length,
      pt: employees.filter(e=>e.employmentType==="part-time").length,
      oc: employees.filter(e=>e.employmentType==="on-call").length,
    };
    setSavedRosters(p=>[entry,...p]);
    setSaveName("");
    showFlash("saved");
  };

  const [confirmLoad, setConfirmLoad] = useState(null);

  const loadRoster = (entry) => {
    setEmployees(entry.employees);
    setSchedule({});
    setLoadedId(entry.id);
    setConfirmLoad(null);
    showFlash("loaded");
  };

  const deleteRoster = (idx) => {
    setSavedRosters(p=>p.filter((_,i)=>i!==idx));
    setConfirmDel(null);
    showFlash("deleted");
  };

  const iS = {
    background:t.surfaceAlt, border:"1px solid "+t.border, color:t.text,
    padding:"10px 14px", borderRadius:6, outline:"none", fontSize:13,
    fontFamily:"'JetBrains Mono',monospace", flex:"1 1 200px", boxSizing:"border-box",
  };

  return (
    <div style={{marginBottom:28}}>
      {}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <h3 style={{margin:0,fontSize:14,fontWeight:700,color:t.text,letterSpacing:".04em"}}>
          📋 SAVED ROSTERS
        </h3>
        {savedRosters.length>0&&(
          <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:10,
            background:t.accent+"20",color:t.accent,border:"1px solid "+t.accent+"40"}}>
            {savedRosters.length}
          </span>
        )}
        <div style={{marginLeft:"auto",display:"flex",gap:8,alignItems:"center"}}>
          {}
          <input ref={importRef} type="file" accept=".json" onChange={importRosters}
            style={{display:"none"}}/>
          <button onClick={()=>importRef.current?.click()}
            title="Import rosters from a backup file"
            style={{background:t.surfaceAlt,color:t.textDim,border:"1px solid "+t.border,
              padding:"4px 10px",borderRadius:5,cursor:"pointer",fontSize:10,fontWeight:700,
              fontFamily:"inherit",display:"flex",alignItems:"center",gap:4}}>
            📥 Import
          </button>
          <button onClick={exportRosters} disabled={!savedRosters.length}
            title="Download all rosters as a backup JSON file"
            style={{background:!savedRosters.length?t.surfaceAlt:t.accent+"18",
              color:!savedRosters.length?t.textDim:t.accent,
              border:"1px solid "+(!savedRosters.length?t.border:t.accent+"50"),
              padding:"4px 10px",borderRadius:5,
              cursor:!savedRosters.length?"not-allowed":"pointer",
              fontSize:10,fontWeight:700,fontFamily:"inherit",
              display:"flex",alignItems:"center",gap:4}}>
            📤 Export
          </button>
        </div>
        {flash&&(
          <span style={{fontSize:11,fontWeight:700,padding:"4px 12px",borderRadius:6,
            background:flash==="deleted"?t.danger+"20":t.scale+"20",
            color:flash==="deleted"?t.danger:t.scale,
            border:"1px solid "+(flash==="deleted"?t.danger+"40":t.scale+"40")}}>
            {flash==="saved"?"✓ Roster saved"
              :flash==="loaded"?"✓ Roster loaded — schedule cleared"
              :flash==="exported"?"✓ Backup downloaded"
              :flash==="imported"?"✓ Rosters imported"
              :"✓ Roster deleted"}
          </span>
        )}
      </div>

      {}
      <div style={{background:t.surface,border:"1px solid "+t.border,borderRadius:8,padding:16,marginBottom:14}}>
        <div style={{fontSize:11,color:t.textDim,fontWeight:600,letterSpacing:".05em",marginBottom:10}}>
          SAVE CURRENT ROSTER
          <span style={{fontWeight:400,color:t.textDim,marginLeft:6,textTransform:"none",letterSpacing:0}}>
            ({employees.length} employee{employees.length!==1?"s":""} will be saved)
          </span>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"stretch",flexWrap:"wrap"}}>
          <input value={saveName} onChange={e=>setSaveName(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&saveRoster()}
            placeholder='Name this roster (e.g. "Day Shift A-Team")'
            style={iS}/>
          <button onClick={saveRoster}
            disabled={!saveName.trim()||!employees.length}
            style={{background:(!saveName.trim()||!employees.length)?t.border:t.accent,
              color:(!saveName.trim()||!employees.length)?t.textDim:"#fff",
              border:"none",padding:"10px 20px",borderRadius:6,
              cursor:(!saveName.trim()||!employees.length)?"not-allowed":"pointer",
              fontSize:13,fontWeight:700,fontFamily:"inherit",whiteSpace:"nowrap",transition:"background .2s"}}>
            💾 Save
          </button>
        </div>
        {!employees.length&&(
          <div style={{marginTop:8,fontSize:11,color:t.textDim}}>
            Add employees below before saving a roster.
          </div>
        )}
      </div>

      {}
      {savedRosters.length===0 ? (
        <div style={{textAlign:"center",padding:"28px 16px",background:t.surface,
          border:"1px dashed "+t.border,borderRadius:8,color:t.textDim,fontSize:13}}>
          <div style={{fontSize:28,marginBottom:8}}>📂</div>
          No rosters saved yet. Build your team and save it above.
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {savedRosters.map((entry,idx)=>(
            <div key={entry.id} style={{
              background:loadedId===entry.id?t.scale+"08":t.surface,
              border:"1px solid "+(loadedId===entry.id?t.scale+"50":t.border),
              borderRadius:8,padding:"12px 16px",
              display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",transition:"border-color .3s"}}>

              {}
              <div style={{flex:"1 1 180px",minWidth:0}}>
                <div style={{fontWeight:700,fontSize:13,color:t.text,
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {entry.name}
                  {loadedId===entry.id&&(
                    <span style={{marginLeft:8,fontSize:9,fontWeight:800,color:t.scale,
                      background:t.scale+"15",border:"1px solid "+t.scale+"40",
                      padding:"1px 6px",borderRadius:4}}>ACTIVE</span>
                  )}
                </div>
                <div style={{fontSize:10,color:t.textDim,marginTop:3,display:"flex",gap:8,flexWrap:"wrap"}}>
                  <span>Saved {entry.savedAt}</span>
                  <span>·</span>
                  <span>{entry.count} employee{entry.count!==1?"s":""}</span>
                  <span>·</span>

  const cfg = useSettings();
  const EMPTY_NEW = {name:"",quals:["Guard"],type:"full-time",unavail:[],prefShifts:[],blockedShifts:[],requiredShift:null,prefDaysOff:[],overtimePref:"neutral",willing16h:false,maxShiftsPerWeek:null,ext12hPref:null,maxWeekendDays:null};
  const [newForm,   setNewForm]   = useState(EMPTY_NEW);

      }
    };

  }, [editState]);

  const newQuals       = newForm.quals;
  const newType        = newForm.type;
  const newUnavail     = newForm.unavail;

  const setNewQuals          = (v) => setNewForm(f=>({...f,quals:typeof v==="function"?v(f.quals):v}));
  const setNewType           = (v) => setNewForm(f=>({...f,type:v}));
  const setNewUnavail        = (v) => setNewForm(f=>({...f,unavail:v}));
  const setNewPrefShifts     = (v) => setNewForm(f=>({...f,prefShifts:   typeof v==="function"?v(f.prefShifts||[]):v}));
  const setNewBlockedShifts  = (v) => setNewForm(f=>({...f,blockedShifts:typeof v==="function"?v(f.blockedShifts||[]):v}));
  const setNewRequiredShift  = (v) => setNewForm(f=>({...f,requiredShift:v}));
  const setNewPrefDaysOff    = (v) => setNewForm(f=>({...f,prefDaysOff:v}));

  const editQuals      = editState?.quals ?? [];
  const editType       = editState?.type ?? "full-time";
  const editUnavail    = editState?.unavail ?? [];
  const editPrefShifts    = editState?.prefShifts    || [];
  const editBlockedShifts = editState?.blockedShifts || [];
  const editRequiredShift = editState?.requiredShift || null;
  const editPrefDaysOff   = editState?.prefDaysOff   ?? [];
  const setEditName           = (v) => setEditState(s=>({...s,name:v}));
  const setEditQuals          = (v) => setEditState(s=>({...s,quals:typeof v==="function"?v(s.quals):v}));
  const setEditType           = (v) => setEditState(s=>({...s,type:v}));
  const setEditUnavail        = (v) => setEditState(s=>({...s,unavail:v}));
  const setEditPrefShifts     = (v) => setEditState(s=>({...s,prefShifts:   typeof v==="function"?v(s?.prefShifts||[]):v}));
  const setEditBlockedShifts  = (v) => setEditState(s=>({...s,blockedShifts:typeof v==="function"?v(s?.blockedShifts||[]):v}));
  const setEditRequiredShift  = (v) => setEditState(s=>({...s,requiredShift:v}));
  const setEditPrefDaysOff    = (v) => setEditState(s=>({...s,prefDaysOff:v}));

  const toggleQ = (pos,arr,set) => set(arr.includes(pos)?arr.filter(x=>x!==pos):[...arr,pos]);

  const addEmployee = () => {
    const name = newName.trim();
    if (!name) return;
    if (!newQuals.length) { setErrors(["Select at least one position."]); setTimeout(()=>setErrors([]),3000); return; }
    if (employees.some(e=>e.name.toLowerCase()===name.toLowerCase())) { setErrors(["Name already exists."]); setTimeout(()=>setErrors([]),3000); return; }
    setEmployees(p=>[...p,{id:Date.now().toString(),name,qualifications:[...newQuals],employmentType:newType,unavailableDays:[...newUnavail],preferredShifts:[...(newPrefShifts||[])],blockedShifts:[...(newBlockedShifts||[])],requiredShift:newRequiredShift||null,preferredDaysOff:[...newPrefDaysOff],overtimePref:newForm.overtimePref||"neutral",willing16h:newForm.willing16h||false,maxShiftsPerWeek:newForm.maxShiftsPerWeek??null,ext12hPref:newForm.ext12hPref??null}]);

    const name = (s.name||"").trim();

    setEmployees(p=>p.map(e=>e.id===s.id ? {
      ...e,
      name,
      qualifications:    [...(s.quals||[])],
      employmentType:    s.type||"full-time",
      unavailableDays:   [...(s.unavail||[])],
      preferredShifts:   [...(s.prefShifts||[])],

      maxWeekendDays:    s.maxWeekendDays!==undefined?s.maxWeekendDays:null,

    } : e));
    setEditState(null);
  };

  const updateUnavail = (id, days) => {
    setEmployees(p=>p.map(e=>e.id===id?{...e,unavailableDays:days}:e));

  const shiftHours = useMemo(()=>{
    const c={};employees.forEach(e=>(c[e.id]=0));
    Object.values(schedule).forEach(a=>a.forEach(x=>{if(c[x.employeeId]!==undefined)c[x.employeeId]+=SHIFT_HOURS;}));
    return c;
  },[schedule,employees]);

  const filtered = employees.filter(e=>
    e.name.toLowerCase().includes(search.toLowerCase())||
    e.qualifications.some(q=>q.toLowerCase().includes(search.toLowerCase()))
  );

  const iS = {background:t.surfaceAlt,border:"1px solid "+t.border,color:t.text,
    padding:"10px 14px",borderRadius:6,outline:"none",fontSize:14,fontFamily:"'JetBrains Mono',monospace"};

  const TypeToggle = ({val,set}) => (
    <div style={{display:"flex",borderRadius:6,overflow:"hidden",border:"1px solid "+t.border,width:"fit-content"}}>
      {[["full-time","FT"],["part-time","PT"],["on-call","OC"]].map(([v,label]) => (
        <button key={v} onClick={()=>set(v)} style={{
          background:val===v?(v==="full-time"?t.accent:v==="part-time"?t.scale:t.warning):t.surfaceAlt,
          color:val===v?"#fff":t.textMuted,border:"none",padding:"7px 16px",
          cursor:"pointer",fontSize:11,fontWeight:700,fontFamily:"inherit",transition:"all .2s",
        }}>{label}</button>
      ))}
    </div>
  );

  const QualBtns = ({quals,toggle}) => (
    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      {ALL_POSITIONS.map(pos => {
        const on = quals.includes(pos);
        return (
          <button key={pos} onClick={()=>toggle(pos)} style={{
            background:on?pC(pos,t)+"20":t.surfaceAlt,border:"1.5px solid "+(on?pC(pos,t):t.border),
            color:on?pC(pos,t):t.textDim,padding:"7px 14px",borderRadius:6,
            cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit",
            display:"flex",alignItems:"center",gap:6,
          }}>
            <span style={{width:13,height:13,borderRadius:3,border:"1.5px solid "+(on?pC(pos,t):t.textDim),
              background:on?pC(pos,t):"transparent",display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:9,color:"#fff",flexShrink:0}}>{on?"\u2713":""}</span>
            {pos}
          </button>
        );
      })}
    </div>
  );

  return (
    <div>
      <RosterManager employees={employees} setEmployees={setEmployees}

function findOTReliefSuggestions(employees, schedule, extShifts, cfg) {
  const suggestions = [];
  const maxConsec   = MAX_CONSECUTIVE_HOURS;

  const hoursMap = {};
  employees.forEach(e => { hoursMap[e.id] = calcHours(e.id, schedule, extShifts); });

  const overloaded = employees.filter(e =>
    e.employmentType === "full-time" && hoursMap[e.id] > OT_RELIEF_THRESHOLD
  );

  for (const overEmp of overloaded) {
    for (const day of DAYS) {
      for (const shift of SHIFTS) {
        const key  = cellKey(day, shift.id);
        const asgn = schedule[key] || [];
        const myAsgn = asgn.find(a => a.employeeId === overEmp.id);
        if (!myAsgn) continue;

        const coveringPair = EXT_PAIRS.find(p => p.covers.includes(shift.id));
        if (!coveringPair) continue;

        if ((extShifts||[]).some(e => e.day === day && e.pairId === coveringPair.id)) continue;

        const slotRoles = asgn
          .filter(a => a.position === "Scale" || a.position === "Medical")
          .map(a => a.position);
        const needsScale   = slotRoles.includes("Scale")   || myAsgn.position === "Scale";
        const needsMedical = slotRoles.includes("Medical") || myAsgn.position === "Medical";

        const candidates = employees.filter(c => {
          if (c.id === overEmp.id) return false;
          if ((c.unavailableDays||[]).includes(day)) return false;
          if ((c.blockedShifts||[]).includes(shift.id)) return false;
          if (c.requiredShift && c.requiredShift !== shift.id) return false;
          // Candidate only needs to be able to work at least ONE half of the ext shift
          // (pairs split the 12h between them — A works half 0, B works half 1)
          if (!canWorkExtHalf(c, coveringPair.id, 0) && !canWorkExtHalf(c, coveringPair.id, 1)) return false;
          const pos = getAvailPos(day, shift.id);
          if (!pos.some(p => c.qualifications.includes(p))) return false;
          const afterH = hoursMap[c.id] + EXT_SHIFT_HOURS;
          if (afterH > 56) return false;
          if (calcConsecutiveHours(c.id, schedule, day, shift.id) > empMaxConsec(c)) return false;
          return true;
        });

        for (let i = 0; i < candidates.length; i++) {
          for (let j = i + 1; j < candidates.length; j++) {
            const cA = candidates[i];
            const cB = candidates[j];

            // Each candidate must be able to work their specific half
            // Try both orderings: A→half0+B→half1, or B→half0+A→half1
            const abOk = canWorkExtHalf(cA, coveringPair.id, 0) && canWorkExtHalf(cB, coveringPair.id, 1);
            const baOk = canWorkExtHalf(cB, coveringPair.id, 0) && canWorkExtHalf(cA, coveringPair.id, 1);
            if (!abOk && !baOk) continue;
            const [finalA, finalB] = abOk ? [cA, cB] : [cB, cA];

            const aQuals = finalA.qualifications;
            const bQuals = finalB.qualifications;
            if (needsScale   && !aQuals.includes("Scale")   && !bQuals.includes("Scale"))   continue;
            if (needsMedical && !aQuals.includes("Medical") && !bQuals.includes("Medical")) continue;

            const overHoursBefore = hoursMap[overEmp.id];
            const overHoursAfter  = overHoursBefore - SHIFT_HOURS;
            const aHoursAfter     = hoursMap[finalA.id] + EXT_SHIFT_HOURS;
            const bHoursAfter     = hoursMap[finalB.id] + EXT_SHIFT_HOURS;

            const overOTBefore = Math.max(0, overHoursBefore - FT_MIN_HOURS);
            if (Math.max(0, aHoursAfter - FT_MIN_HOURS) > overOTBefore) continue;
            if (Math.max(0, bHoursAfter - FT_MIN_HOURS) > overOTBefore) continue;

            const otBefore = overOTBefore
                           + Math.max(0, hoursMap[finalA.id] - FT_MIN_HOURS)
                           + Math.max(0, hoursMap[finalB.id] - FT_MIN_HOURS);
            const otAfter  = Math.max(0, overHoursAfter - FT_MIN_HOURS)
                           + Math.max(0, aHoursAfter - FT_MIN_HOURS)
                           + Math.max(0, bHoursAfter - FT_MIN_HOURS);
            const otReduction = otBefore - otAfter;
            if (otReduction <= 0) continue;

            suggestions.push({
              overEmp, day, shift, pairId: coveringPair.id, pair: coveringPair,
              empA: finalA, empB: finalB,
              overHoursBefore, overHoursAfter,
              aHoursBefore: hoursMap[finalA.id], aHoursAfter,
              bHoursBefore: hoursMap[finalB.id], bHoursAfter,
              otReduction, myAsgn,
            });

            if (suggestions.length >= 20) break;
          }
          if (suggestions.length >= 20) break;
        }
      }
    }
  }

  suggestions.sort((a, b) =>
    b.otReduction - a.otReduction ||
    (a.overHoursAfter + a.aHoursAfter + a.bHoursAfter) -
    (b.overHoursAfter + b.aHoursAfter + b.bHoursAfter)
  );

  return suggestions;
}

        const [dismissed, setDismissed] = useState(new Set());
