                  // Show every employee who is actually scheduled on this shift,
                  // regardless of their preferredShifts setting.
                  // Previously filtered by preference which silently dropped employees
                  // with no preferredShifts/requiredShift set.
                  const scheduledIds = new Set(
                    DAYS.flatMap(day => (displaySchedule[cellKey(day,shift.id)]||[]).map(a=>a.employeeId))
                  );
                  const shiftEmps = employees
                    .filter(e => scheduledIds.has(e.id))
                    .sort((a,b)=>a.name.localeCompare(b.name));
                  return [
                    <tr key={"hdr"+shift.id}>
                      <td colSpan={10} style={{background:["#fef3c7","#dbeafe","#ede9fe"][si],
                        padding:"4px 10px",fontWeight:800,fontSize:10,letterSpacing:".08em",
                        color:["#92400e","#1e40af","#5b21b6"][si],borderTop:"1px solid #ddd"}}>
                        {shift.label.toUpperCase()} — {shift.time}
                      </td>
                    </tr>,
                    ...shiftEmps.map(emp => {
                      const hrs = calcHours(emp.id, displaySchedule, extShifts);
                      const hrsCol = hrs>=48?"#dc2626":hrs>=40?"#16a34a":hrs>0?"#d97706":"#9ca3af";
                      return (
                        <tr key={emp.id} style={{borderBottom:"1px solid #f3f4f6"}}>
                          <td style={{padding:"5px 10px",fontWeight:600}}>{emp.name}</td>
                          <td style={{padding:"5px 6px",textAlign:"center",
                            fontSize:9,fontWeight:700,color:["#92400e","#1e40af","#5b21b6"][si]}}>
                            {["1st","2nd","3rd"][si]}
                          </td>
                          {DAYS.map(day => {
                            const dayAsgn = (displaySchedule[cellKey(day,shift.id)]||[])
                              .find(a=>a.employeeId===emp.id);
                            return (
                              <td key={day} style={{padding:"5px 4px",textAlign:"center",
                                background:dayAsgn?"#dcfce7":"transparent",
                                color:dayAsgn?"#166534":"#d1d5db",fontWeight:dayAsgn?700:400,
                                fontSize:dayAsgn?10:9}}>
                                {dayAsgn ? (dayAsgn.position.substring(0,3).toUpperCase()) : "·"}
                              </td>
                            );
                          })}
                          <td style={{padding:"5px 10px",textAlign:"center",
                            fontWeight:700,color:hrsCol,fontSize:11}}>
                            {hrs>0?hrs+"h":"—"}
                          </td>
                        </tr>
                      );
                    })
                  ];
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </>
  );
}

function TimeOffCalendar({ employees, timeOffRequests }) {
  const t = useTheme();
  const [focusDate, setFocusDate] = useState(null);
  const [monthOffset, setMonthOffset] = useState(0);

  const today = new Date();
  today.setHours(0,0,0,0);

  const dateMap = {};
  (timeOffRequests||[]).forEach(req => {
    const emp = employees.find(e => e.id === req.empId);
    if (!emp) return;
    const start = new Date(req.startDate + "T00:00:00");
    const end   = new Date((req.endDate || req.startDate) + "T00:00:00");
    for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
      const key = d.toISOString().slice(0,10);
      if (!dateMap[key]) dateMap[key] = [];
      dateMap[key].push({ emp, req });
    }
  });

  const statusDot = (status) => {
    if (status === "approved") return t.scale;
    if (status === "denied")   return t.danger;
    return t.warning;
  };

  const renderMonth = (year, month) => {
    const monthName = new Date(year, month, 1).toLocaleString("default", { month:"long", year:"numeric" });
    const firstDay  = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const cells = [];

    for (let i = 0; i < firstDay; i++) cells.push(null);
    for (let d = 1; d <= daysInMonth; d++) cells.push(d);

    return (
      <div key={`${year}-${month}`} style={{flex:"1 1 260px",minWidth:230}}>
        <div style={{textAlign:"center",fontWeight:700,fontSize:12,color:t.text,
          marginBottom:8,letterSpacing:".04em"}}>{monthName.toUpperCase()}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1}}>
          {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>(
            <div key={d} style={{textAlign:"center",fontSize:9,fontWeight:700,
              color:t.textDim,padding:"3px 0",letterSpacing:".04em"}}>{d}</div>
          ))}
          {cells.map((day,i) => {
            if (!day) return <div key={"e"+i}/>;
            const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            const entries = dateMap[dateStr] || [];
            const isToday = dateStr === today.toISOString().slice(0,10);
            const isFocus = focusDate?.dateStr === dateStr;

            const dots = entries.slice(0,4);
            const extra = entries.length - 4;

            return (
              <div key={dateStr}
                onClick={e => {
                  if (!entries.length) { setFocusDate(null); return; }
                  const r = e.currentTarget.getBoundingClientRect();
                  setFocusDate(isFocus ? null : { dateStr, entries, x: r.left, y: r.bottom });
                }}
                style={{
                  position:"relative",
                  textAlign:"center",
                  padding:"4px 2px 3px",
                  borderRadius:4,
                  cursor: entries.length ? "pointer" : "default",
                  background: isFocus ? t.accent+"22" : isToday ? t.accent+"15" : "transparent",
                  border: isToday ? "1px solid "+t.accent+"40" : "1px solid transparent",
                  transition:"background .15s",
                }}>
                <div style={{fontSize:10,fontWeight: isToday?800:500,
                  color: isToday?t.accent:t.text,lineHeight:1.2}}>{day}</div>
                {entries.length > 0 && (
                  <div style={{display:"flex",justifyContent:"center",gap:1.5,marginTop:2,flexWrap:"wrap"}}>
                    {dots.map(({req},di) => (
                      <span key={di} style={{
                        width:5,height:5,borderRadius:"50%",
                        background:statusDot(req.status),
                        flexShrink:0,display:"inline-block",
                      }}/>
                    ))}
                    {extra > 0 && (
                      <span style={{fontSize:7,color:t.textDim,fontWeight:700,lineHeight:"5px"}}>+{extra}</span>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  const months = [];
  for (let i = 0; i < 3; i++) {
    const d = new Date(today.getFullYear(), today.getMonth() + monthOffset + i, 1);
    months.push({ year: d.getFullYear(), month: d.getMonth() });
  }

  const tooltip = focusDate ? (() => {
    const d = new Date(focusDate.dateStr + "T00:00:00");
    const label = d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
    return (
      <div style={{
        position:"fixed", left:Math.min(focusDate.x, window.innerWidth-220),
        top: focusDate.y+6, zIndex:9999,
        background:t.surface, border:"1px solid "+t.border,
        borderRadius:8, padding:"10px 14px", minWidth:190,
        boxShadow:"0 4px 20px rgba(0,0,0,.18)",
      }}>
        <div style={{fontSize:11,fontWeight:800,color:t.text,marginBottom:8,
          letterSpacing:".04em"}}>{label.toUpperCase()}</div>
        {focusDate.entries.map(({emp,req},i) => (
          <div key={i} style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:statusDot(req.status),flexShrink:0}}/>
            <span style={{fontSize:12,fontWeight:600,color:t.text,flex:1}}>{emp.name}</span>
            <span style={{fontSize:10,fontWeight:700,
              color:statusDot(req.status),textTransform:"uppercase",letterSpacing:".04em"}}>
              {req.status}
            </span>
          </div>
        ))}
        <div style={{fontSize:10,color:t.textDim,marginTop:6,borderTop:"1px solid "+t.border,paddingTop:6}}>
          Click again to close
        </div>
      </div>
    );
  })() : null;

  const totalReqs = (timeOffRequests||[]).length;

  return (
    <div style={{marginBottom:20}}>
      {}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:t.textDim,letterSpacing:".06em"}}>
          CALENDAR VIEW
        </div>
        <div style={{display:"flex",gap:10,marginLeft:"auto",alignItems:"center"}}>
          {}
          {[["Pending",t.warning],["Approved",t.scale],["Denied",t.danger]].map(([label,col])=>(
            <div key={label} style={{display:"flex",alignItems:"center",gap:4}}>
              <span style={{width:7,height:7,borderRadius:"50%",background:col,display:"inline-block"}}/>
              <span style={{fontSize:10,color:t.textDim,fontWeight:600}}>{label}</span>
            </div>
          ))}
          {}
          <button onClick={()=>setMonthOffset(o=>o-1)}
            style={{background:t.surfaceAlt,border:"1px solid "+t.border,color:t.text,
              padding:"3px 10px",borderRadius:5,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>‹</button>
          <button onClick={()=>setMonthOffset(0)}
            style={{background:monthOffset===0?t.accent+"22":"transparent",
              border:"1px solid "+(monthOffset===0?t.accent:t.border),
              color:monthOffset===0?t.accent:t.textMuted,
              padding:"3px 10px",borderRadius:5,cursor:"pointer",fontSize:10,
              fontWeight:700,fontFamily:"inherit",letterSpacing:".04em"}}>TODAY</button>
          <button onClick={()=>setMonthOffset(o=>o+1)}
            style={{background:t.surfaceAlt,border:"1px solid "+t.border,color:t.text,
              padding:"3px 10px",borderRadius:5,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>›</button>
        </div>
      </div>

      {totalReqs === 0 ? (
        <div style={{background:t.surface,border:"1px solid "+t.border,borderRadius:8,
          padding:"20px",textAlign:"center",color:t.textDim,fontSize:12}}>
          No time-off requests yet — submit one below to see them here.
        </div>
      ) : (
        <div style={{background:t.surface,border:"1px solid "+t.border,borderRadius:8,padding:"16px"}}>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            {months.map(({year,month}) => renderMonth(year, month))}
          </div>
        </div>
      )}

      {}
      {focusDate && (
        <div onClick={()=>setFocusDate(null)}
          style={{position:"fixed",inset:0,zIndex:9998}}/>
      )}
      {tooltip}
    </div>
  );
}

function TimeOffManager({ employees, timeOffRequests, setTimeOffRequests, weekStart }) {
  const t   = useTheme();
  const uid = () => Math.random().toString(36).slice(2,10);

  const EMPTY_FORM = { empId:"", type:"single_day", startDate:"", endDate:"", shiftId:"", note:"" };
  const [form,      setForm]      = useState(EMPTY_FORM);
  const [errors,    setErrors]    = useState([]);
  const [filter,    setFilter]    = useState("all");
  const [empFilter, setEmpFilter] = useState("all");

  const upd = (k,v) => setForm(f => ({...f, [k]:v}));

  const validate = () => {
    const e = [];
    if (!form.empId)      e.push("Select an employee.");
    if (!form.startDate)  e.push("Start date is required.");
    if (form.type === "vacation" && !form.endDate) e.push("End date required for vacation.");
    if (form.type === "partial" && !form.shiftId)  e.push("Select a shift for partial time-off.");
    if (form.type === "vacation" && form.endDate && form.endDate < form.startDate)
      e.push("End date must be on or after start date.");
    return e;
  };

  const submit = () => {
    const e = validate();
    if (e.length) { setErrors(e); return; }
    const endDate = form.type === "vacation" ? form.endDate : form.startDate;
    setTimeOffRequests(prev => [...(prev||[]), {
      id: uid(),
      empId:       form.empId,
      type:        form.type,
      status:      "pending",
      startDate:   form.startDate,
      endDate,
      shiftId:     form.type === "partial" ? form.shiftId : null,
      note:        form.note.trim(),
      submittedAt: new Date().toISOString(),
      reviewedAt:  null,
    }]);
    setForm(EMPTY_FORM);
    setErrors([]);
  };

  const setStatus = (id, status) => {
    setTimeOffRequests(prev => prev.map(r =>
      r.id === id ? {...r, status, reviewedAt: new Date().toISOString()} : r
    ));
  };

  const remove = (id) => {
    if (!window.confirm("Delete this request?")) return;
    setTimeOffRequests(prev => prev.filter(r => r.id !== id));
  };

  const getName = id => employees.find(e => e.id === id)?.name || "Unknown";

  const statusColor = s => s==="approved" ? t.scale : s==="denied" ? t.danger : t.warning;
  const statusIcon  = s => s==="approved" ? "✓" : s==="denied" ? "✕" : "⏳";
  const typeLabel   = tp => tp==="vacation"?"🏖 Vacation":tp==="single_day"?"📅 Day Off":"⏰ Partial";

  const filtered = (timeOffRequests||[])
    .filter(r => filter==="all" || r.status===filter)
    .filter(r => empFilter==="all" || r.empId===empFilter)
    .sort((a,b) => b.submittedAt.localeCompare(a.submittedAt));

  const pending  = (timeOffRequests||[]).filter(r=>r.status==="pending").length;
  const approved = (timeOffRequests||[]).filter(r=>r.status==="approved").length;
  const denied   = (timeOffRequests||[]).filter(r=>r.status==="denied").length;

  const iS = { background:t.surfaceAlt, border:"1px solid "+t.border, color:t.text,
    padding:"9px 12px", borderRadius:6, outline:"none", fontSize:13,
    fontFamily:"'JetBrains Mono',monospace", width:"100%", boxSizing:"border-box" };

  const btnS = (active, col) => ({
    background: active ? col+"22" : "transparent",
    border: "1px solid " + (active ? col : t.border),
    color: active ? col : t.textMuted,
    padding:"5px 14px", borderRadius:20, cursor:"pointer",
    fontSize:11, fontWeight:700, fontFamily:"inherit", letterSpacing:".05em",
  });

  return (
    <div style={{maxWidth:900}}>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
        <div>
          <div style={{fontSize:20,fontWeight:800,color:t.text,letterSpacing:"-.02em"}}>
            Time Off & Requests
          </div>
          <div style={{fontSize:12,color:t.textDim,marginTop:2}}>
            Submit and manage vacation, day-off, and partial-shift requests.
            Approved requests block auto-fill and warn on manual assignment.
          </div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:10}}>
          {[["⏳",pending,t.warning],["✓",approved,t.scale],["✕",denied,t.danger]].map(([icon,count,col])=>(
            <div key={icon} style={{textAlign:"center",minWidth:44}}>
              <div style={{fontSize:18,fontWeight:800,color:col}}>{count}</div>
              <div style={{fontSize:9,color:t.textDim,fontWeight:700}}>{icon}</div>
            </div>
          ))}
        </div>
      </div>

      {}
      <TimeOffCalendar employees={employees} timeOffRequests={timeOffRequests}/>

      {}
      <div style={{background:t.surface,border:"1px solid "+t.border,borderRadius:8,
        padding:"18px 20px",marginBottom:20}}>
        <div style={{fontSize:12,fontWeight:700,color:t.textDim,letterSpacing:".06em",marginBottom:14}}>
          NEW REQUEST
        </div>
        {errors.length>0&&(
          <div style={{background:t.danger+"18",border:"1px solid "+t.danger,borderRadius:6,
            padding:"8px 12px",marginBottom:12,fontSize:12,color:t.danger}}>
            {errors.map((e,i)=><div key={i}>• {e}</div>)}
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div>
            <label style={{fontSize:11,color:t.textDim,fontWeight:700,display:"block",marginBottom:4}}>
              EMPLOYEE
            </label>
            <select value={form.empId} onChange={e=>upd("empId",e.target.value)} style={iS}>
              <option value="">— select —</option>
              {employees.map(e=>(
                <option key={e.id} value={e.id}>{e.name}</option>

function StorageInspector() {
  const t = useTheme();
  const [keys,     setKeys]     = useState([]);
  const [selected, setSelected] = useState(null);
  const [raw,      setRaw]      = useState("");
  const [editRaw,  setEditRaw]  = useState("");
  const [msg,      setMsg]      = useState(null);
  const [loading,  setLoading]  = useState(false);
  const [open,     setOpen]     = useState(false);

  const flash = (m, ok=true) => { setMsg({text:m,ok}); setTimeout(()=>setMsg(null), 3500); };

  const loadKeys = async () => {
    setLoading(true);
    try {
      const res = lsList();
      setKeys((res?.keys || []).sort());
    } catch(e) { setKeys([]); }
    setLoading(false);
  };

  const loadKey = async (k) => {
    setSelected(k);
    try {
      const res = lsGet(k);
      const text = res?.value ?? "null";
      try { setRaw(JSON.stringify(JSON.parse(text), null, 2)); setEditRaw(JSON.stringify(JSON.parse(text), null, 2)); }
      catch { setRaw(text); setEditRaw(text); }
    } catch(e) { setRaw("(not found)"); setEditRaw(""); }
  };

  const saveEdit = async () => {
    if (!selected) return;
    try {
      JSON.parse(editRaw);
      lsSet(selected, editRaw);
      flash("✓ Saved. Reload the app to apply.", true);
    } catch(e) { flash("✗ Invalid JSON — fix before saving.", false); }
  };

  const deleteKey = async () => {
    if (!selected) return;
    if (!window.confirm(`Delete storage key "${selected}"? This cannot be undone.`)) return;
    try {
      lsDelete(selected);
      flash(`✓ Deleted "${selected}".`, true);
      setSelected(null); setRaw(""); setEditRaw("");
      loadKeys();
    } catch(e) { flash("✗ Delete failed.", false); }
  };

  useEffect(() => { if (open) loadKeys(); }, [open]);

  const btnBase = {
    border:"none", padding:"7px 14px", borderRadius:5, cursor:"pointer",
    fontSize:11, fontWeight:700, fontFamily:"inherit",
  };

  return (
    <div style={{background:t.surface,border:"1px solid "+t.border,borderRadius:8,marginBottom:20}}>
      <button onClick={()=>setOpen(o=>!o)} style={{
        width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",
        background:"transparent",border:"none",padding:"16px 20px",cursor:"pointer",
        fontFamily:"inherit",
      }}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:t.text,textAlign:"left"}}>🗄 Storage Inspector</div>
          <div style={{fontSize:11,color:t.textDim,marginTop:2,textAlign:"left"}}>
            View, edit, or restore raw storage data. Use this to recover lost employee data.
          </div>
        </div>
        <span style={{fontSize:12,color:t.textDim}}>{open?"▲":"▼"}</span>
      </button>

      {open && (
        <div style={{padding:"0 20px 20px"}}>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
            <button onClick={loadKeys} style={{...btnBase,background:t.accent,color:"#fff"}}>
              {loading?"Loading…":"⟳ Refresh Keys"}
            </button>
            {msg && (
              <span style={{fontSize:11,fontWeight:700,color:msg.ok?t.success||"#4ade80":t.danger}}>
                {msg.text}
              </span>
            )}
          </div>

          {keys.length === 0 && !loading && (
            <div style={{fontSize:12,color:t.textDim,padding:"8px 0"}}>
              No storage keys found. Click Refresh Keys to scan.
            </div>
          )}

          {keys.length > 0 && (
            <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
              {}
              <div style={{flexShrink:0,width:180,border:"1px solid "+t.border,borderRadius:6,overflow:"hidden"}}>
                {keys.map(k => (
                  <div key={k} onClick={()=>loadKey(k)} style={{
                    padding:"8px 12px",fontSize:11,fontWeight:k===selected?700:400,
                    cursor:"pointer",background:k===selected?t.accent+"22":t.surfaceAlt,
                    color:k===selected?t.accent:t.text,
                    borderBottom:"1px solid "+t.border,
                    wordBreak:"break-all",
                  }}>{k}</div>
                ))}
              </div>

              {}
              {selected && (
                <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
                  <div style={{fontSize:11,fontWeight:700,color:t.textDim,letterSpacing:".05em"}}>
                    EDITING: {selected}
                    {selected==="shift_employees" && (
                      <span style={{marginLeft:8,fontSize:10,color:t.warning,fontWeight:400}}>
                        ⚠ This is your employee roster. After saving, reload the app tab.
                      </span>
                    )}
                  </div>
                  <textarea
                    value={editRaw}
                    onChange={e=>setEditRaw(e.target.value)}
                    spellCheck={false}
                    style={{
                      width:"100%",height:240,fontFamily:"'JetBrains Mono',monospace",
                      fontSize:10,background:t.surfaceAlt,color:t.text,
                      border:"1px solid "+t.border,borderRadius:5,padding:10,
                      resize:"vertical",outline:"none",boxSizing:"border-box",lineHeight:1.5,
                    }}
                  />
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={saveEdit}
                      style={{...btnBase,background:t.accent,color:"#fff"}}>

                    <button onClick={()=>setEditRaw(raw)}
                      style={{...btnBase,background:t.surfaceAlt,color:t.text,border:"1px solid "+t.border}}>
                      ⟳ Reset

                    <button onClick={deleteKey}
                      style={{...btnBase,background:"transparent",color:t.danger,border:"1px solid "+t.danger,marginLeft:"auto"}}>

                  </div>
                  <div style={{fontSize:10,color:t.textDim,lineHeight:1.6}}>
                    After editing, click <strong>Save to Storage</strong> then reload this browser tab

                    full roster — if it looks like only Scale employees, your previous save may be in

                  </div>
                </div>

          )}
        </div>
      )}
    </div>
  );

const ALL_BACKUP_KEYS = [
  "shift_employees","shift_settings","shift_schedule","shift_ext_shifts",
  "shift_saved_weeks","shift_history","shift_timeoff","shift_patterns",
  "shift_week_start","shift_saved_rosters","shift_custom_theme","shift_theme",
];

function RosterBackup({ employees, setEmployees, setSchedule, setExtShifts,
                        setSettings, setTimeOffReqs, setSavedWeeks, setHistory,
                        setEmpPatterns, setWeekStart, setSavedRosters }) {
  const t = useTheme();
  const [msg,  setMsg]  = useState(null);
  const [busy, setBusy] = useState(false);
  const fileRef = useRef(null);

  const flash = (text, ok=true) => {
    setMsg({text, ok});
    setTimeout(() => setMsg(null), 4000);
  };

  const downloadBackup = async () => {
    setBusy(true);
    try {
      const snapshot = {};
      for (const k of ALL_BACKUP_KEYS) {
        try {
          const r = await lsGet(k);
          if (r && r.value !== undefined) snapshot[k] = JSON.parse(r.value);
        } catch(_) {}
      }
      const payload = {
        _meta: {
          version: APP_VERSION,
          exportedAt: new Date().toISOString(),
          employeeCount: (snapshot.shift_employees||[]).length,
          label: "ShiftScheduler Full Backup",
        },
        data: snapshot,
      };
      const json = JSON.stringify(payload, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = `shift-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      flash("✓ Backup downloaded to your computer.");
    } catch(e) {
      flash("✗ Backup failed: " + e.message, false);
    }
    setBusy(false);
  };

  const handleFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    e.target.value = "";
    const reader = new FileReader();
    reader.onload = async (ev) => {
      setBusy(true);
      try {
        const parsed = JSON.parse(ev.target.result);
        const snapshot = parsed.data || parsed;

        const emps = snapshot.shift_employees || snapshot.employees;
        if (!Array.isArray(emps) || !emps.length)
          throw new Error("No employee data found in file.");

        const writes = [
          { key:"shift_employees",     val: emps,                              setter: setEmployees     },
          { key:"shift_theme",         val: snapshot.shift_theme,              setter: ()=>{}  },
          { key:"shift_custom_theme",  val: snapshot.shift_custom_theme,       setter: ()=>{}  },
          { key:"shift_settings",      val: snapshot.shift_settings,           setter: setSettings      },
          { key:"shift_schedule",      val: snapshot.shift_schedule,           setter: setSchedule      },
          { key:"shift_ext_shifts",    val: snapshot.shift_ext_shifts,         setter: setExtShifts     },
          { key:"shift_timeoff",       val: snapshot.shift_timeoff,            setter: setTimeOffReqs   },
          { key:"shift_saved_weeks",   val: snapshot.shift_saved_weeks,        setter: setSavedWeeks    },
          { key:"shift_history",       val: snapshot.shift_history,            setter: setHistory       },
          { key:"shift_patterns",      val: snapshot.shift_patterns,           setter: setEmpPatterns   },
          { key:"shift_week_start",    val: snapshot.shift_week_start,         setter: setWeekStart     },
          { key:"shift_saved_rosters", val: snapshot.shift_saved_rosters,      setter: setSavedRosters  },
        ];

        for (const { key, val, setter } of writes) {
          if (val === undefined || val === null) continue;
          try {
            lsSet(key, JSON.stringify(val));
            setter(val);
          } catch(_) {}
        }

        flash(`✓ Restored ${emps.length} employees and all settings. No reload needed.`);
      } catch(err) {
        flash("✗ Restore failed: " + err.message, false);
      }
      setBusy(false);
    };
    reader.readAsText(file);
  };

  const btnStyle = (bg, fg="#fff") => ({
    background: bg, color: fg, border: "none",
    padding: "10px 20px", borderRadius: 6, cursor: busy ? "not-allowed" : "pointer",
    fontSize: 12, fontWeight: 700, fontFamily: "inherit",
    display: "flex", alignItems: "center", gap: 7, opacity: busy ? .6 : 1,
    transition: "opacity .15s",
  });

  return (
    <div style={{ background: t.surface, border: "2px solid " + t.accent + "55",
      borderRadius: 8, padding: 20, marginBottom: 20 }}>
      <div style={{ display:"flex", alignItems:"flex-start", gap:12, marginBottom:14 }}>
        <span style={{ fontSize:22 }}>💾</span>
        <div>
          <div style={{ fontWeight:700, fontSize:14, color:t.text, marginBottom:4 }}>
            Roster &amp; Settings Backup
          </div>
          <div style={{ fontSize:12, color:t.textDim, lineHeight:1.6 }}>
            Download a <strong style={{color:t.text}}>.json file to your computer</strong> containing
            every employee preference, shift max, 12hr pref, OT setting, schedule, and time-off
            request. Import it any time — even after an update wipes the app storage — to restore
            everything instantly with no reload required.
          </div>
        </div>
      </div>

      <div style={{ display:"flex", gap:10, flexWrap:"wrap", alignItems:"center" }}>
        <button onClick={downloadBackup} disabled={busy} style={btnStyle(t.accent)}>
          ⬇ Download Backup
        </button>
        <button onClick={()=>fileRef.current?.click()} disabled={busy}
          style={{...btnStyle("transparent", t.accent), border:"2px solid "+t.accent}}>
          ⬆ Restore from File
        </button>
        <input ref={fileRef} type="file" accept=".json"
          onChange={handleFile} style={{display:"none"}} />
        {msg && (
          <span style={{ fontSize:12, fontWeight:700,
            color: msg.ok ? (t.success||"#4ade80") : t.danger,
            padding:"6px 12px", background: msg.ok ? (t.success||"#4ade80")+"22" : t.danger+"22",
            borderRadius:5 }}>
            {msg.text}
          </span>
        )}
      </div>

      <div style={{ marginTop:12, padding:"10px 14px", background:t.surfaceAlt,
        borderRadius:6, fontSize:11, color:t.textDim, lineHeight:1.7 }}>
        <strong style={{color:t.warning||"#f59e0b"}}>⚠ Important:</strong> The backup file is saved
        to your computer's Downloads folder. Keep it somewhere safe. Every time I push an update to
        this app, re-import your backup — it takes about 2 seconds and restores everything
        including individual employee OT preferences, 12hr shift availability, shift caps,
        blocked shifts, unavailable days, and all time-off requests.
      </div>
    </div>
  );
}

function RotationPreview({ employees, empPatterns, settings }) {
  const t = useTheme();
  // Use global DAYS — don't shadow it with a local redeclaration
  const DAY3 = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const maxShifts = settings?.maxConsecutiveShifts ?? 5;
  const daysOff   = Math.max(1, 7 - maxShifts);

  const ftEmps = employees.filter(e =>
    e.employmentType === "full-time"
  );

  const getDaysOff = (emp, mode) => {
    const stored = empPatterns?.[emp.id]?.blockStart;
    const idx = ftEmps.indexOf(emp);
    const freshBs = emp.requiredShift ? 0 : Math.floor((idx / ftEmps.length) * 7);
    const week0bs = stored !== undefined ? stored : freshBs;

    return [0,1,2,3].map(week => {
      const advancement = mode === "rolling" ? 1 : (maxShifts + daysOff);
      const bs = (week0bs + advancement * week) % 7;
      const offDays = [];
      for (let i = 0; i < daysOff; i++) {
        offDays.push(DAY3[(bs + maxShifts + i) % 7]);
      }
      return offDays.join("/");
    });
  };

  const colStyle = (i) => ({
    padding: "5px 8px", fontSize: 11, textAlign: "center",
    background: i % 2 === 0 ? t.surface : t.surfaceAlt,
    borderBottom: "1px solid " + t.border,
  });

  const modes = ["fixed", "rolling"];
  const modeLabels = { fixed: "Fixed (current)", rolling: "Rolling (proposed)" };
  const modeColors = { fixed: t.textMuted, rolling: t.scale };

  return (
    <div style={{display:"flex", gap:16, flexWrap:"wrap"}}>
      {modes.map(mode => (
        <div key={mode} style={{flex:"1 1 340px", minWidth:300}}>
          <div style={{fontSize:12, fontWeight:700, color:modeColors[mode],
            marginBottom:8, display:"flex", alignItems:"center", gap:6}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:modeColors[mode],flexShrink:0}}/>
            {modeLabels[mode]}
            {mode === (settings?.rotationMode ?? "fixed") &&
              <span style={{fontSize:10,fontWeight:700,color:"#fff",
                background:modeColors[mode],padding:"1px 6px",borderRadius:3,marginLeft:4}}>
                ACTIVE
              </span>
            }
          </div>
          <div style={{border:"1px solid "+t.border, borderRadius:6, overflow:"hidden"}}>
            {}
            <div style={{display:"grid", gridTemplateColumns:"120px repeat(4,1fr)",
              background:t.surfaceAlt, borderBottom:"1px solid "+t.border}}>
              <div style={{padding:"5px 8px",fontSize:10,fontWeight:700,color:t.textDim,textTransform:"uppercase",letterSpacing:".05em"}}>Employee</div>
              {[1,2,3,4].map(w=>(
                <div key={w} style={{padding:"5px 8px",fontSize:10,fontWeight:700,
                  color:t.textDim,textAlign:"center",textTransform:"uppercase",letterSpacing:".05em"}}>
                  Wk {w}
                </div>
              ))}
            </div>
            {}
            {ftEmps.map((emp, ri) => {
              const offWeeks = getDaysOff(emp, mode);
              const allSame = offWeeks.every(d => d === offWeeks[0]);
              return (
                <div key={emp.id} style={{display:"grid",
                  gridTemplateColumns:"120px repeat(4,1fr)",
                  background: ri%2===0 ? t.surface : t.surfaceAlt}}>
                  <div style={{padding:"5px 8px",fontSize:11,fontWeight:600,
                    color:t.text,borderRight:"1px solid "+t.border,
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}
                    title={emp.name}>
                    {emp.name}
                  </div>
                  {offWeeks.map((daysStr, wi) => {
                    const prevSame = wi > 0 && offWeeks[wi-1] === daysStr;
                    return (
                      <div key={wi} style={{padding:"5px 4px",fontSize:10,
                        textAlign:"center",fontWeight:prevSame&&mode==="rolling"?400:600,
                        color: allSame && mode==="rolling" ? t.danger :
                               prevSame ? t.textDim : t.scale,
                        borderLeft:"1px solid "+t.border+"44"}}>
                        {daysStr}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
          {mode === "fixed" && (
            <div style={{fontSize:10,color:t.danger,marginTop:5,fontWeight:600}}>
              ⚠ Same days off every week — rotation never advances
            </div>
          )}
          {mode === "rolling" && (
            <div style={{fontSize:10,color:t.scale,marginTop:5,fontWeight:600}}>
              ✓ Days off slide forward by 1 each week — fair rotation over 7 weeks
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function RosterDiagnostic({ employees, schedule, extShifts, timeOffReqs, weekStart }) {
  const t = useTheme();
  const [results, setResults] = useState(null);
  const [running, setRunning]  = useState(false);

  const run = () => {
    setRunning(true);
    setTimeout(() => {
      const issues = [];
      const E = (msg) => issues.push({ level:"error", msg });
      const W = (msg) => issues.push({ level:"warn",  msg });
      const rmap = Object.fromEntries(employees.map(e => [e.id, e]));

      const ftByShift = { first:0, second:0, third:0 };
      employees.forEach(e => {
        if (e.employmentType !== "full-time") return;
        const prefs = e.preferredShifts || [];
        const req   = e.requiredShift;
        const shift = req || (prefs.length===1 ? prefs[0] : null);
        if (shift) ftByShift[shift] = (ftByShift[shift]||0) + 1;
      });
      ["first","second","third"].forEach(sid => {
        if (ftByShift[sid] < 3) E(`R1: ${sid} shift has only ${ftByShift[sid]} FT employees (need ≥3 for full coverage)`);
      });

      const scaleByShift = { first:false, second:false, third:false };
      employees.forEach(e => {
        if (!(e.qualifications||[]).includes("Scale")) return;
        const prefs = e.preferredShifts || [];
        const req   = e.requiredShift;
        const shifts = req ? [req] : prefs;
        shifts.forEach(s => { if (s in scaleByShift) scaleByShift[s] = true; });
      });
      Object.entries(scaleByShift).forEach(([sid, has]) => {
        if (!has) E(`R2: No Scale-qualified employee on ${sid} shift`);
      });

      const medByShift = { first:false, second:false, third:false };
      employees.forEach(e => {
        if (!(e.qualifications||[]).includes("Medical")) return;
        const prefs = e.preferredShifts || [];
        const req   = e.requiredShift;
        const shifts = req ? [req] : prefs;
        shifts.forEach(s => { if (s in medByShift) medByShift[s] = true; });
      });
      Object.entries(medByShift).forEach(([sid, has]) => {
        if (!has) E(`R3: No Medical-qualified employee on ${sid} shift`);
      });

      const hasSup = employees.some(e => (e.qualifications||[]).includes("Supervisor"));
      if (!hasSup) E("R4: No Supervisor on the roster — weekday 1st shift will have no supervisor slot");

      employees.filter(e => e.employmentType==="on-call").forEach(e => {
        if (e.maxShiftsPerWeek == null)
          W(`R5: ${e.name} is on-call with no weekly shift limit — may be over-used in autofill`);
      });

      employees.filter(e => e.employmentType==="full-time").forEach(e => {
        const quals = e.qualifications || [];
        if (!(e.preferredShifts||[]).length && !e.requiredShift)
          W(`R6: ${e.name} has no preferred or required shift — autofill may place them anywhere`);
      });

      employees.forEach(e => {
        const pref = e.preferredShifts || [];
        const blocked = e.blockedShifts || [];
        const req = e.requiredShift;

        if (pref.length && pref.every(s => blocked.includes(s)))
          E(`R7: ${e.name} has all preferred shifts blocked — autofill can never place them`);

        if (req && blocked.includes(req))
          E(`R7: ${e.name} required shift "${req}" is also blocked — impossible constraint`);

        if ((e.unavailableDays||[]).length === 7)
          E(`R7: ${e.name} is marked unavailable every day of the week`);
      });

      const hasSched = Object.values(schedule||{}).some(a => a.length > 0);
      if (hasSched) {

        const shiftCount = {}; const weekendCount = {}; const dayShifts = {};
        DAYS.forEach(day => {
          SHIFTS.forEach(shift => {
            const key = cellKey(day, shift.id);
            const asgn = (schedule||{})[key] || [];
            const isWd1 = isWeekday(day) && shift.id === "first";
            const totalNeed = REGULAR_SLOTS(day, shift.id) + (SUP_SLOT_DAY(day,shift.id)?1:0);
            const total = asgn.length;
            if (total < totalNeed) {
              const names = asgn.map(a=>(rmap[a.employeeId]?.name||"?").split(" ").pop()).join(",");
              E(`S1: Coverage gap ${day} ${shift.id} — ${total}/${totalNeed}${names ? " ["+names+"]" : ""}`);
            }
            asgn.forEach(a => {
              const emp = rmap[a.employeeId]; if(!emp) return;
              const id = emp.id;
              if ((emp.unavailableDays||[]).includes(day)) E(`S3: ${emp.name} on unavailable day ${day}`);
              if ((emp.blockedShifts||[]).includes(shift.id)) E(`S4: ${emp.name} on blocked shift ${shift.id}`);
              if (emp.requiredShift && emp.requiredShift!==shift.id) E(`S5: ${emp.name} on ${shift.id} but required on ${emp.requiredShift}`);
              // R11: check approved time-off (timeOffReqs passed as prop)
              if (timeOffReqs && timeOffReqs.some(r =>
                r.empId===emp.id && r.status==="approved" &&
                timeOffCoversSlot(r, day, shift.id, weekStart)
              )) W(`S9: ${emp.name} scheduled on approved time-off on ${day} (${shift.id})`);
              shiftCount[id]=(shiftCount[id]||0)+1;
              if (["Saturday","Sunday"].includes(day)) weekendCount[id]=(weekendCount[id]||0)+1;
              const dk=id+"__"+day;
              if(!dayShifts[dk]) dayShifts[dk]=[];
              dayShifts[dk].push(shift.id);
            });
          });
        });
        employees.forEach(e => {
          const mxs=e.maxShiftsPerWeek;
          if(mxs!=null&&(shiftCount[e.id]||0)>mxs) E(`S6: ${e.name} worked ${shiftCount[e.id]} shifts, max ${mxs}`);
          const mxw=e.maxWeekendDays;
          if(mxw!=null&&(weekendCount[e.id]||0)>mxw) E(`S7: ${e.name} worked ${weekendCount[e.id]} weekend days, max ${mxw}`);
        });
        Object.entries(dayShifts).forEach(([dk,shifts]) => {
          if(shifts.length>1){
            const [empId,day]=dk.split("__");
            const emp=rmap[empId]; if(!emp) return;
            if(!emp.willing16h) E(`S8: ${emp.name} double-shifted ${day} (${shifts.join("+")})`);
          }
        });
      }

      setResults(issues);
      setRunning(false);
    }, 50);
  };

  const errors  = (results||[]).filter(i=>i.level==="error");
  const warns   = (results||[]).filter(i=>i.level==="warn");

  return (
    <div style={{marginTop:8}}>
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <button onClick={run} disabled={running}
          style={{background:t.accent,color:"#fff",border:"none",
            padding:"8px 18px",borderRadius:6,cursor:running?"default":"pointer",
            fontSize:12,fontWeight:700,fontFamily:"inherit",opacity:running?0.7:1}}>
          {running ? "Running…" : "🔍 Run Diagnostic"}
        </button>
        {results !== null && (
          <span style={{fontSize:12,fontWeight:600,
            color:errors.length ? t.danger : warns.length ? t.warning : t.scale}}>
            {errors.length===0 && warns.length===0
              ? "✓ No issues found"
              : errors.length
                ? `${errors.length} error${errors.length!==1?"s":""}${warns.length ? `, ${warns.length} warning${warns.length!==1?"s":""}` : ""}`
                : `${warns.length} warning${warns.length!==1?"s":""}`}
          </span>
        )}
        {results !== null && <button onClick={()=>setResults(null)}
          style={{background:"none",border:"none",cursor:"pointer",fontSize:12,
            color:t.textDim,padding:0,fontFamily:"inherit"}}>Clear</button>}
      </div>

      {results !== null && results.length > 0 && (
        <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:4,
          maxHeight:280,overflowY:"auto",
          border:"1px solid "+t.border,borderRadius:6,padding:"8px 12px"}}>
          {errors.length>0 && (
            <>
              <div style={{fontSize:10,fontWeight:700,color:t.danger,
                letterSpacing:".06em",marginBottom:2}}>ERRORS — will cause wrong schedules</div>
              {errors.map((issue,i)=>(
                <div key={"e"+i} style={{display:"flex",gap:6,alignItems:"flex-start",fontSize:11}}>
                  <span style={{color:t.danger,flexShrink:0,fontWeight:700}}>✗</span>
                  <span style={{color:t.text}}>{issue.msg}</span>
                </div>
              ))}
            </>
          )}
          {warns.length>0 && (
            <>
              <div style={{fontSize:10,fontWeight:700,color:t.warning,
                letterSpacing:".06em",marginTop:errors.length?8:2,marginBottom:2}}>WARNINGS — review recommended</div>
              {warns.map((issue,i)=>(
                <div key={"w"+i} style={{display:"flex",gap:6,alignItems:"flex-start",fontSize:11}}>
                  <span style={{color:t.warning,flexShrink:0,fontWeight:700}}>!</span>
                  <span style={{color:t.text}}>{issue.msg}</span>
                </div>
              ))}
            </>
          )}
        </div>
      )}
    </div>
  );
}

function AfExcludeGroupToggles({ employees, afExclude, setAfExclude, t }) {
  const ptIds = employees.filter(e => e.employmentType === "part-time").map(e => e.id);
  const ocIds = employees.filter(e => e.employmentType === "on-call").map(e => e.id);
  const allPtExcl = ptIds.length > 0 && ptIds.every(id => afExclude.includes(id));
  const allOcExcl = ocIds.length > 0 && ocIds.every(id => afExclude.includes(id));
  const toggleGroup = (ids, exclude) => setAfExclude(prev => {
    const s = new Set(prev || []);
    ids.forEach(id => exclude ? s.add(id) : s.delete(id));
    return [...s];
  });
  if (ptIds.length === 0 && ocIds.length === 0) return null;
  return (
    <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginTop:6}}>
      <span style={{fontSize:11,color:t.textDim,fontWeight:600}}>Autofill exclude:</span>
      {ptIds.length > 0 && (
        <button onClick={() => toggleGroup(ptIds, !allPtExcl)}
          style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:4,cursor:"pointer",
            background:allPtExcl ? t.danger+"20" : "transparent",
            color:allPtExcl ? t.danger : t.textMuted,
            border:"1px solid "+(allPtExcl ? t.danger : t.border)}}>
          {allPtExcl ? "⊘ PT excluded" : "⚡ Exclude PT"}
        </button>
      )}
      {ocIds.length > 0 && (
        <button onClick={() => toggleGroup(ocIds, !allOcExcl)}
          style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:4,cursor:"pointer",
            background:allOcExcl ? t.danger+"20" : "transparent",
            color:allOcExcl ? t.danger : t.textMuted,
            border:"1px solid "+(allOcExcl ? t.danger : t.border)}}>
          {allOcExcl ? "⊘ OC excluded" : "⚡ Exclude OC"}
        </button>
      )}
      {afExclude.length > 0 && (
        <button onClick={() => setAfExclude([])}
          style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:4,cursor:"pointer",
            background:"transparent",color:t.scale,border:"1px solid "+t.scale}}>
          ✓ Include all
        </button>
      )}
    </div>
  );
}

                                {otherQuals.map(q=>(
                                  <span key={q} style={{width:6,height:6,borderRadius:"50%",
                                    background:pC(q,t),flexShrink:0}} title={q}/>
                                ))}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                  {unqualified.length > 0 && (
                    <div style={{padding:"4px 14px 8px"}}>
                      <div style={{fontSize:10,fontWeight:700,color:t.textDim,marginBottom:4}}>
                        UNQUALIFIED
                      </div>
                      {unqualified.map(emp=>(
                        <div key={emp.id} style={{fontSize:11,color:t.textDim,padding:"2px 0 2px 14px"}}>
                          {emp.name}
                        </div>
                      ))}
                    </div>
                  )}
                  {!employees.length && (
                    <div style={{padding:"12px 14px",fontSize:12,color:t.textDim,textAlign:"center"}}>
                      No employees added yet.
                    </div>
                  )}
                  {}
                  <div style={{marginTop:4,padding:"8px 14px 0",borderTop:"1px solid "+t.border,
                    fontSize:10,color:t.textDim,display:"flex",gap:12,flexWrap:"wrap"}}>
                    {ALL_POSITIONS.map(pos=>(
                      <span key={pos} style={{display:"flex",alignItems:"center",gap:4}}>
                        <span style={{width:6,height:6,borderRadius:2,background:pC(pos,t)}}/>
                        <span style={{color:pC(pos,t),fontWeight:600}}>{pos}:</span>
                        {" "}{employees.filter(e=>e.qualifications.includes(pos)).length}
                      </span>
                    ))}
                  </div>
                </div>
              );
            })()}
          </span>
            {(()=>{
            const filledColor=filledSlots===totalSlots?t.scale:unfilledSlots.length>0?t.supervisor:t.text;
                        return (
                        <span ref={filledRef} style={{position:"relative",display:"inline-flex",alignItems:"center"}}>
                <button onClick={()=>unfilledSlots.length>0&&setFilledOpen(o=>!o)} style={{
                  background:"none",border:"none",padding:0,cursor:unfilledSlots.length>0?"pointer":"default",
                  fontFamily:"inherit",fontSize:"inherit",display:"flex",alignItems:"center",gap:4,color:"inherit",
                }}>
                  <span style={{color:t.textMuted}}>FILLED:</span>{" "}
                  <span style={{color:filledColor,fontWeight:700}}>{filledSlots}/{totalSlots}</span>
                  {unfilledSlots.length>0?(
                    <span style={{fontSize:9,color:filledColor,opacity:.7,marginLeft:1}}>
                      {filledOpen?"▲":"▼"}
                    </span>
                  ):(
                    <span style={{fontSize:9,color:t.scale,fontWeight:700,marginLeft:3,opacity:.85}}>✓</span>
                  )}
                </button>
                {filledOpen&&unfilledSlots.length>0&&(
                  <div style={{position:"absolute",top:"100%",left:0,zIndex:999,
                    background:t.surface,border:"1px solid "+t.border,borderRadius:7,
                    boxShadow:"0 8px 32px rgba(0,0,0,0.35)",minWidth:220,marginTop:4,
                    overflow:"hidden"}}>
                    <div style={{padding:"8px 12px 6px",fontSize:9,fontWeight:700,
                      color:t.textDim,letterSpacing:".07em",borderBottom:"1px solid "+t.border+"60"}}>
                      UNFILLED SHIFTS — {unfilledSlots.reduce((s,x)=>s+x.open,0)} open slot{unfilledSlots.reduce((s,x)=>s+x.open,0)!==1?"s":""}
                    </div>
                    <div style={{maxHeight:260,overflowY:"auto"}}>
                      {unfilledSlots.map((u,i)=>{
                        const isEmpty=u.filled===0;
                        const dotCol=isEmpty?t.danger:t.warning;
                        return(
                          <button key={i} onClick={()=>{
                            setFilledOpen(false);
                            setActiveTab("schedule");
                            setHighlightSlot({day:u.day,shiftId:u.shiftId});
                          }} style={{
                            display:"flex",alignItems:"center",gap:10,width:"100%",
                            padding:"8px 12px",background:"none",border:"none",
                            borderBottom:"1px solid "+t.border+"40",cursor:"pointer",
                            fontFamily:"inherit",textAlign:"left",
                            transition:"background .12s",
                          }}
                          onMouseEnter={e=>e.currentTarget.style.background=t.surfaceAlt}
                          onMouseLeave={e=>e.currentTarget.style.background="none"}>
                            <span style={{width:7,height:7,borderRadius:"50%",
                              background:dotCol,flexShrink:0}}/>
                            <span style={{flex:1}}>
                              <span style={{fontSize:11,fontWeight:600,color:t.text,display:"block"}}>
                                {u.day.substring(0,3)} · {u.shiftLabel}
                              </span>
                              <span style={{fontSize:9,color:t.textDim}}>
                                {isEmpty?"Completely empty":u.filled+"/"+u.max+" filled"} · {u.open} slot{u.open!==1?"s":""} open
                              </span>
                            </span>
                            <span style={{fontSize:9,color:t.accent,fontWeight:700,flexShrink:0}}>→</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>
                )}
              </span>
            );})()}
          <span><span style={{color:t.textMuted}}>SHIFTS/WEEK:</span> <span style={{fontWeight:700}}>21</span></span>
          {unmetReqs>0&&(
              <span ref={covRef} style={{position:"relative",display:"inline-flex",alignItems:"center"}}>
                <button onClick={()=>setCovOpen(o=>!o)} style={{background:"none",border:"none",padding:0,
                  cursor:"pointer",fontFamily:"inherit",fontSize:"inherit",
                  display:"flex",alignItems:"center",gap:4,color:"inherit"}}>
                  <span style={{color:t.warning}}>⚠ COVERAGE:</span>{" "}
                  <span style={{color:t.warning,fontWeight:700}}>{unmetReqs}</span>
                  <span style={{fontSize:9,color:t.warning,opacity:.7,marginLeft:1}}>
                    {covOpen?"▲":"▼"}
                  </span>
                </button>
                {covOpen&&(
                  <div style={{position:"absolute",top:"100%",left:0,zIndex:999,
                    background:t.surface,border:"1px solid "+t.border,borderRadius:7,
                    boxShadow:"0 8px 32px rgba(0,0,0,0.35)",minWidth:230,marginTop:4,
                    overflow:"hidden"}}>
                    <div style={{padding:"8px 12px 6px",fontSize:9,fontWeight:700,
                      color:t.textDim,letterSpacing:".07em",borderBottom:"1px solid "+t.border+"60"}}>
                      COVERAGE GAPS — {unmetReqs} shift{unmetReqs!==1?"s":""} missing roles
                    </div>
                    <div style={{maxHeight:260,overflowY:"auto"}}>
                      {coverageIssueSlots.map((u,i)=>(
                        <button key={i} onClick={()=>{
                          setCovOpen(false);
                          setActiveTab("schedule");
                          setHighlightSlot({day:u.day,shiftId:u.shiftId});
                        }} style={{display:"flex",alignItems:"center",gap:10,width:"100%",
                          padding:"8px 12px",background:"none",border:"none",
                          borderBottom:"1px solid "+t.border+"40",cursor:"pointer",
                          fontFamily:"inherit",textAlign:"left",transition:"background .12s"}}
                          onMouseEnter={e=>e.currentTarget.style.background=t.surfaceAlt}
                          onMouseLeave={e=>e.currentTarget.style.background="none"}>
                          <span style={{width:7,height:7,borderRadius:"50%",
                            background:t.warning,flexShrink:0}}/>
                          <span style={{flex:1}}>
                            <span style={{fontSize:11,fontWeight:600,color:t.text,display:"block"}}>
                              {u.day.substring(0,3)} · {u.shiftLabel}
                            </span>
                            <span style={{fontSize:9,color:t.danger}}>
                              Missing: {u.missing.join(" & ")}
                            </span>
                          </span>
                          <span style={{fontSize:9,color:t.accent,fontWeight:700,flexShrink:0}}>→</span>
                        </button>
                      ))}
                    </div>
                  </div>
                )}
              </span>
          )}
          {underHoursCount>0&&<span><span style={{color:t.danger}}>\u26a0 UNDER 40H:</span> <span style={{color:t.danger,fontWeight:700}}>{underHoursCount} FT</span></span>}
          {fatigueCount>0&&<span><span style={{color:t.fatigue}}>⚠ FATIGUE:</span> <span style={{color:t.fatigue,fontWeight:700}}>{fatigueCount} staff</span></span>}
          {prefViolCount>0&&<span><span style={{color:t.warning}}>⚠ PREF VIOLATIONS:</span> <span style={{color:t.warning,fontWeight:700}}>{prefViolCount} staff</span></span>}
          {savedWeeks.length>0&&<span><span style={{color:t.textMuted}}>SAVED WEEKS:</span> <span style={{color:t.accent,fontWeight:700}}>{savedWeeks.length}</span></span>}          <span style={{marginLeft:"auto",color:t.textDim,fontSize:10}}>Auto-saved across sessions</span>
        </div>

        {}
        <div style={{display:"flex",padding:"0 28px",background:t.surface,borderBottom:"1px solid "+t.border}}>
          {[{id:"employees",label:"\u25a3 Employees"},{id:"schedule",label:"\u25a6 Schedule"},{id:"dashboard",label:"\u25a4 Dashboard"},{id:"timeoff",label:"📅 Time Off"},{id:"settings",label:"\u2699 Settings"}].map(tab=>(
            <button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{background:"transparent",border:"none",
              borderBottom:activeTab===tab.id?"2px solid "+t.accent:"2px solid transparent",
              color:activeTab===tab.id?t.text:t.textMuted,padding:"12px 24px",cursor:"pointer",
              fontSize:13,fontWeight:600,fontFamily:"inherit",letterSpacing:".05em",
              textTransform:"uppercase",transition:"all .2s",display:"flex",alignItems:"center",gap:7}}>
              {tab.label}
              {tab.id==="employees"&&draftEmployees!==null&&(
                <span style={{background:"#f59e0b",color:"#000",fontSize:9,fontWeight:800,
                  padding:"1px 6px",borderRadius:10,lineHeight:1.4}}>DRAFT</span>
              )}
              {tab.id==="dashboard"&&(unmetReqs>0||underHoursCount>0||fatigueCount>0||prefViolCount>0)&&(
                <span style={{background:t.danger,color:"#fff",fontSize:9,fontWeight:800,
                  padding:"1px 6px",borderRadius:10,lineHeight:1.4}}>
                  {unmetReqs+underHoursCount+fatigueCount+prefViolCount}
                </span>
              )}
              {tab.id==="timeoff"&&(timeOffReqs||[]).filter(r=>r.status==="pending").length>0&&(
                <span style={{background:t.warning,color:"#000",fontSize:9,fontWeight:800,
                  padding:"1px 6px",borderRadius:10,lineHeight:1.4}}>
                  {(timeOffReqs||[]).filter(r=>r.status==="pending").length}
                </span>
              )}
            </button>
          ))}
        </div>

        {}
        <div style={{padding:"24px 28px"}}>
          {activeTab==="employees"&&(
            <div>
              {/* Draft mode banner */}
              {draftEmployees !== null && (
                <div style={{background:"#1c1917",border:"2px solid #f59e0b",borderRadius:8,
                  padding:"12px 18px",marginBottom:16,display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                  <span style={{fontSize:18}}>📝</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:800,color:"#f59e0b",letterSpacing:".02em"}}>DRAFT MODE — Changes are not saved yet</div>
                    <div style={{fontSize:11,color:"#d4c89a",marginTop:2}}>
                      You are editing a draft copy of the roster. Apply to commit, or discard to revert.
                      The schedule and dashboard reflect your draft changes.
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8,flexShrink:0}}>
                    <button onClick={()=>{setEmployees(draftEmployees);setDraftEmployees(null);}}
                      style={{background:"#f59e0b",color:"#000",border:"none",padding:"9px 20px",
                        borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:700,fontFamily:"inherit"}}>
                      ✓ Apply Changes
                    </button>
                    <button onClick={()=>setDraftEmployees(null)}
                      style={{background:"transparent",color:"#f59e0b",border:"1.5px solid #f59e0b",
                        padding:"9px 18px",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"inherit"}}>
                      ✕ Discard
                    </button>
                  </div>
                </div>
              )}
              {/* Draft mode toggle */}
              {draftEmployees === null && (
                <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
                  <button onClick={()=>setDraftEmployees(JSON.parse(JSON.stringify(employees)))}
                    style={{background:"transparent",color:"#f59e0b",border:"1px solid #f59e0b60",
                      padding:"6px 14px",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:600,
                      fontFamily:"inherit",display:"flex",alignItems:"center",gap:6}}>
                    📝 Enter Draft Mode
                  </button>
                </div>
              )}
              <EmployeeManager
                employees={draftEmployees !== null ? draftEmployees : employees}
                setEmployees={draftEmployees !== null ? setDraftEmployees : setEmployees}
                schedule={schedule} setSchedule={setSchedule}
                savedRosters={savedRosters} setSavedRosters={setSavedRosters}
                onOpenTestModal={()=>setShowTestModal(true)}
                afExclude={afExclude} setAfExclude={setAfExclude}
                customSeed={customSeed} setCustomSeed={setCustomSeed}/>
            </div>
          )}
          {activeTab==="schedule"&&(
            <div style={{display:"flex",gap:0,alignItems:"flex-start"}}>
              <div style={{flex:1,minWidth:0}}>
                <ScheduleGrid employees={activeEmployees} schedule={schedule} setSchedule={setSchedule}
                  onOpenTestModal={()=>setShowTestModal(true)}
                  pendingAutoFill={pendingAutoFill}
                  clearPendingAutoFill={()=>setPendingAutoFill(null)}
                  savedWeeks={savedWeeks} setSavedWeeks={setSavedWeeks}
                  history={history} setHistory={setHistory}
                  highlightSlot={highlightSlot} clearHighlightSlot={()=>setHighlightSlot(null)}
                  extShifts={extShifts} setExtShifts={setExtShifts}
                  weekStart={weekStart} setWeekStart={(ws)=>{setWeekStart(ws);setWeekStartApp(ws);}} timeOffReqs={timeOffReqs} empTimeOffDays={empTimeOffDays}
                  empPatterns={empPatterns} setEmpPatterns={setEmpPatterns}
                  afExclude={afExclude} setAfExclude={setAfExclude}
                  scheduleStale={scheduleStale} setScheduleStale={setScheduleStale}/>
              </div>
              {}
              <div style={{flexShrink:0,transition:"width .2s",
                width:sidebarOpen?260:36,overflow:"hidden",
                borderLeft:"1px solid "+t.border,marginLeft:8,
                background:t.surface,borderRadius:6}}>
                <button onClick={()=>setSidebarOpen(o=>!o)}
                  title={sidebarOpen?"Close coverage sidebar":"Open coverage sidebar"}
                  style={{width:"100%",background:"none",border:"none",cursor:"pointer",
                    padding:"10px 0",display:"flex",alignItems:"center",
                    justifyContent:sidebarOpen?"flex-end":"center",
                    paddingRight:sidebarOpen?10:0,
                    color:t.textDim,fontSize:13,fontFamily:"inherit",
                    borderBottom:"1px solid "+t.border}}>
                  {sidebarOpen?"▶ ":"◀"}
                </button>
                {sidebarOpen&&(()=>{
                  const totalSlots  = DAYS.length * SHIFTS.length * 3;
                  const filled      = Object.values(schedule||{}).reduce((n,a)=>n+a.filter(x=>x.position!=="Supervisor").length,0);
                  const pct         = totalSlots>0?Math.round(filled/totalSlots*100):0;
                  const ftShort     = activeEmployees.filter(e=>e.employmentType==="full-time"&&calcHours(e.id,schedule||{},extShifts||[])<40);
                  const ftOver      = activeEmployees.filter(e=>e.employmentType==="full-time"&&calcHours(e.id,schedule||{},extShifts||[])>40);
                  const ftHours     = activeEmployees.filter(e=>e.employmentType==="full-time").map(e=>({
                    name:e.name.split(" ").pop(), h:calcHours(e.id,schedule||{},extShifts||[])
                  })).sort((a,b)=>a.h-b.h);
                  const statRow = (label, val, col) => (
                    <div style={{display:"flex",justifyContent:"space-between",
                      alignItems:"center",padding:"5px 12px",borderBottom:"1px solid "+t.border+"40"}}>
                      <span style={{fontSize:10,color:t.textDim}}>{label}</span>
                      <span style={{fontSize:11,fontWeight:700,color:col||t.text}}>{val}</span>
                    </div>
                  );
                  return (
                    <div style={{padding:"6px 0"}}>
                      <div style={{padding:"6px 12px 4px",fontSize:9,fontWeight:800,
                        color:t.textDim,letterSpacing:".08em"}}>COVERAGE</div>
                      {statRow("Filled slots", filled+"/"+totalSlots, pct>=90?t.scale:pct>=70?t.warning:t.danger)}
                      {statRow("Coverage %", pct+"%", pct>=90?t.scale:pct>=70?t.warning:t.danger)}
                      {statRow("Under 40h", ftShort.length, ftShort.length>0?t.danger:t.scale)}
                      {statRow("Overtime", ftOver.length, ftOver.length>0?t.warning:t.scale)}
                      <div style={{padding:"8px 12px 4px",fontSize:9,fontWeight:800,
                        color:t.textDim,letterSpacing:".08em",marginTop:4}}>HOURS BY EMPLOYEE</div>
                      {ftHours.map(({name,h})=>(
                        <div key={name} style={{padding:"3px 12px",display:"flex",
                          justifyContent:"space-between",alignItems:"center"}}>
                          <span style={{fontSize:10,color:t.textMuted,overflow:"hidden",
                            textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:150}}>{name}</span>
                          <span style={{fontSize:10,fontWeight:700,flexShrink:0,
                            color:h>=48?t.danger:h>=40?t.scale:h>0?t.warning:t.textDim}}>{h}h</span>
                        </div>
                      ))}
                      <div style={{padding:"10px 12px 4px",borderTop:"1px solid "+t.border,marginTop:4}}>
                        <button onClick={()=>setActiveTab("dashboard")}
                          style={{width:"100%",background:t.accent+"18",border:"1px solid "+t.accent+"40",
                            color:t.accent,borderRadius:5,cursor:"pointer",padding:"6px 0",
                            fontSize:10,fontWeight:700,fontFamily:"inherit"}}>Full Dashboard →</button>
                      </div>
                    </div>
                  );
                })()}
              </div>
            </div>
          )}
          {activeTab==="dashboard"&&(
            <CoverageDashboard employees={activeEmployees} schedule={schedule} setSchedule={setSchedule}
              extShifts={extShifts} setExtShifts={setExtShifts} history={history}
              navigateToWeek={(weekStartVal) => { setWeekStart(weekStartVal); setActiveTab("schedule"); }}
              setActiveTab={(tab, hint) => { setActiveTab(tab); if(hint) setHighlightSlot(hint); }}
              timeOffReqs={timeOffReqs} weekStart={weekStart}/>
          )}
          {activeTab==="timeoff"&&(
            <TimeOffManager
              employees={activeEmployees}
              timeOffRequests={timeOffReqs}
              setTimeOffRequests={setTimeOffReqs}
              weekStart={weekStart}/>
          )}
          {activeTab==="settings"&&(
            <SettingsPanel settings={settings} setSettings={setSettings}
                employees={employees} setEmployees={setEmployees}
                setSchedule={setSchedule} setExtShifts={setExtShifts}
                setTimeOffReqs={setTimeOffReqs} setSavedWeeks={setSavedWeeks}
                setHistory={setHistory} setEmpPatterns={setEmpPatterns}
                empPatterns={empPatterns}
                setWeekStart={(ws)=>{setWeekStart(ws);setWeekStartApp(ws);}}
                setSavedRosters={setSavedRosters}
                themeName={themeName} setThemeName={setThemeName}
                customTheme={customTheme} setCustomTheme={setCustomTheme}
                schedule={schedule} extShifts={extShifts}
              />
          )}
        </div>
      {showExcelPreviewApp && (
        <ExcelPreviewModal
          employees={employees}
          schedule={schedule}
          extShifts={extShifts||[]}
          weekStart={weekStartApp}
          onDownload={()=>{ exportToExcel(employees, schedule, extShifts||[], weekStartApp); setShowExcelPreviewApp(false); }}
          onClose={()=>setShowExcelPreviewApp(false)}
        />
      )}
      </div>
    </SettingsCtx.Provider>
    </ThemeCtx.Provider>
  );
}

preact.render(preact.h(ShiftSchedulerApp, null), document.getElementById("app"));
</script>

</body>
</html>
