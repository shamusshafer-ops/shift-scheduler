// ── Time-off helpers (used by buildAutoFill + EmpPicker) ─────────────────────
// Checks if a time-off request covers a given week-day + shiftId
function timeOffCoversSlot(req, dayName, shiftId, weekStartISO) {
  if (req.status !== "approved") return false;
  const weekBase = new Date(weekStartISO + "T00:00:00");
  const dayIdx   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"].indexOf(dayName);
  const slotDate = new Date(weekBase);
  slotDate.setDate(weekBase.getDate() + dayIdx);
  const slotISO  = slotDate.toISOString().slice(0,10);
  if (slotISO < req.startDate || slotISO > req.endDate) return false;
  if (req.type === "partial" && req.shiftId !== shiftId) return false;
  return true;
}
function getTimeOffForDay(timeOffRequests, empId, dayName, weekStartISO, shiftId) {
  return (timeOffRequests||[]).filter(r =>
    r.empId === empId && timeOffCoversSlot(r, dayName, shiftId ?? "first", weekStartISO)
    && (shiftId == null || r.type !== "partial" || r.shiftId === shiftId)
  );
}

// ── Auto-fill builder ─────────────────────────────────────────────────────────
// Goal: each employee works consecutive days on a consistent shift, then takes
// their days off together, then repeats — matching their preferredShift and
// preferredDaysOff as closely as possible.
//
// Algorithm:
//  1. Pre-assign each employee a "work block" across the week using a rotating
//     pattern: (maxShifts) consecutive work days, then (7-maxShifts) days off.
//     The block start rotates per employee to spread coverage across all days.
//  2. Each employee is locked to one shift for their whole block (preferredShift
//     if set, otherwise assigned to the shift with the most coverage need).
//  3. Score-based slot filling resolves ties and handles edge cases.
// Guard-only: qualifications contain Guard but NOT Scale or Medical.
// Pure function — no closure deps, accessible everywhere.
const isGuardOnly = (e) => {
  const q = e.qualifications || [];
  return q.includes("Guard") && !q.includes("Scale") && !q.includes("Medical");
};

// Check if employee has approved time-off on a given day+shift
// Handles both full-day keys ("empId__day") and partial keys ("empId__day__shiftId")
const hasTimeOff = (empTimeOffDays, empId, day, shiftId) => {
  if (!empTimeOffDays) return false;
  return empTimeOffDays.has(empId + "__" + day) ||           // full day / vacation
         empTimeOffDays.has(empId + "__" + day + "__" + shiftId); // partial shift
};

function buildAutoFill(sourceEmps, cfg, empTimeOffDays, empPatterns, extShiftsArg) {
  const maxNights = cfg?.maxConsecutiveNights ?? MAX_CONSECUTIVE_NIGHTS;
  const minRest   = cfg?.minRestHours ?? MIN_REST_HOURS;
  const maxShifts = cfg?.maxConsecutiveShifts ?? 5;
  const daysOff   = Math.max(1, 7 - maxShifts); // rest days in the cycle
  const ns          = {};
  const hourTracker = {};
  const dayWorked   = {};
  const shiftsWorked = {};
  sourceEmps.forEach(e => { hourTracker[e.id] = 0; dayWorked[e.id] = new Set(); shiftsWorked[e.id] = 0; });

  // ── Step 1: Assign each employee a shift + work-block plan for the week ───
  // "plan[empId]" = { shiftId, workDays: Set<dayName> }
  const plan = {};

  // Spread employees across shifts, respecting preferred shift where possible.
  // Group employees by their preferred shift (or "any" if none set).
  const shiftGroups = { first: [], second: [], third: [], any: [] };
  sourceEmps.forEach(e => {
    const prefs = e.preferredShifts||[];
    if ((e.qualifications||[]).includes("Supervisor")) {
      shiftGroups.first.push(e);
    } else if (e.requiredShift && shiftGroups[e.requiredShift]) {
      shiftGroups[e.requiredShift].push(e);
    } else if (prefs.length === 1 && shiftGroups[prefs[0]]) {
      shiftGroups[prefs[0]].push(e);
    } else if (prefs.length > 1) {
      // Multi-preferred: assign to whichest preferred group needs most help (handled below via any)
      shiftGroups.any.push(e);
    } else if (empPatterns && empPatterns[e.id]?.shiftId && shiftGroups[empPatterns[e.id].shiftId]) {
      // No preference set — carry forward last week's shift assignment for continuity
      shiftGroups[empPatterns[e.id].shiftId].push(e);
    } else {
      shiftGroups.any.push(e);
    }
  });

  // Distribute "any" employees to under-staffed shifts
  const shiftNeeds = SHIFTS.map(s => ({
    id: s.id,
    count: shiftGroups[s.id].length,
  }));
  shiftGroups.any.forEach(e => {
    const lightest = shiftNeeds.slice().sort((a, b) => a.count - b.count)[0];
    shiftGroups[lightest.id].push(e);
    lightest.count++;
  });

  // For each shift group, assign rotating work-block start days so the whole
  // week gets covered evenly.  Employees within a group stagger their start.
  SHIFTS.forEach(shift => {
    const group = shiftGroups[shift.id];
    if (!group.length) return;

    // How many employees do we need on any given day for this shift?
    const slotsPerDay = DAYS.reduce((sum, d) => sum + REGULAR_SLOTS(d, shift.id), 0) / 7;
    // Stagger: spread block-starts evenly across 7 days
    // Only count FT employees for spacing — OC/PT get their own plan path
    const ftGroupSize = group.filter(e => e.employmentType === "full-time").length || 1;
    let ftIdx = 0; // separate index counter for FT employees only
    group.forEach((emp, idx) => {
      // Even spacing: Math.floor distributes starts across all 7 days without collisions.
      // Pattern memory: advance the employee's blockStart from the previous week by the
      // full cycle length (maxShifts work days + daysOff rest days = 7) so the rotation
      // rolls forward predictably each week.  For a 5-on/2-off pattern this always
      // advances by 7, which wraps cleanly — the employee's rest days shift by one
      // position each week, giving a fair rolling schedule over time.
      const freshBlockStart = Math.floor((ftIdx / ftGroupSize) * 7);
      const prevPattern = empPatterns && empPatterns[emp.id];
      // requiredShift employees anchor to Sunday (blockStart 0) always.
      // They must cover the start of the week for their shift — don't let
      // rolling mode drift them to Tuesday, Wednesday, etc.
      const freshBlockStartEff = emp.requiredShift ? 0 : freshBlockStart;
      // rotationMode: "rolling" advances by 1 day/week; "fixed" keeps same days off.
      // requiredShift employees always stay at 0 — ignore rotation advancement.
      const rotationMode = cfg?.rotationMode ?? "fixed";
      const advancement = emp.requiredShift ? 0
        : rotationMode === "rolling" ? 1 : (maxShifts + daysOff);
      const blockStart = prevPattern?.blockStart !== undefined
        ? (prevPattern.blockStart + advancement) % 7
        : freshBlockStartEff;

      // Build the set of work days: maxShifts consecutive starting at blockStart,
      // wrapping around the week, but respecting preferred days off.
      const preferredOff = new Set(emp.preferredDaysOff || []);
      const workDays = new Set();

      // Try to place exactly maxShifts work days starting at blockStart,
      // skipping preferred-off days as the "gap".
      let placed = 0;
      for (let offset = 0; offset < 7 && placed < maxShifts; offset++) {
        const d = DAYS[(blockStart + offset) % 7];
        if (!preferredOff.has(d) && !(emp.unavailableDays || []).includes(d)) {
          workDays.add(d);
          placed++;
        }
      }
      // If we couldn't fill maxShifts (e.g. many unavail days), relax and fill rest
      if (placed < maxShifts) {
        for (let offset = 0; offset < 7 && placed < maxShifts; offset++) {
          const d = DAYS[(blockStart + offset) % 7];
          if (!workDays.has(d) && !(emp.unavailableDays || []).includes(d)) {
            workDays.add(d);
            placed++;
          }
        }
      }

      // PT employees: override the plan with just their available days —
      // don't force them into the 5-on-2-off FT rotation block.
      if (emp.employmentType !== "full-time") {
        const ptAvail = new Set(
          DAYS.filter(d =>
            !(emp.unavailableDays||[]).includes(d) &&
            !(emp.preferredDaysOff||[]).includes(d)
          )
        );
        // If they've blocked everything, fall back to just non-unavailable days
        const ptWorkDays = ptAvail.size > 0 ? ptAvail
          : new Set(DAYS.filter(d => !(emp.unavailableDays||[]).includes(d)));
        plan[emp.id] = { shiftId: shift.id, workDays: ptWorkDays, isPT: true, maxShiftsPerWeek: emp.maxShiftsPerWeek ?? null };
      } else if ((emp.qualifications||[]).includes("Supervisor")) {
        // Supervisors must be scheduled every weekday on 1st shift — enforce it
        const supWorkDays = new Set(
          DAYS.filter(d => isWeekday(d) && !(emp.unavailableDays||[]).includes(d))
        );
        // Also allow weekend days from the regular work-block so they can still reach 40h
        // if a weekday is unavailable — add remaining non-unavail days up to maxShifts
        let supPlaced = supWorkDays.size;
        for (let offset = 0; offset < 7 && supPlaced < maxShifts; offset++) {
          const d = DAYS[(blockStart + offset) % 7];
          if (!supWorkDays.has(d) && !(emp.unavailableDays||[]).includes(d)) {
            supWorkDays.add(d);
            supPlaced++;
          }
        }
        plan[emp.id] = { shiftId: "first", workDays: supWorkDays, maxShiftsPerWeek: emp.maxShiftsPerWeek ?? null, blockStart };
      } else {
        plan[emp.id] = { shiftId: shift.id, workDays, maxShiftsPerWeek: emp.maxShiftsPerWeek ?? null, blockStart };
      }
      if (emp.employmentType === "full-time") ftIdx++; // advance FT index after FT plan assigned
    });
  });

  // ── Step 2: Build qualification-group peer sets for fairness ────────────
  // For each employee, find peers who share at least one qualifying position.
  // "fairness penalty" = how many MORE hours this emp has vs the peer-group minimum.
  // This strongly levels shift counts across employees with shared qualifications.
  const qualGroups = {}; // qual -> [empId, ...]
  POSITIONS.forEach(pos => {  // Supervisor excluded from regular peer groups
    qualGroups[pos] = sourceEmps.filter(e => e.qualifications.includes(pos)).map(e => e.id);
  });
  const peerMinHours = (emp) => {
    // Minimum hours among all employees sharing any qualification with this emp
    const peerIds = new Set();
    emp.qualifications.forEach(q => (qualGroups[q] || []).forEach(id => peerIds.add(id)));
    peerIds.delete(emp.id);
    if (!peerIds.size) return 0;
    return Math.min(...[...peerIds].map(id => hourTracker[id] || 0));
  };

  // ── Score function used for tie-breaking within a slot ───────────────────
  // targetPos: position being scored for — drives role-stretch penalty.
  const empScore = (emp, day, shiftId, targetPos) => {
    // Hard blocks
    if ((emp.unavailableDays || []).includes(day)) return null;
    if (hasTimeOff(empTimeOffDays, emp.id, day, shiftId)) return null;
    // Qualification gate: employee must be able to fill at least one position in this slot
    if (!getAvailPos(day, shiftId).some(p => emp.qualifications.includes(p))) return null;
    if (isRestViolation(emp, calcRestGap(emp.id, ns, day, shiftId), minRest)) return null;
    if (calcConsecutiveHours(emp.id, ns, day, shiftId) > empMaxConsec(emp)) return null;
    if (shiftId === "third" && calcConsecutiveNights(emp.id, ns, day, shiftId) >= maxNights) return null;
    // Requires: employee must only appear on their required shift — hard block all others
    if (emp.requiredShift && emp.requiredShift !== shiftId) return null;
    if ((emp.blockedShifts||[]).includes(shiftId)) return null;
    // Supervisor employees: block from regular slot scoring on weekday 1st shift
    // (they fill the dedicated Supervisor slot via a separate path in the fill loop).
    // Also block from any other weekday shift.
    const isSupervisorEmp = (emp.qualifications||[]).includes("Supervisor");
    if (isSupervisorEmp && isWeekday(day)) return null;  // all weekday slots handled separately
    // PT employees with a shift preference are strongly discouraged from other shifts
    // but NOT hard-blocked — they can still fill as last resort when no FT is available.
    // This penalty is applied later in scoring (see ptShiftMismatch below).

    const empPlan = plan[emp.id];
    const myHours = hourTracker[emp.id] || 0;
    const isFT    = emp.employmentType === "full-time";
    // Read cap from plan (preferred) or directly from emp as fallback
    const empMaxW = empPlan?.maxShiftsPerWeek ?? emp.maxShiftsPerWeek ?? null;
    if (empMaxW !== null && (shiftsWorked[emp.id] || 0) >= empMaxW) return null;

    // FT employees are hard-blocked from any shift other than their planned shift.
    // This prevents shift-hopping in the main fill loop.
    // PT employees keep a soft penalty — they fill as last resort across shifts.
    if (isFT && empPlan && empPlan.shiftId !== shiftId) return null;

    const ptPrefMismatch = (!isFT && (emp.preferredShifts||[]).length > 0
      && !(emp.preferredShifts||[]).includes(shiftId)) ? 800 : 0;
    const shiftMismatch = empPlan && empPlan.shiftId === shiftId ? 0 : 20; // PT only now
    const onPlannedShift = shiftMismatch + ptPrefMismatch;

    // Strong preference: employee is scheduled to work today in their plan
    // PT: their plan covers all available days, so this penalty rarely fires
    const onWorkDay = empPlan && empPlan.workDays.has(day) ? 0 : (isFT ? 40 : 10);

    // Count consecutive days worked to detect overwork, including cross-week tail.
    const todayIdx = dayIdx(day);
    const prevTail = (empPatterns && empPatterns[emp.id]?.trailingDays) || 0;
    let consec = 0;
    for (let i = todayIdx - 1; i >= 0; i--) {
      if (dayWorked[emp.id].has(DAYS[i])) consec++; else break;
    }
    // Only add prevTail when we're past Sunday AND the streak runs unbroken
    // all the way back to Sunday (consec === todayIdx means no gap found).
    // todayIdx === 0 means we ARE on Sunday — that always starts fresh.
    if (todayIdx > 0 && consec === todayIdx && prevTail) consec += prevTail;
    // Hard-block: cannot work if already at/over maxShifts consecutive days
    if (consec >= maxShifts) return null;
    const overworkPenalty = 0; // enforced by hard null above

    // ── Tier logic (three priority levels) ───────────────────────────────────
    //
    // TIER 1 — FT under 40h:          score normally (lowest scores, always picked first)
    // TIER 2 — PT while any FT under 40h: +500 penalty (effectively blocked)
    // TIER 3 — FT already at 40h+:    +400 penalty  (prefer PT over FT overtime)
    //          PT once all FT at 40h:  no ptPenalty  (PT now preferred over FT OT)
    //
    // Net effect:
    //   • FT < 40h always wins        (score ~0–170)
    //   • PT while FT needs hours     (score ~500+)  → skipped
    //   • PT once all FT ≥ 40h        (score ~0–170) → preferred over FT overtime
    //   • FT already at 40h+          (score ~400+)  → used only when no PT available

    // Check whether any FT peer can fill the SAME positions this PT employee can,
    // is still under 40h, and is genuinely available for this day+shift.
    // We match on overlapping qualifications so a Guard-only PT isn't suppressed
    // by a Scale-only FT employee — they're filling different roles.
    const empAvailPos = getAvailPos(day, shiftId).filter(p => emp.qualifications.includes(p));
    const anyQualFtAvailableUnder40 = !isFT && empAvailPos.some(pos =>
      (qualGroups[pos] || []).some(id => {
        const peer = sourceEmps.find(e => e.id === id);
        if (!peer || peer.employmentType !== "full-time") return false;
        if ((hourTracker[id] || 0) >= FT_MIN_HOURS) return false;
        if ((peer.unavailableDays || []).includes(day)) return false;
        if ((peer.blockedShifts || []).includes(shiftId)) return false;
        if (peer.requiredShift && peer.requiredShift !== shiftId) return false;
        if (!getAvailPos(day, shiftId).some(p => peer.qualifications.includes(p))) return false;
        const peerPlan = plan[id];
        if (peerPlan && !peerPlan.workDays.has(day)) return false;
        return true;
      })
    );

    // Suppress PT only when a real same-role FT option exists and is under 40h.
    const ptPenalty = anyQualFtAvailableUnder40 ? 200 : 0;

    // FT overtime avoidance: once an FT employee is at/above 40h, strongly
    // prefer PT employees over giving this FT more overtime.
    // Only applies when there IS at least one PT employee with shared quals
    // (otherwise we have no choice and must use the FT employee).
    // hasPtOption: only true when a PT employee can ACTUALLY fill THIS slot
    // (right shift, not unavailable, not blocked, qualifies for at least one position).
    // A 2nd-shift PT Guard on a 3rd-shift slot should not suppress FT OT penalty.
    const hasPtOption = emp.qualifications.some(q =>
      (qualGroups[q] || []).some(id => {
        const peer = sourceEmps.find(e => e.id === id);
        if (!peer || peer.employmentType === "full-time") return false;
        // Must be able to fill a position in this specific slot
        if (!getAvailPos(day, shiftId).some(p => peer.qualifications.includes(p))) return false;
        // Must not be unavailable or blocked for this day/shift
        if ((peer.unavailableDays || []).includes(day)) return false;
        if ((peer.blockedShifts || []).includes(shiftId)) return false;
        if (peer.requiredShift && peer.requiredShift !== shiftId) return false;
        // Must prefer or be willing to work this shift (no extreme mismatch)
        const peerPrefs = peer.preferredShifts || [];
        if (peerPrefs.length > 0 && !peerPrefs.includes(shiftId)) return false;
        return true;
      })
    );
    // overtimePref: resolves per-employee pref, falling back to the global default.
    // "blocked" → skip in auto-fill (hard null); warn on manual assignment.
    // "preferred" → no ftOtPenalty so they fill first when over 40h.
    // "neutral" → normal behaviour.
    const empOtPref  = emp.overtimePref && emp.overtimePref !== "neutral" ? emp.overtimePref : (cfg?.defaultOvertimePref || "neutral");
    const otPref     = isFT ? empOtPref : "neutral";
    if (isFT && myHours >= FT_MIN_HOURS && otPref === "blocked") return null;

    // Preferred OT: no ftOtPenalty (acts like they're still under 40h for scoring)
    // Stronger FT OT penalty: PT employees are strongly preferred over giving FT more OT.
    // Raised from 400 → 600 so a PT employee at 0h always beats an FT at 40h+.
    const ftOtPenalty = (isFT && myHours >= FT_MIN_HOURS && hasPtOption && otPref !== "preferred") ? 600 : 0;

    // Fairness within each tier: penalize employees with more hours than their
    // qual-group peers (3 pts per extra hour).  Keeps hours even within groups.
    const minPeer     = peerMinHours(emp);
    const fairPenalty = Math.max(0, myHours - minPeer) * 15;

    // Under-hours urgency boost for FT employees.
    // Expected pace: FT_MIN_HOURS prorated by how far through the week we are.
    // Each hour below pace reduces score by 15 — strong enough to overcome the
    // onWorkDay/onPlannedShift penalties that would otherwise leave them unassigned.
    // Only applies within TIER 1 (FT under 40h) — no effect on PT or FT-OT tiers.
    let underHoursBoost = 0;
    if (isFT && myHours < FT_MIN_HOURS && ptPenalty === 0 && ftOtPenalty === 0) {
      const daysProcessed = dayIdx(day) + 1;
      const pace = Math.round(FT_MIN_HOURS * daysProcessed / 7);
      const behindBy = Math.max(0, pace - myHours);
      // Cap boost at onWorkDay so it can't pull an emp onto a wrong-shift slot.
      // It lifts them within their planned days/shift, not across shift boundaries.
      underHoursBoost = Math.min(behindBy * 15, onWorkDay + fairPenalty);
    }

    // Supervisor employee: very high penalty — only fills as last resort
    const supWeekendPenalty = (
      (emp.qualifications||[]).includes("Supervisor") && !isWeekday(day)
    ) ? 2000 : 0;

    // Role-stretch penalty: penalise Scale/Medical employees filling Guard slots.
    // Guard-only employees and PT Guard staff are preferred for Guard coverage,
    // preserving specialist hours for Scale/Medical slots and reducing their OT.
    //   Guard-only                  → 0
    //   Scale or Medical + Guard    → 150  (PT guard-only still beats them)
    //   Scale + Medical + Guard     → 250  (triple-qual is last resort for Guard)
    const quals = emp.qualifications || [];
    const isGuardSlot      = targetPos === "Guard";
    const hasSpecialist    = quals.includes("Scale") || quals.includes("Medical");
    const specialistCount  = (quals.includes("Scale") ? 1 : 0) + (quals.includes("Medical") ? 1 : 0);
    const roleStretchPenalty = isGuardSlot && hasSpecialist
      ? (specialistCount >= 2 ? 250 : 150)
      : 0;

    return onPlannedShift + onWorkDay + overworkPenalty + ptPenalty + ftOtPenalty + fairPenalty - underHoursBoost + supWeekendPenalty + roleStretchPenalty;

  };

  // ── Step 3: Fill the schedule slot by slot ────────────────────────────────
  for (const day of DAYS) {
    for (const shift of SHIFTS) {
      const key   = cellKey(day, shift.id);
      const slots = getSlotCount(day, shift.id);
      const asgn  = [];
      const used  = new Set();

      // Pre-block any employee already covering this slot via an ext shift.
      (extShiftsArg||[]).forEach(ext => {
        const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
        if (!pair) return;
        const idx = pair.covers.indexOf(shift.id);
        if (idx === 0 && ext.empAId) used.add(ext.empAId);
        if (idx === 1 && ext.empBId) used.add(ext.empBId);
      });

      // Relaxed scorer: allows FT on rest days — only used when no compliant
      // employee can fill the slot (escape hatch, Step 3b).
      const rankScoreRelaxed = (emp, shiftId) => {
        const empPlan = plan[emp.id];
        const isFT    = emp.employmentType === "full-time";
        if (!isFT) return null; // PT/OC already tried in normal pass
        if (empPlan && empPlan.shiftId !== shiftId) return null;
        if ((emp.unavailableDays||[]).includes(day)) return null;
        if (hasTimeOff(empTimeOffDays, emp.id, day, shiftId)) return null;
        if ((emp.blockedShifts||[]).includes(shiftId)) return null;
        const myHours = hourTracker[emp.id] || 0;
        if (myHours >= OT_RELIEF_THRESHOLD) return null;
        if (isRestViolation(emp, calcRestGap(emp.id, ns, day, shiftId), minRest)) return null;
        if (calcConsecutiveHours(emp.id, ns, day, shiftId) > empMaxConsec(emp)) return null;
        const restDayPenalty = (empPlan && !empPlan.workDays.has(day)) ? 500 : 0;
        const fairPenalty    = Math.max(0, myHours - peerMinHours(emp)) * 15;
        return restDayPenalty + fairPenalty + (myHours >= FT_MIN_HOURS ? 600 : 0);
      };

      const assign = (emp, position) => {
        hourTracker[emp.id] = (hourTracker[emp.id] || 0) + SHIFT_HOURS;
        shiftsWorked[emp.id] = (shiftsWorked[emp.id] || 0) + 1;
        dayWorked[emp.id].add(day);
        asgn.push({ employeeId: emp.id, position });
        used.add(emp.id);
      };

      // Count only non-Supervisor entries toward the regular-slot cap.
      // The Supervisor occupies a dedicated +1 slot on weekday 1st shift
      // and must not consume one of the 3 regular Guard/Scale/Medical slots.
      const regularCount = () => asgn.filter(a => a.position !== "Supervisor").length;

      const activeExts = (extShiftsArg||[]).filter(e => extCovers(e, day, shift.id));
      const extBodyCount = activeExts.reduce((n, ext) => {
        const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
        if (!pair) return n;
        const shiftIdx = pair.covers.indexOf(shift.id);
        const hasBody = shiftIdx === 0 ? !!ext.empAId : shiftIdx === 1 ? !!ext.empBId : false;
        return n + (hasBody ? 1 : 0);
      }, 0);
      // effectiveSlots = cap for REGULAR (non-Supervisor) bodies only.
      const effectiveSlots = Math.max(0, REGULAR_SLOTS(day, shift.id) - extBodyCount);

      const extAlreadyScale = activeExts.some(e => {
        const pair = EXT_PAIRS.find(p => p.id === e.pairId);
        if (!pair) return false;
        const idx = pair.covers.indexOf(shift.id);
        const presentId = idx === 0 ? e.empAId : idx === 1 ? e.empBId : null;
        const presentEmp = presentId ? sourceEmps.find(x => x.id === presentId) : null;
        const roles = presentEmp
          ? ["Scale","Medical"].filter(r => presentEmp.qualifications.includes(r))
          : (e.roles||[]);
        return roles.includes("Scale");
      });
      const extAlreadyMedical = activeExts.some(e => {
        const pair = EXT_PAIRS.find(p => p.id === e.pairId);
        if (!pair) return false;
        const idx = pair.covers.indexOf(shift.id);
        const presentId = idx === 0 ? e.empAId : idx === 1 ? e.empBId : null;
        const presentEmp = presentId ? sourceEmps.find(x => x.id === presentId) : null;
        const roles = presentEmp
          ? ["Scale","Medical"].filter(r => presentEmp.qualifications.includes(r))
          : (e.roles||[]);
        return roles.includes("Medical");
      });

      // ── 1. Supervisor slot (weekday 1st only) ─────────────────────────────
      // Assigned first so they're in `used` before regular scoring.
      // Does NOT count against effectiveSlots — it is an additional slot.
      if (SUP_SLOT_DAY(day, shift.id)) {
        const supPick = sourceEmps.find(e =>
          !used.has(e.id) &&
          (e.qualifications||[]).includes("Supervisor") &&
          !(e.unavailableDays||[]).includes(day) &&
          !hasTimeOff(empTimeOffDays, e.id, day, shift.id)
        );
        if (supPick) assign(supPick, "Supervisor");
      }

      // Build ranked list AFTER supervisor is in `used`, so they don't appear here.
      const ranked = sourceEmps
        .map(e => { const s = empScore(e, day, shift.id); return s === null ? null : { e, s }; })
        .filter(Boolean)
        .sort((a, b) => a.s - b.s);

      // ── 2. Required roles: Scale and Medical ──────────────────────────────
      // Cap checked against regularCount() so the Supervisor slot doesn't eat
      // one of the 3 regular positions.
      for (const role of ["Scale", "Medical"]) {
        if (regularCount() >= effectiveSlots) break;
        if (asgn.some(a => a.position === role)) continue;
        if (role === "Scale"   && extAlreadyScale)   continue;
        if (role === "Medical" && extAlreadyMedical) continue;
        const pick = ranked.find(({ e }) => !used.has(e.id) && canFillPos(e, role, day) && !isSupLastResort(e, role, day))
                  || ranked.find(({ e }) => !used.has(e.id) && canFillPos(e, role, day));
        if (pick) assign(pick.e, role);
      }

      // ── 3. Remaining regular slots — two-pass Guard-first logic ─────────────
      // Pass A fills Scale/Medical roles and Guard slots using Guard-only employees.
      // Pass B allows specialists to fill any remaining Guard slots only if no
      // Guard-only employee is available — hard preference, not just a soft penalty.
      //
      const hasGuardOnlyAvailable = () =>
        sourceEmps.some(e =>
          !used.has(e.id) &&
          isGuardOnly(e) &&
          canFillPos(e, "Guard", day) &&
          empScore(e, day, shift.id, "Guard") !== null
        );
      const WEEKEND_DAYS = new Set(["Saturday","Sunday"]);
      const isWeekendDay = WEEKEND_DAYS.has(day);
      const weekendDaysWorked = (empId) =>
        [...(dayWorked[empId]||new Set())].filter(d => WEEKEND_DAYS.has(d)).length;
      const atWeekendCap = (emp) =>
        isWeekendDay &&
        emp.maxWeekendDays !== null &&
        emp.maxWeekendDays !== undefined &&
        weekendDaysWorked(emp.id) >= emp.maxWeekendDays;

      const buildRankedPos = () => {
        const nowHasSc = slotHasRole(asgn, sourceEmps, "Scale");
        const nowHasMd = slotHasRole(asgn, sourceEmps, "Medical");
        return sourceEmps
          .map(e => {
            const ap = getAvailPos(day, shift.id).filter(p => canFillPos(e, p, day));
            if (!ap.length) return null;
            const needSc = !nowHasSc && !extAlreadyScale;
            const needMe = !nowHasMd && !extAlreadyMedical;
            const likelyPos = (needSc && ap.includes("Scale"))   ? "Scale"
                            : (needMe && ap.includes("Medical")) ? "Medical"
                            : ap.includes("Guard")               ? "Guard"
                            : ap[0];
            const s = empScore(e, day, shift.id, likelyPos);
            return s === null ? null : { e, s, likelyPos };
          })
          .filter(Boolean)
          .sort((a, b) => a.s - b.s);
      };

      // Pass A: fill Scale/Medical roles + Guard slots using Guard-only employees.
      // Specialists are skipped for Guard slots if Guard-only employees exist.
      for (const { e, likelyPos } of buildRankedPos()) {
        if (regularCount() >= effectiveSlots) break;
        if (used.has(e.id)) continue;
        const ap = getAvailPos(day, shift.id).filter(p => canFillPos(e, p, day));
        if (!ap.length) continue;
        const nowHasScale   = slotHasRole(asgn, sourceEmps, "Scale");
        const nowHasMedical = slotHasRole(asgn, sourceEmps, "Medical");
        const needScale   = !nowHasScale   && !extAlreadyScale;
        const needMedical = !nowHasMedical && !extAlreadyMedical;
        let pos;
        if      (needScale   && ap.includes("Scale"))   pos = "Scale";
        else if (needMedical && ap.includes("Medical")) pos = "Medical";
        else if (ap.includes("Guard"))                  pos = "Guard";
        else pos = ap[0];
        // Hard block: if this would put a specialist in a Guard slot
        // AND Guard-only employees are still available, skip them for now.
        if (pos === "Guard" && !isGuardOnly(e) && hasGuardOnlyAvailable()) continue;
        if (atWeekendCap(e)) continue;
        assign(e, pos);
      }

      // Pass B: any remaining slots — now allow specialists to fill Guard.
      // Guard-only employees were either all placed or unavailable.
      if (regularCount() < effectiveSlots) {
        for (const { e } of buildRankedPos()) {
          if (regularCount() >= effectiveSlots) break;
          if (used.has(e.id)) continue;
          const ap = getAvailPos(day, shift.id).filter(p => canFillPos(e, p, day));
          if (!ap.length) continue;
          const nowHasScale   = slotHasRole(asgn, sourceEmps, "Scale");
          const nowHasMedical = slotHasRole(asgn, sourceEmps, "Medical");
          const needScale   = !nowHasScale   && !extAlreadyScale;
          const needMedical = !nowHasMedical && !extAlreadyMedical;
          let pos;
          if      (needScale   && ap.includes("Scale"))   pos = "Scale";
          else if (needMedical && ap.includes("Medical")) pos = "Medical";
          else if (ap.includes("Guard"))                  pos = "Guard";
          else pos = ap[0];
          if (atWeekendCap(e)) continue;
          assign(e, pos);
        }
      }

      // ── 3b. Rest-day escape hatch ──────────────────────────────────────
      // Fires when: (a) open body slots remain, OR (b) required roles (Scale/Medical)
      // are still missing even if headcount is full.
      // Allows FT on their planned rest days as absolute last resort.
      const hatchNeedsScale   = !slotHasRole(asgn, sourceEmps, "Scale")   && !extAlreadyScale;
      const hatchNeedsMedical = !slotHasRole(asgn, sourceEmps, "Medical") && !extAlreadyMedical;
      const hatchOpen = regularCount() < effectiveSlots || hatchNeedsScale || hatchNeedsMedical;
      if (hatchOpen) {
        const relaxed = sourceEmps
          .map(e => ({ e, score: rankScoreRelaxed(e, shift.id) }))
          .filter(x => x.score !== null && !used.has(x.e.id))
          .sort((a, b) => a.score - b.score);
        for (const { e } of relaxed) {
          // Stop when headcount is full AND all required roles are covered
          const stillNeedsScale   = !slotHasRole(asgn, sourceEmps, "Scale")   && !extAlreadyScale;
          const stillNeedsMedical = !slotHasRole(asgn, sourceEmps, "Medical") && !extAlreadyMedical;
          if (regularCount() >= effectiveSlots && !stillNeedsScale && !stillNeedsMedical) break;
          const ap = getAvailPos(day, shift.id).filter(p => canFillPos(e, p, day));
          if (!ap.length) continue;
          const needScale   = stillNeedsScale;
          const needMedical = stillNeedsMedical;
          // Only add a body if a slot is genuinely open — never exceed the slot cap.
          // Missing roles on a full slot are flagged as coverage gaps, not fixed by
          // adding a 4th body. The 12hr pair system handles role gaps on full shifts.
          if (regularCount() >= effectiveSlots) continue;
          let pos;
          if      (needScale   && ap.includes("Scale"))   pos = "Scale";
          else if (needMedical && ap.includes("Medical")) pos = "Medical";
          else if (ap.includes("Guard"))                  pos = "Guard";
          else pos = ap[0];
          // Guard-only preference: skip specialist for Guard if guard-only still available
          if (pos === "Guard" && !isGuardOnly(e) && hasGuardOnlyAvailable()) continue;
          if (atWeekendCap(e)) continue;
          assign(e, pos);
        }
      }

      ns[key] = asgn;
    }
  }
  // ── Shared helpers for Steps 4/5/5b ─────────────────────────────────────
  // These consolidate patterns that were repeated identically across every
  // fill pass: computing the effective slot cap, building the assigned-set
  // (including ext-shift bodies), picking the best position (Scale→Medical→Guard),
  // and updating all tracking state after a placement.

  const slotCap = (day, shiftId) =>
    Math.max(0, REGULAR_SLOTS(day, shiftId) -
      (extShiftsArg||[]).reduce((n, ext) => {
        const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
        if (!pair) return n;
        const idx = pair.covers.indexOf(shiftId);
        return n + ((idx === 0 ? !!ext.empAId : idx === 1 ? !!ext.empBId : false) ? 1 : 0);
      }, 0));

  const slotAssigned = (asgn, day, shiftId) => {
    const s = new Set(asgn.map(a => a.employeeId));
    (extShiftsArg||[]).forEach(ext => {
      const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
      if (!pair) return;
      const idx = pair.covers.indexOf(shiftId);
      if (idx === 0 && ext.empAId) s.add(ext.empAId);
      if (idx === 1 && ext.empBId) s.add(ext.empBId);
    });
    return s;
  };

  const pickPosition = (emp, asgn, day, shiftId) => {
    const ap = getAvailPos(day, shiftId).filter(p => canFillPos(emp, p, day));
    if (!ap.length) return null;
    const nowHasScale   = slotHasRole(asgn, sourceEmps, "Scale");
    const nowHasMedical = slotHasRole(asgn, sourceEmps, "Medical");
    if (!nowHasScale   && ap.includes("Scale"))   return "Scale";
    if (!nowHasMedical && ap.includes("Medical")) return "Medical";
    if (ap.includes("Guard")) return "Guard";
    return ap[0];
  };

  const weekendCapHit = (emp, day) => {
    if (!["Saturday","Sunday"].includes(day)) return false;
    if (emp.maxWeekendDays == null) return false;
    const worked = [...(dayWorked[emp.id]||new Set())]
      .filter(d => ["Saturday","Sunday"].includes(d)).length;
    return worked >= emp.maxWeekendDays;
  };

  // doTrack was removed — Steps 4/5/5b push assignments directly for clarity.

  // ── Step 4: FT makeup pass (planned-shift only, caps at 40h) ────────────
  // Find FT employees still under 40h and insert them into open slots on their
  // PLANNED shift only — no shift hopping.  Stops each employee exactly at 40h.
  const ftShort = () => sourceEmps.filter(e =>
    e.employmentType === "full-time" && (hourTracker[e.id] || 0) < FT_MIN_HOURS
  );
  for (let sweep = 0; sweep < 2 && ftShort().length > 0; sweep++) {
    for (const day of DAYS) {
      for (const shift of SHIFTS) {
        const key  = cellKey(day, shift.id);
        const asgn = ns[key] || [];
        const cap      = slotCap(day, shift.id);
        const regCount = asgn.length;
        if (regCount >= cap) continue;
        const assigned = slotAssigned(asgn, day, shift.id);

        // Check if ext shifts already provide Scale/Medical for this slot (R3 fix)
        const step4ActiveExts = (extShiftsArg||[]).filter(e => extCovers(e, day, shift.id));
        const step4ExtScale   = step4ActiveExts.some(e => (e.roles||[]).includes("Scale"));
        const step4ExtMedical = step4ActiveExts.some(e => (e.roles||[]).includes("Medical"));

        // Only consider FT employees whose PLANNED shift matches this slot
        const candidates = ftShort()
          .filter(e => {
            // Shift gate: only fill on the employee's planned shift
            const empPlan = plan[e.id];
            if (empPlan && empPlan.shiftId !== shift.id) return false;
            // Supervisor never fills regular slots via makeup — they have their own slot path
            // Also respect hard blocks
            if (assigned.has(e.id)) return false;
            if ((e.unavailableDays||[]).includes(day)) return false;
            if (hasTimeOff(empTimeOffDays, e.id, day, shift.id)) return false;
            if ((e.blockedShifts||[]).includes(shift.id)) return false;
            if (e.requiredShift && e.requiredShift !== shift.id) return false;
            if (isRestViolation(e, calcRestGap(e.id, ns, day, shift.id), minRest)) return false;
            if (calcConsecutiveHours(e.id, ns, day, shift.id) > empMaxConsec(e)) return false;
            if (shift.id === "third" && calcConsecutiveNights(e.id, ns, day, shift.id) >= maxNights) return false;
            if (!getAvailPos(day, shift.id).some(p => e.qualifications.includes(p))) return false;
            return true;
          })
          .sort((a, b) => (hourTracker[a.id]||0) - (hourTracker[b.id]||0));

        for (const emp of candidates) {
          if (asgn.length >= cap) break;
          // Cap at exactly 40h — don't overfill FT beyond minimum
          if ((hourTracker[emp.id] || 0) >= FT_MIN_HOURS) continue;
          // Use ext-aware position picking: don't duplicate a role the ext shift already covers
          const ap = getAvailPos(day, shift.id).filter(p => canFillPos(emp, p, day));
          if (!ap.length) continue;
          const nowHasScale   = slotHasRole(asgn, sourceEmps, "Scale")   || step4ExtScale;
          const nowHasMedical = slotHasRole(asgn, sourceEmps, "Medical") || step4ExtMedical;
          let pos;
          if      (!nowHasScale   && ap.includes("Scale"))   pos = "Scale";
          else if (!nowHasMedical && ap.includes("Medical")) pos = "Medical";
          else if (ap.includes("Guard"))                     pos = "Guard";
          else pos = ap[0];
          if (!pos) continue;
          // Guard preference: prefer guard-only employees for Guard slots,
          // but allow specialists to fill Guard if needed to reach 40h (Rule 1 must win).
          // Only skip specialist for Guard if a guard-only employee is actually available.
          const guardOnlyAvailForMakeup = pos === "Guard" && !isGuardOnly(emp) && candidates.some(c =>
            c.id !== emp.id && isGuardOnly(c) && (hourTracker[c.id]||0) < FT_MIN_HOURS
          );
          if (guardOnlyAvailForMakeup) continue;
          if (weekendCapHit(emp, day)) continue;
          hourTracker[emp.id]  = (hourTracker[emp.id]  || 0) + SHIFT_HOURS;
          shiftsWorked[emp.id] = (shiftsWorked[emp.id] || 0) + 1;
          dayWorked[emp.id].add(day);
          asgn.push({ employeeId: emp.id, position: pos });
          assigned.add(emp.id);
        }
        ns[key] = asgn;
      }
    }
  }

  // ── Step 5: PT fill pass ───────────────────────────────────────────────────
  // After all FT employees are at 40h, fill remaining open slots with PT employees
  // on their preferred shift. PT with no FT peer under 40h get no penalty.
  for (const day of DAYS) {
    for (const shift of SHIFTS) {
      const key  = cellKey(day, shift.id);
      const asgn = ns[key] || [];
      const cap      = slotCap(day, shift.id);
      if (asgn.length >= cap) continue;
      const assigned = slotAssigned(asgn, day, shift.id);

      const ptCandidates = sourceEmps
        .filter(e => {
          if (e.employmentType !== "part-time") return false;
          if (assigned.has(e.id)) return false;
          // PT preferred shift gate — only fill on their preferred shift(s)
          const prefs = e.preferredShifts || [];
          if (prefs.length > 0 && !prefs.includes(shift.id)) return false;
          if ((e.unavailableDays||[]).includes(day)) return false;
          if (hasTimeOff(empTimeOffDays, e.id, day, shift.id)) return false;
          if ((e.blockedShifts||[]).includes(shift.id)) return false;
          if (e.requiredShift && e.requiredShift !== shift.id) return false;
          if (isRestViolation(e, calcRestGap(e.id, ns, day, shift.id), minRest)) return false;
          if (calcConsecutiveHours(e.id, ns, day, shift.id) > empMaxConsec(e)) return false;
          if (shift.id === "third" && calcConsecutiveNights(e.id, ns, day, shift.id) >= maxNights) return false;
          if (!getAvailPos(day, shift.id).some(p => e.qualifications.includes(p))) return false;
          if (e.maxShiftsPerWeek !== null && (shiftsWorked[e.id]||0) >= e.maxShiftsPerWeek) return false;
          return true;
        })
        .sort((a, b) => (hourTracker[a.id]||0) - (hourTracker[b.id]||0));

      for (const emp of ptCandidates) {
        if (asgn.length >= cap) break;
        const pos = pickPosition(emp, asgn, day, shift.id);
        if (!pos) continue;
        if (pos === "Guard" && !isGuardOnly(emp)) continue;
        if (weekendCapHit(emp, day)) continue;
        hourTracker[emp.id]  = (hourTracker[emp.id]  || 0) + SHIFT_HOURS;
        shiftsWorked[emp.id] = (shiftsWorked[emp.id] || 0) + 1;
        dayWorked[emp.id].add(day);
        asgn.push({ employeeId: emp.id, position: pos });
        assigned.add(emp.id);
      }
      ns[key] = asgn;
    }
  }

  // ── Step 5b: On-call fill pass ────────────────────────────────────────────
  // Last resort — only fires on slots still open after FT + PT passes.
  // On-call assignments are flagged with isOnCall:true for visual distinction.
  for (const day of DAYS) {
    for (const shift of SHIFTS) {
      const key  = cellKey(day, shift.id);
      const asgn = ns[key] || [];
      const cap      = slotCap(day, shift.id);
      if (asgn.length >= cap) continue;
      const assigned = slotAssigned(asgn, day, shift.id);

      const ocCandidates = sourceEmps
        .filter(e => {
          if (e.employmentType !== "on-call") return false;
          if (assigned.has(e.id)) return false;
          const prefs = e.preferredShifts || [];
          if (prefs.length > 0 && !prefs.includes(shift.id)) return false;
          if ((e.unavailableDays||[]).includes(day)) return false;
          if (hasTimeOff(empTimeOffDays, e.id, day, shift.id)) return false;
          if ((e.blockedShifts||[]).includes(shift.id)) return false;
          if (e.requiredShift && e.requiredShift !== shift.id) return false;
          if (isRestViolation(e, calcRestGap(e.id, ns, day, shift.id), minRest)) return false;
          if (calcConsecutiveHours(e.id, ns, day, shift.id) > empMaxConsec(e)) return false;
          if (shift.id === "third" && calcConsecutiveNights(e.id, ns, day, shift.id) >= maxNights) return false;
          if (!getAvailPos(day, shift.id).some(p => e.qualifications.includes(p))) return false;
          if (e.maxShiftsPerWeek !== null && (shiftsWorked[e.id]||0) >= e.maxShiftsPerWeek) return false;
          return true;
        })
        .sort((a, b) => (hourTracker[a.id]||0) - (hourTracker[b.id]||0));

      for (const emp of ocCandidates) {
        if (asgn.length >= cap) break;
        const pos = pickPosition(emp, asgn, day, shift.id);
        if (!pos) continue;
        if (pos === "Guard" && !isGuardOnly(emp)) continue;
        if (weekendCapHit(emp, day)) continue;
        hourTracker[emp.id]  = (hourTracker[emp.id]  || 0) + SHIFT_HOURS;
        shiftsWorked[emp.id] = (shiftsWorked[emp.id] || 0) + 1;
        dayWorked[emp.id].add(day);
        asgn.push({ employeeId: emp.id, position: pos, isOnCall: true });
        assigned.add(emp.id);
      }
      ns[key] = asgn;
    }
  }

  // Capture each FT employee's blockStart + shiftId for week-to-week continuity.
  // Only FT employees get rotation-tracked; PT and on-call are fill-as-available.
  const usedPatterns = {};
  Object.keys(plan).forEach(empId => {
    const p    = plan[empId];
    const emp  = sourceEmps.find(e => e.id === empId);
    if (!emp || emp.employmentType !== "full-time") return;
    // Count trailing consecutive days worked at end of this week for next week's cross-boundary check
    let trailingDays = 0;
    for (let i = DAYS.length - 1; i >= 0; i--) {
      const worked = SHIFTS.some(s => (ns[cellKey(DAYS[i], s.id)]||[]).some(a => a.employeeId === empId));
      if (worked) trailingDays++; else break;
    }
    usedPatterns[empId] = { blockStart: p.blockStart ?? 0, shiftId: p.shiftId, trailingDays };
  });
  // ── Step 6: Violation minimizer pass ────────────────────────────────────
  const { fixCount } = violationMinimizerPass(
    ns, sourceEmps, cfg, empTimeOffDays, extShiftsArg, plan, hourTracker, shiftsWorked
  );
  if (fixCount > 0) console.log("[AutoFill] Violation minimizer fixed " + fixCount + " slot(s)");

  return { schedule: ns, hourTracker, usedPatterns };
}

// ── Business Rule Enforcement (Hard Gates) ───────────────────────────────────
// Rules:
//   1. All FT employees must have >= 40 hours
//   2. Every shift must have >= 3 people (NON-NEGOTIABLE)
//   3. Every shift must have at least 1 Medical, 1 Scale, 1 other
//
// Returns { violations: [], blocked: bool }
// violations: array of { rule, level:"error"|"warning", msg }
// blocked: true if ANY error-level violation exists (prevents save/publish)
function enforceBusinessRules(schedule, employees, extShifts) {
  const violations = [];

  // ── Rule 1: FT employees >= 40h ─────────────────────────────────────────
  employees.forEach(emp => {
    if (emp.employmentType !== "full-time") return;
    const hours = calcHours(emp.id, schedule, extShifts || []);
    if (hours < FT_MIN_HOURS) {
      violations.push({
        rule: 1,
        level: "error",
        msg: `Rule 1 — ${emp.name} has only ${hours}h scheduled (minimum 40h required for full-time).`,
      });
    }
  });

  // ── Rules 2 & 3: Per-shift checks ────────────────────────────────────────
  DAYS.forEach(day => {
    SHIFTS.forEach(shift => {
      const key  = cellKey(day, shift.id);
      const asgn = schedule[key] || [];

      // Ext shift bodies that cover this slot
      const cellExt = (extShifts || []).filter(e => extCovers(e, day, shift.id));
      const extBodyCount = cellExt.reduce((n, ext) => {
        const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
        if (!pair) return n;
        const idx = pair.covers.indexOf(shift.id);
        const hasBody = idx === 0 ? !!ext.empAId : idx === 1 ? !!ext.empBId : false;
        return n + (hasBody ? 1 : 0);
      }, 0);
      const totalBodies = asgn.length + extBodyCount;

      const dayLabel  = day;
      const shiftLabel = shift.label + " (" + shift.time + ")";

      // Rule 2: minimum 3 people
      if (totalBodies < 3) {
        violations.push({
          rule: 2,
          level: "error",
          msg: `Rule 2 — ${dayLabel} ${shiftLabel}: only ${totalBodies} person${totalBodies===1?"":"s"} scheduled (minimum 3 required).`,
        });
      }

      // Rule 3: must have Medical, Scale, and at least 1 other
      const extHasScale   = cellExt.some(e => (e.roles||[]).includes("Scale"));
      const extHasMedical = cellExt.some(e => (e.roles||[]).includes("Medical"));
      const hasScale   = slotHasRole(asgn, employees, "Scale")   || extHasScale;
      const hasMedical = slotHasRole(asgn, employees, "Medical") || extHasMedical;

      if (!hasScale) {
        violations.push({
          rule: 3,
          level: "error",
          msg: `Rule 3 — ${dayLabel} ${shiftLabel}: no Scale assigned.`,
        });
      }
      if (!hasMedical) {
        violations.push({
          rule: 3,
          level: "error",
          msg: `Rule 3 — ${dayLabel} ${shiftLabel}: no Medical assigned.`,
        });
      }
    });
  });

  const blocked = violations.some(v => v.level === "error");
  return { violations, blocked };
}

// ── Excel Export ──────────────────────────────────────────────────────────────
// ── Excel Export — styled HTML workbook (no external CDN needed) ─────────────
// Excel/LibreOffice opens .xls HTML files and respects inline styles fully.
// ── Excel Preview Modal ───────────────────────────────────────────────────────
// Renders an HTML table that mirrors the Excel layout: same colors, same rows,
// same shift labels. Download button triggers the actual exportToExcel call.
// ── Violation Minimizer (Step 6) ─────────────────────────────────────────────
// After main autofill, sweep for hard violations and attempt targeted swaps.
// Violations by severity: unavailable day (100), time-off day (95),
// blocked shift (90), required-shift mismatch (80), FT shift-lock (70).
// Runs up to 3 sweeps or until no more swappable violations remain.
function violationMinimizerPass(ns, sourceEmps, cfg, empTimeOffDays, extShiftsArg, plan, hourTracker, shiftsWorked) {
  const maxNights = cfg?.maxConsecutiveNights ?? MAX_CONSECUTIVE_NIGHTS;
  const minRest   = cfg?.minRestHours ?? MIN_REST_HOURS;
  const MAX_SWEEPS = 3;
  const isFT  = (e) => e.employmentType === "full-time";
  const isSup = (e) => (e.qualifications||[]).includes("Supervisor");

  const isClean = (emp, day, shiftId, sched) => {
    if ((emp.unavailableDays||[]).includes(day)) return false;
    if (hasTimeOff(empTimeOffDays, emp.id, day, shiftId)) return false;
    if ((emp.blockedShifts||[]).includes(shiftId)) return false;
    if (emp.requiredShift && emp.requiredShift !== shiftId) return false;
    if (isFT(emp) && !isSup(emp)) {
      const p = plan[emp.id];
      if (p && p.shiftId !== shiftId) return false;
    }
    if (isRestViolation(emp, calcRestGap(emp.id, sched, day, shiftId), minRest)) return false;
    if (calcConsecutiveHours(emp.id, sched, day, shiftId) > empMaxConsec(emp)) return false;
    if (shiftId === "third" && calcConsecutiveNights(emp.id, sched, day, shiftId) >= maxNights) return false;
    return true;
  };

  const severity = (emp, day, shiftId) => {
    if ((emp.unavailableDays||[]).includes(day)) return 100;
    if (hasTimeOff(empTimeOffDays, emp.id, day, shiftId)) return 95;
    if ((emp.blockedShifts||[]).includes(shiftId)) return 90;
    if (emp.requiredShift && emp.requiredShift !== shiftId) return 80;
    if (isFT(emp) && !isSup(emp)) {
      const p = plan[emp.id];
      if (p && p.shiftId !== shiftId) return 70;
    }
    return 0;
  };

  let fixCount = 0;
  for (let sweep = 0; sweep < MAX_SWEEPS; sweep++) {
    let swapsThisSweep = 0;
    for (const day of DAYS) {
      for (const shift of SHIFTS) {
        const key  = cellKey(day, shift.id);
        const asgn = ns[key] || [];
        for (let ai = 0; ai < asgn.length; ai++) {
          const a   = asgn[ai];
          const emp = sourceEmps.find(e => e.id === a.employeeId);
          if (!emp || severity(emp, day, shift.id) === 0) continue;
          // Test snapshot with this employee removed from the slot
          const testSched = { ...ns, [key]: ns[key].filter(x => x.employeeId !== emp.id) };
          const candidates = sourceEmps.filter(cand => {
            if (cand.id === emp.id) return false;
            if (!canFillPos(cand, a.position, day)) return false;
            if (asgn.some(x => x.employeeId === cand.id)) return false;
            if ((extShiftsArg||[]).some(ext => {
              const pair = EXT_PAIRS.find(p => p.id === ext.pairId);
              if (!pair || !pair.covers.includes(shift.id)) return false;
              return ext.empAId === cand.id || ext.empBId === cand.id;
            })) return false;
            if (!isClean(cand, day, shift.id, testSched)) return false;
            if (isFT(cand) && (hourTracker[cand.id]||0) >= OT_RELIEF_THRESHOLD) return false;
            if (cand.employmentType === "on-call") return false; // never swap IN on-call during violation fix
            return true;
          });
          if (!candidates.length) continue;
          candidates.sort((ca, cb) => {
            const ha = hourTracker[ca.id]||0, hb = hourTracker[cb.id]||0;
            const au = isFT(ca) && ha < FT_MIN_HOURS, bu = isFT(cb) && hb < FT_MIN_HOURS;
            if (au && !bu) return -1; if (!au && bu) return 1;
            return ha - hb;
          });
          const winner = candidates[0];
          ns[key] = [...asgn.slice(0,ai), { employeeId: winner.id, position: a.position }, ...asgn.slice(ai+1)];
          hourTracker[emp.id]     = Math.max(0, (hourTracker[emp.id]||0) - SHIFT_HOURS);
          hourTracker[winner.id]  = (hourTracker[winner.id]||0) + SHIFT_HOURS;
          shiftsWorked[winner.id] = (shiftsWorked[winner.id]||0) + 1;
          swapsThisSweep++; fixCount++;
          break; // re-scan cell after swap
        }
      }
    }
    if (swapsThisSweep === 0) break;
  }
  return { ns, fixCount };
}

</script>

<script type="text/babel">
function ExcelPreviewModal({ employees, schedule, extShifts, weekStart, onDownload, onClose, previewMode }) {
  const t = useTheme();

  const CLR = {
    headerBg:"#4F6228", dayBg:"#76923C", rowBlue:"#B8CCE4", rowGray:"#C0C0C0",
    rowWhite:"#FFFFFF", shift1:"#DAEEF3", shift2:"#E4DFEC", shift3:"#D9D9D9",
    ptoGreen:"#92D050", splitYellow:"#FFFF00", splitOrange:"#FFC000",
    multiYellow:"#FFF2CC", separator:"#F2F2F2", footerYellow:"#FFFF00",
    white:"#FFFFFF", black:"#000000", darkGreen:"#375623",
    red:"#CC0000", orange:"#CC6600", lightText:"#E8F0D0",
  };

  const getShiftLabel = (emp, day) => {
    const result = [];
    for (const shift of SHIFTS) {
      const asgn = (schedule[cellKey(day, shift.id)] || []).find(a => a.employeeId === emp.id);
      if (asgn) result.push({ sid: shift.id, pos: asgn.position });
    }
    const extDay = (extShifts || []).filter(e => e.day === day);
    if (extDay.some(e => e.empAId === emp.id)) return { text:"6A-6P",  kind:"splitDay"   };
    if (extDay.some(e => e.empBId === emp.id)) return { text:"6P-6A",  kind:"splitNight" };
    if (!result.length) return (emp.unavailableDays||[]).includes(day)
      ? { text:"x", kind:"off" } : { text:"", kind:"empty" };
    if (result.length === 1 && result[0].pos === "PTO") return { text:"PTO", kind:"pto" };
    if (result.length === 2) {
      const nums = result.map(r=>({first:"1",second:"2",third:"3"}[r.sid])).join("+");
      return { text:nums, kind:"multi" };
    }
    const { sid, pos } = result[0];
    const num = {first:"1",second:"2",third:"3"}[sid];
    const suffix = pos==="Scale"?"-Scale":pos==="Medical"?"-Med":"";
    return { text:num+suffix, kind:sid };
  };

  const primaryShift = (emp) => {
    if (emp.requiredShift) return emp.requiredShift;
    if ((emp.preferredShifts||[]).length === 1) return emp.preferredShifts[0];
    const counts = {first:0,second:0,third:0};
    DAYS.forEach(day => SHIFTS.forEach(s => {
      if ((schedule[cellKey(day,s.id)]||[]).some(a=>a.employeeId===emp.id)) counts[s.id]++;
    }));
    return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]?.[0] || "first";
  };

  const rowBgFor = (emp) => {
    if (primaryShift(emp)==="first") return CLR.rowBlue;
    if (primaryShift(emp) === "third") return CLR.rowGray;
    return CLR.rowWhite;
  };

  const kindStyle = (kind, rowBg) => {
    const bg = {first:CLR.shift1,second:CLR.shift2,third:CLR.shift3,
      splitDay:CLR.splitYellow,splitNight:CLR.splitOrange,
      multi:CLR.multiYellow,pto:CLR.ptoGreen,off:rowBg,empty:rowBg}[kind]||rowBg;
    const color = {splitDay:CLR.red,splitNight:CLR.red,pto:CLR.darkGreen}[kind]||CLR.black;
    const fontWeight = ["splitDay","splitNight","multi"].includes(kind) ? "bold" : "normal";
    return { background:bg, color, fontWeight };
  };

  const shiftRank = {first:0,second:1,third:2};
  const sortedEmps = [...employees].sort((a,b) => {
    const aS = a.qualifications.includes("Supervisor_REMOVED") ? -1 : shiftRank[primaryShift(a)]||0;
    const bS = b.qualifications.includes("Supervisor_REMOVED") ? -1 : shiftRank[primaryShift(b)]||0;
    return aS - bS;
  });

  const [wy,wm,wd] = (weekStart||"2024-01-07").split("-").map(Number);
  const sun = new Date(wy,wm-1,wd,12);
  const dayDates = DAYS.map((_,i)=>{ const d=new Date(sun); d.setDate(sun.getDate()+i); return d; });
  const fmtDate = (d) => `${d.getMonth()+1}/${String(d.getDate()).padStart(2,"0")}`;
  const weekLabel = `${fmtDate(dayDates[0])} \u2013 ${fmtDate(dayDates[6])}`;
  const today = new Date();

  const thStyle = (extra={}) => ({
    background:CLR.headerBg, color:CLR.white, fontWeight:"bold",
    padding:"5px 8px", fontSize:11, border:"1px solid #BFBFBF",
    textAlign:"center", whiteSpace:"nowrap", ...extra,
  });
  const dayThStyle = { background:CLR.dayBg, color:CLR.white, fontWeight:"bold",
    padding:"5px 8px", fontSize:11, border:"1px solid #BFBFBF", textAlign:"center" };
  const tdStyle = (extra={}) => ({
    padding:"4px 6px", fontSize:11, border:"1px solid #BFBFBF",
    textAlign:"center", whiteSpace:"nowrap", ...extra,
  });

  let prevGroup = null;
  const rows = [];
  for (const emp of sortedEmps) {
    const curGroup = primaryShift(emp);
    if (prevGroup !== null && curGroup !== prevGroup) {
      rows.push(
        <tr key={"sep-"+emp.id}>
          {Array(9).fill(0).map((_,i)=>(
            <td key={i} style={{background:CLR.separator,padding:2,border:"1px solid #BFBFBF",height:4}}/>
          ))}
        </tr>
      );
    }
    prevGroup = curGroup;
    const hrs = calcHours(emp.id, schedule, extShifts);
    const isFT = emp.employmentType === "full-time";
    const rowBg = rowBgFor(emp);
    const hrsColor = isFT && hrs < 40 ? CLR.red : hrs > 40 ? CLR.orange : CLR.black;
    const hrsBold = (isFT && hrs < 40) || hrs > 40;
    rows.push(
      <tr key={emp.id}>
        <td style={tdStyle({background:rowBg,fontWeight:"bold",textAlign:"left",minWidth:110,color:"#000000"})}>{emp.name}</td>
        <td style={tdStyle({background:rowBg,color:hrsColor,fontWeight:hrsBold?"bold":"normal",minWidth:36})}>{hrs}</td>
        {DAYS.map(day => {
          const { text, kind } = getShiftLabel(emp, day);
          const cs = kindStyle(kind, rowBg);
          return <td key={day} style={tdStyle({...cs,minWidth:58})}>{text || "\u00a0"}</td>;
        })}
      </tr>
    );
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",zIndex:9999,
      display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:t.bg,border:"1px solid "+t.border,borderRadius:10,
        display:"flex",flexDirection:"column",maxWidth:"96vw",maxHeight:"92vh",
        boxShadow:"0 8px 40px rgba(0,0,0,.5)",overflow:"hidden"}}>

        {}
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 20px",
          background:t.surface,borderBottom:"1px solid "+t.border,flexShrink:0}}>
          <span style={{fontSize:13,fontWeight:700,color:t.text,flex:1}}>

                  padding:"4px 8px",fontSize:10,textAlign:"right",color:CLR.black}}>

                </td>

          <div style={{marginTop:24,fontSize:11,fontWeight:700,color:t.textDim,
            letterSpacing:".06em",marginBottom:8}}>EMPLOYEE HOURS SHEET</div>
          <table style={{borderCollapse:"collapse",fontFamily:"Arial,sans-serif",fontSize:11,minWidth:500}}>
            <thead>
              <tr>
                {["Employee","Type","Qualifications","Shifts","Hours","Status","Days Off"].map((h,i)=>(
                  <th key={h} style={thStyle({textAlign:i===0?"left":"center",
                    minWidth:i===0?120:i===2?140:i===6?120:60})}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {sortedEmps.map((emp,ri)=>{
                const hrs = calcHours(emp.id, schedule, extShifts);
                const isFT = emp.employmentType==="full-time";
                const bg = ri%2===0?"#FFFFFF":"#DCE6F1";
                const status = hrs>40?`OT +${hrs-40}h`:(isFT&&hrs<40)?`! ${hrs}/40h`:`${hrs}h`;
                const hFg = isFT&&hrs<40?CLR.red:hrs>40?CLR.orange:"#1A1A1A";
                const statusBold = hrs>40||(isFT&&hrs<40);
                return (
                  <tr key={emp.id}>
                    <td style={tdStyle({background:bg,textAlign:"left",fontWeight:"bold",color:"#1A1A1A"})}>{emp.name}</td>
                    <td style={tdStyle({background:bg,color:"#1A1A1A"})}>{isFT?"Full-Time":"Part-Time"}</td>
                    <td style={tdStyle({background:bg,textAlign:"left",color:"#1A1A1A"})}>{emp.qualifications.join(", ")}</td>
                    <td style={tdStyle({background:bg,color:"#1A1A1A"})}>{hrs/SHIFT_HOURS}</td>
                    <td style={tdStyle({background:bg,color:hFg,fontWeight:"bold"})}>{hrs}</td>
                    <td style={tdStyle({background:bg,color:hFg,fontWeight:statusBold?"bold":"normal"})}>{status}</td>
                    <td style={tdStyle({background:bg,textAlign:"left",color:"#1A1A1A"})}>{(emp.unavailableDays||[]).join(", ")||"\u2014"}</td>
                  </tr>
                );
              })}
              <tr>
                {["TOTAL","","",
                  sortedEmps.reduce((s,e)=>s+calcHours(e.id,schedule,extShifts),0)/SHIFT_HOURS,
                  sortedEmps.reduce((s,e)=>s+calcHours(e.id,schedule,extShifts),0),
                  "",""].map((v,i)=>(
                  <td key={i} style={tdStyle({background:CLR.headerBg,color:CLR.white,fontWeight:"bold"})}>{v}</td>
                ))}
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

async function exportToExcel(employees, schedule, extShifts, weekStart) {
  const getName = (id) => employees.find(e => e.id === id)?.name || "?";

  const CLR = {
    headerBg:    "4F6228",
    dayBg:       "76923C",
    rowBlue:     "B8CCE4",
    rowGray:     "C0C0C0",
    rowWhite:    "FFFFFF",
    shift1:      "DAEEF3",
    shift2:      "E4DFEC",
    shift3:      "D9D9D9",
    ptoGreen:    "92D050",
    splitYellow: "FFFF00",
    splitOrange: "FFC000",
    multiYellow: "FFF2CC",
    separator:   "F2F2F2",
    footerYellow:"FFFF00",
    border:      "BFBFBF",
    white:       "FFFFFF",
    black:       "000000",
    darkGreen:   "375623",
    red:         "CC0000",
    orange:      "CC6600",
    lightText:   "E8F0D0",
    subText:     "4F4F4F",
  };

  const getShiftLabel = (emp, day) => {
    const result = [];
    for (const shift of SHIFTS) {
      const asgn = (schedule[cellKey(day, shift.id)] || []).find(a => a.employeeId === emp.id);
      if (asgn) result.push({ sid: shift.id, pos: asgn.position });
    }
    const extDay = (extShifts || []).filter(e => e.day === day);
    if (extDay.some(e => e.empAId === emp.id)) return { text:"6A-6P",  kind:"splitDay"   };
    if (extDay.some(e => e.empBId === emp.id)) return { text:"6P-6A",  kind:"splitNight" };
    if (!result.length) {
      return (emp.unavailableDays||[]).includes(day)
        ? { text:"x", kind:"off" } : { text:"", kind:"empty" };
    }
    if (result.length === 1 && result[0].pos === "PTO") return { text:"PTO", kind:"pto" };
    if (result.length === 1 && result[0].pos === "Off") return { text:"Off", kind:"pto" };
    if (result.length === 2) {
      const nums = result.map(r => ({ first:"1",second:"2",third:"3" }[r.sid])).join("+");
      return { text:nums, kind:"multi" };
    }
    const { sid, pos } = result[0];
    const num = { first:"1", second:"2", third:"3" }[sid];
    const suffix = pos==="Scale"?"-Scale":pos==="Medical"?"-Med":"";
    return { text: num+suffix, kind: sid };
  };

  const kindBg   = (kind, rowBg) => ({ first:CLR.shift1, second:CLR.shift2, third:CLR.shift3,
    splitDay:CLR.splitYellow, splitNight:CLR.splitOrange, multi:CLR.multiYellow,
    pto:CLR.ptoGreen, off:rowBg, empty:rowBg }[kind] || rowBg);
  const kindFg   = (kind) => ({ splitDay:CLR.red, splitNight:CLR.red, pto:CLR.darkGreen }[kind] || CLR.black);
  const kindBold = (kind) => ["splitDay","splitNight","multi"].includes(kind);

  const primaryShift = (emp) => {
    if (emp.requiredShift) return emp.requiredShift;
    if ((emp.preferredShifts||[]).length === 1) return emp.preferredShifts[0];
    const counts = { first:0, second:0, third:0 };
    DAYS.forEach(day => SHIFTS.forEach(s => {
      if ((schedule[cellKey(day,s.id)]||[]).some(a=>a.employeeId===emp.id)) counts[s.id]++;
    }));
    return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]?.[0] || "first";
  };
  const shiftRank = { first:0, second:1, third:2 };
  const sortedEmps = [...employees].sort((a,b) => {
    const aS = a.qualifications.includes("Supervisor_REMOVED") ? -1 : shiftRank[primaryShift(a)] || 0;
    const bS = b.qualifications.includes("Supervisor_REMOVED") ? -1 : shiftRank[primaryShift(b)] || 0;
    return aS - bS;
  });
  const rowBgFor = (emp) => {
    if (primaryShift(emp)==="first") return CLR.rowBlue;
    if (primaryShift(emp) === "third") return CLR.rowGray;
    return CLR.rowWhite;
  };

  const weekStartDate = weekStart ? new Date(weekStart + "T12:00:00") : (() => {
    const d = new Date(); d.setDate(d.getDate() - d.getDay()); return d;
  })();
  const dayDates = DAYS.map((_, i) => {
    const d = new Date(weekStartDate); d.setDate(weekStartDate.getDate() + i); return d;
  });
  const fmtDate = (d) => `${d.getMonth()+1}/${String(d.getDate()).padStart(2,"0")}`;
  const weekLabel = `${fmtDate(dayDates[0])} – ${fmtDate(dayDates[6])}`;
  const today = new Date();

  const styles = {};
  let styleIdSeq = 0;
  const getStyleId = (bg, fg="000000", bold=false, align="Center", vAlign="Center", wrapText=false, fontSize=10, italic=false) => {
    const key = `${bg}|${fg}|${bold}|${align}|${vAlign}|${wrapText}|${fontSize}|${italic}`;
    if (!styles[key]) {
      styles[key] = { id: ++styleIdSeq, bg, fg, bold, align, vAlign, wrapText, fontSize, italic };
    }
    return styles[key].id;
  };

  const cell = (val, styleId, opts={}) => {
    const type = opts.type || "String";
    const merge = opts.merge ? ` ss:MergeAcross="${opts.merge}"` : "";
    const height = opts.height ? ` ss:Height="${opts.height}"` : "";
    const safeVal = String(val ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    return `<Cell ss:StyleID="s${styleId}"${merge}><Data ss:Type="${type}">${safeVal}</Data></Cell>`;
  };

  const emptyCell = (styleId, count=1) =>
    Array(count).fill(`<Cell ss:StyleID="s${styleId}"><Data ss:Type="String"></Data></Cell>`).join("");

  const S = {
    title:     () => getStyleId(CLR.headerBg, CLR.white, true,  "Center", "Center", false, 13),
    dayHdr:    () => getStyleId(CLR.dayBg,    CLR.white, true,  "Center", "Center", true,  10),
    dayHdrSub: () => getStyleId(CLR.dayBg,    CLR.lightText, false, "Center", "Center", false, 8),
    colHdr:    () => getStyleId(CLR.headerBg, CLR.white, true,  "Left",   "Center", false, 10),
    colHdrC:   () => getStyleId(CLR.headerBg, CLR.white, true,  "Center", "Center", false, 10),
    empName:   (bg) => getStyleId(bg, CLR.black, true,  "Left",   "Center", false, 10),
    empHrs:    (bg, fg) => getStyleId(bg, fg,       true,  "Center", "Center", false, 10),
    empHrsOk:  (bg) => getStyleId(bg, CLR.black,    false, "Center", "Center", false, 10),
    shiftCell: (bg, fg, bold) => getStyleId(bg, fg, bold, "Center", "Center", false, 10),
    sep:       () => getStyleId(CLR.separator, CLR.separator, false, "Center", "Center", false, 6),
    footer:    () => getStyleId(CLR.footerYellow, CLR.darkGreen, true, "Center", "Center", true, 10),
    footerDate:() => getStyleId(CLR.splitYellow,  CLR.black,     false,"Right",  "Center", false, 9),
    footerBlank:()=> getStyleId(CLR.white, CLR.white, false, "Center","Center", false, 10),
    s2Hdr:     () => getStyleId(CLR.headerBg, CLR.white, true,  "Center", "Center", false, 10),
    s2HdrL:    () => getStyleId(CLR.headerBg, CLR.white, true,  "Left",   "Center", false, 10),
    s2Name:    (bg) => getStyleId(bg, CLR.black, true,  "Left",   "Center", false, 10),
    s2Cell:    (bg, fg="000000", bold=false) => getStyleId(bg, fg, bold, "Left", "Center", false, 10),
    s2CellC:   (bg, fg="000000", bold=false) => getStyleId(bg, fg, bold, "Center", "Center", false, 10),
    s2Total:   () => getStyleId(CLR.headerBg, CLR.white, true, "Center", "Center", false, 10),
  };

  const COLS = 9;
  let r1 = "";

  r1 += `<Row ss:Height="22">`;
  r1 += cell(`Shift Schedule — Week of ${weekLabel}`, S.title(), { merge: COLS-1 });
  r1 += `</Row>`;

  r1 += `<Row ss:Height="30">`;
  r1 += cell("Employee", S.colHdr(),  { });
  r1 += cell("Hrs",      S.colHdrC(), { });
  DAYS.forEach((day, i) => {
    const dd = fmtDate(dayDates[i]);
    const hdrStyleId = getStyleId(CLR.dayBg, CLR.white, true, "Center", "Center", true, 10);
    r1 += cell(`${day.substring(0,3).toUpperCase()}\n${dd}`, hdrStyleId);
  });
  r1 += `</Row>`;

  let prevGroup = null;
  for (const emp of sortedEmps) {
    const hours   = calcHours(emp.id, schedule, extShifts);
    const isFT    = emp.employmentType === "full-time";
    const rowBg   = rowBgFor(emp);
    const curGroup = primaryShift(emp);

    if (prevGroup !== null && curGroup !== prevGroup) {
      r1 += `<Row ss:Height="4">`;
      r1 += Array(COLS).fill(`<Cell ss:StyleID="s${S.sep()}"><Data ss:Type="String"></Data></Cell>`).join("");
      r1 += `</Row>`;
    }
    prevGroup = curGroup;

    const hrsColor = isFT && hours < 40 ? CLR.red : hours > 40 ? CLR.orange : CLR.black;
    const hrsBold  = (isFT && hours < 40) || hours > 40;

    r1 += `<Row ss:Height="16">`;
    r1 += cell(emp.name, S.empName(rowBg));
    r1 += cell(hours,    getStyleId(rowBg, hrsColor, hrsBold, "Center", "Center", false, 10), { type:"Number" });
    DAYS.forEach(day => {
      const { text, kind } = getShiftLabel(emp, day);
      const bg   = kindBg(kind, rowBg);
      const fg   = kindFg(kind);
      const bold = kindBold(kind);
      r1 += cell(text, S.shiftCell(bg, fg, bold));
    });
    r1 += `</Row>`;
  }

  r1 += `<Row ss:Height="18">`;
  r1 += cell("Any changes to this schedule must be approved by the Supervisor in advance*",
             S.footer(), { merge: COLS-1 });
  r1 += `</Row>`;
  r1 += `<Row ss:Height="14">`;
  r1 += emptyCell(S.footerBlank(), 6);
  r1 += cell(today.toLocaleDateString(), S.footerDate(), { merge: 2 });
  r1 += `</Row>`;

  let r2 = "";
  const hdrCols2 = ["Employee","Type","Qualifications","Shifts","Hours","Status","Days Off"];

  r2 += `<Row ss:Height="20">`;
  r2 += cell(hdrCols2[0], S.s2HdrL());
  hdrCols2.slice(1).forEach(h => { r2 += cell(h, S.s2Hdr()); });
  r2 += `</Row>`;

  sortedEmps.forEach((emp, ri) => {
    const hrs   = calcHours(emp.id, schedule, extShifts);
    const isFT  = emp.employmentType === "full-time";
    const bg    = ri % 2 === 0 ? "FFFFFF" : "DCE6F1";
    const status = hrs > 40 ? `OT +${hrs-40}h` : (isFT && hrs < 40) ? `! ${hrs}/40h` : `${hrs}h`;
    const hFg   = isFT && hrs < 40 ? CLR.red : hrs > 40 ? CLR.orange : "1F1F1F";
    const statusFg = hFg;
    const statusBold = hrs > 40 || (isFT && hrs < 40);
    r2 += `<Row ss:Height="18">`;
    r2 += cell(emp.name,                             getStyleId(bg, "1A1A1A", true,  "Left",   "Center", false, 10));
    r2 += cell(isFT ? "Full-Time" : emp.employmentType === "on-call" ? "On-Call" : "Part-Time", getStyleId(bg, "1A1A1A", false, "Left",   "Center", false, 10));
    r2 += cell(emp.qualifications.join(", "),         getStyleId(bg, "1A1A1A", false, "Left",   "Center", false, 10));
    r2 += cell(hrs / SHIFT_HOURS,                    getStyleId(bg, "1A1A1A", false, "Center", "Center", false, 10), { type:"Number" });
    r2 += cell(hrs,                                  getStyleId(bg, hFg,      true,  "Center", "Center", false, 10), { type:"Number" });
    r2 += cell(status,                               getStyleId(bg, statusFg, statusBold, "Center", "Center", false, 10));
    r2 += cell((emp.unavailableDays||[]).join(", ")||"—", getStyleId(bg, "1A1A1A", false, "Left", "Center", false, 10));
    r2 += `</Row>`;
  });

  const totalHrs = sortedEmps.reduce((s,e) => s + calcHours(e.id, schedule, extShifts), 0);
  r2 += `<Row ss:Height="18">`;
  ["TOTAL","","",totalHrs/SHIFT_HOURS,totalHrs,"",""].forEach((v,i) => {
    r2 += cell(v, S.s2Total(), i===3||i===4 ? { type:"Number" } : {});
  });
  r2 += `</Row>`;

  const stylesXml = Object.values(styles).map(st => `
  <Style ss:ID="s${st.id}">
    <Alignment ss:Horizontal="${st.align}" ss:Vertical="${st.vAlign}"${st.wrapText?' ss:WrapText="1"':''} />
    <Borders>
      <Border ss:Position="Bottom" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#BFBFBF"/>
      <Border ss:Position="Left"   ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#BFBFBF"/>
      <Border ss:Position="Right"  ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#BFBFBF"/>
      <Border ss:Position="Top"    ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#BFBFBF"/>
    </Borders>
    <Font ss:FontName="Arial" ss:Size="${st.fontSize}" ss:Color="#${st.fg}"${st.bold?' ss:Bold="1"':''}${st.italic?' ss:Italic="1"':''} />
    <Interior ss:Color="#${st.bg}" ss:Pattern="Solid"/>
  </Style>`).join("");

  const cols1 = `
  <Column ss:Width="110"/>
  <Column ss:Width="40"/>
  <Column ss:Width="62"/>
  <Column ss:Width="62"/>
  <Column ss:Width="62"/>
  <Column ss:Width="62"/>
  <Column ss:Width="62"/>
  <Column ss:Width="62"/>
  <Column ss:Width="62"/>`;

  const cols2 = `
  <Column ss:Width="130"/>
  <Column ss:Width="80"/>
  <Column ss:Width="170"/>
  <Column ss:Width="55"/>
  <Column ss:Width="55"/>
  <Column ss:Width="85"/>
  <Column ss:Width="145"/>`;

  const xml = `<?xml version="1.0" encoding="UTF-8"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
  xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet"
  xmlns:x="urn:schemas-microsoft-com:office:excel">
  <Styles>${stylesXml}
  </Styles>
  <Worksheet ss:Name="Weekly Schedule">
    <Table>${cols1}
      ${r1}
    </Table>
    <WorksheetOptions xmlns="urn:schemas-microsoft-com:office:excel">
      <FreezePanes/>
      <SplitHorizontal>2</SplitHorizontal>
      <TopRowBottomPane>2</TopRowBottomPane>
      <SplitVertical>1</SplitVertical>
      <LeftColumnRightPane>1</LeftColumnRightPane>
      <ActivePane>2</ActivePane>
    </WorksheetOptions>
  </Worksheet>
  <Worksheet ss:Name="Employee Hours">
    <Table>${cols2}
      ${r2}
    </Table>
  </Worksheet>
</Workbook>`;

  const blob     = new Blob([xml], { type: "application/vnd.ms-excel;charset=utf-8" });
  const fileName = `ShiftSchedule_${today.toISOString().slice(0,10)}.xls`;

  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: fileName,
        types: [{ description: "Excel Spreadsheet", accept: { "application/vnd.ms-excel": [".xls"] } }],
      });
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      return;
    } catch (err) {
      if (err.name === "AbortError") return;
    }
  }

  const url = URL.createObjectURL(blob);
  const a   = document.createElement("a");
  a.href    = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
