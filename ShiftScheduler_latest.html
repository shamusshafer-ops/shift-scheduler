        const visible = otReliefSuggestions.filter((_,i) => !dismissed.has(i) && !approvedSet.has(i));

        const overloadedEmps = employees.filter(e =>
          e.employmentType === "full-time" &&
          calcHours(e.id, schedule, extShifts) > OT_RELIEF_THRESHOLD
        );
        const allDismissed = otReliefSuggestions.length > 0 && visible.length === 0;

        if (!visible.length) {
          return (
            <div style={{background:t.surface,border:"1px solid "+t.border,borderRadius:8,
              padding:"14px 18px",marginBottom:24,display:"flex",alignItems:"center",gap:12}}>
              <span style={{fontSize:18,opacity:.5}}>⚡</span>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:t.textDim,letterSpacing:".06em"}}>
                  OT RELIEF SUGGESTIONS
                </div>
                <div style={{fontSize:10,color:t.textDim,marginTop:3}}>
                  {allDismissed
                    ? "All suggestions dismissed — reassign or adjust the schedule to recalculate."
                    : overloadedEmps.length === 0
                    ? `No employees over ${OT_RELIEF_THRESHOLD}h — no relief needed.`
                    : `${overloadedEmps.length} employee${overloadedEmps.length!==1?"s":""} over ${OT_RELIEF_THRESHOLD}h but no valid swap found — absorbers would gain more OT than they relieve, or no qualified pairs are available.`
                  }
                </div>
              </div>
            </div>
          );
        }

        const hoursBar = (before, after, label, col) => {
          const maxH  = 60;
          const bPct  = Math.min(100, Math.round((before / maxH) * 100));
          const aPct  = Math.min(100, Math.round((after  / maxH) * 100));
          const isOT  = after > 40;
          const barCol = after > 48 ? t.danger : after > 40 ? t.warning : t.scale;
          return (
            <div style={{flex:1,minWidth:90}}>
              <div style={{fontSize:9,color:col||t.textDim,fontWeight:700,marginBottom:3,
                letterSpacing:".04em",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                {label}
              </div>
              <div style={{position:"relative",height:8,background:t.border+"40",borderRadius:4,marginBottom:3}}>
                <div style={{position:"absolute",left:0,top:0,height:"100%",borderRadius:4,
                  width:bPct+"%",background:t.danger+"60",transition:"width .3s"}}/>
                <div style={{position:"absolute",left:0,top:0,height:"100%",borderRadius:4,
                  width:aPct+"%",background:barCol,transition:"width .3s"}}/>
              </div>
              <div style={{fontSize:9,color:t.textMuted}}>
                <span style={{textDecoration:"line-through",color:t.danger,marginRight:4}}>{before}h</span>
                <span style={{color:barCol,fontWeight:700}}>{after}h</span>
                {after <= 40 && <span style={{color:t.scale,marginLeft:3}}>✓</span>}
              </div>
            </div>
          );
        };

        return (
          <div style={{background:t.surface,border:"2px solid "+t.warning+"60",borderRadius:8,
            padding:18,marginBottom:24}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
              marginBottom:14,flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:t.warning,letterSpacing:".06em"}}>
                  ⚡ OT RELIEF SUGGESTIONS
                </div>
                <div style={{fontSize:10,color:t.textDim,marginTop:2}}>
                  {visible.length} suggestion{visible.length!==1?"s":""} — replace an overloaded
                  employee's shift with a 12-hour split between two others
                </div>
              </div>
              <div style={{fontSize:9,color:t.textDim,padding:"3px 8px",
                background:t.warning+"15",borderRadius:4,border:"1px solid "+t.warning+"40"}}>
                &gt;{OT_RELIEF_THRESHOLD}h threshold
              </div>
            </div>

            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {visible.slice(0,5).map((s, vi) => {
                const realIdx = otReliefSuggestions.indexOf(s);
                const shiftCol = sC(s.shift.id, t);
                return (
                  <div key={vi} style={{background:t.surfaceAlt,borderRadius:6,
                    border:"1px solid "+t.border,padding:"12px 14px"}}>

                    {}
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                      marginBottom:10,flexWrap:"wrap",gap:6}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                        <span style={{fontSize:11,fontWeight:700,color:shiftCol}}>
                          {s.day.substring(0,3)} · {s.shift.label}
                        </span>
                        <span style={{fontSize:9,padding:"2px 7px",borderRadius:10,fontWeight:700,
                          background:t.warning+"20",color:t.warning,border:"1px solid "+t.warning+"40"}}>
                          −{s.otReduction}h OT
                        </span>
                        <span style={{fontSize:9,color:t.textDim}}>
                          {s.pair.label} · {s.pair.time}
                        </span>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>{
                          approveOTRelief(s);
                          setApprovedSet(prev=>new Set([...prev,realIdx]));
                        }} style={{
                          fontSize:10,fontWeight:700,padding:"5px 14px",borderRadius:5,
                          background:t.scale,color:"#fff",border:"none",
                          cursor:"pointer",fontFamily:"inherit",
                        }}>✓ Approve</button>
                        <button onClick={()=>setDismissed(prev=>new Set([...prev,realIdx]))}
                          style={{fontSize:10,padding:"5px 10px",borderRadius:5,
                            background:"transparent",color:t.textDim,
                            border:"1px solid "+t.border,cursor:"pointer",fontFamily:"inherit"}}>
                          Dismiss
                        </button>
                      </div>
                    </div>

                    {}
                    <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
                      {hoursBar(s.overHoursBefore, s.overHoursAfter,
                        "🔴 "+s.overEmp.name+" (relieved)", t.danger)}
                      <div style={{fontSize:16,color:t.textDim,alignSelf:"center",
                        flexShrink:0,marginBottom:14}}>→</div>
                      {hoursBar(s.aHoursBefore, s.aHoursAfter,
                        "🔵 "+s.empA.name+" (+"+EXT_SHIFT_HOURS+"h ext)", t.accent)}
                      {hoursBar(s.bHoursBefore, s.bHoursAfter,
                        "🔵 "+s.empB.name+" (+"+EXT_SHIFT_HOURS+"h ext)", t.accent)}
                    </div>

                    {}
                    <div style={{display:"flex",gap:4,marginTop:8,flexWrap:"wrap"}}>
                      {["Scale","Medical"].map(role => {
                        const covered = s.empA.qualifications.includes(role)
                                     || s.empB.qualifications.includes(role);
                        return (
                          <span key={role} style={{fontSize:8,padding:"2px 6px",borderRadius:8,
                            fontWeight:700,
                            background:covered?t.scale+"20":t.danger+"20",
                            color:covered?t.scale:t.danger,
                            border:"1px solid "+(covered?t.scale:t.danger)+"40"}}>
                            {covered?"✓":"✗"} {role}
                          </span>
                        );
                      })}
                      <span style={{fontSize:8,color:t.textDim,marginLeft:4,alignSelf:"center"}}>
                        {s.empA.name} works {s.pair.covers[0]==="first"?"0600–1200":"1800–0000"} ·{" "}
                        {s.empB.name} works {s.pair.covers[0]==="first"?"1200–1800":"0000–0600"}
                      </span>
                    </div>
                  </div>
                );
              })}
              {visible.length > 5 && (
                <div style={{fontSize:10,color:t.textDim,textAlign:"center",padding:"6px 0"}}>
                  +{visible.length-5} more suggestions — approve or dismiss above to see them
                </div>
              )}
            </div>
          </div>
        );
}
function CoverageDashboard({ employees, schedule, setSchedule, extShifts, setExtShifts, history, navigateToWeek, setActiveTab, timeOffReqs, weekStart }) {
  const t = useTheme();
  const cfg = useSettings();
  const [quickFilling, setQuickFilling] = useState(null);

  const analysis = useMemo(() => {
    const gaps = [];
    const empStats = {};

    employees.forEach(e => {
      empStats[e.id] = { emp: e, hours: 0, shifts: 0, nights: 0,
        fatigueIssues: getFatigueIssues(e.id, schedule, cfg, employees).length };
    });

    // Count regular shift hours
    let totalEmpty = 0, totalMissingRole = 0, totalPartial = 0, totalOk = 0;

    DAYS.forEach(day => {
      SHIFTS.forEach(shift => {
        const asgn     = schedule[cellKey(day, shift.id)] || [];
        const max      = getSlotCount(day, shift.id);
        const hasScale = slotHasRole(asgn, employees, "Scale");
        const hasMed   = slotHasRole(asgn, employees, "Medical");
        const filled   = asgn.length;
        const openSlots = max - filled;

        asgn.forEach(a => {
          if (empStats[a.employeeId]) {
            empStats[a.employeeId].hours += SHIFT_HOURS;
            empStats[a.employeeId].shifts++;
            if (shift.id === "third") empStats[a.employeeId].nights++;
          }
        });

        const cellExt    = (extShifts||[]).filter(e => extCovers(e, day, shift.id));
        const extScale   = cellExt.some(e => (e.roles||[]).includes("Scale"));
        const extMedical = cellExt.some(e => (e.roles||[]).includes("Medical"));
        const extFilled  = cellExt.length * 2;
        const effFilled  = Math.min(filled + extFilled, max);
        const effHasScale = hasScale  || extScale;
        const effHasMed   = hasMed || extMedical;
        const effOpen     = max - effFilled;

        if (!effFilled) {
          totalEmpty++;
          gaps.push({ day, shiftId: shift.id, type: "empty", severity: 3,
            label: "Completely unstaffed", openSlots: max, hasScale: effHasScale, hasMed: effHasMed,
            missingRoles: ["Scale","Medical"] });
        } else {
          const missing = [...(!effHasScale?["Scale"]:[]),...(!effHasMed?["Medical"]:[])];
          if (missing.length) {
            totalMissingRole++;
            gaps.push({ day, shiftId: shift.id, type: "missing_role", severity: 2,
              label: `Missing: ${missing.join(" & ")}`, openSlots: effOpen, hasScale: effHasScale, hasMed: effHasMed,
              missingRoles: missing });
          } else if (effFilled < max) {
            totalPartial++;
            gaps.push({ day, shiftId: shift.id, type: "partial", severity: 1,
              label: `${effOpen} open slot${effOpen>1?"s":""}`, openSlots: effOpen, hasScale: effHasScale, hasMed: effHasMed,
              missingRoles: [] });
          } else {
            totalOk++;
          }
        }
      });
    });

    // Add ext shift hours to empStats (12h per ext pair body)
    (extShifts||[]).forEach(ext => {
      if (ext.empAId && empStats[ext.empAId]) empStats[ext.empAId].hours += EXT_SHIFT_HOURS;
      if (ext.empBId && empStats[ext.empBId]) empStats[ext.empBId].hours += EXT_SHIFT_HOURS;
    });

    gaps.sort((a,b) => b.severity - a.severity || slotIndex(a.day,a.shiftId) - slotIndex(b.day,b.shiftId));

    const ftUnderHours = employees.filter(e =>
      e.employmentType === "full-time" && (empStats[e.id]?.hours||0) < FT_MIN_HOURS);

    const overtimeEmps = employees
      .filter(e => (empStats[e.id]?.hours||0) > FT_MIN_HOURS)
      .map(e => ({ emp: e, hours: empStats[e.id].hours, ot: empStats[e.id].hours - FT_MIN_HOURS }))
      .sort((a,b) => b.ot - a.ot);
    const totalOTHours = overtimeEmps.reduce((s, x) => s + x.ot, 0);

    const totalSlots   = DAYS.reduce((s,d) => s + SHIFTS.reduce((ss,sh) => ss + getSlotCount(d,sh.id), 0), 0);
    const shiftsPerFT  = FT_MIN_HOURS / SHIFT_HOURS;
    const idealFTTotal = Math.ceil(totalSlots / shiftsPerFT);

    const scaleSlots      = DAYS.length * SHIFTS.length;
    const medicalSlots    = scaleSlots;
    const idealMinScale      = Math.ceil(scaleSlots / shiftsPerFT);
    const idealMinMedical    = Math.ceil(medicalSlots / shiftsPerFT);

    const currFT         = employees.filter(e => e.employmentType === "full-time");
    const currFTTotal    = currFT.length;
    const currScale      = currFT.filter(e => e.qualifications.includes("Scale")).length;
    const currMedical    = currFT.filter(e => e.qualifications.includes("Medical")).length;
    const currSupervisor = 0;
    const currGuardOnly  = currFT.filter(e =>
      !e.qualifications.includes("Scale") &&
      !e.qualifications.includes("Medical")
    ).length;
    const idealGuardOnly = Math.max(0, idealFTTotal - Math.max(idealMinScale, idealMinMedical));

    const idealModel = {
      totalSlots, shiftsPerFT, idealFTTotal,
      roles: [
        { role:"Scale",      ideal:idealMinScale,      current:currScale,
          note:"One Scale per shift × 21 shifts ÷ 5 shifts/FT" },
        { role:"Medical",    ideal:idealMinMedical,    current:currMedical,
          note:"One Medical per shift × 21 shifts ÷ 5 shifts/FT" },

        { role:"Guard-only", ideal:idealGuardOnly,     current:currGuardOnly,
          note:"Remaining slots filled by Guard-qualified staff" },
      ],
      currFTTotal,
      ftGap: idealFTTotal - currFTTotal,
    };

    return { gaps, empStats, totalEmpty, totalMissingRole, totalPartial, totalOk,
             ftUnderHours, totalShifts: DAYS.length * SHIFTS.length,
             overtimeEmps, totalOTHours, idealModel };
  }, [employees, schedule, extShifts]);

  const otReliefSuggestions = useMemo(() =>
    findOTReliefSuggestions(employees, schedule, extShifts, cfg),
  [employees, schedule, extShifts]);

  const approveOTRelief = useCallback((s) => {
    setSchedule(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const key  = cellKey(s.day, s.shift.id);
      next[key]  = (next[key] || []).filter(a => a.employeeId !== s.overEmp.id);
      return next;
    });
    setExtShifts(prev => [...(prev||[]), {
      pairId:      s.pairId,
      day:         s.day,
      empAId:      s.empA.id,
      empBId:      s.empB.id,
      roles:       [s.empA,s.empB].flatMap(e=>["Scale","Medical"].filter(r=>e.qualifications.includes(r))),
      approvedAt:  new Date().toLocaleDateString(),
      otRelief:    true,
      relievedEmpId: s.overEmp.id,
    }]);
  }, [setSchedule, setExtShifts]);

  const historyStats = useMemo(() => {
    if (!history || !history.length) return [];
    const byWeek = {};
    [...history].sort((a,b)=>a.savedAt.localeCompare(b.savedAt)).forEach(h => {
      if (!byWeek[h.weekStart] || !h.isAutoSave) byWeek[h.weekStart] = h;
    });
    return Object.values(byWeek)
      .sort((a,b) => a.weekStart.localeCompare(b.weekStart))
      .map(h => ({
        weekStart: h.weekStart,
        label: weekRangeLabel(h.weekStart),
        isNamed: !h.isAutoSave,
        snapshotLabel: h.label,
        ...computeWeekStats(h.schedule, employees, h.extShifts||[]),
      }));
  }, [history, employees]);

  const quickFill = useCallback((day, shiftId, neededRole) => {
    setQuickFilling({ day, shiftId });
    const key = cellKey(day, shiftId);
    const cur = schedule[key] || [];
    const max = getEffectiveSlotCount(day, shiftId, extShifts);
    if (cur.length >= max) { setQuickFilling(null); return; }
    const usedIds  = new Set(cur.map(a => a.employeeId));
    const avail    = getAvailPos(day, shiftId);
    const candidates = employees
      .filter(e => {
        if (usedIds.has(e.id)) return false;
        if ((e.unavailableDays||[]).includes(day)) return false;
        // B27: skip employees on approved time-off
        if ((timeOffReqs||[]).some(r =>
          r.empId===e.id && r.status==="approved" && timeOffCoversSlot(r, day, shiftId, weekStart)
        )) return false;
        if (isRestViolation(e, calcRestGap(e.id,schedule,day,shiftId), cfg?.minRestHours??MIN_REST_HOURS)) return false;
        if (calcConsecutiveHours(e.id,schedule,day,shiftId) > empMaxConsec(e)) return false;
        if (shiftId==="third" && calcConsecutiveNights(e.id,schedule,day,shiftId)>=(cfg?.maxConsecutiveNights??MAX_CONSECUTIVE_NIGHTS)) return false;
        return avail.some(p => e.qualifications.includes(p));
      })
      .map(e => {
        const qualPos     = avail.filter(p => e.qualifications.includes(p));
        const fillsNeeded = neededRole && qualPos.includes(neededRole);
        const hours       = calcHours(e.id, schedule, extShifts);
        const underHours  = e.employmentType==="full-time" && hours < FT_MIN_HOURS;
        const score       = (fillsNeeded?100:0) + (underHours?10:0) - (hours/8);
        const pos         = fillsNeeded ? neededRole : (qualPos.includes("Guard")?"Guard":qualPos[0]);
        return { emp: e, pos, score };
      })
      .sort((a,b) => b.score - a.score);

    if (candidates.length) {
      const { emp, pos } = candidates[0];
      setSchedule(p => ({ ...p, [key]: [...(p[key]||[]), { employeeId: emp.id, position: pos }] }));
    }
    setTimeout(() => setQuickFilling(null), 600);
  }, [employees, schedule, setSchedule]);

  const jumpToShift = (day, shiftId) => setActiveTab("schedule", { day, shiftId });

  const cellColors = (day, shiftId) => {
    const asgn = schedule[cellKey(day,shiftId)] || [];
    const max  = getEffectiveSlotCount(day, shiftId, extShifts);
    if (!asgn.length)                                           return { bg:t.danger+"22",  border:t.danger+"55",  dot:t.danger  };
    const hasScale = slotHasRole(asgn, employees, "Scale");
    const hasMed   = slotHasRole(asgn, employees, "Medical");
    if (!hasScale||!hasMed)                                     return { bg:t.warning+"18", border:t.warning+"55", dot:t.warning };
    if (asgn.length < max)                                      return { bg:t.accent+"12",  border:t.accent+"40",  dot:t.accent  };
    return                                                             { bg:t.scale+"10",   border:t.scale+"35",   dot:t.scale   };
  };
  const sevColor  = (s) => s===3?t.danger:s===2?t.warning:t.accent;
  const sevLabel  = (s) => s===3?"EMPTY":s===2?"ROLE GAP":"PARTIAL";
  const scoreColor= (pct) => pct>=1?t.scale:pct>=.75?t.accent:pct>=.5?t.warning:t.danger;

  const totalFatigue  = employees.filter(e => (analysis.empStats[e.id]?.fatigueIssues||0) > 0).length;
  const coveragePct   = analysis.totalShifts > 0 ? analysis.totalOk / analysis.totalShifts : 0;

  const cards = [
    { label:"COVERAGE SCORE",   icon:"◉",
      value:`${Math.round(coveragePct*100)}%`,
      sub:`${analysis.totalOk} / ${analysis.totalShifts} shifts fully staffed`,
      color: scoreColor(coveragePct) },
    { label:"OPEN ISSUES",      icon:"\u26a0",
      value: analysis.gaps.length,
      sub:`${analysis.totalEmpty} empty · ${analysis.totalMissingRole} role gap · ${analysis.totalPartial} partial`,
      color: analysis.gaps.length===0?t.scale:analysis.totalEmpty>0?t.danger:t.warning },
    { label:"FATIGUE RISK",     icon:"\u25d1",
      value: totalFatigue,
      sub: totalFatigue===0?"No fatigue warnings this week":`${totalFatigue} staff with scheduling concerns`,
      color: totalFatigue===0?t.scale:t.fatigue },
    { label:"HOURS COMPLIANCE", icon:"\u25f7",
      value: analysis.ftUnderHours.length===0?"\u2713":`${analysis.ftUnderHours.length} FT`,
      sub: analysis.ftUnderHours.length===0?"All FT staff at 40h target"
        :`Under 40h: ${analysis.ftUnderHours.map(e=>e.name.split(" ")[0]).join(", ")}`,
      color: analysis.ftUnderHours.length===0?t.scale:t.danger },
    { label:"OVERTIME THIS WEEK", icon:"\u23f1",
      value: analysis.totalOTHours===0?"\u2013":`+${analysis.totalOTHours}h`,
      sub: analysis.overtimeEmps.length===0?"No overtime scheduled"
        :`${analysis.overtimeEmps.length} staff · ${analysis.overtimeEmps.map(e=>e.emp.name.split(" ")[0]+"(+"+e.ot+"h)").join(", ")}`,
      color: analysis.totalOTHours===0?t.scale:analysis.totalOTHours>16?t.danger:t.warning },
  ];

  return (
    <div>
      {}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(190px,1fr))",gap:12,marginBottom:24}}>
        {cards.map(card => (
          <div key={card.label} style={{background:t.surface,border:"1px solid "+card.color+"40",
            borderRadius:8,padding:"16px 20px",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:10,right:14,fontSize:32,opacity:.07,
              color:card.color,fontWeight:900,userSelect:"none"}}>{card.icon}</div>
            <div style={{fontSize:9,color:t.textDim,fontWeight:700,letterSpacing:".1em",marginBottom:6}}>{card.label}</div>
            <div style={{fontSize:30,fontWeight:800,color:card.color,lineHeight:1,marginBottom:4}}>{card.value}</div>
            <div style={{fontSize:10,color:t.textMuted,lineHeight:1.4}}>{card.sub}</div>
          </div>
        ))}
      </div>

      {}
      {historyStats.length > 0 && (() => {
        const [trendTab, setTrendTab] = useState("chart");
        const [sortCol,  setSortCol]  = useState("weekStart");
        const [sortAsc,  setSortAsc]  = useState(false);

        const METRICS = [
          { key:"coveragePct",     label:"Coverage",    unit:"%",  good:"high", color: t.scale },
          { key:"totalOTHours",    label:"OT Hours",    unit:"h",  good:"low",  color: t.warning },
          { key:"underHoursFT",    label:"Under-40h FT",unit:"",   good:"low",  color: t.danger },
          { key:"totalViolations", label:"Violations",  unit:"",   good:"low",  color: t.fatigue },
          { key:"totalEmpty",      label:"Empty Shifts",unit:"",   good:"low",  color: t.danger },
          { key:"totalMissingRole",label:"Role Gaps",   unit:"",   good:"low",  color: t.warning },
        ];

        const Sparkline = ({ metricKey, color, unit, good }) => {
          const vals = historyStats.map(w => w[metricKey] ?? 0);
          const max  = Math.max(...vals, 1);
          const W = 56, H = 36, BAR = Math.floor((W - (vals.length-1)*2) / Math.max(vals.length,1));
          const barW = Math.max(BAR, 3);
          const [hovered, setHovered] = useState(null);
          return (
            <svg width={W} height={H} style={{overflow:"visible",cursor:"pointer"}}>
              {vals.map((v, i) => {
                const h = Math.max(2, Math.round((v/max)*H));
                const x = i*(barW+2);
                const isLast = i===vals.length-1;
                const isHov  = hovered===i;
                return (
                  <g key={i}
                    onMouseEnter={()=>setHovered(i)}
                    onMouseLeave={()=>setHovered(null)}
                    onClick={(e)=>{ e.stopPropagation(); navigateToWeek(historyStats[i].weekStart); }}
                    style={{cursor:"pointer"}}>
                    <title>{"Go to "+historyStats[i].label+": "+v+unit}</title>
                    <rect x={x} y={H-h} width={barW} height={h} rx={1}
                      fill={isHov ? color : isLast ? color : color+"55"}
                      stroke={isHov||isLast ? color : "none"}
                      strokeWidth={isHov||isLast?1.5:0}
                      opacity={isHov?1:isLast?1:0.65}/>
                    {isHov && (
                      <rect x={x-1} y={0} width={barW+2} height={H}
                        fill={color} opacity={0.12} rx={1}/>
                    )}
                  </g>
                );
              })}
            </svg>
          );
        };

        const Trend = ({ metricKey, good }) => {
          if (historyStats.length < 2) return null;
          const prev = historyStats[historyStats.length-2][metricKey] ?? 0;
          const curr = historyStats[historyStats.length-1][metricKey] ?? 0;
          const delta = curr - prev;
          if (delta === 0) return <span style={{color:t.textDim,fontSize:10}}>—</span>;
          const up = delta > 0;
          const good_direction = good==="high" ? up : !up;
          return (
            <span style={{fontSize:10,fontWeight:700,color:good_direction?t.scale:t.danger}}>
              {up?"▲":"▼"}{Math.abs(delta)}{metricKey==="coveragePct"?"%":""}
            </span>
          );

          {employees.length===0 ? (
            <div style={{textAlign:"center",padding:"24px 0",color:t.textDim,fontSize:12}}>No employees added yet.</div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {[...employees]
                .sort((a,b)=>{
                  const aH=(analysis.empStats[a.id]?.hours||0);
                  const bH=(analysis.empStats[b.id]?.hours||0);
                  const aU=a.employmentType==="full-time"&&aH<40;
                  const bU=b.employmentType==="full-time"&&bH<40;
                  if(aU&&!bU) return -1; if(!aU&&bU) return 1;
                  return bH-aH;
                })
                .map(emp=>{
                  const stats   = analysis.empStats[emp.id]||{hours:0,shifts:0,nights:0,fatigueIssues:0};
                  const isFT    = emp.employmentType==="full-time";
                  const isOver  = isFT&&stats.hours>40;
                  const isUnder = isFT&&stats.hours<40;
                  const barPct  = isFT?Math.min(stats.hours/40,1):null;
                  const barColor= isOver?t.warning:isUnder?t.danger:t.scale;
                  const unavailN= (emp.unavailableDays||[]).length;
                  return (
                    <div key={emp.id} style={{padding:"10px 12px",background:t.surfaceAlt,borderRadius:6,
                      border:"1px solid "+(stats.fatigueIssues>0?t.fatigue+"50":isUnder?t.danger+"40":t.border)}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:isFT?6:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:6,minWidth:0,flex:1}}>
                          <span style={{fontSize:12,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",
                            whiteSpace:"nowrap"}}>{emp.name}</span>
                          <span style={{fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:3,flexShrink:0,
                            background:(isFT?t.accent:emp.employmentType==="on-call"?t.warning:t.scale)+"20",color:isFT?t.accent:emp.employmentType==="on-call"?t.warning:t.scale,
                            border:"1px solid "+(isFT?t.accent:emp.employmentType==="on-call"?t.warning:t.scale)+"40"}}>{isFT?"FT":emp.employmentType==="on-call"?"OC":"PT"}</span>
                        </div>
                        <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
                          {stats.fatigueIssues>0&&<span style={{fontSize:9,color:t.fatigue,fontWeight:800}}>\u26a0{stats.fatigueIssues}</span>}
                          <span style={{fontSize:13,fontWeight:800,
                            color:isOver?t.warning:isUnder?t.danger:stats.hours===40?t.scale:t.text}}>
                            {stats.hours}h
                          </span>
                          {isFT&&<span style={{fontSize:9,color:t.textDim}}>/ 40h</span>}
                        </div>
                      </div>
                      {isFT&&(
                        <div style={{height:4,background:t.border,borderRadius:2,overflow:"hidden",marginBottom:5}}>
                          <div style={{height:"100%",borderRadius:2,background:barColor,
                            width:`${Math.min((barPct||0)*100,100)}%`,transition:"width .4s"}}/>
                        </div>
                      )}
                      <div style={{display:"flex",gap:10,fontSize:9,color:t.textDim,flexWrap:"wrap",alignItems:"center"}}>
                        <span>{stats.shifts} shift{stats.shifts!==1?"s":""}</span>
                        {stats.nights>0&&<span style={{color:t.shiftThird||"#a78bfa"}}>{stats.nights}\u263d night{stats.nights!==1?"s":""}</span>}
                        {unavailN>0&&<span style={{color:t.danger}}>{unavailN} day{unavailN!==1?"s":""} off</span>}
                        <span style={{marginLeft:"auto",display:"flex",gap:3}}>
                          {emp.qualifications.map(q=>(
                            <span key={q} style={{width:6,height:6,borderRadius:"50%",background:pC(q,t),display:"inline-block"}} title={q}/>
                          ))}
                        </span>
                      </div>
                    </div>
                  );
                })}
            </div>
          )}
          {employees.length>0&&(
            <div style={{marginTop:12,padding:"10px 12px",background:t.border+"22",borderRadius:6}}>
              {[
                ["Total shifts assigned", Object.values(analysis.empStats).reduce((s,e)=>s+e.shifts,0)],
                ["Total hours scheduled", Object.values(analysis.empStats).reduce((s,e)=>s+e.hours,0)+"h"],
                ["FT at / above 40h",
                  `${employees.filter(e=>e.employmentType==="full-time"&&(analysis.empStats[e.id]?.hours||0)>=40).length} / ${employees.filter(e=>e.employmentType==="full-time").length}`],
              ].map(([label,val])=>(
                <div key={label} style={{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:10,color:t.textDim}}>
                  <span>{label}</span>
                  <span style={{color:t.text,fontWeight:700}}>{val}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {}
      {historyStats.length > 0 && employees.length > 0 && (() => {
        const byWeek = {};
        (history||[]).slice().sort((a,b)=>a.savedAt.localeCompare(b.savedAt))
          .forEach(h => { if (!byWeek[h.weekStart]||!h.isAutoSave) byWeek[h.weekStart]=h; });
        const weeks = Object.values(byWeek).sort((a,b)=>a.weekStart.localeCompare(b.weekStart));

        const empWeekData = {};
        employees.forEach(e => {
          empWeekData[e.id] = weeks.map(w => {
            let hrs = 0;
            Object.values(w.schedule||{}).forEach(asgn =>
              asgn.forEach(a => { if (a.employeeId===e.id) hrs+=SHIFT_HOURS; })
            );
            const isFT = e.employmentType==="full-time";
            return { weekStart:w.weekStart, label:weekRangeLabel(w.weekStart), hrs,
                     ot: isFT&&hrs>40 ? hrs-40 : 0,
                     under: isFT&&hrs<40 ? 40-hrs : 0 };
          });
        });

        const empTotals = {};
        employees.forEach(e => {
          const rows = empWeekData[e.id];
          empTotals[e.id] = {
            totalHrs:   rows.reduce((s,r)=>s+r.hrs, 0),
            totalOT:    rows.reduce((s,r)=>s+r.ot, 0),
            totalShifts:rows.reduce((s,r)=>s+(r.hrs/SHIFT_HOURS), 0),
            avgHrs:     rows.length ? rows.reduce((s,r)=>s+r.hrs,0)/rows.length : 0,
            weeksActive:rows.filter(r=>r.hrs>0).length,
          };
        });

        const [selectedEmpId, setSelectedEmpId] = useState(employees[0]?.id||null);
        const [sortEmpCol, setSortEmpCol] = useState("totalHrs");
        const [sortEmpAsc, setSortEmpAsc] = useState(false);

        const selectedEmp = employees.find(e=>e.id===selectedEmpId);
        const selectedRows = selectedEmpId ? empWeekData[selectedEmpId] : [];

        const sortedEmps = [...employees].sort((a,b)=>{
          const av = empTotals[a.id]?.[sortEmpCol]??0;
          const bv = empTotals[b.id]?.[sortEmpCol]??0;
          return sortEmpAsc ? av-bv : bv-av;
        });

        const thS = (col) => ({
          fontSize:9, fontWeight:700,
          color: sortEmpCol===col ? t.accent : t.textDim,
          letterSpacing:".05em", padding:"6px 8px", textAlign:"right",
          cursor:"pointer", userSelect:"none", whiteSpace:"nowrap",
          borderBottom:"2px solid "+(sortEmpCol===col?t.accent:t.border),
          background:t.surfaceAlt,
        });

        const EmpSparkline = ({ empId }) => {
          const vals = empWeekData[empId].map(r=>r.hrs);
          if (vals.length < 2) return null;
          const max = Math.max(...vals, 8);
          const W=52, H=20, n=vals.length;
          const bw = Math.max(2, Math.floor((W-(n-1)*1)/n));
          return (
            <svg width={W} height={H} style={{flexShrink:0}}>
              {vals.map((v,i)=>{
                const h = Math.max(1,Math.round((v/max)*H));
                const isFT = employees.find(e=>e.id===empId)?.employmentType==="full-time";
                const color = isFT&&v>40?t.warning:isFT&&v<40&&v>0?t.danger:v===0?t.border:t.scale;
                return <rect key={i} x={i*(bw+1)} y={H-h} width={bw} height={h} rx={1} fill={color} opacity={i===vals.length-1?1:0.6}/>;
              })}
            </svg>
          );
        };

        return (
          <div style={{background:t.surface,border:"1px solid "+t.border,borderRadius:8,padding:18,marginTop:20}}>
            <div style={{fontSize:11,fontWeight:700,color:t.textMuted,letterSpacing:".06em",marginBottom:4}}>
              EMPLOYEE HOURS — ALL WEEKS
            </div>
            <div style={{fontSize:10,color:t.textDim,marginBottom:16}}>
              {weeks.length} week{weeks.length!==1?"s":""} of history · click an employee to see week-by-week breakdown
            </div>

            {}
            <div style={{overflowX:"auto",marginBottom:16}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead>
                  <tr>
                    <th style={{...thS("name"),textAlign:"left",paddingLeft:10}}>EMPLOYEE</th>
                    <th onClick={()=>{setSortEmpCol("totalHrs");setSortEmpAsc(s=>!s);}} style={thS("totalHrs")}>
                      TOTAL HRS {sortEmpCol==="totalHrs"?(sortEmpAsc?"▲":"▼"):""}
                    </th>
                    <th onClick={()=>{setSortEmpCol("avgHrs");setSortEmpAsc(s=>!s);}} style={thS("avgHrs")}>
                      AVG/WK {sortEmpCol==="avgHrs"?(sortEmpAsc?"▲":"▼"):""}
                    </th>
                    <th onClick={()=>{setSortEmpCol("totalOT");setSortEmpAsc(s=>!s);}} style={thS("totalOT")}>
                      TOTAL OT {sortEmpCol==="totalOT"?(sortEmpAsc?"▲":"▼"):""}
                    </th>
                    <th onClick={()=>{setSortEmpCol("totalShifts");setSortEmpAsc(s=>!s);}} style={thS("totalShifts")}>
                      SHIFTS {sortEmpCol==="totalShifts"?(sortEmpAsc?"▲":"▼"):""}
                    </th>
                    <th onClick={()=>{setSortEmpCol("weeksActive");setSortEmpAsc(s=>!s);}} style={thS("weeksActive")}>
                      WKS ACTIVE {sortEmpCol==="weeksActive"?(sortEmpAsc?"▲":"▼"):""}
                    </th>
                    <th style={{...thS("spark"),cursor:"default",textAlign:"center"}}>TREND</th>
                  </tr>
                </thead>
                <tbody>
                  {sortedEmps.map((emp,i)=>{
                    const tot = empTotals[emp.id];
                    const isFT = emp.employmentType==="full-time";
                    const isSelected = emp.id===selectedEmpId;
                    const avgColor = isFT&&tot.avgHrs<40?t.danger:isFT&&tot.avgHrs>40?t.warning:t.scale;
                    return (
                      <tr key={emp.id}
                        onClick={()=>setSelectedEmpId(emp.id===selectedEmpId?null:emp.id)}
                        style={{
                          background:isSelected?t.accent+"15":i%2===0?t.surface:t.surfaceAlt,
                          borderBottom:"1px solid "+t.border+"40",
                          cursor:"pointer",
                          outline:isSelected?"1px solid "+t.accent+"60":"none",
                        }}
                        onMouseEnter={e=>{ if(!isSelected) e.currentTarget.style.background=t.accent+"0a"; }}
                        onMouseLeave={e=>{ e.currentTarget.style.background=isSelected?t.accent+"15":i%2===0?t.surface:t.surfaceAlt; }}>
                        <td style={{padding:"8px 8px 8px 10px",fontWeight:isSelected?700:500}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:110}}>{emp.name}</span>
                            <span style={{fontSize:8,fontWeight:700,padding:"1px 4px",borderRadius:3,flexShrink:0,
                              background:(isFT?t.accent:emp.employmentType==="on-call"?t.warning:t.scale)+"20",color:isFT?t.accent:emp.employmentType==="on-call"?t.warning:t.scale,
                              border:"1px solid "+(isFT?t.accent:emp.employmentType==="on-call"?t.warning:t.scale)+"40"}}>{isFT?"FT":emp.employmentType==="on-call"?"OC":"PT"}</span>
                          </div>
                        </td>
                        <td style={{padding:"8px",textAlign:"right",fontWeight:700,color:t.text}}>{tot.totalHrs}h</td>
                        <td style={{padding:"8px",textAlign:"right",fontWeight:700,color:avgColor}}>{tot.avgHrs.toFixed(1)}h</td>
                        <td style={{padding:"8px",textAlign:"right",fontWeight:tot.totalOT>0?700:400,
                          color:tot.totalOT>0?t.warning:t.textDim}}>
                          {tot.totalOT>0?"+"+tot.totalOT+"h":"—"}
                        </td>
                        <td style={{padding:"8px",textAlign:"right",color:t.text}}>{tot.totalShifts}</td>
                        <td style={{padding:"8px",textAlign:"right",color:t.textMuted}}>
                          {tot.weeksActive} / {weeks.length}
                        </td>
                        <td style={{padding:"8px",display:"flex",justifyContent:"center",alignItems:"center"}}>
                          <EmpSparkline empId={emp.id}/>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            {}
            {selectedEmp && selectedRows.length > 0 && (
              <div style={{background:t.surfaceAlt,border:"1px solid "+t.accent+"50",borderRadius:6,padding:14}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                  <div>
                    <span style={{fontWeight:700,fontSize:13,color:t.accent}}>{selectedEmp.name}</span>
                    <span style={{fontSize:10,color:t.textDim,marginLeft:8}}>week-by-week breakdown</span>
                  </div>
                  <button onClick={()=>setSelectedEmpId(null)}
                    style={{background:"transparent",border:"none",color:t.textDim,cursor:"pointer",fontSize:14,padding:2}}>✕</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:6}}>
                  {selectedRows.map((row,i)=>{
                    const isFT = selectedEmp.employmentType==="full-time";
                    const isLatest = i===selectedRows.length-1;
                    const cardColor = row.ot>0?t.warning:row.under>0?t.danger:row.hrs>0?t.scale:t.textDim;
                    return (
                      <div key={row.weekStart} style={{
                        padding:"9px 11px",borderRadius:5,
                        background:isLatest?t.accent+"12":t.surface,
                        border:"1px solid "+(isLatest?t.accent+"60":cardColor+"30"),
                      }}>
                        <div style={{fontSize:9,color:isLatest?t.accent:t.textDim,fontWeight:700,marginBottom:4}}>
                          {row.label}{isLatest&&<span style={{marginLeft:4,fontSize:8,background:t.accent,color:"#fff",padding:"0 4px",borderRadius:8}}>NOW</span>}
                        </div>
                        {row.hrs===0 ? (
                          <div style={{fontSize:11,color:t.textDim,fontStyle:"italic"}}>not scheduled</div>
                        ) : (
                          <>
                            <div style={{fontSize:18,fontWeight:800,color:cardColor,lineHeight:1}}>{row.hrs}h</div>
                            {isFT&&(
                              <div style={{fontSize:9,color:cardColor,marginTop:2,fontWeight:600}}>
                                {row.ot>0?"+"+row.ot+"h OT":row.under>0?row.under+"h short":"✓ 40h"}
                              </div>
                            )}
                            <div style={{fontSize:9,color:t.textDim,marginTop:2}}>{row.hrs/SHIFT_HOURS} shift{row.hrs/SHIFT_HOURS!==1?"s":""}</div>
                          </>
                        )}
                      </div>
                    );
                  })}
                </div>
                {}
                <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid "+t.border,display:"flex",gap:16,flexWrap:"wrap",fontSize:10,color:t.textDim}}>
                  <span>Total: <strong style={{color:t.text}}>{empTotals[selectedEmp.id].totalHrs}h</strong></span>
                  <span>Avg/wk: <strong style={{color:t.text}}>{empTotals[selectedEmp.id].avgHrs.toFixed(1)}h</strong></span>
                  {empTotals[selectedEmp.id].totalOT>0&&(
                    <span>Cumulative OT: <strong style={{color:t.warning}}>+{empTotals[selectedEmp.id].totalOT}h</strong></span>
                  )}
                  <span>Active {empTotals[selectedEmp.id].weeksActive} of {weeks.length} week{weeks.length!==1?"s":""}</span>
                  <span style={{marginLeft:"auto"}}>{empTotals[selectedEmp.id].totalShifts} total shifts</span>
                </div>
              </div>
            )}
          </div>
        );
      })()}

    </div>
  );
}

function SchedulePopout({ schedule, extShifts, employees, weekStart, onClose }) {
  const t = useTheme();
  const [pos,  setPos]  = useState({ x: 40, y: 60 });
  const [size, setSize] = useState({ w: 960, h: 520 });

  const onDragStart = (e) => {
    if (e.button !== 0) return;
    e.preventDefault();
    const sx = e.clientX - pos.x, sy = e.clientY - pos.y;
    const move = (ev) => setPos({ x: ev.clientX - sx, y: ev.clientY - sy });
    const up   = () => { window.removeEventListener("mousemove", move); window.removeEventListener("mouseup", up); };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
  };

  const onResizeStart = (e) => {
    e.stopPropagation(); e.preventDefault();
    const sx = e.clientX, sy = e.clientY, sw = size.w, sh = size.h;
    const move = (ev) => setSize({ w: Math.max(600, sw + ev.clientX - sx), h: Math.max(300, sh + ev.clientY - sy) });
    const up   = () => { window.removeEventListener("mousemove", move); window.removeEventListener("mouseup", up); };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
  };

  const [wy, wm, wd] = (weekStart || "2024-01-07").split("-").map(Number);
  const sun = new Date(wy, wm - 1, wd, 12);
  const fmtDate = (offset) => {
    const d = new Date(sun); d.setDate(sun.getDate() + offset);
    return String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  };
  const weekLabel = (() => {
    const d0 = new Date(sun), d6 = new Date(sun); d6.setDate(sun.getDate()+6);
    const opts = { month:"short", year:"numeric" };
    const s0 = d0.toLocaleDateString("en-US", opts), s6 = d6.toLocaleDateString("en-US", opts);
    return s0 === s6 ? s0 : s0 + " – " + s6;
  })();

  const getPopoutStatus = (day, shiftId) => {
    const asgn = schedule[cellKey(day, shiftId)] || [];
    const max  = getSlotCount(day, shiftId);
    const cellExt = (extShifts||[]).filter(e => extCovers(e, day, shiftId));
    const hasScale   = slotHasRole(asgn, employees, "Scale")   || cellExt.some(e => (e.roles||[]).includes("Scale"));
    const hasMedical = slotHasRole(asgn, employees, "Medical") || cellExt.some(e => (e.roles||[]).includes("Medical"));
    const missing = [...(!hasScale ? ["Scale"] : []), ...(!hasMedical ? ["Medical"] : [])];
    return { missing, ok: missing.length === 0, count: asgn.length, max };
  };
  const pCol = (p) => ({ Supervisor: t.supervisor, Guard: t.guard, Scale: t.scale, Medical: t.medical }[p] || t.textMuted);

  return (
    <div style={{
      position:"fixed", left:pos.x, top:pos.y, width:size.w, height:size.h,
      background:t.bg, border:"1.5px solid "+t.border, borderRadius:10,
      boxShadow:"0 8px 40px rgba(0,0,0,.6)", display:"flex", flexDirection:"column",
      zIndex:99999, overflow:"hidden", fontFamily:"inherit",
    }}>
      <div onMouseDown={onDragStart} style={{
        display:"flex", alignItems:"center", gap:10, padding:"8px 14px",
        background:t.surface, borderBottom:"1px solid "+t.border,
        cursor:"grab", userSelect:"none", flexShrink:0,
      }}>
        <span style={{fontSize:12,fontWeight:700,color:t.text,flex:1}}>
          ⛶ Pop-out &nbsp;
          <span style={{fontWeight:400,color:t.textDim,fontSize:11}}>{weekLabel}</span>
        </span>
        <span style={{fontSize:10,color:t.textDim}}>drag to move &nbsp;·&nbsp; drag corner to resize</span>
        <button onMouseDown={e=>e.stopPropagation()} onClick={onClose}
          style={{background:"transparent",border:"none",color:t.textDim,fontSize:16,cursor:"pointer",lineHeight:1,padding:"2px 4px"}}
          title="Close pop-out">✕</button>
      </div>

      <div style={{flex:1,overflowX:"auto",overflowY:"auto",padding:"10px 12px"}}>
        <div style={{minWidth:820}}>
          <div style={{display:"grid",gridTemplateColumns:"78px repeat(7,1fr)",gap:2,marginBottom:2}}>
            <div/>
            {DAYS.map((d,di)=>(
              <div key={d} style={{background:t.surfaceAlt,padding:"5px 6px",textAlign:"center",
                borderRadius:"4px 4px 0 0",color:isWeekday(d)?t.text:t.textMuted}}>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:".04em"}}>{d.substring(0,3).toUpperCase()}</div>
                <div style={{fontSize:9,color:t.textDim,marginTop:1}}>{fmtDate(di)}</div>
              </div>
            ))}
          </div>

          {SHIFTS.map(shift=>(
            <div key={shift.id} style={{display:"grid",gridTemplateColumns:"78px repeat(7,1fr)",gap:2,marginBottom:2}}>
              <div style={{background:t.surfaceAlt,padding:"6px 8px",borderRadius:"4px 0 0 4px",
                display:"flex",flexDirection:"column",justifyContent:"center"}}>
                <div style={{fontSize:10,fontWeight:700,color:t.text}}>{shift.label}</div>
                <div style={{fontSize:9,color:t.textDim}}>{shift.time}</div>
              </div>
              {DAYS.map(day=>{
                const asgn = schedule[cellKey(day,shift.id)]||[];
                const st   = getPopoutStatus(day,shift.id);
                const cellExt = (extShifts||[]).filter(e=>extCovers(e,day,shift.id));
                const bg = !asgn.length&&!cellExt.length ? t.bg : !st.ok ? t.warning+"12" : t.surface;
                const bdr= !asgn.length&&!cellExt.length ? t.border : !st.ok ? t.warning+"55" : t.accent+"30";
                return (
                  <div key={day} style={{background:bg,border:"1px solid "+bdr,borderRadius:4,
                    padding:"5px 6px",display:"flex",flexDirection:"column",gap:3,minHeight:58}}>
                    {asgn.map(a=>{
                      const emp=employees.find(e=>e.id===a.employeeId);
                      if(!emp) return null;
                      return (
                        <div key={a.employeeId} style={{display:"flex",alignItems:"center",gap:4,
                          background:t.surfaceAlt,borderRadius:3,padding:"3px 5px"}}>
                          <span style={{width:6,height:6,borderRadius:"50%",background:pCol(a.position),flexShrink:0}}/>
                          <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                            fontWeight:600,fontSize:10,color:t.text}}>{emp.name}</span>
                          <span style={{fontSize:8,color:pCol(a.position),fontWeight:700,flexShrink:0}}>
                            {a.position.substring(0,3).toUpperCase()}</span>
                        </div>
                      );
                    })}
                    {cellExt.map((ext,ei)=>{
                      const pair=EXT_PAIRS.find(p=>p.id===ext.pairId);
                      const cf=pair?.covers[0]===shift.id;
                      const empId=cf?ext.empAId:(ext.empBId||ext.empAId);
                      const extEmp=employees.find(e=>e.id===empId);
                      if(!extEmp) return null;
                      const ec=pair?.id==="day"?"#7c3aed":"#0e7490";
                      return (
                        <div key={"x"+ei} style={{display:"flex",alignItems:"center",gap:4,
                          background:ec+"12",border:"1px dashed "+ec+"60",borderRadius:3,padding:"3px 5px"}}>
                          <span style={{fontSize:8,flexShrink:0}}>⏱</span>
                          <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                            fontWeight:600,fontSize:10,color:ec}}>{extEmp.name}</span>
                          <span style={{fontSize:8,color:ec,fontWeight:700,flexShrink:0}}>12H</span>
                        </div>
                      );
                    })}
                    {asgn.length>0&&st.missing.length>0&&(
                      <div style={{fontSize:8,color:t.warning,fontWeight:700,marginTop:"auto"}}>
                        ⚠ {st.missing.join(" + ")}
                      </div>
                    )}
                    <div style={{fontSize:8,color:t.textDim,marginTop:"auto",textAlign:"right"}}>
                      {st.count}/{st.max}
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      <div onMouseDown={onResizeStart} style={{
        position:"absolute",right:0,bottom:0,width:18,height:18,cursor:"se-resize",
        display:"flex",alignItems:"flex-end",justifyContent:"flex-end",
        padding:3,color:t.textDim,fontSize:11,userSelect:"none",
      }}>⊡</div>
    </div>
  );
}

function EmpPicker({emp,day,sid,st,assign,getPos,schedule,extShifts,timeOffReqs,weekStart,subSource,onSub}) {
  const t = useTheme();
  const cfg = useSettings();
  const [sel,setSel] = useState(null);
  const pos = getPos(emp,day,sid);
  if (!pos.length) return null;

  const currentHours  = calcHours(emp.id, schedule, extShifts);
  const wouldBeOver   = emp.employmentType==="full-time" && currentHours>=40;
  const isUnavailable = (emp.unavailableDays||[]).includes(day);
  const restGap       = calcRestGap(emp.id, schedule, day, sid);
  const consecH       = calcConsecutiveHours(emp.id, schedule, day, sid, extShifts);
  const shortRest     = restGap < (cfg?.minRestHours??MIN_REST_HOURS) && restGap !== Infinity;
  const consNights    = sid==="third" ? calcConsecutiveNights(emp.id, schedule, day, sid) : 0;
  const tooManyNights = consNights >= (cfg?.maxConsecutiveNights??MAX_CONSECUTIVE_NIGHTS);

  const hasFatigueWarning = shortRest || tooManyNights;
  const isSubMode = subSource && subSource.day === day && subSource.shiftId === sid;
  const warningColor = isSubMode ? t.scale : isUnavailable ? t.danger : hasFatigueWarning ? t.fatigue : wouldBeOver ? t.warning : t.border;
  const doAssign = (position) => {
    if (isSubMode) {
      onSub(subSource, emp.id, subSource.position);
      return;
    }
    const empOtPref = emp.overtimePref && emp.overtimePref !== "neutral" ? emp.overtimePref : (cfg?.defaultOvertimePref || "neutral");
    const otPref    = emp.employmentType === "full-time" ? empOtPref : "neutral";
    const warns = [];
    if (isUnavailable) warns.push(`${emp.name} is marked unavailable on ${day}.`);
    const hasApprovedTimeOff = (timeOffReqs||[]).some(r =>
      r.empId===emp.id && r.status==="approved" && timeOffCoversSlot(r, day, sid, weekStart)
    );
    if (hasApprovedTimeOff) warns.push(`${emp.name} has approved time off on ${day}.`);
    const isSupWeekdayViolation = false;
    if (isSupWeekdayViolation) warns.push(`${emp.name} is a Supervisor — must work 1st shift on weekdays. Assigning to another shift is not recommended.`);
    if (consecH > empMaxConsec(emp)) return;
    if (shortRest) warns.push(`Only ${Math.round(restGap*10)/10}h rest since last shift (min ${cfg?.minRestHours??MIN_REST_HOURS}h).`);
    if (tooManyNights) warns.push(`${consNights} consecutive night shifts exceeds the ${cfg?.maxConsecutiveNights??MAX_CONSECUTIVE_NIGHTS}-shift limit.`);
    if (wouldBeOver) {
      if (otPref === "blocked") warns.push(`${emp.name} prefers NO overtime — currently at ${currentHours}h.`);
      else warns.push(`${emp.name} is at ${currentHours}h this week — overtime.`);
    }
    if (warns.length && !window.confirm(warns.join("\n\n")+"\n\nAssign anyway?")) return;
    assign(day,sid,emp.id,position);
  };

  const badge = isUnavailable ? "OFF" : tooManyNights ? `${consNights}N` : shortRest ? `${Math.round(restGap)}h` : null;
  const badgeColor = isUnavailable ? t.danger : t.fatigue;

  if (sel===null) return (
    <button onClick={()=>{
      if(pos.length===1) doAssign(pos[0]);
      else{
        const pickIsSup = (emp.qualifications||[]).includes("Supervisor");
        let d;
        if(!isWeekday(day)&&pickIsSup&&pos.includes("Guard"))  d="Guard";
        else if(!st.hasScale&&pos.includes("Scale"))            d="Scale";
        else if(!st.hasMedical&&pos.includes("Medical"))        d="Medical";
        else if(pos.includes("Guard"))                          d="Guard";
        else d=pos[0];
        setSel(d);
        doAssign(d);
      }
    }} style={{background:t.surface,border:"1px solid "+warningColor,borderRadius:3,color:t.text,
      cursor:"pointer",fontSize:10,padding:"5px 8px",textAlign:"left",fontFamily:"inherit",fontWeight:600,
      display:"flex",alignItems:"center",justifyContent:"space-between",gap:6,opacity:isUnavailable?0.6:1}}
       onMouseEnter={e=>e.currentTarget.style.borderColor=t.accent}
       onMouseLeave={e=>e.currentTarget.style.borderColor=warningColor}>
      <span style={{display:"flex",alignItems:"center",gap:4}}>
        {emp.name}
        {badge&&<span style={{color:badgeColor,fontSize:8,fontWeight:800,background:badgeColor+"20",
          padding:"1px 4px",borderRadius:2}}>{badge}</span>}
        {wouldBeOver&&!badge&&<span style={{color:t.warning,fontSize:8}}>OT</span>}
      </span>
      <span style={{display:"flex",gap:3}}>{pos.map(p=>(<span key={p} style={{width:6,height:6,borderRadius:"50%",background:pC(p,t),display:"inline-block"}}/>))}</span>
    </button>
  );
  return (
    <div style={{display:"flex",gap:4,alignItems:"center",background:t.surface,border:"1px solid "+t.accent,borderRadius:3,padding:"3px 6px"}}>
      <span style={{fontSize:10,fontWeight:600,flex:1}}>{emp.name}</span>
      <select value={sel} onChange={e=>setSel(e.target.value)} style={{background:t.surfaceAlt,border:"1px solid "+t.border,
        color:t.text,fontSize:9,padding:"2px 4px",borderRadius:2,fontFamily:"inherit",cursor:"pointer"}}>
        {pos.map(p=>(<option key={p} value={p}>{p}</option>))}
      </select>
      <button onClick={()=>doAssign(sel)} style={{background:t.accent,border:"none",color:"#fff",
        fontSize:9,padding:"3px 6px",borderRadius:2,cursor:"pointer",fontWeight:700,fontFamily:"inherit"}}>\u2713</button>
    </div>
  );
}

function HistoryBar({ history, viewingHistory, setViewingHistory, setSchedule, setWeekStart, liveSchedule, liveWeekStart, t }) {
  if (!history || history.length === 0) return null;
  const sorted = [...history].sort((a,b) => (b.savedAtISO||b.weekStart||"").localeCompare(a.savedAtISO||a.weekStart||""));
  const currentHistIdx = viewingHistory
    ? sorted.findIndex(h => h.weekStart === viewingHistory.weekStart && h.savedAt === viewingHistory.savedAt)
    : -1;
  const canPrev = viewingHistory ? currentHistIdx > 0 : false;
  const canNext = viewingHistory ? currentHistIdx < sorted.length - 1 : false;
  const historyLabel = (h) => {
    const prefix = h.isAutoSave ? "Auto" : "Saved";
    return `${prefix}: ${h.weekStart||""} ${h.label ? "· "+h.label : ""}`.trim();
  };
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,fontSize:11,flexWrap:"wrap"}}>
      <span style={{color:t.textDim,fontWeight:600}}>History:</span>
      <button
        onClick={() => {
          if (viewingHistory && currentHistIdx > 0) setViewingHistory(sorted[currentHistIdx-1]);
        }}
        disabled={!canPrev}
        style={{background:"transparent",border:"1px solid "+t.border,color:canPrev?t.text:t.textDim,
          padding:"2px 8px",borderRadius:4,cursor:canPrev?"pointer":"default",fontSize:11}}>
        ◀
      </button>
      <select
        value={viewingHistory ? currentHistIdx : "__live__"}
        onChange={e => {
          const v = e.target.value;
          if (v === "__live__") {
            setViewingHistory(null);
            if (liveSchedule) setSchedule(liveSchedule);
            if (liveWeekStart) setWeekStart(liveWeekStart);
          } else {
            setViewingHistory(sorted[parseInt(v)]);
          }
        }}
        style={{fontSize:11,padding:"2px 6px",borderRadius:4,border:"1px solid "+t.border,
          background:t.surfaceAlt,color:t.text,flex:1,minWidth:160}}>
        <option value="__live__">▶ Current (live)</option>
        {sorted.map((h,i) => (
          <option key={i} value={i}>{historyLabel(h)}</option>
        ))}
      </select>
      <button
        onClick={() => {
          if (viewingHistory && canNext) setViewingHistory(sorted[currentHistIdx+1]);
        }}
        disabled={!canNext}
        style={{background:"transparent",border:"1px solid "+t.border,color:canNext?t.text:t.textDim,
          padding:"2px 8px",borderRadius:4,cursor:canNext?"pointer":"default",fontSize:11}}>
        ▶
      </button>
      {viewingHistory && (
        <button
          onClick={() => {
            setViewingHistory(null);
            if (liveSchedule) setSchedule(liveSchedule);
            if (liveWeekStart) setWeekStart(liveWeekStart);
          }}
          style={{background:t.accent+"22",border:"1px solid "+t.accent,color:t.accent,
            padding:"2px 8px",borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:700}}>
          ✕ Exit History
        </button>
      )}
    </div>
  );
}

function WeekPickerBar({ weekStart, setWeekStart, stepWeek, t }) {
  const [y,m,d] = (weekStart||"2024-01-07").split("-").map(Number);
  const sun = new Date(y, m-1, d, 12);
  const fmtHeader = (offset) => {
    const dt = new Date(sun);
    dt.setDate(sun.getDate() + offset);
    const mm = String(dt.getMonth()+1).padStart(2,"0");
    const dd = String(dt.getDate()).padStart(2,"0");
    return mm+"/"+dd;
  };
  const monthName = sun.toLocaleString("default", { month:"long", year:"numeric" });
  return (
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,fontSize:11,flexWrap:"wrap"}}>
      <button onClick={() => stepWeek(-1)}
        style={{background:t.surfaceAlt,border:"1px solid "+t.border,color:t.text,
          padding:"4px 12px",borderRadius:5,cursor:"pointer",fontSize:13,fontWeight:700}}>
        ‹
      </button>
      <span style={{fontSize:13,fontWeight:700,color:t.text,minWidth:160,textAlign:"center"}}>
        {monthName} — Week of {fmtHeader(0)}
      </span>
      <button onClick={() => stepWeek(1)}
        style={{background:t.surfaceAlt,border:"1px solid "+t.border,color:t.text,
          padding:"4px 12px",borderRadius:5,cursor:"pointer",fontSize:13,fontWeight:700}}>
        ›
      </button>
      <span style={{fontSize:10,color:t.textDim,margin:"0 4px"}}>|</span>
      <label style={{fontSize:11,color:t.textDim,fontWeight:600}}>Jump to:</label>
      <input type="date" value={weekStart||""} onChange={e => {
          const v = e.target.value;
          if (!v) return;
          const dt = new Date(v+"T12:00:00");
          const day = dt.getDay();
          dt.setDate(dt.getDate() - day);
          setWeekStart(dt.toISOString().slice(0,10));
        }}
        style={{fontSize:11,padding:"3px 6px",borderRadius:4,border:"1px solid "+t.border,
          background:t.surfaceAlt,color:t.text}}
      />
      <div style={{marginLeft:"auto",display:"flex",gap:4}}>
        {[0,1,2,3,4,5,6].map(offset => (
          <span key={offset} style={{fontSize:9,color:t.textDim,padding:"1px 4px",
            background:t.surfaceAlt,borderRadius:3,border:"1px solid "+t.border+"60"}}>
            {["Su","Mo","Tu","We","Th","Fr","Sa"][offset]} {fmtHeader(offset)}
          </span>
        ))}
      </div>
    </div>
  );
}
